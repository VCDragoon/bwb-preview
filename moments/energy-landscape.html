<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESSION ENERGY LANDSCAPE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060c;
    color: #e0e0e8;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .page-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 30px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ff4444, #4A90D9, transparent);
    margin: 16px auto 0;
    box-shadow: 0 0 10px rgba(255, 68, 68, 0.3);
  }

  .header h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 48px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #ff4444, #ff8866, #4A90D9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255, 68, 68, 0.3));
  }

  .header .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: #9898b0;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Legend */
  .legend-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: #9898b0;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Classification colors */
  .pace-explosive { color: #ff4444; text-shadow: 0 0 6px rgba(255, 68, 68, 0.4); }
  .pace-frontloaded { color: #ff8844; text-shadow: 0 0 6px rgba(255, 136, 68, 0.3); }
  .pace-rollercoaster { color: #ffcc44; text-shadow: 0 0 6px rgba(255, 204, 68, 0.3); }
  .pace-steadyclimb { color: #81C784; text-shadow: 0 0 6px rgba(129, 199, 132, 0.3); }
  .pace-latebloomer { color: #4A90D9; text-shadow: 0 0 6px rgba(74, 144, 217, 0.3); }
  .pace-slowburn { color: #BA68C8; text-shadow: 0 0 6px rgba(186, 104, 200, 0.3); }

  .chart-container {
    position: relative;
    background: linear-gradient(180deg, #0a0a14 0%, #12121e 100%);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 20px 10px 20px 10px;
    overflow: visible;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: linear-gradient(135deg, #1a1a2e, #22223a);
    border: 1px solid rgba(255, 68, 68, 0.3);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    color: #e0e0e8;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 12px rgba(255, 68, 68, 0.1);
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 320px;
    backdrop-filter: blur(10px);
  }

  .tooltip.visible { opacity: 1; }

  .tooltip .tt-session {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: #ff6644;
    margin-bottom: 2px;
  }

  .tooltip .tt-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: #9898b0;
    margin-bottom: 6px;
  }

  .tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin: 3px 0;
  }

  .tooltip .tt-key {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: #7878a0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tooltip .tt-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #e0e0e8;
  }

  /* Energy scale legend */
  .energy-scale {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    z-index: 5;
  }

  .energy-scale .scale-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: #5858780;
    letter-spacing: 1px;
    text-transform: uppercase;
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    margin-bottom: 6px;
  }

  svg text {
    user-select: none;
  }
</style>
</head>

// Scene type color map
const SCENE_COLORS = {
  Combat: '#ff4444',
  Social_Encounter: '#FFB74D',
  Exploration: '#4A90D9',
  Skill_Challenge: '#81C784',
  Exposition: '#BA68C8',
  Character_Management: '#7986CB',
  Ritual: '#FF8A65',
  Puzzle: '#4DB6AC',
  Recap: '#9898b0',
  Meta: '#585870',
  Off_Topic: '#404058',
};

// Pace classification styling
const PACE_STYLES = {
  'Explosive Finale': 'pace-explosive',
  'Front-Loaded': 'pace-frontloaded',
  'Roller Coaster': 'pace-rollercoaster',
  'Steady Climb': 'pace-steadyclimb',
  'Late Bloomer': 'pace-latebloomer',
  'Slow Burn': 'pace-slowburn',
};

// Build legend
const legendEl = document.getElementById('sceneLegend');
Object.entries(SCENE_COLORS).forEach(([type, color]) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${color}; box-shadow: 0 0 4px ${color}66;"></span>${type.replace(/_/g, ' ')}`;
  legendEl.appendChild(item);
});

// ============================================================
// D3 RIDGELINE CHART
// ============================================================
const sessions = [];
for (let i = 1; i <= 46; i++) {
  const sid = `S${String(i).padStart(3, '0')}`;
  if (DATA[sid]) sessions.push(DATA[sid]);
}

const margin = { top: 30, right: 160, bottom: 30, left: 80 };
const rowHeight = 22;
const peakHeight = 50; // How tall ridges can extend
const width = 1340;
const totalHeight = margin.top + margin.bottom + sessions.length * rowHeight + peakHeight;

const svg = d3.select('#chart')
  .attr('width', width)
  .attr('height', totalHeight)
  .attr('viewBox', `0 0 ${width} ${totalHeight}`)
  .style('width', '100%')
  .style('height', 'auto');

const chartWidth = width - margin.left - margin.right;

// Find max scene count for x normalization
const maxScenes = d3.max(sessions, d => d.scenes.length);

const xScale = d3.scaleLinear().domain([0, maxScenes - 1]).range([0, chartWidth]);
const yEnergyScale = d3.scaleLinear().domain([0, 10]).range([0, peakHeight]);

// Color scale for energy: cool blue to hot red
const energyColor = d3.scaleLinear()
  .domain([1, 3, 5, 7, 10])
  .range(['#2244aa', '#4A90D9', '#ffcc44', '#ff8844', '#ff4444'])
  .clamp(true);

const tooltip = document.getElementById('tooltip');

// Main group
const g = svg.append('g')
  .attr('transform', `translate(${margin.left}, ${margin.top})`);

// Add subtle horizontal grid for energy reference
const energyRefGroup = g.append('g').attr('class', 'energy-ref');

// Y-axis energy reference (1-10) on far left
const yAxisGroup = svg.append('g')
  .attr('transform', `translate(${margin.left - 10}, ${margin.top})`);

[1, 5, 10].forEach(val => {
  const refY = sessions.length * rowHeight - yEnergyScale(val);
  yAxisGroup.append('text')
    .attr('x', -5)
    .attr('y', refY)
    .attr('text-anchor', 'end')
    .attr('fill', '#585870')
    .attr('font-family', 'JetBrains Mono')
    .attr('font-size', 9)
    .text(val);
});

yAxisGroup.append('text')
  .attr('x', -20)
  .attr('y', sessions.length * rowHeight / 2)
  .attr('text-anchor', 'middle')
  .attr('fill', '#585870')
  .attr('font-family', 'Barlow Condensed')
  .attr('font-size', 10)
  .attr('letter-spacing', '2px')
  .attr('transform', `rotate(-90, -20, ${sessions.length * rowHeight / 2})`)
  .text('ENERGY');

// Create gradient definitions
const defs = svg.append('defs');

sessions.forEach((session, idx) => {
  const gradId = `grad-${session.session_id}`;
  const scenes = session.scenes;

  // Create linear gradient for this ridge
  const grad = defs.append('linearGradient')
    .attr('id', gradId)
    .attr('x1', '0%').attr('y1', '0%')
    .attr('x2', '100%').attr('y2', '0%');

  scenes.forEach((s, si) => {
    const pct = scenes.length > 1 ? (si / (scenes.length - 1)) * 100 : 50;
    grad.append('stop')
      .attr('offset', `${pct}%`)
      .attr('stop-color', energyColor(s.energy_score))
      .attr('stop-opacity', 0.6);
  });
});

// Draw ridgelines
sessions.forEach((session, idx) => {
  const scenes = session.scenes;
  const baseY = idx * rowHeight;
  const sid = session.session_id;

  // Create area generator
  const sceneXScale = d3.scaleLinear()
    .domain([0, scenes.length - 1])
    .range([0, chartWidth]);

  const areaGen = d3.area()
    .x((d, i) => sceneXScale(i))
    .y0(baseY)
    .y1((d) => baseY - yEnergyScale(d.energy_score))
    .curve(d3.curveBasis);

  const lineGen = d3.line()
    .x((d, i) => sceneXScale(i))
    .y((d) => baseY - yEnergyScale(d.energy_score))
    .curve(d3.curveBasis);

  const ridgeGroup = g.append('g')
    .attr('class', `ridge ridge-${sid}`)
    .style('cursor', 'pointer');

  // Area fill
  const areaPath = ridgeGroup.append('path')
    .datum(scenes)
    .attr('d', areaGen)
    .attr('fill', `url(#grad-${sid})`)
    .attr('opacity', 0.7);

  // Outline
  const linePath = ridgeGroup.append('path')
    .datum(scenes)
    .attr('d', lineGen)
    .attr('fill', 'none')
    .attr('stroke', '#ffffff')
    .attr('stroke-width', 1)
    .attr('stroke-opacity', 0.5);

  // Scene type dots
  scenes.forEach((s, si) => {
    const cx = sceneXScale(si);
    const cy = baseY;
    ridgeGroup.append('circle')
      .attr('cx', cx)
      .attr('cy', cy)
      .attr('r', 2.5)
      .attr('fill', SCENE_COLORS[s.scene_type] || '#585870')
      .attr('opacity', 0.9)
      .style('filter', `drop-shadow(0 0 2px ${SCENE_COLORS[s.scene_type] || '#585870'})`);
  });

  // Session label on left
  ridgeGroup.append('text')
    .attr('x', -8)
    .attr('y', baseY + 4)
    .attr('text-anchor', 'end')
    .attr('fill', '#9898b0')
    .attr('font-family', 'JetBrains Mono')
    .attr('font-size', 10)
    .text(sid.replace('S0', 'S').replace('S0', 'S'));

  // Pace classification on right
  const paceClass = PACE_STYLES[session.pace_classification] || '';
  ridgeGroup.append('text')
    .attr('x', chartWidth + 10)
    .attr('y', baseY + 4)
    .attr('text-anchor', 'start')
    .attr('fill', '#9898b0')
    .attr('font-family', 'Barlow Condensed')
    .attr('font-size', 11)
    .attr('class', paceClass)
    .text(session.pace_classification);

  // Avg energy on far right
  ridgeGroup.append('text')
    .attr('x', chartWidth + 140)
    .attr('y', baseY + 4)
    .attr('text-anchor', 'end')
    .attr('fill', energyColor(session.overall_energy_average))
    .attr('font-family', 'JetBrains Mono')
    .attr('font-size', 10)
    .style('filter', `drop-shadow(0 0 3px ${energyColor(session.overall_energy_average)}44)`)
    .text(session.overall_energy_average.toFixed(1));

  // Hover interaction
  ridgeGroup
    .on('mouseenter', function(event) {
      d3.selectAll('.ridge').attr('opacity', 0.3);
      d3.select(this).attr('opacity', 1);
      d3.select(this).select('path:nth-child(1)').attr('opacity', 0.9);
      d3.select(this).select('path:nth-child(2)')
        .attr('stroke-width', 2)
        .attr('stroke-opacity', 1)
        .attr('stroke', energyColor(session.overall_energy_average));

      tooltip.innerHTML = `
        <div class="tt-session">${sid} -- ${session.session_label}</div>
        <div class="tt-row"><span class="tt-key">Scenes</span><span class="tt-val">${session.scene_count}</span></div>
        <div class="tt-row"><span class="tt-key">Avg Energy</span><span class="tt-val" style="color:${energyColor(session.overall_energy_average)}">${session.overall_energy_average.toFixed(1)}</span></div>
        <div class="tt-row"><span class="tt-key">Classification</span><span class="tt-val">${session.pace_classification}</span></div>
        <div class="tt-row"><span class="tt-key">Types</span><span class="tt-val" style="font-size:14px">${scenes.map(s => s.scene_type.replace(/_/g,' ')).join(' > ')}</span></div>
      `;
      tooltip.classList.add('visible');
    })
    .on('mousemove', function(event) {
      const tx = Math.min(event.clientX + 16, window.innerWidth - 340);
      const ty = Math.min(event.clientY - 10, window.innerHeight - 180);
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    })
    .on('mouseleave', function() {
      d3.selectAll('.ridge').attr('opacity', 1);
      d3.select(this).select('path:nth-child(1)').attr('opacity', 0.7);
      d3.select(this).select('path:nth-child(2)')
        .attr('stroke-width', 1)
        .attr('stroke-opacity', 0.5)
        .attr('stroke', '#ffffff');
      tooltip.classList.remove('visible');
    });

  // ---- ENTRANCE ANIMATION ----
  // Clip path for drawing in from left
  const clipId = `clip-${sid}`;
  defs.append('clipPath')
    .attr('id', clipId)
    .append('rect')
    .attr('x', 0)
    .attr('y', baseY - peakHeight - 5)
    .attr('width', 0)
    .attr('height', peakHeight + rowHeight + 10)
    .transition()
    .duration(1200)
    .delay(idx * 40)
    .ease(d3.easeCubicOut)
    .attr('width', chartWidth + 20);

  ridgeGroup.attr('clip-path', `url(#${clipId})`);
});

// Color the pace text using CSS classes by applying inline fills
setTimeout(() => {
  document.querySelectorAll('.pace-explosive').forEach(el => el.setAttribute('fill', '#ff4444'));
  document.querySelectorAll('.pace-frontloaded').forEach(el => el.setAttribute('fill', '#ff8844'));
  document.querySelectorAll('.pace-rollercoaster').forEach(el => el.setAttribute('fill', '#ffcc44'));
  document.querySelectorAll('.pace-steadyclimb').forEach(el => el.setAttribute('fill', '#81C784'));
  document.querySelectorAll('.pace-latebloomer').forEach(el => el.setAttribute('fill', '#4A90D9'));
  document.querySelectorAll('.pace-slowburn').forEach(el => el.setAttribute('fill', '#BA68C8'));
}, 50);
</script>
