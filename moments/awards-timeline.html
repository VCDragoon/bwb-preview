<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden}
body{background:#06060c;color:#c8c8e0;font-family:'Barlow',sans-serif}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px);pointer-events:none;z-index:9999}
.main-container{max-width:1600px;margin:0 auto;padding:30px 20px}
.title-block{text-align:center;margin-bottom:8px}
.title-block h1{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:6px;background:linear-gradient(135deg,#fbbf24 0%,#f59e0b 40%,#d97706 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(245,158,11,0.4))}
.title-block .subtitle{font-family:'Barlow Condensed',sans-serif;font-size:16px;color:#6b6b8a;letter-spacing:3px;text-transform:uppercase}
.stats-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;margin:20px 0 16px;padding:16px;background:linear-gradient(135deg,#12121e 0%,#1a1a2e 100%);border:1px solid #2a2a40;border-radius:12px}
.stat-item{text-align:center}
.stat-value{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:500;filter:drop-shadow(0 0 8px rgba(99,102,241,0.3))}
.stat-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#6b6b8a;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;margin:12px 0 20px}
.legend-item{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px;border-radius:4px;border:1px solid transparent;transition:all 0.2s ease;user-select:none}
.legend-item:hover{border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.03)}
.legend-item.active{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06)}
.legend-item.dimmed .legend-name,.legend-item.dimmed .legend-dot,.legend-item.dimmed .legend-count{opacity:0.3}
.legend-dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 6px currentColor;flex-shrink:0}
.legend-name{font-family:'Cinzel',serif;font-size:14px;color:#c8c8e0;letter-spacing:0.5px}
.legend-count{font-family:'JetBrains Mono',monospace;font-size:14px;color:#555570;margin-left:2px}
.badge-block{text-align:center;margin-top:16px;margin-bottom:20px;padding:16px;background:linear-gradient(135deg,#12121e 0%,#1a1a2e 100%);border:1px solid #2a2a40;border-radius:12px}
.badge-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#6b6b8a;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.badge-name{font-family:'Cinzel',serif;font-size:24px;font-weight:700;filter:drop-shadow(0 0 12px rgba(245,158,11,0.4))}
.badge-stat{font-family:'JetBrains Mono',monospace;font-size:14px;color:#9898b0;margin-top:2px}
.grid-container{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 280px);background:linear-gradient(135deg,#0c0c16 0%,#12121e 100%);border:1px solid #2a2a40;border-radius:12px;padding:0}
.grid-table{border-collapse:separate;border-spacing:0;width:100%;min-width:1100px}
.grid-table th,.grid-table td{padding:0;text-align:center;vertical-align:middle}
.grid-table thead th{position:sticky;top:0;z-index:10;background:#0c0c16;font-family:'JetBrains Mono',monospace;font-size:12px;color:#555570;padding:8px 2px;border-bottom:1px solid #2a2a40}
.grid-table thead th.corner{background:#0c0c16;z-index:12;position:sticky;left:0}
.grid-table thead th.session-col{width:24px;min-width:24px}
.grid-table thead th.total-col{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#8888a8;letter-spacing:1px;text-transform:uppercase;width:50px}
.grid-table tbody td.award-label{text-align:left;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#a0a0c0;letter-spacing:0.5px;white-space:nowrap;position:sticky;left:0;background:#0c0c16;z-index:5;border-right:1px solid #1a1a30;min-width:220px}
.grid-table tbody td.cell{padding:3px 1px;height:30px}
.grid-table tbody td.total-cell{font-family:'JetBrains Mono',monospace;font-size:14px;color:#8888a8;padding:4px 6px;border-left:1px solid #2a2a40}
.grid-table tfoot td{border-top:1px solid #2a2a40;padding:6px 2px;font-family:'JetBrains Mono',monospace;font-size:14px;color:#555570}
.grid-table tfoot td.footer-label{text-align:left;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#6b6b8a;letter-spacing:1px;text-transform:uppercase;position:sticky;left:0;background:#0c0c16;z-index:5}
.grid-table tbody tr{transition:background 0.15s}
.grid-table tbody tr:hover{background:rgba(255,255,255,0.02)}
.award-dot{width:18px;height:18px;border-radius:50%;display:inline-block;cursor:pointer;transition:all 0.2s;position:relative}
.award-dot:hover{transform:scale(1.5);z-index:20}
.award-dot.dimmed{opacity:0.12;transform:scale(0.7)}
.tooltip{position:fixed;pointer-events:none;background:linear-gradient(135deg,#1a1a2e 0%,#12121e 100%);border:1px solid #3a3a55;border-radius:8px;padding:14px 18px;font-family:'Barlow',sans-serif;font-size:13px;color:#c8c8e0;z-index:10000;opacity:0;transition:opacity 0.15s;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.6)}
.tooltip.visible{opacity:1}
.tooltip-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#fbbf24;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.tooltip-winner{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin-bottom:6px}
.tooltip-desc{font-size:14px;color:#9898b0;line-height:1.4}
.tooltip-session{font-family:'JetBrains Mono',monospace;font-size:14px;color:#555570;margin-top:6px}
</style>

<script>
var AWARDS_DATA = [{"a":"Most Valuable Player","w":"HT","r":"Gradles","d":"Ash engaged with the dangerous magic door, triggering the plot despite getting paralyzed. Corras successfully claimed the castle and master bedroom.","ct":"","s":"S001"},{"a":"Best Roleplay / In-Character","w":"Christie","r":"Mary","d":"Dahlia's commitment to starting a communist 'Corras operative' and arguing over whether the servant quarters were actually haunted cribs.","ct":"","s":"S001"},{"a":"The 'Leroy Jenkins' Award for Recklessness","w":"HT","r":"Lucy","d":"Ash ignored Fleshy and the DM's warnings, rolling a 13 and taking damage. Orla wanted to breed human-eating Venus people traps.","ct":"","s":"S001"},{"a":"Funniest Moment","w":"Mary","r":"HT","d":"Billabong relentlessly asking Morty the ageless caretaker if he goes to the bathroom and where the excrement goes.","ct":"","s":"S001"},{"a":"Most Chaotic Action","w":"Lucy","r":"Christie","d":"Orla's immediate pivot to breeding 'Venus people traps'. Dahlia's obsession with the 'ghost babies' cribs.","ct":"","s":"S001"},{"a":"Best NPC Interaction","w":"Gradles","r":"Mary","d":"Corras establishing dominance with 'What are you doing in my castle?' to Morty.","ct":"","s":"S001"},{"a":"The Rules Lawyer / Metagamer Award","w":"Christie","r":"HT","d":"Dahlia figuring out the 'performance mode' and module bugs in Foundry VTT to get the game running smoothly.","ct":"","s":"S001"},{"a":"Best One-Liner / Quote","w":"Mary","r":"Gradles","d":"Billabong: 'What did you do with the excrement when you were like hidden in the shadow realm for millennia?' Corras: 'We thrive in chaos.'","ct":"","s":"S001"},{"a":"The Loot Goblin Award","w":"Gradles","r":"HT","d":"Corras immediately claiming the master bedroom with the 'blood bathtub' while Ash tried to loot the locked basement.","ct":"","s":"S001"},{"a":"The 'Wait, What?' Award","w":"Christie","r":"Lucy","d":"Dahlia convinced the servant bunk beds were actually baby cribs, alarming the rest of the party.","ct":"","s":"S001"},{"a":"Worst Luck","w":"HT","r":"Gradles","d":"Ash failing the wisdom save and getting paralyzed for two hours. Corras getting negative modifiers on insight checks against Morty.","ct":"","s":"S001"},{"a":"The 'Decorator' Award for Castle Improvement","w":"Lucy","r":"Christie","d":"Orla planning the deadly greenhouse. Dahlia reorganizing the third-floor junk room.","ct":"","s":"S001"},{"a":"Most Valuable Player","w":"Gradles","r":"Meijinx","d":"Orchestrating the brilliant, multi-layered heist to swap the blind troll's coin and start a troll fight instead of facing them head-on.","ct":"Corras's massive Perception check and sleight of hand to pull the coin laid the groundwork, while Ave braved the water under Greater Invisibility.","s":"S002"},{"a":"Best One-Liner / Quote","w":"HT","r":"Christie","d":"Ash reacting to the aftermath of making the troll blind herself.","ct":"\"I feel like I just bullied a troll. Yeah, it doesn't feel great.\"","s":"S002"},{"a":"Best Tactical Play","w":"Lucy","r":"HT","d":"Buffing the party's stealth for the troll heist.","ct":"Orla cast Pass Without Trace to give the entire party +10 to stealth checks, making the entire troll heist possible.","s":"S002"},{"a":"Most Dramatic Moment","w":"Meijinx","r":"Lucy","d":"Sneaking through the water while an angry troll stumbled around.","ct":"Ave waded through the water under Greater Invisibility, successfully replacing the coin right as the troll was trying to figure out what was happening.","s":"S002"},{"a":"Funniest Moment","w":"DM","r":"HT","d":"The troll blinding itself with a thunkin stick.","ct":"The troll, already missing one eye, got blood in her good eye and tried to scratch it out with a stick, accidentally blinding herself completely.","s":"S002"},{"a":"Most Damage / Best Attack","w":"Lucy","r":"Christie","d":"Getting squashed by a falling blind troll.","ct":"Orla took 12 bludgeoning damage when the blind troll fell backwards right on top of her.","s":"S002"},{"a":"Best Roleplay / In-Character","w":"Christie","r":"Gradles","d":"Trying to decipher the religious texts in the crypts.","ct":"Lilith spent her time hiring cryptographers and rolling religion checks to decipher the arcane runes from her time in the Abbey.","s":"S002"},{"a":"Heart of the Party / Support","w":"Lucy","r":"Christie","d":"Feeling deep empathy for the magical orb of light.","ct":"Orla felt genuine sorrow when communicating with the glowing orb that projected feelings of 'I never wanted this'.","s":"S002"},{"a":"Most Chaotic Action","w":"HT","r":"Meijinx","d":"Considering a suicidal jump into the dark pit.","ct":"Ash briefly considered casting global invulnerability and just blindly jumping down the scary pit to see what happened.","s":"S002"},{"a":"Clutch Player","w":"HT","r":"Gradles","d":"Saving the heist at the absolute last second.","ct":"When the troll rolled an 18 to detect Ave replacing the coin, Ash used Silvery Barbs to force a reroll, causing the troll to fail with a 10.","s":"S002"},{"a":"Most Creative","w":"Lucy","r":"HT","d":"Using Mold Earth to bypass a cave-in.","ct":"Orla used Mold Earth to push an overturned mine cart out of the way, uncovering 4,000 gold worth of gems in the process.","s":"S002"},{"a":"Most Creative","w":"Gradles","r":"Christie","d":"Figuring out how to weaponize the trolls' greed.","ct":"Corras formulated the plan to steal one troll's shiny coin and plant it on the other troll, causing them to fight each other instead of the party.","s":"S002"},{"a":"Most Valuable Player","w":"Christie","r":"Gradles","d":"Lilith cast a massive 70-point Heal on Ash right after she was hit by both an acid ooze and Orla's Sunbeam, single-handedly preventing her death.","ct":"Dahlia: 'I can heal you for a whole 70 I can get her all the way juiced up perfect ready to go'","s":"S003"},{"a":"Best One-Liner / Quote","w":"HT","r":"Mary","d":"Ash, despite being dissolved in acid and about to be blasted by her ally's Sunbeam, remains confident because of her Death Ward.","ct":"Ash: 'My bestie is death what do I fear'","s":"S003"},{"a":"Best Tactical Play","w":"Gradles","r":"Christie","d":"Corras realized that the invisible ooze was reflecting light, and directed Orla to use Sunbeam down the hole to illuminate it.","ct":"Corras: 'You know, perhaps a brighter light would help...'","s":"S003"},{"a":"Most Dramatic Moment","w":"HT","r":"Lucy","d":"Ash flew blindly into the dark pit, only for her broom to disintegrate as she sank waist-deep into an invisible acid ooze that started melting her legs.","ct":"DM: 'You feel as though they are being disassembled at almost a molecular level a numbing coldness...'","s":"S003"},{"a":"Funniest Moment","w":"Meijinx","r":"Christie","d":"While the party was fighting for their lives to save Ash from the pit, Ave calmly stepped up and just started blind-firing Eldritch Blasts down the hole.","ct":"Meijinx: 'Let's throw a nice little Eldritch Blast down there. Hang on, since I'm level 11, that's... Yeah, that's three Eldritch Blasts.'","s":"S003"},{"a":"Most Damage / Best Attack","w":"Lucy","r":"Meijinx","d":"Orla cast Sunbeam directly down the pit, dealing massive radiant damage (68 points before saves) to the ooze.","ct":"Orla: 'I have Sunbeam, 5 feet wide, 60 feet long... they take 68 radiant damage'","s":"S003"},{"a":"Best Roleplay / In-Character","w":"HT","r":"Christie","d":"Ash impulsively jumped into an unknown magical pit despite the warnings, immediately requiring rescue.","ct":"Ash: 'Listen, I got a plan. I got a plan. High risk, possibly high reward.'","s":"S003"},{"a":"Heart of the Party / Support","w":"Mary","r":"Lucy","d":"Billabong physically dangled Orla over the pit so that she could get the correct angle to cast Sunbeam straight down at the ooze.","ct":"Billabong: 'sure Bilbo hold her right over the hole Billabong gonna hold her right over the hole'","s":"S003"},{"a":"Most Chaotic Action","w":"HT","r":"Meijinx","d":"Ash casting Firebolt at the shadow illusions instead of listening to Orla who had correctly identified them as fake.","ct":"Ash: 'I'm gonna burn it with fire what's gonna happen'","s":"S003"},{"a":"Clutch Player","w":"Christie","r":"Gradles","d":"Lilith managed to pull off a fully-restoring Heal spell on Ash immediately after Orla's friendly-fire Sunbeam attack.","ct":"Dahlia: 'Okay. So sunbeam and then heal immediately.'","s":"S003"},{"a":"Most Creative","w":"Lucy","r":"Christie","d":"Orla's use of Sunbeam not only dealt heavy radiant damage but also illuminated the invisible glass-like ooze so the party could target it.","ct":"Orla: 'I'll cast it in the hole.'","s":"S003"},{"a":"Most Creative","w":"Mary","r":"Meijinx","d":"Billabong finding a practical physical solution (holding Orla over the hole) to a line-of-sight magic problem.","ct":"Corras: 'Can we just hold her straight over the hole, actually? Everybody crawl around and hold Orla.'","s":"S003"},{"a":"Most Valuable Player","w":"Mary","r":"Meijinx","d":"Billabong tore through the battlefield, holding the line against a massive goblin horde and eliminating the skitterling threat, while Ave stepped in to absorb a devastating blow meant for Lilith.","ct":"For relentless damage output and taking the hits when the party needed it most.","s":"S004"},{"a":"Best One-Liner / Quote","w":"Lucy","r":"Gradles","d":"Orla aggressively demanding answers from a spy raven.","ct":"\"You think you can ignore me? Jeez, what is, dude?\"","s":"S004"},{"a":"Best Tactical Play","w":"HT","r":"Christie","d":"Ash devised a brilliant misinformation campaign to throw off Lilith's pursuers by convincing them Lilith was on a sold-out concert tour.","ct":"For using Xalvador to plant rumors of a multi-city preaching tour.","s":"S004"},{"a":"Most Dramatic Moment","w":"Meijinx","r":"Christie","d":"Lilith being hyper-focused by the goblin horde and taking multiple death saving throws, prompting Ave to desperately throw himself in front of an attack.","ct":"For the terrifying sequence of death saves and near-fatal blows.","s":"S004"},{"a":"Funniest Moment","w":"Lucy","r":"Mary","d":"The party's attempt to interrogate a raven, involving Orla trying to make friends with it and Billabong getting right up in its face to aggressively sniff it.","ct":"For treating a polymorphed cultist spy like a weirdly stubborn pet.","s":"S004"},{"a":"Most Damage / Best Attack","w":"Mary","r":"Meijinx","d":"Billabong entering a frenzied rage and unleashing six attacks in a single turn to blend through the goblin ranks.","ct":"For an absolute masterclass in barbarian crowd control.","s":"S004"},{"a":"Best Roleplay / In-Character","w":"Gradles","r":"HT","d":"Corras easily slipping into a lie about how the stolen ancient tome 'just fell into his bag' when questioned about its origins.","ct":"\"Old habits die hard, I knocked into a bookshelf because I'm very clumsy...\"","s":"S004"},{"a":"Heart of the Party / Support","w":"Lucy","r":"Mary","d":"Orla using the limited 25 words of a Sending stone spell in the middle of a warzone to make sure the party knew she missed them.","ct":"For prioritizing emotional check-ins over tactical updates.","s":"S004"},{"a":"Most Chaotic Action","w":"HT","r":"Gradles","d":"Ash casually cracking open a cursed, ancient stolen book from Candlekeep that immediately tattoos the entire party with Sylvan script and erases their shadows.","ct":"For deciding that 'right now' was the perfect time to read the Chronicles of the Quill.","s":"S004"},{"a":"Clutch Player","w":"Gradles","r":"Lucy","d":"Corras counterspelling the Banshee Queen's Call Lightning at the exact right moment to prevent Lilith from being struck while unconscious.","ct":"For stifling Nile Argonaut and sending her into a frustrated tantrum.","s":"S004"},{"a":"Most Creative","w":"Lucy","r":"HT","d":"Orla realizing the spy raven was actually a person and casting Hold Person right as it tried to fly away, forcing it to revert to human form.","ct":"For outsmarting the cultist's disguise with split-second spellcasting.","s":"S004"},{"a":"Most Creative","w":"HT","r":"Mary","d":"Ash deciding the best way to handle an army of religious zealots hunting Lilith was to treat Lilith like a pop star on a sold-out tour.","ct":"For the 'Catch her before Waterdeep' defense strategy.","s":"S004"},{"a":"Most Valuable Player","w":"Gradles","r":"Mary","d":"Coordinating a massive plunging sneak attack off of Billabong's back to deal 81 damage to the flying wasp monster.","ct":"Just like I planned.","s":"S005"},{"a":"Best One-Liner / Quote","w":"Mary","r":"Christie","d":"Billabong confessing to eating her Meemaw's muffin and blaming it on the dog.","ct":"I once ate my Meemaw's muffin and I blamed it on the dog.","s":"S005"},{"a":"Best Tactical Play","w":"HT","r":"Gradles","d":"Counterspelling the Archmage's 4th level spell by casting Counterspell at 5th level.","ct":"I'm going to counter spell it at fifth level.","s":"S005"},{"a":"Most Dramatic Moment","w":"Christie","r":"Meijinx","d":"Lilith gathering a cult following and testing their devotion by sending away their annoying leader, Brother Allred.","ct":"I gave you guys a whole pocket dimension to live in and he made you leave it instantly.","s":"S005"},{"a":"Funniest Moment","w":"Lucy","r":"HT","d":"Convincing the magical Hall of Whispers that her truth is that she lies about everything to the point she believes it.","ct":"I will lie about nearly anything to the point that I believe in my heart that is the truth.","s":"S005"},{"a":"Most Damage / Best Attack","w":"Gradles","r":"Mary","d":"Dealing a massive 81 damage via sneak attack after vaulting off Billabong.","ct":"81 damage. Just kind of land super hard with the dagger in both hands.","s":"S005"},{"a":"Best Roleplay / In-Character","w":"Meijinx","r":"Lucy","d":"Charging ahead with extra attacks and flourishes while forgetting some damage bonuses, fully embodying Ave's chaotic bard energy.","ct":"I'm just going to ask. You think you can finish this up? Cool. I'm just not even going to wait for her to answer.","s":"S005"},{"a":"Heart of the Party / Support","w":"Christie","r":"HT","d":"Lilith fully embracing her new role as a prophetess and deciding to start a cult casino to fund the group.","ct":"What if we start a casino, bring all these people, I say, gambling's a virtue. They gamble away their life savings.","s":"S005"},{"a":"Most Chaotic Action","w":"Lucy","r":"Christie","d":"Attempting to pass a Druidic Apprenticeship Review by making her new cult followers put on a play.","ct":"Instead this could work, no? Yes? A visual presentation, like someone read like a poem and someone else had an interpretive dance.","s":"S005"},{"a":"Clutch Player","w":"Mary","r":"HT","d":"Tanking a massive stinger attack, resisting the poison, and then smashing the Bone Devil into the ground.","ct":"I'm going to thunk the crap out of him. Yeah, I'm just going to hit him with my great axe. 20 hit.","s":"S005"},{"a":"Most Creative","w":"Meijinx","r":"Gradles","d":"Using Defensive Flourish to boost AC while surrounded by enemies.","ct":"I'm going to spend a Bardic Inspiration to do a defensive flourish on it.","s":"S005"},{"a":"Most Creative","w":"HT","r":"Lucy","d":"Suggesting they polymorph Ave into a plant and put him in a little pot on wheels to act as a compass for the magical tone.","ct":"Let me polymorph Ave into a plant and then he just points where we're supposed to go and he's in a little pot.","s":"S005"},{"a":"Most Valuable Player","w":"HT","r":"Mary","d":"Managed the battlefield geometry and identified the invisible barrier.","ct":"For navigating the Archmage's chaotic puzzle box with style.","s":"S006"},{"a":"Best One-Liner / Quote","w":"Gradles","r":"Christie","d":"Asking 'What are you exactly?' to an unresponsive enemy.","ct":"For prioritizing awkward small talk in mortal combat.","s":"S006"},{"a":"Best Tactical Play","w":"Christie","r":"HT","d":"Using Spirit Guardians to mop up the zombie horde.","ct":"For providing an essential meat grinder for the party.","s":"S006"},{"a":"Most Dramatic Moment","w":"HT","r":"Gradles","d":"Getting banished by the hidden glyph of warding.","ct":"For an impromptu vacation to a pocket dimension.","s":"S006"},{"a":"Funniest Moment","w":"Mary","r":"Gradles","d":"Squeezing 'like a panther' through Orla's difficult terrain.","ct":"For proving that true grace is just sucking your gut in.","s":"S006"},{"a":"Most Damage / Best Attack","w":"Mary","r":"Christie","d":"Sparta-kicking a zombie into the Spirit Guardians.","ct":"For maximum collateral damage and cinematic finishing moves.","s":"S006"},{"a":"Best Roleplay / In-Character","w":"Gradles","r":"HT","d":"Trying to blow out the magic candles instead of fighting.","ct":"For unwavering commitment to ignoring the actual threat.","s":"S006"},{"a":"Heart of the Party / Support","w":"Christie","r":"Mary","d":"Sparing the unconscious enemy and handing out temporary hit points.","ct":"For showing mercy in the middle of a bloodbath.","s":"S006"},{"a":"Most Chaotic Action","w":"Mary","r":"HT","d":"Throwing a random bone at the invisible wall just to see what would happen.","ct":"For conducting science via blunt force trauma.","s":"S006"},{"a":"Clutch Player","w":"Christie","r":"Gradles","d":"Casting Aid at exactly the right moment to buffer the team.","ct":"For keeping everyone's max HP looking healthy.","s":"S006"},{"a":"Most Creative","w":"HT","r":"Mary","d":"Activating See Invisibility to track the Archmage.","ct":"For actually using utility spells when they matter most.","s":"S006"},{"a":"Most Creative","w":"Gradles","r":"Christie","d":"Trying to drag an object through the barrier with Mage Hand.","ct":"For testing the parameters of an invisible, unyielding force.","s":"S006"},{"a":"Most Valuable Player","w":"Gradles","r":"Meijinx","d":"Successfully stealing the eyelash from Spark during the time heist.","ct":"For navigating the treacherous halls of his own castle in the past to secure the crucial component for the Simulacrum.","s":"S007"},{"a":"Best One-Liner / Quote","w":"Mary","r":"Christie","d":"Justifying turning back around when dominated.","ct":"\"Sometimes you just forget. You turn around and come back. Don't you ever forget why you walked into a room?\"","s":"S007"},{"a":"Best Tactical Play","w":"Meijinx","r":"Gradles","d":"Using Dominate Person on past Billabong.","ct":"For cleanly resolving the pursuit of Condor-Orla by mentally commanding past Billabong to calmly turn around and go back inside.","s":"S007"},{"a":"Most Dramatic Moment","w":"HT","r":"Lucy","d":"Spark crying out in pain as his eyelash is plucked.","ct":"For the heart-wrenching tension of hearing her beloved familiar get hurt by an invisible assailant in the past, triggering an inevitable showdown.","s":"S007"},{"a":"Funniest Moment","w":"Christie","r":"Mary","d":"Lilith throwing a baby tantrum at the castle gates.","ct":"For reverting to a Victorian gothic child and screaming 'Mommy!' in the dirt while Billabong awkwardly consoled her with a battle axe.","s":"S007"},{"a":"Most Damage / Best Attack","w":"Lucy","r":"Gradles","d":"Causing immense psychological damage to the past party.","ct":"Though no actual combat damage was dealt, flying out of the castle as a giant condor caused maximum chaos and confusion among the guards and past selves.","s":"S007"},{"a":"Best Roleplay / In-Character","w":"Christie","r":"HT","d":"Lilith interrogating the 'fake' Orla.","ct":"For the past version of Lilith immediately suspecting foul play upon seeing an extra Orla and relentlessly demanding answers.","s":"S007"},{"a":"Heart of the Party / Support","w":"HT","r":"Mary","d":"Going back in time solely to save Spark.","ct":"For orchestrating an incredibly dangerous temporal heist just to ensure her fairy dragon familiar wouldn't die in the beholder cave.","s":"S007"},{"a":"Most Chaotic Action","w":"Lucy","r":"Christie","d":"Fleeing the castle as a massive condor.","ct":"For abandoning stealth entirely, wild-shaping into a giant bird, and soaring out of the castle under a hail of guard arrows.","s":"S007"},{"a":"Clutch Player","w":"Meijinx","r":"Gradles","d":"Diffusing the pursuit of the condor.","ct":"For stepping in from invisibility to casually erase the threat of past-Billabong chasing down Orla.","s":"S007"},{"a":"Most Creative","w":"Gradles","r":"Lucy","d":"Using Minor Illusion to make the sound of a crinkling snack bag.","ct":"For perfectly exploiting Spark's fatal flaw—a love of salty snacks—to bait him away from past-Ash's vigilant eyes.","s":"S007"},{"a":"Most Creative","w":"Mary","r":"Meijinx","d":"Acting as a caregiver to a tantrum-throwing gothic baby.","ct":"For selling the illusion of a distressed parent to the concerned guards, complete with comforting battle-axe pats.","s":"S007"},{"a":"Most Valuable Player","w":"HT","r":"Gradles","d":"Instantly shutting down Corras's attempted stealth play with a Banishment to the Feywild while navigating complex time-travel stakes.","ct":"A decisive response to the mysterious Mage Hand.","s":"S008"},{"a":"Best One-Liner / Quote","w":"Christie","r":"Mary","d":"Committing entirely to the bit of being Billabong's mother during the distraction outside.","ct":"\"I speak perfect orcish. I am fluent.\"","s":"S008"},{"a":"Best Tactical Play","w":"Meijinx","r":"HT","d":"Deploying crowd control to push Billabong safely back inside during the chaos.","ct":"Using a well-timed illusion/mind control.","s":"S008"},{"a":"Most Dramatic Moment","w":"Gradles","r":"Lucy","d":"Getting banished to the Feywild and risking an encounter with the hag he previously stole from.","ct":"Rolling a Nat 1 on stealth with his hood up.","s":"S008"},{"a":"Funniest Moment","w":"Mary","r":"Christie","d":"Throwing a tantrum outside to distract the concerned parents while Lilith pretended to be her mom.","ct":"Fending off concerned parents who are trying to comfort a tantrum-throwing child.","s":"S008"},{"a":"Most Damage / Best Attack","w":"Lucy","r":"Meijinx","d":"Causing widespread destruction while fleeing as a giant condor.","ct":"Orla flying out as a giant condor.","s":"S008"},{"a":"Best Roleplay / In-Character","w":"Gradles","r":"HT","d":"Attempting an absurd plan to clone Spark by plucking an eyelash mid-flight.","ct":"Just plucking the eyelash off of a flying mini dragon to create a clone.","s":"S008"},{"a":"Heart of the Party / Support","w":"HT","r":"Lucy","d":"Trying to keep the team together and alive while facing down their past selves.","ct":"Consistently maintaining the boundaries to protect the group.","s":"S008"},{"a":"Most Chaotic Action","w":"Mary","r":"Gradles","d":"Walking past her own past self while entirely confusing the timeline.","ct":"\"You're walking in past you.\"","s":"S008"},{"a":"Clutch Player","w":"Meijinx","r":"Christie","d":"Using illusions to stop Billabong from chasing Orla the Condor.","ct":"Using prestidigitation and minor illusions successfully to halt the chase.","s":"S008"},{"a":"Most Creative","w":"HT","r":"Lucy","d":"Deploying Banishment to swiftly eliminate a rogue element from the battlefield.","ct":"Casting Banish on Corras to the Feywild.","s":"S008"},{"a":"Most Creative","w":"Christie","r":"Meijinx","d":"Convincing random locals that she was the mother of a fully-grown child to create a diversion.","ct":"Pretending to be Billabong's mother and committing fully.","s":"S008"},{"a":"The Master of Coin","w":"Gradles","r":"DM","d":"","ct":"","s":"S009"},{"a":"Worst Luck","w":"Mary","r":"HT","d":"","ct":"","s":"S009"},{"a":"The Master Chef","w":"HT","r":"Lucy","d":"","ct":"","s":"S009"},{"a":"The Unintentional Assailant","w":"Mary","r":"Amon","d":"","ct":"","s":"S009"},{"a":"The Beast Whisperer","w":"Lucy","r":"Amon","d":"","ct":"","s":"S009"},{"a":"The Accidental Criminal","w":"HT","r":"Gradles","d":"","ct":"","s":"S009"},{"a":"The Banned Brawler","w":"Mary","r":"Meijinx","d":"","ct":"","s":"S009"},{"a":"The Divine Favorite","w":"Christie","r":"Christie","d":"","ct":"","s":"S009"},{"a":"The Loot Goblin","w":"Gradles","r":"HT","d":"","ct":"","s":"S009"},{"a":"The Social Butterfly","w":"Meijinx","r":"Christie","d":"","ct":"","s":"S009"},{"a":"The Discerning Eye","w":"HT","r":"DM","d":"","ct":"","s":"S009"},{"a":"The Patient Arbiter","w":"DM","r":"Meijinx","d":"","ct":"","s":"S009"},{"a":"Most Valuable Player","w":"Lucy","r":"HT","d":"Orla successfully polymorphed the eternal flame priest into a rat after summoning pixies.","ct":"Orla: 'I'll do... They can cast Polymorph on the fire guy.'","s":"S010"},{"a":"Best One-Liner / Quote","w":"Drenek","r":"Christie","d":"Drenek intimidating the Orogs by telling them to go find a job and start a family.","ct":"Drenek: 'I was just gonna go tell him to go away and find a job start a family live a better life'","s":"S010"},{"a":"Best Tactical Play","w":"HT","r":"Lucy","d":"Ash casting upcast Invisibility on the party right as Sarlumon and Lilith failed their stealth checks.","ct":"Ash: 'I'm going to upcast invisibility at third level... no, fourth level to cover three people.'","s":"S010"},{"a":"Most Dramatic Moment","w":"Christie","r":"Gradles","d":"Lilith and Sarlumon rolling natural 1s on stealth and tumbling down the hill into the camp.","ct":"DM: 'They're both rolling down the hill and yelling. You alerted the entire camp.'","s":"S010"},{"a":"Funniest Moment","w":"Gradles","r":"Drenek","d":"Sarlumon rolling a natural 1 on a javelin throw and skewering Orla's freshly summoned pixies.","ct":"DM: 'Your first nat 1 actually is going to skewer two of the pixies who are flying side by side.'","s":"S010"},{"a":"Most Damage / Best Attack","w":"Christie","r":"HT","d":"Lilith casting Toll the Dead on the priest.","ct":"Lilith: 'I guess I'll do Toll the Dead then.'","s":"S010"},{"a":"Best Roleplay / In-Character","w":"Lucy","r":"Gradles","d":"Orla refusing to hurt the earth elements and opting to summon woodland beings instead.","ct":"Orla: 'I don't really want to do stuff that would destroy the earth around the cave.'","s":"S010"},{"a":"Heart of the Party / Support","w":"HT","r":"Christie","d":"Ash providing air support and reconnaissance while trying to save spell slots for the big fight.","ct":"Ash: 'I'm also worried about how much we're going to face inside, so I'm trying to conserve spell slots.'","s":"S010"},{"a":"Most Chaotic Action","w":"Gradles","r":"Drenek","d":"Sarlumon throwing a javelin wildly and accidentally killing friendly pixies before eventually killing the rat-priest.","ct":"Sarlumon: 'Yikes that's like my third nat 1 this session.'","s":"S010"},{"a":"Clutch Player","w":"HT","r":"Lucy","d":"Ash scouting the area perfectly with her familiar Spark and helping the party assess the dangerous explosive barrels.","ct":"DM: 'You can tell that these are very volatile...'","s":"S010"},{"a":"Most Creative","w":"Lucy","r":"Gradles","d":"Orla using Conjure Woodland Beings to summon 8 pixies to cast Polymorph.","ct":"Orla: 'I'll conjure Woodland creatures... I want to conjure pixies.'","s":"S010"},{"a":"Most Creative","w":"Drenek","r":"HT","d":"Drenek successfully intimidating the surrendered Orogs to extract information about the Balor summoning.","ct":"Drenek: 'What's going on here and what's inside this cave?'","s":"S010"},{"a":"Most Valuable Player","w":"Lucy","r":"HT","d":"Scouting ahead as an eagle, spotting the hidden illusion, and using Mold Earth to save the horses.","ct":"A natural 20 perception check changes everything.","s":"S011"},{"a":"Best One-Liner / Quote","w":"HT","r":"Gradles","d":"Trying to initiate diplomacy with a towering Earth Elemental.","ct":"\"My arm would like to have a word with you, sir. Rocks.\"","s":"S011"},{"a":"Best Tactical Play","w":"Gradles","r":"Drenek","d":"Making the split-second decision to sprint the horses across the bridge corner before it was destroyed.","ct":"\"Let's get the horses across!\"","s":"S011"},{"a":"Most Dramatic Moment","w":"Drenek","r":"HT","d":"Sarlumon, charmed by Argentus, throws Ash directly into a pit.","ct":"A shocking betrayal orchestrated by a sentient magic item.","s":"S011"},{"a":"Funniest Moment","w":"Christie","r":"HT","d":"Lilith doing yoga poses (Child's Pose, Happy Baby) to appear non-threatening to the Earth Elemental.","ct":"\"I want to look not scary. I want to look deferential.\"","s":"S011"},{"a":"Most Damage / Best Attack","w":"Drenek","r":"HT","d":"Sarlumon tossing Ash into the pit, dealing physical and emotional damage.","ct":"Sometimes the party is its own worst enemy.","s":"S011"},{"a":"Best Roleplay / In-Character","w":"Christie","r":"Lucy","d":"Lilith sincerely explaining the totally legitimate 'elderly grief counseling' business she runs with Ash.","ct":"\"We help elderly people work through their grief. It's extremely wholesome.\"","s":"S011"},{"a":"Heart of the Party / Support","w":"Gradles","r":"Christie","d":"Refusing to leave Gus, Jeremy, and Jeremy the horses behind to die.","ct":"A true hero cares for the mounts.","s":"S011"},{"a":"Most Chaotic Action","w":"Lucy","r":"Drenek","d":"Casually revealing she poisoned her rival druid mentees with diarrhea and truth serums to win an apprenticeship.","ct":"\"I got maybe a little bit intimidated by all the other druids and so I poisoned them a little bit...\"","s":"S011"},{"a":"Clutch Player","w":"Lucy","r":"HT","d":"Using Mold Earth at the very last second to create a passable path for the horses.","ct":"A 5-foot cube of dirt made all the difference.","s":"S011"},{"a":"Most Creative","w":"Lucy","r":"Christie","d":"Wildshaping into an eagle to scout the gorge and discovering the bridge's true nature.","ct":"Taking to the skies to keep the party grounded.","s":"S011"},{"a":"Most Creative","w":"HT","r":"Lucy","d":"Relinquishing control of her voice to Argentus so he could speak Terran to the Earth Elemental.","ct":"Letting the sentient magic arm do the talking.","s":"S011"},{"a":"Most Valuable Player","w":"HT","r":"Lucy","d":"Ash fundamentally shifted the campaign by intentionally triggering a nuclear-level explosion (1,657 damage) on Grimslick's cart, necessitating a mid-air Time Stop escape and an accidental Teleport into the Dungeons of Berdusk.","ct":"For solving a goblin merchant dispute with a localized nuclear blast.","s":"S012"},{"a":"Best One-Liner / Quote","w":"Meijinx","r":"Gradles","d":"In response to Ash's panicked Sending spell from Berdusk jail, Ave delivered an incredibly unhelpful but hilarious 25-word reply.","ct":"\"Easier said than done. However, we shall try our best. Don't drop the soap. Stay away from strangers. We'll worry about Corras later.\"","s":"S012"},{"a":"Best Tactical Play","w":"Lucy","r":"Gradles","d":"Realizing the party was about to be vaporized, Orla used a Time Stop potion and cast Conjure Animals to summon Giant Eagles, creating an instantaneous extraction plan.","ct":"For pulling off a flawless air rescue while stuck in frozen time as a cat.","s":"S012"},{"a":"Most Dramatic Moment","w":"Lucy","r":"HT","d":"The agonizing realization that Ash's explosion would deal 1,425+ damage to everyone, leading Orla to scramble desperately to save Billabong and Mrs. Nibbles.","ct":"For staring down a 1,600-damage fireball and refusing to leave the squirrel behind.","s":"S012"},{"a":"Funniest Moment","w":"Christie","r":"Gradles","d":"Gaslighting the DM into believing the party had spent countless heartfelt hours teaching Fleshy the Nothic how to read, insisting he was their best friend.","ct":"For retroactively declaring a horrifying dungeon monster as the party's beloved literate companion.","s":"S012"},{"a":"Most Damage / Best Attack","w":"HT","r":"Meijinx","d":"Ash's attack triggered Grimslick's magical cart's self-destruct mechanism, resulting in a staggering 1,657 points of explosive force.","ct":"For dealing enough damage to instantly atomize anything within a 300-foot radius.","s":"S012"},{"a":"Best Roleplay / In-Character","w":"Christie","r":"Meijinx","d":"While Ave tried to handle two stoner merchants, Lilith explicitly chose to sit by a dead body and employ the 'I'm just a baby' defense to avoid socializing.","ct":"For actively ignoring NPCs by using your newfound eternal childhood as an excuse.","s":"S012"},{"a":"Heart of the Party / Support","w":"Gradles","r":"Lucy","d":"Corras reconnected with Fleshy in the dungeon, catching up on old times and deciding to take the cursed Red Wizard on a 'field trip' out of the basement.","ct":"For showing genuine compassion to a mutated monster cellmate.","s":"S012"},{"a":"Most Chaotic Action","w":"HT","r":"Christie","d":"To 'save' Eoman from the blast, Ash trapped him in an Otiluke's Resilient Sphere, effectively turning him into a pinball that bounced violently for miles.","ct":"For creating the world's most dangerous hamster ball ride.","s":"S012"},{"a":"Clutch Player","w":"Lucy","r":"HT","d":"While carrying Ash in a Giant Eagle's talons, Orla perfectly timed pouring a second Time Stop potion down Ash's throat to give her the actions needed to Teleport.","ct":"For the perfectly executed mid-air potion handoff.","s":"S012"},{"a":"Most Creative","w":"HT","r":"Lucy","d":"Ash cast Teleport to escape the explosion, aiming for Havenbrook but rolling a 1 on the d4 continent check, sending the party directly into the Dungeons of Berdusk.","ct":"For surviving a nuke only to teleport directly into a high-security prison.","s":"S012"},{"a":"Most Creative","w":"Meijinx","r":"Gradles","d":"To get rid of Greenleaf and Cloudwalker (the treant and gnome weed merchants), Ave convinced them to sell their stash at the 'sick forge'—which the party had previously destroyed.","ct":"For outsourcing your loitering problem to an exploded crater.","s":"S012"},{"a":"Most Valuable Player","w":"Lucy","r":"HT","d":"Attempting to distract the guards with sheer charm and an absurd excuse.","ct":"\"My friend is trying to go to the bathroom... what are you, some kind of pervert?\"","s":"S013"},{"a":"Best One-Liner / Quote","w":"Gradles","r":"Lucy","d":"Establishing a ridiculous safe word while trying to remove a loose stone.","ct":"\"I don't know why this is the only thing that's coming to mind right now, but it's banana pancakes.\"","s":"S013"},{"a":"Best Tactical Play","w":"HT","r":"Gradles","d":"Realizing they need to wait out the magic suppression and focus on investigating their cells instead of trying to cast spells immediately.","ct":"\"I'm going to check real quick... short rest resource. Once per short or long rest. That's dope.\"","s":"S013"},{"a":"Most Dramatic Moment","w":"Lucy","r":"Gradles","d":"The realization that they have been captured by the Lords' Alliance and placed in a high-security antimagic prison after their catastrophic explosion.","ct":"\"Where's Mrs. Nibbles? What happened to her? ... I sent her away in an act of bravery and heroism.\"","s":"S013"},{"a":"Funniest Moment","w":"Gradles","r":"Lucy","d":"Attempting to disguise pulling out a loose stone from the prison wall by dragging a chamber pot to the corner and acting like they had a 'nervous bladder'.","ct":"\"You're making me nervous. I'm going to fall into... I just fell out of the toilet. I'm a nervous bladder.\"","s":"S013"},{"a":"Most Damage / Best Attack","w":"HT","r":"Gradles","d":"The recap of the previous session where Ash cast a shatter spell on a wagon filled with explosives, nearly turning the party into fine mist.","ct":"\"Ash with the continuing fondness for explosive resolutions cast a shatter spell on a wagon filled with more boom than a goblin's dream.\"","s":"S013"},{"a":"Best Roleplay / In-Character","w":"Lucy","r":"HT","d":"Immediately wanting to pet the demonic Hellhounds that the guards are walking, despite them being snarling beasts.","ct":"\"She's like, I can fix them... I know I'm just immediately like don't pet them, they look like they were not raised right.\"","s":"S013"},{"a":"Heart of the Party / Support","w":"Gradles","r":"Lucy","d":"Stepping in to play an absent player's character (Billabong) without hesitation to keep the story moving.","ct":"\"I'll still do it anyway, but I had to restart my Foundry so it'll be a second.\"","s":"S013"},{"a":"Most Chaotic Action","w":"HT","r":"Gradles","d":"Setting off the entire chain of events that landed them in a high-security prison in Berdusk.","ct":"\"A collective moment of realizing that maybe, just maybe, they should have thought this through.\"","s":"S013"},{"a":"Clutch Player","w":"Gradles","r":"HT","d":"Rolling back-to-back natural 20s on a survival/history check to instantly recall everything about the Quaggoth in the cell next door.","ct":"\"Jeez, two freaking nat 20s... I've basically just copied and pasted the monster manual for each of you.\"","s":"S013"},{"a":"Most Creative","w":"Lucy","r":"Gradles","d":"Discovering that Wild Shape recharges on a short rest and successfully taking a short rest in the prison.","ct":"\"I apparently get my wild shapes back after a short rest and my spirit totem too. I didn't know that. That's awesome.\"","s":"S013"},{"a":"Most Creative","w":"Gradles","r":"Gradles","d":"Attempting to cover the noise of prying a loose stone from the dungeon wall by using the chamber pot as an active distraction.","ct":"\"I think I'm not going to try to be quiet. I think I'm going to try to... knock the chamber pot over and make noise that way.\"","s":"S013"},{"a":"The 'Hamster Ball' Award for Best Battlefield Control","w":"HT","r":"Mary","d":"Ash managed to trap an enraged Darindale in a Resilient Sphere, effectively turning him into a giant angry hamster.","ct":"","s":"S014"},{"a":"The 'Accidental Base Jumper' Award","w":"Gradles","r":"Lucy","d":"Corras successfully managed to dive off a cliff to avoid a rolling sphere, despite the fact that Billabong had already stopped it.","ct":"","s":"S014"},{"a":"The 'Worst Disguise' Award","w":"Christie","r":"Gradles","d":"For deciding the best infiltration disguise was a three-foot-tall hunched old woman dragging her regular-sized muddy dress on the ground.","ct":"","s":"S014"},{"a":"The 'Pacifist of the Year' Award","w":"Meijinx","r":"Christie","d":"For attempting to resolve the Darindale situation peacefully with Calm Emotions before everything descended into complete chaos.","ct":"","s":"S014"},{"a":"The 'Unintentional Provocateur' Award","w":"Mary","r":"Lucy","d":"For attempting to provide sensory relief to Darindale by throwing a bedroll over his head, completely forgetting his paralyzing fear of the dark.","ct":"","s":"S014"},{"a":"The 'MVP: Most Valuable Potato' Award","w":"Gradles","r":"Meijinx","d":"For boldly declaring 'I'm a potato' when discussing disguise options for the upcoming heist.","ct":"","s":"S014"},{"a":"The 'Quickest Thinker' Award","w":"HT","r":"Meijinx","d":"For immediately preparing contingency spells and planning multiple layers of magical surveillance to coordinate the Spark swap.","ct":"","s":"S014"},{"a":"The 'Best Animal Handling' Award","w":"Lucy","r":"Mary","d":"For trying to use Druidcraft to blow on an enraged Quaggoth prince's face to calm him down like an upset baby.","ct":"","s":"S014"},{"a":"The 'Master of Disguise' Award","w":"Meijinx","r":"HT","d":"For picking the most practical and inconspicuous disguise: an older white human male.","ct":"","s":"S014"},{"a":"The 'Strongest Lifter' Award","w":"Mary","r":"Gradles","d":"For catching a massive Quaggoth inside a magical hamster ball mid-roll and hoisting him over her head.","ct":"","s":"S014"},{"a":"The 'Most Comedic Timing' Award","w":"Christie","r":"HT","d":"For proudly declaring 'I have mending!' to justify why her shrunken disguise's dress was systematically being ripped and mended to fit.","ct":"","s":"S014"},{"a":"The 'Spectacular Failure' Award","w":"Gradles","r":"Christie","d":"For rolling a natural 1 on the cliff-diving save, officially committing to a tactical retreat right off the edge.","ct":"","s":"S014"},{"a":"The 'Double Critical Failure' Award","w":"Gradles","r":"HT","d":"For managing to roll abysmally on Stealth and Arcana during the most critical moment of the Spark swap, instantly summoning the Temporal Sentinel.","ct":"","s":"S015"},{"a":"The 'Multiversal Negotiator' Award","w":"Meijinx","r":"Christie","d":"For successfully persuading a cosmic time cop to not instantly delete the universe, heavily assisted by a deeply uncomfortable Guidance backrub.","ct":"","s":"S015"},{"a":"The 'Master of Disguise and Manual Labor' Award","w":"Gradles","r":"Meijinx","d":"For fully committing to the bit by moving boxes up and down the castle stairs for nearly two hours just to maintain an alibi.","ct":"","s":"S015"},{"a":"The 'Inconvenient Deity' Award","w":"Christie","r":"Lucy","d":"For rolling a brutal Divine Intervention attempt that forced Kelemvor to provide cryptic advice instead of just fixing the apocalypse.","ct":"","s":"S015"},{"a":"The 'Most Suspicious Distraction' Award","w":"Mary","r":"HT","d":"For serving as the primary distraction and proposing to fix a tear in the spacetime continuum by throwing ball bearings into it.","ct":"","s":"S015"},{"a":"The 'Avian Transport Service' Award","w":"Lucy","r":"Mary","d":"For immediately offering to turn into a giant eagle and ferry the party to the apocalypse site without a second thought.","ct":"","s":"S015"},{"a":"The 'Reckless Time Traveler' Award","w":"HT","r":"Gradles","d":"For refusing to accept the consequences of the timeline and organizing an incredibly convoluted heist just to get a familiar back.","ct":"","s":"S015"},{"a":"The 'Uncomfortable Buff' Award","w":"Christie","r":"Meijinx","d":"For providing 'Guidance' in the form of an incredibly awkward shoulder massage during a universe-ending standoff.","ct":"","s":"S015"},{"a":"The 'Simulacrum Wrangler' Award","w":"Meijinx","r":"HT","d":"For having to program a fake Spark to strictly obey the first Eladrin with a metal arm it sees.","ct":"","s":"S015"},{"a":"The 'Best Use of Silence' Award","w":"Mary","r":"Lucy","d":"For waiting out the chaos and patiently pacing around the basement while the rest of the party botched their stealth ops.","ct":"","s":"S015"},{"a":"The 'Void Mending' Award","w":"Lucy","r":"Christie","d":"For genuinely believing that casting the 'Mending' cantrip a few times could patch up a multiversal timeline rift.","ct":"","s":"S015"},{"a":"The 'Apocalypse Splitting' Award","w":"HT","r":"Mary","d":"For logically deducing that the party should split up during an apocalyptic timeline collapse, sending the heavy hitters to the rift.","ct":"","s":"S015"},{"a":"Most Valuable Player","w":"Gradles","r":"Mary","d":"Corras saved the entire timeline from destruction by clutching the Fates Card to undo the event that spawned the celestial slime. Billabong was the runner-up for tanking huge hits and dealing consistent damage even after his weapon broke.","ct":"","s":"S016"},{"a":"The Big Oof Award","w":"Mary","r":"HT","d":"Billabong tried to chop a massive solid boulder with a greataxe and rolled a critical failure, snapping the axe head off. Ash is the runner-up for completely failing her deception as a celestial being.","ct":"","s":"S016"},{"a":"The Lore Breaker Award","w":"HT","r":"Christie","d":"Ash used a Minor Illusion to create celestial wings and signs to trick guards into letting her pass, despite having no divine connection. Lilith randomly popped prayer beads trying to find out what they do mid-combat.","ct":"","s":"S016"},{"a":"The Beastmaster Award","w":"Lucy","r":"HT","d":"Orla commanded her summoned eagles to attack the fiery Balor and distract the vampire. Ash is the runner-up for dedicating the timeline reset to ensuring Spark the familiar survived.","ct":"","s":"S016"},{"a":"The Punching Bag Award","w":"Meijinx","r":"Christie","d":"Ave got singled out by the dragon, suffering a devastating winged attack and a massive bite. Lilith is the runner-up for being repeatedly targeted while trying to figure out her spells.","ct":"","s":"S016"},{"a":"The MacGyver Award","w":"Lucy","r":"Mary","d":"Orla used Stone Shape to turn the shards of the boulder Billabong broke ing acid without breaking a sweat.","s":"S030"},{"a":"Boldest / Most Fearless","w":"Mary","r":"HT","d":"Billabong attempted to dominate and intimidate an impossibly ancient Ceaseless Maw right to its face. Ash flew directly into the danger zone of the acid fissure to seal it shut mid-combat.","ct":"Billabong attempted to dominate and intimidate an impossibly ancient Ceaseless Maw right to its face. Ash flew directly into the danger zone of the acid fissure to seal it shut mid-combat.","s":"S030"},{"a":"Clutch Player","w":"Tenderbittle","r":"DM","d":"SavannahBelle managed to survive being completely crushed and grappled by a 15-foot tendril. The DM gets runner-up for using the Ceaseless Maw's legendary resistance to instantly shrug off a perfectly executed spell combo.","ct":"SavannahBelle managed to survive being completely crushed and grappled by a 15-foot tendril. The DM gets runner-up for using the Ceaseless Maw's legendary resistance to instantly shrug off a perfectly executed spell combo.","s":"S030"},{"a":"Best Roleplay / In-Character","w":"DM","r":"Gradles","d":"The DM delivered a chilling introduction to the Ceaseless Maw, an entity that destroys fertility and life. Corras provided excellent roleplay by nervously inspecting the ancient Shadowfell statues and keeping the party grounded.","ct":"The DM delivered a chilling introduction to the Ceaseless Maw, an entity that destroys fertility and life. Corras provided excellent roleplay by nervously inspecting the ancient Shadowfell statues and keeping the party grounded.","s":"S030"},{"a":"Most Chaotic Action","w":"Tenderbittle","r":"Mary","d":"SavannahBelle brought out a little panther steed just to send it to poke at ancient magical statues to see if they were trapped. Billabong was close behind, suggesting they just 'go find some bunnies' to drain for Shadow Essence.","ct":"SavannahBelle brought out a little panther steed just to send it to poke at ancient magical statues to see if they were trapped. Billabon tration.","s":"S032"},{"a":"Most Creative","w":"HT","r":"Tenderbittle","d":"Using Disguise Self to become a wheezing old man.","ct":"An ingenious way to get past the warehouse guards.","s":"S032"},{"a":"The 'Smash or Pass' Directive Award","w":"Christie","r":"Gradles","d":"For taking complex combat scenarios and reducing them to a simple binary choice of 'smash or pass' upon the King's orders, leading to immediate decapitation of a wizard.","ct":"","s":"S033"},{"a":"The Diplomatic Bee Award","w":"HT","r":"Christie","d":"For convincing the party they skipped the 'befriend' step and trying to achieve benevolence with a lich using extremely persuasive logic.","ct":"","s":"S033"},{"a":"The 'Oops, I'm Dominated' Award","w":"Mary","r":"HT","d":"For becoming instantly mind-controlled by the enemy, only to later enter a raging frenzy and smash a zombie to pieces with a thrown hammer.","ct":"","s":"S033"},{"a":"The Technical Difficulties Survivor","w":"DM","r":"HT","d":"For successfully navigating endless Foundry update crashes and D&D Beyond compact sheet failures without calling the session off entirely.","ct":"","s":"S033"},{"a":"The 'When in Doubt, Fireball' Award","w":"HT","r":"Mary","d":"For deciding the best way to resolve the conflict and free a stuck party member was to hurl a level 4 fireball and set the entire warehouse on fire.","ct":"","s":"S033"},{"a":"The King of Unfulfilled Promises","w":"Gradles","r":"Lucy","d":"For promising peace, succeeding on a deception check with a 25, and then immediately readying an action to stab the lich anyway.","ct":"","s":"S033"},{"a":"The Best Use of a Loophole","w":"DM","r":"Gradles","d":"For strictly enforcing that a readied action triggers *after* the lich actually attempts to put on the manacles, causing an intense rules standoff.","ct":"","s":"S033"},{"a":"The Banished Spectator Award","w":"Lucy","r":"Mary","d":"For spending half the combat banished to another plane, happily listening to the chaos like a true true-crime po tle","d":"Instantly defused half of a massive riot by whipping out the Rod of Rulership and charming the mob.","ct":"For asserting royal dominance over a 9,000-person mob.","s":"S045"},{"a":"Best One-Liner / Quote","w":"Christie","r":"Gradles","d":"Dahlia's incredibly blunt 'eulogy' at Lord Neverember's funeral.","ct":"\"My mother told me if I don't have anything nice to say, not to say anything at all.\"","s":"S045"},{"a":"Best Tactical Play","w":"HT","r":"Lucy","d":"Realizing the Butcher was immune to almost everything and using Eyebite's sleep effect to bypass his immunities.","ct":"For finding the one loophole in a boss's massive condition immunity sheet.","s":"S045"},{"a":"Most Dramatic Moment","w":"Tenderbittle","r":"Christie","d":"Lord Isteval failing to gently dispel SavannahBelle's Reverse Gravity, sending hundreds of peasants plummeting 100 feet to their deaths in a shower of gore.","ct":"For creating the aerial trap that led to the session's most horrific and accidental bloodbath.","s":"S045"},{"a":"Funniest Moment","w":"Tenderbittle","r":"HT","d":"Trying to sneakily steal her own ring back off Neverember's coffin during a solemn funeral, only to fumble it directly into the mud in front of everyone.","ct":"For immediately undermining a beautiful, unifying gesture with pure greed.","s":"S045"},{"a":"Most Damage / Best Attack","w":"Tenderbittle","r":"Christie","d":"The dispelling of Reverse Gravity causing 10d6 fall damage to hundreds of NPCs at once.","ct":"For inadvertently achieving the highest body count of the campaign with a single spell interaction.","s":"S045"},{"a":"Best Roleplay / In-Character","w":"Gradles","r":"Christie","d":"Interrupting a funeral procession and telling the mourners that he prefers to 'grieve in a more private manner' to excuse himself from caring.","ct":"For maintaining maximum arrogance even while crashing a funeral.","s":"S045"},{"a":"Heart of the Party / Support","w":"Lucy","r":"HT","d":"Using Druidcraft to make seeds bloom into a beautiful array of flowers over Neverember's coffin.","ct":"For providing the only genuinely respectful and touching moment of the entire funeral.","s":"S045"},{"a":"Most Chaotic Action","w":"Tenderbittle","r":"HT","d":"Casting Reverse Gravity into the middle of a dense crowd of innocent peasants and heavily armed paladins.","ct":"For treating gravity as a mere suggestion during a civil war.","s":"S045"},{"a":"Clutch Player","w":"Tenderbittle","r":"Lucy","d":"Delivering a masterful impromptu eulogy and passing the final Persuasion check to prevent the funeral crowd from turning on the party.","ct":"For saving the BWB's reputation with incredible spin-doctoring.","s":"S045"},{"a":"Most Creative","w":"Gradles","r":"HT","d":"Activating the Rod of Rulership to instantly recruit a massive chunk of the opposing army.","ct":"For using an item exactly as intended with devastating effectiveness.","s":"S045"},{"a":"Most Creative","w":"Tenderbittle","r":"Lucy","d":"Covering up her botched Sleight of Hand check by claiming she was retrieving the ring to keep it safe for a worthy successor.","ct":"For passing off a failed robbery as a noble, legally-binding act of stewardship.","s":"S045"},{"a":"Most Valuable Player","w":"HT","r":"Gradles","d":"Securing the Matron's deal using Augury","ct":"For using divination magic to cut through the party's endless debate and decisively confirming that handing over the castle was their only viable option.","s":"S046"},{"a":"Best One-Liner / Quote","w":"Tenderbittle","r":"Lucy","d":"Discussing how to obtain the Gloaming Queen's hair","ct":"'Put it in your pillow.' - SavannahBelle, casually suggesting how to steal hair from an omnipotent Archfey.","s":"S046"},{"a":"Best Tactical Play","w":"HT","r":"Tenderbittle","d":"Casting Augury to check the deal","ct":"For recognizing that trusting the Matron was a terrifying prospect and smartly consulting the cosmos for a 'weal or woe' before Corras surrendered his kingdom.","s":"S046"},{"a":"Most Dramatic Moment","w":"Gradles","r":"HT","d":"Handing over the Ring of Neverember","ct":"The tense moment Corras had to publicly surrender his absolute authority to the Matron, essentially handing his 'baby' over to a power-hungry magic user.","s":"S046"},{"a":"Funniest Moment","w":"Lucy","r":"Gradles","d":"The Sourdough Bread tangent","ct":"For derailing the apocalypse with a delightful, extensive out-of-character tangent about sourdough discard recipes and kolaches while the world burned.","s":"S046"},{"a":"Most Damage / Best Attack","w":"Christie","r":"Mary","d":"Clearing the path earlier in the session","ct":"For bringing the heavy melee pain when the party needed to smash through obstacles, proving that even on a light day, the paladin swings hard.","s":"S046"},{"a":"Best Roleplay / In-Character","w":"Gradles","r":"Lucy","d":"Deep paranoia over the Matron","ct":"For Corras's absolute inability to trust the Matron, repeatedly pointing out that they were leaving the castle to a woman whose explicitly stated goal is ultimate power.","s":"S046"},{"a":"Heart of the Party / Support","w":"Tenderbittle","r":"HT","d":"Keeping morale up","ct":"For being the chillest person in the room during a high-stakes negotiation, suggesting they just give up the castle and go take a bubble bath.","s":"S046"},{"a":"Most Chaotic Action","w":"Mary","r":"Christie","d":"Leaving the sewage problem for the Matron","ct":"For the collective chaotic shrug at the Otiug sewage flood backing up in the lower halls, deciding it was officially the new Steward's problem.","s":"S046"},{"a":"Clutch Player","w":"HT","r":"Mary","d":"Managing the Zibblebottom chaos","ct":"For smoothly taking the jar of 'rolling black suds' from the manic gnome inventor just to get out of the room, handling the pure chaos with wizardly grace.","s":"S046"},{"a":"Most Creative","w":"HT","r":"Gradles","d":"Augury and Portent discussions","ct":"For utilizing Augury perfectly to break the group's analysis paralysis regarding the Matron's terms.","s":"S046"},{"a":"Most Creative","w":"Lucy","r":"Tenderbittle","d":"Dealing with the Dome","ct":"For working through Zibblebottom's insane 28.2% success rate metrics on his Mark 47b dome siphon and somehow making sense of it.","s":"S046"}];

var PLAYER_COLORS = {
  Gradles:"#4A90D9",HT:"#E57373",Mary:"#81C784",
  Christie:"#BA68C8",Lucy:"#FFB74D",Tenderbittle:"#4DB6AC",
  Meijinx:"#FF8A65",Drenek:"#7986CB",DM:"#9898b0"
};
var ALL_PLAYERS = ["Gradles","HT","Mary","Christie","Lucy","Tenderbittle","Meijinx","Drenek"];
var SESSIONS = [];
for (var i=1;i<=46;i++) SESSIONS.push("S"+String(i).padStart(3,"0"));

// Count wins per award category
var awardCounts = {};
AWARDS_DATA.forEach(function(a) {
  if (!awardCounts[a.a]) awardCounts[a.a] = 0;
  awardCounts[a.a]++;
});

// Top award types (>=5 occurrences)
var topAwards = Object.entries(awardCounts)
  .filter(function(e) { return e[1] >= 5 && e[0]; })
  .sort(function(a,b) { return b[1]-a[1]; })
  .map(function(e) { return e[0]; });

// Wins per player
var playerWins = {};
ALL_PLAYERS.forEach(function(p) { playerWins[p] = 0; });
playerWins["DM"] = 0;
AWARDS_DATA.forEach(function(a) {
  if (playerWins[a.w] !== undefined) playerWins[a.w]++;
});

// Most decorated
var mostDecorated = Object.entries(playerWins)
  .filter(function(e) { return e[0] !== "DM"; })
  .sort(function(a,b) { return b[1]-a[1]; })[0];

// Most dominated award (single player most wins)
var mostWonAward = "", mostWonPlayer = "", mostWonCount = 0;
topAwards.forEach(function(award) {
  var wc = {};
  AWARDS_DATA.filter(function(a) { return a.a === award; }).forEach(function(a) {
    if (!wc[a.w]) wc[a.w] = 0;
    wc[a.w]++;
  });
  var top = Object.entries(wc).sort(function(a,b) { return b[1]-a[1]; })[0];
  if (top && top[1] > mostWonCount) {
    mostWonCount = top[1];
    mostWonAward = award;
    mostWonPlayer = top[0];
  }
});

// Most competitive award
var mostCompAward = "", mostCompWinners = 0;
topAwards.forEach(function(award) {
  var winners = new Set(AWARDS_DATA.filter(function(a) { return a.a === award; }).map(function(a) { return a.w; }));
  if (winners.size > mostCompWinners) {
    mostCompWinners = winners.size;
    mostCompAward = award;
  }
});

// Stats bar
var statsBar = document.getElementById("stats-bar");
var statsData = [
  {val: AWARDS_DATA.length, label: "Total Awards Given", color: "#fbbf24"},
  {val: topAwards.length, label: "Award Categories", color: "#a78bfa"},
  {val: mostDecorated[0], label: "Most Decorated (" + mostDecorated[1] + " wins)", color: PLAYER_COLORS[mostDecorated[0]] || "#fbbf24"},
  {val: mostCompAward.length > 22 ? mostCompAward.substring(0,20) + "…" : mostCompAward, label: "Most Contested (" + mostCompWinners + " diff. winners)", color: "#34d399"},
];
statsData.forEach(function(s) {
  var div = document.createElement("div");
  div.className = "stat-item";
  div.innerHTML = '<div class="stat-value" style="color:'+s.color+'">'+s.val+'</div><div class="stat-label">'+s.label+'</div>';
  statsBar.appendChild(div);
});

// Badge
var badgeBlock = document.getElementById("badge-block");
badgeBlock.innerHTML = '<div class="badge-title">MOST DECORATED PLAYER</div>' +
  '<div class="badge-name" style="color:'+(PLAYER_COLORS[mostDecorated[0]]||'#fbbf24')+'">'+mostDecorated[0]+'</div>' +
  '<div class="badge-stat">'+mostDecorated[1]+' total wins across '+topAwards.length+' categories</div>';

// Legend with player filter
var activeFilter = null;
var legendEl = document.getElementById("legend");
ALL_PLAYERS.concat(["DM"]).forEach(function(player) {
  var item = document.createElement("div");
  item.className = "legend-item";
  item.dataset.player = player;
  item.innerHTML = '<div class="legend-dot" style="background:'+PLAYER_COLORS[player]+';color:'+PLAYER_COLORS[player]+'"></div>' +
    '<span class="legend-name">'+player+'</span>' +
    '<span class="legend-count">'+(playerWins[player]||0)+'</span>';
  item.addEventListener("click", function() {
    if (activeFilter === player) {
      activeFilter = null;
      document.querySelectorAll(".legend-item").forEach(function(el) { el.classList.remove("active","dimmed"); });
      document.querySelectorAll(".award-dot").forEach(function(el) { el.classList.remove("dimmed"); });
    } else {
      activeFilter = player;
      document.querySelectorAll(".legend-item").forEach(function(el) {
        el.classList.remove("active","dimmed");
        if (el.dataset.player !== player) el.classList.add("dimmed");
        else el.classList.add("active");
      });
      document.querySelectorAll(".award-dot").forEach(function(el) {
        if (el.dataset.player !== player) el.classList.add("dimmed");
        else el.classList.remove("dimmed");
      });
    }
  });
  legendEl.appendChild(item);
});

// Grid lookup: award -> session -> data
var gridLookup = {};
topAwards.forEach(function(award) { gridLookup[award] = {}; });
AWARDS_DATA.forEach(function(a) {
  if (gridLookup[a.a]) gridLookup[a.a][a.s] = a;
});

// Build table
var table = document.getElementById("grid-table");
var tooltipEl = document.getElementById("tooltip");

var thead = '<thead><tr><th class="corner" style="min-width:220px;text-align:left;padding-left:12px">AWARD</th>';
SESSIONS.forEach(function(sid) {
  var num = parseInt(sid.replace("S",""));
  thead += '<th class="session-col">'+num+'</th>';
});
thead += '<th class="total-col">TOTAL</th></tr></thead>';

var tbody = '<tbody>';
topAwards.forEach(function(award) {
  tbody += '<tr><td class="award-label">'+award+'</td>';
  var rowTotal = 0;
  SESSIONS.forEach(function(sid) {
    var entry = gridLookup[award] ? gridLookup[award][sid] : null;
    if (entry && entry.w) {
      rowTotal++;
      var color = PLAYER_COLORS[entry.w] || "#9898b0";
      tbody += '<td class="cell"><div class="award-dot" data-player="'+entry.w+'" data-award="'+award.replace(/"/g,'&quot;')+'" data-sid="'+sid+'" style="background:'+color+';box-shadow:0 0 6px '+color+'"></div></td>';
    } else {
      tbody += '<td class="cell"></td>';
    }
  });
  tbody += '<td class="total-cell">'+rowTotal+'</td></tr>';
});
tbody += '</tbody>';

var tfoot = '<tfoot><tr><td class="footer-label">AWARDS PER SESSION</td>';
SESSIONS.forEach(function(sid) {
  var count = AWARDS_DATA.filter(function(a) { return a.s === sid && topAwards.indexOf(a.a) >= 0; }).length;
  tfoot += '<td style="font-family:JetBrains Mono;font-size:12px;color:'+(count > 0 ? '#555570' : '#2a2a40')+'">'+( count || "" )+'</td>';
});
var totalAll = AWARDS_DATA.filter(function(a) { return topAwards.indexOf(a.a) >= 0; }).length;
tfoot += '<td class="total-cell" style="font-weight:bold;color:#fbbf24">'+totalAll+'</td></tr></tfoot>';

table.innerHTML = thead + tbody + tfoot;

// Dot hover tooltips
document.querySelectorAll(".award-dot").forEach(function(dot) {
  dot.addEventListener("mouseenter", function(e) {
    var award = this.dataset.award;
    var sid = this.dataset.sid;
    var player = this.dataset.player;
    var entry = gridLookup[award] ? gridLookup[award][sid] : null;
    if (!entry) return;
    var color = PLAYER_COLORS[player] || "#9898b0";
    tooltipEl.classList.add("visible");
    var html = '<div class="tooltip-title">'+award+'</div>';
    html += '<div class="tooltip-winner" style="color:'+color+'">'+player+'</div>';
    if (entry.d) html += '<div class="tooltip-desc">'+entry.d+'</div>';
    if (entry.ct && entry.ct !== entry.d) html += '<div class="tooltip-desc" style="margin-top:4px;font-style:italic;color:#777790">"'+entry.ct+'"</div>';
    html += '<div class="tooltip-session">'+sid;
    if (entry.r) html += ' | Runner-up: '+entry.r;
    html += '</div>';
    tooltipEl.innerHTML = html;
  });
  dot.addEventListener("mousemove", function(e) {
    var x = Math.min(e.clientX + 16, window.innerWidth - 380);
    tooltipEl.style.left = x + "px";
    tooltipEl.style.top = (e.clientY - 20) + "px";
  });
  dot.addEventListener("mouseleave", function() {
    tooltipEl.classList.remove("visible");
  });
});
</script>
</body>
</html>
