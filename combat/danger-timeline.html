  body::after {

    text-align: center;
  }

    font-family: 'JetBrains Mono', monospace;

    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7a7a90;
    margin-top: 2px;
  }

    margin: 24px auto;
    padding: 0 24px;
    position: relative;
  }

    font-size: 14px;

  }

    stroke: #1a1a2e;

  }

    border-radius: 8px;

    z-index: 100;
    min-width: 280px;
    max-width: 380px;

  .tooltip .tt-session {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: #ff6b6b;
    margin-bottom: 8px;

    font-size: 14px;
    color: #c0c0d8;
    margin: 3px 0;
    padding-left: 8px;

    border-radius: 8px;

    margin-bottom: 12px;
    display: flex;

    color: #7a7a90;
    padding: 4px 8px;
    border-radius: 4px;

    font-weight: 600;

  <div class="stat-item"><div class="stat-value">${nearLethalCount}</div><div class="stat-label">Near-Lethal Sessions</div></div>
  <div class="stat-item"><div class="stat-value green">${totalEncounters}</div><div class="stat-label">Total Encounters</div></div>
  <div class="stat-item"><div class="stat-value amber">${combatSessions.length}</div><div class="stat-label">Combat Sessions</div></div>
`;

// ============================================================================
// Chart dimensions
// ============================================================================
const container = document.getElementById('chartContainer');
const margin = { top: 40, right: 30, bottom: 60, left: 60 };
const width = Math.min(container.clientWidth - 48, 1400) - margin.left - margin.right;
const height = 420 - margin.top - margin.bottom;

const svg = d3.select('#chart')
  .attr('width', width + margin.left + margin.right)
  .attr('height', height + margin.top + margin.bottom)
  .append('g')
  .attr('transform', `translate(${margin.left},${margin.top})`);

// ============================================================================
// Scales
// ============================================================================
const x = d3.scaleLinear()
  .domain([1, 46])
  .range([0, width]);

const y = d3.scaleLinear()
  .domain([0, 100])
  .range([height, 0]);

// ============================================================================
// Gradient definitions
// ============================================================================
const defs = svg.append('defs');

// Area fill gradient (vertical)
const areaGrad = defs.append('linearGradient')
  .attr('id', 'areaGrad')
  .attr('x1', '0').attr('y1', '1')
  .attr('x2', '0').attr('y2', '0');

areaGrad.append('stop').attr('offset', '0%').attr('stop-color', '#81c784').attr('stop-opacity', 0.02);
areaGrad.append('stop').attr('offset', '20%').attr('stop-color', '#81c784').attr('stop-opacity', 0.15);
areaGrad.append('stop').attr('offset', '40%').attr('stop-color', '#ffb74d').attr('stop-opacity', 0.25);
areaGrad.append('stop').attr('offset', '60%').attr('stop-color', '#ff6b6b').attr('stop-opacity', 0.35);
areaGrad.append('stop').attr('offset', '80%').attr('stop-color', '#ff4444').attr('stop-opacity', 0.45);
areaGrad.append('stop').attr('offset', '100%').attr('stop-color', '#ff2222').attr('stop-opacity', 0.55);

// Line gradient (horizontal, based on TPK value)
const lineGrad = defs.append('linearGradient')
  .attr('id', 'lineGrad')
  .attr('gradientUnits', 'userSpaceOnUse')
  .attr('x1', x(1)).attr('y1', 0)
  .attr('x2', x(46)).attr('y2', 0);

sessionData.forEach((d, i) => {
  const pct = (i / (sessionData.length - 1)) * 100;
  let color;
  if (d.tpk >= 90) color = '#ff2222';
  else if (d.tpk >= 60) color = '#ff6b6b';
  else if (d.tpk >= 20) color = '#ffb74d';
  else color = '#81c784';
  lineGrad.append('stop').attr('offset', `${pct}%`).attr('stop-color', color);
});

// Glow filter
const glow = defs.append('filter').attr('id', 'glow');
glow.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'coloredBlur');
const feMerge = glow.append('feMerge');
feMerge.append('feMergeNode').attr('in', 'coloredBlur');
feMerge.append('feMergeNode').attr('in', 'SourceGraphic');

// Dot glow filter
const dotGlow = defs.append('filter').attr('id', 'dotGlow');
dotGlow.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'coloredBlur');
const feMerge2 = dotGlow.append('feMerge');
feMerge2.append('feMergeNode').attr('in', 'coloredBlur');
feMerge2.append('feMergeNode').attr('in', 'SourceGraphic');

// ============================================================================
// Grid & Axes
// ============================================================================
// Horizontal grid
svg.append('g')
  .attr('class', 'grid')
  .call(d3.axisLeft(y)
    .tickValues([0, 20, 40, 60, 80, 100])
    .tickSize(-width)
    .tickFormat('')
  );

// Danger zone band (60-100%)
svg.append('rect')
  .attr('x', 0)
  .attr('y', y(100))
  .attr('width', width)
  .attr('height', y(60) - y(100))
  .attr('fill', 'rgba(255, 68, 68, 0.06)')
  .attr('stroke', 'rgba(255, 68, 68, 0.15)')
  .attr('stroke-dasharray', '4,4');

// Danger zone label
svg.append('text')
  .attr('x', width - 8)
  .attr('y', y(95))
  .attr('text-anchor', 'end')
  .attr('class', 'classification-label')
  .attr('fill', 'rgba(255, 68, 68, 0.4)')
  .text('DANGER ZONE');

// X Axis
const xAxis = svg.append('g')
  .attr('class', 'axis')
  .attr('transform', `translate(0,${height})`)
  .call(d3.axisBottom(x)
    .tickValues(d3.range(1, 47))
    .tickFormat(d => `S${String(d).padStart(3, '0')}`)
  );

xAxis.selectAll('text')
  .attr('transform', 'rotate(-45)')
  .attr('text-anchor', 'end')
  .attr('dx', '-4px')
  .attr('dy', '4px')
  .style('font-size', '12px');

// Y Axis
svg.append('g')
  .attr('class', 'axis')
  .call(d3.axisLeft(y)
    .tickValues([0, 20, 40, 60, 80, 100])
    .tickFormat(d => `${d}%`)
  );

// Y Axis label
svg.append('text')
  .attr('transform', 'rotate(-90)')
  .attr('x', -height / 2)
  .attr('y', -45)
  .attr('text-anchor', 'middle')
  .attr('fill', '#7a7a90')
  .style('font-family', 'Barlow Condensed')
  .style('font-size', '14px')
  .style('letter-spacing', '2px')
  .text('TPK PROXIMITY');

// ============================================================================
// Area chart
// ============================================================================
const area = d3.area()
  .x(d => x(d.num))
  .y0(height)
  .y1(d => y(d.tpk))
  .curve(d3.curveMonotoneX);

const line = d3.line()
  .x(d => x(d.num))
  .y(d => y(d.tpk))
  .curve(d3.curveMonotoneX);

// Area fill
svg.append('path')
  .datum(sessionData)
  .attr('d', area)
  .attr('fill', 'url(#areaGrad)');

// Line
svg.append('path')
  .datum(sessionData)
  .attr('d', line)
  .attr('fill', 'none')
  .attr('stroke', 'url(#lineGrad)')
  .attr('stroke-width', 2.5)
  .attr('filter', 'url(#glow)');

// ============================================================================
// Classification labels above peaks
// ============================================================================
const peakSessions = sessionData.filter(d => d.tpk >= 30);
peakSessions.forEach(d => {
  const label = d.classification.toUpperCase();
  if (label === 'NONE' || label === 'CAKEWALK') return;
  svg.append('text')
    .attr('x', x(d.num))
    .attr('y', y(d.tpk) - 18)
    .attr('text-anchor', 'middle')
    .attr('class', 'classification-label')
    .attr('fill', d.tpk >= 60 ? 'rgba(255, 107, 107, 0.7)' : 'rgba(255, 183, 77, 0.7)')
    .style('font-size', '12px')
    .text(label);
});

// ============================================================================
// Session dots
// ============================================================================
function getColor(tpk) {
  if (tpk >= 90) return '#ff2222';
  if (tpk >= 60) return '#ff6b6b';
  if (tpk >= 20) return '#ffb74d';
  if (tpk > 0) return '#81c784';
  return '#3a3a5a';
}

svg.selectAll('.session-dot')
  .data(sessionData)
  .join('circle')
  .attr('class', 'session-dot')
  .attr('cx', d => x(d.num))
  .attr('cy', d => y(d.tpk))
  .attr('r', d => {
    if (d.encounters.length === 0) return 3;
    return 4 + d.encounters.length * 1.5;
  })
  .attr('fill', d => getColor(d.tpk))
  .attr('stroke', d => d.tpk > 0 ? getColor(d.tpk) : 'none')
  .attr('stroke-width', 1)
  .attr('stroke-opacity', 0.5)
  .attr('fill-opacity', d => d.tpk > 0 ? 0.85 : 0.3)
  .attr('filter', d => d.tpk >= 60 ? 'url(#dotGlow)' : null)
  .style('cursor', d => d.encounters.length > 0 ? 'pointer' : 'default');

// ============================================================================
// Encounter sub-dots (individual encounters within a session)
// ============================================================================
const encounterDots = [];
sessionData.forEach(d => {
  if (d.encounters.length > 1) {
    d.encounters.forEach((enc, i) => {
      encounterDots.push({
        ...enc,
        session: d,
        sessionNum: d.num,
        offset: (i - (d.encounters.length - 1) / 2) * 6
      });
    });
  }
});

// ============================================================================
// Tooltip
// ============================================================================
const tooltip = document.getElementById('tooltip');
const encounterPanel = document.getElementById('encounterPanel');

svg.selectAll('.session-dot')
  .on('mouseenter', function(event, d) {
    const [mx, my] = d3.pointer(event, container);

    let html = `<div class="tt-session">${d.sid}</div>`;
    html += `<div class="tt-row"><span class="tt-label">TPK Proximity</span><span class="tt-value" style="color:${getColor(d.tpk)}">${d.tpk}%</span></div>`;
    html += `<div class="tt-row"><span class="tt-label">Classification</span><span class="tt-value" style="color:${getColor(d.tpk)}">${d.classification}</span></div>`;
    html += `<div class="tt-row"><span class="tt-label">Encounters</span><span class="tt-value" style="color:#e0e0e8">${d.encounters.length || 'None'}</span></div>`;

    if (d.ohShit.length > 0) {
      html += `<div class="tt-divider"></div>`;
      html += `<div class="tt-enc-header">Closest Calls</div>`;
      d.ohShit.slice(0, 2).forEach(m => {
        const text = typeof m === 'string' ? m : m.description;
        html += `<div class="tt-moment">${text}</div>`;
      });
    }

    if (d.encounters.length > 0) {
      html += `<div class="tt-divider"></div>`;
      html += `<div class="tt-enc-header">Encounters</div>`;
      d.encounters.forEach(enc => {
        const encColor = getColor(enc.tpk);
        html += `<div class="tt-enc-item" style="color:${encColor}">${enc.id}: TPK ${enc.tpk}% &bull; ${enc.downed} downed &bull; ${enc.enemies} enemies</div>`;
      });
      html += `<div style="margin-top:6px; font-family:'Barlow Condensed'; font-size:13px; letter-spacing:1px; text-transform:uppercase; color:#7a7a90; text-align:center">Click for encounter details</div>`;
    }

    tooltip.innerHTML = html;
    tooltip.classList.add('visible');

    // Position tooltip
    let left = mx + margin.left + 20;
    let top = my + margin.top - 20;
    if (left + 350 > container.clientWidth) left = mx + margin.left - 300;
    if (top + 300 > container.clientHeight) top = my + margin.top - 200;
    if (top < 0) top = 10;

    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';

    d3.select(this)
      .transition().duration(150)
      .attr('r', d => {
        const base = d.encounters.length === 0 ? 3 : 4 + d.encounters.length * 1.5;
        return base + 3;
      })
      .attr('fill-opacity', 1);
  })
  .on('mouseleave', function(event, d) {
    tooltip.classList.remove('visible');
    d3.select(this)
      .transition().duration(150)
      .attr('r', d => d.encounters.length === 0 ? 3 : 4 + d.encounters.length * 1.5)
      .attr('fill-opacity', d.tpk > 0 ? 0.85 : 0.3);
  })
  .on('click', function(event, d) {
    if (d.encounters.length === 0) return;
    event.stopPropagation();

    const [mx, my] = d3.pointer(event, container);

    let html = `<div class="ep-header"><span>${d.sid} ENCOUNTERS</span><span class="ep-close" onclick="document.getElementById('encounterPanel').classList.remove('visible')">&times;</span></div>`;

    d.encounters.forEach((enc, i) => {
      const encColor = getColor(enc.tpk);
      html += `<div class="ep-encounter">`;
      html += `<div class="ep-enc-title"><span>Encounter ${i + 1}</span><span class="ep-enc-tpk" style="color:${encColor}">TPK ${enc.tpk}%</span></div>`;
      if (enc.difficulty) html += `<div class="ep-enc-detail"><strong>Assessment:</strong> ${enc.difficulty}</div>`;
      if (enc.turning) html += `<div class="ep-enc-detail"><strong>Turning Point:</strong> ${enc.turning}</div>`;
      html += `<div class="ep-enc-detail"><strong>Downed:</strong> ${enc.downed} &bull; <strong>Enemies Defeated:</strong> ${enc.enemies}</div>`;
      html += `</div>`;
    });

    if (d.ohShit.length > 0) {
      html += `<div style="margin-top:8px; font-family:'Barlow Condensed'; font-size:14px; letter-spacing:1.5px; text-transform:uppercase; color:#9898b0; margin-bottom:4px">OH SH*T MOMENTS</div>`;
      d.ohShit.forEach(m => {
        const text = typeof m === 'string' ? m : m.description;
        html += `<div style="font-family:'Barlow'; font-size:14px; color:#b0b0c8; line-height:1.4; margin:4px 0; padding-left:10px; border-left:2px solid #ff444480">${text}</div>`;
      });
    }

    encounterPanel.innerHTML = html;
    encounterPanel.classList.add('visible');

    let left = mx + margin.left + 20;
    let top = my + margin.top - 40;
    if (left + 420 > container.clientWidth) left = mx + margin.left - 430;
    if (top < 0) top = 10;

    encounterPanel.style.left = left + 'px';
    encounterPanel.style.top = top + 'px';
  });

// Close encounter panel on background click
document.addEventListener('click', () => {
  encounterPanel.classList.remove('visible');
});

// ============================================================================
// Animated entrance
// ============================================================================
svg.selectAll('.session-dot')
  .attr('opacity', 0)
  .transition()
  .duration(600)
  .delay((d, i) => i * 40)
  .attr('opacity', 1);

// Animate area and line
const pathLength = svg.select('path[fill="none"]').node().getTotalLength();
svg.select('path[fill="none"]')
  .attr('stroke-dasharray', pathLength)
  .attr('stroke-dashoffset', pathLength)
  .transition()
  .duration(2000)
  .ease(d3.easeCubicOut)
  .attr('stroke-dashoffset', 0);

svg.select('path[fill="url(#areaGrad)"]')
  .attr('opacity', 0)
  .transition()
  .duration(1500)
  .delay(500)
  .attr('opacity', 1);
</script>
</body>
</html>
