<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE WAR TABLE — BWB Campaign</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #06060c;
    color: #c8c8e0;
    font-family: 'Barlow', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  /* ---------- HEADER ---------- */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px;
    background: linear-gradient(180deg, rgba(6,6,12,0.95) 0%, rgba(6,6,12,0.7) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(200,160,60,0.15);
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #c8a03c 0%, #ff4444 30%, #c8a03c 60%, #ff6633 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(200,160,60,0.4));
    line-height: 1;
  }

  .header-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 3px;
    color: rgba(200,200,224,0.5);
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .arc-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 3px;
    border: 1px solid;
    transition: all 0.6s ease;
  }

  .session-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #c8a03c;
    letter-spacing: 1px;
  }

  /* ---------- MAP CONTAINER ---------- */
  .map-container {
    position: fixed;
    top: 70px;
    left: 0;
    right: 340px;
    bottom: 110px;
    overflow: hidden;
    border: 1px solid rgba(200,160,60,0.1);
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.5),
      0 0 30px rgba(200,160,60,0.05),
      0 0 60px rgba(200,160,60,0.02);
  }

  .map-container::before {
    content: '';
    position: absolute;
    inset: 0;
    border: 1px solid rgba(200,160,60,0.08);
    pointer-events: none;
    z-index: 5;
    box-shadow: inset 0 0 80px rgba(200,160,60,0.03);
  }

  /* The SVG fills this container */
  .map-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Dark overlay on image */
  .map-overlay {
    fill: rgba(0,0,0,0.15);
    pointer-events: none;
  }

  /* ---------- DIMENSIONAL OVERLAYS ---------- */
  .dimension-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .dimension-overlay.active { opacity: 1; }

  .dimension-barovia {
    background:
      radial-gradient(ellipse at 50% 100%, rgba(80,0,0,0.4) 0%, transparent 70%),
      linear-gradient(180deg, rgba(40,0,0,0.15) 0%, rgba(80,0,0,0.25) 100%);
  }

  .dimension-underdark {
    background:
      radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,20,0.6) 100%),
      linear-gradient(180deg, rgba(0,10,30,0.3) 0%, rgba(0,5,20,0.4) 100%);
  }

  .dimension-feywild {
    background:
      radial-gradient(ellipse at 50% 50%, rgba(80,200,80,0.08) 0%, transparent 70%),
      linear-gradient(180deg, rgba(50,120,50,0.1) 0%, rgba(100,180,50,0.15) 100%);
  }

  .dimension-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif;
    font-size: 72px;
    font-weight: 700;
    letter-spacing: 20px;
    opacity: 0;
    transition: opacity 1.2s ease;
    pointer-events: none;
    z-index: 6;
    text-transform: uppercase;
  }

  .dimension-label.active { opacity: 1; }

  .dimension-label.barovia {
    color: rgba(180,30,30,0.25);
    text-shadow: 0 0 40px rgba(180,30,30,0.3), 0 0 80px rgba(100,0,0,0.2);
  }

  .dimension-label.underdark {
    color: rgba(60,100,180,0.2);
    text-shadow: 0 0 40px rgba(60,100,180,0.25), 0 0 80px rgba(30,50,100,0.15);
  }

  .dimension-label.feywild {
    color: rgba(100,200,60,0.2);
    text-shadow: 0 0 40px rgba(100,200,60,0.3), 0 0 80px rgba(60,150,30,0.2);
  }

  /* Fog particles (Barovia) */
  .fog-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .fog-layer.active { opacity: 1; }

  /* Particle canvas for Feywild */
  #particle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  #particle-canvas.active { opacity: 1; }

  /* ---------- CSS FILTERS ON MAP ---------- */
  .map-image-group {
    transition: filter 1s ease;
  }

  .map-image-group.barovia {
    filter: saturate(0.3) brightness(0.6) sepia(0.4) hue-rotate(-10deg);
  }

  .map-image-group.underdark {
    filter: saturate(0.2) brightness(0.35) hue-rotate(200deg);
  }

  .map-image-group.feywild {
    filter: saturate(1.8) brightness(1.15) hue-rotate(30deg);
  }

  /* ---------- SIDE PANEL ---------- */
  .side-panel {
    position: fixed;
    top: 70px;
    right: 0;
    width: 340px;
    bottom: 110px;
    background: linear-gradient(180deg, rgba(12,12,24,0.98) 0%, rgba(8,8,16,0.98) 100%);
    backdrop-filter: blur(12px);
    border-left: 1px solid rgba(200,160,60,0.1);
    overflow-y: auto;
    padding: 20px;
    z-index: 50;
  }

  .side-panel::-webkit-scrollbar { width: 4px; }
  .side-panel::-webkit-scrollbar-track { background: transparent; }
  .side-panel::-webkit-scrollbar-thumb { background: rgba(200,160,60,0.2); border-radius: 2px; }

  .panel-section {
    margin-bottom: 24px;
  }

  .panel-section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    color: rgba(200,160,60,0.7);
    border-bottom: 1px solid rgba(200,160,60,0.1);
    padding-bottom: 6px;
    margin-bottom: 12px;
  }

  .panel-arc-name {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    transition: color 0.4s ease;
  }

  .panel-arc-desc {
    font-size: 15px;
    line-height: 1.5;
    color: rgba(200,200,224,0.6);
    margin-bottom: 8px;
  }

  .panel-session-range {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(200,200,224,0.4);
  }

  .event-card {
    background: linear-gradient(135deg, rgba(20,20,40,0.8) 0%, rgba(15,15,30,0.6) 100%);
    border: 1px solid rgba(200,160,60,0.08);
    border-radius: 4px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    border-left: 3px solid transparent;
  }

  .event-card:hover {
    border-color: rgba(200,160,60,0.2);
    background: linear-gradient(135deg, rgba(25,25,50,0.9) 0%, rgba(20,20,40,0.7) 100%);
    box-shadow: 0 0 12px rgba(200,160,60,0.06);
  }

  .event-card.active {
    border-left-color: #c8a03c;
    background: linear-gradient(135deg, rgba(30,25,15,0.5) 0%, rgba(20,20,40,0.7) 100%);
  }

  .event-card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #e0e0f0;
    margin-bottom: 4px;
  }

  .event-card-session {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(200,160,60,0.6);
    margin-bottom: 4px;
  }

  .event-card-desc {
    font-size: 14px;
    line-height: 1.4;
    color: rgba(200,200,224,0.5);
  }

  .event-card-significance {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 2px;
    margin-top: 6px;
  }

  .sig-major { background: rgba(200,160,60,0.15); color: #c8a03c; }
  .sig-moderate { background: rgba(100,160,200,0.1); color: rgba(100,160,200,0.8); }
  .sig-minor { background: rgba(100,100,120,0.1); color: rgba(100,100,120,0.8); }

  .entity-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 2px 6px;
    margin: 2px 3px 2px 0;
    border-radius: 2px;
    background: rgba(100,80,200,0.1);
    color: rgba(160,140,255,0.7);
    border: 1px solid rgba(100,80,200,0.15);
  }

  /* ---------- STATS BAR ---------- */
  .stats-bar {
    position: fixed;
    top: 70px;
    right: 340px;
    display: flex;
    gap: 0;
    z-index: 60;
  }

  .stat-cell {
    padding: 8px 16px;
    background: rgba(12,12,24,0.9);
    border-bottom: 1px solid rgba(200,160,60,0.08);
    border-left: 1px solid rgba(200,160,60,0.05);
    text-align: center;
  }

  .stat-cell:first-child { border-left: none; }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(200,200,224,0.35);
    margin-bottom: 2px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: #c8a03c;
    text-shadow: 0 0 8px rgba(200,160,60,0.3);
  }

  /* ---------- SCRUBBER ---------- */
  .scrubber-container {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 110px;
    background: linear-gradient(180deg, rgba(6,6,12,0.7) 0%, rgba(6,6,12,0.98) 100%);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(200,160,60,0.1);
    z-index: 100;
    display: flex;
    flex-direction: column;
    padding: 12px 28px 16px;
  }

  .scrubber-controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .play-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(200,160,60,0.3);
    background: rgba(200,160,60,0.08);
    color: #c8a03c;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .play-btn:hover {
    background: rgba(200,160,60,0.15);
    border-color: rgba(200,160,60,0.5);
    box-shadow: 0 0 12px rgba(200,160,60,0.2);
  }

  .speed-controls {
    display: flex;
    gap: 6px;
  }

  .speed-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 4px 8px;
    border-radius: 2px;
    border: 1px solid rgba(200,160,60,0.15);
    background: transparent;
    color: rgba(200,200,224,0.4);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .speed-btn:hover, .speed-btn.active {
    border-color: rgba(200,160,60,0.4);
    color: #c8a03c;
    background: rgba(200,160,60,0.08);
  }

  .scrubber-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 300;
    font-size: 15px;
    letter-spacing: 2px;
    color: rgba(200,200,224,0.4);
    text-transform: uppercase;
    flex: 1;
    text-align: center;
  }

  .session-title-display {
    font-family: 'Cinzel', serif;
    font-size: 15px;
    color: rgba(200,200,224,0.6);
    max-width: 350px;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .slider-container {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
  }

  .session-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(200,160,60,0.1);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .session-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #c8a03c 40%, rgba(200,160,60,0.3) 100%);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(200,160,60,0.5), 0 0 24px rgba(200,160,60,0.2);
    border: 2px solid rgba(200,160,60,0.6);
  }

  .session-slider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #c8a03c 40%, rgba(200,160,60,0.3) 100%);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(200,160,60,0.5);
    border: 2px solid rgba(200,160,60,0.6);
  }

  /* Session tick marks */
  .tick-marks {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    transform: translateY(-50%);
    height: 20px;
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    padding: 0 9px;
  }

  .tick {
    width: 1px;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .tick-line {
    width: 1px;
    height: 8px;
    background: rgba(200,160,60,0.15);
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
  }

  .tick:nth-child(5n+1) .tick-line {
    height: 12px;
    background: rgba(200,160,60,0.25);
  }

  .tick-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(200,200,224,0.25);
    position: absolute;
    bottom: -14px;
    white-space: nowrap;
  }

  /* Arc color segments on slider track */
  .arc-segments {
    position: absolute;
    top: 50%;
    left: 9px;
    right: 9px;
    height: 4px;
    transform: translateY(-50%);
    pointer-events: none;
    border-radius: 2px;
    overflow: hidden;
  }

  .arc-segment {
    position: absolute;
    height: 100%;
    opacity: 0.4;
  }

  /* ---------- TOOLTIP ---------- */
  .map-tooltip {
    position: absolute;
    pointer-events: none;
    z-index: 200;
    background: rgba(8,8,16,0.95);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(200,160,60,0.2);
    border-radius: 4px;
    padding: 10px 14px;
    max-width: 280px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .map-tooltip.visible { opacity: 1; }

  .tooltip-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #e0e0f0;
    margin-bottom: 4px;
  }

  .tooltip-session {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(200,160,60,0.7);
    margin-bottom: 6px;
  }

  .tooltip-desc {
    font-size: 14px;
    line-height: 1.4;
    color: rgba(200,200,224,0.6);
  }

  /* ---------- LOCATION LABELS ---------- */
  .location-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 400;
    font-size: 14px;
    fill: rgba(200,200,224,0.5);
    text-anchor: middle;
    pointer-events: none;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  .location-label.active {
    fill: rgba(200,200,224,0.85);
    font-weight: 600;
    font-size: 15px;
  }

  /* ---------- LEGEND ---------- */
  .legend {
    position: absolute;
    bottom: 8px;
    left: 16px;
    display: flex;
    gap: 16px;
    z-index: 10;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: rgba(200,200,224,0.4);
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Reset / Fit button */
  .fit-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid rgba(200,160,60,0.2);
    background: rgba(6,6,12,0.8);
    color: rgba(200,200,224,0.5);
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s ease;
  }
  .fit-btn:hover {
    border-color: rgba(200,160,60,0.4);
    color: #c8a03c;
  }

  /* Fog animation keyframes */
  @keyframes fogDrift {
    0% { transform: translateX(-5%) translateY(0); opacity: 0.3; }
    50% { transform: translateX(3%) translateY(-2%); opacity: 0.5; }
    100% { transform: translateX(-5%) translateY(0); opacity: 0.3; }
  }

  @keyframes fogDrift2 {
    0% { transform: translateX(3%) translateY(-1%); opacity: 0.2; }
    50% { transform: translateX(-4%) translateY(2%); opacity: 0.4; }
    100% { transform: translateX(3%) translateY(-1%); opacity: 0.2; }
  }

  .fog-band {
    position: absolute;
    width: 120%;
    height: 30%;
    left: -10%;
    background: linear-gradient(90deg, transparent 0%, rgba(60,10,10,0.15) 20%, rgba(80,15,15,0.2) 50%, rgba(60,10,10,0.15) 80%, transparent 100%);
    filter: blur(30px);
    pointer-events: none;
  }

  .fog-band:nth-child(1) {
    top: 20%;
    animation: fogDrift 12s ease-in-out infinite;
  }

  .fog-band:nth-child(2) {
    top: 55%;
    animation: fogDrift2 16s ease-in-out infinite;
  }

  .fog-band:nth-child(3) {
    top: 75%;
    animation: fogDrift 20s ease-in-out infinite reverse;
  }

  /* Feywild particles */
  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
    50% { opacity: 1; transform: translateY(-20px) scale(1); }
  }

  /* Party marker pulse */
  @keyframes partyPulse {
    0% { r: 4; opacity: 0.8; }
    50% { r: 12; opacity: 0; }
    100% { r: 4; opacity: 0; }
  }

  /* Event glow animation */
  @keyframes eventAppear {
    0% { r: 0; opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 1; }
  }

  /* No events placeholder */
  .no-events {
    text-align: center;
    padding: 20px;
    color: rgba(200,200,224,0.3);
    font-style: italic;
    font-size: 15px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">THE WAR TABLE</div>
    <div class="header-subtitle">BWB Campaign Command Overview</div>
  </div>
  <div class="header-right">
    <div class="arc-badge" id="arc-badge">ARC I</div>
    <div class="session-badge" id="session-badge">SESSION 01</div>
  </div>
</div>

<!-- Map Container -->
<div class="map-container" id="map-container">
  <svg class="map-svg" id="map-svg"></svg>

  <!-- Dimensional overlays -->
  <div class="dimension-overlay dimension-barovia" id="overlay-barovia"></div>
  <div class="dimension-overlay dimension-underdark" id="overlay-underdark"></div>
  <div class="dimension-overlay dimension-feywild" id="overlay-feywild"></div>

  <!-- Fog layer (Barovia) -->
  <div class="fog-layer" id="fog-layer">
    <div class="fog-band"></div>
    <div class="fog-band"></div>
    <div class="fog-band"></div>
  </div>

  <!-- Particle canvas (Feywild) -->
  <canvas id="particle-canvas"></canvas>

  <!-- Dimension labels -->
  <div class="dimension-label barovia" id="label-barovia">BAROVIA</div>
  <div class="dimension-label underdark" id="label-underdark">UNDERDARK</div>
  <div class="dimension-label feywild" id="label-feywild">FEYWILD</div>

  <!-- Tooltip -->
  <div class="map-tooltip" id="map-tooltip">
    <div class="tooltip-title" id="tooltip-title"></div>

function initMap() {
  const rect = container.getBoundingClientRect();
  const cw = rect.width, ch = rect.height;

  // Scale image to fit container
  const scale = Math.min(cw / imgW, ch / imgH);
  const scaledW = imgW * scale;
  const scaledH = imgH * scale;

  // Set up zoom
  zoomBehavior = d3.zoom()
    .scaleExtent([0.5, 6])
    .on('zoom', (event) => {
      mapGroup.attr('transform', event.transform);
    });

  svg.call(zoomBehavior);

  // Center the map
  const tx = (cw - scaledW) / 2;
  const ty = (ch - scaledH) / 2;
  const initialTransform = d3.zoomIdentity.translate(tx, ty).scale(scale);
  svg.call(zoomBehavior.transform, initialTransform);

  // Create groups
  mapGroup = svg.append('g').attr('class', 'map-group');
  imageGroup = mapGroup.append('g').attr('class', 'map-image-group');

  // Add the map image
  imageGroup.append('image')
    .attr('href', IMG_PATH)
    .attr('x', 0)
    .attr('y', 0)
    .attr('width', imgW)
    .attr('height', imgH)
    .attr('preserveAspectRatio', 'xMidYMid meet');

  // Dark overlay
  imageGroup.append('rect')
    .attr('class', 'map-overlay')
    .attr('x', 0)
    .attr('y', 0)
    .attr('width', imgW)
    .attr('height', imgH);

  // Trail group (below events)
  trailGroup = mapGroup.append('g').attr('class', 'trail-group');

  // Event group
  eventGroup = mapGroup.append('g').attr('class', 'event-group');

  // Party marker group
  partyGroup = mapGroup.append('g').attr('class', 'party-group');

  // Location labels
  labelGroup = mapGroup.append('g').attr('class', 'label-group');

  // Add location labels
  Object.entries(LOCATIONS).forEach(([name, pos]) => {
    // Skip duplicate-position labels
    if (name === 'Death House' || name === 'Village of Barovia' || name === 'Soulforge') return;

    labelGroup.append('text')
      .attr('class', 'location-label')
      .attr('x', pos.x / 100 * imgW)
      .attr('y', pos.y / 100 * imgH - 12)
      .text(name)
      .style('paint-order', 'stroke')
      .style('stroke', 'rgba(6,6,12,0.8)')
      .style('stroke-width', '3px')
      .style('font-size', `${Math.max(14, imgW * 0.007)}px`);
  });

  // Add location anchor dots
  Object.entries(LOCATIONS).forEach(([name, pos]) => {
    if (name === 'Death House' || name === 'Village of Barovia' || name === 'Soulforge') return;
    labelGroup.append('circle')
      .attr('cx', pos.x / 100 * imgW)
      .attr('cy', pos.y / 100 * imgH)
      .attr('r', 3)
      .attr('fill', 'rgba(200,200,224,0.15)')
      .attr('stroke', 'rgba(200,200,224,0.1)')
      .attr('stroke-width', 1);
  });

  // Fit button
  document.getElementById('fit-btn').addEventListener('click', () => {
    svg.transition().duration(600).call(zoomBehavior.transform, initialTransform);
  });

  // Build tick marks
  buildTickMarks();
  buildArcSegments();
  buildLegend();
  buildStatsBar();

  // Initial render
  updateSession(1);

  // Setup Feywild particle canvas
  setupParticleCanvas();
}

function locToPixel(locName) {
  const loc = resolveLocation(locName);
  if (!loc) return {x: LOCATIONS["Castle Corras"].x / 100 * imgW, y: LOCATIONS["Castle Corras"].y / 100 * imgH};
  return {x: loc.x / 100 * imgW, y: loc.y / 100 * imgH};
}

function resolveLocation(name) {
  if (!name) return LOCATIONS["Castle Corras"];
  // Direct match
  if (LOCATIONS[name]) return LOCATIONS[name];
  // Fuzzy match
  const lower = name.toLowerCase();
  for (const [key, val] of Object.entries(LOCATIONS)) {
    if (lower.includes(key.toLowerCase()) || key.toLowerCase().includes(lower)) return val;
  }
  // Partial word match
  const words = lower.split(/\s+/);
  for (const [key, val] of Object.entries(LOCATIONS)) {
    const kw = key.toLowerCase();
    if (words.some(w => w.length > 3 && kw.includes(w))) return val;
  }
  return LOCATIONS["Castle Corras"];
}

function updateSession(session) {
  currentSession = session;
  const arc = getArc(session);
  const dim = getDimension(session);
  const partyLoc = SESSION_LOCATIONS[session] || "Castle Corras";
  const partyPos = locToPixel(partyLoc);

  // Update header
  document.getElementById('session-badge').textContent = `SESSION ${String(session).padStart(2, '0')}`;
  const arcBadge = document.getElementById('arc-badge');
  arcBadge.textContent = arc.title.toUpperCase();
  arcBadge.style.color = arc.color;
  arcBadge.style.borderColor = arc.color;
  arcBadge.style.background = arc.color + '10';

  // Update slider
  document.getElementById('session-slider').value = session;

  // Update scrubber label
  const sessionEvents = EVENT_LEDGER.filter(e => parseInt(e.session_id.slice(1)) === session);
  if (sessionEvents.length > 0) {
    document.getElementById('session-title-display').textContent = sessionEvents[0].title;
  } else {
    document.getElementById('session-title-display').textContent = partyLoc;
  }

  // Dimensional transitions
  updateDimension(dim);

  // Update map filter class
  const imgGroup = document.querySelector('.map-image-group');
  imgGroup.classList.remove('barovia', 'underdark', 'feywild');
  if (dim !== 'normal') imgGroup.classList.add(dim);

  // Draw events up to current session
  drawEvents(session);

  // Draw campaign trail
  drawTrail(session);

  // Draw party marker
  drawPartyMarker(partyPos, arc.color);

  // Update side panel
  updateSidePanel(session, arc, partyLoc, sessionEvents);

  // Update stats
  updateStats(session);
}

function updateDimension(dim) {
  // Overlays
  document.getElementById('overlay-barovia').classList.toggle('active', dim === 'barovia');
  document.getElementById('overlay-underdark').classList.toggle('active', dim === 'underdark');
  document.getElementById('overlay-feywild').classList.toggle('active', dim === 'feywild');

  // Labels
  document.getElementById('label-barovia').classList.toggle('active', dim === 'barovia');
  document.getElementById('label-underdark').classList.toggle('active', dim === 'underdark');
  document.getElementById('label-feywild').classList.toggle('active', dim === 'feywild');

  // Fog (Barovia)
  document.getElementById('fog-layer').classList.toggle('active', dim === 'barovia');

  // Particles (Feywild)
  document.getElementById('particle-canvas').classList.toggle('active', dim === 'feywild');
}

function drawEvents(upToSession) {
  const visibleEvents = EVENT_LEDGER.filter(e => parseInt(e.session_id.slice(1)) <= upToSession);

  const events = eventGroup.selectAll('.event-marker')
    .data(visibleEvents, d => d.event_id);

  // Exit
  events.exit().transition().duration(300).attr('r', 0).remove();

  // Enter
  const enter = events.enter().append('g')
    .attr('class', 'event-marker')
    .attr('transform', d => {
      const pos = locToPixel(d.location);
      // Add small jitter for overlapping events
      const jitter = hashJitter(d.event_id);
      return `translate(${pos.x + jitter.x}, ${pos.y + jitter.y})`;
    });

  // Glow circle
  enter.append('circle')
    .attr('class', 'event-glow')
    .attr('r', 0)
    .attr('fill', 'none')
    .attr('stroke', d => getArc(parseInt(d.session_id.slice(1))).color)
    .attr('stroke-width', 1.5)
    .attr('opacity', 0.3)
    .transition().duration(800)
    .attr('r', d => getEventRadius(d.significance) * 2.5)
    .attr('opacity', 0);

  // Main dot
  enter.append('circle')
    .attr('class', 'event-dot')
    .attr('r', 0)
    .attr('fill', d => getArc(parseInt(d.session_id.slice(1))).color)
    .attr('stroke', d => getArc(parseInt(d.session_id.slice(1))).color)
    .attr('stroke-width', 1)
    .attr('fill-opacity', 0.7)
    .attr('stroke-opacity', 0.9)
    .style('filter', d => `drop-shadow(0 0 ${getEventRadius(d.significance)}px ${getArc(parseInt(d.session_id.slice(1))).color})`)
    .style('cursor', 'pointer')
    .transition().duration(600)
    .attr('r', d => getEventRadius(d.significance));

  // Hover and click
  enter.on('mouseenter', function(event, d) {
    showTooltip(event, d);
    d3.select(this).select('.event-dot')
      .transition().duration(200)
      .attr('r', d => getEventRadius(d.significance) * 1.5)
      .attr('fill-opacity', 1);
  })
  .on('mouseleave', function(event, d) {
    hideTooltip();
    d3.select(this).select('.event-dot')
      .transition().duration(200)
      .attr('r', d => getEventRadius(d.significance))
      .attr('fill-opacity', 0.7);
  })
  .on('click', function(event, d) {
    showEventDetail(d);
  });
}

function getEventRadius(significance) {
  const base = imgW * 0.004;
  switch(significance) {
    case 'major': return base * 2.2;
    case 'moderate': return base * 1.4;
    case 'minor': return base * 0.8;
    default: return base;
  }
}

function hashJitter(id) {
  let hash = 0;
  for (let i = 0; i < id.length; i++) {
    hash = ((hash << 5) - hash) + id.charCodeAt(i);
    hash |= 0;
  }
  const angle = (hash % 360) * Math.PI / 180;
  const dist = (Math.abs(hash % 30)) + 5;
  return {x: Math.cos(angle) * dist, y: Math.sin(angle) * dist};
}

function drawTrail(upToSession) {
  // Build path from session 1 to current
  const points = [];
  for (let s = 1; s <= upToSession; s++) {
    const loc = SESSION_LOCATIONS[s] || "Castle Corras";
    const pos = locToPixel(loc);
    points.push({session: s, ...pos, arc: getArc(s)});
  }

  // Remove old trails
  trailGroup.selectAll('*').remove();

  if (points.length < 2) return;

  // Draw trail segments colored by arc
  for (let i = 1; i < points.length; i++) {
    const prev = points[i-1];
    const curr = points[i];
    // Only draw if position changed
    if (Math.abs(prev.x - curr.x) > 1 || Math.abs(prev.y - curr.y) > 1) {
      // Glow line
      trailGroup.append('line')
        .attr('x1', prev.x).attr('y1', prev.y)
        .attr('x2', curr.x).attr('y2', curr.y)
        .attr('stroke', curr.arc.color)
        .attr('stroke-width', 4)
        .attr('stroke-opacity', 0.15)
        .attr('stroke-linecap', 'round')
        .style('filter', `blur(3px)`);

      // Main line
      trailGroup.append('line')
        .attr('x1', prev.x).attr('y1', prev.y)
        .attr('x2', curr.x).attr('y2', curr.y)
        .attr('stroke', curr.arc.color)
        .attr('stroke-width', 2)
        .attr('stroke-opacity', 0.5)
        .attr('stroke-linecap', 'round')
        .attr('stroke-dasharray', '6,4');
    }
  }

  // Draw waypoint dots
  const uniquePositions = [];
  const seen = new Set();
  for (const p of points) {
    const key = `${Math.round(p.x)},${Math.round(p.y)}`;
    if (!seen.has(key)) {
      seen.add(key);
      uniquePositions.push(p);
    }
  }

  uniquePositions.forEach(p => {
    trailGroup.append('circle')
      .attr('cx', p.x)
      .attr('cy', p.y)
      .attr('r', 4)
      .attr('fill', p.arc.color)
      .attr('fill-opacity', 0.3)
      .attr('stroke', p.arc.color)
      .attr('stroke-width', 1)
      .attr('stroke-opacity', 0.4);
  });
}

function drawPartyMarker(pos, color) {
  partyGroup.selectAll('*').remove();

  // Pulse rings
  for (let i = 0; i < 3; i++) {
    partyGroup.append('circle')
      .attr('cx', pos.x)
      .attr('cy', pos.y)
      .attr('r', 8)
      .attr('fill', 'none')
      .attr('stroke', color)
      .attr('stroke-width', 1.5)
      .attr('opacity', 0.6)
      .transition()
      .delay(i * 600)
      .duration(1800)
      .ease(d3.easeCircleOut)
      .attr('r', 40)
      .attr('opacity', 0)
      .on('end', function() { d3.select(this).remove(); });
  }

  // Diamond marker
  const size = 10;
  const diamond = `M ${pos.x} ${pos.y - size} L ${pos.x + size * 0.7} ${pos.y} L ${pos.x} ${pos.y + size} L ${pos.x - size * 0.7} ${pos.y} Z`;

  // Glow
  partyGroup.append('path')
    .attr('d', diamond)
    .attr('fill', color)
    .attr('fill-opacity', 0.3)
    .attr('stroke', 'none')
    .style('filter', `blur(6px) drop-shadow(0 0 12px ${color})`);

  // Main diamond
  partyGroup.append('path')
    .attr('d', diamond)
    .attr('fill', color)
    .attr('fill-opacity', 0.9)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.8)
    .style('filter', `drop-shadow(0 0 8px ${color})`);

  // Inner diamond
  const innerSize = 4;
  const innerDiamond = `M ${pos.x} ${pos.y - innerSize} L ${pos.x + innerSize * 0.7} ${pos.y} L ${pos.x} ${pos.y + innerSize} L ${pos.x - innerSize * 0.7} ${pos.y} Z`;
  partyGroup.append('path')
    .attr('d', innerDiamond)
    .attr('fill', '#fff')
    .attr('fill-opacity', 0.9)
    .attr('stroke', 'none');
}

function showTooltip(event, d) {
  const tt = document.getElementById('map-tooltip');
  document.getElementById('tooltip-title').textContent = d.title;
  document.getElementById('tooltip-session').textContent = d.session_id + ' — ' + d.significance.toUpperCase();
  document.getElementById('tooltip-desc').textContent = d.description;

  const rect = container.getBoundingClientRect();
  let x = event.clientX - rect.left + 16;
  let y = event.clientY - rect.top - 10;

  // Keep within bounds
  if (x + 280 > rect.width) x = event.clientX - rect.left - 296;
  if (y + 120 > rect.height) y = rect.height - 130;
  if (y < 0) y = 10;

  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
  tt.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('map-tooltip').classList.remove('visible');
}

function getDimensionDesc(dim) {

    case 'underdark': return 'Miles beneath the surface, the Underdark stretches endlessly. Drow, demons, and worse lurk in the eternal darkness.';

function updateStats(session) {
  // Count unique locations up to session
  const visited = new Set();
  const locationCounts = {};
  for (let s = 1; s <= session; s++) {
    const loc = SESSION_LOCATIONS[s] || "Castle Corras";
    visited.add(loc);
    locationCounts[loc] = (locationCounts[loc] || 0) + 1;
  }

  const events = EVENT_LEDGER.filter(e => parseInt(e.session_id.slice(1)) <= session);
  const majorEvents = events.filter(e => e.significance === 'major');

  document.getElementById('stat-locations').textContent = visited.size;
  document.getElementById('stat-events').textContent = events.length;
  document.getElementById('stat-major').textContent = majorEvents.length;

  // Most visited
  let maxLoc = '—', maxCount = 0;
  for (const [loc, count] of Object.entries(locationCounts)) {
    if (count > maxCount) { maxCount = count; maxLoc = loc; }
  }
  document.getElementById('stat-most-visited').textContent = maxLoc;

  const dim = getDimension(session);
  const dimNames = {normal: 'Material Plane', barovia: 'Barovia', underdark: 'Underdark', feywild: 'Feywild'};
  document.getElementById('stat-dimension').textContent = dimNames[dim];
}

function buildArcSegments() {

// ============================================================
// FEYWILD PARTICLE SYSTEM
// ============================================================

function setupParticleCanvas() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animFrame;

  function resize() {
    const rect = container.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
  }

  resize();
  window.addEventListener('resize', resize);

  class Particle {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 3 + 1;
      this.speedY = -(Math.random() * 0.5 + 0.1);
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.life = 0;
      this.maxLife = Math.random() * 200 + 100;
      this.hue = Math.random() * 60 + 80; // green to gold
    }
    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.life++;
      if (this.life > this.maxLife || this.y < -10) this.reset();
    }
    draw() {
      const alpha = Math.sin(this.life / this.maxLife * Math.PI) * 0.6;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha})`;
      ctx.fill();
      // Glow
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${alpha * 0.2})`;
      ctx.fill();
    }
  }

  // Create particles
  for (let i = 0; i < 80; i++) {
    const p = new Particle();
    p.life = Math.random() * p.maxLife; // stagger
    particles.push(p);
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.update();
      p.draw();
    });
    animFrame = requestAnimationFrame(animate);
  }

  animate();
}

// ============================================================
// KEYBOARD CONTROLS
// ============================================================

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
    e.preventDefault();
    if (currentSession < 46) updateSession(currentSession + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
    e.preventDefault();
    if (currentSession > 1) updateSession(currentSession - 1);
  } else if (e.key === ' ') {
    e.preventDefault();
    if (isPlaying) stopPlay(); else startPlay();
  } else if (e.key === 'Home') {
    e.preventDefault();
    updateSession(1);
  } else if (e.key === 'End') {
    e.preventDefault();
    updateSession(46);
  }
});

// ============================================================
// WINDOW RESIZE
// ============================================================

window.addEventListener('resize', () => {
  // Reposition stats bar
  // Canvas will auto-resize via its handler
});
</script>
