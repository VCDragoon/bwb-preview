<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BWB Campaign — Spotlight Balance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060c;
    color: #c8c8e0;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .page-header {
    text-align: center;
    padding: 40px 20px 10px;
  }

  .page-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 0 30px rgba(74,144,217,0.5), 0 0 60px rgba(74,144,217,0.2);
    margin-bottom: 4px;
  }

  .page-header .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    letter-spacing: 4px;
    color: #9898b0;
    text-transform: uppercase;
  }

  .page-header .accent-line {
    width: 200px;
    height: 2px;
    margin: 16px auto 0;
    background: linear-gradient(90deg, transparent, #4A90D9, transparent);
    box-shadow: 0 0 12px rgba(74,144,217,0.4);
  }

  .main-layout {
    display: flex;
    gap: 24px;
    padding: 24px 30px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .heatmap-wrapper {
    flex: 1;
    min-width: 800px;
    overflow-x: auto;
  }

  .side-panel {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-card {
    background: linear-gradient(135deg, #12121e 0%, #1a1a2e 100%);
    border: 1px solid rgba(74,144,217,0.15);
    border-radius: 8px;
    padding: 18px;
  }

  .panel-card h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    color: #4A90D9;
    margin-bottom: 14px;
    text-shadow: 0 0 10px rgba(74,144,217,0.3);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 8px;
  }

  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem;
    color: #9898b0;
    text-transform: uppercase;
    letter-spacing: 1px;
    flex-shrink: 0;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: #e0e0f0;
    text-align: right;
    text-shadow: 0 0 6px rgba(255,255,255,0.1);
  }

  .player-legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .player-legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .player-legend-name {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    color: #e0e0f0;
    flex: 1;
  }

  .player-legend-avg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: #9898b0;
  }

  .color-scale-wrapper {
    margin-top: 8px;
  }

  .color-scale-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .color-scale-bar {
    height: 12px;
    border-radius: 4px;
    width: 100%;
  }

  .color-scale-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 2px;
  }

  .color-scale-tick {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: #666;
  }

  .session-detail-panel {
    min-height: 120px;
  }

  .session-detail-panel .session-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: #4A90D9;
    margin-bottom: 10px;
  }

  .session-player-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 3px 0;
  }

  .session-player-bar .bar-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    color: #9898b0;
    width: 80px;
    text-align: right;
    flex-shrink: 0;
  }

  .session-player-bar .bar-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .session-player-bar .bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s;
  }

  .session-player-bar .bar-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: #9898b0;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .fair-share-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(255,255,255,0.5);
    z-index: 2;
  }

  .tooltip {
    position: fixed;
    pointer-events: none;
    background: linear-gradient(135deg, #1a1a2e 0%, #22223a 100%);
    border: 1px solid rgba(74,144,217,0.3);
    border-radius: 8px;
    padding: 14px 18px;
    max-width: 300px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.15s;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(74,144,217,0.1);
  }

  .tooltip.visible { opacity: 1; }

  .tooltip .tt-title {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: #fff;
    margin-bottom: 8px;
  }

  .tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
  }

  .tooltip .tt-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    color: #9898b0;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .tooltip .tt-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: #e0e0f0;
  }

  .tooltip .tt-absent {
    color: #E57373;
    font-style: italic;
  }

  svg text {
    user-select: none;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>SPOTLIGHT BALANCE</h1>
  <div class="subtitle">Dialogue Share per Player &middot; 46 Sessions</div>
  <div class="accent-line"></div>
</div>

<div class="main-layout">
  <div class="heatmap-wrapper" id="heatmap-wrapper"></div>
  <div class="side-panel">
    <div class="panel-card">
      <h3>PLAYERS</h3>
      <div id="player-legend"></div>
      <div class="color-scale-wrapper">

        <canvas id="color-scale-canvas" width="244" height="12" style="width:100%;height:12px;border-radius:4px;"></canvas>
        <div class="color-scale-ticks">
          <span class="color-scale-tick">0%</span>
          <span class="color-scale-tick">10%</span>
          <span class="color-scale-tick">20%</span>
          <span class="color-scale-tick">30%</span>
        </div>
      </div>
    </div>
    <div class="panel-card">
      <h3>CAMPAIGN STATS</h3>
      <div id="campaign-stats"></div>
    </div>
    <div class="panel-card session-detail-panel">
      <h3>SESSION DETAIL</h3>
      <div id="session-detail"><span class="stat-label" style="font-size:0.72rem">Click a column to inspect</span></div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

// ============================================================================
// Build flat grid data
// ============================================================================

// Build a lookup: session_index -> player_name -> data
const gridData = [];
const sessionCount = SESSIONS.length;

ALL_PLAYERS.forEach((player, rowIdx) => {
  SESSIONS.forEach((session, colIdx) => {
    const pData = session.players.find(p => p.name === player);
    gridData.push({
      player,
      session: session.sid,
      sessionIdx: colIdx,
      playerIdx: rowIdx,
      pct: pData ? pData.pct : null,
      absent: pData ? pData.absent : true,
      words: pData ? pData.words : 0,
      charName: pData ? pData.char : PLAYER_CHAR[player] || player,
      notInCampaign: !pData  // player wasn't even listed for this session
    });
  });
});

// ============================================================================
// Heatmap
// ============================================================================

const margin = { top: 50, right: 20, bottom: 30, left: 120 };
const cellW = 16, cellH = 32;
const gridW = cellW * sessionCount;
const gridH = cellH * ALL_PLAYERS.length;
const svgW = margin.left + gridW + margin.right;
const svgH = margin.top + gridH + margin.bottom;

const colorScale = d3.scaleSequential(d3.interpolateViridis).domain([0, 30]);

const svg = d3.select("#heatmap-wrapper")
  .append("svg")
    .attr("width", svgW)
    .attr("height", svgH);

// Defs
const defs = svg.append("defs");

// Glow filter
const glow = defs.append("filter").attr("id", "glow");
glow.append("feGaussianBlur").attr("stdDeviation", "2").attr("result", "coloredBlur");
const merge = glow.append("feMerge");
merge.append("feMergeNode").attr("in", "coloredBlur");
merge.append("feMergeNode").attr("in", "SourceGraphic");

// Absent pattern (X hatch)
const pattern = defs.append("pattern")
  .attr("id", "absentPattern")
  .attr("width", 6).attr("height", 6)
  .attr("patternUnits", "userSpaceOnUse");
pattern.append("rect").attr("width", 6).attr("height", 6).attr("fill", "#15151f");
pattern.append("line").attr("x1", 0).attr("y1", 0).attr("x2", 6).attr("y2", 6)
  .attr("stroke", "#333").attr("stroke-width", 0.8);
pattern.append("line").attr("x1", 6).attr("y1", 0).attr("x2", 0).attr("y2", 6)
  .attr("stroke", "#333").attr("stroke-width", 0.8);

const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

// Draw cells
const cells = g.selectAll(".cell")
  .data(gridData)
  .join("rect")
    .attr("class", "cell")
    .attr("x", d => d.sessionIdx * cellW)
    .attr("y", d => d.playerIdx * cellH)
    .attr("width", cellW - 1)
    .attr("height", cellH - 1)
    .attr("rx", 2)
    .attr("fill", d => {
      if (d.notInCampaign || d.absent) return "url(#absentPattern)";
      return colorScale(d.pct);
    })
    .attr("stroke", "none")
    .style("cursor", "pointer")
    .on("mouseover", (event, d) => {
      showTooltip(event, d);
      highlightCell(d);
    })
    .on("mousemove", (event) => moveTooltip(event))
    .on("mouseout", () => {
      hideTooltip();
      resetHighlight();
    })
    .on("click", (event, d) => {
      selectSession(d.sessionIdx);
    });

// Column highlight overlay (session click)
const colHighlight = g.append("rect")
  .attr("class", "col-highlight")
  .attr("width", cellW - 1)
  .attr("height", gridH)
  .attr("fill", "none")
  .attr("stroke", "#4A90D9")
  .attr("stroke-width", 2)
  .attr("rx", 2)
  .attr("opacity", 0)
  .attr("pointer-events", "none")
  .style("filter", "url(#glow)");

// Fair share indicators — vertical dashed lines
// We'll draw per-session fair share lines on the bar chart in the detail panel

// Row labels (player names)
ALL_PLAYERS.forEach((player, i) => {
  const charName = PLAYER_CHAR[player] || player;
  const color = PLAYER_COLORS[player] || "#9898b0";

  // Color dot
  g.append("circle")
    .attr("cx", -14)
    .attr("cy", i * cellH + cellH / 2)
    .attr("r", 4)
    .attr("fill", color)
    .style("filter", "url(#glow)");

  // Character name
  g.append("text")
    .attr("x", -22)
    .attr("y", i * cellH + cellH / 2)
    .attr("dy", "0.35em")
    .attr("text-anchor", "end")
    .attr("font-family", "'Cinzel', serif")
    .attr("font-size", "11px")
    .attr("font-weight", "600")
    .attr("fill", color)
    .text(charName);
});

// Column labels (session numbers)
SESSIONS.forEach((session, i) => {
  const num = parseInt(session.sid.replace("S", ""), 10);
  if (num % 5 === 0 || num === 1) {
    g.append("text")
      .attr("x", i * cellW + cellW / 2)
      .attr("y", -8)
      .attr("text-anchor", "middle")
      .attr("font-family", "'JetBrains Mono', monospace")
      .attr("font-size", "8px")
      .attr("fill", "#666")
      .text(num);
  }
});

// "SESSION" label
g.append("text")
  .attr("x", gridW / 2)
  .attr("y", -28)
  .attr("text-anchor", "middle")
  .attr("font-family", "'Barlow Condensed', sans-serif")
  .attr("font-size", "10px")
  .attr("fill", "#555")
  .attr("letter-spacing", "3px")
  .text("SESSION");

// ============================================================================
// Interactions
// ============================================================================

const tooltip = document.getElementById("tooltip");

function showTooltip(event, d) {
  const charName = d.charName || PLAYER_CHAR[d.player] || d.player;
  let html = `<div class="tt-title" style="color:${PLAYER_COLORS[d.player] || '#ccc'}">${charName}</div>`;
  html += `<div class="tt-row"><span class="tt-label">Player</span><span class="tt-val">${d.player}</span></div>`;
  html += `<div class="tt-row"><span class="tt-label">Session</span><span class="tt-val">${d.session}</span></div>`;

  if (d.notInCampaign) {
    html += `<div class="tt-row"><span class="tt-label">Status</span><span class="tt-val tt-absent">Not in campaign</span></div>`;
  } else if (d.absent) {
    html += `<div class="tt-row"><span class="tt-label">Status</span><span class="tt-val tt-absent">Absent</span></div>`;
  } else {
    html += `<div class="tt-row"><span class="tt-label">Dialogue Share</span><span class="tt-val">${d.pct.toFixed(1)}%</span></div>`;
    html += `<div class="tt-row"><span class="tt-label">Word Count</span><span class="tt-val">${d.words.toLocaleString()}</span></div>`;
    const sessionData = SESSIONS[d.sessionIdx];
    const presentCount = sessionData.players.filter(p => !p.absent).length;
    const fairShare = (100 / presentCount).toFixed(1);
    const delta = (d.pct - (100 / presentCount)).toFixed(1);
    const deltaColor = delta >= 0 ? "#81C784" : "#E57373";
    html += `<div class="tt-row"><span class="tt-label">Fair Share</span><span class="tt-val">${fairShare}%</span></div>`;
    html += `<div class="tt-row"><span class="tt-label">Delta</span><span class="tt-val" style="color:${deltaColor}">${delta > 0 ? '+' : ''}${delta}%</span></div>`;
  }

  tooltip.innerHTML = html;
  tooltip.classList.add("visible");
  moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.clientX + 16;
  const y = event.clientY - 10;
  const rect = tooltip.getBoundingClientRect();
  const adjustedX = (x + rect.width > window.innerWidth) ? event.clientX - rect.width - 16 : x;
  const adjustedY = (y + rect.height > window.innerHeight) ? window.innerHeight - rect.height - 10 : y;
  tooltip.style.left = adjustedX + "px";
  tooltip.style.top = adjustedY + "px";
}

function hideTooltip() {
  tooltip.classList.remove("visible");
}

function highlightCell(d) {
  cells.transition().duration(100)
    .attr("opacity", c =>
      (c.playerIdx === d.playerIdx || c.sessionIdx === d.sessionIdx) ? 1 : 0.3
    );
}

function resetHighlight() {
  cells.transition().duration(200).attr("opacity", 1);
}

let selectedSession = null;

function selectSession(idx) {
  selectedSession = idx;

  colHighlight
    .attr("x", idx * cellW)
    .attr("opacity", 1);

  const session = SESSIONS[idx];
  const detailDiv = document.getElementById("session-detail");
  const presentPlayers = session.players.filter(p => !p.absent);
  const fairShare = presentPlayers.length > 0 ? 100 / presentPlayers.length : 0;

  // Sort by pct descending
  const sorted = [...session.players].sort((a, b) => b.pct - a.pct);

  let html = `<div class="session-title">${session.sid} &mdash; ${presentPlayers.length} present</div>`;

  sorted.forEach(p => {
    const color = PLAYER_COLORS[p.name] || "#9898b0";
    const barPct = Math.min(p.pct / 30 * 100, 100);
    const fairPct = Math.min(fairShare / 30 * 100, 100);

    if (p.absent) {
      html += `
        <div class="session-player-bar" style="opacity:0.35">
          <span class="bar-name">${PLAYER_CHAR[p.name] || p.name}</span>
          <span class="bar-track">
            <span class="bar-fill" style="width:0%;background:${color};"></span>
          </span>
          <span class="bar-pct" style="color:#E57373;font-style:italic">ABS</span>
        </div>`;
    } else {
      html += `
        <div class="session-player-bar">
          <span class="bar-name">${p.char || PLAYER_CHAR[p.name] || p.name}</span>
          <span class="bar-track">
            <span class="bar-fill" style="width:${barPct}%;background:${color};box-shadow:0 0 6px ${color}40;"></span>
            <span class="fair-share-line" style="left:${fairPct}%"></span>
          </span>
          <span class="bar-pct">${p.pct.toFixed(1)}%</span>
        </div>`;
    }
  });

  html += `<div style="margin-top:8px;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;color:#555;letter-spacing:1px">WHITE LINE = FAIR SHARE (${fairShare.toFixed(1)}%)</div>`;

  detailDiv.innerHTML = html;
}

// ============================================================================
// Player legend
// ============================================================================

const legendDiv = document.getElementById("player-legend");

// Compute per-player average pct (only when present)
ALL_PLAYERS.forEach(player => {
  const sessions = gridData.filter(d => d.player === player && !d.absent && !d.notInCampaign);
  const avg = sessions.length > 0 ? (sessions.reduce((s, d) => s + d.pct, 0) / sessions.length) : 0;
  const present = sessions.length;
  const color = PLAYER_COLORS[player] || "#9898b0";
  const charName = PLAYER_CHAR[player] || player;

  const div = document.createElement("div");
  div.className = "player-legend-item";
  div.innerHTML = `
    <div class="player-legend-dot" style="background:${color};box-shadow:0 0 6px ${color}40;"></div>
    <span class="player-legend-name">${charName}</span>
    <span class="player-legend-avg">${avg.toFixed(1)}% (${present})</span>
  `;
  legendDiv.appendChild(div);
});

// Color scale canvas
const canvas = document.getElementById("color-scale-canvas");
const ctx = canvas.getContext("2d");
const cw = canvas.width;
for (let x = 0; x < cw; x++) {
  const pct = (x / cw) * 30;
  ctx.fillStyle = colorScale(pct);
  ctx.fillRect(x, 0, 1, 12);
}

// ============================================================================
// Campaign stats
// ============================================================================

const statsDiv = document.getElementById("campaign-stats");

// Most spotlighted overall
const playerAvgs = ALL_PLAYERS.map(player => {
  const sessions = gridData.filter(d => d.player === player && !d.absent && !d.notInCampaign);
  const avg = sessions.length > 0 ? sessions.reduce((s, d) => s + d.pct, 0) / sessions.length : 0;
  return { player, avg, count: sessions.length };
}).sort((a, b) => b.avg - a.avg);

addStat("Most Spotlighted", `${PLAYER_CHAR[playerAvgs[0].player]} (${playerAvgs[0].avg.toFixed(1)}%)`);
addStat("Least Spotlighted", `${PLAYER_CHAR[playerAvgs[playerAvgs.length - 1].player]} (${playerAvgs[playerAvgs.length - 1].avg.toFixed(1)}%)`);

// Most balanced session (lowest std dev of present player pcts)
let mostBalancedIdx = 0, leastBalancedIdx = 0;
let minStdDev = Infinity, maxStdDev = -1;

SESSIONS.forEach((session, idx) => {
  const present = session.players.filter(p => !p.absent && p.pct > 0);
  if (present.length < 2) return;
  const mean = present.reduce((s, p) => s + p.pct, 0) / present.length;
  const variance = present.reduce((s, p) => s + Math.pow(p.pct - mean, 2), 0) / present.length;
  const stdDev = Math.sqrt(variance);

  if (stdDev < minStdDev) { minStdDev = stdDev; mostBalancedIdx = idx; }
  if (stdDev > maxStdDev) { maxStdDev = stdDev; leastBalancedIdx = idx; }
});

addStat("Most Balanced", SESSIONS[mostBalancedIdx].sid);
addStat("Most Imbalanced", SESSIONS[leastBalancedIdx].sid);

// Peak spotlight moment
let peakPlayer = "", peakPct = 0, peakSession = "";
gridData.forEach(d => {
  if (!d.absent && !d.notInCampaign && d.pct > peakPct) {
    peakPct = d.pct;
    peakPlayer = d.player;
    peakSession = d.session;
  }
});
addStat("Peak Spotlight", `${PLAYER_CHAR[peakPlayer]} ${peakPct.toFixed(1)}%`);
addStat("Peak Session", peakSession);

// Total sessions with absences
const absenceSessions = SESSIONS.filter(s => s.players.some(p => p.absent)).length;
addStat("Sessions w/ Absences", `${absenceSessions} / 46`);

// Average party size
const avgPartySize = SESSIONS.reduce((s, session) => {
  const present = session.players.filter(p => !p.absent).length;
  return s + present;
}, 0) / SESSIONS.length;
addStat("Avg Party Size", avgPartySize.toFixed(1));

function addStat(label, value) {
  const div = document.createElement("div");
  div.className = "stat-row";
  div.innerHTML = `
    <span class="stat-label">${label}</span>
    <span class="stat-value">${value}</span>
  `;
  statsDiv.appendChild(div);
}

// Auto-select session 1
selectSession(0);
</script>
</body>
</html>
