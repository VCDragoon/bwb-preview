<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTITY VAULT &#8212; BWB Campaign Knowledge Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Cinzel:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-deep:#06060c;--bg-primary:#0a0a14;--bg-card:#0f1020;--bg-card-hover:#141530;
  --bg-surface:#1a1a2e;--bg-elevated:#22223a;
  --border:#2a2a4a;--border-glow:#3a3a6a;
  --text-primary:#eef0ff;--text-secondary:#9494bf;--text-muted:#8a8ab5;
  --accent-blue:#00d4ff;--accent-blue-dim:#0088aa;
  --accent-gold:#ffd700;--accent-gold-dim:#b89a00;
  --accent-red:#ff4444;--accent-red-dim:#cc2222;
  --accent-green:#44ff88;--accent-green-dim:#22cc66;
  --accent-purple:#ad6bff;
  --accent-orange:#ff8844;
  --accent-teal:#4db6ac;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg-deep);color:var(--text-primary);
  font-family:'Barlow',sans-serif;
}
body::after{
  content:'';position:fixed;inset:0;z-index:99999;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}
.ambient{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 20% 30%,rgba(0,212,255,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(173,107,255,0.03) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(255,215,0,0.02) 0%,transparent 40%);
}
canvas#particles{position:fixed;inset:0;z-index:0;pointer-events:none}
.app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

.top-bar{
  display:flex;align-items:center;gap:16px;padding:8px 16px;
  background:rgba(10,10,20,0.97);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);z-index:100;flex-shrink:0;height:52px;
}
.logo-area{display:flex;align-items:baseline;gap:8px}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:4px;
  color:var(--accent-blue);text-shadow:0 0 20px rgba(0,212,255,0.3);white-space:nowrap;
}
.logo-sub{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);
}
.top-stats{display:flex;gap:20px;margin-left:auto}
.top-stat{text-align:center}
.top-stat-val{
  font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;
  color:var(--accent-blue);text-shadow:0 0 10px rgba(0,212,255,0.2);
}
.top-stat-label{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);
}

.main-area{display:flex;flex:1;overflow:hidden}

.sidebar-left{
  width:272px;flex-shrink:0;display:flex;flex-direction:column;
  background:rgba(10,10,20,0.95);backdrop-filter:blur(16px);
  border-right:1px solid var(--border);z-index:50;overflow-y:auto;
}
.sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border)}
.sidebar-title{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent-blue);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.sidebar-title::before{
  content:'';display:inline-block;width:16px;height:2px;background:var(--accent-blue);
}

.search-wrap{position:relative}
.search-box{
  width:100%;padding:8px 12px 8px 12px;
  background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
  color:var(--text-primary);font-family:'Barlow',sans-serif;font-size:15px;
  outline:none;transition:border-color 0.2s;
}
.search-box:focus{border-color:var(--accent-blue);box-shadow:0 0 12px rgba(0,212,255,0.12)}
.search-box::placeholder{color:var(--text-muted)}

.preset-grid{display:flex;flex-direction:column;gap:4px}
.preset-btn{
  padding:7px 12px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:4px;color:var(--text-muted);cursor:pointer;text-align:left;
  font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;
  display:flex;align-items:center;gap:8px;
}
.preset-btn:hover{border-color:var(--border-glow);color:var(--text-secondary)}
.preset-btn.active{
  color:var(--accent-blue);border-color:var(--accent-blue-dim);
  background:rgba(0,212,255,0.08);
}
.preset-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.preset-count{
  margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:14px;
  color:var(--text-muted);
}

.filter-group{display:flex;flex-direction:column;gap:2px}
.filter-row{
  display:flex;align-items:center;gap:8px;padding:3px 6px;border-radius:4px;
  cursor:pointer;transition:background 0.15s;user-select:none;
}
.filter-row:hover{background:rgba(255,255,255,0.03)}
.filter-cb{
  width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all 0.15s;font-size:12px;
}
.filter-row.active .filter-cb{border-color:currentColor;background:currentColor}
.filter-row.active .filter-cb::after{content:'\2713';color:var(--bg-deep);font-weight:700}
.filter-label{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;
  letter-spacing:0.5px;color:var(--text-secondary);flex:1;
}
.filter-count{
  font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text-muted);
}

.slider-row{display:flex;align-items:center;gap:8px}
.slider-label{
  font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--accent-blue);
  min-width:22px;text-align:right;font-weight:700;
}
input[type=range]{
  flex:1;-webkit-appearance:none;height:4px;background:var(--bg-surface);
  border-radius:2px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--accent-blue);cursor:pointer;
  box-shadow:0 0 8px rgba(0,212,255,0.4);
}

.toggle-row{
  display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 0;user-select:none;
}
.toggle-switch{
  width:32px;height:16px;border-radius:8px;background:var(--bg-surface);
  border:1px solid var(--border);position:relative;transition:all 0.2s;flex-shrink:0;
}
.toggle-switch::after{
  content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;
  border-radius:50%;background:var(--text-muted);transition:all 0.2s;
}
.toggle-row.active .toggle-switch{background:rgba(0,212,255,0.2);border-color:var(--accent-blue)}
.toggle-row.active .toggle-switch::after{left:18px;background:var(--accent-blue)}
.toggle-label{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;
  color:var(--text-secondary);letter-spacing:0.5px;
}

.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.legend-item{display:flex;align-items:center;gap:5px;padding:2px 0}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-label{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:var(--text-secondary)}

.graph-container{flex:1;position:relative;overflow:hidden;background:var(--bg-deep)}
canvas#graphCanvas{display:block;width:100%;height:100%}

.node-tooltip{
  position:fixed;pointer-events:none;z-index:10000;
  background:rgba(15,16,32,0.97);backdrop-filter:blur(12px);
  border:1px solid var(--border-glow);border-radius:8px;padding:10px 14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.6),0 0 20px rgba(0,212,255,0.08);
  max-width:280px;display:none;
}
.tooltip-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.tooltip-type{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px}
.tooltip-stat{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text-secondary)}

.detail-panel{
  width:320px;flex-shrink:0;display:none;flex-direction:column;
  background:rgba(10,10,20,0.97);backdrop-filter:blur(16px);
  border-left:1px solid var(--border);z-index:50;overflow-y:auto;
}
.detail-panel.open{display:flex}
.detail-header{padding:16px;border-bottom:1px solid var(--border);position:relative}
.detail-close{
  position:absolute;top:12px;right:12px;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  border-radius:4px;border:1px solid var(--border);background:transparent;
  color:var(--text-muted);cursor:pointer;font-size:18px;transition:all 0.2s;
}
.detail-close:hover{border-color:var(--accent-red);color:var(--accent-red)}
.detail-name{
  font-family:'Cinzel',serif;font-size:20px;font-weight:700;
  color:var(--text-primary);line-height:1.2;margin-bottom:6px;padding-right:36px;
}
.detail-type-badge{
  display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:14px;
  font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 10px;border-radius:3px;
}
.detail-stats{display:flex;gap:16px;margin-top:10px}
.detail-stat{text-align:center}
.detail-stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.detail-stat-label{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);
}

.detail-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.detail-section-title{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--accent-blue);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.detail-section-title::before{
  content:'';display:inline-block;width:12px;height:2px;background:var(--accent-blue);
}

.rel-summary{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.rel-tag{
  font-family:'JetBrains Mono',monospace;font-size:12px;
  padding:2px 6px;border-radius:3px;
  background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.12);
  color:var(--accent-blue);
}

.connection-list{display:flex;flex-direction:column;gap:1px;max-height:500px;overflow-y:auto}
.connection-item{
  display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;
  cursor:pointer;transition:background 0.15s;
}
.connection-item:hover{background:rgba(0,212,255,0.06)}
.conn-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.conn-name{
  font-family:'Barlow',sans-serif;font-size:14px;color:var(--text-secondary);
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.conn-type{
  font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);
  white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;
}
.conn-weight{
  font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent-blue);
  min-width:18px;text-align:right;
}

.view-stats{position:absolute;bottom:12px;left:12px;z-index:60;display:flex;gap:8px}
.view-stat-chip{
  background:rgba(10,10,20,0.92);backdrop-filter:blur(8px);
  border:1px solid var(--border);border-radius:6px;padding:4px 10px;
  display:flex;align-items:center;gap:6px;
}
.view-stat-chip .val{
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;
  color:var(--accent-blue);
}
.view-stat-chip .lbl{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);
}

.controls-overlay{
  position:absolute;bottom:12px;right:12px;z-index:60;display:flex;gap:6px;
}
.ctrl-btn{
  width:32px;height:32px;border-radius:6px;
  background:rgba(10,10,20,0.92);backdrop-filter:blur(8px);
  border:1px solid var(--border);color:var(--text-muted);
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.ctrl-btn:hover{border-color:var(--accent-blue);color:var(--accent-blue)}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-glow)}

@media(max-width:900px){
  .sidebar-left{width:220px}
  .detail-panel{width:260px}
  .top-stats{display:none}
}
@media(max-width:600px){
  .sidebar-left{display:none}
  .detail-panel{position:absolute;right:0;top:0;bottom:0;width:280px;box-shadow:-4px 0 20px rgba(0,0,0,0.5)}
}
</style>
</head>
<body>
<div class="ambient"></div>
<canvas id="particles"></canvas>

<div class="app">
  <div class="top-bar">
    <div class="logo-area">
      <div class="logo">ENTITY VAULT</div>
      <div class="logo-sub">Campaign Knowledge Graph Explorer</div>
    </div>
    <div class="top-stats" id="topStats"></div>
  </div>

  <div class="main-area">
    <div class="sidebar-left">
      <div class="sidebar-section">
        <div class="sidebar-title">Search</div>
        <div class="search-wrap">
          <input type="text" class="search-box" id="searchInput" placeholder="/ to focus &#8212; type to search" autocomplete="off">
        </div>
        <div id="searchResults" style="margin-top:6px;max-height:200px;overflow-y:auto"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Graph Views</div>
        <div class="preset-grid" id="presetGrid"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Entity Types</div>
        <div class="filter-group" id="typeFilters"></div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Min Sessions</div>
        <div class="slider-row">
          <input type="range" id="sessionSlider" min="1" max="20" value="2">
          <span class="slider-label" id="sessionSliderVal">2</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="toggle-row" id="toggleLabels">
          <div class="toggle-switch"></div>
          <div class="toggle-label">Show All Labels (L)</div>
        </div>
        <div class="toggle-row active" id="toggleEdges">
          <div class="toggle-switch"></div>
          <div class="toggle-label">Show Edges (E)</div>
        </div>
        <div class="toggle-row" id="toggleConnected">
          <div class="toggle-switch"></div>
          <div class="toggle-label">Neighbors Only (N)</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">Legend</div>
        <div class="legend-grid" id="legendGrid"></div>
      </div>
    </div>

    <div class="graph-container" id="graphContainer">
      <canvas id="graphCanvas"></canvas>
      <div class="view-stats" id="viewStats"></div>
      <div class="controls-overlay">
        <button class="ctrl-btn" id="btnZoomIn" title="Zoom In">+</button>
        <button class="ctrl-btn" id="btnZoomOut" title="Zoom Out">&#8722;</button>
        <button class="ctrl-btn" id="btnFit" title="Fit to View">&#9634;</button>
        <button class="ctrl-btn" id="btnReheat" title="Re-energize layout">&#10227;</button>
      </div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <button class="detail-close" id="detailClose">&times;</button>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-type-badge" id="detailType"></div>
        <div class="detail-stats" id="detailStats"></div>
      </div>
      <div class="detail-section" id="relSection" style="display:none">
        <div class="detail-section-title">Relationship Types</div>
        <div class="rel-summary" id="relSummary"></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Connections</div>
        <div class="connection-list" id="connectionList"></div>
      </div>
    </div>
  </div>
</div>

<div class="node-tooltip" id="nodeTooltip">
  <div class="tooltip-name" id="ttName"></div>
  <div class="tooltip-type" id="ttType"></div>
  <div class="tooltip-stat" id="ttStat"></div>
</div>

/* ── PARTICLES ── */
(function(){
  const c=document.getElementById('particles'), ctx=c.getContext('2d');
  let pts=[];
  function resize(){
    c.width=window.innerWidth; c.height=window.innerHeight;
    pts=Array.from({length:50},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      vx:(Math.random()-0.5)*0.25, vy:(Math.random()-0.5)*0.25,
      r:Math.random()*1.2+0.3, a:Math.random()*0.25+0.04
    }));
  }
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,212,255,${p.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); window.addEventListener('resize',resize); draw();
})();

const gCanvas=document.getElementById('graphCanvas'), gCtx=gCanvas.getContext('2d');
let W,H,dpr;
function resizeCanvas(){
  const rect=document.getElementById('graphContainer').getBoundingClientRect();
  dpr=window.devicePixelRatio||1; W=rect.width; H=rect.height;
  gCanvas.width=W*dpr; gCanvas.height=H*dpr;
  gCanvas.style.width=W+'px'; gCanvas.style.height=H+'px';
  gCtx.setTransform(dpr,0,0,dpr,0,0);
}

/* ── BUILD GRAPH ── */
function buildGraph(){
  let src;
  if(S.preset==='pc') src=PC_SUBGRAPH;
  else if(S.preset==='narrative') src=NARRATIVE_SUBGRAPH;
  else if(S.preset==='location') src=LOCATION_SUBGRAPH;
  else src=MAIN_DATA;

  const mainMap=new Map();
  MAIN_DATA.nodes.forEach(n=>mainMap.set(n.id,n));

  let nodes=src.nodes.filter(n=>{
    const mn=mainMap.get(n.id);
    const sc=n.session_count||(mn?mn.session_count:0)||1;
    const tp=n.entity_type||'UNKNOWN';
    if(S.preset==='all' && sc<S.minSessions) return false;
    if(!S.activeTypes.has(tp)) return false;
    return true;
  });

  const nodeIds=new Set(nodes.map(n=>n.id));
  const enriched=nodes.map(n=>{
    const mn=mainMap.get(n.id);
    return{id:n.id, label:n.label||n.id, entity_type:n.entity_type||'UNKNOWN',
      session_count:n.session_count||(mn?mn.session_count:0)||1,
      scene_count:n.scene_count||(mn?mn.scene_count:0)||0,
      x:undefined, y:undefined, vx:0, vy:0};
  });

  let links=src.links.filter(l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return nodeIds.has(s)&&nodeIds.has(t);
  }).map(l=>({
    source:typeof l.source==='object'?l.source.id:l.source,
    target:typeof l.target==='object'?l.target.id:l.target,
    type:l.type||'', weight:l.weight||1,
    session_count:l.session_count||1,
    relationship_types:l.relationship_types||{}
  }));

  const adj=new Map();
  enriched.forEach(n=>adj.set(n.id,[]));
  links.forEach(l=>{
    if(adj.has(l.source)) adj.get(l.source).push({node:l.target,link:l});
    if(adj.has(l.target)) adj.get(l.target).push({node:l.source,link:l});
  });

  S.nodes=enriched; S.links=links;
  S.nodeMap=new Map(enriched.map(n=>[n.id,n]));
  S.adj=adj;
  updateViewStats();
}

function startSim(){
  if(S.sim) S.sim.stop();
  const n=S.nodes.length;
  const charge=n>300?-40:n>150?-80:n>50?-140:-200;
  const dist=n>300?20:n>150?35:n>50?55:80;

  S.sim=d3.forceSimulation(S.nodes)
    .force('link',d3.forceLink(S.links).id(d=>d.id).distance(dist).strength(l=>Math.min(0.2,0.03*(l.weight||1))))
    .force('charge',d3.forceManyBody().strength(charge).distanceMax(300))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collision',d3.forceCollide().radius(d=>nodeR(d)+1))
    .alphaDecay(0.025)
    .on('tick',render);
}

/* ── RENDER ── */
function nodeR(d){
  const sc=d.session_count||1;
  if(sc>=30) return 18;
  if(sc>=15) return 13;
  if(sc>=8) return 10;
  if(sc>=4) return 7;
  return 4;
}
function nodeColor(d){ return TYPE_COLORS[d.entity_type]||TYPE_COLORS.UNKNOWN; }

function render(){
  gCtx.save();
  gCtx.clearRect(0,0,W,H);
  const t=S.transform;
  gCtx.translate(t.x,t.y);
  gCtx.scale(t.k,t.k);

  const selId=S.selected?.id, hovId=S.hovered?.id;
  const hl=new Set();
  if(selId&&S.neighborsOnly){
    hl.add(selId);
    (S.adj.get(selId)||[]).forEach(a=>hl.add(a.node));
  }
  if(hovId){
    hl.add(hovId);
    (S.adj.get(hovId)||[]).forEach(a=>hl.add(a.node));
  }
  const hasHL=hl.size>0;

  // EDGES
  if(S.showEdges){
    S.links.forEach(l=>{
      const s=l.source, tg=l.target;
      if(!s.x||!tg.x) return;
      let a=0.08, w=Math.min(2, 0.3+(l.weight||1)*0.2);
      if(hasHL){
        const both=hl.has(s.id)&&hl.has(tg.id);
        if(both){ a=0.5; w=Math.min(4,0.6+(l.weight||1)*0.35); }
        else { a=0.012; }
      }
      gCtx.beginPath(); gCtx.moveTo(s.x,s.y); gCtx.lineTo(tg.x,tg.y);
      if(hasHL&&hl.has(s.id)&&hl.has(tg.id)){
        gCtx.strokeStyle=`rgba(0,200,255,${a})`;
      } else {
        gCtx.strokeStyle=`rgba(70,90,150,${a})`;
      }
      gCtx.lineWidth=w; gCtx.stroke();
    });
  }

  // NODES
  const zk=t.k;
  S.nodes.forEach(d=>{
    if(!d.x) return;
    const r=nodeR(d), color=nodeColor(d);
    const isSel=d.id===selId, isHov=d.id===hovId, inHL=hl.has(d.id);
    const dimmed=hasHL&&!inHL;

    if(dimmed){
      gCtx.globalAlpha=0.05;
      gCtx.beginPath(); gCtx.arc(d.x,d.y,r,0,Math.PI*2);
      gCtx.fillStyle=color; gCtx.fill();
      gCtx.globalAlpha=1;
      return;
    }

    // Outer glow
    if(isSel||isHov||d.session_count>=15){
      const gr=isSel?r+10:isHov?r+7:r+4;
      gCtx.beginPath(); gCtx.arc(d.x,d.y,gr,0,Math.PI*2);
      const g=gCtx.createRadialGradient(d.x,d.y,r*0.4,d.x,d.y,gr);
      g.addColorStop(0,color+'55'); g.addColorStop(1,color+'00');
      gCtx.fillStyle=g; gCtx.fill();
    }

    // Selection ring
    if(isSel){
      gCtx.beginPath(); gCtx.arc(d.x,d.y,r+3,0,Math.PI*2);
      gCtx.strokeStyle='#ffffffcc'; gCtx.lineWidth=2.5; gCtx.stroke();
    }

    // Node fill
    gCtx.beginPath(); gCtx.arc(d.x,d.y,r,0,Math.PI*2);
    const grad=gCtx.createRadialGradient(d.x-r*0.3,d.y-r*0.3,0,d.x,d.y,r);
    grad.addColorStop(0,color); grad.addColorStop(1,color+'77');
    gCtx.fillStyle=grad; gCtx.fill();

    // Border
    gCtx.beginPath(); gCtx.arc(d.x,d.y,r,0,Math.PI*2);
    gCtx.strokeStyle=isSel?'#ffffffaa':isHov?'#ffffff77':color+'22';
    gCtx.lineWidth=isSel?1.5:0.5; gCtx.stroke();

    // Label
    const showLbl=S.showLabels||isSel||isHov
      ||(zk>1&&d.session_count>=15)||(zk>1.5&&d.session_count>=8)
      ||(zk>2.2&&d.session_count>=4)||(zk>3.5)||(d.session_count>=25);
    if(showLbl){
      const fs=Math.max(7,Math.min(13,10/Math.max(1,zk)*Math.min(zk,2.5)));
      gCtx.font=`600 ${fs}px 'Barlow Condensed',sans-serif`;
      gCtx.textAlign='center'; gCtx.textBaseline='top';
      const txt=d.label, tw=gCtx.measureText(txt).width;
      gCtx.fillStyle='rgba(6,6,12,0.88)';
      gCtx.fillRect(d.x-tw/2-3,d.y+r+2,tw+6,fs+4);
      gCtx.fillStyle=isSel?'#ffffff':isHov?'#eef0ff':'#9494bf';
      gCtx.fillText(txt,d.x,d.y+r+4);
    }
  });

  gCtx.restore();
}

/* ── INTERACTION ── */
function toGraph(sx,sy){
  const t=S.transform;
  return[(sx-t.x)/t.k,(sy-t.y)/t.k];
}
function findNode(mx,my){
  const[gx,gy]=toGraph(mx,my);
  let best=null,bestD=Infinity;
  S.nodes.forEach(d=>{
    if(!d.x)return;
    const dist=Math.hypot(d.x-gx,d.y-gy);
    const r=nodeR(d)+4/S.transform.k;
    if(dist<r&&dist<bestD){best=d;bestD=dist;}
  });
  return best;
}

const ttEl=document.getElementById('nodeTooltip');
const ttName=document.getElementById('ttName');
const ttType=document.getElementById('ttType');
const ttStat=document.getElementById('ttStat');
function showTT(node,cx,cy){
  ttName.textContent=node.label;
  ttType.textContent=node.entity_type;
  ttType.style.color=nodeColor(node);
  const conns=(S.adj.get(node.id)||[]).length;
  ttStat.textContent=`Sessions: ${node.session_count}  \u00b7  Scenes: ${node.scene_count}  \u00b7  Links: ${conns}`;
  ttEl.style.display='block';
  const tw=ttEl.offsetWidth,th=ttEl.offsetHeight;
  let tx=cx+16,ty=cy-10;
  if(tx+tw>window.innerWidth-10)tx=cx-tw-16;
  if(ty+th>window.innerHeight-10)ty=cy-th-10;
  if(ty<10)ty=10;
  ttEl.style.left=tx+'px'; ttEl.style.top=ty+'px';
}
function hideTT(){ttEl.style.display='none';}

let dragStart=null;
gCanvas.addEventListener('mousemove',e=>{
  const rect=gCanvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  if(S.dragging){
    const[gx,gy]=toGraph(mx,my);
    S.dragging.fx=gx; S.dragging.fy=gy;
    S.sim.alpha(0.3).restart();
    return;
  }
  const node=findNode(mx,my);
  if(node!==S.hovered){
    S.hovered=node;
    gCanvas.style.cursor=node?'pointer':'default';
    if(node)showTT(node,e.clientX,e.clientY); else hideTT();
    render();
  } else if(node) showTT(node,e.clientX,e.clientY);
});

gCanvas.addEventListener('mousedown',e=>{
  const rect=gCanvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const node=findNode(mx,my);
  if(node&&e.button===0){
    e.stopPropagation();
    S.dragging=node; dragStart={x:node.x,y:node.y};
    node.fx=node.x; node.fy=node.y;
    gCanvas.style.cursor='grabbing';
  }
});

window.addEventListener('mouseup',()=>{
  if(S.dragging){
    const d=S.dragging;
    const dd=dragStart?Math.hypot(d.x-dragStart.x,d.y-dragStart.y):0;
    d.fx=null; d.fy=null;
    gCanvas.style.cursor=S.hovered?'pointer':'default';
    if(dd<5) selectNode(d);
    S.dragging=null; dragStart=null;
    S.sim.alpha(0.1).restart();
  }
});

gCanvas.addEventListener('mouseleave',()=>{S.hovered=null;hideTT();render();});

const zoomBehavior=d3.zoom()
  .scaleExtent([0.05,12])
  .filter(e=>{
    if(e.type==='wheel')return true;
    if(e.type==='mousedown'&&e.button===0){
      const rect=gCanvas.getBoundingClientRect();
      return !findNode(e.clientX-rect.left,e.clientY-rect.top);
    }
    return e.type!=='dblclick';
  })
  .on('zoom',e=>{S.transform=e.transform;render();});

d3.select(gCanvas).call(zoomBehavior);

function selectNode(node){
  S.selected=node;
  if(!node){document.getElementById('detailPanel').classList.remove('open');render();return;}
  const panel=document.getElementById('detailPanel');
  panel.classList.add('open');

  document.getElementById('detailName').textContent=node.label;
  const tb=document.getElementById('detailType');
  const c=nodeColor(node);
  tb.textContent=TYPE_LABELS[node.entity_type]||node.entity_type;
  tb.style.cssText=`background:${c}18;color:${c};border:1px solid ${c}33`;

  const conns=(S.adj.get(node.id)||[]).length;
  document.getElementById('detailStats').innerHTML=
    `<div class="detail-stat"><div class="detail-stat-val" style="color:${c}">${node.session_count}</div><div class="detail-stat-label">Sessions</div></div>`+
    `<div class="detail-stat"><div class="detail-stat-val" style="color:${c}">${node.scene_count}</div><div class="detail-stat-label">Scenes</div></div>`+
    `<div class="detail-stat"><div class="detail-stat-val" style="color:${c}">${conns}</div><div class="detail-stat-label">Links</div></div>`;

  // Relationship types
  const relTypes={};
  (S.adj.get(node.id)||[]).forEach(a=>{
    const rt=a.link.relationship_types;
    if(rt&&typeof rt==='object') Object.keys(rt).forEach(k=>{relTypes[k]=(relTypes[k]||0)+rt[k];});
    else if(a.link.type) relTypes[a.link.type]=(relTypes[a.link.type]||0)+1;
  });
  const rs=document.getElementById('relSection');
  const rk=Object.entries(relTypes).sort((a,b)=>b[1]-a[1]).slice(0,20);
  if(rk.length>0){
    rs.style.display='';
    document.getElementById('relSummary').innerHTML=rk.map(([k,v])=>
      `<span class="rel-tag">${k.replace(/_/g,' ')}${v>1?' ('+v+')':''}</span>`
    ).join('');
  } else rs.style.display='none';

  // Connections list
  const connections=(S.adj.get(node.id)||[])
    .map(a=>{const tgt=S.nodeMap.get(a.node);return{
      id:a.node,label:tgt?tgt.label:a.node,type:tgt?tgt.entity_type:'UNKNOWN',
      relType:a.link.type,weight:a.link.weight||1,color:tgt?nodeColor(tgt):'#555'};})
    .sort((a,b)=>b.weight-a.weight);

  const listEl=document.getElementById('connectionList');
  listEl.innerHTML=connections.map(cn=>
    `<div class="connection-item" data-id="${cn.id}"><div class="conn-dot" style="background:${cn.color};box-shadow:0 0 4px ${cn.color}44"></div><div class="conn-name">${cn.label}</div><div class="conn-type">${cn.relType.replace(/_/g,' ')}</div><div class="conn-weight">${cn.weight}</div></div>`
  ).join('');

  listEl.querySelectorAll('.connection-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=S.nodeMap.get(el.dataset.id);
      if(n){
        selectNode(n);
        const tr=d3.zoomIdentity.translate(W/2,H/2).scale(Math.max(S.transform.k,2.5)).translate(-n.x,-n.y);
        d3.select(gCanvas).transition().duration(600).call(zoomBehavior.transform,tr);
      }
    });
  });

  panel.scrollTop=0; render();
}

document.getElementById('detailClose').addEventListener('click',()=>selectNode(null));

/* ── SIDEBAR ── */
function setupPresets(){
  const grid=document.getElementById('presetGrid');
  const presets=[
    {id:'all',label:'All Entities',color:'#00d4ff',count:MAIN_DATA.nodes.length},
    {id:'pc',label:'PC Network',color:'#00d4ff',count:PC_SUBGRAPH.nodes.length},
    {id:'narrative',label:'Narrative Web',color:'#ad6bff',count:NARRATIVE_SUBGRAPH.nodes.length},
    {id:'location',label:'Location Map',color:'#44ff88',count:LOCATION_SUBGRAPH.nodes.length},
  ];
  grid.innerHTML=presets.map(p=>
    `<button class="preset-btn ${p.id===S.preset?'active':''}" data-preset="${p.id}"><div class="preset-dot" style="background:${p.color};box-shadow:0 0 6px ${p.color}44"></div>${p.label}<span class="preset-count">${p.count}</span></button>`
  ).join('');
  grid.querySelectorAll('.preset-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.preset=btn.dataset.preset;
      grid.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',b.dataset.preset===S.preset));
      document.getElementById('sessionSlider').disabled=S.preset!=='all';
      rebuild();
    });
  });
}

function setupTypeFilters(){
  const el=document.getElementById('typeFilters');
  const counts={};
  MAIN_DATA.nodes.forEach(n=>{const t=n.entity_type||'UNKNOWN';counts[t]=(counts[t]||0)+1;});
  const types=TYPE_ORDER.filter(t=>counts[t]);
  el.innerHTML=types.map(t=>
    `<div class="filter-row active" data-type="${t}" style="color:${TYPE_COLORS[t]}"><div class="filter-cb"></div><div class="filter-label">${TYPE_LABELS[t]||t}</div><div class="filter-count">${counts[t]||0}</div></div>`
  ).join('');
  el.querySelectorAll('.filter-row').forEach(row=>{
    row.addEventListener('click',()=>{
      const tp=row.dataset.type;
      if(S.activeTypes.has(tp)){S.activeTypes.delete(tp);row.classList.remove('active');}
      else{S.activeTypes.add(tp);row.classList.add('active');}
      rebuild();
    });
  });
}

function setupLegend(){
  const grid=document.getElementById('legendGrid');
  const show=['PC','NPC','BOSS','MONSTER','LOCATION','ORGANIZATION','DEITY','ITEM','PET','LORE'];
  grid.innerHTML=show.map(t=>
    `<div class="legend-item"><div class="legend-dot" style="background:${TYPE_COLORS[t]};box-shadow:0 0 4px ${TYPE_COLORS[t]}44"></div><div class="legend-label">${t}</div></div>`
  ).join('');
}

function setupSlider(){
  const slider=document.getElementById('sessionSlider');
  const lbl=document.getElementById('sessionSliderVal');
  slider.addEventListener('input',()=>{
    S.minSessions=+slider.value; lbl.textContent=slider.value; rebuild();
  });
}

function setupToggles(){
  [['toggleLabels',()=>{S.showLabels=!S.showLabels;render();}],
   ['toggleEdges',()=>{S.showEdges=!S.showEdges;render();}],
   ['toggleConnected',()=>{S.neighborsOnly=!S.neighborsOnly;render();}]
  ].forEach(([id,fn])=>{
    document.getElementById(id).addEventListener('click',function(){this.classList.toggle('active');fn();});
  });
}

function setupControls(){
  document.getElementById('btnZoomIn').addEventListener('click',()=>{
    d3.select(gCanvas).transition().duration(300).call(zoomBehavior.scaleBy,1.5);
  });
  document.getElementById('btnZoomOut').addEventListener('click',()=>{
    d3.select(gCanvas).transition().duration(300).call(zoomBehavior.scaleBy,0.67);
  });
  document.getElementById('btnFit').addEventListener('click',()=>{
    if(!S.nodes.length) return;
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    S.nodes.forEach(d=>{if(!d.x)return;x0=Math.min(x0,d.x);y0=Math.min(y0,d.y);x1=Math.max(x1,d.x);y1=Math.max(y1,d.y);});
    const pad=60,dx=x1-x0+pad*2,dy=y1-y0+pad*2;
    const scale=Math.min(W/dx,H/dy,4)*0.9;
    const cx=(x0+x1)/2,cy=(y0+y1)/2;
    const tr=d3.zoomIdentity.translate(W/2,H/2).scale(scale).translate(-cx,-cy);
    d3.select(gCanvas).transition().duration(600).call(zoomBehavior.transform,tr);
  });
  document.getElementById('btnReheat').addEventListener('click',()=>{S.sim.alpha(1).restart();});
}

// SEARCH
const searchInput=document.getElementById('searchInput');
const searchResults=document.getElementById('searchResults');
searchInput.addEventListener('input',()=>{
  const q=searchInput.value.toLowerCase().trim();
  if(!q){searchResults.innerHTML='';return;}
  const matches=MAIN_DATA.nodes
    .filter(n=>n.label.toLowerCase().includes(q))
    .sort((a,b)=>(b.session_count||0)-(a.session_count||0))
    .slice(0,15);
  searchResults.innerHTML=matches.map(n=>{
    const c=TYPE_COLORS[n.entity_type]||TYPE_COLORS.UNKNOWN;
    return `<div class="connection-item" data-id="${n.id}" data-type="${n.entity_type}"><div class="conn-dot" style="background:${c};box-shadow:0 0 4px ${c}44"></div><div class="conn-name">${n.label}</div><div class="conn-type">${n.entity_type}</div></div>`;
  }).join('');
  searchResults.querySelectorAll('.connection-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const nid=el.dataset.id;
      let node=S.nodeMap.get(nid);
      if(!node){
        S.preset='all';S.minSessions=1;
        document.getElementById('sessionSlider').value='1';
        document.getElementById('sessionSliderVal').textContent='1';
        document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',b.dataset.preset==='all'));
        const tp=el.dataset.type;
        if(!S.activeTypes.has(tp)){S.activeTypes.add(tp);document.querySelectorAll(`.filter-row[data-type="${tp}"]`).forEach(r=>r.classList.add('active'));}
        buildGraph();startSim();
        setTimeout(()=>{
          node=S.nodeMap.get(nid);
          if(node){selectNode(node);
            const tr=d3.zoomIdentity.translate(W/2,H/2).scale(2.5).translate(-node.x,-node.y);
            d3.select(gCanvas).transition().duration(600).call(zoomBehavior.transform,tr);
          }
        },800);
        return;
      }
      selectNode(node);
      const tr=d3.zoomIdentity.translate(W/2,H/2).scale(Math.max(S.transform.k,2.5)).translate(-node.x,-node.y);
      d3.select(gCanvas).transition().duration(600).call(zoomBehavior.transform,tr);
    });
  });
});

function setupTopStats(){
  const r=GRAPH_REPORT;
  document.getElementById('topStats').innerHTML=[
    {v:r.d3_metadata.node_count,l:'Entities'},
    {v:r.d3_metadata.link_count,l:'Relationships'},
    {v:r.sqlite_stats.facts,l:'Facts'},
    {v:r.sqlite_stats.aliases,l:'Aliases'},
  ].map(s=>`<div class="top-stat"><div class="top-stat-val">${s.v.toLocaleString()}</div><div class="top-stat-label">${s.l}</div></div>`).join('');
}

function updateViewStats(){
  document.getElementById('viewStats').innerHTML=
    `<div class="view-stat-chip"><span class="val">${S.nodes.length}</span><span class="lbl">Nodes</span></div>`+
    `<div class="view-stat-chip"><span class="val">${S.links.length}</span><span class="lbl">Edges</span></div>`;
}

function rebuild(){
  S.selected=null;
  document.getElementById('detailPanel').classList.remove('open');
  buildGraph(); startSim();
}

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT') return;
  if(e.key==='Escape'){selectNode(null);searchInput.value='';searchResults.innerHTML='';}
  if(e.key==='l'||e.key==='L'){S.showLabels=!S.showLabels;document.getElementById('toggleLabels').classList.toggle('active',S.showLabels);render();}
  if(e.key==='e'||e.key==='E'){S.showEdges=!S.showEdges;document.getElementById('toggleEdges').classList.toggle('active',S.showEdges);render();}
  if(e.key==='n'||e.key==='N'){S.neighborsOnly=!S.neighborsOnly;document.getElementById('toggleConnected').classList.toggle('active',S.neighborsOnly);render();}
  if(e.key==='/'){e.preventDefault();searchInput.focus();}
});

/* ── INIT ── */
resizeCanvas();
window.addEventListener('resize',()=>{resizeCanvas();render();});
setupPresets(); setupTypeFilters(); setupLegend();
setupSlider(); setupToggles(); setupControls();
setupTopStats(); buildGraph(); startSim();
</script>
</body>
</html>
