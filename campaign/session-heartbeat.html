<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SESSION HEARTBEAT</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap");

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060c;
    color: #c8c8e0;
    font-family: "Barlow", sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::after {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.06) 2px,
      rgba(0, 0, 0, 0.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .page-container {
    max-width: 1500px;
    margin: 0 auto;
    padding: 40px 30px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
    position: relative;
  }

  .header::after {
    content: "";
    display: block;
    width: 300px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00e5c8, #4A90D9, transparent);
    margin: 16px auto 0;
    box-shadow: 0 0 15px rgba(0, 229, 200, 0.3);
  }

  .header h1 {
    font-family: "Bebas Neue", cursive;
    font-size: 64px;
    letter-spacing: 10px;
    background: linear-gradient(135deg, #00e5c8, #4A90D9, #00e5c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(0, 229, 200, 0.4));
    line-height: 1;
  }

  .header .subtitle {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: #7a7a9c;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .stats-panel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: linear-gradient(135deg, rgba(20, 20, 40, 0.9), rgba(15, 15, 30, 0.95));
    border: 1px solid rgba(74, 144, 217, 0.15);
    border-radius: 8px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent, #4A90D9), transparent);
    opacity: 0.8;
  }

  .stat-card .stat-label {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #7a7a9c;
    margin-bottom: 8px;
  }

  .stat-card .stat-value {
    font-family: "JetBrains Mono", monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--accent, #4A90D9);
    text-shadow: 0 0 10px var(--accent-glow, rgba(74, 144, 217, 0.3));
    margin-bottom: 4px;
  }

  .stat-card .stat-detail {
    font-family: "Barlow", sans-serif;
    font-size: 14px;
    color: #9898b0;
    line-height: 1.4;
  }

  .legend-row {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "Barlow Condensed", sans-serif;
    font-size: 15px;
    letter-spacing: 1px;
    color: #9898b0;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    box-shadow: 0 0 6px currentColor;
  }

  .ridge-container {
    background: linear-gradient(180deg, rgba(10, 10, 20, 0.95), rgba(6, 6, 12, 1));
    border: 1px solid rgba(74, 144, 217, 0.1);
    border-radius: 12px;
    padding: 30px 20px 20px;
    position: relative;
    overflow: hidden;
  }

  .ridge-container::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #00e5c8, #4A90D9, transparent);
    opacity: 0.5;
  }

  .ridge-title {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #5a5a7c;
    text-align: center;
    margin-bottom: 20px;
  }

  .tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(10, 10, 25, 0.95);
    border: 1px solid rgba(0, 229, 200, 0.3);
    border-radius: 8px;
    padding: 14px 18px;
    font-family: "Barlow", sans-serif;
    font-size: 15px;
    color: #c8c8e0;
    z-index: 1000;
    min-width: 220px;
    max-width: 320px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(0, 229, 200, 0.1);
    opacity: 0;
    transition: opacity 0.15s ease;
    backdrop-filter: blur(10px);
  }

  .tooltip.visible { opacity: 1; }

  .tooltip .tt-session {
    font-family: "Bebas Neue", cursive;
    font-size: 20px;
    letter-spacing: 2px;
    color: #00e5c8;
    margin-bottom: 2px;
  }

  .tooltip .tt-label {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    color: #9898b0;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .tooltip .tt-key {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7a7a9c;
  }

  .tooltip .tt-val {
    font-family: "JetBrains Mono", monospace;
    font-size: 15px;
    font-weight: 500;
  }

  .expanded-panel {
    position: fixed;
    top: 0; right: -420px;
    width: 400px;
    height: 100vh;
    background: rgba(10, 10, 25, 0.97);
    border-left: 1px solid rgba(0, 229, 200, 0.2);
    backdrop-filter: blur(20px);
    z-index: 5000;
    overflow-y: auto;
    padding: 30px 24px;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -10px 0 40px rgba(0, 0, 0, 0.5);
  }

  .expanded-panel.open { right: 0; }

  .expanded-panel .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    color: #9898b0;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .expanded-panel .close-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  .expanded-panel .ep-title {
    font-family: "Bebas Neue", cursive;
    font-size: 28px;
    letter-spacing: 3px;
    color: #00e5c8;
    margin-bottom: 4px;
  }

  .expanded-panel .ep-subtitle {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 15px;
    color: #7a7a9c;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }

  .expanded-panel .ep-section {
    margin-bottom: 20px;
  }

  .expanded-panel .ep-section-title {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #5a5a7c;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    padding-bottom: 4px;
  }

  .speaker-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    border-left: 3px solid var(--spk-color, #4A90D9);
  }

  .speaker-name {
    font-family: "Cinzel", serif;
    font-size: 15px;
    color: #e0e0e8;
    min-width: 100px;
  }

  .speaker-bar-container {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .speaker-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .speaker-score {
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    min-width: 40px;
    text-align: right;
  }

  .window-list {
    max-height: 400px;
    overflow-y: auto;
  }

  .window-item {
    padding: 8px 10px;
    margin-bottom: 4px;
    background: rgba(255,255,255,0.02);
    border-radius: 4px;
    border-left: 3px solid;
    cursor: default;
  }

  .window-item .wi-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
  }

  .window-item .wi-pos {
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    color: #7a7a9c;
  }

  .window-item .wi-emotion {
    font-family: "Barlow Condensed", sans-serif;
    font-size: 14px;
    color: #9898b0;
    letter-spacing: 1px;
  }

  .window-item .wi-score {
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    font-weight: 500;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  ::-webkit-scrollbar-thumb { background: rgba(0, 229, 200, 0.2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0, 229, 200, 0.4); }

  @media (max-width: 900px) {
    .stats-panel { grid-template-columns: repeat(2, 1fr); }
    .header h1 { font-size: 42px; letter-spacing: 6px; }
    .expanded-panel { width: 100%; right: -100%; }
  }
</style>
</head>
<body>

<div class="page-container">
  <div class="header">
    <h1>SESSION HEARTBEAT</h1>
    <div class="subtitle">46 sessions of emotional terrain &#8212; a mountain range of sentiment</div>
  </div>

  <div class="stats-panel" id="statsPanel"></div>

  <div class="legend-row" id="legendRow"></div>

  <div class="ridge-container">
    <div class="ridge-title">Sentiment Waveforms &#8212; S001 (bottom) to S046 (top)</div>
    <div id="ridgePlot"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="expanded-panel" id="expandedPanel">
  <button class="close-btn" id="closePanel">&#215;</button>
  <div id="panelContent"></div>
</div>

};

function getEmotionColor(emotion) {
  return EMOTION_COLORS[emotion] || "#7a7a9c";
}

function sentimentColor(val) {
  // -10 to +10 mapped to blue (#4A90D9) to gold (#fbbf24)
  const t = Math.max(0, Math.min(1, (val + 10) / 20));
  const r = Math.round(74 + (251 - 74) * t);
  const g = Math.round(144 + (191 - 144) * t);
  const b = Math.round(217 + (36 - 217) * t);
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════
// COMPUTE STATS
// ═══════════════════════════════════════════════════════
const sessionStats = RAW_DATA.map(s => {
  const vals = s.w.map(w => w.v);
  const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
  const range = Math.max(...vals) - Math.min(...vals);
  return { ...s, mean, range, min: Math.min(...vals), max: Math.max(...vals) };
});

const mostVolatile = sessionStats.reduce((a, b) => a.range > b.range ? a : b);
const mostPositive = sessionStats.reduce((a, b) => a.mean > b.mean ? a : b);
const darkest = sessionStats.reduce((a, b) => a.mean < b.mean ? a : b);

const emotionCounts = {};
sessionStats.forEach(s => {
  emotionCounts[s.de] = (emotionCounts[s.de] || 0) + 1;
});
const sortedEmotions = Object.entries(emotionCounts).sort((a, b) => b[1] - a[1]);
const top5Emotions = sortedEmotions.slice(0, 5);

// ═══════════════════════════════════════════════════════
// RENDER STATS PANEL
// ═══════════════════════════════════════════════════════
document.getElementById("statsPanel").innerHTML = `
  <div class="stat-card" style="--accent: #e74c3c; --accent-glow: rgba(231,76,60,0.3)">
    <div class="stat-label">Most Volatile</div>
    <div class="stat-value">${mostVolatile.id}</div>
    <div class="stat-detail">${mostVolatile.label}<br>Range: ${mostVolatile.range.toFixed(1)} points</div>
  </div>
  <div class="stat-card" style="--accent: #fbbf24; --accent-glow: rgba(251,191,36,0.3)">
    <div class="stat-label">Most Positive</div>
    <div class="stat-value">${mostPositive.id}</div>
    <div class="stat-detail">${mostPositive.label}<br>Mean: +${mostPositive.mean.toFixed(1)}</div>
  </div>
  <div class="stat-card" style="--accent: #4A90D9; --accent-glow: rgba(74,144,217,0.3)">
    <div class="stat-label">Darkest Session</div>
    <div class="stat-value">${darkest.id}</div>
    <div class="stat-detail">${darkest.label}<br>Mean: ${darkest.mean.toFixed(1)}</div>
  </div>
  <div class="stat-card" style="--accent: #00e5c8; --accent-glow: rgba(0,229,200,0.3)">
    <div class="stat-label">Dominant Emotions</div>
    <div class="stat-value">${sortedEmotions.length} unique</div>
    <div class="stat-detail">${top5Emotions.map(([e, c]) => `${e}: ${c}`).join(", ")}</div>
  </div>
`;

// ═══════════════════════════════════════════════════════
// RENDER LEGEND
// ═══════════════════════════════════════════════════════
document.getElementById("legendRow").innerHTML = top5Emotions.map(([emotion, count]) => {
  const color = getEmotionColor(emotion);
  return `<div class="legend-item">
    <div class="legend-dot" style="background: ${color}; color: ${color}"></div>
    ${emotion} <span style="font-family: JetBrains Mono; font-size: 14px; color: #5a5a7c">(${count})</span>
  </div>`;
}).join("");

// ═══════════════════════════════════════════════════════
// RIDGELINE PLOT
// ═══════════════════════════════════════════════════════
const container = document.getElementById("ridgePlot");
const margin = { top: 30, right: 40, bottom: 30, left: 70 };
const width = container.parentElement.clientWidth - 40;
const rowHeight = 30;
const overlap = 2.0;
const totalHeight = margin.top + margin.bottom + sessionStats.length * rowHeight;
const innerWidth = width - margin.left - margin.right;

const svg = d3.select("#ridgePlot")
  .append("svg")
  .attr("width", width)
  .attr("height", totalHeight)
  .attr("viewBox", `0 0 ${width} ${totalHeight}`);

const defs = svg.append("defs");

// Gradient per session based on per-window sentiment
sessionStats.forEach((session, i) => {
  const grad = defs.append("linearGradient")
    .attr("id", `grad-${i}`)
    .attr("x1", "0%").attr("y1", "0%")
    .attr("x2", "100%").attr("y2", "0%");

  const windows = session.w;
  if (windows.length === 1) {
    grad.append("stop").attr("offset", "0%")
      .attr("stop-color", sentimentColor(windows[0].v)).attr("stop-opacity", 0.55);
    grad.append("stop").attr("offset", "100%")
      .attr("stop-color", sentimentColor(windows[0].v)).attr("stop-opacity", 0.55);
  } else {
    windows.forEach((w) => {
      const pct = (w.p * 100).toFixed(1);
      grad.append("stop")
        .attr("offset", pct + "%")
        .attr("stop-color", sentimentColor(w.v))
        .attr("stop-opacity", 0.55);
    });
  }
});

// Glow filter
const glowFilter = defs.append("filter").attr("id", "glow");
glowFilter.append("feGaussianBlur").attr("stdDeviation", "1.5").attr("result", "coloredBlur");
const feMerge = glowFilter.append("feMerge");
feMerge.append("feMergeNode").attr("in", "coloredBlur");
feMerge.append("feMergeNode").attr("in", "SourceGraphic");

// Bright glow for hover
const glowBright = defs.append("filter").attr("id", "glow-bright");
glowBright.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "coloredBlur");
const feMerge2 = glowBright.append("feMerge");
feMerge2.append("feMergeNode").attr("in", "coloredBlur");
feMerge2.append("feMergeNode").attr("in", "SourceGraphic");

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

const xScale = d3.scaleLinear().domain([0, 1]).range([0, innerWidth]);
const ampScale = d3.scaleLinear().domain([-10, 10]).range([0, rowHeight * overlap * 2]);

function getBaseline(idx) {
  return totalHeight - margin.bottom - margin.top - (idx + 1) * rowHeight;
}

const tooltip = document.getElementById("tooltip");
const expandedPanel = document.getElementById("expandedPanel");
const panelContent = document.getElementById("panelContent");

// Render each waveform
sessionStats.forEach((session, i) => {
  const baseline = getBaseline(i);

  // Pad data edges to baseline
  let paddedData = [...session.w];
  if (paddedData.length > 0 && paddedData[0].p > 0.01) {
    paddedData.unshift({ p: 0, v: 0, e: "", sp: [] });
  }
  if (paddedData.length > 0 && paddedData[paddedData.length - 1].p < 0.99) {
    paddedData.push({ p: 1, v: 0, e: "", sp: [] });
  }

  const area = d3.area()
    .x(d => xScale(d.p))
    .y0(0)
    .y1(d => -ampScale(d.v))
    .curve(d3.curveMonotoneX);

  const line = d3.line()
    .x(d => xScale(d.p))
    .y(d => -ampScale(d.v))
    .curve(d3.curveMonotoneX);

  const sessionGroup = g.append("g")
    .attr("class", `session-wave session-${i}`)
    .attr("transform", `translate(0, ${baseline})`)
    .style("cursor", "pointer");

  // Black occluder beneath waveform to hide layers below
  sessionGroup.append("path")
    .datum(paddedData)
    .attr("d", d3.area()
      .x(d => xScale(d.p))
      .y0(rowHeight * 3)
      .y1(d => -ampScale(d.v))
      .curve(d3.curveMonotoneX)
    )
    .attr("fill", "#06060c")
    .attr("opacity", 1);

  // Colored area
  const areaPath = sessionGroup.append("path")
    .datum(paddedData)
    .attr("d", area)
    .attr("fill", `url(#grad-${i})`)
    .attr("opacity", 0)
    .attr("filter", "url(#glow)");

  // Top edge stroke
  const linePath = sessionGroup.append("path")
    .datum(paddedData)
    .attr("d", line)
    .attr("fill", "none")
    .attr("stroke", "rgba(255,255,255,0.65)")
    .attr("stroke-width", 1.2)
    .attr("opacity", 0)
    .attr("filter", "url(#glow)");

  // Stroke-draw animation setup
  const totalLen = linePath.node().getTotalLength();
  linePath
    .attr("stroke-dasharray", totalLen)
    .attr("stroke-dashoffset", totalLen);

  const delay = i * 30;

  // Animate area fade
  areaPath.transition()
    .delay(delay)
    .duration(600)
    .attr("opacity", 1);

  // Animate line draw
  linePath.transition()
    .delay(delay)
    .duration(800)
    .ease(d3.easeCubicOut)
    .attr("opacity", 1)
    .attr("stroke-dashoffset", 0);

  // Hitbox for interactions
  sessionGroup.append("rect")
    .attr("x", 0)
    .attr("y", -rowHeight * overlap * 2.5)
    .attr("width", innerWidth)
    .attr("height", rowHeight * overlap * 2.5 + rowHeight)
    .attr("fill", "transparent")
    .on("mouseenter", function(event) {
      areaPath.transition().duration(150).attr("opacity", 1);
      linePath.transition().duration(150)
        .attr("stroke", "#fff")
        .attr("stroke-width", 2.2)
        .attr("filter", "url(#glow-bright)");
      sessionGroup.raise();

      const eColor = getEmotionColor(session.de);
      tooltip.innerHTML = `
        <div class="tt-session">${session.id}</div>
        <div class="tt-label">${session.label}</div>
        <div class="tt-row">
          <span class="tt-key">Dominant</span>
          <span class="tt-val" style="color: ${eColor}">${session.de}</span>
        </div>
        <div class="tt-row">
          <span class="tt-key">Diversity</span>
          <span class="tt-val" style="color: #00e5c8">${session.ds}/10</span>
        </div>
        <div class="tt-row">
          <span class="tt-key">Mean</span>
          <span class="tt-val" style="color: ${sentimentColor(session.mean)}">${session.mean >= 0 ? "+" : ""}${session.mean.toFixed(1)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-key">Range</span>
          <span class="tt-val" style="color: #e0e0e8">${session.range.toFixed(1)}</span>
        </div>
        <div class="tt-row">
          <span class="tt-key">Windows</span>
          <span class="tt-val" style="color: #7a7a9c">${session.w.length}</span>
        </div>
      `;
      tooltip.classList.add("visible");
    })
    .on("mousemove", function(event) {
      const x = event.pageX;
      const y = event.pageY;
      const ttW = tooltip.offsetWidth;
      const ttH = tooltip.offsetHeight;
      const px = x + 15 + ttW > window.innerWidth ? x - ttW - 15 : x + 15;
      const py = y + 15 + ttH > window.innerHeight ? y - ttH - 15 : y + 15;
      tooltip.style.left = px + "px";
      tooltip.style.top = py + "px";
    })
    .on("mouseleave", function() {
      areaPath.transition().duration(300).attr("opacity", 1);
      linePath.transition().duration(300)
        .attr("stroke", "rgba(255,255,255,0.65)")
        .attr("stroke-width", 1.2)
        .attr("filter", "url(#glow)");
      tooltip.classList.remove("visible");
    })
    .on("click", function() {
      showExpanded(session);
    });

  // Session label
  g.append("text")
    .attr("x", -8)
    .attr("y", baseline + 4)
    .attr("text-anchor", "end")
    .attr("font-family", "JetBrains Mono")
    .attr("font-size", "11px")
    .attr("fill", "#4a4a6c")
    .attr("opacity", 0)
    .text(session.id)
    .transition()
    .delay(delay)
    .duration(400)
    .attr("opacity", 1);
});

// ═══════════════════════════════════════════════════════
// EXPANDED PANEL
// ═══════════════════════════════════════════════════════
function mode(arr) {
  const freq = {};
  arr.forEach(v => { freq[v] = (freq[v] || 0) + 1; });
  const entries = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  return entries.length > 0 ? entries[0][0] : "Unknown";
}

function showExpanded(session) {
  const eColor = getEmotionColor(session.de);

  // Aggregate speakers across windows
  const speakerMap = {};
  session.w.forEach(w => {
    w.sp.forEach(sp => {
      if (!speakerMap[sp.n]) speakerMap[sp.n] = { scores: [], emotions: [] };
      speakerMap[sp.n].scores.push(sp.s);
      speakerMap[sp.n].emotions.push(sp.e);
    });
  });

  const speakers = Object.entries(speakerMap).map(([name, data]) => ({
    name,
    avg: data.scores.reduce((a, b) => a + b, 0) / data.scores.length,
    topEmotion: mode(data.emotions),
    count: data.scores.length
  })).sort((a, b) => b.avg - a.avg);

  let speakersHTML = "";
  if (speakers.length > 0) {
    speakersHTML = `<div class="ep-section">
      <div class="ep-section-title">Player Sentiment Breakdown</div>
      ${speakers.map(sp => {
        const barPct = Math.max(2, ((sp.avg + 10) / 20 * 100)).toFixed(0);
        const barColor = sentimentColor(sp.avg);
        const isDM = sp.name === "DM" || sp.name === "Dungeon Master";
        return `<div class="speaker-row" style="--spk-color: ${barColor}">
          <div class="speaker-name" style="${isDM ? "color: #7a7a9c; font-style: italic" : ""}">${sp.name}</div>
          <div class="speaker-bar-container">
            <div class="speaker-bar" style="width: ${barPct}%; background: ${barColor}; box-shadow: 0 0 6px ${barColor}"></div>
          </div>
          <div class="speaker-score" style="color: ${barColor}">${sp.avg >= 0 ? "+" : ""}${sp.avg.toFixed(1)}</div>
        </div>`;
      }).join("")}
    </div>`;
  }

  const windowsHTML = `<div class="ep-section">
    <div class="ep-section-title">Emotional Timeline (${session.w.length} windows)</div>
    <div class="window-list">
      ${session.w.map((w, wi) => {
        const borderColor = sentimentColor(w.v);
        const pctLabel = (w.p * 100).toFixed(0);
        return `<div class="window-item" style="border-left-color: ${borderColor}">
          <div class="wi-header">
            <span class="wi-pos">${pctLabel}%</span>
            <span class="wi-score" style="color: ${borderColor}">${w.v >= 0 ? "+" : ""}${w.v.toFixed(1)}</span>
          </div>
          <div class="wi-emotion">${w.e}</div>
        </div>`;
      }).join("")}
    </div>
  </div>`;

  panelContent.innerHTML = `
    <div class="ep-title">${session.id}</div>
    <div class="ep-subtitle">${session.label}</div>
    <div class="ep-section">
      <div class="ep-section-title">Session Overview</div>
      <div class="tt-row" style="margin-bottom: 6px">
        <span class="tt-key">Dominant Emotion</span>
        <span class="tt-val" style="color: ${eColor}">${session.de}</span>
      </div>
      <div class="tt-row" style="margin-bottom: 6px">
        <span class="tt-key">Arc Type</span>
        <span class="tt-val" style="color: #9898b0">${session.at}</span>
      </div>
      <div class="tt-row" style="margin-bottom: 6px">
        <span class="tt-key">Diversity</span>
        <span class="tt-val" style="color: #00e5c8">${session.ds}/10</span>
      </div>
      <div class="tt-row" style="margin-bottom: 6px">
        <span class="tt-key">Mean Sentiment</span>
        <span class="tt-val" style="color: ${sentimentColor(session.mean)}">${session.mean >= 0 ? "+" : ""}${session.mean.toFixed(2)}</span>
      </div>
      <div class="tt-row" style="margin-bottom: 6px">
        <span class="tt-key">Volatility</span>
        <span class="tt-val" style="color: #e0e0e8">${session.range.toFixed(1)}</span>
      </div>
    </div>
    ${speakersHTML}
    ${windowsHTML}
  `;

  expandedPanel.classList.add("open");
}

document.getElementById("closePanel").addEventListener("click", () => {
  expandedPanel.classList.remove("open");
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") expandedPanel.classList.remove("open");
});

document.addEventListener("click", e => {
  if (expandedPanel.classList.contains("open") &&
      !expandedPanel.contains(e.target) &&
      !e.target.closest(".session-wave")) {
    expandedPanel.classList.remove("open");
  }
});
</script>
</body>
</html>
