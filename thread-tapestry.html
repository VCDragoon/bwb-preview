<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THREAD TAPESTRY — BWB Campaign</title>

  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #06060c;
      --bg-primary: #0a0a14;
      --bg-card: #0f1020;
      --bg-elevated: #22223a;
      --border: #2a2a4a;
      --border-glow: #3a3a6a;
      --text-primary: #eef0ff;
      --text-secondary: #9494bf;
      --text-muted: #8a8ab5;
      --accent-blue: #00d4ff;
      --accent-gold: #ffd700;
      --accent-red: #ff4444;
      --accent-green: #44ff88;
      --accent-purple: #ad6bff;
      --accent-orange: #ff8844;
    }

    html { height: 100%; }
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(173,107,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 70%, rgba(0,212,255,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(255,68,68,0.025) 0%, transparent 50%);
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 0 8px;
      width: 100%;
    }
    .header-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent-blue);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .header-label::before, .header-label::after {
      content: '';
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-blue));
    }
    .header-label::after {
      background: linear-gradient(90deg, var(--accent-blue), transparent);
    }
    .header-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 7vw, 96px);
      letter-spacing: 6px;
      line-height: 1;
      background: linear-gradient(180deg, #ffffff 0%, #aabbdd 50%, #8a8ab5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .header-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--text-muted);
    }

    /* Viz container */
    .viz-container {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 16px 0 0;
    }

    #tapestry-canvas {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    #tapestry-svg {
      display: block;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      pointer-events: none;
      z-index: 10000;
      background: rgba(15, 16, 32, 0.95);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: 'Barlow', sans-serif;
      font-size: 15px;
      color: var(--text-primary);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 0.15s ease;
      max-width: 320px;
      line-height: 1.5;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .tooltip-type {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .tooltip-detail {
      font-size: 14px;
      color: var(--text-secondary);
    }
    .tooltip-detail strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .tooltip-sessions {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .tooltip-event-badge {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 2px 8px;
      border-radius: 3px;
      margin-top: 4px;
    }

    /* Legend */
    .legend-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px 32px;
      padding: 20px 0 12px;
      width: 100%;
    }
    .legend-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .legend-group-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .legend-item:hover { opacity: 0.8; }
    .legend-swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .legend-swatch.line {
      width: 24px;
      height: 3px;
      border-radius: 2px;
    }
    .legend-swatch.dashed {
      background: repeating-linear-gradient(90deg,
        var(--color) 0px, var(--color) 4px,
        transparent 4px, transparent 7px) !important;
    }
    .legend-swatch.glow {
      box-shadow: 0 0 8px var(--color);
    }
    .legend-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500;
      font-size: 15px;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 12px 0 24px;
      flex-wrap: wrap;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--accent-blue);
    }
    .stat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
    }

    /* Footer */
    .footer {
      padding: 16px 0 32px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: 1px;
      opacity: 0.5;
    }

    /* Pulse animation for center */
    @keyframes pulse-ring {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .pulse-ring {
      animation: pulse-ring 4s ease-in-out infinite;
    }
  </style>
</head>

      item.innerHTML = `<div class="legend-swatch" style="background:${color}; box-shadow: 0 0 6px ${color}40;"></div><span class="legend-label">${type}</span>`;
      typeGroup.appendChild(item);
    });
    legendEl.appendChild(typeGroup);

    // Event style legend
    const eventGroup = document.createElement('div');
    eventGroup.className = 'legend-group';
    eventGroup.innerHTML = '<div class="legend-group-title">Event Types</div>';
    const eventLegendItems = [
      { label: 'Create',   style: 'dashed', color: '#9494bf' },
      { label: 'Advance',  style: '',       color: '#9494bf' },
      { label: 'Escalate', style: '',       color: '#ccccee' },
      { label: 'Reveal',   style: 'glow',   color: '#eef0ff' },
      { label: 'Resolve',  style: 'glow',   color: '#eef0ff' }
    ];
    eventLegendItems.forEach(item => {
      const el = document.createElement('div');
      el.className = 'legend-item';
      const classes = `legend-swatch line ${item.style}`;
      el.innerHTML = `<div class="${classes}" style="background:${item.color}; --color:${item.color};${item.style === 'glow' ? ' box-shadow: 0 0 8px '+item.color+';' : ''}"></div><span class="legend-label">${item.label}</span>`;
      eventGroup.appendChild(el);
    });
    legendEl.appendChild(eventGroup);

    // Mood legend
    const moodGroup = document.createElement('div');
    moodGroup.className = 'legend-group';
    moodGroup.innerHTML = '<div class="legend-group-title">Session Mood</div>';
    Object.entries(MOOD_COLORS).forEach(([mood, color]) => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-swatch" style="background:${color}; border-radius:50%; box-shadow: 0 0 6px ${color}40;"></div><span class="legend-label">${mood}</span>`;
      moodGroup.appendChild(item);
    });
    legendEl.appendChild(moodGroup);

    // =========================================================================
    // LAYOUT CALCULATIONS
    // =========================================================================
    const containerEl = document.getElementById('vizContainer');
    const vw = Math.max(1200, window.innerWidth);
    const size = Math.min(vw - 48, 1100);
    const cx = size / 2;
    const cy = size / 2;

    // Ring radii
    const innerRingInner = size * 0.15;
    const innerRingOuter = size * 0.22;
    const connectionZone  = size * 0.24;  // where connections bend through
    const outerRingInner = size * 0.36;
    const outerRingOuter = size * 0.40;
    const labelRadius    = size * 0.44;
    const sessionLabelR  = size * 0.44;

    containerEl.style.height = size + 'px';
    containerEl.style.width = size + 'px';

    // =========================================================================
    // SVG SETUP
    // =========================================================================
    const svg = d3.select('#tapestry-svg')
      .attr('width', size)
      .attr('height', size)
      .attr('viewBox', `0 0 ${size} ${size}`);

    // Defs for glow filter
    const defs = svg.append('defs');

    // Glow filter for resolve/reveal connections
    const glowFilter = defs.append('filter')
      .attr('id', 'glow')
      .attr('x', '-50%').attr('y', '-50%')
      .attr('width', '200%').attr('height', '200%');
    glowFilter.append('feGaussianBlur')
      .attr('stdDeviation', '3')
      .attr('result', 'coloredBlur');
    const glowMerge = glowFilter.append('feMerge');
    glowMerge.append('feMergeNode').attr('in', 'coloredBlur');
    glowMerge.append('feMergeNode').attr('in', 'SourceGraphic');

    // Stronger glow for hover
    const glowFilterStrong = defs.append('filter')
      .attr('id', 'glow-strong')
      .attr('x', '-50%').attr('y', '-50%')
      .attr('width', '200%').attr('height', '200%');
    glowFilterStrong.append('feGaussianBlur')
      .attr('stdDeviation', '5')
      .attr('result', 'coloredBlur');
    const glowMergeStrong = glowFilterStrong.append('feMerge');
    glowMergeStrong.append('feMergeNode').attr('in', 'coloredBlur');
    glowMergeStrong.append('feMergeNode').attr('in', 'SourceGraphic');

    const mainGroup = svg.append('g')
      .attr('transform', `translate(${cx}, ${cy})`);

    // =========================================================================
    // ANGLE CALCULATIONS
    // =========================================================================
    const numSessions = 46;
    const numThreads = threads.length;

    // Sessions distributed evenly around the outer ring
    const sessionAngleScale = d3.scaleLinear()
      .domain([0, numSessions])
      .range([0, 2 * Math.PI]);

    // Threads distributed around the inner ring
    const threadAngleScale = d3.scaleLinear()
      .domain([0, numThreads])
      .range([0, 2 * Math.PI]);

    // Session positions
    const sessionPositions = sessions.map((s, i) => {
      const angle = sessionAngleScale(i) - Math.PI / 2;
      return {
        ...s,
        angle,
        index: i,
        x: Math.cos(angle) * ((outerRingInner + outerRingOuter) / 2),
        y: Math.sin(angle) * ((outerRingInner + outerRingOuter) / 2),
        labelX: Math.cos(angle) * sessionLabelR,
        labelY: Math.sin(angle) * sessionLabelR
      };
    });

    // Thread positions
    const threadPositions = threads.map((t, i) => {
      const angle = threadAngleScale(i) - Math.PI / 2;
      return {
        ...t,
        angle,
        index: i,
        midR: (innerRingInner + innerRingOuter) / 2,
        x: Math.cos(angle) * ((innerRingInner + innerRingOuter) / 2),
        y: Math.sin(angle) * ((innerRingInner + innerRingOuter) / 2)
      };
    });

    // =========================================================================
    // CANVAS SETUP (for connection lines)
    // =========================================================================
    const canvas = document.getElementById('tapestry-canvas');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = size * dpr;
    canvas.height = size * dpr;
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // =========================================================================
    // DRAW CONNECTIONS ON CANVAS
    // =========================================================================
    let highlightedThread = null;
    let highlightedSession = null;

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : { r: 150, g: 150, b: 200 };
    }

    function drawConnections() {
      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.translate(cx, cy);

      threads.forEach((thread, ti) => {
        const tp = threadPositions[ti];
        const color = THREAD_COLORS[thread.type] || '#9494bf';
        const rgb = hexToRgb(color);

        thread.session_history.forEach(event => {
          const si = event.session - 1;
          if (si < 0 || si >= numSessions) return;
          const sp = sessionPositions[si];
          const style = EVENT_STYLES[event.event_type] || EVENT_STYLES.advance;

          // Determine if this connection should be highlighted
          let isHighlighted = false;
          let isFaded = false;

          if (highlightedThread !== null) {
            if (highlightedThread === ti) {
              isHighlighted = true;
            } else {
              isFaded = true;
            }
          } else if (highlightedSession !== null) {
            if (highlightedSession === si) {
              isHighlighted = true;
            } else {
              isFaded = true;
            }
          }

          let opacity = style.opacity;
          let lineWidth = style.width;

          if (isHighlighted) {
            opacity = Math.min(1.0, style.opacity + 0.35);
            lineWidth = style.width + 1.0;
          } else if (isFaded) {
            opacity = 0.04;
            lineWidth = 0.5;
          }

          ctx.beginPath();
          ctx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${opacity})`;
          ctx.lineWidth = lineWidth;

          if (style.dash) {
            ctx.setLineDash(style.dash);
          } else {
            ctx.setLineDash([]);
          }

          // Draw curved connection using quadratic bezier
          // Control point in the connection zone between rings
          const midAngle = (tp.angle + sp.angle) / 2;
          // Handle angle wrapping
          let angleDiff = sp.angle - tp.angle;
          if (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
          if (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
          const midAngleCorrected = tp.angle + angleDiff / 2;

          const controlR = connectionZone + (outerRingInner - connectionZone) * 0.5;
          const cpx = Math.cos(midAngleCorrected) * controlR;
          const cpy = Math.sin(midAngleCorrected) * controlR;

          // Glow effect for resolve/reveal
          if ((style.glow || isHighlighted) && !isFaded) {
            ctx.save();
            ctx.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},${isHighlighted ? 0.6 : 0.4})`;
            ctx.shadowBlur = isHighlighted ? 12 : 8;
            ctx.beginPath();
            ctx.moveTo(tp.x, tp.y);
            ctx.quadraticCurveTo(cpx, cpy, sp.x, sp.y);
            ctx.stroke();
            ctx.restore();
          }

          ctx.beginPath();
          ctx.moveTo(tp.x, tp.y);
          ctx.quadraticCurveTo(cpx, cpy, sp.x, sp.y);
          ctx.stroke();
        });
      });

      ctx.setLineDash([]);
      ctx.restore();
    }

    // =========================================================================
    // DRAW SVG ELEMENTS
    // =========================================================================

    // Radial gradient for center area
    const centerGrad = defs.append('radialGradient')
      .attr('id', 'center-grad')
      .attr('cx', '50%').attr('cy', '50%').attr('r', '50%');
    centerGrad.append('stop').attr('offset', '0%').attr('stop-color', '#0f1020');
    centerGrad.append('stop').attr('offset', '100%').attr('stop-color', '#06060c');

    // Center filled area
    mainGroup.append('circle')
      .attr('r', innerRingInner - 2)
      .attr('fill', 'url(#center-grad)')
      .style('pointer-events', 'none');

    // Background rings (subtle track lines)
    mainGroup.append('circle')
      .attr('r', innerRingInner)
      .attr('fill', 'none')
      .attr('stroke', '#1a1a2e')
      .attr('stroke-width', 0.5);

    mainGroup.append('circle')
      .attr('r', innerRingOuter)
      .attr('fill', 'none')
      .attr('stroke', '#1a1a2e')
      .attr('stroke-width', 0.5);

    // Mid-zone guide ring
    mainGroup.append('circle')
      .attr('r', (innerRingOuter + outerRingInner) / 2)
      .attr('fill', 'none')
      .attr('stroke', '#141530')
      .attr('stroke-width', 0.3)
      .attr('stroke-dasharray', '2,6');

    mainGroup.append('circle')
      .attr('r', outerRingInner)
      .attr('fill', 'none')
      .attr('stroke', '#1a1a2e')
      .attr('stroke-width', 0.5);

    mainGroup.append('circle')
      .attr('r', outerRingOuter)
      .attr('fill', 'none')
      .attr('stroke', '#1a1a2e')
      .attr('stroke-width', 0.5);

    // ---- OUTER RING: Session arcs ----
    const sessionArc = d3.arc()
      .innerRadius(outerRingInner)
      .outerRadius(outerRingOuter);

    const sessionPadAngle = 0.012;
    const sessionArcAngle = (2 * Math.PI / numSessions) - sessionPadAngle;

    // d3.arc measures from 12 o'clock; our positions use -PI/2 offset from 3 o'clock.
    // d3.arc's 0 is 12 o'clock = our -PI/2, so sessionAngleScale(i) maps directly.
    const sessionArcs = mainGroup.selectAll('.session-arc')
      .data(sessionPositions)
      .enter()
      .append('path')
      .attr('class', 'session-arc')
      .attr('d', (d, i) => {
        const startAngle = sessionAngleScale(i) + sessionPadAngle / 2;
        return sessionArc({
          startAngle: startAngle,
          endAngle: startAngle + sessionArcAngle
        });
      })
      .attr('fill', d => {
        const c = MOOD_COLORS[d.mood] || '#9494bf';
        return c + '18';
      })
      .attr('stroke', d => {
        const c = MOOD_COLORS[d.mood] || '#9494bf';
        return c + '40';
      })
      .attr('stroke-width', 0.5)
      .style('cursor', 'pointer')
      .style('transition', 'fill 0.3s, stroke 0.3s');

    // Mood dots on outer ring
    mainGroup.selectAll('.mood-dot')
      .data(sessionPositions)
      .enter()
      .append('circle')
      .attr('class', 'mood-dot')
      .attr('cx', d => Math.cos(d.angle) * (outerRingOuter + 6))
      .attr('cy', d => Math.sin(d.angle) * (outerRingOuter + 6))
      .attr('r', 2.5)
      .attr('fill', d => MOOD_COLORS[d.mood] || '#9494bf')
      .style('filter', 'url(#glow)')
      .style('pointer-events', 'none');

    // Session labels
    mainGroup.selectAll('.session-label')
      .data(sessionPositions)
      .enter()
      .append('text')
      .attr('class', 'session-label')
      .each(function(d) {
        const angleDeg = d.angle * 180 / Math.PI;
        const flip = angleDeg > 90 || angleDeg < -90;
        const textAnchor = flip ? 'end' : 'start';
        const rotation = flip ? angleDeg + 180 : angleDeg;
        const r = sessionLabelR;
        const x = Math.cos(d.angle) * r;
        const y = Math.sin(d.angle) * r;

        d3.select(this)
          .attr('x', x)
          .attr('y', y)
          .attr('text-anchor', textAnchor)
          .attr('dominant-baseline', 'central')
          .attr('transform', `rotate(${rotation}, ${x}, ${y})`)
          .text(d.label);
      })
      .style('font-family', "'JetBrains Mono', monospace")
      .style('font-size', '12px')
      .style('font-weight', '400')
      .style('fill', '#8a8ab5')
      .style('letter-spacing', '0.5px')
      .style('pointer-events', 'none');

    // ---- INNER RING: Thread arcs ----
    const threadArc = d3.arc()
      .innerRadius(innerRingInner)
      .outerRadius(innerRingOuter);

    const threadPadAngle = 0.03;
    const threadArcAngle = (2 * Math.PI / numThreads) - threadPadAngle;

    const threadArcs = mainGroup.selectAll('.thread-arc')
      .data(threadPositions)
      .enter()
      .append('path')
      .attr('class', 'thread-arc')
      .attr('d', (d, i) => {
        const startAngle = threadAngleScale(i) + threadPadAngle / 2;
        return threadArc({
          startAngle: startAngle,
          endAngle: startAngle + threadArcAngle
        });
      })
      .attr('fill', d => {
        const c = THREAD_COLORS[d.type] || '#9494bf';
        return c + '30';
      })
      .attr('stroke', d => THREAD_COLORS[d.type] || '#9494bf')
      .attr('stroke-width', 1.5)
      .style('cursor', 'pointer')
      .style('transition', 'fill 0.3s, stroke-width 0.3s');

    // Thread type indicator dots at inner edge
    mainGroup.selectAll('.thread-dot')
      .data(threadPositions)
      .enter()
      .append('circle')
      .attr('class', 'thread-dot')
      .attr('cx', d => Math.cos(d.angle) * (innerRingInner - 6))
      .attr('cy', d => Math.sin(d.angle) * (innerRingInner - 6))
      .attr('r', 3)
      .attr('fill', d => THREAD_COLORS[d.type] || '#9494bf')
      .style('filter', 'url(#glow)')
      .style('pointer-events', 'none');

    // Thread abbreviated labels (inside inner ring, between center and inner edge)
    const threadLabelR = innerRingInner - 14;
    mainGroup.selectAll('.thread-label')
      .data(threadPositions)
      .enter()
      .append('text')
      .attr('class', 'thread-label')
      .each(function(d) {
        const angleDeg = d.angle * 180 / Math.PI;
        const flip = angleDeg > 90 || angleDeg < -90;
        const textAnchor = flip ? 'end' : 'start';
        const rotation = flip ? angleDeg + 180 : angleDeg;
        const r = threadLabelR;

        d3.select(this)
          .attr('x', Math.cos(d.angle) * r)
          .attr('y', Math.sin(d.angle) * r)
          .attr('text-anchor', textAnchor)
          .attr('dominant-baseline', 'central')
          .attr('transform', `rotate(${rotation}, ${Math.cos(d.angle) * r}, ${Math.sin(d.angle) * r})`)
          .text(() => {
            // Abbreviate long names
            const name = d.name;
            if (name.length > 22) return name.substring(0, 20) + '\u2026';
            return name;
          })
          .style('font-family', "'Barlow Condensed', sans-serif")
          .style('font-size', '12px')
          .style('font-weight', '600')
          .style('fill', '#9494bf')
          .style('letter-spacing', '0.3px')
          .style('pointer-events', 'none');
      });

    // =========================================================================
    // INTERACTION OVERLAY (invisible hit areas on SVG)
    // =========================================================================
    const tooltip = document.getElementById('tooltip');

    function showTooltip(html, event) {
      tooltip.innerHTML = html;
      tooltip.classList.add('visible');
      positionTooltip(event);
    }

    function hideTooltip() {
      tooltip.classList.remove('visible');
    }

    function positionTooltip(event) {
      const pad = 16;
      let x = event.clientX + pad;
      let y = event.clientY + pad;
      const rect = tooltip.getBoundingClientRect();
      if (x + rect.width > window.innerWidth - pad) {
        x = event.clientX - rect.width - pad;
      }
      if (y + rect.height > window.innerHeight - pad) {
        y = event.clientY - rect.height - pad;
      }
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    // Thread hover hit areas
    const threadHitArc = d3.arc()
      .innerRadius(innerRingInner - 8)
      .outerRadius(innerRingOuter + 8);

    mainGroup.selectAll('.thread-hit')
      .data(threadPositions)
      .enter()
      .append('path')
      .attr('class', 'thread-hit')
      .attr('d', (d, i) => {
        const startAngle = threadAngleScale(i) + threadPadAngle / 2 - 0.01;
        return threadHitArc({
          startAngle: startAngle,
          endAngle: startAngle + threadArcAngle + 0.02
        });
      })
      .attr('fill', 'transparent')
      .style('cursor', 'pointer')
      .on('mouseenter', function(event, d) {
        highlightedThread = d.index;
        highlightedSession = null;
        updateHighlightState();
        drawConnections();

        const color = THREAD_COLORS[d.type];
        const eventCounts = {};
        d.session_history.forEach(e => {
          eventCounts[e.event_type] = (eventCounts[e.event_type] || 0) + 1;
        });
        const eventSummary = Object.entries(eventCounts)
          .map(([k, v]) => `${v} ${k}`)
          .join(', ');

        showTooltip(`
          <div class="tooltip-title" style="color:${color}">${d.name}</div>
          <div class="tooltip-type" style="color:${color}">${d.type}</div>
          <div class="tooltip-detail">
            <strong>Span:</strong> S${String(d.start_session).padStart(3,'0')} — S${String(d.end_session).padStart(3,'0')}<br>
            <strong>Events:</strong> ${d.session_history.length} (${eventSummary})
          </div>
          <div class="tooltip-sessions">Sessions: ${d.session_history.map(e => e.session).join(', ')}</div>
        `, event);
      })
      .on('mousemove', function(event) {
        positionTooltip(event);
      })
      .on('mouseleave', function() {
        highlightedThread = null;
        updateHighlightState();
        drawConnections();
        hideTooltip();
      });

    // Session hover hit areas
    const sessionHitArc = d3.arc()
      .innerRadius(outerRingInner - 6)
      .outerRadius(outerRingOuter + 12);

    mainGroup.selectAll('.session-hit')
      .data(sessionPositions)
      .enter()
      .append('path')
      .attr('class', 'session-hit')
      .attr('d', (d, i) => {
        const startAngle = sessionAngleScale(i) + sessionPadAngle / 2 - 0.005;
        return sessionHitArc({
          startAngle: startAngle,
          endAngle: startAngle + sessionArcAngle + 0.01
        });
      })
      .attr('fill', 'transparent')
      .style('cursor', 'pointer')
      .on('mouseenter', function(event, d) {
        highlightedSession = d.index;
        highlightedThread = null;
        updateHighlightState();
        drawConnections();

        // Find threads active in this session
        const activeThreads = threads.filter(t =>
          t.session_history.some(e => e.session === d.id)
        );

        const threadList = activeThreads.map(t => {
          const ev = t.session_history.find(e => e.session === d.id);
          const color = THREAD_COLORS[t.type];
          return `<div style="display:flex;align-items:center;gap:6px;margin:2px 0;">
            <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${color};flex-shrink:0;"></span>
            <span>${t.name}</span>
            <span class="tooltip-event-badge" style="background:${color}20;color:${color};">${ev.event_type}</span>
          </div>`;
        }).join('');

        const moodColor = MOOD_COLORS[d.mood];

        showTooltip(`
          <div class="tooltip-title">${d.label}</div>
          <div class="tooltip-type" style="color:${moodColor}">Mood: ${d.mood}</div>
          <div class="tooltip-detail">
            <strong>${activeThreads.length}</strong> active thread${activeThreads.length !== 1 ? 's' : ''}
          </div>
          <div style="margin-top:8px;font-size:14px;">
            ${threadList || '<span style="color:#8a8ab5">No threads active</span>'}
          </div>
        `, event);
      })
      .on('mousemove', function(event) {
        positionTooltip(event);
      })
      .on('mouseleave', function() {
        highlightedSession = null;
        updateHighlightState();
        drawConnections();
        hideTooltip();
      });

    // =========================================================================
    // HIGHLIGHT STATE MANAGEMENT
    // =========================================================================
    function updateHighlightState() {
      // Update thread arcs
      threadArcs
        .transition().duration(200)
        .attr('fill', d => {
          const c = THREAD_COLORS[d.type] || '#9494bf';
          if (highlightedThread !== null) {
            return d.index === highlightedThread ? c + '60' : c + '08';
          }
          if (highlightedSession !== null) {
            const isActive = d.session_history.some(e => e.session === highlightedSession + 1);
            return isActive ? c + '60' : c + '08';
          }
          return c + '30';
        })
        .attr('stroke-width', d => {
          if (highlightedThread !== null) {
            return d.index === highlightedThread ? 2.5 : 0.5;
          }
          if (highlightedSession !== null) {
            const isActive = d.session_history.some(e => e.session === highlightedSession + 1);
            return isActive ? 2.5 : 0.5;
          }
          return 1.5;
        })
        .attr('stroke', d => {
          const c = THREAD_COLORS[d.type] || '#9494bf';
          if (highlightedThread !== null && d.index !== highlightedThread) {
            return c + '30';
          }
          if (highlightedSession !== null) {
            const isActive = d.session_history.some(e => e.session === highlightedSession + 1);
            if (!isActive) return c + '30';
          }
          return c;
        });

      // Update session arcs
      sessionArcs
        .transition().duration(200)
        .attr('fill', d => {
          const c = MOOD_COLORS[d.mood] || '#9494bf';
          if (highlightedSession !== null) {
            return d.index === highlightedSession ? c + '50' : c + '06';
          }
          if (highlightedThread !== null) {
            const thread = threads[highlightedThread];
            const isConnected = thread.session_history.some(e => e.session === d.id);
            return isConnected ? c + '50' : c + '06';
          }
          return c + '18';
        })
        .attr('stroke', d => {
          const c = MOOD_COLORS[d.mood] || '#9494bf';
          if (highlightedSession !== null) {
            return d.index === highlightedSession ? c + 'cc' : c + '10';
          }
          if (highlightedThread !== null) {
            const thread = threads[highlightedThread];
            const isConnected = thread.session_history.some(e => e.session === d.id);
            return isConnected ? c + 'cc' : c + '10';
          }
          return c + '40';
        })
        .attr('stroke-width', d => {
          if (highlightedSession !== null) {
            return d.index === highlightedSession ? 2 : 0.3;
          }
          if (highlightedThread !== null) {
            const thread = threads[highlightedThread];
            const isConnected = thread.session_history.some(e => e.session === d.id);
            return isConnected ? 2 : 0.3;
          }
          return 0.5;
        });

      // Update session labels
      mainGroup.selectAll('.session-label')
        .transition().duration(200)
        .style('fill', d => {
          if (highlightedSession !== null) {
            return d.index === highlightedSession ? '#eef0ff' : '#8a8ab530';
          }
          if (highlightedThread !== null) {
            const thread = threads[highlightedThread];
            const isConnected = thread.session_history.some(e => e.session === d.id);
            return isConnected ? '#eef0ff' : '#8a8ab530';
          }
          return '#8a8ab5';
        });

      // Update thread labels
      mainGroup.selectAll('.thread-label')
        .transition().duration(200)
        .style('fill', (d, i) => {
          if (highlightedThread !== null) {
            return i === highlightedThread ? '#eef0ff' : '#9494bf30';
          }
          if (highlightedSession !== null) {
            const isActive = threads[i].session_history.some(e => e.session === highlightedSession + 1);
            return isActive ? '#eef0ff' : '#9494bf30';
          }
          return '#9494bf';
        })
        .style('font-size', (d, i) => {
          if (highlightedThread !== null && i === highlightedThread) {
            return '10px';
          }
          return '9px';
        });

      // Update thread dots
      mainGroup.selectAll('.thread-dot')
        .transition().duration(200)
        .attr('r', (d, i) => {
          if (highlightedThread !== null) {
            return i === highlightedThread ? 5 : 1.5;
          }
          if (highlightedSession !== null) {
            const isActive = threads[i].session_history.some(e => e.session === highlightedSession + 1);
            return isActive ? 5 : 1.5;
          }
          return 3;
        })
        .attr('fill', (d, i) => {
          const c = THREAD_COLORS[threads[i].type] || '#9494bf';
          if (highlightedThread !== null && i !== highlightedThread) return c + '30';
          if (highlightedSession !== null) {
            const isActive = threads[i].session_history.some(e => e.session === highlightedSession + 1);
            if (!isActive) return c + '30';
          }
          return c;
        });

      // Update mood dots
      mainGroup.selectAll('.mood-dot')
        .transition().duration(200)
        .attr('r', d => {
          if (highlightedSession !== null) {
            return d.index === highlightedSession ? 4 : 1;
          }
          if (highlightedThread !== null) {
            const thread = threads[highlightedThread];
            const isConnected = thread.session_history.some(e => e.session === d.id);
            return isConnected ? 4 : 1;
          }
          return 2.5;
        })
        .attr('fill', d => {
          const c = MOOD_COLORS[d.mood] || '#9494bf';
          if (highlightedSession !== null && d.index !== highlightedSession) return c + '20';
          if (highlightedThread !== null) {
            const thread = threads[highlightedThread];
            const isConnected = thread.session_history.some(e => e.session === d.id);
            if (!isConnected) return c + '20';
          }
          return c;
        });
    }

    // =========================================================================
    // CENTER LABEL
    // =========================================================================
    mainGroup.append('text')
      .attr('x', 0)
      .attr('y', -12)
      .attr('text-anchor', 'middle')
      .text('BWB')
      .style('font-family', "'Bebas Neue', sans-serif")
      .style('font-size', '28px')
      .style('fill', '#9494bf')
      .style('letter-spacing', '4px')
      .style('pointer-events', 'none');

    mainGroup.append('text')
      .attr('x', 0)
      .attr('y', 14)
      .attr('text-anchor', 'middle')
      .text('CAMPAIGN')
      .style('font-family', "'Barlow Condensed', sans-serif")
      .style('font-size', '14px')
      .style('font-weight', '600')
      .style('fill', '#8a8ab5')
      .style('letter-spacing', '3px')
      .style('text-transform', 'uppercase')
      .style('pointer-events', 'none');

    // Subtle center ring with pulse
    mainGroup.append('circle')
      .attr('class', 'pulse-ring')
      .attr('r', innerRingInner * 0.55)
      .attr('fill', 'none')
      .attr('stroke', '#2a2a4a')
      .attr('stroke-width', 0.5)
      .attr('stroke-dasharray', '2,3');

    // =========================================================================
    // INITIAL DRAW
    // =========================================================================
    drawConnections();

    // =========================================================================
    // WINDOW RESIZE
    // =========================================================================
    window.addEventListener('resize', () => {
      // For simplicity, just redraw connections (full re-layout would require
      // recalculating all positions which is expensive for a demo)
      drawConnections();
    });

  })();
  </script>
</body>
</html>
