    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{

      --bg-elevated:#1c1c34;--border:#2a2a4a;--border-bright:#3a3a5e;
      --text-primary:#eef0ff;--text-secondary:#9494bf;--text-muted:#6a6a90;
      --red:#ff3344;--red-dim:#ff334466;--gold:#ffd700;--gold-dim:#ffd70044;
      --purple:#ba68c8;--purple-dim:#ba68c844;--blue:#00d4ff;
    }
    html{scroll-behavior:smooth}
    body{
      background:var(--bg-deep);color:var(--text-primary);
      font-family:'Barlow',sans-serif;line-height:1.5;
      overflow-x:hidden;min-height:100vh;
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
    }
    .ambient{
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse at 30% 20%,rgba(255,51,68,0.05) 0%,transparent 50%),
        radial-gradient(ellipse at 70% 60%,rgba(186,104,200,0.04) 0%,transparent 50%),
        radial-gradient(ellipse at 50% 80%,rgba(255,215,0,0.03) 0%,transparent 40%);
    }
    canvas#particles{position:fixed;inset:0;z-index:1;pointer-events:none}

    .page{position:relative;z-index:2;max-width:1440px;margin:0 auto;padding:40px 24px 80px}

    /* ─── HEADER ─── */
    .header{text-align:center;margin-bottom:12px}
    .header-label{
      font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;
      letter-spacing:4px;text-transform:uppercase;color:var(--red);
      text-shadow:0 0 20px var(--red-dim);margin-bottom:4px;
    }
    .header h1{
      font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,6vw,72px);
      letter-spacing:6px;color:var(--text-primary);line-height:1;
      text-shadow:0 0 40px rgba(255,51,68,0.15);
    }
    .header-sub{
      font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:15px;
      color:var(--text-secondary);letter-spacing:1.5px;margin-top:4px;
    }

    /* ─── AGGREGATE STATS BAR ─── */
    .stats-bar{
      display:flex;gap:2px;justify-content:center;flex-wrap:wrap;
      margin:20px 0 28px;
    }
    .stat-chip{
      background:var(--bg-card);border:1px solid var(--border);border-radius:6px;
      padding:8px 16px;text-align:center;min-width:120px;
    }
    .stat-chip-label{
      font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;
      letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);
    }
    .stat-chip-value{
      font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;
      margin-top:2px;
    }

    /* ─── DOSSIER GRID ─── */
    .dossier-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:16px;margin-bottom:40px;
    }
    .dossier-card{
      background:linear-gradient(160deg,var(--bg-card),var(--bg-surface));
      border:1px solid var(--border);border-radius:12px;
      padding:0;overflow:hidden;cursor:pointer;
      transition:all 0.3s ease;position:relative;
    }
    .dossier-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      transition:opacity 0.3s ease;
    }
    .dossier-card:hover{
      border-color:var(--border-bright);
      transform:translateY(-2px);
    }
    .dossier-card.expanded{border-color:var(--border-bright)}
    .card-top{display:flex;align-items:center;gap:16px;padding:16px 20px 12px}
    .card-radar{flex-shrink:0;width:110px;height:110px}
    .card-info{flex:1;min-width:0}
    .card-name{
      font-family:'Cinzel',serif;font-weight:700;font-size:18px;
      line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .card-player{
      font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:500;
      letter-spacing:1.5px;text-transform:uppercase;color:var(--text-muted);margin-top:1px;
    }
    .card-scores{display:flex;gap:12px;margin-top:8px}
    .card-score{text-align:center}
    .card-score-label{
      font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
      letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);
    }
    .card-score-val{
      font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;
      line-height:1.2;
    }
    .card-composite{
      display:flex;align-items:center;gap:8px;
      padding:0 20px 12px;
    }
    .composite-bar-bg{
      flex:1;height:4px;background:var(--bg-elevated);border-radius:2px;overflow:hidden;
    }
    .composite-bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
    .composite-val{
      font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;
      min-width:36px;text-align:right;
    }
    .card-badges{
      display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 12px;
    }
    .badge{
      font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
      letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:3px;
    }
    .badge-align{background:rgba(0,212,255,0.1);color:#66e5ff;border:1px solid rgba(0,212,255,0.2)}
    .badge-peak{background:rgba(255,51,68,0.1);color:#ff6666;border:1px solid rgba(255,51,68,0.2)}
    .badge-sessions{background:rgba(255,215,0,0.08);color:#eebb44;border:1px solid rgba(255,215,0,0.15)}

    /* ─── EXPANDED CARD SECTION ─── */
    .card-expanded{
      max-height:0;overflow:hidden;transition:max-height 0.5s ease;
      border-top:1px solid transparent;
    }
    .dossier-card.expanded .card-expanded{
      max-height:600px;border-top-color:var(--border);
    }
    .expanded-inner{padding:16px 20px 20px}
    .expanded-section-title{
      font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;
      letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);
      margin-bottom:6px;
    }
    .expanded-moment{
      font-family:'Crimson Text',serif;font-style:italic;font-size:14px;
      color:var(--text-secondary);line-height:1.5;margin-bottom:14px;
      padding-left:12px;border-left:2px solid var(--red-dim);
    }
    .expanded-sparkline{width:100%;height:80px;margin-top:4px}

    /* ─── EVOLUTION CHART ─── */
    .evolution-section{margin-top:8px}
    .section-header{
      display:flex;align-items:baseline;gap:12px;margin-bottom:12px;
    }
    .section-title{
      font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;
    }
    .section-sub{
      font-family:'Barlow Condensed',sans-serif;font-size:15px;
      color:var(--text-muted);letter-spacing:1px;
    }
    .evolution-chart-wrap{
      background:linear-gradient(160deg,var(--bg-card),var(--bg-surface));
      border:1px solid var(--border);border-radius:12px;
      padding:24px;position:relative;overflow:hidden;
    }
    .evolution-chart-wrap::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--red),var(--purple),var(--gold));
    }

    .tt{
      position:fixed;pointer-events:none;z-index:1000;
      background:rgba(8,8,16,0.95);border:1px solid var(--border-bright);
      border-radius:8px;padding:14px 18px;
      font-family:'Barlow',sans-serif;font-size:15px;
      color:var(--text-primary);backdrop-filter:blur(12px);
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
      opacity:0;transition:opacity 0.12s ease;max-width:320px;
    }
    .tt.vis{opacity:1}
    .tt-name{font-family:'Cinzel',serif;font-weight:700;font-size:15px;margin-bottom:6px}
    .tt-row{display:flex;justify-content:space-between;gap:20px;margin:2px 0}
    .tt-label{font-family:'Barlow Condensed',sans-serif;color:var(--text-secondary);font-weight:500}
    .tt-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px}
    .tt-moment{
      margin-top:8px;padding-top:8px;border-top:1px solid var(--border);
      font-family:'Crimson Text',serif;font-style:italic;font-size:14px;
      color:var(--text-muted);line-height:1.4;
    }

    .data-src{
      font-family:'JetBrains Mono',monospace;font-size:13px;
      color:var(--text-muted);text-align:center;margin-top:32px;opacity:0.5;
    }
  </style>
</head>

// PARTICLE CANVAS — floating dark motes
// ═══════════════════════════════════════════════════════════════
(function(){
  const cvs = document.getElementById('particles');
  const ctx = cvs.getContext('2d');
  let W, H;
  const motes = [];
  function resize(){ W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for(let i=0;i<60;i++) motes.push({
    x:Math.random()*2000, y:Math.random()*4000,
    r:Math.random()*1.5+0.5, vx:(Math.random()-0.5)*0.3, vy:-Math.random()*0.4-0.1,
    a:Math.random()*0.15+0.03, color: Math.random()>0.6 ? '255,51,68' : (Math.random()>0.5?'186,104,200':'255,215,0')
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const m of motes){
      m.x += m.vx; m.y += m.vy;
      if(m.y < -10){ m.y = H+10; m.x = Math.random()*W; }
      if(m.x < -10) m.x = W+10;
      if(m.x > W+10) m.x = -10;
      ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${m.color},${m.a})`;
      ctx.shadowColor = `rgba(${m.color},${m.a*2})`;
      ctx.shadowBlur = 8;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    requestAnimationFrame(draw);
  }
  draw();
})();

function drawMiniRadar(ci, ch){
  const size = 110, margin = 20;
  const radius = (size - margin*2) / 2;
  const svg = d3.select(`#radar-${ci}`).append('svg').attr('width',size).attr('height',size);
  const g = svg.append('g').attr('transform',`translate(${size/2},${size/2})`);

  // Guide rings
  [33,66,100].forEach(lv => {
    g.append('circle').attr('r', lv/100*radius)
     .attr('fill','none').attr('stroke','#2a2a4a').attr('stroke-width',0.6)
     .attr('stroke-dasharray','2,2').attr('opacity',0.5);
  });

  // Axis lines
  axes.forEach((_,i) => {
    const angle = angleSlice*i - Math.PI/2;
    g.append('line').attr('x1',0).attr('y1',0)
     .attr('x2', Math.cos(angle)*radius).attr('y2', Math.sin(angle)*radius)
     .attr('stroke','#3a3a5a').attr('stroke-width',0.6).attr('opacity',0.5);
  });

  // Polygon
  const pts = axes.map((ax,i) => {
    const angle = angleSlice*i - Math.PI/2;
    const r = (ch.avg[ax.key]/100)*radius;
    return [Math.cos(angle)*r, Math.sin(angle)*r];
  });

  // Animate polygon drawing
  const polygon = g.append('polygon')
    .attr('points', pts.map(p=>'0,0').join(' '))
    .attr('fill', ch.color).attr('fill-opacity', 0.2)
    .attr('stroke', ch.color).attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.8)
    .style('filter', `drop-shadow(0 0 6px ${ch.color}66)`);

  // Animate in after stagger
  setTimeout(() => {
    polygon.transition().duration(800).ease(d3.easeBackOut.overshoot(1.2))
      .attr('points', pts.map(p=>p.join(',')).join(' '));
  }, ci * 80 + 200);

  // Vertex dots (appear after polygon)
  setTimeout(() => {
    pts.forEach((p,i) => {
      g.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',0)
       .attr('fill',ch.color).attr('stroke','#fff').attr('stroke-width',1)
       .style('filter',`drop-shadow(0 0 3px ${ch.color})`)
       .transition().delay(i*60).duration(400).ease(d3.easeBackOut)
       .attr('r',3);
    });
  }, ci * 80 + 800);

  // Breathing animation
  function breathe(){
    const scale = 1 + (ch.avg.c / 100) * 0.08; // darker = bigger breath
    polygon.transition().duration(2000 + Math.random()*1000).ease(d3.easeSinInOut)
      .attr('fill-opacity', 0.15 + (ch.avg.c/100)*0.15)
      .transition().duration(2000 + Math.random()*1000).ease(d3.easeSinInOut)
      .attr('fill-opacity', 0.2)
      .on('end', breathe);
  }
  setTimeout(breathe, ci * 80 + 1500);
}

function drawSparkline(ci){
  const ch = CHARS[ci];
  const container = d3.select(`#spark-${ci}`);
  container.selectAll('*').remove();
  const W = container.node().clientWidth || 260;
  const H = 80;
  const svg = container.append('svg').attr('width',W).attr('height',H);

  const xScale = d3.scaleLinear().domain([1,46]).range([24,W-8]);
  const yScale = d3.scaleLinear().domain([0,80]).range([H-8,8]);

  // Area (skip dead sessions)
  const area = d3.area()
    .defined(d => d.c > 0)
    .x(d => xScale(parseInt(d.s.slice(1))))
    .y0(H-8)
    .y1(d => yScale(d.c))
    .curve(d3.curveMonotoneX);

  // Gradient
  const gradId = `sg-${ci}`;
  const defs = svg.append('defs');
  const grad = defs.append('linearGradient').attr('id',gradId).attr('x1','0%').attr('y1','0%').attr('x2','0%').attr('y2','100%');
  grad.append('stop').attr('offset','0%').attr('stop-color',ch.color).attr('stop-opacity',0.4);
  grad.append('stop').attr('offset','100%').attr('stop-color',ch.color).attr('stop-opacity',0.02);

  svg.append('path').datum(ch.arc).attr('d',area).attr('fill',`url(#${gradId})`);

  // Line (skip dead sessions)
  const line = d3.line()
    .defined(d => d.c > 0)
    .x(d => xScale(parseInt(d.s.slice(1))))
    .y(d => yScale(d.c))
    .curve(d3.curveMonotoneX);
  const path = svg.append('path').datum(ch.arc).attr('d',line)
    .attr('fill','none').attr('stroke',ch.color).attr('stroke-width',1.5)
    .style('filter',`drop-shadow(0 0 4px ${ch.color}66)`);

  // Animate
  const totalLen = path.node().getTotalLength();
  path.attr('stroke-dasharray',totalLen).attr('stroke-dashoffset',totalLen)
    .transition().duration(1200).ease(d3.easeQuadOut).attr('stroke-dashoffset',0);

  // Peak marker
  const peakPt = ch.arc.reduce((a,b) => a.c > b.c ? a : b);
  const px = xScale(parseInt(peakPt.s.slice(1)));
  const py = yScale(peakPt.c);
  svg.append('circle').attr('cx',px).attr('cy',py).attr('r',4)
    .attr('fill','var(--red)').attr('stroke','#fff').attr('stroke-width',1)
    .style('filter','drop-shadow(0 0 6px rgba(255,51,68,0.6))');
  svg.append('text').attr('x',px).attr('y',py-8)
    .attr('text-anchor','middle').attr('fill','var(--red)')
    .attr('font-family',"'JetBrains Mono',monospace").attr('font-size', '10px')
    .attr('font-weight','700').text(peakPt.c.toFixed(0));

  // X axis labels
  [1,10,20,30,40,46].forEach(s => {
    svg.append('text').attr('x',xScale(s)).attr('y',H-0)
      .attr('text-anchor','middle').attr('fill','var(--text-muted)')
      .attr('font-family',"'JetBrains Mono',monospace").attr('font-size', '9px')
      .text(s);
  });
}

// ═══════════════════════════════════════════════════════════════
// EVOLUTION CHART — all characters over time
// ═══════════════════════════════════════════════════════════════
(function(){
  const wrap = document.getElementById('evo-wrap');
  const margin = {top:20,right:24,bottom:36,left:44};
  const W = Math.min(1380, wrap.clientWidth - 48);
  const H = 320;
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  const svg = d3.select('#evo-wrap').append('svg')
    .attr('width',W).attr('height',H)
    .style('display','block').style('margin','0 auto');
  const g = svg.append('g').attr('transform',`translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain([1,46]).range([0,iW]);
  const y = d3.scaleLinear().domain([0,70]).range([iH,0]);

  // Grid
  [10,20,30,40,50,60,70].forEach(v => {
    g.append('line').attr('x1',0).attr('y1',y(v)).attr('x2',iW).attr('y2',y(v))
     .attr('stroke','#1a1a2e').attr('stroke-width',0.8);
    g.append('text').attr('x',-8).attr('y',y(v)).attr('dy','0.35em')
     .attr('text-anchor','end').attr('fill','#5a5a80')
     .attr('font-family',"'JetBrains Mono',monospace").attr('font-size', '11px')
     .text(v);
  });
  for(let s=1;s<=46;s+=5){
    g.append('line').attr('x1',x(s)).attr('y1',0).attr('x2',x(s)).attr('y2',iH)
     .attr('stroke','#1a1a2e').attr('stroke-width',0.8);
  }

  // X axis
  for(let s=1;s<=46;s+=5){
    g.append('text').attr('x',x(s)).attr('y',iH+20)
     .attr('text-anchor','middle').attr('fill','#5a5a80')
     .attr('font-family',"'JetBrains Mono',monospace").attr('font-size', '11px')
     .text(`S${String(s).padStart(3,'0')}`);
  }

  // Axis labels
  g.append('text').attr('x',iW/2).attr('y',iH+34)
   .attr('text-anchor','middle').attr('fill','var(--text-muted)')
   .attr('font-family',"'Barlow Condensed',sans-serif").attr('font-size', '12px')
   .attr('letter-spacing','2px').text('SESSION');
  g.append('text').attr('x',-iH/2).attr('y',-36)
   .attr('text-anchor','middle').attr('fill','var(--text-muted)')
   .attr('font-family',"'Barlow Condensed',sans-serif").attr('font-size', '12px')
   .attr('letter-spacing','2px').attr('transform','rotate(-90)')
   .text('COMPOSITE SCORE');

  // Danger zone
  g.append('rect').attr('x',0).attr('y',y(70)).attr('width',iW).attr('height',y(40)-y(70))
   .attr('fill','rgba(255,51,68,0.04)');
  g.append('text').attr('x',iW-4).attr('y',y(65)).attr('text-anchor','end')
   .attr('fill','rgba(255,51,68,0.25)')
   .attr('font-family',"'Barlow Condensed',sans-serif").attr('font-size', '11px')
   .attr('letter-spacing','2px').text('DANGER ZONE');

  // Draw lines for each character (skip dead sessions with c=0)
  const line = d3.line()
    .defined(d => d.c > 0)
    .x(d => x(parseInt(d.s.slice(1))))
    .y(d => y(d.c))
    .curve(d3.curveMonotoneX);

  // Draw in reverse order so darkest is on top
  const sorted = [...CHARS].sort((a,b) => a.avg.c - b.avg.c);
  const paths = {};

  sorted.forEach(ch => {
    // Area under line
    const area = d3.area()
      .defined(d => d.c > 0)
      .x(d => x(parseInt(d.s.slice(1))))
      .y0(iH)
      .y1(d => y(d.c))
      .curve(d3.curveMonotoneX);

    g.append('path').datum(ch.arc).attr('d',area)
     .attr('fill',ch.color).attr('fill-opacity',0.03)
     .attr('class',`evo-area-${ch.name}`);

    const p = g.append('path').datum(ch.arc).attr('d',line)
     .attr('fill','none').attr('stroke',ch.color).attr('stroke-width',2)
     .attr('stroke-opacity',0.7)
     .style('filter',`drop-shadow(0 0 3px ${ch.color}44)`)
     .attr('class',`evo-line-${ch.name}`);
    paths[ch.name] = p;

    // Animate in
    const len = p.node().getTotalLength();
    p.attr('stroke-dasharray',len).attr('stroke-dashoffset',len)
     .transition().duration(2000).delay(200).ease(d3.easeQuadOut)
     .attr('stroke-dashoffset',0);
  });

  // Character labels at end of each line
  sorted.forEach(ch => {
    const last = ch.arc[ch.arc.length-1];
    const lx = x(parseInt(last.s.slice(1)));
    const ly = y(last.c);
    g.append('text').attr('x',lx+6).attr('y',ly)
     .attr('dy','0.35em').attr('fill',ch.color).attr('fill-opacity',0)
     .attr('font-family',"'Cinzel',serif").attr('font-size', '10px')
     .attr('font-weight','600').text(ch.name)
     .transition().delay(2200).duration(500).attr('fill-opacity',0.8);
  });

  // Crosshair
  const crossLine = g.append('line').attr('y1',0).attr('y2',iH)
   .attr('stroke','#4a4a6a').attr('stroke-width',1).attr('stroke-dasharray','3,3')
   .attr('opacity',0);
  const crossDots = g.append('g').attr('opacity',0);

  // Hover overlay
  svg.append('rect')
    .attr('x',margin.left).attr('y',margin.top)
    .attr('width',iW).attr('height',iH)
    .attr('fill','transparent')
    .on('mousemove', function(event){
      const [mx] = d3.pointer(event);
      const sess = Math.round(x.invert(mx - margin.left));
      if(sess < 1 || sess > 46) return;

      crossLine.attr('x1',x(sess)).attr('x2',x(sess)).attr('opacity',1);
      crossDots.selectAll('*').remove();
      crossDots.attr('opacity',1);

      const sessStr = `S${String(sess).padStart(3,'0')}`;
      let tooltipHtml = `<div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--text-muted);margin-bottom:6px">${sessStr}</div>`;

      // Gather values for this session
      const vals = [];
      CHARS.forEach(ch => {
        const pt = ch.arc.find(a => a.s === sessStr);
        if(pt){
          vals.push({name:ch.name,c:pt.c,m:pt.m,n:pt.n,p:pt.p,color:ch.color});
          crossDots.append('circle')
            .attr('cx',x(sess)).attr('cy',y(pt.c)).attr('r',4)
            .attr('fill',ch.color).attr('stroke','#fff').attr('stroke-width',1)
            .style('filter',`drop-shadow(0 0 4px ${ch.color})`);
        }
      });
      vals.sort((a,b) => b.c - a.c);
      vals.forEach(v => {
        tooltipHtml += `<div class="tt-row"><span class="tt-label" style="color:${v.color}">${v.name}</span><span class="tt-val" style="color:${scoreColor(v.c)}">${v.c.toFixed(1)}</span></div>`;
      });

      tt.html(tooltipHtml).classed('vis',true);
      let tx = event.clientX + 16, ty = event.clientY - 10;
      if(tx + 280 > window.innerWidth) tx = event.clientX - 296;
      if(ty + 300 > window.innerHeight) ty = window.innerHeight - 310;
      tt.style('left',tx+'px').style('top',ty+'px');

      // Highlight hovered lines
      Object.entries(paths).forEach(([name, p]) => {
        const pt = vals.find(v => v.name === name);
        p.attr('stroke-opacity', pt ? 1 : 0.15).attr('stroke-width', pt ? 2 : 1.5);
      });
    })
    .on('mouseleave', function(){
      crossLine.attr('opacity',0);
      crossDots.attr('opacity',0);
      tt.classed('vis',false);
      Object.values(paths).forEach(p => p.attr('stroke-opacity',0.7).attr('stroke-width',2));
    });
})();
</script>
</body>
</html>
