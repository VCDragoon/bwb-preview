RUE GOAL OF LILITH'S CULT?","investigator":"Orla"},{"sid":"S005","mystery":"IS THE EXILED PRINCESS CAUSING THE CURSE?","investigator":"Ash"},{"sid":"S006","mystery":"WHO IS THE INVISIBLE ARCHMAGE AND WHY ARE THEY SUMMONING ZOMBIES?","investigator":"Ash"},{"sid":"S007","mystery":"HOW TO CHANGE THE PAST WITHOUT ERASING OURSELVES?","investigator":"Ash"},{"sid":"S008","mystery":"HOW DO WE SURVIVE MEETING OUR OWN CLONES?","investigator":"Ash"},{"sid":"S010","mystery":"WHAT IS THE FIRE CULT SUMMONING IN THE CAVE?","investigator":"Ash"},{"sid":"S011","mystery":"WHO IS DEFILING THE ELEMENTAL NODES?","investigator":"Ash"},{"sid":"S012","mystery":"THE EXPLOSION AND THE NETHERESE RELIC: ARE THEY CONNECTED?","investigator":"Ash"},{"sid":"S013","mystery":"WHAT IS MORTY THE GLABREZU'S TRUE PURPOSE AND PRICE?","investigator":"Ash"},{"sid":"S015","mystery":"WHO CREATED THE TEMPORAL RIFT IN THE TOILET?","investigator":"Ash"},{"sid":"S016","mystery":"HOW TO UNDO THE TIMELINE APOCALYPSE WITHOUT LOSING EVERYTHING?","investigator":"Corras"},{"sid":"S017","mystery":"WHAT EXACTLY HAPPENED TO THE TIMELINE?","investigator":"Ash"},{"sid":"S018","mystery":"WHO IS THE BLACK RIDER ON THE WHITE DRAGON?","investigator":"Ash"},{"sid":"S019","mystery":"WHO IS THE THIRD PARTNER IN CYRIL AND ZIBBLEBOTTOM'S QUEST?","investigator":"Ash"},{"sid":"S020","mystery":"WHAT WAS THE SUMMER STAR ORB AND WHY DID IT EXPLODE?","investigator":"Ash"},{"sid":"S022","mystery":"WHY WERE A DROW MAGE AND AN UMBER HULK WORKING TOGETHER?","investigator":"Ash"},{"sid":"S024","mystery":"HOW DO WE SURVIVE WEB'S EDGE WITH A STUCK CYCLOPS AND AN ARMY?","investigator":"Ash"},{"sid":"S026","mystery":"WHY ARE ALL THE MAGIC ITEMS MALFUNCTIONING?","investigator":"Dahlia"},{"sid":"S027","mystery":"WHAT ARE THE 7 RESONANCE NODES OF THE SOUL FORGE?","investigator":"Corras"},{"sid":"S028","mystery":"WHO BARRICADED THEMSELVES IN THE TEMPLE OF DUMATHOIN?","investigator":"Corras"},{"sid":"S029","mystery":"THE TRUE NATURE OF MALCHOR AND THE INFERNAL NODE","investigator":"Ash"},{"sid":"S031","mystery":"WHO HAS ASH'S SOUL?","investigator":"SavannahBelle"},{"sid":"S032","mystery":"WHAT IS HAPPENING IN WAREHOUSE 17?","investigator":"Ezrella"},{"sid":"S034","mystery":"WHY IS CORRAS THE CENTER OF A MULTIVERSAL MANHUNT?","investigator":"Dahlia"},{"sid":"S035","mystery":"WHY DID MORDENKAINEN SEND US TO THIS CREEPY HOUSE?","investigator":"Ezrella"},{"sid":"S036","mystery":"HOW DO YOU KILL THE CULTISTS OF OSIBUS?","investigator":"SavannahBelle"},{"sid":"S038","mystery":"STRAHD'S TRUE INTENTIONS & THE ROD OF VECNA","investigator":"Dahlia"},{"sid":"S039","mystery":"THE GOAT SACRIFICE & THE DRUIDIC TREE","investigator":"Orla"},{"sid":"S040","mystery":"THE CURSE OF STRAHD","investigator":"Dahlia"},{"sid":"S041","mystery":"WHY DID EZRELLA TRY TO MURDER SAVANNAHBELLE?","investigator":"Corras"},{"sid":"S042","mystery":"THE MIRROR CONSPIRACY: WHAT ARE THE BRIDES HIDING?","investigator":"Shrum"},{"sid":"S044","mystery":"WHAT IS THE 'BUTCHER' HIDING IN THE WAREHOUSE?","investigator":"Orla"},{"sid":"S046","mystery":"WHAT IS THE MATRON'S TRUE ENDGAME?","investigator":"Ash"}]};

const TYPE_COLORS = {
  theory: '#ad6bff',
  evidence: '#44ff88',
  debunked: '#666666',
  suspect: '#ff4444'
};

const nodes = RAW_DATA.nodes;
const edges = RAW_DATA.edges;
const mysteries = RAW_DATA.mysteries;

document.getElementById('stat-nodes').textContent = nodes.length;
document.getElementById('stat-edges').textContent = edges.length;
document.getElementById('stat-theories').textContent = nodes.filter(n => n.type === 'theory').length;
document.getElementById('stat-debunked').textContent = nodes.filter(n => n.type === 'debunked').length;

let mysteryIdx = 0;
function showMystery() {
  if (mysteries.length === 0) return;
  const m = mysteries[mysteryIdx % mysteries.length];
  document.getElementById('mystery-text').textContent = m.mystery;
  document.getElementById('mystery-count').textContent =
    m.sid + ' \u2022 Lead: ' + (m.investigator || 'Unknown') + ' \u2022 ' +
    (mysteryIdx % mysteries.length + 1) + '/' + mysteries.length;
  mysteryIdx++;
}
showMystery();
setInterval(showMystery, 5000);

const nodeById = {};
nodes.forEach(n => { nodeById[n.id] = n; });

const links = edges.filter(e => nodeById[e.source] && nodeById[e.target]).map(e => ({
  source: e.source,
  target: e.target,
  rationale: e.rationale,
  sessions: e.sessions || []
}));

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select('#graph')
  .attr('width', width)
  .attr('height', height);

const defs = svg.append('defs');

// Arrowheads
Object.entries(TYPE_COLORS).forEach(([type, color]) => {
  defs.append('marker')
    .attr('id', 'arrow-' + type)
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 22)
    .attr('refY', 0)
    .attr('markerWidth', 5)
    .attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-4L10,0L0,4')
    .attr('fill', color)
    .attr('fill-opacity', 0.5);
});

// Glow filters
Object.entries(TYPE_COLORS).forEach(([type, color]) => {
  const filter = defs.append('filter').attr('id', 'glow-' + type)
    .attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
  filter.append('feGaussianBlur').attr('stdDeviation', 5).attr('result', 'blur');
  filter.append('feFlood').attr('flood-color', color).attr('flood-opacity', 0.5).attr('result', 'color');
  filter.append('feComposite').attr('in', 'color').attr('in2', 'blur').attr('operator', 'in').attr('result', 'glow');
  const merge = filter.append('feMerge');
  merge.append('feMergeNode').attr('in', 'glow');
  merge.append('feMergeNode').attr('in', 'SourceGraphic');
});

const g = svg.append('g');

const zoom = d3.zoom()
  .scaleExtent([0.08, 6])
  .on('zoom', (event) => g.attr('transform', event.transform));
svg.call(zoom);

const sessionCounts = nodes.map(n => n.sessions.length);
const maxSessions = Math.max(...sessionCounts);
const radiusScale = d3.scaleSqrt().domain([1, maxSessions]).range([4, 20]);
const fontScale = d3.scaleLinear().domain([1, maxSessions]).range([8, 15]).clamp(true);

const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(90).strength(0.25))
  .force('charge', d3.forceManyBody().strength(-150).distanceMax(500))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collide', d3.forceCollide().radius(d => radiusScale(d.sessions.length) + 8))
  .force('x', d3.forceX(width / 2).strength(0.02))
  .force('y', d3.forceY(height / 2).strength(0.02));

const linkElements = g.append('g').selectAll('line')
  .data(links)
  .join('line')
  .attr('class', 'link-line')
  .attr('stroke', d => {
    const src = nodeById[typeof d.source === 'object' ? d.source.id : d.source];
    return src ? TYPE_COLORS[src.type] || '#444' : '#444';
  })
  .attr('stroke-width', 1)
  .attr('marker-end', d => {
    const src = nodeById[typeof d.source === 'object' ? d.source.id : d.source];
    return src ? 'url(#arrow-' + src.type + ')' : 'url(#arrow-theory)';
  });

const nodeElements = g.append('g').selectAll('circle')
  .data(nodes)
  .join('circle')
  .attr('r', d => radiusScale(d.sessions.length))
  .attr('fill', d => TYPE_COLORS[d.type] || '#555')
  .attr('fill-opacity', d => d.type === 'debunked' ? 0.25 : 0.7)
  .attr('stroke', d => TYPE_COLORS[d.type] || '#555')
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.8)
  .style('filter', d => d.type !== 'debunked' ? 'url(#glow-' + d.type + ')' : 'none')
  .style('cursor', 'grab');

const labelElements = g.append('g').selectAll('text')
  .data(nodes)
  .join('text')
  .attr('class', d => 'node-label' + (d.type === 'debunked' ? ' debunked' : ''))
  .attr('font-size', d => fontScale(d.sessions.length) + 'px')
  .attr('text-anchor', 'middle')
  .attr('dy', d => radiusScale(d.sessions.length) + fontScale(d.sessions.length) + 2)
  .text(d => d.label.length > 30 ? d.label.substring(0, 28) + '\u2026' : d.label);

const tooltip = document.getElementById('tooltip');

function getNodeColor(d) { return TYPE_COLORS[d.type] || '#888'; }

nodeElements
  .on('mouseover', function(event, d) {
    const connected = new Set([d.id]);
    links.forEach(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      if (s === d.id) connected.add(t);
      if (t === d.id) connected.add(s);
    });

    nodeElements.attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.06);
    labelElements.attr('fill-opacity', n => connected.has(n.id) ? 1 : 0.08);
    linkElements
      .attr('stroke-opacity', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (s === d.id || t === d.id) ? 0.9 : 0.02;
      })
      .attr('stroke-width', l => {
        const s = typeof l.source === 'object' ? l.source.id : l.source;
        const t = typeof l.target === 'object' ? l.target.id : l.target;
        return (s === d.id || t === d.id) ? 2.5 : 1;
      });

    d3.select(this).attr('r', radiusScale(d.sessions.length) * 1.5);

    const c = getNodeColor(d);
    tooltip.innerHTML =
      '<div class="tt-label" style="color:' + c + '">' + d.label + '</div>' +
      '<div class="tt-type" style="color:' + c + '">' + d.type +
        (d.isCentralMystery ? ' \u2022 CENTRAL MYSTERY' : '') + '</div>' +
      '<div class="tt-details">' + (d.details || 'No details.') + '</div>' +
      '<div class="tt-sessions">Sessions: ' + d.sessions.join(', ') +
        ' (' + d.sessions.length + ')</div>';
    tooltip.classList.add('visible');
  })
  .on('mousemove', function(event) {
    tooltip.style.left = Math.min(event.clientX + 18, window.innerWidth - 380) + 'px';
    tooltip.style.top = Math.min(event.clientY - 12, window.innerHeight - 220) + 'px';
  })
  .on('mouseout', function(event, d) {
    nodeElements.attr('fill-opacity', n => n.type === 'debunked' ? 0.25 : 0.7);
    labelElements.attr('fill-opacity', 1);
    linkElements.attr('stroke-opacity', 0.25).attr('stroke-width', 1);
    d3.select(this).attr('r', radiusScale(d.sessions.length));
    tooltip.classList.remove('visible');
  });

linkElements
  .on('mouseover', function(event, d) {
    if (d.rationale) {
      tooltip.innerHTML =
        '<div class="tt-rationale">\u201C' + d.rationale + '\u201D</div>' +
        '<div class="tt-sessions" style="margin-top:8px">' +
          (d.sessions || []).join(', ') + '</div>';
      tooltip.classList.add('visible');
    }
    d3.select(this).attr('stroke-opacity', 1).attr('stroke-width', 3);
  })
  .on('mousemove', function(event) {
    tooltip.style.left = (event.clientX + 18) + 'px';
    tooltip.style.top = (event.clientY - 12) + 'px';
  })
  .on('mouseout', function() {
    tooltip.classList.remove('visible');
    d3.select(this).attr('stroke-opacity', 0.25).attr('stroke-width', 1);
  });

nodeElements.call(d3.drag()
  .on('start', (event, d) => {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x; d.fy = d.y;
  })
  .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
  .on('end', (event, d) => {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null; d.fy = null;
  })
);

simulation.on('tick', () => {
  linkElements
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  nodeElements.attr('cx', d => d.x).attr('cy', d => d.y);
  labelElements.attr('x', d => d.x).attr('y', d => d.y);
});

// Filters
const activeFilters = new Set(['theory', 'evidence', 'debunked', 'suspect']);

window.toggleFilter = function(type) {
  const btn = document.querySelector('.filter-btn[data-type="' + type + '"]');
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    btn.classList.remove('active');
  } else {
    activeFilters.add(type);
    btn.classList.add('active');
  }
  applyFilters();
};

function applyFilters() {
  const q = document.getElementById('search-box').value.toLowerCase().trim();

  nodeElements.attr('display', d => {
    if (!activeFilters.has(d.type)) return 'none';
    if (q && !d.label.toLowerCase().includes(q) && !(d.details||'').toLowerCase().includes(q)) return 'none';
    return null;
  });
  labelElements.attr('display', d => {
    if (!activeFilters.has(d.type)) return 'none';
    if (q && !d.label.toLowerCase().includes(q) && !(d.details||'').toLowerCase().includes(q)) return 'none';
    return null;
  });
  linkElements.attr('display', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    const sn = nodeById[s], tn = nodeById[t];
    if (!sn || !tn) return 'none';
    if (!activeFilters.has(sn.type) || !activeFilters.has(tn.type)) return 'none';
    if (q) {
      const sm = sn.label.toLowerCase().includes(q) || (sn.details||'').toLowerCase().includes(q);
      const tm = tn.label.toLowerCase().includes(q) || (tn.details||'').toLowerCase().includes(q);
      if (!sm && !tm) return 'none';
    }
    return null;
  });
}

document.getElementById('search-box').addEventListener('input', applyFilters);

// Auto-zoom to fit after simulation settles
setTimeout(() => {
  const bounds = g.node().getBBox();
  if (bounds.width > 0 && bounds.height > 0) {
    const scale = Math.min(
      width / (bounds.width + 120),
      height / (bounds.height + 120)
    ) * 0.85;
    const cx = bounds.x + bounds.width / 2;
    const cy = bounds.y + bounds.height / 2;
    svg.transition().duration(1200).call(
      zoom.transform,
      d3.zoomIdentity
        .translate(width / 2 - cx * scale, height / 2 - cy * scale)
        .scale(scale)
    );
  }
}, 3500);

window.addEventListener('resize', () => {
  svg.attr('width', window.innerWidth).attr('height', window.innerHeight);
});
</script>
</body>
</html>
