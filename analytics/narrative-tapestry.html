.detail-panel{display:none;background:linear-gradient(135deg,#12121e,#0e0e1a);border:1px solid #2a2a40;border-radius:10px;margin:0 20px 20px;padding:20px 24px;border-top:2px solid #ffd700;animation:panelSlide 0.4s cubic-bezier(0.4,0,0.2,1)}

.detail-events li:last-child{border-bottom:none}
.detail-events .ev-header{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.detail-events .ev-session{font-family:'JetBrains Mono',monospace;font-size:11px;color:#ad6bff;min-width:36px}

.detail-hooks li{padding:4px 0;font-size:12px;color:#9999b0;padding-left:12px;position:relative}

.legend{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;padding:4px 20px 12px}
.legend-marker{display:flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#8888aa;letter-spacing:1px;text-transform:uppercase}

<script>
const THREADS = [{"id":"thread_001","title":"Lilith's Ecclesiastical Trial and Myrkul Pact","type":"Character Arc","status":"Active","first":5,"last":22,"entities":["Orla","Elder Inscrutable","Lilith","Myrkul","Kelemvor","Lady of Pain"],"hooks":["Follow up on the mentor's abrupt departure","Continue Orla's training with the dragon egg or other projects","Manage the commune's growth and spy network"],"events":[{"s":5,"t":"advance","sum":"Orla's mentor, Elder Inscrutable, arrives for an in-person review of Orla's druidic training. The party hastily prepares a presentation involving forged notes, a tour of the Feywild portal, nature log"},{"s":17,"t":"advance","sum":"Lilith establishes a wellness commune in the High Forest, grows her followers to 4,000, and pledges fealty to Myrkul to resurrect her brother, shifting from Grave Domain to Death Domain cleric and gai"},{"s":22,"t":"reveal","sum":"Orla received a dark blessing (Zephyr's Veil) after the party was punished by the Lady of Pain, reducing them to level 10 upon entering Sanctum via a wish spell."}]},{"id":"thread_002","title":"Billabong's Celestial Powers","type":"Character Arc","status":"Active","first":3,"last":16,"entities":["Billabong"],"hooks":["Explore the new celestial abilities and their implications","Investigate the history of the Solarum entities","Consider how this fusion affects group dynamics"],"events":[{"s":3,"t":"advance","sum":"One of the two Solarum orbs (sun and moon entities) was fading after its partner was absorbed by the eldritch slime. Billabong willingly fused with it, gaining celestial powers: +2 Strength (up to 24)"},{"s":16,"t":"advance","sum":"Billabong's celestial powers activated outside of time, granting telepathic communication between party members at different rift sites and enhancing her abilities."}]},{"id":"thread_003","title":"Corras's Eyelash Heist and Simulacrum","type":"Character Arc","status":"Pending","first":8,"last":35,"entities":["Corras","Ash","Ave","Orla","Billabong","Dahlia"],"hooks":["Cast the simulacrum ritual","Guard the ritual site","Retrieve Spark after creation"],"events":[{"s":8,"t":"advance","sum":"The party devised a plan to create a simulacrum of Spark using the stolen eyelash, requiring a 12-hour ritual, while managing distractions and past party suspicions."},{"s":22,"t":"advance","sum":"The party successfully infiltrated Web's Edge, the secret hideout of Lolth followers, by picking an arcane-locked iron door after navigating through webs and using spider disguises."},{"s":25,"t":"create","sum":"Bastion roles are assigned: Corras administers the BWB Federation from Castle Corras, Orla oversees the High Forest and druids (EPA), Ash handles intelligence and magical defenses (NSA), Dahlia manage"},{"s":33,"t":"advance","sum":"Billabong is dominated by the lich using Dominate Person but freed when Calm Emotions suppresses the charm effect. She later uses Nightmare's Leash to brand Corras, allowing her to track his location "},{"s":35,"t":"advance","sum":"Corras stole Dahlia's broken dragon turtle hood and gave it to Foehammer along with his ring of mind shielding to craft a legendary replacement, escalating their rivalry."}]},{"id":"thread_004","title":"Drenek's Squirrel Curse","type":"Character Arc","status":"Active","first":10,"last":10,"entities":["Drenek"],"hooks":["Investigate the haunted mansion for curse removal","Seek a cleric or wizard to break the curse","Use the curse for comic relief or tactical advantage"],"events":[{"s":10,"t":"reveal","sum":"Drenek revealed he is cursed by squirrels after chopping up stuffed squirrels in a haunted mansion, causing them to haunt and sing to him."}]},{"id":"thread_005","title":"Corras's Deck of Many Things Aftermath","type":"Character Arc","status":"Active","first":10,"last":10,"entities":["Corras","Ilmater"],"hooks":["Decide whether to use the Fates card to undo the draws","Explore the far north castle for resources","Integrate the duke title into party dynamics"],"events":[{"s":10,"t":"advance","sum":"Corras recounted drawing 11 cards from the Deck of Many Things, resulting in being trapped in an extra-dimensional portal, losing his main character, and becoming a duke of a castle in the far north, "}]},{"id":"thread_006","title":"Argentus's Influence on Ash","type":"Character Arc","status":"Resolved","first":11,"last":16,"entities":["Ash","Argentus","Sarlumon"],"hooks":["Monitor Argentus for further hostile actions","Seek a way to communicate with or control Argentus","Discuss the incident with the party to assess trust issues"],"events":[{"s":11,"t":"escalate","sum":"Argentus (the sentient arm) exerted control over Ash, forcing her to cast Suggestion on Sarlumon to throw Ash into a pit trap, revealing its manipulative and potentially dangerous nature."},{"s":16,"t":"reveal","sum":"Ash lost an arm while escaping an alternate timeline battlefield using Misty Step, sacrificing it to break free from magical restraints, though this event was undone by the Fates card."}]},{"id":"thread_007","title":"Fleshy's Transformation","type":"Character Arc","status":"Active","first":14,"last":14,"entities":["Fleshy"],"hooks":["Investigate Fleshy's full transformation process","Utilize his healing abilities in future conflicts"],"events":[{"s":14,"t":"reveal","sum":"Fleshy partially transformed back to human and cast mass healing word during combat, revealing regained wizard abilities."}]},{"id":"thread_008","title":"Dahlia's Soul Conduit and Vengeance Oath","type":"Character Arc","status":"Active","first":16,"last":18,"entities":["Dahlia","Kelemvor","Celestials"],"hooks":["Experiment with soul conduit abilities in combat or social situations.","Consider how this power aligns with Dahlia's paladin oath.","Explore Dahlia's personal quest for vengeance against specific celestial figures."],"events":[{"s":16,"t":"reveal","sum":"Dahlia tapped into Kelemvor's soul conduit power, gaining abilities like necrotic resistance and ancestral wisdom without needing followers present."},{"s":18,"t":"create","sum":"Dahlia joins the party as an aasimar paladin with an oath of vengeance against celestials after her hometown was destroyed by them; she seeks the Soul Forge as a weapon."}]},{"id":"thread_009","title":"Ash's Shadow Glass Heritage and Feywild Connections","type":"Character Arc","status":"Active","first":17,"last":44,"entities":["Ash","Princess of Shadow Glass","Keeper of the Veiled Path","Queen of Air and Darkness","Morgantha","Thorn"],"hooks":["Explore the transformed companions' abilities","Monitor Feywild reactions","Leverage Harper connections"],"events":[{"s":17,"t":"reveal","sum":"Ash learns she is the Princess of Shadow Glass, a banished fey entity with lost power tied to three obsidian shards; she chooses not to absorb them but gives them to trusted companions, becoming the O"},{"s":25,"t":"advance","sum":"Ash seeks to resolve threats from the Feywild (Queen of Air and Darkness and former patron Morgantha) and understand her Princess of Shadowgloss link to the Shadowfell, aiming to gather information an"},{"s":44,"t":"advance","sum":"Ash was banished to the Feywild by SavannahBelle, spent months there evading the Wild Hunt, reclaimed her familiar Spark from a green dragon named Thorn, and returned with enhanced abilities."}]},{"id":"thread_010","title":"SavannahBelle's Aberrant Connection and Retribution","type":"Character Arc","status":"Active","first":25,"last":25,"entities":["SavannahBelle"],"hooks":["Locate and establish the Sanctuary of Retribution.","Target Celestial entities for imprisonment."],"events":[{"s":25,"t":"create","sum":"SavannahBelle is a conduit for an Aberrant entity, seeking retribution against Celestials who destroyed her village. Her bastion, the Sanctuary of Retribution, imprisons powerful beings and has layers"}]},{"id":"thread_011","title":"Corras's Changeling Backstory and Family","type":"Character Arc","status":"Active","first":31,"last":34,"entities":["Corras","Asnar the Crimson","Sarek"],"hooks":["Corras should investigate his past ties to cults","Follow up on the Everlund lead personally","Protect Corras from capture by the Red Wizards."],"events":[{"s":31,"t":"advance","sum":"The DM hinted that the shipping crate mystery ties to Corras's background and cult reports in his realm, suggesting personal stakes."},{"s":32,"t":"escalate","sum":"Asnar the Crimson, a lich and leader of the Red Wizards encountered, identified Corras as a changeling and target for capture to complete 'experimentation' on changelings. This directly ties to Corras"},{"s":33,"t":"advance","sum":"Corras confronts the lich Asnar the Crimson, who reveals he has been torturing Corras's family and friends instead of killing them. Corras makes a deal to surrender in exchange for the party's safety,"},{"s":34,"t":"reveal","sum":"A twin brother named Sarek, who is Corras's opposite and had been imprisoned, is revealed. Sarek claims Corras took his life and identity, leading to a confrontation where Sarek attempts to kill Corra"}]},{"id":"thread_012","title":"Ezrella's Modified Memory and Vampiric Corruption","type":"Character Arc","status":"Active","first":33,"last":36,"entities":["Ezrella","Asnar the Crimson","Priests of Osibus"],"hooks":["Use Greater Restoration or Remove Curse to undo the memory modification","Have Ezrella confront the lich about the deception","Explore how this false memory affects her relationships with the party"],"events":[{"s":33,"t":"reveal","sum":"Ezrella has her memory modified by the lich using Modify Memory, making her believe the lich saved her life and that she owes him a life debt. This affects her actions during the confrontation, as she"},{"s":36,"t":"create","sum":"Ezrella is cursed with vampiric corruption after being bitten by a Priest of Osibus, causing disadvantage on constitution and wisdom saves, halved healing, and ongoing necrotic damage."}]},{"id":"thread_013","title":"SavannahBelle's Paranoia and Vampiric Transformation","type":"Character Arc","status":"Active","first":36,"last":42,"entities":["SavannahBelle","Strahd von Zarovich","Ezrella"],"hooks":["Find a way to remove the curse (e.g., greater restoration)","Use SavannahBelle's paranoia to advantage in wizard-related situations","Monitor for escalation of the condition"],"events":[{"s":36,"t":"create","sum":"SavannahBelle is cursed with extreme paranoia after an encounter with Strahd von Zarovich's illusion, giving her disadvantage on wisdom and charisma checks and a fear of wizards."},{"s":41,"t":"escalate","sum":"SavannahBelle drank from a cursed chalice in Strahd's heart chamber, was paralyzed, attacked by Ezrella under a crown's influence, and then turned into a vampire spawn by Strahd."},{"s":42,"t":"advance","sum":"SavannahBelle, turned into a vampire spawn by Strahd, is now an enemy combatant under Strahd's control. She uses etherealness and greater invisibility to maneuver, posing a direct threat to the party."}]},{"id":"thread_014","title":"Shrum's Memory Restoration","type":"Character Arc","status":"Active","first":42,"last":42,"entities":["Shrum","Popovsky","Ludmilla","Anastrazia","Escher","Strahd von Zarovich"],"hooks":["Use the mirror to target remaining Brides (Anastrazia, Escher)","Leverage Shrum's restored knowledge for tactical advantage"],"events":[{"s":42,"t":"reveal","sum":"Shrum stabilizes the reassembled mirror, restoring his memories. He learns he was a bard enslaved by Strahd, his soul trapped in the mirror, and that he knows how to destroy the Brides by forcing them"}]},{"id":"thread_015","title":"Graymark Mercenaries","type":"Faction","status":"Active","first":8,"last":44,"entities":["Corras","Ash","Ave","Orla","Morty","Darz"],"hooks":["Cast the simulacrum ritual","Guard the ritual site","Retrieve Spark after creation"],"events":[{"s":8,"t":"advance","sum":"The party devised a plan to create a simulacrum of Spark using the stolen eyelash, requiring a 12-hour ritual, while managing distractions and past party suspicions."},{"s":17,"t":"advance","sum":"Corras vassalizes nearby towns, creating a small empire, but faces a rebellion in Jalanthar; he lets rebels go, leading to their destruction by celestials, and later rejects celestial demands, plungin"},{"s":25,"t":"advance","sum":"BWB Federation has expanded, settling a metropolitan area around Castle Corras with refugees from Waterdeep, Neverwinter, etc. It includes dwarves, elves, goblins, orcs, and druids, governed under a c"},{"s":28,"t":"advance","sum":"The party finalized their combined bastions: Billabong/Ash's bastion in the north near Mithral Hall, SavannahBelle's Sanctuary of Retribution in the Nether Mountains, and Dahlia/Corras's combined fina"},{"s":43,"t":"escalate","sum":"After being forced into the Matron's ritual and freed, Isteval accuses the party of violating his mind and leaves with his paladins, potentially turning refugees against the party."},{"s":44,"t":"escalate","sum":"Lord Isteval is rallying refugees and Lord's Alliance soldiers against BWB, accusing them of mind control and murder. This has turned a significant portion of the camp against the party, risking open "}]},{"id":"thread_016","title":"Celestial War and Treaty Breach","type":"Faction","status":"Active","first":17,"last":17,"entities":["Celestials","Devils","Demons","Matron","Coven"],"hooks":["Investigate celestial motives further","Explore the soul forge as a potential power source","Forge alliances with neutral factions"],"events":[{"s":17,"t":"reveal","sum":"DM reveals the backdrop of the celestial war: Mercuria celestials broke the Pact of Cosmic Equilibrium to establish a foothold in the material plane, leading to a three-way conflict with fiends and el"}]},{"id":"thread_017","title":"Coven Schism and Lord's Alliance","type":"Faction","status":"Active","first":25,"last":27,"entities":["Drakkar","Nyla","Matron","Alton Whisperwind","Vexara Spellweaver","Valtor"],"hooks":["Gather intelligence on Drakkar's movements and army strength.","Support rebellion in annexed cities like Triboar and Yartar.","Establish contact with resistance leaders in Triboar or Yartar."],"events":[{"s":25,"t":"advance","sum":"The Coven has splintered: Drakkar (Lord of Terror) and Nyla (Lady of Shadows) led a coup, taking most armies and openly taking over the Lord's Alliance. They are militaristic and expansionist, renamin"},{"s":27,"t":"advance","sum":"DM highlighted opportunities to support resistance movements in Triboar and Yartar, cities taken over by the Lord's Alliance under Drakkar. The party can gather intel, create propaganda, or aid rebell"}]},{"id":"thread_018","title":"Red Wizards of Thay","type":"Faction","status":"Active","first":32,"last":32,"entities":["Corras","Ezrella","Asnar the Crimson","Red Wizards of Thay"],"hooks":["Dispel the imprisonment on SavannahBelle or fulfill its condition (burn the warehouse).","Deal with the antipathy/sympathy field affecting Ezrella.","Decide whether to fight, flee, or negotiate with the Red Wizards, given their high-level capabilities."],"events":[{"s":32,"t":"advance","sum":"The party investigated Warehouse 17 in Everlund, following Ezrella's tip about enchanted crates linked to the Red Wizards of Thay. They found crates labeled 'Zabriel and Sons' with hidden magical trap"}]},{"id":"thread_019","title":"Ulmist Inquisition","type":"Faction","status":"Active","first":36,"last":36,"entities":["Sarusanda Al-Ester"],"hooks":["Learn more about the Ulmist Inquisition's goals","Use Sarusanda's knowledge to navigate the Death House","Maintain the alliance while pursuing the rod piece"],"events":[{"s":36,"t":"create","sum":"The party meets Sarusanda of the Ulmist Inquisition, a secret order hunting existential evils, who proposes an alliance to stop the Cult of Osibus ritual in the Death House."}]},{"id":"thread_020","title":"Castle Corras Upgrades and Obsidian Dome","type":"Location","status":"Resolved","first":3,"last":46,"entities":["Morty","Mordenkainen","Lolth","Ash","Corras","Zibblebottom"],"hooks":["Utilize the new alchemy lab for potions","Explore individual room features and teleportation circles","Manage castle affairs with Morty's reports"],"events":[{"s":3,"t":"advance","sum":"Morty, the castle's steward, completed major renovations: individual pocket dimension rooms for each party member, an alchemy lab with potion vendor, a blacksmith, library, kitchen, and audience chamb"},{"s":21,"t":"advance","sum":"Mordenkainen reveals the first Rod of Seven Parts is hidden in Web's Edge, a secret Lolth sanctuary in the Underdark. The party portals to the Underdark and begins searching for the entrance."},{"s":24,"t":"resolve","sum":"The party used a scroll of planar alignment to escape Web's Edge, arriving at Castle Corras, ending the immediate threat."},{"s":46,"t":"advance","sum":"Zibblebottom claims to have improved the obsidian dome's stability with his Ziblomatic Integrity Monitoring Array, reducing power consumption and increasing integrity, though with risks of catastrophi"}]},{"id":"thread_021","title":"Poisoned Fey Tree Portal and Seed of the Elder Grove","type":"Location","status":"Pending","first":4,"last":44,"entities":["Orla","Radoth"],"hooks":["Study the portal's instability and poison effects.","Consult with fey experts like Ash or druidic circles.","Find a green dragon to activate the seed"],"events":[{"s":4,"t":"create","sum":"Orla planted a heartwood seed with the shadow glass shard, creating a fey-touched tree that acts as an unstable portal to the Feywild, seeping the same poison affecting the Moonlit Thicket."},{"s":44,"t":"create","sum":"Radoth gave Orla the Seed of the Elder Grove, a magical seed that can create hallowed ground when activated by a green dragon's fire, with the ultimate goal of planting it in Chult to restore the land"}]},{"id":"thread_022","title":"Abandoned Cabin and Dwarven Tunnels","type":"Location","status":"Active","first":19,"last":20,"entities":["Cyril Maldron","Corras"],"hooks":["Climb ick's caravan."},{"s":21,"t":"escalate","sum":"A Drow mage discovers the party in the Underdark, subjects them to tests of devotion to Lolth, and combat erupts when SavannahBelle fails the web test."},{"s":22,"t":"advance","sum":"The party successfully infiltrated Web's Edge, the secret hideout of Lolth followers, by picking an arcane-locked iron door after navigating through webs and using spider disguises."},{"s":23,"t":"escalate","sum":"A deep gnome ritual master arrived to investigate, initially deceived by Ash using Friends. After the spell ended, he became hostile, declared the party enemies of Lolth for using mind-control magic, "},{"s":24,"t":"reveal","sum":"Ash deceived the spider dragon, a lieutenant of Lolth, into following her, revealing the dragon's role and Lolth's communication artifact."},{"s":24,"t":"resolve","sum":"The party betrayed and abandoned Gertrude the cyclops, leading to her capture and death by Web's Edge forces."},{"s":26,"t":"resolve","sum":"Dahlia recruited the cyclops Gertrude as a sister, but the party abandoned her during the escape; she was killed by Web's Edge forces, sacrificing herself to delay pursuers."},{"s":37,"t":"reveal","sum":"Strahd uses vampiric charm on SavannahBelle, making her see him as a trusted friend. She is compelled to hand over the rod piece, but the party intervenes."},{"s":38,"t":"advance","sum":"The party discussed Strahd von Zarovich's deal: he will let them leave Barovia if they retrieve the second piece of the rod and the Staff of Kazon for him, in exchange for Ash's soul and safe passage."},{"s":41,"t":"advance","sum":"The party fought Madam Eva, who cursed several members before disappearing. They looted her tent, acquiring magical items including a Deck of Many Things, Staff of Power, Robe of Stars, and cursed ite"},{"s":42,"t":"advance","sum":"Baba Lysaga appears to Lydia, calling her 'little leech' and revealing she is Strahd's mother. She gives Lydia the Sunsword, explaining it can incapacitate Strahd for two rounds or turn his thralls ba"},{"s":44,"t":"advance","sum":"Dahlia and Corras freed Valerius (Master of Whispers) from the Matron's control by amputating his leg to remove a rune she inscribed. He regained his autonomy and pledged allegiance to Corras."}]},{"id":"thread_046","title":"Urgle Gurgle","type":"NPC","status":"Active","first":14,"last":14,"entities":["Fleshy"],"hooks":["Investigate Fleshy's full transformation process","Utilize his healing abilities in future conflicts"],"events":[{"s":14,"t":"reveal","sum":"Fleshy partially transformed back to human and cast mass healing word during combat, revealing regained wizard abilities."}]},{"id":"thread_047","title":"Lilith's Disciples","type":"NPC","status":"Active","first":4,"last":4,"entities":["Lilith","Mother Volna"],"hooks":["Lilith to address her disciples and manage their influx.","Investigate Mother Volna's response to the schism."],"events":[{"s":4,"t":"reveal","sum":"A raven messenger was revealed to be a shapeshifted disciple of Lilith, part of a group of 40 who have abandoned the Abbey to worship Lilith as Kelemvor's prophet, seeking her guidance."}]},{"id":"thread_048","title":"Billabong's Dougs","type":"NPC","status":"Active","first":17,"last":17,"entities":["Billabong","Dougs"],"hooks":["Utilize Dougs for trade and espionage","Explore the helm's curse and abilities","Integrate with party resources"],"events":[{"s":17,"t":"create","sum":"Billabong saves a village of mini-gnomes from rats, gaining 250 followers named the Dougs; she opts for them to be wandering merchants with a rotating group of five always with her, and acquires the H"}]},{"id":"thread_049","title":"Cyril Maldron","type":"NPC","status":"Active","first":20,"last":20,"entities":["Cyril Maldron"],"hooks":["Learn more about Cyril's past","Explore his connection to Zibblebottoms"],"events":[{"s":20,"t":"create","sum":"After death, the party met the ghost of Cyril Maldron, the inventor of the Summer Star, who explained his failed attempt to unlock the Forge of Spells and offered to guide them back as spirits."}]},{"id":"thread_050","title":"Orla and Toad Demons","type":"NPC","status":"Active","first":23,"last":26,"entities":["Orla","Demon Toad","Hezrou Toad","Hezrou"],"hooks":["Communicate with Orla inside the toad via telepathy","Coordinate the toad's movement for escape","Ensure Orla's safety inside the toad"],"events":[{"s":23,"t":"advance","sum":"Orla charmed the summoned demon toad with Charm Monster, then persuaded it to join the party as a friend. It swallowed Orla and rolled away with her, planning to escape together."},{"s":24,"t":"advance","sum":"Orla befriended a Hezrou (giant toad) in Web's Edge, using sending stones to communicate, and it escaped with the party."},{"s":26,"t":"advance","sum":"The Hezrou demon (toad) aided the party by attacking pursuers and providing sending stones for communication, though it was left behind during the escape."}]},{"id":"thread_051","title":"Zibblebottoms","type":"NPC","status":"Active","first":29,"last":29,"entities":["Zibblebottoms","Ash"],"hooks":["Find a way back to the cave to rescue Zibblebottoms","Send a message to warn him or redirect him","Prepare for combat upon return"],"events":[{"s":29,"t":"advance","sum":"The party summoned the gnomish engineer Zibblebottoms to help with the constructs, but they completed the ritual and left the chamber. Zibblebottoms is due to arrive in about 30 minutes, potentially i"}]},{"id":"thread_052","title":"SavannahBelle and Bovanacell","type":"NPC","status":"Active","first":34,"last":34,"entities":["SavannahBelle","Bovanacell (Nothic)"],"hooks":["Explore the Nothic's abilities and integration into the party","Manage the risks of the suicide pact"],"events":[{"s":34,"t":"create","sum":"SavannahBelle forms a blood pact with a Nothic named Bovanacell (nicknamed SavannahBelle Jr.), creating a psychic tether with shared abilities and a suicide pact if either dies."}]},{"id":"thread_053","title":"Tser Pool Camp","type":"NPC","status":"Active","first":46,"last":46,"entities":["Cernunnos","Thorn the Dragon"],"hooks":["Decide which character joins the Wild Hunt","Plan a rescue mission for the captured character","Learn more about Cernunnos's weaknesses"],"events":[{"s":46,"t":"create","sum":"The party encounters Cernunnos, leader of the Wild Hunt, who offers a compact: if they win a chase within 10 miles, he releases Thorn the dragon; if they lose, one joins the Hunt forever. The party fa"}]},{"id":"thread_054","title":"Rahadin","type":"NPC","status":"Resolved","first":42,"last":42,"entities":["Rahadin","Izzy","Meg","Lydia","Zal","Shrum"],"hooks":["Loot Rahadin's body for any remaining items or clues","Proceed immediately to the final battle with Strahd"],"events":[{"s":42,"t":"resolve","sum":"The party defeats Rahadin in combat, destroying his soul-scimitar and freeing the trapped dusk elf souls. This removes a major lieutenant of Strahd and opens the way to the final confrontation."}]},{"id":"thread_055","title":"Baba Lysaga","type":"NPC","status":"Active","first":42,"last":42,"entities":["Baba Lysaga","Lydia","Strahd von Zarovich","SavannahBelle"],"hooks":["Decide whether to use Sunsword on Strahd or on SavannahBelle to revert her vampirism","Coordinate with party for maximum effect"],"events":[{"s":42,"t":"advance","sum":"Baba Lysaga appears to Lydia, calling her 'little leech' and revealing she is Strahd's mother. She gives Lydia the Sunsword, explaining it can incapacitate Strahd for two rounds or turn his thralls ba"}]},{"id":"thread_056","title":"Van Richten","type":"NPC","status":"Active","first":42,"last":42,"entities":["Van Richten","Zal","Strahd von Zarovich"],"hooks":["Ensure Van Richten's safety if he stabilizes","Consider his role in the final battle against Strahd"],"events":[{"s":42,"t":"advance","sum":"Van Richten takes a Power Word Kill spell meant for Zal, leaving him dying. Zal stabilizes him with a medicine check, and Van Richten urges her to 'do what I could not' before falling unconscious."}]},{"id":"thread_057","title":"Lumin Town Council and Castle Corras Funding","type":"Obligation","status":"Active","first":1,"last":1,"entities":["Corras","Lumin Town Council"],"hooks":["Negotiate with the town council on repayment terms","Use castle resources or quests to offset costs","Improve public relations in Lumin to mitigate future liabilities"],"events":[{"s":1,"t":"create","sum":"After the etin's rampage, the Lumin town council holds Castle Corras financially liable for the damage, since Urgle Gurgle is now allied with the castle. They request an audience to discuss funding fo"}]},{"id":"thread_058","title":"Xalvador's Capture by Still Sorrow","type":"Obligation","status":"Active","first":4,"last":4,"entities":["Xalvador","Lilith","Still Sorrow"],"hooks":["Rescue Xalvador from Everlund.","Decide on a response to the Still Sorrow's demands."],"events":[{"s":4,"t":"escalate","sum":"Xalvador was captured by the Still Sorrow while planting misinformation about Lilith's whereabouts; they sent a raven with his finger demanding Lilith's location, threatening execution."}]},{"id":"thread_059","title":"Lilith's Divine Intervention Attempts","type":"Obligation","status":"Pending","first":6,"last":6,"entities":["Dahlia"],"hooks":["Attempt Divine Intervention again after a long rest","Prepare specific request (e.g., Gate spell)","Coordinate with party for backup plans"],"events":[{"s":6,"t":"advance","sum":"Lilith attempted Divine Intervention to escape the crypt, but it failed; she can try again after a long rest, with the party considering using it for Gate or other planar travel."}]},{"id":"thread_060","title":"Spark Rescue Heist at Castle Corras","type":"Obligation","status":"Active","first":7,"last":45,"entities":["Corras","Spark","Ash","Orla","Ave","Lilith"],"hooks":["Corras must escape after plucking eyelash, potentially confronting past self","Ash to start simulacrum creation with eyelash","Regroup and proceed to Underdark or other plans"],"events":[{"s":7,"t":"create","sum":"The party splits to execute a heist: Corras (invisible) sneaks into Castle Corras to steal rubies for a simulacrum and pluck an eyelash from Spark, while others create distractions or pursue side obje"},{"s":13,"t":"create","sum":"The party, trapped in Berdusk dungeons, made a pact with the demon Glabrezu Malachar the Twisted to escape. Each member owes a future favor to be called within one year, with terms including no morall"},{"s":45,"t":"advance","sum":"The party accidentally interrupted Lord Neverember's funeral procession led by SavannahBelle bees. They gave improvised eulogies, with SavannahBelle successfully placating the crowd by offering her ri"}]},{"id":"thread_061","title":"Corras's Imprisonment and Netherese Relic","type":"Obligation","status":"Active","first":12,"last":12,"entities":["Corras","Fleshy","Master of Whispers"],"hooks":["Deliver the relic to the Master of Whispers as instructed.","Learn more about the relic's purification and uses."],"events":[{"s":12,"t":"advance","sum":"Corras, imprisoned in the castle dungeon, learned from Fleshy about the Netherese relic's properties (a shadow-imbued battery) and was reminded by the Master of Whispers to deliver it within 12 hours."}]},{"id":"thread_062","title":"Billabong's Resurrection via Lathander","type":"Obligation","status":"Resolved","first":20,"last":20,"entities":["Billabong","Lathander","Cyril Maldron"],"hooks":[],"events":[{"s":20,"t":"resolve","sum":"Billabong, guided by ghostly messages, retrieved a ring and attuned to the Summer Star, prompting Lathander to resurrect the party in exchange for the device and granting Billabong a blessing."}]},{"id":"thread_063","title":"Vecna Artifact Retrieval Mission","type":"Obligation","status":"Active","first":22,"last":22,"entities":["Mordenkainen","Tasha","Illustriel Silverhand","Vecna"],"hooks":["Proceed carefully within Web's Edge to find the Rod piece","Monitor time constraints as the mission is time-sensitive"],"events":[{"s":22,"t":"advance","sum":"The party advanced their mission to retrieve a piece of the Rod of Seven Parts from Web's Edge, as tasked by Mordenkainen, Tasha, and Illustriel Silverhand to stop Vecna."}]},{"id":"thread_064","title":"Billabong's Demon Summoning Consequences","type":"Obligation","status":"Active","first":31,"last":31,"entities":["Billabong","Vrocks"],"hooks":["Research safer demon-binding techniques","Deal with lingering demonic threats"],"events":[{"s":31,"t":"escalate","sum":"Billabong summoned two Vrocks during the battle; after fulfilling their contract, they remained free and attacked the party, revealing ongoing risks of her demon-summoning powers."}]},{"id":"thread_065","title":"SavannahBelle's Imprisonment and Recovery","type":"Obligation","status":"Resolved","first":33,"last":34,"entities":["SavannahBelle","Asnar the Crimson","Wally (Otyug)"],"hooks":["Find a way to dispel the Imprisonment spell (e.g., 9th-level Dispel Magic)","Return to the warehouse to ensure it burns down completely","Investigate if the lich or Red Wizards have plans for SavannahBelle"],"events":[{"s":33,"t":"advance","sum":"SavannahBelle remains chained to the floor by a level 9 Imprisonment spell, with the condition that she is freed only if the warehouse burns down. The lich casts Leomund's Tiny Hut to protect her from"},{"s":34,"t":"advance","sum":"SavannahBelle recovers most of the party's stolen equipment from a sewer area with help from an Otyug named Wally, though some items were taken earlier by Sarek."}]},{"id":"thread_066","title":"Cernunnos's Wild Hunt Compact","type":"Obligation","status":"Active","first":46,"last":46,"entities":["Cernunnos","Thorn the Dragon"],"hooks":["Decide which character joins the Wild Hunt","Plan a rescue mission for the captured character","Learn more about Cernunnos's weaknesses"],"events":[{"s":46,"t":"create","sum":"The party encounters Cernunnos, leader of the Wild Hunt, who offers a compact: if they win a chase within 10 miles, he releases Thorn the dragon; if they lose, one joins the Hunt forever. The party fa"}]},{"id":"thread_067","title":"Castle Corras Management System","type":"Other","status":"Resolved","first":2,"last":26,"entities":["Corras","Ash","Dahlia","Orla","Ave","Billabong"],"hooks":["Decide on first building priorities (e.g., merchant plaza, caravansary) to generate income.","Hire specialists for key tasks like tax collection or research.","Explore nearby towns to establish trade or taxation relationships."],"events":[{"s":2,"t":"create","sum":"DM introduced a castle management system with rooms, followers, and monthly turns for building, hiring, and events. Players allocated gold and followers for the first month."},{"s":5,"t":"create","sum":"A group of 30+ fervent followers (Lilith's Loyalists) arrive at Castle Corras, led by Brother Alred and Sister Elowen, declaring Lilith their prophetess and setting up a shrine. They are highly devote"},{"s":13,"t":"reveal","sum":"Morty gave the party an amulet allowing spell replacement without a long rest, aiding their upcoming heist. He hinted at greater tasks ahead and cryptic interference."},{"s":26,"t":"resolve","sum":"Ash used a scroll of planar alignment to teleport the entire party from collapsing Web's Edge to Castle Corras, narrowly avoiding death."}]},{"id":"thread_068","title":"Boons from Vecna's Binding","type":"Other","status":"Active","first":21,"last":21,"entities":["Vecna","Mordenkainen","Illustrile","Tasha"],"hooks":["Monitor boon effects for unexpected consequences","Research Vecna's binding magic in Sanctum library"],"events":[{"s":21,"t":"create","sum":"The party receives mysterious boons/blessings from Vecna's binding ritual, each gaining unique magical abilities with potential sinister implications."}]},{"id":"thread_069","title":"Xel'therath the Eye of Midnight","type":"Threat","status":"Active","first":3,"last":3,"entities":["Xel'therath"],"hooks":["Determine the beholder's immediate plans for the castle","Investigate if it has other minions besides the trolls","Consider diplomatic or combat strategies to neutralize the threat"],"events":[{"s":3,"t":"create","sum":"A beholder named Xel'therath revealed itself in the caverns beneath Castle Corras, telepathically communicating with the party and demonstrating its illusory powers. It claims dominion over its lair a"}]},{"id":"thread_070","title":"Goblin Incursion and Fomorian Threat","type":"Threat","status":"Resolved","first":4,"last":46,"entities":["Niles Bargnot","Sarlumon","Corras","Lilith","Billabong","Ave"],"hooks":["Investigate the source of the goblin threat in the Nether Mountains.","Secure the region with patrols from Castle Corras.","Explore the area for Underdark entrances."],"events":[{"s":4,"t":"resolve","sum":"The party, with aid from Sarlumon's paladins, defeated the goblin horde led by Niles Bargnot at Havenbrook, pushing back the incursion from the Nether Mountains."},{"s":4,"t":"reveal","sum":"A Goblin Curse Spitter summoned three Fomorians\u00e2\u20ac\u201dtwisted fey giants\u00e2\u20ac\u201dduring the battle, indicating a nearby path to the Underdark and a connection to ancient fey conflicts."},{"s":6,"t":"escalate","sum":"After defeating the simulacrum, a magic mouth spell revealed the crypt is laced with explosive glyphs set to detonate in six minutes, forcing the party to flee and take shelter in Leomund's Tiny Hut a"},{"s":7,"t":"escalate","sum":"Multiple incidents cause chaos in the castle: Orla (as a condor) is chased by past Billabong after being spotted in alchemy lab, Lilith (de-aged) causes a scene with caravan children, and Ave uses dom"},{"s":9,"t":"escalate","sum":"The party locates Grimslick's stuck caravan with owlbears and slaves; Orla and Ash stealthily approach, but owlbears detect Orla, and a horse is revealed to be a mimic named Sid, prompting imminent co"},{"s":12,"t":"advance","sum":"Ash, Billabong, and Orla engaged Grimslick's caravan, leading to a combat where Ash cast Shatter on a wagon filled with explosives, triggering a catastrophic explosion. The party used time-stop potion"},{"s":18,"t":"advance","sum":"Foehammer warns the party of unnatural blizzards in the Storm Mountains, hinting at a stalker (possibly yeti-like) and the ancient white dragon Arvia Turris."},{"s":18,"t":"escalate","sum":"The party triggers an avalanche while traveling; during the aftermath, they observe spectral phantoms wandering the blizzard, adding a supernatural danger to the environment."},{"s":19,"t":"create","sum":"The party is surrounded by a frost giant and yetis while resting in Leomund's Tiny Hut. They attempt diplomacy and later use a keg of alchemist fire to escape, killing the frost giant and several yeti"},{"s":23,"t":"advance","sum":"The party battled a Nalfeshnee demon jailer in the prison area. After significant damage from spells like Fireball and Scorching Ray, Dahlia decapitated it, ending the immediate threat. The demon's de"},{"s":23,"t":"escalate","sum":"The Nalfeshnee blew a magical horn, alerting reinforcements. Ash and Corras scouted ahead and saw acolytes of Lolth and a slime pillar with an eye moving toward the party. Ash created a Wall of Force "},{"s":24,"t":"escalate","sum":"Web's Edge army, including spiders, mages, and demons, mobilized to hunt the party, leading to a chase and cavern collapse."},{"s":26,"t":"escalate","sum":"Ash deceived the spider dragon lieutenant of Lolth into following her, but the dragon discovered the theft of the rod piece, causing Web's Edge to collapse and triggering a chase."},{"s":26,"t":"advance","sum":"Billabong and SavannahBelle were trapped in a magical torture chamber with living chains; Orla dispelled the magic, allowing their rescue, but they were nearly eviscerated."},{"s":26,"t":"reveal","sum":"After retrieving the rod piece, Corras heard Lolth's voice speaking to him, though his Ring of Mind Shielding prevented full mental intrusion."},{"s":28,"t":"create","sum":"The party encountered shadow mastiffs in the Soul Cavern, with Orla establishing dominance over the alpha through a staged fight with Billabong, gaining safe passage."},{"s":28,"t":"escalate","sum":"Hulking flesh abominations (doughboys) were detected south of the temple, banging on the barricaded door, increasing immediate danger."},{"s":32,"t":"escalate","sum":"SavannahBelle was hit with a 9th-level imprisonment spell (chaining) by a Red Wizard, restraining her to the ground until the warehouse burns down or the spell is dispelled at 9th level."},{"s":33,"t":"escalate","sum":"After Corras surrenders, the lich and Red Wizards capture the entire party (except SavannahBelle), strip them of their belongings, and transport them to a prison in Thay. They are placed in isolated c"},{"s":34,"t":"advance","sum":"The party escapes their cells in a Thayan prison, confronts Asnar the Crimson (a lich) and Drek'nar (Lord of Terror), and stops a ritual to create a changeling flesh golem. Asnar is defeated but will "},{"s":36,"t":"reveal","sum":"The Priests of Osibus have undeath boons that allow them to resurrect stronger each time they are killed, requiring specific tactics to permanently defeat them."},{"s":37,"t":"resolve","sum":"The Crimson Abbot, a cult leader with a rod piece, is disintegrated by SavannahBelle. His remains form a blood baby that is frozen and shattered, ending the immediate threat in Death House."},{"s":37,"t":"escalate","sum":"The Death House mimic demands a sacrifice ('one must die') as the party tries to escape. The walls close in, and a skill challenge is imminent to avoid death."},{"s":37,"t":"advance","sum":"The party fights two shambling mounds in the reliquary. One is killed, and the other retreats, with the encounter revealing vulnerabilities (e.g., fire resistance, thunder healing)."},{"s":38,"t":"advance","sum":"The party navigated the Death House skill challenge, encountering ghouls, animated armor, spinning blades, and psychic horrors while trying to escape. They succeeded in getting out, but with two failu"},{"s":39,"t":"escalate","sum":"During watch, zombies approached the Tser Pool Camp, attracted by a failed minor illusion. Protective shimmering barriers on the wagons were noted, but the zombies may discover the party under the wag"},{"s":40,"t":"advance","sum":"Corras successfully stole the Holy Symbol of Ravenkind from Madam Eva by swapping it with a cursed necklace while she slept. This artifact is key to defeating Strahd, but its theft has angered Madam E"},{"s":40,"t":"escalate","sum":"After the thefts, Madam Eva trapped SavannahBelle and Dahlia in her tent with an anti-magic field, demanded the Deck's return, and forced Corras into a gamble. She used high-level spells like Geas and"},{"s":41,"t":"escalate","sum":"Strahd transported the party to his heart chamber, where they must destroy a crystalline heart powered by coffins representing his crown, love, and blood. The fight is ongoing, with SavannahBelle turn"},{"s":42,"t":"resolve","sum":"Dahlia purifies the profane blood in the coffin using Remove Curse, sacrificing half her max HP. This destroys the Heart of Sorrow, making Strahd vulnerable and stopping its damaging pulses."},{"s":42,"t":"escalate","sum":"After the Heart of Sorrow is destroyed, the Brides (Popovsky, Ludmilla, Anastrazia, Escher) appear and join the combat, adding significant enemies to the encounter."},{"s":43,"t":"advance","sum":"The party returns to Castle Corras after months away to find the Fey (Gloaming Court) have invaded and besieged the Sword Coast, with the castle protected by an obsidian shield. The Fey are led by the"},{"s":44,"t":"reveal","sum":"Orla discovered through Radoth's vision that Lieutenant Calen Vane (the Butcher) is experimenting with a geode-like stone that is poisoning the land and transforming it into the Gloaming Court. The st"},{"s":45,"t":"advance","sum":"The party faced a riot of 9,000 people (peasants, Lord's Alliance soldiers, paladins) after failing persuasion checks. Combat ensued, resulting in massive slaughter via reverse gravity, wall of fire, "},{"s":46,"t":"advance","sum":"Zibblebottom claims to have improved the obsidian dome's stability with his Ziblomatic Integrity Monitoring Array, reducing power consumption and increasing integrity, though with risks of catastrophi"}]},{"id":"thread_071","title":"Essence Drain Plague and Blight","type":"Threat","status":"Active","first":5,"last":5,"entities":[],"hooks":["Research the plague to find a cure or source","Consider Orla's ritual with arcane reserves","Delegate rangers to collect samples"],"events":[{"s":5,"t":"escalate","sum":"The magical blight affecting plants (reported by Orla) and essence drain plague affecting animals (reported by Billabong) are spreading in the region, with symptoms including blackened plants, shimmer"}]},{"id":"thread_072","title":"Temporal Disturbance and Sentinel","type":"Threat","status":"Active","first":15,"last":22,"entities":["Temporal Sentinel","Kelemvor","revenants","Remorhaz","Time Warden","Elenvor"],"hooks":["Navigate temporal bubbles to distract the Sentinel","Seal the rift with revenant assistance while fighting emerging creatures","Coordinate with revenants to perform sealing rituals"],"events":[{"s":15,"t":"escalate","sum":"A Temporal Sentinel appeared due to critical temporal disturbances, threatening to reset the universe unless the party seals a rift caused by their actions."},{"s":15,"t":"create","sum":"The party must seal a temporal rift spewing creatures, with Kelemvor providing revenant helpers, while others distract the Temporal Sentinel."},{"s":16,"t":"escalate","sum":"The Time Warden is actively resetting the universe, requiring the party to disrupt her concentration within five turns while navigating a chaotic rift field."},{"s":16,"t":"advance","sum":"Ethereal servants are attempting to seal a rift at the toilet house, requiring protection from creatures emerging each round, including a blue dragon and a balor."},{"s":22,"t":"reveal","sum":"Orla received a dark blessing (Zephyr's Veil) after the party was punished by the Lady of Pain, reducing them to level 10 upon entering Sanctum via a wish spell."}]},{"id":"thread_073","title":"Cult of Eternal Flame and Balor Summoning","type":"Threat","status":"Active","first":10,"last":11,"entities":["Eternal Flame Priest","fire genasi","tieflings","orcs","orogs","magmen"],"hooks":["Interrupt the ritual by attacking cultists to break concentration","Attempt to reverse the gate by channeling energy into it","Prepare for combat with a powerful demon or devil"],"events":[{"s":10,"t":"advance","sum":"The party discovered the cult's ritual to summon a Balor demon in a lava cave, with 28 hours remaining until completion. They learned the mechanics: at least two cultists must maintain concentration e"},{"s":11,"t":"create","sum":"An earth elemental spirit was encountered, angered by defilement of the land, possibly linked to the Cult of Eternal Flame's activities. It threatened the party but was temporarily placated."},{"s":11,"t":"advance","sum":"The party advanced toward the cult's ritual site, encountering a deceptive bridge and pit trap, indicating the cult's defensive measures and proximity to their activities."}]},{"id":"thread_074","title":"Berdusk Dungeons Demonic Presence","type":"Threat","status":"Active","first":13,"last":13,"entities":["Malachar the Twisted"],"hooks":["Investigate Lords Alliance demonic ties","Warn allies about Berdusk","Prepare for demonic threats"],"events":[{"s":13,"t":"escalate","sum":"Revealed Glabrezu demon Malachar and hellhounds in Berdusk dungeons, indicating a larger demonic plot. The demon served as translator and offered the pact, suggesting sinister activities by the Lords "}]},{"id":"thread_075","title":"Celestial and Fiendish War","type":"Threat","status":"Resolved","first":25,"last":25,"entities":[],"hooks":["Monitor the Scar for residual threats or opportunistic factions.","Consider humanitarian aid to affected areas."],"events":[{"s":25,"t":"resolve","sum":"The Celestial Foothold and Fiend Incursion have been resolved. Higher-ups in the Celestial hierarchy regained control, withdrew support, and took the war back to the Hells, causing demons and devils t"}]},{"id":"thread_076","title":"Dark Embrace Cult Infiltration","type":"Threat","status":"Active","first":25,"last":27,"entities":["Alar Shadowspeaker","Drakkar"],"hooks":["Investigate cult activities discreetly to gather evidence.","Develop a strategy to counter cult influence without violating freedoms.","Gather intelligence on the cult's activities within BWB."],"events":[{"s":25,"t":"escalate","sum":"The Dark Embrace cult, led by Alar Shadowspeaker, is insidiously growing within BWB territories, brainwashing and recruiting members. It worships dark entities and poses a significant internal threat "},{"s":27,"t":"advance","sum":"DM reminded the party of a cult led by Alar Shadowspeaker, working for Drakkar, trying to infiltrate the BWB federation. This cult threat was noted as a plot line the party can be proactive or reactiv"}]},{"id":"thread_077","title":"Ceaseless Maww Threat","type":"Threat","status":"Active","first":30,"last":30,"entities":["Ceaseless Maww"],"hooks":["Defeat the Ceaseless Maww to stop its destruction","Collect shadow essence from the Maww during the battle","Investigate the necromantic fissures in the cave"],"events":[{"s":30,"t":"create","sum":"The Harbinger warned of the Ceaseless Maww, a monstrous abomination devouring fertility as it moves through the world, currently south and heading north. The party tracked it to a cave near Daggerford"}]},{"id":"thread_078","title":"Lord of Terror and Bastion Defense","type":"Threat","status":"Active","first":35,"last":35,"entities":["Lord of Terror","Billabong"],"hooks":["Return to Faerun after retrieving the rod piece","Prepare defenses for the bastion","Rescue Billabong if possible"],"events":[{"s":35,"t":"escalate","sum":"The Lord of Terror's army (goblins, orcs, Lord's Alliance) is preparing to attack Ash's bastion. The party must return quickly or risk losing it."}]}];

const TYPE_ORDER=['Character Arc','Mystery','Threat','Faction','NPC','Obligation','Location','Other'];
const EVENT_COLORS={'create':'#4DB6AC','advance':'#ad6bff','escalate':'#ff4444','resolve':'#ffd700','reveal':'#81C784','reopen':'#FF8A65'};
const SESSIONS=46,RIBBON_H=14,RIBBON_GAP=2,GROUP_GAP=24,LABEL_W=180,COL_W=28,TOP_AXIS=36,BOTTOM_PAD=20;
let activeTypes=new Set(TYPE_ORDER),activeStatuses=new Set(['Active','Resolved','Pending']),selectedThread=null;
function sessionX(s){return LABEL_W+(s-0.5)*COL_W}
function init(){buildStats();buildFilters();buildMarkerLegend();buildDensity();buildMain()}
function buildStats(){const a=THREADS.filter(t=>t.status==='Active').length,r=THREADS.filter(t=>t.status==='Resolved').length,p=THREADS.filter(t=>t.status==='Pending').length,e=THREADS.reduce((a,t)=>a+t.events.length,0),l=THREADS.reduce((a,t)=>Math.max(a,t.last-t.first+1),0);document.getElementById('statsBar').innerHTML=`<div class="stat-item"><span>${THREADS.length}</span> Threads</div><div class="stat-item"><span>${a}</span> Active</div><div class="stat-item"><span>${r}</span> Resolved</div><div class="stat-item"><span>${p}</span> Pending</div><div class="stat-item"><span>${e}</span> Events</div><div class="stat-item"><span>${l}</span> Max Span</div>`}
function buildFilters(){const td=document.getElementById('typeFilters');TYPE_ORDER.forEach(type=>{const b=document.createElement('button');b.className='filter-btn active';b.textContent=type;b.style.setProperty('--btn-color',TYPE_COLORS[type]);b.style.setProperty('--btn-glow',TYPE_COLORS[type]+'44');b.addEventListener('click',()=>{if(activeTypes.has(type)){activeTypes.delete(type);b.classList.remove('active')}else{activeTypes.add(type);b.classList.add('active')}buildMain();buildDensity()});td.appendChild(b)});const sd=document.getElementById('statusFilters');['Active','Resolved','Pending'].forEach(s=>{const b=document.createElement('button');b.className='filter-btn status-btn active';b.textContent=s;b.addEventListener('click',()=>{if(activeStatuses.has(s)){activeStatuses.delete(s);b.classList.remove('active')}else{activeStatuses.add(s);b.classList.add('active')}buildMain();buildDensity()});sd.appendChild(b)})}
function buildMarkerLegend(){const lg=document.getElementById('markerLegend');[{s:'circle',l:'Create',c:'#4DB6AC'},{s:'tri-right',l:'Advance',c:'#ad6bff'},{s:'tri-up',l:'Escalate',c:'#ff4444'},{s:'star',l:'Resolve',c:'#ffd700'},{s:'diamond',l:'Reveal',c:'#81C784'},{s:'circle-o',l:'Reopen',c:'#FF8A65'}].forEach(m=>{const d=document.createElement('div');d.className='legend-marker';const sv=document.createElementNS('http://www.w3.org/2000/svg','svg');sv.setAttribute('width','14');sv.setAttribute('height','14');sv.setAttribute('viewBox','0 0 14 14');const g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('transform','translate(7,7)');drawM(g,m.s,m.c,5);sv.appendChild(g);d.appendChild(sv);const sp=document.createElement('span');sp.textContent=m.l;d.appendChild(sp);lg.appendChild(d)})}
function drawM(g,shape,color,r){const ns='http://www.w3.org/2000/svg';if(shape==='circle'){const c=document.createElementNS(ns,'circle');c.setAttribute('r',r*0.7);c.setAttribute('fill',color);g.appendChild(c)}else if(shape==='circle-o'){const c=document.createElementNS(ns,'circle');c.setAttribute('r',r*0.6);c.setAttribute('fill','none');c.setAttribute('stroke',color);c.setAttribute('stroke-width','1.5');g.appendChild(c)}else if(shape==='tri-right'){const p=document.createElementNS(ns,'polygon');const s=r*0.75;p.setAttribute('points',`${-s*0.5},${-s} ${s},0 ${-s*0.5},${s}`);p.setAttribute('fill',color);g.appendChild(p)}else if(shape==='tri-up'){const p=document.createElementNS(ns,'polygon');const s=r*0.75;p.setAttribute('points',`0,${-s} ${s},${s*0.7} ${-s},${s*0.7}`);p.setAttribute('fill',color);g.appendChild(p)}else if(shape==='star'){const p=document.createElementNS(ns,'polygon');const pts=[];for(let i=0;i<10;i++){const a=Math.PI/2+i*Math.PI/5;const rd=i%2===0?r*0.75:r*0.35;pts.push(`${Math.cos(a)*rd},${-Math.sin(a)*rd}`)}p.setAttribute('points',pts.join(' '));p.setAttribute('fill',color);g.appendChild(p)}else if(shape==='diamond'){const p=document.createElementNS(ns,'polygon');const s=r*0.7;p.setAttribute('points',`0,${-s} ${s},0 0,${s} ${-s},0`);p.setAttribute('fill',color);g.appendChild(p)}else{const c=document.createElementNS(ns,'circle');c.setAttribute('r',r*0.4);c.setAttribute('fill',color);g.appendChild(c)}}
function getEvShape(t){return{create:'circle',advance:'tri-right',escalate:'tri-up',resolve:'star',reveal:'diamond',reopen:'circle-o'}[t]||'dot'}
function buildDensity(){const f=THREADS.filter(t=>activeTypes.has(t.type)&&activeStatuses.has(t.status));const counts=[];for(let s=1;s<=SESSIONS;s++)counts.push({session:s,count:f.filter(t=>t.first<=s&&t.last>=s).length});const el=document.getElementById('densitySvg');const w=el.parentElement.clientWidth-32;const h=48;el.setAttribute('width',w);el.setAttribute('height',h);const svg=d3.select('#densitySvg');svg.selectAll('*').remove();const x=d3.scaleLinear().domain([1,SESSIONS]).range([24,w-8]);const y=d3.scaleLinear().domain([0,d3.max(counts,d=>d.count)||1]).range([h-4,4]);const area=d3.area().x(d=>x(d.session)).y0(h-4).y1(d=>y(d.count)).curve(d3.curveMonotoneX);const line=d3.line().x(d=>x(d.session)).y(d=>y(d.count)).curve(d3.curveMonotoneX);const defs=svg.append('defs');const grad=defs.append('linearGradient').attr('id','densGrad').attr('x1','0%').attr('y1','0%').attr('x2','0%').attr('y2','100%');grad.append('stop').attr('offset','0%').attr('stop-color','#ad6bff').attr('stop-opacity',0.4);grad.append('stop').attr('offset','100%').attr('stop-color','#ad6bff').attr('stop-opacity',0.02);svg.append('path').datum(counts).attr('d',area).attr('fill','url(#densGrad)');const pl=svg.append('path').datum(counts).attr('d',line).attr('fill','none').attr('stroke','#ad6bff').attr('stroke-width',1.5).attr('filter','drop-shadow(0 0 4px rgba(173,107,255,0.5))');const tl=pl.node().getTotalLength();pl.attr('stroke-dasharray',tl+' '+tl).attr('stroke-dashoffset',tl).transition().duration(1500).ease(d3.easeCubicInOut).attr('stroke-dashoffset',0);svg.selectAll('.dd').data(counts).enter().append('circle').attr('cx',d=>x(d.session)).attr('cy',d=>y(d.count)).attr('r',2).attr('fill','#ad6bff').attr('opacity',0).transition().delay((_,i)=>1200+i*30).duration(300).attr('opacity',1);svg.selectAll('.dl').data(counts.filter(d=>d.session%5===0||d.session===1||d.session===46)).enter().append('text').attr('x',d=>x(d.session)).attr('y',h-4).attr('text-anchor','middle').attr('font-size','8px').attr('font-family','JetBrains Mono').attr('fill','#444').text(d=>'S'+String(d.session).padStart(3,'0'))}
function buildMain(){const filtered=THREADS.filter(t=>activeTypes.has(t.type)&&activeStatuses.has(t.status));const groups=[];TYPE_ORDER.forEach(type=>{const threads=filtered.filter(t=>t.type===type);if(threads.length>0){threads.sort((a,b)=>a.first-b.first||(b.last-b.first)-(a.last-a.first));groups.push({type,threads})}});let totalH=TOP_AXIS;groups.forEach((g,i)=>{if(i>0)totalH+=GROUP_GAP;totalH+=18;totalH+=g.threads.length*(RIBBON_H+RIBBON_GAP)});totalH+=BOTTOM_PAD;const totalW=LABEL_W+SESSIONS*COL_W+20;const svg=d3.select('#mainSvg');svg.selectAll('*').remove();svg.attr('width',totalW).attr('height',totalH);const defs=svg.append('defs');const glow=defs.append('filter').attr('id','ribbonGlow');glow.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');const merge=glow.append('feMerge');merge.append('feMergeNode').attr('in','blur');merge.append('feMergeNode').attr('in','SourceGraphic');TYPE_ORDER.forEach(type=>{const rG=defs.append('linearGradient').attr('id','rG_'+type.replace(/\s/g,'')).attr('x1','0%').attr('y1','0%').attr('x2','100%').attr('y2','0%');rG.append('stop').attr('offset','0%').attr('stop-color',TYPE_COLORS[type]).attr('stop-opacity',0.15);rG.append('stop').attr('offset','50%').attr('stop-color',TYPE_COLORS[type]).attr('stop-opacity',0.3);rG.append('stop').attr('offset','100%').attr('stop-color',TYPE_COLORS[type]).attr('stop-opacity',0.15)});for(let s=1;s<=SESSIONS;s++){svg.append('line').attr('x1',sessionX(s)).attr('y1',TOP_AXIS-4).attr('x2',sessionX(s)).attr('y2',totalH-BOTTOM_PAD).attr('stroke',s%5===0?'#1e1e30':'#12121e').attr('stroke-width',1)}const ta=svg.append('g');for(let s=1;s<=SESSIONS;s++){if(s===1||s===SESSIONS||s%5===0)ta.append('text').attr('x',sessionX(s)).attr('y',TOP_AXIS-8).attr('text-anchor','middle').attr('font-family','JetBrains Mono').attr('font-size','9px').attr('fill','#555').text(s);ta.append('line').attr('x1',sessionX(s)).attr('y1',TOP_AXIS-4).attr('x2',sessionX(s)).attr('y2',TOP_AXIS).attr('stroke','#333')}let yPos=TOP_AXIS;const ribbonData=[];groups.forEach((group,gi)=>{if(gi>0)yPos+=GROUP_GAP;svg.append('rect').attr('x',0).attr('y',yPos-2).attr('width',LABEL_W-4).attr('height',16).attr('fill','rgba(173,107,255,0.06)').attr('rx',3);svg.append('text').attr('x',8).attr('y',yPos+10).attr('fill',TYPE_COLORS[group.type]).attr('font-family','Barlow Condensed').attr('font-weight','700').attr('font-size','10px').attr('letter-spacing','2px').attr('opacity',0.8).text(group.type.toUpperCase()+' ('+group.threads.length+')');yPos+=18;group.threads.forEach((thread,ti)=>{ribbonData.push({thread,y:yPos,gi,ti});yPos+=RIBBON_H+RIBBON_GAP})});const rg=svg.selectAll('.thread-ribbon').data(ribbonData).enter().append('g').attr('class','thread-ribbon').style('cursor','pointer');rg.each(function(d){const g=d3.select(this);const t=d.thread;const color=TYPE_COLORS[t.type];const x1=sessionX(t.first)-COL_W*0.4;const x2=sessionX(t.last)+COL_W*0.4;const w=x2-x1;const gId='rG_'+t.type.replace(/\s/g,'');const rect=g.append('rect').attr('x',x1).attr('y',d.y).attr('width',0).attr('height',RIBBON_H).attr('rx',3).attr('fill','url(#'+gId+')').attr('stroke',color).attr('stroke-width',t.status==='Pending'?1:0.7).attr('stroke-opacity',t.status==='Resolved'?0.4:0.7);if(t.status==='Pending')rect.attr('stroke-dasharray','4,3');if(t.status==='Resolved')rect.attr('opacity',0.5);const delay=d.gi*100+d.ti*40;rect.transition().delay(delay).duration(800).ease(d3.easeCubicOut).attr('width',w);if(t.status==='Resolved'){g.append('rect').attr('x',x2-3).attr('y',d.y).attr('width',3).attr('height',RIBBON_H).attr('fill','#ffd700').attr('opacity',0).transition().delay(delay+700).duration(300).attr('opacity',0.7)}const label=g.append('text').attr('x',10).attr('y',d.y+RIBBON_H*0.72).attr('font-family','Barlow Condensed').attr('font-size','10px').attr('fill','#888').attr('opacity',0).text(t.title.length>24?t.title.substring(0,22)+'...':t.title);label.transition().delay(delay+400).duration(400).attr('opacity',0.7);t.events.forEach((ev,ei)=>{const ex=sessionX(ev.s);if(ex>=x1&&ex<=x1+w){const mg=g.append('g').attr('transform','translate('+ex+','+(d.y+RIBBON_H/2)+')').attr('opacity',0);drawMSVG(mg,getEvShape(ev.t),EVENT_COLORS[ev.t]||color,RIBBON_H*0.35);mg.transition().delay(delay+500+ei*60).duration(400).attr('opacity',1)}})});const tooltip=d3.select('#tooltip');rg.on('mouseenter',function(event,d){const t=d.thread;const color=TYPE_COLORS[t.type];d3.select(this).select('rect').attr('filter','url(#ribbonGlow)').attr('stroke-width',2).attr('stroke-opacity',1);svg.selectAll('.thread-ribbon').filter(dd=>dd!==d).transition().duration(200).attr('opacity',0.25);d3.select(this).transition().duration(200).attr('opacity',1);let h='<div class="tt-type" style="color:'+color+'">'+t.type+'</div>';h+='<div class="tt-title" style="color:'+color+'">'+t.title+'</div>';const sc=t.status==='Active'?'#4DB6AC':t.status==='Resolved'?'#ffd700':'#FF8A65';h+='<div class="tt-status">Status: <span style="color:'+sc+'">'+t.status+'</span></div>';h+='<div class="tt-span">S'+String(t.first).padStart(3,'0')+' \u2014 S'+String(t.last).padStart(3,'0')+' ('+( t.last-t.first+1)+' sessions)</div>';if(t.events.length>0){h+='<div class="tt-events">';t.events.slice(0,4).forEach(ev=>{h+='<div class="ev-item"><span class="ev-session">S'+String(ev.s).padStart(3,'0')+'</span> <span style="color:'+(EVENT_COLORS[ev.t]||'#888')+'">'+ev.t+'</span></div>'});if(t.events.length>4)h+='<div class="ev-item" style="color:#555">+'+(t.events.length-4)+' more...</div>';h+='</div>'}tooltip.html(h).style('display','block')}).on('mousemove',function(event){const tt=document.getElementById('tooltip');const tw=tt.offsetWidth;const th=tt.offsetHeight;let left=event.clientX+16;let top=event.clientY-10;if(left+tw>window.innerWidth-20)left=event.clientX-tw-16;if(top+th>window.innerHeight-20)top=window.innerHeight-th-20;if(top<10)top=10;tooltip.style('left',left+'px').style('top',top+'px')}).on('mouseleave',function(){d3.select(this).select('rect').attr('filter',null).attr('stroke-width',d=>d.thread.status==='Pending'?1:0.7).attr('stroke-opacity',d=>d.thread.status==='Resolved'?0.4:0.7);svg.selectAll('.thread-ribbon').transition().duration(300).attr('opacity',d=>d.thread.status==='Resolved'?0.5:1);tooltip.style('display','none')}).on('click',function(event,d){event.stopPropagation();showDetail(d.thread)})}
function drawMSVG(g,shape,color,r){if(shape==='circle'){g.append('circle').attr('r',r*0.65).attr('fill',color)}else if(shape==='circle-o'){g.append('circle').attr('r',r*0.55).attr('fill','none').attr('stroke',color).attr('stroke-width','1.5')}else if(shape==='tri-right'){const s=r*0.7;g.append('polygon').attr('points',`${-s*0.5},${-s} ${s},0 ${-s*0.5},${s}`).attr('fill',color)}else if(shape==='tri-up'){const s=r*0.7;g.append('polygon').attr('points',`0,${-s} ${s},${s*0.7} ${-s},${s*0.7}`).attr('fill',color)}else if(shape==='star'){const pts=[];for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5;const rd=i%2===0?r*0.7:r*0.3;pts.push(`${Math.cos(a)*rd},${Math.sin(a)*rd}`)}g.append('polygon').attr('points',pts.join(' ')).attr('fill',color)}else if(shape==='diamond'){const s=r*0.65;g.append('polygon').attr('points',`0,${-s} ${s},0 0,${s} ${-s},0`).attr('fill',color)}else{g.append('circle').attr('r',r*0.35).attr('fill',color)}}
function showDetail(t){selectedThread=t;const panel=document.getElementById('detailPanel');const color=TYPE_COLORS[t.type];document.getElementById('detailTitle').innerHTML='<span style="color:'+color+'">'+t.title+'</span>';panel.style.borderTopColor=color;const sc=t.status==='Active'?'#4DB6AC':t.status==='Resolved'?'#ffd700':'#FF8A65';let m='<div class="detail-meta-item"><strong style="color:'+color+'">'+t.type+'</strong></div>';m+='<div class="detail-meta-item">Status: <strong style="color:'+sc+'">'+t.status+'</strong></div>';m+='<div class="detail-meta-item">Span: <strong>S'+String(t.first).padStart(3,'0')+' \u2014 S'+String(t.last).padStart(3,'0')+'</strong> ('+(t.last-t.first+1)+' sessions)</div>';m+='<div class="detail-meta-item">Events: <strong>'+t.events.length+'</strong></div>';document.getElementById('detailMeta').innerHTML=m;let c='';if(t.entities.length>0){c+='<div class="detail-section-title">Key Entities</div><div class="detail-entities">';t.entities.forEach(e=>{c+='<span class="entity-tag" style="border-color:'+color+'44;background:'+color+'15">'+e+'</span>'});c+='</div>'}c+='<div class="detail-section-title">Event Timeline</div><ul class="detail-events">';t.events.forEach(ev=>{const ec=EVENT_COLORS[ev.t]||'#888';c+='<li><div class="ev-header"><span class="ev-session">S'+String(ev.s).padStart(3,'0')+'</span><span class="ev-type" style="color:'+ec+';border:1px solid '+ec+'44">'+ev.t+'</span></div><div>'+ev.sum+'</div></li>'});c+='</ul>';if(t.hooks.length>0){c+='<div class="detail-section-title">Open Hooks</div><ul class="detail-hooks">';t.hooks.forEach(h=>{c+='<li>'+h+'</li>'});c+='</ul>'}document.getElementById('detailContent').innerHTML=c;panel.classList.add('visible');panel.scrollIntoView({behavior:'smooth',block:'nearest'})}
document.getElementById('detailClose').addEventListener('click',()=>{document.getElementById('detailPanel').classList.remove('visible');selectedThread=null});
document.addEventListener('click',e=>{if(!e.target.closest('#detailPanel')&&!e.target.closest('.thread-ribbon')){document.getElementById('detailPanel').classList.remove('visible');selectedThread=null}});
window.addEventListener('resize',()=>{buildDensity()});
init();
</script>
</body>
