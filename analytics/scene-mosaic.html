<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCENE MOSAIC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    background:#06060c;color:#c8c8e0;font-family:'Barlow',sans-serif;
    min-height:100vh;position:relative;overflow-x:hidden;
  }

  body::after{
    content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
    pointer-events:none;z-index:9999;
  }

  .header{
    text-align:center;padding:24px 20px 14px;position:relative;
  }
  .header::after{
    content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:80%;height:1px;
    background:linear-gradient(90deg,transparent,#4DB6AC,#81C784,#4DB6AC,transparent);
    opacity:.5;
  }

  .title{
    font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:14px;line-height:1;
    background:linear-gradient(135deg,#4DB6AC,#81C784);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 30px rgba(77,182,172,.4)) drop-shadow(0 0 60px rgba(129,199,132,.2));
    margin-bottom:2px;
  }
  .subtitle{
    font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:13px;
    letter-spacing:6px;text-transform:uppercase;color:#8888aa;
  }

  /* Stats Bar */
  .stats-bar{
    display:flex;gap:0;justify-content:center;align-items:stretch;
    padding:12px 24px;flex-wrap:wrap;
  }
  .stat-card{
    background:linear-gradient(135deg,#12121e,#1a1a2e);
    border:1px solid #1e1e35;border-radius:0;
    padding:10px 20px;text-align:center;min-width:140px;
    position:relative;
  }
  .stat-card:first-child{border-radius:6px 0 0 6px}
  .stat-card:last-child{border-radius:0 6px 6px 0}
  .stat-card+.stat-card{border-left:none}
  .stat-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,#4DB6AC,#81C784);opacity:.6;
  }
  .stat-card:first-child::before{border-radius:6px 0 0 0}
  .stat-card:last-child::before{border-radius:0 6px 0 0}
  .stat-label{
    font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:10px;
    letter-spacing:3px;text-transform:uppercase;color:#6a6a88;margin-bottom:2px;
  }
  .stat-value{
    font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;
    color:#e0e0f0;
    text-shadow:0 0 12px rgba(77,182,172,.3);
  }
  .stat-value.accent{color:#4DB6AC}

  /* Stacked bar for scene types */
  .type-bar-wrap{
    display:flex;align-items:center;gap:10px;padding:4px 24px 8px;
    justify-content:center;
  }
  .type-bar-label{
    font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:10px;
    letter-spacing:3px;text-transform:uppercase;color:#6a6a88;white-space:nowrap;
  }
  .type-bar{
    display:flex;height:14px;border-radius:7px;overflow:hidden;
    flex:1;max-width:700px;
    box-shadow:0 0 8px rgba(0,0,0,.4);
  }
  .type-bar-seg{
    transition:flex .6s ease;position:relative;cursor:pointer;
  }
  .type-bar-seg:hover{filter:brightness(1.3)}
  .type-bar-seg:first-child{border-radius:7px 0 0 7px}
  .type-bar-seg:last-child{border-radius:0 7px 7px 0}

  /* Legend */
  .legend{
    display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
    padding:4px 24px 10px;
  }
  .legend-item{
    display:flex;align-items:center;gap:5px;
    font-family:'Barlow Condensed',sans-serif;font-size:12px;
    color:#8888aa;letter-spacing:1px;
  }
  .legend-swatch{
    width:10px;height:10px;border-radius:2px;
    box-shadow:0 0 6px currentColor;
  }

  /* Breadcrumb */
  .breadcrumb{
    padding:6px 24px;display:flex;align-items:center;gap:6px;
    font-family:'Barlow Condensed',sans-serif;font-size:13px;
    letter-spacing:2px;color:#6a6a88;min-height:30px;
  }
  .breadcrumb span{cursor:pointer;transition:color .2s}
  .breadcrumb span:hover{color:#4DB6AC}
  .breadcrumb .bc-active{color:#c8c8e0;cursor:default}
  .breadcrumb .bc-sep{color:#3a3a50;cursor:default}

  /* Treemap container */
  .treemap-wrap{
    padding:0 20px 20px;display:flex;justify-content:center;
  }
  #treemap{
    width:100%;max-width:1400px;
    background:#0a0a14;
    border:1px solid #1a1a2e;border-radius:8px;
    position:relative;overflow:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.5),inset 0 0 60px rgba(0,0,0,.3);
  }

  /* Treemap tiles */
  .tile{
    position:absolute;overflow:hidden;cursor:pointer;
    transition:opacity .3s ease;
    border:0.5px solid rgba(6,6,12,.8);
  }
  .tile:hover{
    filter:brightness(1.25);
    z-index:10;
  }
  .tile-label{
    position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:4px 6px;text-align:center;overflow:hidden;
    pointer-events:none;
  }
  .tile-label-sid{
    font-family:'Bebas Neue',sans-serif;font-size:14px;
    color:rgba(255,255,255,.85);letter-spacing:2px;line-height:1;
    text-shadow:0 1px 4px rgba(0,0,0,.8);
  }
  .tile-label-name{
    font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:300;
    color:rgba(255,255,255,.55);line-height:1.1;margin-top:1px;
    text-shadow:0 1px 3px rgba(0,0,0,.8);
    max-height:22px;overflow:hidden;
  }
  .tile-label-scene{
    font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:400;
    color:rgba(255,255,255,.8);line-height:1.15;
    text-shadow:0 1px 4px rgba(0,0,0,.9);
    max-height:80%;overflow:hidden;
  }
  .tile-label-type{
    font-family:'JetBrains Mono',monospace;font-size:8px;
    color:rgba(255,255,255,.45);letter-spacing:1px;text-transform:uppercase;
    margin-top:2px;
    text-shadow:0 1px 3px rgba(0,0,0,.8);
  }

  /* Tooltip */
  .tooltip{
    position:fixed;pointer-events:none;z-index:10000;
    background:rgba(10,10,20,.95);
    border:1px solid #2a2a44;border-radius:6px;
    padding:10px 14px;max-width:320px;
    backdrop-filter:blur(10px);
    box-shadow:0 4px 20px rgba(0,0,0,.6);
    opacity:0;transition:opacity .15s;
    font-size:13px;
  }
  .tooltip.visible{opacity:1}
  .tooltip-title{
    font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;
    margin-bottom:4px;line-height:1;
  }
  .tooltip-row{
    display:flex;justify-content:space-between;gap:16px;
    font-family:'Barlow',sans-serif;font-size:12px;color:#8888aa;
    line-height:1.6;
  }
  .tooltip-row .val{
    font-family:'JetBrains Mono',monospace;color:#c8c8e0;font-size:11px;
  }
  .tooltip-type{
    display:inline-block;padding:1px 6px;border-radius:3px;
    font-family:'JetBrains Mono',monospace;font-size:10px;
    margin-top:4px;
  }
  .tooltip-energy-bar{
    height:4px;border-radius:2px;margin-top:6px;
    background:#1a1a2e;overflow:hidden;
  }
  .tooltip-energy-fill{
    height:100%;border-radius:2px;
    transition:width .3s;
  }

  /* Back button */
  .back-btn{
    position:absolute;top:8px;left:8px;z-index:100;
    background:rgba(10,10,20,.8);border:1px solid #2a2a44;
    color:#8888aa;font-family:'Barlow Condensed',sans-serif;
    font-size:12px;letter-spacing:2px;text-transform:uppercase;
    padding:4px 12px;border-radius:4px;cursor:pointer;
    transition:all .2s;display:none;
    backdrop-filter:blur(6px);
  }
  .back-btn:hover{color:#4DB6AC;border-color:#4DB6AC}
  .back-btn.visible{display:block}
</style>
</head>

// ── COLOR MAP ──
const TYPE_COLORS = {
  Combat:               '#ef4444',
  Social_Encounter:     '#BA68C8',
  Exploration:          '#4DB6AC',
  Exposition:           '#4A90D9',
  Skill_Challenge:      '#fbbf24',
  Character_Management: '#81C784',
  Ritual:               '#ad6bff',
  Puzzle:               '#FF8A65',
  Meta:                 '#3a3a50',
  Off_Topic:            '#3a3a50',
  Recap:                '#3a3a50'
};

const TYPE_LABELS = {
  Combat: 'Combat',
  Social_Encounter: 'Social',
  Exploration: 'Exploration',
  Exposition: 'Exposition',
  Skill_Challenge: 'Skill Challenge',
  Character_Management: 'Char Mgmt',
  Ritual: 'Ritual',
  Puzzle: 'Puzzle',
  Meta: 'Meta',
  Off_Topic: 'Off Topic',
  Recap: 'Recap'
};

// ── STATS ──
const totalScenes = DATA.reduce((a, s) => a + s.scene_count, 0);
const totalLines = DATA.reduce((a, s) => a + s.total_lines, 0);
const avgScenes = (totalScenes / DATA.length).toFixed(1);

// Scene type counts
const typeCounts = {};
DATA.forEach(s => s.scenes.forEach(sc => {
  typeCounts[sc.scene_type] = (typeCounts[sc.scene_type] || 0) + 1;
}));
const sortedTypes = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);
const mostCommon = TYPE_LABELS[sortedTypes[0][0]] || sortedTypes[0][0];

// Build stats bar
const statsBar = document.getElementById('statsBar');
const stats = [
  { label: 'Total Scenes', value: totalScenes, accent: true },
  { label: 'Sessions', value: DATA.length },
  { label: 'Avg per Session', value: avgScenes },
  { label: 'Total Lines', value: totalLines.toLocaleString() },
  { label: 'Most Common', value: mostCommon },
];
stats.forEach(st => {
  const card = document.createElement('div');
  card.className = 'stat-card';
  card.innerHTML = `<div class="stat-label">${st.label}</div><div class="stat-value ${st.accent ? 'accent' : ''}">${st.value}</div>`;
  statsBar.appendChild(card);
});

// Build type bar
const typeBar = document.getElementById('typeBar');
sortedTypes.forEach(([type, count]) => {
  const seg = document.createElement('div');
  seg.className = 'type-bar-seg';
  seg.style.flex = count;
  seg.style.background = TYPE_COLORS[type] || '#3a3a50';
  seg.title = `${TYPE_LABELS[type] || type}: ${count} scenes`;
  typeBar.appendChild(seg);
});

// Build legend
const legendEl = document.getElementById('legend');
const legendOrder = ['Combat','Social_Encounter','Exploration','Exposition','Skill_Challenge','Character_Management','Ritual','Puzzle','Meta','Off_Topic','Recap'];
legendOrder.forEach(type => {
  if (!typeCounts[type]) return;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<div class="legend-swatch" style="background:${TYPE_COLORS[type]};color:${TYPE_COLORS[type]}"></div>${TYPE_LABELS[type]} (${typeCounts[type]})`;
  legendEl.appendChild(item);
});

// ── TREEMAP ──
const container = document.getElementById('treemap');
const backBtn = document.getElementById('backBtn');
const tooltip = document.getElementById('tooltip');
const breadcrumb = document.getElementById('breadcrumb');

const TREEMAP_HEIGHT = 680;
let containerWidth;
let currentView = 'campaign'; // or session_id
let currentSessionData = null;

function getWidth() {
  return container.clientWidth;
}

function energyToOpacity(energy, type) {
  // Map energy 1-10 to opacity range
  const dimTypes = ['Meta', 'Off_Topic', 'Recap'];
  const minOp = dimTypes.includes(type) ? 0.25 : 0.35;
  const maxOp = 1.0;
  const e = Math.max(1, Math.min(10, energy));
  return minOp + (maxOp - minOp) * ((e - 1) / 9);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return { r, g, b };
}

function buildCampaignView() {
  currentView = 'campaign';
  currentSessionData = null;
  backBtn.classList.remove('visible');
  breadcrumb.innerHTML = '<span class="bc-active">Campaign</span>';
  container.style.height = TREEMAP_HEIGHT + 'px';

  // Remove old tiles
  container.querySelectorAll('.tile').forEach(t => t.remove());

  const width = getWidth();

  // Build hierarchy
  const root = d3.hierarchy({
    name: 'campaign',
    children: DATA.map(s => ({
      name: s.session_id,
      label: s.session_label,
      data: s,
      value: s.total_lines
    }))
  }).sum(d => d.value).sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([width, TREEMAP_HEIGHT])
    .tile(d3.treemapSquarify.ratio(1.2))
    .paddingOuter(2)
    .paddingInner(2)
    (root);

  const leaves = root.leaves();

  leaves.forEach((leaf, i) => {
    const s = leaf.data.data;
    const w = leaf.x1 - leaf.x0;
    const h = leaf.y1 - leaf.y0;
    if (w < 1 || h < 1) return;

    // Compute dominant type color for the session
    const typeLines = {};
    s.scenes.forEach(sc => {
      typeLines[sc.scene_type] = (typeLines[sc.scene_type] || 0) + sc.line_count;
    });
    const dominantType = Object.entries(typeLines).sort((a, b) => b[1] - a[1])[0][0];
    const baseColor = TYPE_COLORS[dominantType] || '#3a3a50';
    const rgb = hexToRgb(baseColor);
    const op = energyToOpacity(s.overall_energy_average, dominantType);

    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.left = leaf.x0 + 'px';
    tile.style.top = leaf.y0 + 'px';
    tile.style.width = w + 'px';
    tile.style.height = h + 'px';
    tile.style.background = `rgba(${rgb.r},${rgb.g},${rgb.b},${op})`;
    tile.style.boxShadow = `inset 0 0 ${Math.min(w,h)*0.3}px rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`;
    tile.style.opacity = 0;

    // Label
    const label = document.createElement('div');
    label.className = 'tile-label';
    const sidShort = s.session_id;
    if (w > 45 && h > 28) {
      label.innerHTML = `<div class="tile-label-sid">${sidShort}</div>`;
      if (w > 80 && h > 48) {
        const nameShort = s.session_label.length > 30 ? s.session_label.slice(0, 28) + '...' : s.session_label;
        label.innerHTML += `<div class="tile-label-name">${nameShort}</div>`;
      }
    }
    tile.appendChild(label);

    // Hover
    tile.addEventListener('mouseenter', (e) => showTooltip(e, 'session', s));
    tile.addEventListener('mousemove', (e) => moveTooltip(e));
    tile.addEventListener('mouseleave', hideTooltip);

    // Click to zoom
    tile.addEventListener('click', () => zoomToSession(s));

    container.appendChild(tile);

    // Stagger entrance
    setTimeout(() => {
      tile.style.opacity = 1;
    }, 30 + i * 12);
  });
}

function zoomToSession(session) {
  currentView = session.session_id;
  currentSessionData = session;
  backBtn.classList.add('visible');
  breadcrumb.innerHTML = `<span onclick="buildCampaignView()">Campaign</span><span class="bc-sep">&rsaquo;</span><span class="bc-active">${session.session_id}: ${session.session_label}</span>`;

  // Remove old tiles
  container.querySelectorAll('.tile').forEach(t => t.remove());

  const width = getWidth();
  container.style.height = TREEMAP_HEIGHT + 'px';

  // Build hierarchy for this session's scenes
  const root = d3.hierarchy({
    name: session.session_id,
    children: session.scenes.map(sc => ({
      name: sc.scene_title,
      data: sc,
      value: sc.line_count
    }))
  }).sum(d => d.value).sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([width, TREEMAP_HEIGHT])
    .tile(d3.treemapSquarify.ratio(1.1))
    .paddingOuter(4)
    .paddingInner(3)
    (root);

  const leaves = root.leaves();

  leaves.forEach((leaf, i) => {
    const sc = leaf.data.data;
    const w = leaf.x1 - leaf.x0;
    const h = leaf.y1 - leaf.y0;
    if (w < 1 || h < 1) return;

    const baseColor = TYPE_COLORS[sc.scene_type] || '#3a3a50';
    const rgb = hexToRgb(baseColor);
    const op = energyToOpacity(sc.energy_score, sc.scene_type);

    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.left = leaf.x0 + 'px';
    tile.style.top = leaf.y0 + 'px';
    tile.style.width = w + 'px';
    tile.style.height = h + 'px';
    tile.style.background = `rgba(${rgb.r},${rgb.g},${rgb.b},${op})`;
    tile.style.boxShadow = `inset 0 0 ${Math.min(w,h)*0.4}px rgba(${rgb.r},${rgb.g},${rgb.b},0.2), 0 0 ${op > 0.7 ? 8 : 0}px rgba(${rgb.r},${rgb.g},${rgb.b},${op * 0.3})`;
    tile.style.opacity = 0;
    tile.style.cursor = 'default';

    // Label
    const label = document.createElement('div');
    label.className = 'tile-label';

    if (w > 50 && h > 30) {
      const maxChars = Math.floor(w / 6.5);
      let title = sc.scene_title;
      if (title.length > maxChars) title = title.slice(0, maxChars - 2) + '...';
      label.innerHTML = `<div class="tile-label-scene">${title}</div>`;
      if (w > 80 && h > 55) {
        label.innerHTML += `<div class="tile-label-type">${TYPE_LABELS[sc.scene_type] || sc.scene_type}</div>`;
      }
    }

    tile.appendChild(label);

    // Hover
    tile.addEventListener('mouseenter', (e) => showTooltip(e, 'scene', sc, session));
    tile.addEventListener('mousemove', (e) => moveTooltip(e));
    tile.addEventListener('mouseleave', hideTooltip);

    container.appendChild(tile);

    // Stagger entrance
    setTimeout(() => {
      tile.style.opacity = 1;
    }, 40 + i * 30);
  });
}

// ── TOOLTIP ──
function showTooltip(e, level, data, session) {
  let html = '';
  if (level === 'session') {
    const s = data;
    const typeLines = {};
    s.scenes.forEach(sc => { typeLines[sc.scene_type] = (typeLines[sc.scene_type] || 0) + sc.line_count; });
    const dominant = Object.entries(typeLines).sort((a, b) => b[1] - a[1])[0][0];
    html = `
      <div class="tooltip-title" style="color:${TYPE_COLORS[dominant]}">${s.session_id}: ${s.session_label}</div>
      <div class="tooltip-row"><span>Scenes</span><span class="val">${s.scene_count}</span></div>
      <div class="tooltip-row"><span>Runtime</span><span class="val">${s.estimated_runtime_minutes} min</span></div>
      <div class="tooltip-row"><span>Pace</span><span class="val">${s.pace_classification}</span></div>
      <div class="tooltip-row"><span>Energy Avg</span><span class="val">${s.overall_energy_average}/10</span></div>
      <div class="tooltip-row"><span>Total Lines</span><span class="val">${s.total_lines.toLocaleString()}</span></div>
      <div class="tooltip-energy-bar"><div class="tooltip-energy-fill" style="width:${s.overall_energy_average * 10}%;background:${TYPE_COLORS[dominant]}"></div></div>
      <div style="margin-top:6px;font-size:10px;color:#555;font-style:italic">Click to zoom in</div>
    `;
  } else {
    const sc = data;
    const color = TYPE_COLORS[sc.scene_type] || '#3a3a50';
    html = `
      <div class="tooltip-title" style="color:${color}">${sc.scene_title}</div>
      <div class="tooltip-type" style="background:${color}33;color:${color};border:1px solid ${color}55">${TYPE_LABELS[sc.scene_type] || sc.scene_type}</div>
      <div style="margin-top:6px">
        <div class="tooltip-row"><span>Energy</span><span class="val">${sc.energy_score}/10</span></div>
        <div class="tooltip-row"><span>Pace</span><span class="val">${sc.pace_tag}</span></div>
        <div class="tooltip-row"><span>Lines</span><span class="val">${sc.line_count.toLocaleString()}</span></div>
        <div class="tooltip-row"><span>Scene #</span><span class="val">${sc.scene_number}${session ? ' of ' + session.scene_count : ''}</span></div>
      </div>
      <div class="tooltip-energy-bar"><div class="tooltip-energy-fill" style="width:${sc.energy_score * 10}%;background:${color}"></div></div>
    `;
  }
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const pad = 14;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth - 10) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight - 10) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
}

// Back button
backBtn.addEventListener('click', () => {
  buildCampaignView();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && currentView !== 'campaign') {
    buildCampaignView();
  }
});

// Resize
let resizeTimeout;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    if (currentView === 'campaign') buildCampaignView();
    else if (currentSessionData) zoomToSession(currentSessionData);
  }, 200);
});

// Initial render
buildCampaignView();
</script>
