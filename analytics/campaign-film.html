<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE CAMPAIGN FILM &mdash; BWB Campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{background:#06060c;color:#c8c8e0;font-family:'Barlow',sans-serif;height:100vh;overflow:hidden;position:relative;cursor:default}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* ===== TITLE SCREEN ===== */
#title-screen{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06060c;transition:opacity 1.4s ease,transform 1.4s ease}
#title-screen.hidden{opacity:0;pointer-events:none;transform:scale(1.08)}
#title-screen canvas{position:absolute;inset:0;z-index:0}
#title-screen .content{position:relative;z-index:1;text-align:center}
#title-screen h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,12vw,140px);letter-spacing:0.18em;background:linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444,#a855f7,#3b82f6,#22d3ee,#fbbf24);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:prismatic 6s ease infinite;line-height:1;filter:drop-shadow(0 0 40px rgba(251,191,36,0.2))}
#title-screen .subtitle{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:clamp(14px,2.5vw,26px);color:#6b6b8a;letter-spacing:0.5em;margin-top:12px;text-transform:uppercase}
#title-screen .enter-btn{margin-top:52px;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;letter-spacing:0.35em;text-transform:uppercase;color:#fbbf24;background:transparent;border:1px solid rgba(251,191,36,0.3);padding:14px 52px;cursor:pointer;transition:all 0.4s;border-radius:2px}
#title-screen .enter-btn:hover{background:rgba(251,191,36,0.08);border-color:#fbbf24;box-shadow:0 0 40px rgba(251,191,36,0.15),inset 0 0 20px rgba(251,191,36,0.05);transform:scale(1.02)}
#title-screen .stats-line{font-family:'JetBrains Mono',monospace;font-size:12px;color:#444466;margin-top:28px;letter-spacing:0.12em}
@keyframes prismatic{0%,100%{background-position:0% 50%}25%{background-position:50% 0%}50%{background-position:100% 50%}75%{background-position:50% 100%}}

/* ===== FILM VIEWPORT ===== */
#film-viewport{position:fixed;inset:0;overflow:hidden}
#bg-layer{position:absolute;inset:0;z-index:0;transition:background 1.2s ease}
#dimension-overlay{position:absolute;inset:0;z-index:1;pointer-events:none;transition:all 1.5s ease;opacity:0}
#dimension-overlay.active{opacity:1}
.dim-barovia{background:linear-gradient(180deg,rgba(25,5,8,0.7) 0%,rgba(40,10,15,0.4) 50%,rgba(25,5,8,0.7) 100%)}
.dim-underdark{background:linear-gradient(180deg,rgba(0,8,25,0.8) 0%,rgba(5,12,35,0.4) 50%,rgba(0,5,18,0.6) 100%)}
.dim-feywild{background:linear-gradient(180deg,rgba(0,35,10,0.4) 0%,rgba(10,45,20,0.2) 50%,rgba(0,25,10,0.4) 100%)}
.dim-soulforge{background:linear-gradient(180deg,rgba(50,12,0,0.5) 0%,rgba(60,18,0,0.3) 50%,rgba(50,12,0,0.5) 100%)}
#particle-canvas{position:absolute;inset:0;z-index:2;pointer-events:none}
#vignette{position:fixed;inset:0;z-index:4;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(6,6,12,0.65) 100%)}
#gothic-vignette{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:0;transition:opacity 1.5s ease;background:radial-gradient(ellipse at center,transparent 25%,rgba(20,0,5,0.85) 100%)}
/* Barovia desaturation applied to film strip */
#film-strip.barovia{filter:saturate(0.45) brightness(0.9)}
#film-strip.feywild{filter:saturate(1.5) brightness(1.05)}
/* Underdark cave silhouette */
#cave-silhouette{position:fixed;top:0;left:0;right:0;height:120px;z-index:6;pointer-events:none;opacity:0;transition:opacity 1.5s ease}
#cave-silhouette.active{opacity:1}
/* Soulforge heat shimmer */
#heat-shimmer{position:fixed;inset:0;z-index:6;pointer-events:none;opacity:0;transition:opacity 1.5s ease;background:linear-gradient(0deg,rgba(255,60,0,0.06) 0%,transparent 30%);animation:shimmer 2s ease-in-out infinite alternate}
#heat-shimmer.active{opacity:1}
@keyframes shimmer{0%{transform:scaleY(1)}100%{transform:scaleY(1.002);filter:blur(0.3px)}}

/* ===== FILM STRIP ===== */
#film-strip{position:absolute;top:0;left:0;height:100vh;z-index:3;display:flex;will-change:transform}
.session-col{width:320px;height:100vh;position:relative;flex-shrink:0}
.session-col::after{content:'';position:absolute;top:10%;bottom:10%;right:0;width:1px;background:linear-gradient(180deg,transparent,rgba(200,200,224,0.04) 30%,rgba(200,200,224,0.04) 70%,transparent)}

/* ===== ARC CARDS ===== */
.arc-card{position:absolute;z-index:20;text-align:center;pointer-events:none;width:650px;opacity:0;transition:opacity 0.8s ease;transform:translate(-50%,-50%)}
.arc-card.visible{opacity:1}
.arc-label{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:13px;letter-spacing:0.6em;text-transform:uppercase;margin-bottom:6px}
.arc-title{font-family:'Cinzel',serif;font-weight:700;font-size:46px;line-height:1.15;text-shadow:0 0 50px currentColor,0 0 100px currentColor}
.arc-sessions-label{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:14px;opacity:0.4;letter-spacing:0.25em}
.arc-divider{width:120px;height:1px;margin:10px auto 0;opacity:0.3}

/* ===== BIGGEST MOMENT ===== */
.moment-box{position:absolute;top:26%;left:16px;right:16px;z-index:10;opacity:0;transform:translateY(12px);transition:opacity 0.7s ease,transform 0.7s ease}
.moment-box.visible{opacity:1;transform:translateY(0)}
.moment-title-text{font-family:'Cinzel',serif;font-weight:600;font-size:16px;color:#fff;text-shadow:0 0 24px rgba(255,255,255,0.3),0 2px 8px rgba(0,0,0,0.8);line-height:1.35}
.moment-desc{font-family:'Barlow',sans-serif;font-weight:300;font-size:11px;color:rgba(200,200,224,0.45);line-height:1.4;margin-top:6px}
.moment-counter{font-family:'Barlow',sans-serif;font-style:italic;font-weight:300;font-size:10px;color:rgba(200,200,224,0.3);line-height:1.4;margin-top:6px;padding-left:8px;border-left:1px solid rgba(200,200,224,0.1)}

/* ===== ENERGY PEAKS ===== */
.peak-burst{position:absolute;z-index:15;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform 0.3s ease}
.peak-burst:hover{transform:translate(-50%,-50%) scale(1.4);z-index:25}
.peak-ring{position:absolute;inset:0;border-radius:50%;animation:pulse-ring 3s ease-in-out infinite}
.peak-core{position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%)}
.peak-rays{position:absolute;inset:-4px;border-radius:50%;animation:pulse-glow 2s ease-in-out infinite alternate}
.p-dice .peak-ring{border:2px solid rgba(251,191,36,0.5);box-shadow:0 0 16px rgba(251,191,36,0.25)}
.p-dice .peak-core{background:#fbbf24;box-shadow:0 0 10px #fbbf24}
.p-dice .peak-rays{box-shadow:0 0 25px rgba(251,191,36,0.15)}
.p-combat .peak-ring{border:2px solid rgba(239,68,68,0.5);box-shadow:0 0 16px rgba(239,68,68,0.25)}
.p-combat .peak-core{background:#ef4444;box-shadow:0 0 10px #ef4444}
.p-combat .peak-rays{box-shadow:0 0 25px rgba(239,68,68,0.15)}
.p-comedy .peak-ring{border:2px solid rgba(251,191,36,0.5);box-shadow:0 0 16px rgba(251,191,36,0.25)}
.p-comedy .peak-core{background:#fbbf24;box-shadow:0 0 10px #fbbf24}
.p-comedy .peak-rays{box-shadow:0 0 25px rgba(251,191,36,0.15)}
.p-dramatic .peak-ring{border:2px solid rgba(168,85,247,0.5);box-shadow:0 0 16px rgba(168,85,247,0.25)}
.p-dramatic .peak-core{background:#a855f7;box-shadow:0 0 10px #a855f7}
.p-dramatic .peak-rays{box-shadow:0 0 25px rgba(168,85,247,0.15)}
.p-energy .peak-ring{border:2px solid rgba(59,130,246,0.5);box-shadow:0 0 16px rgba(59,130,246,0.25)}
.p-energy .peak-core{background:#3b82f6;box-shadow:0 0 10px #3b82f6}
.p-energy .peak-rays{box-shadow:0 0 25px rgba(59,130,246,0.15)}
@keyframes pulse-ring{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.35);opacity:0.3}}
@keyframes pulse-glow{0%{opacity:0.3}100%{opacity:0.8}}

/* Peak tooltip */
.peak-tooltip{position:fixed;z-index:200;background:rgba(6,6,12,0.96);border:1px solid rgba(200,200,224,0.12);border-radius:6px;padding:12px 16px;max-width:300px;pointer-events:none;opacity:0;transition:opacity 0.15s;backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.peak-tooltip.show{opacity:1}
.tt-title{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:15px;color:#fff;margin-bottom:3px}
.tt-type{font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:6px}
.tt-excerpt{font-family:'Barlow',sans-serif;font-size:12px;font-weight:300;color:rgba(200,200,224,0.65);line-height:1.45}
.tt-score{font-family:'JetBrains Mono',monospace;font-size:11px;margin-top:6px;color:#fbbf24}
.tt-players{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:rgba(200,200,224,0.4);margin-top:4px}

/* ===== FLOATING QUOTES ===== */
.float-quote{position:absolute;z-index:12;max-width:250px;padding:8px 12px;background:rgba(6,6,12,0.75);border-radius:3px;border-left:3px solid;backdrop-filter:blur(6px);opacity:0;transform:translateY(20px);transition:opacity 0.7s ease,transform 0.9s ease}
.float-quote.visible{opacity:1;transform:translateY(0)}
.q-text{font-family:'Barlow',sans-serif;font-style:italic;font-weight:300;font-size:12px;color:rgba(255,255,255,0.8);line-height:1.45}
.q-speaker{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:10px;margin-top:4px;letter-spacing:0.12em;text-transform:uppercase}
.q-fire{font-size:10px;margin-top:2px;line-height:1}

/* ===== CAST BAR ===== */
#cast-bar{position:fixed;top:0;left:0;right:0;height:30px;z-index:50;display:flex;align-items:center;background:linear-gradient(180deg,rgba(6,6,12,0.92),rgba(6,6,12,0.7));backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,200,224,0.05);padding:0 16px}
.cast-label{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#444466;margin-right:14px;flex-shrink:0}
.cast-dots{display:flex;gap:6px;align-items:center}
.cast-dot{width:8px;height:8px;border-radius:50%;transition:all 0.6s ease}
.cast-dot.active{box-shadow:0 0 6px currentColor}
.cast-dot.inactive{opacity:0.12;transform:scale(0.6)}
.cast-dot-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:rgba(200,200,224,0.3);margin-right:4px}

/* ===== CHAPTER SELECT ===== */
#chapter-bar{position:fixed;top:30px;left:0;right:0;height:34px;z-index:50;display:flex;align-items:center;background:linear-gradient(180deg,rgba(6,6,12,0.7),rgba(6,6,12,0.4));backdrop-filter:blur(8px);border-bottom:1px solid rgba(200,200,224,0.03);padding:0 16px;gap:4px;overflow-x:auto}
#chapter-bar::-webkit-scrollbar{display:none}
.ch-btn{font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(200,200,224,0.35);background:transparent;border:1px solid rgba(200,200,224,0.06);padding:3px 12px;border-radius:2px;cursor:pointer;transition:all 0.3s;white-space:nowrap;flex-shrink:0}
.ch-btn:hover,.ch-btn.active{color:#fbbf24;border-color:rgba(251,191,36,0.25);background:rgba(251,191,36,0.04)}

/* ===== SESSION MARKERS ===== */
.sm-bar{position:absolute;bottom:58px;left:0;width:100%;display:flex;flex-direction:column;align-items:center;z-index:10;padding-bottom:4px}
.sm-num{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:rgba(200,200,224,0.4)}
.sm-title{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:rgba(200,200,224,0.2);max-width:90%;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
.sm-pace{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(200,200,224,0.18);margin-top:1px}
.scene-bar{display:flex;gap:1px;margin-top:3px;height:4px}
.scene-bar .sb{height:4px;border-radius:1px;min-width:4px}

/* ===== RECAP HOOK ===== */
.recap-hook{position:absolute;top:14%;left:12px;right:12px;z-index:9;opacity:0;transform:translateY(8px);transition:opacity 0.6s ease,transform 0.6s ease}
.recap-hook.visible{opacity:1;transform:translateY(0)}
.recap-hook .rh-title{font-family:'Cinzel',serif;font-weight:700;font-size:13px;color:rgba(251,191,36,0.7);letter-spacing:0.05em;margin-bottom:3px}
.recap-hook .rh-line{font-family:'Barlow',sans-serif;font-weight:300;font-size:11px;color:rgba(200,200,224,0.4);line-height:1.4;font-style:italic}
.emotion-badge{position:absolute;top:8%;right:12px;z-index:9;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(200,200,224,0.25);padding:2px 8px;border:1px solid rgba(200,200,224,0.06);border-radius:2px;opacity:0;transition:opacity 0.6s ease}
.emotion-badge.visible{opacity:1}

/* ===== LARGE SESSION INDICATOR ===== */
#big-session{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:55;pointer-events:none;text-align:center;opacity:0;transition:opacity 0.4s ease}
#big-session.show{opacity:1}
#big-session .bs-num{font-family:'Bebas Neue',sans-serif;font-size:72px;color:rgba(251,191,36,0.12);letter-spacing:0.15em;line-height:1}
#big-session .bs-emo{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:rgba(200,200,224,0.2);letter-spacing:0.3em;text-transform:uppercase;margin-top:-4px}

/* ===== CONTROLS ===== */
#controls{position:fixed;bottom:0;left:0;right:0;height:52px;z-index:60;display:flex;align-items:center;justify-content:center;gap:12px;background:linear-gradient(180deg,rgba(6,6,12,0.75),rgba(6,6,12,0.95));backdrop-filter:blur(14px);border-top:1px solid rgba(200,200,224,0.05);padding:0 16px}
.cb{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;letter-spacing:0.08em;color:#c8c8e0;background:transparent;border:1px solid rgba(200,200,224,0.12);padding:5px 14px;border-radius:3px;cursor:pointer;transition:all 0.2s;user-select:none}
.cb:hover{background:rgba(200,200,224,0.05);border-color:rgba(200,200,224,0.25)}
.cb.active{color:#fbbf24;border-color:rgba(251,191,36,0.35);background:rgba(251,191,36,0.06)}
#play-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;padding:0;border:2px solid rgba(251,191,36,0.4);color:#fbbf24}
#play-btn:hover{background:rgba(251,191,36,0.1);border-color:#fbbf24;box-shadow:0 0 24px rgba(251,191,36,0.15)}
#progress-wrap{flex:1;max-width:480px;height:6px;background:rgba(200,200,224,0.06);border-radius:3px;cursor:pointer;position:relative}
#progress-fill{height:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);border-radius:3px;width:0%;transition:width 0.08s linear;box-shadow:0 0 6px rgba(251,191,36,0.25)}
#progress-handle{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fbbf24;box-shadow:0 0 8px rgba(251,191,36,0.4);left:0%;transition:left 0.08s linear;pointer-events:none}
#cur-sid{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px;color:#fbbf24;min-width:36px}
#cur-label{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:12px;color:rgba(200,200,224,0.5);min-width:100px;max-width:200px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== SENTIMENT WAVEFORM ===== */
#waveform{position:fixed;bottom:82px;left:0;right:0;height:40px;z-index:8;pointer-events:none}
#waveform svg{width:100%;height:100%}

/* ===== KILL COUNTER (Feature 1) ===== */
#kill-counter{position:fixed;top:72px;right:18px;z-index:70;text-align:right;pointer-events:none;opacity:0;transition:opacity 0.8s ease}
#kill-counter.visible{opacity:1}
#kill-num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:#ef4444;text-shadow:0 0 18px rgba(239,68,68,0.5),0 0 40px rgba(239,68,68,0.2);transition:text-shadow 0.15s ease}
#kill-num.flash{text-shadow:0 0 30px rgba(239,68,68,0.9),0 0 60px rgba(239,68,68,0.5),0 0 90px rgba(239,68,68,0.3)}
#kill-label{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#6b6b8a;margin-top:2px}

/* ===== DANGER HEARTBEAT (Feature 2) ===== */
#danger-heartbeat{position:fixed;bottom:52px;left:0;right:0;height:30px;z-index:55;pointer-events:none;background:rgba(6,6,12,0.6);border-top:1px solid rgba(200,200,224,0.04)}
#danger-heartbeat svg{width:100%;height:100%}

/* ===== WEATHER CANVAS (Feature 3) ===== */
#weather-canvas{position:fixed;inset:0;z-index:7;pointer-events:none}

/* ===== MINIMAP (Feature 4) ===== */
#minimap{position:fixed;top:0;left:0;right:0;height:8px;z-index:100;cursor:pointer;background:rgba(6,6,12,0.8)}
#minimap canvas{width:100%;height:100%;display:block}
#minimap-indicator{position:absolute;top:0;height:100%;background:rgba(255,255,255,0.85);box-shadow:0 0 6px rgba(255,255,255,0.5);pointer-events:none;min-width:3px;border-radius:1px}
#cast-bar{top:8px}
#chapter-bar{top:38px}

/* ===== RELATIONSHIP SPARKS (Feature 5) ===== */
#spark-canvas{position:fixed;top:8px;left:0;right:0;height:30px;z-index:51;pointer-events:none}

/* ===== PREVIOUSLY ON (Feature 6) ===== */
#previously-on{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:45;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.6s ease;max-width:500px;padding:20px 30px}
#previously-on.visible{opacity:1}
#previously-on .prev-label{font-family:'Barlow Condensed',sans-serif;font-weight:300;font-style:italic;font-size:14px;color:#6b6b8a;letter-spacing:0.15em;margin-bottom:8px}
#previously-on .prev-hook{font-family:'Barlow',sans-serif;font-weight:300;font-size:13px;color:rgba(200,200,224,0.5);line-height:1.55}
</style>
</head>
<body>

<div id="title-screen">
  <canvas id="title-particles"></canvas>
  <div class="content">
    <h1>THE CAMPAIGN<br>FILM</h1>
    <div class="subtitle">Brotherhood of the Woven Blade</div>
    <div class="stats-line">46 SESSIONS &middot; 4 ARCS &middot; 180+ HOURS OF PLAY</div>
    <button class="enter-btn" onclick="startFilm()">ENTER THE FILM</button>
  </div>
</div>

<div id="film-viewport" style="display:none">
  <div id="bg-layer"></div>
  <div id="dimension-overlay"></div>
  <canvas id="particle-canvas"></canvas>
  <div id="vignette"></div>
  <div id="gothic-vignette"></div>
  <div id="cave-silhouette"></div>
  <div id="heat-shimmer"></div>
  <div id="film-strip"></div>
  <div id="waveform"><svg></svg></div>

  <div id="cast-bar">
    <span class="cast-label">CAST</span>
    <div class="cast-dots" id="cast-dots"></div>
  </div>

  <div id="chapter-bar"></div>

  <div id="big-session"><div class="bs-num"></div><div class="bs-emo"></div></div>

  <div id="controls">
    <span id="cur-sid">S001</span>
    <span id="cur-label"></span>
    <div id="progress-wrap" onclick="seekTo(event)">
      <div id="progress-fill"></div>
      <div id="progress-handle"></div>
    </div>
    <button class="cb" id="speed-btn" onclick="cycleSpeed()">1x</button>
    <button class="cb" id="play-btn" onclick="togglePlay()">&#9654;</button>
    <button class="cb" onclick="skipBack()" title="Previous session">&laquo;</button>

  if(!c) return;
  const ctx = c.getContext('2d');
  let pts = [];
  function resize(){ c.width = window.innerWidth; c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<60;i++) pts.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2,s:Math.random()*1.5+0.5,a:Math.random()*0.15+0.02});
  function draw(){
    if(started) return;
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=c.width; if(p.x>c.width)p.x=0;
      if(p.y<0)p.y=c.height; if(p.y>c.height)p.y=0;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
      ctx.fillStyle=`rgba(251,191,36,${p.a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function startFilm(){
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('film-viewport').style.display='block';
  setTimeout(()=>{
    started=true;
    buildStrip();
    buildChapters();
    buildCast();
    buildWaveform();
    initParticles();
    buildHeartbeat();
    buildMinimap();
    initWeather();
    initSparkCanvas();
    updateView();
    requestAnimationFrame(loop);
  },400);
}

// ================================================================
// BUILD FILM STRIP
// ================================================================
function sid(i){ return 'S'+String(i).padStart(3,'0'); }
function esc(s){ return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }
function getS(i){ return D.sessions[sid(i)] || {}; }

function buildStrip(){
  const strip = document.getElementById('film-strip');
  strip.style.width = TW+'px';

  for(let i=1;i<=NS;i++){
    const s = getS(i);
    const col = document.createElement('div');
    col.className='session-col';
    col.dataset.s=i;

    // Recap hook line
    if(s.recap && s.recap.title && s.recap.title !== 'Test Session'){
      const rh = document.createElement('div');
      rh.className='recap-hook';
      rh.innerHTML=`<div class="rh-title">${esc(s.recap.title)}</div>${s.recap.hook?'<div class="rh-line">'+esc(s.recap.hook)+'</div>':''}`;
      col.appendChild(rh);
    }

    // Dominant emotion badge
    if(s.dominant_emotion){
      const eb = document.createElement('div');
      eb.className='emotion-badge';
      eb.textContent=s.dominant_emotion;
      col.appendChild(eb);
    }

    // Biggest moment
    const bm = s.biggest_moment;
    if(bm && bm.title){
      const box = document.createElement('div');
      box.className='moment-box';
      let html = `<div class="moment-title-text">${esc(bm.title)}</div>`;
      if(bm.desc) html += `<div class="moment-desc">${esc(bm.desc)}</div>`;
      if(bm.counter) html += `<div class="moment-counter">${esc(bm.counter)}</div>`;
      box.innerHTML = html;
      col.appendChild(box);
    }

    // Energy peaks
    (s.peaks||[]).forEach((pk,pi)=>{
      const t = (pk.type||'').toLowerCase();
      let cls = 'p-energy';
      if(t.includes('dice')) cls='p-dice';
      else if(t.includes('combat')) cls='p-combat';
      else if(t.includes('comedy')) cls='p-comedy';
      else if(t.includes('dramatic')) cls='p-dramatic';

      const sz = 28 + (pk.score/10)*50;
      const xPct = (pk.pct||50)/100;
      const yBase = 46 + pi*14;

      const el = document.createElement('div');
      el.className=`peak-burst ${cls}`;
      el.style.cssText=`left:${xPct*SW}px;top:${yBase}%;width:${sz}px;height:${sz}px`;
      el.innerHTML='<div class="peak-rays"></div><div class="peak-ring"></div><div class="peak-core"></div>';
      el.addEventListener('mouseenter', e=>showTT(e,pk,cls));
      el.addEventListener('mouseleave', hideTT);
      el.addEventListener('mousemove', moveTT);
      col.appendChild(el);
    });

    // Floating quotes
    (s.quotes||[]).forEach((q,qi)=>{
      const c = PC[q.speaker]||'#888899';
      const el = document.createElement('div');
      el.className='float-quote';
      el.style.borderLeftColor=c;
      el.style.left=(30+qi*90)+'px';
      el.style.top=(64+qi*12)+'%';
      const fire = '\uD83D\uDD25'.repeat(Math.min(q.fire||0,5));
      el.innerHTML=`<div class="q-text">\u201C${esc(q.text)}\u201D</div><div class="q-speaker" style="color:${c}">${esc(q.speaker)}</div><div class="q-fire">${fire}</div>`;
      col.appendChild(el);
    });

    // Session marker
    const pacing = s.pacing||{};
    let sceneHtml='';
    if(pacing.scenes && pacing.scenes.length){
      sceneHtml='<div class="scene-bar">';
      pacing.scenes.forEach(sc=>{
        const c=SCENE_C[sc.type]||'#444466';
        sceneHtml+=`<div class="sb" style="background:${c};width:${Math.max(5,sc.energy*2.5)}px" title="${sc.type} (${sc.energy})"></div>`;
      });
      sceneHtml+='</div>';
    }
    const recapTitle = (s.recap&&s.recap.title)?s.recap.title:(s.session_label||'');
    const marker = document.createElement('div');
    marker.className='sm-bar';
    marker.innerHTML=`<div class="sm-num">${sid(i)}</div><div class="sm-title">${esc(recapTitle)}</div><div class="sm-pace">${esc(pacing.pace||'')}</div>${sceneHtml}`;
    col.appendChild(marker);

    strip.appendChild(col);
  }

  // Arc chapter cards
  ARCS.forEach(arc=>{
    const card = document.createElement('div');
    card.className='arc-card';
    card.dataset.ss=arc.s[0];
    card.style.color=arc.color;
    card.style.left=((arc.s[0]-1)*SW + SW/2)+'px';
    card.style.top='50%';
    card.innerHTML=`
      <div class="arc-label" style="color:${arc.color}99">${arc.label}</div>
      <div class="arc-title">${arc.name}</div>
      <div class="arc-divider" style="background:${arc.color}"></div>
      <div class="arc-sessions-label">SESSIONS ${arc.s[0]}\u2013${arc.s[1]}</div>
    `;
    strip.appendChild(card);
  });
}

// ================================================================
// SENTIMENT WAVEFORM
// ================================================================
function buildWaveform(){
  // Collect average sentiment per session
  const vals=[];
  for(let i=1;i<=NS;i++){
    const s=getS(i);
    const w=s.sentiment_windows||[];
    if(w.length===0){ vals.push(0); continue; }
    vals.push(w.reduce((a,v)=>a+(v.sent||0),0)/w.length);
  }

  const svg=d3.select('#waveform svg');
  const W=window.innerWidth;
  const H=40;
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','none');

  const x=d3.scaleLinear().domain([0,NS-1]).range([0,W]);
  const y=d3.scaleLinear().domain([-8,8]).range([H,0]).clamp(true);

  const area=d3.area()
    .x((_,i)=>x(i))
    .y0(y(0))
    .y1(d=>y(d))
    .curve(d3.curveBasis);

  const line=d3.line()
    .x((_,i)=>x(i))
    .y(d=>y(d))
    .curve(d3.curveBasis);

  // Gradient
  const defs=svg.append('defs');
  const grad=defs.append('linearGradient').attr('id','wg').attr('x1','0%').attr('x2','100%');
  vals.forEach((v,i)=>{
    const pct=(i/(NS-1)*100).toFixed(1);
    let col='#1a1a2e';
    if(v>3) col='#fbbf2466';
    else if(v>0) col='#1a1a2e66';
    else if(v>-2) col='#1a1a2e66';
    else if(v>-6) col='#2a0a0a66';
    else col='#1a000066';
    grad.append('stop').attr('offset',pct+'%').attr('stop-color',col);
  });

  svg.append('path').datum(vals).attr('d',area).attr('fill','url(#wg)').attr('opacity',0.5);
  svg.append('path').datum(vals).attr('d',line).attr('fill','none').attr('stroke','rgba(200,200,224,0.15)').attr('stroke-width',1);

  // Zero line
  svg.append('line').attr('x1',0).attr('x2',W).attr('y1',y(0)).attr('y2',y(0)).attr('stroke','rgba(200,200,224,0.06)').attr('stroke-width',0.5);
}

// ================================================================
// SENTIMENT BACKGROUND
// ================================================================
function sentColor(v){
  if(v==null) return [6,6,12];
  if(v<-6) return [30,4,4];
  if(v<-2){ const t=(v+6)/4; return [Math.round(30+t*0),Math.round(4+t*8),Math.round(4+t*14)]; }
  if(v<3){ const t=(v+2)/5; return [Math.round(22+t*4),Math.round(12+t*14),Math.round(18+t*28)]; }
  const t=Math.min((v-3)/5,1);
  return [Math.round(26+t*40),Math.round(26+t*22),Math.round(46-t*24)];
}

function avgSent(i){
  const s=getS(i);
  const w=s.sentiment_windows||[];
  if(!w.length) return 0;
  return w.reduce((a,v)=>a+(v.sent||0),0)/w.length;
}

function interpSent(px){
  const frac=px/SW+1;
  const s1=Math.max(1,Math.min(NS,Math.floor(frac)));
  const s2=Math.min(NS,s1+1);
  const t=frac-s1;
  return avgSent(s1)+(avgSent(s2)-avgSent(s1))*t;
}

function updateBg(){
  const center=sx+window.innerWidth/2;
  const l=sentColor(interpSent(sx));
  const m=sentColor(interpSent(center));
  const r=sentColor(interpSent(sx+window.innerWidth));
  document.getElementById('bg-layer').style.background=
    `linear-gradient(90deg,rgb(${l}),rgb(${m}),rgb(${r}))`;
}

function updateDim(){
  const cur=curSession();
  const ov=document.getElementById('dimension-overlay');
  const gv=document.getElementById('gothic-vignette');
  const strip=document.getElementById('film-strip');
  const cave=document.getElementById('cave-silhouette');
  const heat=document.getElementById('heat-shimmer');

  ov.className='';
  gv.style.opacity='0';
  strip.className='';
  cave.classList.remove('active');
  heat.classList.remove('active');

  if(cur>=35&&cur<=42){
    ov.className='active dim-barovia';
    gv.style.opacity='1';
    strip.className='barovia';
  } else if(cur>=21&&cur<=26){
    ov.className='active dim-underdark';
    cave.classList.add('active');
    drawCaveSilhouette();
  } else if(cur===46){
    ov.className='active dim-feywild';
    strip.className='feywild';
  } else if(cur>=27&&cur<=30){
    ov.className='active dim-soulforge';
    heat.classList.add('active');
  }
}

function drawCaveSilhouette(){
  const cave=document.getElementById('cave-silhouette');
  if(cave.querySelector('svg')) return; // already drawn
  const w=window.innerWidth, h=120;
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',w);
  svg.setAttribute('height',h);
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  svg.style.width='100%';svg.style.height='100%';
  // Generate stalactite path
  let d=`M0,0 L0,${h*0.3}`;
  for(let x=0;x<w;x+=30+Math.random()*40){
    const stalH=20+Math.random()*60;
    const tipX=x+10+Math.random()*15;
    d+=` L${x},${h*0.15+Math.random()*15} L${tipX},${stalH+h*0.15} L${x+25+Math.random()*15},${h*0.12+Math.random()*15}`;
  }
  d+=` L${w},${h*0.2} L${w},0 Z`;
  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);
  path.setAttribute('fill','#06060c');
  path.setAttribute('opacity','0.85');
  svg.appendChild(path);
  cave.appendChild(svg);
}

function curSession(){
  return Math.max(1,Math.min(NS,Math.round((sx+window.innerWidth/2)/SW+1)));
}

function updateVis(){
  const vl=sx-200, vr=sx+window.innerWidth+200;
  document.querySelectorAll('.session-col').forEach(col=>{
    const sn=parseInt(col.dataset.s);
    const cl=(sn-1)*SW, cr=cl+SW;
    if(cr>vl && cl<vr){
      col.querySelectorAll('.moment-box,.float-quote,.recap-hook,.emotion-badge').forEach(e=>e.classList.add('visible'));
    }
  });
  // Arc cards
  const vc=sx+window.innerWidth/2;
  document.querySelectorAll('.arc-card').forEach(card=>{
    const ss=parseInt(card.dataset.ss);
    const cx=(ss-1)*SW+SW/2;
    card.classList.toggle('visible',Math.abs(cx-vc)<SW*2);
  });
}

// CAST BAR

function updateCast(){
  const cur=curSession();
  CAST_MAP.forEach(ch=>{
    const dot=document.getElementById('cd-'+ch.n);
    if(!dot) return;
    const active=cur>=ch.range[0]&&cur<=ch.range[1];
    dot.classList.toggle('active',active);
    dot.classList.toggle('inactive',!active);
  });
}

function updateProgress(){
  const mx=TW-window.innerWidth;
  const pct=Math.max(0,Math.min(100,(sx/mx)*100));
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-handle').style.left=pct+'%';

  const cur=curSession();
  const s=getS(cur);
  document.getElementById('cur-sid').textContent=sid(cur);
  const title=(s.recap&&s.recap.title)?s.recap.title:(s.session_label||'');
  document.getElementById('cur-label').textContent=title;

  // Chapter highlight
  document.querySelectorAll('.ch-btn').forEach((btn,i)=>{
    const arc=ARCS[i];
    btn.classList.toggle('active',arc&&cur>=arc.s[0]&&cur<=arc.s[1]);
  });

  // Big session indicator
  const bs=document.getElementById('big-session');
  if(bs){
    bs.querySelector('.bs-num').textContent=sid(cur);
    bs.querySelector('.bs-emo').textContent=s.dominant_emotion||'';
    // Show briefly when session changes
    if(window._lastBigSession!==cur){
      window._lastBigSession=cur;
      bs.classList.add('show');
      clearTimeout(window._bsTimeout);
      window._bsTimeout=setTimeout(()=>bs.classList.remove('show'),2000);
    }
  }
}

function seekTo(e){
  const r=document.getElementById('progress-wrap').getBoundingClientRect();
  const pct=(e.clientX-r.left)/r.width;
  sx=pct*(TW-window.innerWidth);
  updateView();
}
function togglePlay(){
  playing=!playing;
  document.getElementById('play-btn').innerHTML=playing?'\u23F8':'\u25B6';
  document.getElementById('play-btn').classList.toggle('active',playing);
  if(playing) lastT=performance.now();
}
function cycleSpeed(){
  const sp=[0.5,1,2,4];
  speed=sp[(sp.indexOf(speed)+1)%sp.length];
  document.getElementById('speed-btn').textContent=speed+'x';
}
function skipBack(){ scrollToSession(Math.max(1,curSession()-1)); }
function skipForward(){ scrollToSession(Math.min(NS,curSession()+1)); }
function scrollToSession(n){
  sx=Math.max(0,Math.min(TW-window.innerWidth,(n-1)*SW-window.innerWidth/2+SW/2));
  playing=false;
  document.getElementById('play-btn').innerHTML='\u25B6';
  document.getElementById('play-btn').classList.remove('active');
  updateView();
}

// ================================================================
// PARTICLES
// ================================================================
let particles=[];
function initParticles(){
  const c=document.getElementById('particle-canvas');
  c.width=window.innerWidth; c.height=window.innerHeight;
  particles=[];
  for(let i=0;i<90;i++) particles.push({
    x:Math.random()*c.width,y:Math.random()*c.height,
    vx:(Math.random()-0.5)*0.25,vy:-Math.random()*0.4-0.08,
    s:Math.random()*2+0.4,a:Math.random()*0.2+0.03,life:Math.random()
  });
}

function drawParticles(){
  const c=document.getElementById('particle-canvas');
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);

  const cur=curSession();
  let pc=[200,200,224],mode='default';
  if(cur>=35&&cur<=42){ pc=[140,110,120]; mode='fog'; }
  else if(cur===46){ pc=[80,255,140]; mode='sparkle'; }
  else if(cur>=27&&cur<=30){ pc=[255,110,40]; mode='ember'; }
  else if(cur>=21&&cur<=26){ pc=[60,130,210]; mode='mote'; }

  const now=Date.now();
  particles.forEach(p=>{
    p.life+=0.0015;
    if(p.life>1) p.life=0;
    const la=Math.sin(p.life*Math.PI);

    if(mode==='fog'){
      p.x+=Math.sin(now*0.0004+p.y*0.008)*0.6;
      p.y+=p.vy*0.2;
      p.s=3+la*4;
    } else if(mode==='sparkle'){
      p.x+=p.vx;
      p.y-=Math.abs(p.vy)*1.8;
      p.s=0.8+la*2.5;
    } else if(mode==='ember'){
      p.x+=p.vx+Math.sin(now*0.0008+p.x*0.01)*0.4;
      p.y-=Math.abs(p.vy)*0.9;
      p.s=1+la*1.8;
    } else {
      p.x+=p.vx; p.y+=p.vy;
    }

    if(p.y<-10){p.y=c.height+10;p.x=Math.random()*c.width;}
    if(p.y>c.height+10){p.y=-10;p.x=Math.random()*c.width;}
    if(p.x<-10)p.x=c.width+10;
    if(p.x>c.width+10)p.x=-10;

    const alpha=p.a*la;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
    ctx.fillStyle=`rgba(${pc[0]},${pc[1]},${pc[2]},${alpha})`;
    ctx.fill();

    if(mode==='sparkle'||mode==='ember'){
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.s*3,0,Math.PI*2);
      ctx.fillStyle=`rgba(${pc[0]},${pc[1]},${pc[2]},${alpha*0.1})`;
      ctx.fill();
    }
  });
}

// ================================================================
// UPDATE & LOOP
// ================================================================
function updateView(){
  document.getElementById('film-strip').style.transform=`translateX(${-sx}px)`;
  updateBg();
  updateDim();
  updateVis();
  updateCast();
  updateProgress();
  updateKillCounter();
  updateHeartbeat();
  updateMinimap();
  updatePreviouslyOn();
}

function loop(t){
  if(!started) return;
  if(playing){
    const dt=t-lastT;
    sx+=dt*(SW/BASE_MS)*speed;
    const mx=TW-window.innerWidth;
    if(sx>=mx){sx=mx;playing=false;document.getElementById('play-btn').innerHTML='\u25B6';document.getElementById('play-btn').classList.remove('active');}
    sx=Math.max(0,sx);
    updateView();
  }
  lastT=t;
  drawParticles();
  drawWeather();
  updateSparks();
  requestAnimationFrame(loop);
}

// ================================================================
// INPUT
// ================================================================
document.addEventListener('keydown',e=>{
  if(!started){if(e.key==='Enter'||e.key===' '){e.preventDefault();startFilm();}return;}
  switch(e.key){
    case ' ':e.preventDefault();togglePlay();break;
    case 'ArrowRight':e.preventDefault();if(e.shiftKey)skipForward();else{sx=Math.min(TW-window.innerWidth,sx+120);updateView();}break;
    case 'ArrowLeft':e.preventDefault();if(e.shiftKey)skipBack();else{sx=Math.max(0,sx-120);updateView();}break;
    case 'ArrowUp':e.preventDefault();cycleSpeed();break;
  }
});

document.addEventListener('wheel',e=>{
  if(!started)return;
  e.preventDefault();
  sx+=e.deltaY*2;
  sx=Math.max(0,Math.min(TW-window.innerWidth,sx));
  updateView();
},{passive:false});

let touchX=0,touchSX=0;
document.addEventListener('touchstart',e=>{if(!started)return;touchX=e.touches[0].clientX;touchSX=sx;});
document.addEventListener('touchmove',e=>{if(!started)return;e.preventDefault();sx=Math.max(0,Math.min(TW-window.innerWidth,touchSX+(touchX-e.touches[0].clientX)));updateView();},{passive:false});

// ================================================================
// FEATURE 1: KILL COUNTER
// ================================================================
const KILLS={S001:0,S002:0,S003:2,S004:8,S005:3,S006:1,S007:0,S008:0,S009:0,S010:14,S011:1,S012:3,S013:0,S014:1,S015:0,S016:5,S017:0,S018:0,S019:4,S020:0,S021:3,S022:4,S023:6,S024:3,S025:0,S026:2,S027:5,S028:3,S029:0,S030:1,S031:4,S032:2,S033:3,S034:4,S035:0,S036:6,S037:8,S038:0,S039:2,S040:3,S041:2,S042:7,S043:0,S044:1,S045:9,S046:0};
let _killDisplayed=0, _killTarget=0, _killLastSession=0;

function updateKillCounter(){
  const cur=curSession();
  const el=document.getElementById('kill-counter');
  const valEl=document.getElementById('kill-val');
  const numEl=document.getElementById('kill-num');
  if(!el||!valEl) return;
  el.classList.add('visible');

  // Calculate cumulative kills up to current session
  let total=0;
  for(let i=1;i<=cur;i++) total+=(KILLS[sid(i)]||0);
  _killTarget=total;

  // Animate increment
  if(_killDisplayed<_killTarget){
    _killDisplayed=Math.min(_killTarget,_killDisplayed+Math.max(1,Math.ceil((_killTarget-_killDisplayed)*0.3)));
    valEl.textContent=_killDisplayed;
    // Flash effect on change
    if(numEl) numEl.classList.add('flash');
    clearTimeout(window._killFlashTO);
    window._killFlashTO=setTimeout(()=>{if(numEl)numEl.classList.remove('flash');},200);
  } else if(_killDisplayed>_killTarget){
    _killDisplayed=_killTarget;
    valEl.textContent=_killDisplayed;
  }
}

// ================================================================
// FEATURE 2: DANGER HEARTBEAT
// ================================================================
function buildHeartbeat(){
  const svg=d3.select('#danger-heartbeat svg');
  const W=window.innerWidth, H=30;
  svg.attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','none');
  svg.selectAll('*').remove();

  // Collect energy averages per session
  const energies=[];
  for(let i=1;i<=NS;i++){
    const s=getS(i);
    const e=(s.pacing&&s.pacing.energy_avg)||5;
    energies.push(e);
  }

  // Build EKG-style path with spikes at high-energy sessions
  const segW=W/NS;
  let pathD='M0,'+H/2;
  for(let i=0;i<NS;i++){
    const baseX=i*segW;
    const e=energies[i];
    const norm=(e-4)/5; // normalize 4-9 range to 0-1
    const spikeH=Math.max(2,norm*H*0.8);
    // Flat approach
    pathD+=` L${baseX+segW*0.3},${H/2}`;
    // Spike up
    pathD+=` L${baseX+segW*0.4},${H/2-spikeH}`;
    // Spike down below baseline
    pathD+=` L${baseX+segW*0.5},${H/2+spikeH*0.3}`;
    // Recovery
    pathD+=` L${baseX+segW*0.6},${H/2}`;
    // Flat exit
    pathD+=` L${baseX+segW},${H/2}`;
  }

  // Color gradient based on energy
  const defs=svg.append('defs');
  const grad=defs.append('linearGradient').attr('id','hb-grad').attr('x1','0%').attr('x2','100%');
  energies.forEach((e,i)=>{
    const pct=(i/(NS-1)*100).toFixed(1);
    let col='#44ff88'; // low danger
    if(e>7) col='#ef4444'; // high
    else if(e>6) col='#fbbf24'; // medium
    grad.append('stop').attr('offset',pct+'%').attr('stop-color',col);
  });

  // Glow filter
  const filter=defs.append('filter').attr('id','hb-glow');
  filter.append('feGaussianBlur').attr('stdDeviation','2').attr('result','blur');
  filter.append('feMerge').selectAll('feMergeNode').data(['blur','SourceGraphic']).join('feMergeNode').attr('in',d=>d);

  // Baseline
  svg.append('line').attr('x1',0).attr('x2',W).attr('y1',H/2).attr('y2',H/2).attr('stroke','rgba(200,200,224,0.06)').attr('stroke-width',0.5);

  // Glow path (behind)
  svg.append('path').attr('d',pathD).attr('fill','none').attr('stroke','url(#hb-grad)').attr('stroke-width',2).attr('opacity',0.3).attr('filter','url(#hb-glow)');
  // Main path
  svg.append('path').attr('d',pathD).attr('fill','none').attr('stroke','url(#hb-grad)').attr('stroke-width',1.2).attr('opacity',0.8);

  // Store for scrolling offset
  window._hbSvg=svg;
  window._hbW=W;
}

function updateHeartbeat(){
  if(!window._hbSvg) return;
  const mx=TW-window.innerWidth;
  const scrollPct=sx/mx;
  // Shift the viewBox to follow the scroll position
  const totalPathW=window._hbW;
  const offset=scrollPct*(totalPathW-window.innerWidth);
  window._hbSvg.attr('viewBox',`${offset} 0 ${window.innerWidth} 30`);
}

// ================================================================
// FEATURE 3: WEATHER PARTICLES
// ================================================================
let weatherParticles=[];
const MAX_WEATHER=50;

function initWeather(){
  const c=document.getElementById('weather-canvas');
  if(!c) return;
  c.width=window.innerWidth;
  c.height=window.innerHeight;
  weatherParticles=[];
}

function getWeatherMode(sessionNum){
  const s=getS(sessionNum);
  const pacing=s.pacing||{};
  const scenes=pacing.scenes||[];
  const hasCombat=scenes.some(sc=>sc.type&&(sc.type.includes('Combat')||sc.type.includes('Boss_Fight')||sc.type.includes('Climax')));
  const sentW=s.sentiment_windows||[];
  const mean=sentW.length?sentW.reduce((a,v)=>a+(v.sent||0),0)/sentW.length:0;

  // Priority order: location-based first, then sentiment/combat
  if(sessionNum>=35&&sessionNum<=42) return 'snow';
  if(sessionNum>=21&&sessionNum<=26) return 'spores';
  if(hasCombat) return 'embers';
  if(mean<-2) return 'rain';
  if(mean>4) return 'golden';
  return null;
}

function spawnWeatherParticle(mode, w, h){
  const p={life:0,maxLife:200+Math.random()*300};
  switch(mode){
    case 'snow':
      p.x=Math.random()*w; p.y=-5;
      p.vx=(Math.random()-0.5)*0.3; p.vy=0.4+Math.random()*0.6;
      p.s=1+Math.random()*2.5; p.color='rgba(255,255,255,';
      break;
    case 'embers':
      p.x=Math.random()*w; p.y=h+5;
      p.vx=(Math.random()-0.5)*0.8; p.vy=-(0.5+Math.random()*1.2);
      p.s=1+Math.random()*2; p.color='rgba(255,140,40,';
      break;
    case 'rain':
      p.x=Math.random()*w*1.3; p.y=-5;
      p.vx=-1.5; p.vy=4+Math.random()*3;
      p.s=1; p.color='rgba(100,160,255,'; p.isRain=true;
      break;
    case 'golden':
      p.x=Math.random()*w; p.y=h*0.3+Math.random()*h*0.7;
      p.vx=(Math.random()-0.5)*0.2; p.vy=-(0.15+Math.random()*0.3);
      p.s=1+Math.random()*2; p.color='rgba(251,191,36,';
      break;
    case 'spores':
      p.x=Math.random()*w; p.y=Math.random()*h;
      p.vx=(Math.random()-0.5)*0.4; p.vy=(Math.random()-0.5)*0.3;
      p.s=1.5+Math.random()*2.5; p.color='rgba(80,220,80,';
      p.wobble=Math.random()*Math.PI*2;
      break;
  }
  return p;
}

function drawWeather(){
  const c=document.getElementById('weather-canvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);

  const cur=curSession();
  const mode=getWeatherMode(cur);
  if(!mode){
    weatherParticles=[];
    return;
  }

  // Spawn new particles up to max
  while(weatherParticles.length<MAX_WEATHER){
    weatherParticles.push(spawnWeatherParticle(mode,c.width,c.height));
  }

  // Update and draw
  for(let i=weatherParticles.length-1;i>=0;i--){
    const p=weatherParticles[i];
    p.life++;

    if(mode==='spores'){
      p.wobble+=0.02;
      p.x+=p.vx+Math.sin(p.wobble)*0.5;
      p.y+=p.vy+Math.cos(p.wobble*0.7)*0.3;
    } else {
      p.x+=p.vx;
      p.y+=p.vy;
    }

    // Remove if off-screen or expired
    const oob=p.y<-20||p.y>c.height+20||p.x<-20||p.x>c.width+20||p.life>p.maxLife;
    if(oob){
      weatherParticles.splice(i,1);
      continue;
    }

    // Fade in/out
    const lifePct=p.life/p.maxLife;
    let alpha=0.3+Math.random()*0.3;
    if(lifePct<0.1) alpha*=lifePct/0.1;
    else if(lifePct>0.8) alpha*=(1-lifePct)/0.2;
    alpha=Math.max(0,Math.min(0.6,alpha));

    if(p.isRain){
      // Draw as angled streak
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x+3,p.y+8);
      ctx.strokeStyle=p.color+alpha+')';
      ctx.lineWidth=p.s;
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
      ctx.fillStyle=p.color+alpha+')';
      ctx.fill();
    }
  }
}

// ================================================================
// FEATURE 4: MINIMAP
// ================================================================
function buildMinimap(){
  const wrap=document.getElementById('minimap');
  const c=document.getElementById('minimap-canvas');
  if(!wrap||!c) return;
  wrap.style.display='block';
  const W=window.innerWidth, H=8;
  c.width=W; c.height=H;
  const ctx=c.getContext('2d');

  // Draw sentiment color strip for all sessions
  const segW=W/NS;
  for(let i=0;i<NS;i++){
    const v=avgSent(i+1);
    const rgb=sentColor(v);
    ctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    ctx.fillRect(i*segW,0,segW+1,H);

    // Add tiny separator
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.fillRect(i*segW,0,0.5,H);
  }

  // Click handler
  wrap.addEventListener('click',function(e){
    const r=wrap.getBoundingClientRect();
    const pct=(e.clientX-r.left)/r.width;
    const targetSession=Math.max(1,Math.min(NS,Math.round(pct*NS)));
    scrollToSession(targetSession);
  });
}

function updateMinimap(){
  const indicator=document.getElementById('minimap-indicator');
  const wrap=document.getElementById('minimap');
  if(!indicator||!wrap) return;

  const W=wrap.offsetWidth;
  const mx=TW-window.innerWidth;
  // Current viewport position as fraction of total
  const startPct=sx/TW;
  const widthPct=window.innerWidth/TW;

  indicator.style.left=(startPct*W)+'px';
  indicator.style.width=Math.max(3,widthPct*W)+'px';
}

// ================================================================
// FEATURE 5: RELATIONSHIP SPARKS
// ================================================================
const SPARK_MOMENTS=[
  {session:3,chars:['Billabong','Ash'],label:'HT+Christie'},
  {session:15,chars:['Orla','Billabong'],label:'Gradles+HT'},
  {session:31,chars:['Orla','Ash'],label:'Gradles+Christie'},
  {session:42,chars:['Billabong','Ash'],label:'HT+Christie'}
];
let activeSparkList=[];

function initSparkCanvas(){
  const c=document.getElementById('spark-canvas');
  if(!c) return;
  c.width=window.innerWidth;
  c.height=30;
}

function getCastDotPosition(charName){
  const dot=document.getElementById('cd-'+charName);
  if(!dot) return null;
  const r=dot.getBoundingClientRect();
  // Canvas starts at top:8px, so subtract 8 for canvas-relative y
  return {x:r.left+r.width/2, y:r.top+r.height/2-8};
}

function updateSparks(){
  const c=document.getElementById('spark-canvas');
  if(!c) return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);

  const cur=curSession();

  // Trigger sparks for matching sessions
  SPARK_MOMENTS.forEach(sm=>{
    if(cur===sm.session){
      // Check if this spark is already active
      if(!activeSparkList.find(a=>a.session===sm.session)){
        activeSparkList.push({...sm, startTime:Date.now(), duration:2000});
      }
    }
  });

  // Draw and prune active sparks
  const now=Date.now();
  for(let i=activeSparkList.length-1;i>=0;i--){
    const sp=activeSparkList[i];
    const elapsed=now-sp.startTime;
    if(elapsed>sp.duration){
      activeSparkList.splice(i,1);
      continue;
    }

    const p1=getCastDotPosition(sp.chars[0]);
    const p2=getCastDotPosition(sp.chars[1]);
    if(!p1||!p2) continue;

    const progress=elapsed/sp.duration;
    const alpha=progress<0.3 ? progress/0.3 : (1-(progress-0.3)/0.7);
    const c1=PC[sp.chars[0]]||'#888';
    const c2=PC[sp.chars[1]]||'#888';

    // Draw glowing arc between the two cast dots
    const midX=(p1.x+p2.x)/2;
    const midY=Math.min(p1.y,p2.y)-12-Math.sin(progress*Math.PI)*8;

    ctx.beginPath();
    ctx.moveTo(p1.x,p1.y);
    ctx.quadraticCurveTo(midX,midY,p2.x,p2.y);

    // Create gradient along the arc
    const grad=ctx.createLinearGradient(p1.x,p1.y,p2.x,p2.y);
    grad.addColorStop(0,c1);
    grad.addColorStop(1,c2);
    ctx.strokeStyle=grad;
    ctx.lineWidth=2;
    ctx.globalAlpha=alpha*0.8;
    ctx.shadowColor=c1;
    ctx.shadowBlur=8;
    ctx.stroke();

    // Second pass for glow
    ctx.lineWidth=4;
    ctx.globalAlpha=alpha*0.2;
    ctx.stroke();

    ctx.globalAlpha=1;
    ctx.shadowBlur=0;
  }
}

// ================================================================
// FEATURE 6: PREVIOUSLY ON
// ================================================================
let _prevSession=0, _prevShowTime=0;

function updatePreviouslyOn(){
  const el=document.getElementById('previously-on');
  if(!el) return;

  const cur=curSession();
  const now=Date.now();

  // Show "Previously..." when session changes during play or slow scroll
  if(cur!==_prevSession && cur>1){
    _prevSession=cur;
    const prevS=getS(cur-1);
    const hook=(prevS.recap&&prevS.recap.hook)?prevS.recap.hook:'';
    if(hook && hook!=='A hook' && hook!=='Testing version'){
      el.querySelector('.prev-hook').textContent=hook;
      el.classList.add('visible');
      _prevShowTime=now;
    }
  }

  // Auto-hide after 2.5 seconds
  if(_prevShowTime && now-_prevShowTime>2500){
    el.classList.remove('visible');
    _prevShowTime=0;
  }
}

window.addEventListener('resize',()=>{
  if(!started)return;
  const c=document.getElementById('particle-canvas');
  c.width=window.innerWidth;c.height=window.innerHeight;
  // Resize new canvases
  const wc=document.getElementById('weather-canvas');
  if(wc){wc.width=window.innerWidth;wc.height=window.innerHeight;}
  const sc=document.getElementById('spark-canvas');
  if(sc){sc.width=window.innerWidth;sc.height=30;}
  buildHeartbeat();
  buildMinimap();
  updateView();
});
