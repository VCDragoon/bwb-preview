<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tapestry of Fates</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body {
  background: #0a0806;
  color: #d4c9a8;
  font-family: 'Barlow', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ═══════════════════════════════════════
   TITLE
   ═══════════════════════════════════════ */
.title-area {
  text-align: center;
  padding: 28px 20px 6px;
  position: relative;
  z-index: 10;
}
.title-area h1 {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: clamp(24px, 4vw, 54px);
  background: linear-gradient(
    135deg, #8b6914 0%, #c9a84c 18%, #f5e6a3 35%,
    #c9a84c 50%, #8b6914 65%, #c9a84c 82%, #f5e6a3 100%
  );
  background-size: 200% 200%;
  animation: goldShimmer 8s ease infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 8px;
  filter: drop-shadow(0 0 30px rgba(201,168,76,0.35))
          drop-shadow(0 0 60px rgba(201,168,76,0.12));
}
@keyframes goldShimmer {
  0%,100% { background-position: 0% 50% }
  50% { background-position: 100% 50% }
}
.subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 400;
  font-size: 12px;
  color: #5a4e3e;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* ═══════════════════════════════════════
   STATS BAR
   ═══════════════════════════════════════ */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 22px;
  padding: 10px 20px 6px;
  flex-wrap: wrap;
}
.stat-item { text-align: center }
.stat-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 19px;
  font-weight: 500;
  color: #c9a84c;
  text-shadow: 0 0 10px rgba(201,168,76,0.2);
}
.stat-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  color: #4a3e30;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* ═══════════════════════════════════════
   CONTROLS
   ═══════════════════════════════════════ */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  padding: 6px 20px 6px;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 11px;
  border: 1px solid #221e16;
  border-radius: 2px;
  background: transparent;
  color: #5a4e3e;
  cursor: pointer;
  transition: all .25s;
  position: relative;
  overflow: hidden;
}
.filter-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0;
  width: 3px; height: 100%;
  opacity: .7;
}
.filter-btn.active {
  border-color: #3a3228;
  color: #b8a880;
  background: rgba(45,38,25,.35);
}
.filter-btn:hover {
  border-color: #4a3e30;
  color: #d4c9a8;
}
.filter-btn[data-type="Mystery"]::before{background:#ad6bff}
.filter-btn[data-type="Character Arc"]::before{background:#ffd700}
.filter-btn[data-type="NPC"]::before{background:#4DB6AC}
.filter-btn[data-type="Obligation"]::before{background:#FF8A65}
.filter-btn[data-type="Threat"]::before{background:#ef4444}
.filter-btn[data-type="Faction"]::before{background:#4A90D9}
.filter-btn[data-type="Location"]::before{background:#81C784}
.filter-btn[data-type="Other"]::before{background:#9e9e9e}

.weave-btn {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  padding: 5px 22px;
  border: 2px solid #c9a84c;
  border-radius: 2px;
  background: linear-gradient(135deg, rgba(201,168,76,.1), rgba(139,105,20,.06));
  color: #c9a84c;
  cursor: pointer;
  transition: all .4s;
  margin-left: 10px;
  text-shadow: 0 0 8px rgba(201,168,76,.25);
}
.weave-btn:hover {
  background: linear-gradient(135deg, rgba(201,168,76,.22), rgba(139,105,20,.12));
  box-shadow: 0 0 28px rgba(201,168,76,.18);
}

/* ═══════════════════════════════════════
   LEGEND
   ═══════════════════════════════════════ */
.legend-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  padding: 2px 20px 6px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9.5px;
  color: #4a3e30;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.legend-swatch { width: 14px; height: 3px; border-radius: 1px }
.legend-sep { width: 1px; height: 10px; background: #1e1a14; margin: 0 4px }
.legend-marker {
  font-size: 11px;
  margin-right: 1px;
}

/* ═══════════════════════════════════════
   LOOM FRAME
   ═══════════════════════════════════════ */
.loom-container {
  position: relative;
  margin: 4px auto 0;
  max-width: 100%;
  padding: 0 12px;
}
.loom-frame {
  position: relative;
  border: 14px solid;
  border-image: linear-gradient(180deg,
    #5a4a3a 0%, #4a3a2a 8%, #3a2a1a 25%,
    #2a1c10 50%, #3a2a1a 75%, #4a3a2a 92%, #5a4a3a 100%) 1;
  box-shadow:
    inset 0 0 50px rgba(0,0,0,.95),
    0 4px 60px rgba(0,0,0,.7),
    inset 0 3px 0 rgba(100,80,55,.2),
    inset 0 -3px 0 rgba(10,6,2,.95),
    inset 3px 0 0 rgba(80,60,40,.15),
    inset -3px 0 0 rgba(80,60,40,.15);
  background: #0c0a08;
  overflow: hidden;
  opacity: 0;
  transition: opacity 1s ease, border-width .8s cubic-bezier(.22,1,.36,1);
}
.loom-frame.visible { opacity: 1 }

.loom-bar {
  height: 12px;
  background: linear-gradient(90deg,
    #2a1c10 0%, #3a2a1a 4%, #4a3a2a 10%, #3a2a1a 20%,
    #4a3a2a 35%, #3a2a1a 50%, #4a3a2a 65%, #3a2a1a 80%,
    #4a3a2a 90%, #3a2a1a 96%, #2a1c10 100%);
  position: relative;
}
.loom-bar::before {
  content: '';
  position: absolute;
  left: 0; right: 0; height: 100%;
  background: repeating-linear-gradient(90deg,
    transparent, transparent 22px,
    rgba(0,0,0,.12) 22px, rgba(0,0,0,.12) 23px);
}
.loom-bar.top { box-shadow: 0 3px 12px rgba(0,0,0,.7) }
.loom-bar.bottom { box-shadow: 0 -3px 12px rgba(0,0,0,.7) }

.tapestry-svg { display: block; width: 100% }

/* ═══════════════════════════════════════
   DENSITY BAR
   ═══════════════════════════════════════ */
.density-area {
  margin: 0 auto;
  max-width: 100%;
  padding: 0 12px;
}

/* ═══════════════════════════════════════
   TOOLTIP
   ═══════════════════════════════════════ */
.thread-tooltip {
  position: fixed;
  pointer-events: none;
  background: linear-gradient(135deg, #1a1610, #0c0a06);
  border: 1px solid #2a2218;
  border-radius: 3px;
  padding: 12px 16px;
  max-width: 320px;
  z-index: 1000;
  opacity: 0;
  transition: opacity .15s;
  box-shadow: 0 8px 36px rgba(0,0,0,.85);
}
.thread-tooltip.visible { opacity: 1 }
.tt-title {
  font-family: 'Cinzel', serif;
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 4px;
  line-height: 1.3;
}
.tt-meta {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  color: #6b6050;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.tt-span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #4a3e30;
}
.tt-events {
  margin-top: 5px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
}

/* ═══════════════════════════════════════
   SIDE PANEL
   ═══════════════════════════════════════ */
.side-panel {
  position: fixed;
  top: 0; right: -440px;
  width: 420px; height: 100vh;
  background: linear-gradient(180deg, #14120e, #0c0a06);
  border-left: 2px solid #2a1c10;
  z-index: 500;
  overflow-y: auto;
  transition: right .45s cubic-bezier(.22,1,.36,1);
  box-shadow: -14px 0 60px rgba(0,0,0,.65);
}
.side-panel.open { right: 0 }

.panel-header {
  position: sticky; top: 0; z-index: 2;
  background: linear-gradient(180deg, #1a1610, #14120e);
  padding: 22px 22px 12px;
  border-bottom: 1px solid #1e1a14;
}
.panel-close {
  position: absolute; top: 14px; right: 14px;
  width: 26px; height: 26px;
  background: none;
  border: 1px solid #2a2218;
  border-radius: 50%;
  color: #5a4e3e;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .3s;
}
.panel-close:hover { border-color: #c9a84c; color: #c9a84c }

.panel-title {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 16px;
  padding-right: 38px;
  line-height: 1.3;
}
.panel-type-badge {
  display: inline-block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 2px 9px;
  border-radius: 2px;
  margin-top: 6px;
  border: 1px solid;
}
.panel-status-badge {
  display: inline-block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 2px;
  margin-left: 6px;
  background: rgba(80,70,55,.12);
  border: 1px solid rgba(80,70,55,.25);
  color: #6b6050;
}
.panel-content { padding: 14px 22px 40px }
.panel-section { margin-bottom: 16px }
.panel-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #4a3e30;
  margin-bottom: 8px;
  padding-bottom: 3px;
  border-bottom: 1px solid #16140e;
}
.event-item {
  margin-bottom: 11px;
  padding-left: 14px;
  border-left: 2px solid #2a2218;
  position: relative;
}
.event-dot {
  position: absolute;
  left: -5px; top: 5px;
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 2px solid;
}
.event-session {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #4a3e30;
}
.event-type-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 2px;
  margin-left: 5px;
}
.event-summary {
  font-size: 12px;
  line-height: 1.5;
  color: #908878;
  margin-top: 3px;
}
.entity-tag {
  display: inline-block;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  padding: 2px 8px;
  margin: 2px 3px 2px 0;
  border-radius: 2px;
  background: rgba(201,168,76,.06);
  border: 1px solid rgba(201,168,76,.15);
  color: #b8a060;
}
.hook-item {
  font-size: 12px;
  line-height: 1.5;
  color: #908878;
  padding: 3px 0 3px 14px;
  position: relative;
}
.hook-item::before {
  content: '\27A4';
  position: absolute;
  left: 0;
  color: #3a3228;
  font-size: 8px;
  top: 6px;
}

/* ═══════════════════════════════════════
   SCROLLBAR
   ═══════════════════════════════════════ */
::-webkit-scrollbar { width: 5px }
::-webkit-scrollbar-track { background: #0a0806 }
::-webkit-scrollbar-thumb { background: #2a1c10; border-radius: 3px }
::-webkit-scrollbar-thumb:hover { background: #3a2a1a }

/* ═══════════════════════════════════════
   FEATURE 1: GOLDEN THREAD SHIMMER
   ═══════════════════════════════════════ */
@keyframes shimmer {
  0%   { stroke: #ffd700; }
  50%  { stroke: #fff8dc; }
  100% { stroke: #ffd700; }
}
.golden-thread-seg {
  animation: shimmer 3s ease-in-out infinite;
}

/* ═══════════════════════════════════════
   FEATURE 6: LOOM VIBRATION
   ═══════════════════════════════════════ */
@keyframes loomHum {
  0%, 100% { transform: translateX(0); }
  25%      { transform: translateX(0.3px); }
  75%      { transform: translateX(-0.3px); }
}
.loom-frame.humming {
  animation: loomHum 0.15s infinite;
}
</style>
</head>
<body>

<div class="title-area">
  <h1>The Tapestry of Fates</h1>
  <div class="subtitle">78 Narrative Threads Woven Across 46 Sessions</div>
</div>
<div class="stats-bar" id="statsBar"></div>
<div class="controls" id="controls"></div>
<div class="legend-row" id="legendRow"></div>

<div class="loom-container">
  <div class="loom-frame" id="loomFrame">
    <div class="loom-bar top"></div>
    <svg class="tapestry-svg" id="tapestrySvg"></svg>
    <div class="loom-bar bottom"></div>
  </div>
</div>

<div class="density-area">
  <svg id="densitySvg" style="display:block;width:100%"></svg>
</div>

<div class="thread-tooltip" id="tooltip"></div>

<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <button class="panel-close" id="panelClose">&times;</button>
    <div class="panel-title" id="panelTitle"></div>
    <div id="panelBadges"></div>
  </div>
  <div class="panel-content" id="panelContent"></div>
</div>

<script>
/* ================================================================
   DATA & CONSTANTS
   ================================================================ */
const THREADS = JSON.parse(document.getElementById('threadData').textContent);

const TYPE_COLORS = {
  'Mystery':'#ad6bff','Character Arc':'#ffd700','NPC':'#4DB6AC',
  'Obligation':'#FF8A65','Threat':'#ef4444','Faction':'#4A90D9',
  'Location':'#81C784','Other':'#9e9e9e'
};
const EVENT_COLORS = {
  create:'#81C784',advance:'#64B5F6',escalate:'#ef4444',
  reveal:'#ad6bff',resolve:'#ffd700',reopen:'#FF8A65'
};
const SESSIONS = d3.range(1, 47);
const NSESS = 46;

/* ================================================================
   STATE
   ================================================================ */
let activeTypes = new Set(['all']);
let isWoven = true;
let lockedThread = null;
let animating = false;

// ── Feature 1: Golden Thread (longest session span) ──
const GOLDEN_THREAD_ID = THREADS.slice().sort((a,b) => (b.last - b.first) - (a.last - a.first))[0].id;

// ── Feature 2: Knot Cluster sessions (5+ threads with events) ──
const KNOT_SESSIONS = (function() {
  const sessEventThreads = {};
  SESSIONS.forEach(s => { sessEventThreads[s] = new Set(); });
  THREADS.forEach(t => {
    t.events.forEach(e => { sessEventThreads[e.s].add(t.id); });
  });
  return SESSIONS.filter(s => sessEventThreads[s].size >= 5);
})();

// ── Feature 5: Hidden Rune sessions (major arc convergence points) ──
const RUNE_SESSIONS = [4, 13, 16, 17, 30, 34, 43, 46];

/* ================================================================
   STATS
   ================================================================ */
(function buildStats() {
  const active = THREADS.filter(t => t.status === 'Active').length;
  const resolved = THREADS.filter(t => t.status === 'Resolved').length;
  const pending = THREADS.filter(t => t.status === 'Pending').length;

  const sessCounts = {};
  SESSIONS.forEach(s => { sessCounts[s] = 0 });
  THREADS.forEach(t => { for (let s = t.first; s <= t.last; s++) sessCounts[s]++ });
  const maxSess = Object.entries(sessCounts).sort((a, b) => b[1] - a[1])[0];

  const longest = THREADS.slice().sort((a, b) => (b.last - b.first) - (a.last - a.first))[0];

  const stats = [
    { v: THREADS.length, l: 'Total Threads' },
    { v: active, l: 'Active' },
    { v: resolved, l: 'Resolved' },
    { v: pending, l: 'Pending' },
    { v: 'S' + String(maxSess[0]).padStart(3, '0'), l: 'Densest (' + maxSess[1] + ')' },
    { v: (longest.last - longest.first + 1) + 's', l: 'Longest Span' }
  ];

  const bar = d3.select('#statsBar');
  stats.forEach(s => {
    const it = bar.append('div').attr('class', 'stat-item');
    it.append('div').attr('class', 'stat-value').text(s.v);
    it.append('div').attr('class', 'stat-label').text(s.l);
  });
})();

/* ================================================================
   CONTROLS
   ================================================================ */
(function buildControls() {
  const c = d3.select('#controls');

  c.append('button').attr('class', 'filter-btn active').attr('data-type', 'all').text('All')
    .on('click', function() {
      activeTypes = new Set(['all']);
      c.selectAll('.filter-btn').classed('active', true);
      render();
    });

  const types = [...new Set(THREADS.map(t => t.type))].sort();
  types.forEach(type => {
    c.append('button').attr('class', 'filter-btn active').attr('data-type', type).text(type)
      .on('click', function() {
        if (activeTypes.has('all')) {
          activeTypes.clear();
          activeTypes.add(type);
          c.selectAll('.filter-btn').classed('active', false);
          d3.select(this).classed('active', true);
        } else if (activeTypes.has(type)) {
          activeTypes.delete(type);
          d3.select(this).classed('active', false);
          if (activeTypes.size === 0) {
            activeTypes.add('all');
            c.selectAll('.filter-btn').classed('active', true);
          }
        } else {
          activeTypes.add(type);
          d3.select(this).classed('active', true);
        }
        if (activeTypes.size === types.length && !activeTypes.has('all')) {
          activeTypes.clear();
          activeTypes.add('all');
          c.selectAll('.filter-btn').classed('active', true);
        }
        render();
      });
  });

  c.append('button').attr('class', 'weave-btn').attr('id', 'weaveBtn')
    .text('UNRAVEL').on('click', toggleWeave);
})();

/* ================================================================
   LEGEND
   ================================================================ */
(function buildLegend() {
  const r = d3.select('#legendRow');
  Object.entries(TYPE_COLORS).forEach(([t, c]) => {
    if (t === 'Other') return;
    const it = r.append('div').attr('class', 'legend-item');
    it.append('div').attr('class', 'legend-swatch').style('background', c);
    it.append('span').text(t);
  });
  r.append('div').attr('class', 'legend-sep');
  const markers = [
    ['\u25CF', '#81C784', 'Create'],
    ['\u2022', '#64B5F6', 'Advance'],
    ['\u25C6', '#ef4444', 'Escalate'],
    ['\u25CE', '#ad6bff', 'Reveal'],
    ['\u2605', '#ffd700', 'Resolve'],
    ['\u25CB', '#FF8A65', 'Reopen']
  ];
  markers.forEach(([sym, col, label]) => {
    const it = r.append('div').attr('class', 'legend-item');
    it.append('span').attr('class', 'legend-marker').style('color', col).text(sym);
    it.append('span').text(label);
  });
})();

/* ================================================================
   HELPERS
   ================================================================ */
function visibleThreads() {
  if (activeTypes.has('all')) return THREADS;
  return THREADS.filter(t => activeTypes.has(t.type));
}

function threadPriority(t) {
  const span = t.last - t.first + 1;
  const ev = t.events.length;
  if (span >= 15 || ev >= 5) return 'high';
  if (span >= 5 || ev >= 3) return 'medium';
  return 'low';
}

function threadThickness(t) {
  return { high: 4.5, medium: 2.8, low: 1.6 }[threadPriority(t)];
}

function threadOpacity(t) {
  if (t.status === 'Resolved') return 0.28;
  if (t.status === 'Pending') return 0.5;
  return 0.82;
}

/* ================================================================
   CORE RENDER
   ================================================================ */
function render(animate) {
  const svg = d3.select('#tapestrySvg');
  svg.selectAll('*').remove();

  const threads = visibleThreads();
  if (!threads.length) { renderDensity(); return; }

  // Sort by type group, then first session, then span length
  const typeOrder = ['Character Arc', 'Threat', 'Mystery', 'Obligation', 'Faction', 'NPC', 'Location', 'Other'];
  const sorted = threads.slice().sort((a, b) => {
    const ta = typeOrder.indexOf(a.type), tb = typeOrder.indexOf(b.type);
    if (ta !== tb) return ta - tb;
    if (a.first !== b.first) return a.first - b.first;
    return (b.last - b.first) - (a.last - a.first);
  });

  const margin = { top: 30, right: 55, bottom: 18, left: 55 };
  const W = document.getElementById('loomFrame').clientWidth - 28;
  const wovenSpacing = 8.5;
  const unravelSpacing = 17;
  const spacing = isWoven ? wovenSpacing : unravelSpacing;
  const H = margin.top + margin.bottom + sorted.length * spacing + 30;

  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('width', W).attr('height', H);

  // ── SVG Defs ──
  const defs = svg.append('defs');

  // Thread glow (subtle)
  const glow = defs.append('filter').attr('id', 'glow')
    .attr('x', '-40%').attr('y', '-80%').attr('width', '180%').attr('height', '260%');
  glow.append('feGaussianBlur').attr('stdDeviation', '2.5').attr('result', 'g');
  const gm = glow.append('feMerge');
  gm.append('feMergeNode').attr('in', 'g');
  gm.append('feMergeNode').attr('in', 'SourceGraphic');

  // Highlight glow (bright)
  const hglow = defs.append('filter').attr('id', 'hglow')
    .attr('x', '-60%').attr('y', '-100%').attr('width', '220%').attr('height', '300%');
  hglow.append('feGaussianBlur').attr('stdDeviation', '5').attr('result', 'g');
  const hm = hglow.append('feMerge');
  hm.append('feMergeNode').attr('in', 'g');
  hm.append('feMergeNode').attr('in', 'SourceGraphic');

  // Under-thread shadow
  const ushadow = defs.append('filter').attr('id', 'ushadow')
    .attr('x', '-20%').attr('y', '-50%').attr('width', '140%').attr('height', '200%');
  ushadow.append('feGaussianBlur').attr('stdDeviation', '1').attr('result', 'blur');
  ushadow.append('feOffset').attr('dx', '0').attr('dy', '1').attr('result', 'offset');
  const um = ushadow.append('feMerge');
  um.append('feMergeNode').attr('in', 'offset');
  um.append('feMergeNode').attr('in', 'SourceGraphic');

  const xScale = d3.scaleLinear()
    .domain([0.5, NSESS + 0.5])
    .range([margin.left, W - margin.right]);

  // ── Session column labels ──
  const lblG = svg.append('g');
  SESSIONS.forEach(s => {
    if (s % 5 === 0 || s === 1 || s === NSESS) {
      lblG.append('text')
        .attr('x', xScale(s)).attr('y', margin.top - 10)
        .attr('text-anchor', 'middle')
        .attr('fill', '#2a2218')
        .attr('font-family', 'JetBrains Mono, monospace')
        .attr('font-size', 8)
        .text(s);
    }
  });

  // ── Vertical grid ──
  SESSIONS.forEach(s => {
    if (s % 5 === 0) {
      svg.append('line')
        .attr('x1', xScale(s)).attr('x2', xScale(s))
        .attr('y1', margin.top).attr('y2', H - margin.bottom)
        .attr('stroke', '#12100c').attr('stroke-width', 0.5);
    }
  });

  // ── Base Y positions (each thread's home row) ──
  const baseY = {};
  sorted.forEach((t, i) => {
    baseY[t.id] = margin.top + 16 + i * spacing;
  });

  // ════════════════════════════════════
  // WEAVING ALGORITHM
  // ════════════════════════════════════
  // For each session column, find all active threads, assign y positions.
  // In woven mode: threads swap positions in a tabby-weave pattern,
  // creating the characteristic over/under interlace.
  const colData = {};

  SESSIONS.forEach(s => {
    const active = sorted.filter(t => s >= t.first && s <= t.last);

    if (!isWoven || active.length <= 1) {
      const m = {};
      active.forEach(t => { m[t.id] = { y: baseY[t.id], over: true }; });
      colData[s] = m;
      return;
    }

    // Collect the y-slots these threads occupy
    const ySlots = active.map(t => baseY[t.id]).sort((a, b) => a - b);

    // Build permutation: tabby weave with phase shift
    // Phase alternates which pairs swap each column
    const n = active.length;
    const indices = d3.range(n);
    const phase = s % 2;

    // Swap adjacent pairs with phase offset
    for (let i = phase; i < n - 1; i += 2) {
      const tmp = indices[i];
      indices[i] = indices[i + 1];
      indices[i + 1] = tmp;
    }

    const m = {};
    active.forEach((t, i) => {
      const targetSlot = indices[i];
      // A thread is "over" when it moved to a higher (lower y) position
      // or stayed in place. "under" when it moved down.
      const movedUp = targetSlot < i;
      const stayed = targetSlot === i;
      m[t.id] = {
        y: ySlots[targetSlot],
        over: movedUp || stayed
      };
    });
    colData[s] = m;
  });

  // ── Feature 5: Hidden Runes layer (behind everything) ──
  const runeG = svg.append('g').attr('class', 'layer-runes');
  RUNE_SESSIONS.forEach(s => {
    const cx = xScale(s);
    // Place rune at vertical center of the tapestry
    const cy = margin.top + (H - margin.top - margin.bottom) / 2;
    const rSize = 20; // half-size of 40x40
    const rg = runeG.append('g')
      .attr('transform', `translate(${cx},${cy})`)
      .attr('class', 'hidden-rune')
      .style('opacity', 0.10);

    // Outer circle
    rg.append('circle').attr('r', rSize)
      .attr('fill', 'none').attr('stroke', '#c4956a').attr('stroke-width', 0.8);
    // Inscribed triangle
    const triPts = [0,1,2].map(i => {
      const a = (i * 2 * Math.PI / 3) - Math.PI / 2;
      return `${Math.cos(a)*rSize*0.75},${Math.sin(a)*rSize*0.75}`;
    }).join(' ');
    rg.append('polygon').attr('points', triPts)
      .attr('fill', 'none').attr('stroke', '#c4956a').attr('stroke-width', 0.6);
    // Inner circle
    rg.append('circle').attr('r', rSize * 0.35)
      .attr('fill', 'none').attr('stroke', '#c4956a').attr('stroke-width', 0.5);

    // Invisible hover target for rune
    rg.append('circle').attr('r', rSize + 4)
      .attr('fill', 'transparent').style('cursor', 'default')
      .on('mouseenter', function(ev) {
        d3.select(this.parentNode).transition().duration(400).style('opacity', 0.40);
        const tt = d3.select('#tooltip');
        tt.html('<div class="tt-title" style="color:#c4956a">Fate Convergence Point</div>' +
                '<div class="tt-meta">Session ' + s + '</div>' +
                '<div class="tt-span">A nexus where multiple narrative threads converge</div>')
          .classed('visible', true);
        let px = ev.clientX + 16, py = ev.clientY - 10;
        const r = tt.node().getBoundingClientRect();
        if (px + r.width > window.innerWidth) px = ev.clientX - r.width - 16;
        if (py + r.height > window.innerHeight) py = window.innerHeight - r.height - 10;
        if (py < 0) py = 4;
        tt.style('left', px + 'px').style('top', py + 'px');
      })
      .on('mouseleave', function() {
        d3.select(this.parentNode).transition().duration(400).style('opacity', 0.10);
        hideTooltip();
      });
  });

  // ── Drawing layers: under first, then over ──
  const underG = svg.append('g').attr('class', 'layer-under');
  const overG = svg.append('g').attr('class', 'layer-over');
  const markerG = svg.append('g').attr('class', 'layer-markers');

  // ── Feature 2: Knot Clusters layer (above markers) ──
  const knotG = svg.append('g').attr('class', 'layer-knots');

  const labelG = svg.append('g').attr('class', 'layer-labels');
  const hoverG = svg.append('g').attr('class', 'layer-hover');

  sorted.forEach((thread, tidx) => {
    const color = TYPE_COLORS[thread.type] || '#9e9e9e';
    const thick = threadThickness(thread);
    const baseOp = threadOpacity(thread);
    const isDashed = thread.status === 'Pending';

    // Event lookup by session
    const evMap = {};
    thread.events.forEach(e => {
      if (!evMap[e.s]) evMap[e.s] = [];
      evMap[e.s].push(e);
    });

    // Build ordered points along this thread's path
    const points = [];
    for (let s = thread.first; s <= thread.last; s++) {
      const col = colData[s];
      if (!col || !col[thread.id]) continue;
      points.push({
        s,
        x: xScale(s),
        y: col[thread.id].y,
        over: col[thread.id].over
      });
    }

    if (points.length === 0) return;

    // ── Feature 1: Is this the Golden Thread? ──
    const isGolden = thread.id === GOLDEN_THREAD_ID;
    // ── Feature 4: Thread priority for tension ──
    const pri = threadPriority(thread);

    // ── Draw bezier segments ──
    for (let i = 0; i < points.length - 1; i++) {
      const p = points[i], q = points[i + 1];
      const mx = (p.x + q.x) / 2;

      // Segment layer depends on start point's over/under state
      const segOver = p.over;
      const layer = (segOver || !isWoven) ? overG : underG;

      let segThick = thick;
      let segOp = baseOp;

      // Feature 1: Golden thread is always 6px thick
      if (isGolden) segThick = 6;

      // Escalated segments are thicker and glowing
      const hasEscalate = evMap[p.s] && evMap[p.s].some(e => e.type === 'escalate');
      if (hasEscalate && !isGolden) segThick = thick + 1.8;

      // Under segments: dimmed and thinner to create depth
      if (!segOver && isWoven) {
        segOp *= 0.45;
        if (!isGolden) segThick *= 0.7;
      }

      const hasReopen = evMap[p.s] && evMap[p.s].some(e => e.type === 'reopen');

      // ── Feature 4: Thread Tension — modify path based on priority ──
      let pathD;
      if (pri === 'high') {
        // Taut: minimal vertical deviation — nearly straight with very slight easing
        const qtr = (q.x - p.x) * 0.35;
        pathD = `M${p.x},${p.y} C${p.x + qtr},${p.y} ${q.x - qtr},${q.y} ${q.x},${q.y}`;
      } else if (pri === 'low') {
        // Sagging: catenary curve, midpoint drops 3-5px
        const sag = 4;
        const midY = (p.y + q.y) / 2 + sag;
        pathD = `M${p.x},${p.y} C${mx},${midY} ${mx},${midY} ${q.x},${q.y}`;
      } else {
        // Medium: standard bezier (existing behavior)
        pathD = `M${p.x},${p.y} C${mx},${p.y} ${mx},${q.y} ${q.x},${q.y}`;
      }

      const path = layer.append('path')
        .attr('d', pathD)
        .attr('fill', 'none')
        .attr('stroke', isGolden ? '#ffd700' : color)
        .attr('stroke-width', segThick)
        .attr('stroke-linecap', 'round')
        .attr('opacity', isGolden ? Math.max(segOp, 0.9) : segOp)
        .attr('data-tid', thread.id);

      // Feature 1: Golden thread gets shimmer animation class
      if (isGolden) {
        path.classed('golden-thread-seg', true);
      }

      // ── Feature 3: Fraying Edges ──
      // Resolved threads fray in their last 3 sessions
      if (thread.status === 'Resolved') {
        const sessionsFromEnd = thread.last - p.s;
        if (sessionsFromEnd <= 2 && sessionsFromEnd >= 0) {
          if (sessionsFromEnd === 2)      path.attr('stroke-dasharray', '8,2');
          else if (sessionsFromEnd === 1) path.attr('stroke-dasharray', '5,3');
          else                            path.attr('stroke-dasharray', '3,4');
        } else if (isDashed || hasReopen) {
          path.attr('stroke-dasharray', '5,4');
        }
      } else if (isDashed || hasReopen) {
        path.attr('stroke-dasharray', '5,4');
      }

      if (hasEscalate) {
        path.attr('filter', 'url(#glow)');
      }

      // Under threads get shadow filter for depth
      if (!segOver && isWoven && !isGolden) {
        path.attr('filter', 'url(#ushadow)');
      }
      // Golden thread always gets glow
      if (isGolden) {
        path.attr('filter', 'url(#glow)');
      }
    }

    // ── Single-session thread dot ──
    if (points.length === 1) {
      const p = points[0];
      overG.append('circle')
        .attr('cx', p.x).attr('cy', p.y)
        .attr('r', thick + 1.5)
        .attr('fill', color)
        .attr('opacity', baseOp)
        .attr('data-tid', thread.id);
    }

    // ── Start/end caps ──
    if (points.length > 1) {
      // Start cap: small knot
      const pFirst = points[0];
      if (!evMap[pFirst.s] || !evMap[pFirst.s].some(e => e.type === 'create')) {
        markerG.append('circle')
          .attr('cx', pFirst.x).attr('cy', pFirst.y)
          .attr('r', thick * 0.8)
          .attr('fill', color).attr('opacity', baseOp * 0.8)
          .attr('data-tid', thread.id);
      }
      // End cap
      const pLast = points[points.length - 1];
      if (thread.status === 'Resolved') {
        // Resolved: fade dot
        markerG.append('circle')
          .attr('cx', pLast.x).attr('cy', pLast.y)
          .attr('r', thick * 0.6)
          .attr('fill', color).attr('opacity', baseOp * 0.5)
          .attr('data-tid', thread.id);
      } else {
        // Active/Pending: open-ended strand
        markerG.append('circle')
          .attr('cx', pLast.x).attr('cy', pLast.y)
          .attr('r', thick * 0.7)
          .attr('fill', color).attr('opacity', baseOp * 0.7)
          .attr('data-tid', thread.id);
      }
    }

    // ── Event markers ──
    points.forEach(p => {
      if (!evMap[p.s]) return;
      evMap[p.s].forEach(ev => {
        const g = markerG.append('g')
          .attr('transform', `translate(${p.x},${p.y})`)
          .attr('data-tid', thread.id);

        if (ev.type === 'create') {
          // Knot: concentric circles
          g.append('circle').attr('r', thick + 2.5)
            .attr('fill', color).attr('opacity', baseOp)
            .attr('stroke', '#0c0a08').attr('stroke-width', 1.5);
          g.append('circle').attr('r', thick * 0.45)
            .attr('fill', '#0c0a08');
        } else if (ev.type === 'resolve') {
          // Golden star
          const R = thick + 3.5;
          let d = '';
          for (let k = 0; k < 10; k++) {
            const a = (k * Math.PI / 5) - Math.PI / 2;
            const r = k % 2 === 0 ? R : R * 0.38;
            d += (k === 0 ? 'M' : 'L') + `${Math.cos(a)*r},${Math.sin(a)*r}`;
          }
          d += 'Z';
          g.append('path').attr('d', d)
            .attr('fill', '#ffd700').attr('opacity', .9)
            .attr('stroke', '#0c0a08').attr('stroke-width', .8)
            .attr('filter', 'url(#glow)');
        } else if (ev.type === 'escalate') {
          // Glowing diamond
          const R = thick + 2.5;
          g.append('path')
            .attr('d', `M0,${-R} L${R},0 L0,${R} L${-R},0 Z`)
            .attr('fill', color).attr('opacity', baseOp)
            .attr('stroke', 'rgba(255,255,255,.35)').attr('stroke-width', .8)
            .attr('filter', 'url(#glow)');
        } else if (ev.type === 'reveal') {
          // Eye shape
          const R = thick + 2;
          g.append('ellipse')
            .attr('rx', R * 1.6).attr('ry', R)
            .attr('fill', 'none').attr('stroke', color)
            .attr('stroke-width', 1.2).attr('opacity', baseOp);
          g.append('circle')
            .attr('r', R * 0.45)
            .attr('fill', color).attr('opacity', baseOp);
        } else if (ev.type === 'reopen') {
          // Dashed circle
          g.append('circle').attr('r', thick + 2)
            .attr('fill', 'none').attr('stroke', color)
            .attr('stroke-width', 1.5).attr('stroke-dasharray', '2,2')
            .attr('opacity', baseOp);
        } else {
          // Advance: small filled dot
          g.append('circle').attr('r', thick + 1)
            .attr('fill', color).attr('opacity', baseOp * 0.55);
        }
      });
    });

    // ── Unravel labels (only visible when unwoven) ──
    if (!isWoven && points.length > 0) {
      const lastP = points[points.length - 1];
      labelG.append('text')
        .attr('x', lastP.x + 8)
        .attr('y', baseY[thread.id] + 3.5)
        .attr('fill', color)
        .attr('opacity', .55)
        .attr('font-family', 'Barlow Condensed, sans-serif')
        .attr('font-size', 8)
        .attr('data-tid', thread.id)
        .text(thread.title.length > 38 ? thread.title.substring(0, 36) + '\u2026' : thread.title);
    }

    // ── Invisible hover targets (match tension-adjusted paths) ──
    for (let i = 0; i < points.length - 1; i++) {
      const p = points[i], q = points[i + 1];
      const mx = (p.x + q.x) / 2;
      let hoverD;
      if (pri === 'high') {
        const qtr = (q.x - p.x) * 0.35;
        hoverD = `M${p.x},${p.y} C${p.x + qtr},${p.y} ${q.x - qtr},${q.y} ${q.x},${q.y}`;
      } else if (pri === 'low') {
        const sag = 4;
        const midY = (p.y + q.y) / 2 + sag;
        hoverD = `M${p.x},${p.y} C${mx},${midY} ${mx},${midY} ${q.x},${q.y}`;
      } else {
        hoverD = `M${p.x},${p.y} C${mx},${p.y} ${mx},${q.y} ${q.x},${q.y}`;
      }
      hoverG.append('path')
        .attr('d', hoverD)
        .attr('fill', 'none')
        .attr('stroke', 'transparent')
        .attr('stroke-width', Math.max(14, thick + 10))
        .attr('data-tid', thread.id)
        .style('cursor', 'pointer')
        .on('mouseenter', () => hoverThread(thread))
        .on('mousemove', ev => showTooltip(ev, thread))
        .on('mouseleave', () => unhoverThread())
        .on('click', () => clickThread(thread));
    }
    // Single-session hover target
    if (points.length <= 1 && points.length > 0) {
      const p = points[0];
      hoverG.append('circle')
        .attr('cx', p.x).attr('cy', p.y).attr('r', 12)
        .attr('fill', 'transparent')
        .attr('data-tid', thread.id)
        .style('cursor', 'pointer')
        .on('mouseenter', () => hoverThread(thread))
        .on('mousemove', ev => showTooltip(ev, thread))
        .on('mouseleave', () => unhoverThread())
        .on('click', () => clickThread(thread));
    }
  });

  // ── Feature 2: Knot Clusters ──
  KNOT_SESSIONS.forEach(s => {
    // Count how many threads from the visible set are active at this session
    const activeHere = sorted.filter(t => s >= t.first && s <= t.last);
    if (activeHere.length < 5) return;

    const cx = xScale(s);
    // Place at the vertical center of active threads at this column
    const ys = activeHere.map(t => colData[s] && colData[s][t.id] ? colData[s][t.id].y : baseY[t.id]);
    const cy = (d3.min(ys) + d3.max(ys)) / 2;

    const kg = knotG.append('g')
      .attr('transform', `translate(${cx},${cy})`)
      .attr('class', 'knot-cluster');

    // Celtic-knot-inspired: 3 overlapping circles
    const r = 10;
    const offsets = [
      { dx: -5, dy: -3 },
      { dx:  5, dy: -3 },
      { dx:  0, dy:  5 }
    ];
    offsets.forEach(o => {
      kg.append('circle')
        .attr('cx', o.dx).attr('cy', o.dy).attr('r', r)
        .attr('fill', 'none')
        .attr('stroke', '#c4956a')
        .attr('stroke-width', 1)
        .attr('opacity', 0.4);
    });

    // Invisible hover target for knot
    kg.append('circle')
      .attr('r', 18)
      .attr('fill', 'transparent')
      .style('cursor', 'default')
      .on('mouseenter', function(ev) {
        d3.select(this.parentNode).selectAll('circle:not(:last-child)')
          .transition().duration(200).attr('opacity', 0.7);
        const tt = d3.select('#tooltip');
        tt.html('<div class="tt-title" style="color:#c4956a">Plot Convergence</div>' +
                '<div class="tt-meta">Session ' + s + '</div>' +
                '<div class="tt-span">' + activeHere.length + ' threads active</div>')
          .classed('visible', true);
        let px = ev.clientX + 16, py = ev.clientY - 10;
        const rect = tt.node().getBoundingClientRect();
        if (px + rect.width > window.innerWidth) px = ev.clientX - rect.width - 16;
        if (py + rect.height > window.innerHeight) py = window.innerHeight - rect.height - 10;
        if (py < 0) py = 4;
        tt.style('left', px + 'px').style('top', py + 'px');
      })
      .on('mouseleave', function() {
        d3.select(this.parentNode).selectAll('circle:not(:last-child)')
          .transition().duration(200).attr('opacity', 0.4);
        hideTooltip();
      });
  });

  // ── Entrance animation: left-to-right weave-in ──
  if (animate) {
    svg.selectAll('[data-tid]').each(function() {
      const el = d3.select(this);
      const tid = el.attr('data-tid');
      const idx = sorted.findIndex(t => t.id === tid);
      if (idx < 0) return;
      const origOp = el.attr('opacity');
      el.attr('opacity', 0)
        .transition()
        .delay(idx * 22)
        .duration(700)
        .ease(d3.easeCubicOut)
        .attr('opacity', origOp);
    });
  }

  if (lockedThread) applyHighlight(lockedThread.id);
  renderDensity();
}

/* ================================================================
   DENSITY BAR
   ================================================================ */
function renderDensity() {
  const svg = d3.select('#densitySvg');
  svg.selectAll('*').remove();

  const threads = visibleThreads();
  const W = document.getElementById('loomFrame').clientWidth - 28;
  const H = 42;
  const margin = { top: 2, right: 55, bottom: 16, left: 55 };
  svg.attr('viewBox', `0 0 ${W} ${H}`).attr('width', W).attr('height', H);

  const x = d3.scaleLinear().domain([0.5, NSESS + 0.5]).range([margin.left, W - margin.right]);
  const counts = SESSIONS.map(s => threads.filter(t => s >= t.first && s <= t.last).length);
  const maxC = d3.max(counts) || 1;
  const bw = (W - margin.left - margin.right) / NSESS * 0.6;
  const y = d3.scaleLinear().domain([0, maxC]).range([0, H - margin.top - margin.bottom]);

  SESSIONS.forEach((s, i) => {
    svg.append('rect')
      .attr('x', x(s) - bw / 2)
      .attr('y', H - margin.bottom - y(counts[i]))
      .attr('width', bw)
      .attr('height', y(counts[i]))
      .attr('fill', '#c9a84c')
      .attr('opacity', .18)
      .attr('rx', 1);
  });

  svg.append('text')
    .attr('x', margin.left - 2).attr('y', H - margin.bottom + 11)
    .attr('fill', '#2a2218')
    .attr('font-family', 'Barlow Condensed, sans-serif')
    .attr('font-size', 8)
    .attr('letter-spacing', '1.5px')
    .text('THREAD DENSITY');
}

/* ================================================================
   HOVER / CLICK INTERACTIONS
   ================================================================ */
function hoverThread(thread) {
  if (lockedThread) return;
  applyHighlight(thread.id);
}

function unhoverThread() {
  if (lockedThread) return;
  removeHighlight();
  hideTooltip();
}

function clickThread(thread) {
  if (lockedThread && lockedThread.id === thread.id) {
    lockedThread = null;
    removeHighlight();
    closePanel();
    return;
  }
  lockedThread = thread;
  applyHighlight(thread.id);
  openPanel(thread);
}

function applyHighlight(tid) {
  d3.select('#tapestrySvg').selectAll('[data-tid]').each(function() {
    const el = d3.select(this);
    const id = el.attr('data-tid');
    if (id === tid) {
      // Save original values
      if (!el.attr('data-orig-op')) {
        el.attr('data-orig-op', el.attr('opacity') || 1);
        el.attr('data-orig-sw', el.attr('stroke-width') || '');
        el.attr('data-orig-filter', el.attr('filter') || '');
      }
      el.transition().duration(200)
        .attr('opacity', 1);
      el.attr('filter', 'url(#hglow)');
      const sw = parseFloat(el.attr('stroke-width'));
      if (sw && el.attr('stroke') !== 'transparent') {
        el.attr('stroke-width', Math.max(sw, 6));
      }
    } else {
      if (!el.attr('data-orig-op')) {
        el.attr('data-orig-op', el.attr('opacity') || 1);
        el.attr('data-orig-sw', el.attr('stroke-width') || '');
        el.attr('data-orig-filter', el.attr('filter') || '');
      }
      el.transition().duration(200)
        .attr('opacity', 0.06);
      el.attr('filter', null);
    }
  });
}

function removeHighlight() {
  d3.select('#tapestrySvg').selectAll('[data-tid]').each(function() {
    const el = d3.select(this);
    const origOp = el.attr('data-orig-op');
    const origSw = el.attr('data-orig-sw');
    const origFilter = el.attr('data-orig-filter');
    if (origOp !== null) {
      el.transition().duration(300)
        .attr('opacity', origOp);
      if (origSw) el.attr('stroke-width', origSw);
      el.attr('filter', origFilter || null);
      el.attr('data-orig-op', null);
      el.attr('data-orig-sw', null);
      el.attr('data-orig-filter', null);
    }
  });
}

function showTooltip(event, thread) {
  const tt = d3.select('#tooltip');
  const c = TYPE_COLORS[thread.type] || '#9e9e9e';
  const eventTypes = [...new Set(thread.events.map(e => e.type))];
  const evBadges = eventTypes.map(et =>
    `<span style="color:${EVENT_COLORS[et] || '#5a4e3e'}">${et}</span>`
  ).join(' \u00B7 ');

  // Feature 1: Golden thread gets special label in tooltip
  const goldenLabel = thread.id === GOLDEN_THREAD_ID
    ? '<div style="font-family:Cinzel,serif;font-size:10px;letter-spacing:3px;color:#ffd700;text-transform:uppercase;margin-bottom:4px;text-shadow:0 0 8px rgba(255,215,0,0.4)">THE GOLDEN THREAD</div>'
    : '';

  tt.html(
    goldenLabel +
    `<div class="tt-title" style="color:${thread.id === GOLDEN_THREAD_ID ? '#ffd700' : c}">${thread.title}</div>` +
    `<div class="tt-meta">${thread.type} \u2014 ${thread.status}</div>` +
    `<div class="tt-span">S${String(thread.first).padStart(3,'0')} \u2192 S${String(thread.last).padStart(3,'0')}` +
    ` \u00B7 ${thread.last - thread.first + 1} sessions \u00B7 ${thread.events.length} events</div>` +
    `<div class="tt-events">${evBadges}</div>`
  ).classed('visible', true);

  let px = event.clientX + 16, py = event.clientY - 10;
  const r = tt.node().getBoundingClientRect();
  if (px + r.width > window.innerWidth) px = event.clientX - r.width - 16;
  if (py + r.height > window.innerHeight) py = window.innerHeight - r.height - 10;
  if (py < 0) py = 4;
  tt.style('left', px + 'px').style('top', py + 'px');
}

function hideTooltip() {
  d3.select('#tooltip').classed('visible', false);
}

/* ================================================================
   SIDE PANEL
   ================================================================ */
function openPanel(thread) {
  const c = TYPE_COLORS[thread.type] || '#9e9e9e';

  document.getElementById('panelTitle').textContent = thread.title;
  document.getElementById('panelTitle').style.color = c;

  document.getElementById('panelBadges').innerHTML =
    `<span class="panel-type-badge" style="border-color:${c};color:${c};background:${c}12">${thread.type}</span>` +
    `<span class="panel-status-badge">${thread.status}</span>`;

  let h = '';

  // Session span
  h += `<div class="panel-section">
    <div class="panel-section-title">Session Span</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:12px;color:${c}">
      S${String(thread.first).padStart(3,'0')} \u2192 S${String(thread.last).padStart(3,'0')}
      <span style="color:#4a3e30;margin-left:8px">${thread.last - thread.first + 1} sessions \u00B7 ${thread.events.length} events</span>
    </div>
  </div>`;

  // Event chronology
  h += '<div class="panel-section"><div class="panel-section-title">Event Chronology</div>';
  thread.events.forEach(e => {
    const ec = EVENT_COLORS[e.type] || '#4a3e30';
    h += `<div class="event-item" style="border-left-color:${ec}">
      <div class="event-dot" style="border-color:${ec};background:${ec}25"></div>
      <span class="event-session">S${String(e.s).padStart(3,'0')}</span>
      <span class="event-type-badge" style="background:${ec}15;color:${ec}">${e.type.toUpperCase()}</span>
      <div class="event-summary">${e.summary}</div>
    </div>`;
  });
  h += '</div>';

  // Entities
  if (thread.entities.length) {
    h += '<div class="panel-section"><div class="panel-section-title">Anchor Entities</div><div>';
    thread.entities.forEach(en => { h += `<span class="entity-tag">${en}</span>` });
    h += '</div></div>';
  }

  // Locations
  if (thread.locations.length) {
    h += '<div class="panel-section"><div class="panel-section-title">Key Locations</div><div>';
    thread.locations.forEach(l => {
      h += `<span class="entity-tag" style="background:rgba(129,199,132,.06);border-color:rgba(129,199,132,.15);color:#6faa72">${l}</span>`;
    });
    h += '</div></div>';
  }

  // Open hooks
  if (thread.hooks.length) {
    h += '<div class="panel-section"><div class="panel-section-title">Open Hooks</div>';
    thread.hooks.forEach(hk => { h += `<div class="hook-item">${hk}</div>` });
    h += '</div>';
  }

  document.getElementById('panelContent').innerHTML = h;
  document.getElementById('sidePanel').classList.add('open');
}

function closePanel() {
  document.getElementById('sidePanel').classList.remove('open');
}

document.getElementById('panelClose').addEventListener('click', () => {
  lockedThread = null;
  removeHighlight();
  closePanel();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    lockedThread = null;
    removeHighlight();
    closePanel();
    hideTooltip();
  }
});

/* ================================================================
   UNRAVEL / WEAVE ANIMATION
   ================================================================ */
function toggleWeave() {
  if (animating) return;
  animating = true;

  const btn = document.getElementById('weaveBtn');
  const frame = d3.select('#loomFrame');
  const svg = d3.select('#tapestrySvg');

  // Close panel if open
  lockedThread = null;
  closePanel();

  if (isWoven) {
    // ─── UNRAVEL ───
    btn.textContent = 'WEAVE';

    // Loom frame widens/opens
    frame.transition().duration(900).ease(d3.easeCubicOut)
      .style('border-width', '4px');

    // Fade out all elements, then re-render unwoven
    const els = svg.selectAll('[data-tid]');
    const count = els.size();

    if (count === 0) {
      isWoven = false;
      render(true);
      setTimeout(() => { animating = false }, 1800);
      return;
    }

    els.transition()
      .duration(600)
      .ease(d3.easeCubicIn)
      .attr('opacity', 0)
      .end()
      .then(() => {
        isWoven = false;
        render(true);
        setTimeout(() => { animating = false }, 1800);
      })
      .catch(() => {
        isWoven = false;
        render(true);
        setTimeout(() => { animating = false }, 1800);
      });

  } else {
    // ─── WEAVE ───
    btn.textContent = 'UNRAVEL';

    // Loom frame tightens
    frame.transition().duration(900).ease(d3.easeCubicOut)
      .style('border-width', '14px');

    const els = svg.selectAll('[data-tid]');
    const count = els.size();

    if (count === 0) {
      isWoven = true;
      render(true);
      setTimeout(() => { animating = false }, 1800);
      return;
    }

    els.transition()
      .duration(600)
      .ease(d3.easeCubicIn)
      .attr('opacity', 0)
      .end()
      .then(() => {
        isWoven = true;
        render(true);
        setTimeout(() => { animating = false }, 1800);
      })
      .catch(() => {
        isWoven = true;
        render(true);
        setTimeout(() => { animating = false }, 1800);
      });
  }
}

/* ================================================================
   INITIALIZATION
   ================================================================ */
setTimeout(() => {
  document.getElementById('loomFrame').classList.add('visible');
  setTimeout(() => render(true), 700);
}, 300);

window.addEventListener('resize', () => {
  if (!animating) render();
});

// ── Feature 6: Loom Vibration on hover ──
(function initLoomVibration() {
  const loomFrame = document.getElementById('loomFrame');
  loomFrame.addEventListener('mouseenter', () => {
    loomFrame.classList.add('humming');
  });
  loomFrame.addEventListener('mouseleave', () => {
    loomFrame.classList.remove('humming');
  });
})();
</script>
