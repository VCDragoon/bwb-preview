o Lilith in Sigil so we can fix this mess.","v":null,"e":null},{"s":"S031","c":"Ezrella","q":"Ezrella, you were waiting at the Bastion for some highly capable adventurers, and instead, a deeply traumatized group walked in carrying a frozen head in a bag. What was your first impression?","a":"Honestly, it was a bit of a buzzkill. We had a great party going in the fighting pit, and then these guys show up crying about Dementors and dead best friends. But hey, they seem to know their way around powerful enchantments, so I'll take what I can get.","v":null,"e":null},{"s":"S031","c":"Ezrella","q":"You mentioned investigating smuggled goods from the Red Wizards of Thay. Are you confident this group is up to the task?","a":"Well, the smart one is currently on ice in a Bag of Holding, and their self-proclaimed 'think brain' is a guy they call the Idiot King. So, confidence is a strong word. But they survived whatever ate their friend, so they've got grit.","v":null,"e":null},{"s":"S032","c":"Dahlia","q":"Dahlia, creating a fake 'dockworker sweepstakes' on the spot to distract the guards was certainly a bold strategy. Did you have that planned out, or were you flying by the seat of your pants?","a":"Planned? Of course it was planned! Nothing says 'totally not suspicious' like a highly enthusiastic person wielding calligrapher's supplies and demanding signatures. I mean, sure, the chant ('Go, go, dockworkers go...') needed work, but the people love a chance at a prize. Even if the prize is just me letting them live.","v":"Proud but Defensive","e":"Dahlia starting a fake sweepstakes to distract the warehouse guards."},{"s":"S032","c":"Ezrella","q":"Ezrella, your disguise as a wheezing old man was quite convincing, especially the part where you started poking people in the chest. What was your inspiration for that?","a":"Listen, when you're disguised as a fragile old man, you have to lean into the entitlement. The minute that kid started worrying about my health and tried to get the foreman, I knew I had to escalate. It's not just a disguise; it's a lifestyle. Also, it was really fun to poke Corras and call him a whippersnapper.","v":"Smug and Theatrical","e":"Ezrella using Disguise Self to play a wheezing old man and yelling at a helpful dockworker."},{"s":"S032","c":"Orla","q":"Orla, while the others were making a huge scene out front, you decided to turn into a rat and slip inside the warehouse. How was the view from down there?","a":"It was... dusty. And surprisingly complicated. Do you know how hard it is to move a giant pile of hay with tiny rat paws without leaving a trace? I found a fancy silk glove in there, which definitely doesn't belong to a dockworker. But mostly I was just trying not to sneeze.","v":"Practical and Slightly Annoyed","e":"Orla Wild Shaping into a rat to investigate the inside of the locked warehouse and searching a haystack."},{"s":"S033","c":"Dahlia","q":"Dahlia, you went from an incredibly decisive 'smash or pass' combat loop to literally asking if we should try 'benevolence' with the lich. What prompted that change of heart?","a":"Well, it was the bees. Ezrella brought up the very valid point that we skipped the 'befriend' and 'bamboozle' stages and went straight to beating them senselessly. Honestly, my directive comes straight from King Corras. When he says smash, I smash. But if there's an opportunity to try benevolence with an eyeless creature controlling zombies, I have to keep an open mind.","v":null,"e":null},{"s":"S033","c":"Dahlia","q":"Do you have any regrets about immediately decapitating the wizard?","a":"Regrets? No. It was a clean hit, very therapeutic.","v":null,"e":null},{"s":"S033","c":"Billabong","q":"Billabong, you were recently mind-controlled by a hostile entity to lay down your weapons and surrender to a wizard. What goes through your mind when something like that takes hold?","a":"Pure rage. Literally. The second I snapped out of it, I was absolutely furious. I am usually the one dominating people, so being told to obey some weird guy in a robe was a massive red flag.","v":null,"e":null},{"s":"S033","c":"Billabong","q":"So your response was to throw your dwarven hammer at a zombie's skull?","a":"Exactly. Sometimes a girl's just got to do some therapeutic thunking. And honestly, smacking that zombie so hard its head dropped to its knees was exactly what I needed to process the trauma of the domination spell.","v":null,"e":null},{"s":"S033","c":"Corras","q":"King Corras, you negotiated a truce, successfully deceived the lich into believing you, and then readied an action to stab him the second he tried to bind you. Care to comment on your diplomatic strategy?","a":"Look, I wasn't willing to make any promises until Orla and SavannahBelle were safe. The lich wanted to play games, so I told him what he wanted to hear. The minute he brought out the manacles, the deal was off.","v":null,"e":null},{"s":"S033","c":"Corras","q":"The party seemed a little conflicted about whether to keep fighting or talk it out.","a":"Well, SavannahBelle cast a fourth-level fireball into the warehouse, so I think that resolved the negotiation phase pretty quickly. Now we just have to worry about the building burning down.","v":null,"e":null},{"s":"S034","c":"SavannahBelle","q":"SavannahBelle, you managed to secure the party's stolen gear not with magic or steel, but by... acting as a therapist for a giant trash-eating monster in the sewer. Can you walk us through that strategy?","a":"I mean, he was just spiraling! Everybody was projecting their trauma onto him and calling him unsanitary. Sometimes a monster doesn't want to eat you, they just want you to validate their emotional warfare and share the muck. We set some really healthy boundaries, I apologized for my emotional hostage-taking, and he gave me all our stuff back. Friendship really is the real magic.","v":"Emotionally Validated","e":"Therapy session with Wally the Otyug"},{"s":"S034","c":"Corras","q":"Corras, after weeks of your evil twin Sarek impersonating you and ruining your reputation, you finally confronted him. And then... you absorbed his soul into your own body. How are you feeling with a second person living inside you?","a":"Honestly? A little crowded, but the dexterity boost is insane. Look, the guy had it coming after he tried to steal Ezrella's bag of holding while pretending to be me. Now he's just a voice in the back of my head complaining about my life choices. I think I'll buy a new dragon turtle hood just to annoy him.","v":"Casually Fused","e":"Absorbing Sarek via the Twin Formation"},{"s":"S034","c":"Dahlia","q":"Dahlia, the party was struggling against Asnar the Crimson, a powerful undead lich. Then you stepped up and completely obliterated him with a massive Divine Smite. What was going through your head in that moment?","a":"I was mostly just thinking about how much I wanted those screaming black silk boxers he was wearing. You don't just pass up legendary loot like that. Honestly, the lich was being a little dramatic with his whole ritual, so I just introduced him to the bright side. And now I have a half-written breakup letter to Vecna for my scrapbook!","v":"Loot-Motivated Righteousness","e":"Crit smiting the Lich Asnar"},{"s":"S035","c":"Ezrella","q":"Ezrella, as you stepped into the infamous Death House, your first instinct upon finding a hanging corpse was to poke it with a silver sword. What was going through your mind?","a":"Look, we're high-level adventurers. We've fought ancient beings and literal gods. I'm not about to let some mundane haunted house trick me with a fake corpse. Plus, I don't trust any of this wizard nonsense Mordenkainen sent us into. Poke first, ask questions later! We're the BWB, we don't have time for ghost babies.","v":null,"e":null},{"s":"S035","c":"Orla","q":"Orla, you were quite vocal about your desire to simply fireball the entire Death House and everything inside it. Why the scorched-earth policy?","a":"Honestly, who leaves unattended kids in locked rooms in a house full of dead bodies and screaming ghost babies? It's a massive safety hazard! Seven charges of a wand of fireballs just seemed like the most efficient way to clean up the neighborhood. We've got a schedule to keep and I'm not doing any dumb puzzles.","v":null,"e":null},{"s":"S035","c":"SavannahBelle","q":"SavannahBelle, while the rest of the party was upstairs investigating the baby's cries, you seemed to wander off on your own and even declared yourself to be the baby. Care to explain your investigative technique?","a":"I don't have time for fear. If you just embrace the weirdness of the haunted house, it loses its power over you. Besides, everyone else was making such a fuss over a little crying, I figured I'd go find the real wizard shit hidden in the corners. Best to just start yanking on doors and see what happens.","v":null,"e":null},{"s":"S036","c":"SavannahBelle","q":"SavannahBelle, that was quite the trip into the abyss. You looked Strahd straight in his pale face and drank a chalice of what turned out to be blood. Was that bravery, or did you legitimately just want to try the local vintage?","a":"Look, when a mysterious house bleeds on you and a pale guy in a fancy illusion offers you a drink, it's rude to decline! I just assumed it was wizard nonsense. I hate wizards! Now I'm apparently ripped and suffering extreme paranoia, so I'd say the review of the vintage is a solid 1 out of 10. Would not recommend.","v":null,"e":null},{"s":"S036","c":"Corras","q":"Corras, you practically one-shot an invisible hurricane of death with your blades early on, but later found yourself completely paralyzed and one turn away from having your soul sucked into a cultist's hand tattoo. Walk us through that emotional rollercoaster.","a":"It's the duality of the blade song, man. One minute you're dealing 60 psychic damage to the literal wind, and the next you're locked in place watching a fleshy cultist grow a baby Deadpool hand after Dahlia chopped his main one off. I was just standing there accepting my fate. Honestly, I owe Orla a drink for carrying that skin-bomb out of the blast radius, too.","v":null,"e":null},{"s":"S036","c":"Ezrella","q":"Ezrella, you were on the receiving end of some horrific attacks tonight—getting your life drained by a wraith and then bitten in the neck by a molting cultist. How are you holding up physically, and more importantly, mentally?","a":"I'm literally bleeding out of my neck and cursed with vampiric corruption. Every time we killed those cultists, they just peeled like rotten onions and came back stronger! I'm doing terribly, thanks for asking. Also, I take full responsibility for poking that fleshy coin purse. That was a mistake.","v":null,"e":null},{"s":"S037","c":"Orla","q":"Orla, you were literally engulfed by a Shambling Mound today. What was going through your mind in there?","a":"At first, I thought, 'Oh, this is cozy! It smells like my friend Billabong's restroom.' But then I realized I couldn't breathe, and my Lilypad Sun Hat was getting absolutely ruined. It was actually a terrible time.","v":"Traumatized but fashion-conscious","e":"Getting swallowed by the Shambling Mound and losing HP/oxygen."},{"s":"S037","c":"Dahlia","q":"Dahlia, that finishing blow on the cultist was brutal. You basically turned him into a salad. Any regrets?","a":"Regrets? Are you kidding? I crit, smote him for 62 damage, and sliced him up like Gordon Ramsay. If anything, I'm just upset the Crimson Abbot showed up and ruined my post-kill intimidation glare.","v":"Smug and bloodthirsty","e":"Dealing 62 damage to a cultist and dicing him into pieces."},{"s":"S037","c":"Corras","q":"Corras, you managed to break Orla out of the Shambling Mound with a massive critical hit. Walk us through that.","a":"Look, someone had to do it. The thing smelled like a swamp, and I was not about to let Orla's hat get digested. Just a casual slice and dice to hold the line, you know?","v":"Casual heroics","e":"Landing a natural 20 on the Shambling Mound to free Orla."},{"s":"S038","c":"SavannahBelle","q":"SavannahBelle, you made it out of the Death House by the skin of your teeth. And what was the first thing you did upon escaping?","a":"Oh, I just launched several twin spell fireballs right at the house. I was tired of its nonsense. And I told the group I'd just take a long rest and keep launching fireballs at it until it learned its lesson.","v":null,"e":null},{"s":"S038","c":"SavannahBelle","q":"You also offered some, let's say, 'unique' medical assistance during the ghostly childbirth in the master suite. Care to explain?","a":"Listen, I'm a worm-like being. I have mucus, I have eye tendrils. I figured I could fit into a one-inch crevice and push the baby out from the inside. It's just basic medicine!","v":null,"e":null},{"s":"S038","c":"Orla","q":"Orla, you were the first to successfully escape the shifting brick wall of the Death House. How did it feel to leave your friends behind?","a":"It was terrifying! I flew out, but the house started showing me distorted visions of what my friends were going through. I tried my best to guide them telepathically with my five-word limit, but it's hard to explain childbirth contractions in five words.","v":null,"e":null},{"s":"S038","c":"Orla","q":"Speaking of which, your advice of 'baby stillbirth, contractions, slow blades' seemed to cause some confusion among the group.","a":"I panicked! Time was dilating, the blades were spinning, and half the group didn't know whether you push during a contraction or not. It was chaos.","v":null,"e":null},{"s":"S038","c":"Corras","q":"Corras, you missed escaping through the brick wall by a hair, but you later managed to fly a carpet up the stairwell. What was going through your mind?","a":"Honestly? I thought it was a level 15 solution to a level 5 problem. When the existential dread hit us on the carpet, I almost turned us around, but thanks to some quick thinking and counter charms, we made it. I was ready to do a backflip through the spinning scythe blades if it came to it.","v":null,"e":null},{"s":"S039","c":"SavannahBelle","q":"SavannahBelle, that was quite the performance trying to charm the wagon girl. Where did the 'ignorant southerner with two left feet' routine come from?","a":"Look, I had to work with what I had. They already thought we were cursed and bringing the wrath of the old gods. I figured playing the helpless, clumsy traveler was our best bet. I just forgot that randomly bringing up annoying wizards when people are terrified of magic might backfire a tiny bit.","v":null,"e":null},{"s":"S039","c":"SavannahBelle","q":"Your Wall of Stone perfectly trapped the direwolves. How satisfying was it to just put them in a box?","a":"Oh, incredibly satisfying. We were debating running or fighting, and I realized I could just put them in time-out. Pulling ten massive stone panels out of the ground to form a perfect little wolf-prison while Ash grabbed the bag was definitely the highlight of my night.","v":null,"e":null},{"s":"S039","c":"Ash","q":"Ash, you grabbed the bag only to find a demon goat with pure black hourglass eyes. What went through your mind in that moment?","a":"Utter horror, mostly. I expected an artifact or something, not a bleeding goat kid surrounded by offal. And then Orla immediately imprints on it and declares it her best friend. I guess we're hauling a demonic goat around Barovia now.","v":null,"e":null},{"s":"S039","c":"Ash","q":"You also got pickpocketed for a healing potion while sleeping. How annoying is that?","a":"So annoying! We're sleeping in horse dung under a wagon to hide from zombies, and the one person trying to 'help' us robs me blind. I couldn't even catch her doing it. Just one more reason not to trust anyone in this awful place.","v":null,"e":null},{"s":"S039","c":"Corras","q":"Corras, you rolled a Natural 1 on your Arcana check trying to make an illusion to protect the party, and instead summoned a zombie-attracting beacon. Care to explain?","a":"Yeah, that was not my finest moment. I thought I could replicate the shimmering barrier the wagons had. Instead, I accidentally made a glowing neon sign saying 'Fresh meat under the wagon' for the local zombies. At least the session ended before we had to fight them!","v":null,"e":null},{"s":"S040","c":"Corras","q":"Corras, you had the Deck of Many Things, Madam Eva was trapped in a time stop, and she offered you a high-stakes gamble for your friends' lives. What was going through your mind?","a":"I bested her fair and square at her own game. She was asleep, I did the switcheroo, I caught the bottle. That deck was mine. She wanted to gamble? Fine, I picked one card. She just didn't like that I picked the tarot deck instead of the literal deck of many things. I wasn't about to get played after I did all the hard work.","v":"Smug and Defiant","e":"Corras refusing to give up the Deck of Many Things and opting to draw a single tarot card instead of risking the deck."},{"s":"S040","c":"Dahlia","q":"Dahlia, the moment Madam Eva put up that invisible wall and counterspelled the Dimension Doors, it was absolute chaos. How did you react?","a":"Look, the second I realized we were trapped in a tiny hut with an angry, immensely powerful fortune teller, my only thought was grabbing whoever I could and Dimension Dooring the hell out of there. The fact that SavannahBelle got counterspelled on her counterspell... well, it's just the icing on the terrible cake. And no, I did not want to be seduced.","v":"Exasperated","e":"Dahlia attempting to Dimension Door out of the hut, only for Madam Eva to counterspell the escapes."},{"s":"S040","c":"Ezrella","q":"Ezrella, you were standing outside the hut while Madam Eva tried to use you as a bargaining chip to get Corras to return the Deck. Were you worried he'd fold?","a":"Oh, absolutely not. I know Corras. He would never, ever give up a legendary artifact like that just for my life. That's not a read on him, it's just a fact. Madam Eva really thought she was doing something there, but it was honestly the worst ploy she could have possibly come up with.","v":"Matter-of-fact","e":"Madam Eva using Sending to tell Corras to trade the Deck for his friends' lives, which Ezrella knew would never work."},{"s":"S041","c":"SavannahBelle","q":"SavannahBelle, you saw a chalice full of swirling, ominous blood inside Strahd's coffin and your very first instinct was to chug it. Walk me through your thought process there.","a":"Listen, I opened the coffin, I saw the shiny chalice, and I was just a confused child who didn't know what they were doing wrong. I thought, 'Hey, maybe if I drink it, the bad magic goes away!' I did not expect my orifices to start leaking sanguine mist, and I certainly didn't expect my best friend to turn around and violently stab me to death while I was paralyzed. One star, would not recommend.","v":"Betrayed and leaking","e":"Drinking the profane blood from the chalice and being executed by a mind-controlled Ezrella before turning into a vampire spawn."},{"s":"S041","c":"Ezrella","q":"Ezrella, you put on the glowing evil crown, got mind-controlled by Strahd, and proceeded to brutally crit your paralyzed party member. How are you feeling about your tactical decisions today?","a":"Okay, in my defense, she was already full of evil blood! I genuinely thought that if I poked a few holes in her with my rapier, the bad blood would just leak out and she'd be fine. I didn't know I was going to automatically crit her into oblivion! I mean, sure, the crown made me do it, but there was logic there. Somewhat. Sort of.","v":"Mortified but rationalizing","e":"Getting mind-controlled by the crown and executing the paralyzed SavannahBelle."},{"s":"S041","c":"Orla","q":"Orla, early on you drank from a magic goblet that cured your curse but forced you to lie about anything important. How hard was it to function after that?","a":"Oh, it wasn't a problem at all. I hate these guys, so I didn't care. Wait, no, that's the lie talking! Or is it? Honestly, I just picked up an empty cup, it magically filled with water, and I figured 'harm no harm, here we go.' Next thing I know, I have to gaslight SavannahBelle about using her fancy Robe of Stars as a pillowcase. Definitely cursed myself twice in one day.","v":"Defensively gaslighting","e":"Drinking from the cursed goblet in Madame Eva's tent."},{"s":"S042","c":"Izzy","q":"Izzy, incredible performance out there tonight. Walk us through those final moments with Rahadin. You really took the 'Dragon Ball Z' approach, didn't you?","a":"Look, when you're avenging fallen kin, you don't hold back. I was wailing on him, crushing his skull in. He tried to get some last words in about dusk elves, but I wasn't having it. His head just exploded. Job done.","v":null,"e":null},{"s":"S042","c":"Izzy","q":"And when the souls swirling in his blade were released, you didn't hesitate to destroy it.","a":"I shut that down real fast. No way I was keeping that cursed scimitar around after what it did to Meg.","v":null,"e":null},{"s":"S042","c":"Shrum","q":"Shrum, early in the fight you found yourself in a... unique engagement with a wooden door. Can you explain the strategy there?","a":"It wasn't an engagement, it was a message. My trident got stuck in the door after a miss, and I figured, why waste the radiant damage from Spirit Shroud? So I blasted the door to let them know 'Shrum is here'.","v":null,"e":null},{"s":"S042","c":"Shrum","q":"It certainly sent a message. You also vaporized a Barovian Witch shortly after.","a":"Yeah, Savage Attacker goes crazy. Once I got the Spectral Trident going, it was lights out. Take that.","v":null,"e":null},{"s":"S042","c":"Lydia","q":"Lydia, you took a massive hit early on, catching fire from Immolation and suffering the Curse of the Damned. How did you manage to bounce back?","a":"Honestly, I just trusted the process. I used Disappearing Step, hid in a corner while invisible, and downed a healing potion. Plus, my Slaad minion put in some serious work while I was recovering.","v":null,"e":null},{"s":"S042","c":"Lydia","q":"That Slaad really came in clutch, rolling double 16s with advantage.","a":"He's the good kind of aberration! Once I was healed up, I dropped invisibility and got right back to Eldritch Blasting. Standard warlock things.","v":null,"e":null},{"s":"S043","c":"Corras","q":"Lord Corras, it appeared that the 'sleep study' for Lord Neverember and Isteval escalated rather quickly into a forced necrotic stasis and a subtle coup. Do you regret losing the Paladins as allies against the Fey?","a":"Look, they came at us first! We were just sitting there trying to figure out how to stretch our rations, and the guy commits three strikes of treason in a row by calling us absentee leaders. We're the people who gave them the magic obsidian shield in the first place! Honestly, there's only room for one paladin in this castle anyway. If they want to volunteer for a sleep study, that's just good science.","v":"Defensive & Smug","e":"The party casting Mass Suggestion on their political rivals to drink a stasis potion after Lord Neverember insulted them."},{"s":"S043","c":"Ash","q":"Ash, you were the only one who seemed to identify the true, terrifying necrotic nature of the Matron's stasis potion. How does it feel watching your party members immediately decide to Essence Drain the incapacitated lords?","a":"I literally cast Identify, felt the disgusting necrotic abomination flowing through that sludge, warned them that the victims would become mindless thralls to the Matron, and their first instinct was 'Oh great, can we start draining their life essence while they're asleep?' I just had to throw my hands up and take a walk. I mean, we've always been the bad guys, but sometimes it really hits you all over again.","v":"Exhausted & Resigned","e":"Ash learning the grim truth of the Matron's potion via Arcana/Identify, only for Dahlia to immediately start Essence Draining the victims."},{"s":"S043","c":"Orla","q":"Orla, while the rest of the group was busy committing what the UN might consider a war crime in the council room, you snuck out to talk to Raydoth the Druid about the dying land. What did you learn?","a":"Yeah, things got a little intense with the mind-control sludge, so I just awkward-saluted and slipped out. Raydoth is turning into a tree, which is weird, and he said the poison is deep underground. Between the refugees and the lack of infrastructure, honestly, I'm pretty sure it's just the mountains of poop. Like, we have thousands of people here and no plumbing. It's not always a magical curse, sometimes it's just sanitation.","v":"Pragmatic & Awkward","e":"Orla abandoning the political coup to investigate the corrupted land with the Emerald Enclave druid."},{"s":"S044","c":"Dahlia","q":"Dahlia, congratulations on completing another... let's call it a 'morally complex' session. Can you walk me through the thought process behind waking up a highly dangerous blood-mage prisoner in a makeshift spa?","a":"Thank you! I just felt like, you know, we had him tied up in his underwear earlier, and that's not how King Corras’s court should operate. We wanted him to wake up refreshed. Soft flute music, a plush robe, cucumber slices. We're not animals.","v":null,"e":null},{"s":"S044","c":"Dahlia","q":"Right, not animals. But you did amputate his leg with a flaming greatsword moments after he woke up.","a":"Well, he broke three of his fingers to draw a blood rune on his thigh! I panicked. But let the record show I used the flame-tongued greatsword specifically to cauterize the wound instantly. It was the most humane emergency amputation possible. I even offered to get him a chrome replacement leg from the blacksmith.","v":null,"e":null},{"s":"S044","c":"Dahlia","q":"Did he appreciate the chrome leg offer?","a":"He pledged his allegiance to King Corras right after, so I'd say the spa treatment worked flawlessly.","v":null,"e":null},{"s":"S044","c":"SavannahBelle","q":"SavannahBelle, things have escalated quickly. You walked into a mob of angry Lord's Alliance soldiers who had just lost their leader, flashed Lord Neverember's ring, and accidentally became their new commander. How does that happen?","a":"I was just trying to keep them busy! I told them we needed to prepare a funeral because the Matron clearly murdered everyone, which she totally did, by the way. And then this sergeant just looks at the ring I looted—I mean, recovered—and pledges half the army to me. Honestly, these big city politics are wild.","v":null,"e":null},{"s":"S044","c":"SavannahBelle","q":"You also seem to have casually forgotten that you got your teammate, Ash, banished to the Feywild.","a":"Look, I was stressed, there were Paladins throwing tears at us, and I used a tiny bit of magic that may have accidentally triggered a banishment. But Ash is a wizard! She knows how to get back. Eventually. Probably.","v":null,"e":null},{"s":"S044","c":"SavannahBelle","q":"She was gone for what felt like months to her.","a":"A nice vacation! I'm sure she enjoyed the fresh air.","v":null,"e":null},{"s":"S044","c":"Ash","q":"Ash, welcome back to the material plane. How was your impromptu, months-long survival trip in the Feywild?","a":"It was... character-building. I was hunted by the Wild Hunt, turned into a ghoul, forced to speak only the absolute truth for months, and had to negotiate my familiar's release from an ancient green dragon named Thorn who smelled like chlorine gas. So, you know, a typical Tuesday.","v":null,"e":null},{"s":"S044","c":"Ash","q":"How do you feel about SavannahBelle, whose instructions directly led to your banishment?","a":"I spent a significant portion of those early months simply cursing her name. I am trying to let it go, but knowing she was out here accidentally becoming a warlord while I was hiding under a rock from displacer beasts is going to require some therapy. Or at least a very long bath.","v":null,"e":null},{"s":"S044","c":"Ash","q":"Well, you're back now. Right in time for the castle to be divided by a brewing civil war.","a":"Honestly? I might just turn around and walk back to the green dragon.","v":null,"e":null},{"s":"S045","c":"Corras","q":"King Corras, how did it feel to instantly turn a rioting mob into your loyal subjects with just a wave of your rod?","a":"It was only natural. I am their King. The fact that I had to use a magical rod to remind them of that is honestly a bit insulting, but they saw the light eventually. As for the others... well, gravity is a harsh mistress.","v":"Smug","e":"Using the Rod of Rulership to charm the rioting crowd and then watching the reverse gravity spell get dispelled."},{"s":"S045","c":"SavannahBelle","q":"SavannahBelle, you lifted hundreds of people into the air, and then Lord Isteval dropped them to their deaths. Do you feel responsible?","a":"Responsible? I put them in a safe, floating bubble! They were perfectly fine up there! Isteval is the murderer who decided to cut the strings. And then to crash Lord Neverember's funeral right after and drop my ring in the mud... it's been a very stressful day for my PR team.","v":"Defensive","e":"Casting Reverse Gravity, which Isteval failed to dispel correctly, killing the peasants, and then fumbling the ring at the funeral."},{"s":"S045","c":"Ash","q":"Ash, your eulogy for Lord Neverember was... unique. Can you translate what you said in Sylvan?","a":"I panicked! I haven't done public speaking in years. I just recited Humpty Dumpty. It sounded really sad and profound if you didn't know the translation. You can't make an omelet without breaking an egg, right? That felt fitting for everything that happened today.","v":"Embarrassed","e":"Reciting Humpty Dumpty in Sylvan during Lord Neverember's funeral procession because of panic."},{"s":"S046","c":"Corras","q":"Corras, you just handed over your entire domain and the Ring of Neverember to a terrifying Matron. How are you feeling about this unconditional surrender?","a":"Look, it's not a surrender, it's a... strategic delegation. Sure, I'm basically leaving my baby with Mother Gothel, but what's the worst that could happen? In a thousand years my castle is full of her minions? I've dealt with worse. Probably.","v":"Mildly Panicked","e":"Handing over the kingdom to the Matron"},{"s":"S046","c":"Ash","q":"Ash, your Augury spell essentially greenlit giving absolute power to the Matron. Do you actually trust this plan?","a":"Trust has absolutely nothing to do with it. The bones said it was 'sound given the circumstances,' which is divination-speak for 'you have no other choice so stop complaining.' If she decides to betray us, well... that's a problem for Future Ash.","v":"Resigned but Logical","e":"Casting Augury to confirm the Matron's deal"},{"s":"S046","c":"Zibblebottom","q":"Zibblebottom, you've cracked open a Red Wizard construct and built the Ziblomatic Integrity Monitoring Array Mark 47b. What's the secret to your genius?","a":"Oh, it's all about ethically sourced unicorn hooves and completely ignoring the previous 46 failures! Only 12 of them resulted in hospitalizations, which frankly are excellent numbers. Also, I may be taking constant psychic damage from the dome, but Gerald the hamster is doing great!","v":"Manic Inventor","e":"Explaining his new inventions and the construct's memory crystal"}];

const PLAYER_COLORS = {
  Gradles:"#4A90D9",HT:"#E57373",Mary:"#81C784",
  Christie:"#BA68C8",Lucy:"#FFB74D",Tenderbittle:"#4DB6AC",
  Meijinx:"#FF8A65",Drenek:"#7986CB"
};
const PLAYER_CHARS = {
  Corras:"Gradles",Ash:"HT",Billabong:"Mary",
  Dahlia:"Christie",Lilith:"Christie",Orla:"Lucy",
  SavannahBelle:"Tenderbittle",Ave:"Meijinx",Drenek:"Drenek",
  Ezrella:"HT",Zibblebottom:"Gradles",Sarlumon:"Drenek",
  Izzy:"Lucy",Shrum:"Meijinx",Lydia:"Mary",AnnAvelle:"Meijinx"
};

function cc(c){const p=PLAYER_CHARS[c];return p?PLAYER_COLORS[p]:"#9494bf"}
function ci(c){if(!c)return"?";if(c.length<=3)return c;return c.slice(0,2).toUpperCase()}

// State
let curSession=null,curChar=null,curQAIdx=0;
let filterChar=null,filterVibe=null;
let autoTimer=null,autoActive=false,showAll=false;

// Derived
const sessions=[...new Set(RAW.map(d=>d.s))].sort();
const allChars={};
RAW.forEach(d=>{
  if(!allChars[d.c])allChars[d.c]={count:0,sessions:new Set(),vibes:new Set()};
  allChars[d.c].count++;allChars[d.c].sessions.add(d.s);
  if(d.v)allChars[d.c].vibes.add(d.v);
});
const charOrder=Object.entries(allChars).sort((a,b)=>b[1].count-a[1].count).map(d=>d[0]);
const vibeStats={};
RAW.forEach(d=>{
  if(d.v){
    if(!vibeStats[d.v])vibeStats[d.v]={count:0,chars:{}};
    vibeStats[d.v].count++;
    vibeStats[d.v].chars[d.c]=(vibeStats[d.v].chars[d.c]||0)+1;
  }
});

function getFiltered(){
  let d=RAW;
  if(filterChar)d=d.filter(x=>x.c===filterChar);
  if(filterVibe)d=d.filter(x=>x.v&&x.v.toLowerCase().includes(filterVibe.toLowerCase()));
  if(curSession)d=d.filter(x=>x.s===curSession);
  if(curChar)d=d.filter(x=>x.c===curChar);
  return d;
}
function getGlobalFiltered(){
  let d=RAW;
  if(filterChar)d=d.filter(x=>x.c===filterChar);
  if(filterVibe)d=d.filter(x=>x.v&&x.v.toLowerCase().includes(filterVibe.toLowerCase()));
  return d;
}

function updateFilterBar(){
  const bar=document.getElementById('filter-bar'),val=document.getElementById('filter-value');
  if(filterChar||filterVibe){
    bar.classList.add('active');
    const p=[];
    if(filterChar)p.push('Character: '+filterChar);
    if(filterVibe)p.push('Mood: '+filterVibe);
    val.textContent=p.join(' | ');
  }else bar.classList.remove('active');
}
function clearAllFilters(){
  filterChar=null;filterVibe=null;
  document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('active'));
  document.querySelector('.char-card-all')?.classList.add('active');
  updateFilterBar();renderSessionStrip();
  if(curSession)selectSession(curSession);
  buildVibeCloud();
}

function renderStats(){
  const bar=document.getElementById('stats-bar');
  const mc=charOrder[0],mcc=allChars[mc].count;
  let topV='',topVC=0;
  Object.entries(vibeStats).forEach(([v,s])=>{if(s.count>topVC){topV=v;topVC=s.count}});
  let rangeC='',rangeN=0;
  Object.entries(allChars).forEach(([c,s])=>{if(s.vibes.size>rangeN){rangeC=c;rangeN=s.vibes.size}});
  bar.innerHTML=`
    <div class="stat-item"><div class="stat-value">${RAW.length}</div><div class="stat-label">Total Q&amp;A</div></div>
    <div class="stat-item"><div class="stat-value">${sessions.length}</div><div class="stat-label">Sessions</div></div>
    <div class="stat-item"><div class="stat-value" style="color:${cc(mc)}">${mc}</div><div class="stat-label">Most Interviewed (${mcc})</div></div>
    <div class="stat-item"><div class="stat-value" style="font-size:18px">${topV}</div><div class="stat-label">Top Mood (${topVC})</div></div>
    <div class="stat-item"><div class="stat-value" style="color:${cc(rangeC)}">${rangeC}</div><div class="stat-label">Most Range (${rangeN} moods)</div></div>`;
}

function renderSessionStrip(){
  const strip=document.getElementById('session-strip');
  const gf=getGlobalFiltered();
  const hasData=new Set(gf.map(d=>d.s));
  strip.innerHTML=sessions.map(s=>{
    const has=hasData.has(s),act=s===curSession;
    let cls='session-btn';
    if(act)cls+=' active';
    if(has)cls+=' has-data';
    if(!has)cls+=' dimmed';
    return `<button class="${cls}" onclick="selectSession('${s}')">${s}</button>`;
  }).join('');
}

function renderGallery(){
  const g=document.getElementById('char-gallery');
  let h=`<div class="gallery-title">Characters</div>`;
  h+=`<div class="char-card char-card-all active" onclick="filterByChar(null)">
    <div class="char-avatar" style="background:var(--bg-surface);color:var(--text-muted)">ALL</div>
    <div class="char-info"><div class="char-name" style="color:var(--text-secondary)">All Characters</div>
    <div class="char-count">${RAW.length} interviews</div></div></div>`;
  charOrder.forEach(c=>{
    const info=allChars[c],col=cc(c);
    h+=`<div class="char-card" data-char="${c}" onclick="filterByChar('${c}')">
      <div class="char-avatar" style="background:${col}22;color:${col}">${ci(c)}</div>
      <div class="char-info"><div class="char-name" style="color:${col}">${c}</div>
      <div class="char-count">${info.count} across ${info.sessions.size} sessions</div></div></div>`;
  });
  g.innerHTML=h;
}

function filterByChar(c){
  filterChar=c;
  document.querySelectorAll('.char-card').forEach(card=>{
    card.classList.remove('active');
    if(!c&&card.classList.contains('char-card-all'))card.classList.add('active');
    if(c&&card.dataset.char===c)card.classList.add('active');
  });
  updateFilterBar();renderSessionStrip();
  // Find first session with data for this filter
  const gf=getGlobalFiltered();
  const availSessions=new Set(gf.map(d=>d.s));
  if(curSession&&availSessions.has(curSession)){
    selectSession(curSession);
  }else if(gf.length>0){
    selectSession(gf[0].s);
  }
}

function selectSession(sid){
  stopAutoplay();
  curSession=sid;curChar=null;curQAIdx=0;
  document.querySelectorAll('.session-btn').forEach(b=>b.classList.toggle('active',b.textContent===sid));
  document.getElementById('stage-session').textContent='SESSION '+sid.replace('S','');

  let data=RAW.filter(d=>d.s===sid);
  if(filterChar)data=data.filter(d=>d.c===filterChar);
  if(filterVibe)data=data.filter(d=>d.v&&d.v.toLowerCase().includes(filterVibe.toLowerCase()));

  const charsIn=[...new Set(data.map(d=>d.c))];
  const tabs=document.getElementById('char-tabs');
  if(charsIn.length>1){
    let th=`<div class="char-tab active" onclick="selectCharTab(null)" data-char="all">ALL</div>`;
    charsIn.forEach(c=>{
      th+=`<div class="char-tab" onclick="selectCharTab('${c}')" data-char="${c}" style="color:${cc(c)}">${c}</div>`;
    });
    tabs.innerHTML=th;tabs.style.display='flex';
  }else{tabs.style.display='none';tabs.innerHTML=''}
  renderInterviews();
}

function selectCharTab(c){
  curChar=c;curQAIdx=0;stopAutoplay();
  document.querySelectorAll('.char-tab').forEach(t=>{
    t.classList.toggle('active',(!c&&t.dataset.char==='all')||(c&&t.dataset.char===c));
  });
  renderInterviews();
}

function renderInterviews(){
  const content=document.getElementById('interview-content');
  const counter=document.getElementById('qa-counter');
  const data=getFiltered();

  if(!data.length){
    content.innerHTML=`<div class="empty-state"><div class="empty-icon">&#128566;</div>
      <div class="empty-text">No interviews match current filters</div></div>`;
    counter.textContent='';
    document.getElementById('btn-prev').disabled=true;
    document.getElementById('btn-next').disabled=true;
    return;
  }

  if(showAll){
    // Show all Q&A for this session/filter
    let html='';
    data.forEach((d,i)=>{
      if(i>0)html+='<hr class="qa-separator">';
      html+=buildQAPair(d,i);
    });
    content.innerHTML=html;
    counter.textContent=data.length+' Q&A';
    document.getElementById('btn-prev').disabled=true;
    document.getElementById('btn-next').disabled=true;
  }else{
    if(curQAIdx>=data.length)curQAIdx=data.length-1;
    if(curQAIdx<0)curQAIdx=0;
    content.innerHTML=buildQAPair(data[curQAIdx],0);
    counter.textContent=(curQAIdx+1)+' / '+data.length;
    document.getElementById('btn-prev').disabled=curQAIdx===0;
    document.getElementById('btn-next').disabled=curQAIdx>=data.length-1;
  }
}

function buildQAPair(d,idx){
  const col=cc(d.c);
  let h=`<div class="qa-pair" style="animation-delay:${Math.min(idx*.08,.4)}s">`;
  h+=`<div class="question-bubble">
    <div class="reporter-icon">R</div>
    <div class="question-text">${esc(d.q)}</div></div>`;
  h+=`<div class="answer-bubble">
    <div class="answer-text" style="border-color:${col}33">
      <span class="answer-text::before" style="background:${col}"></span>
      <span class="answer-char-name" style="color:${col}">${esc(d.c)}</span>
      ${esc(d.a)}`;
  if(d.v)h+=`<div class="vibe-badge" style="color:${col};border-color:${col}44">${esc(d.v)}</div>`;
  if(d.e)h+=`<div class="event-ref">${esc(d.e)}</div>`;
  h+=`</div><div class="answer-avatar" style="background:${col}22;color:${col}">${ci(d.c)}</div></div></div>`;
  return h;
}

function esc(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*([^*]+)\*/g,'<em style="opacity:.85">$1</em>');
}

function prevQA(){if(curQAIdx>0){curQAIdx--;renderInterviews()}}
function nextQA(){
  const d=getFiltered();
  if(curQAIdx<d.length-1){curQAIdx++;renderInterviews()}
  else if(autoActive)stopAutoplay();
}
function toggleShowAll(){
  showAll=!showAll;
  document.getElementById('btn-showall').classList.toggle('active',showAll);
  if(showAll)stopAutoplay();
  renderInterviews();
}
function toggleAutoplay(){autoActive?stopAutoplay():startAutoplay()}
function startAutoplay(){
  if(showAll){showAll=false;document.getElementById('btn-showall').classList.remove('active')}
  autoActive=true;
  document.getElementById('btn-auto').classList.add('active');
  document.getElementById('autoplay-bar').classList.add('active');
  advanceAuto();
}
function stopAutoplay(){
  autoActive=false;
  document.getElementById('btn-auto').classList.remove('active');
  document.getElementById('autoplay-bar').classList.remove('active');
  if(autoTimer){clearTimeout(autoTimer);autoTimer=null}
  const p=document.getElementById('autoplay-progress');
  p.style.transition='none';p.style.width='0%';
}
function advanceAuto(){
  if(!autoActive)return;
  const d=getFiltered();
  if(curQAIdx>=d.length-1){stopAutoplay();return}
  const p=document.getElementById('autoplay-progress');
  const dur=4000;
  p.style.transition='none';p.style.width='0%';
  requestAnimationFrame(()=>{p.style.transition=`width ${dur}ms linear`;p.style.width='100%'});
  autoTimer=setTimeout(()=>{curQAIdx++;renderInterviews();advanceAuto()},dur);
}

// Vibe cloud
function buildVibeCloud(){
  const el=document.getElementById('vibe-cloud');
  el.innerHTML='';
  const W=el.clientWidth||800,H=300;
  const vibes=Object.entries(vibeStats).map(([tag,info])=>{
    let topC='',topN=0;
    Object.entries(info.chars).forEach(([c,n])=>{if(n>topN){topC=c;topN=n}});
    return{tag,count:info.count,topChar:topC,color:cc(topC)};
  }).sort((a,b)=>b.count-a.count);
  if(!vibes.length)return;

  const svg=d3.select(el).append('svg').attr('width',W).attr('height',H);
  const sz=d3.scaleSqrt().domain([1,d3.max(vibes,d=>d.count)]).range([10,24]);
  const nodes=vibes.map(d=>({
    ...d,fontSize:sz(d.count),
    x:W/2+(Math.random()-.5)*W*.6,
    y:H/2+(Math.random()-.5)*H*.5
  }));

  // Measure text
  const tmp=svg.append('g').attr('opacity',0);
  nodes.forEach(n=>{
    const t=tmp.append('text').attr('font-family','Barlow Condensed')
      .attr('font-size',n.fontSize+'px').attr('font-weight',600).text(n.tag);
    const bb=t.node().getBBox();
    n.width=bb.width+14;n.height=bb.height+6;
  });
  tmp.remove();

  const sim=d3.forceSimulation(nodes)
    .force('center',d3.forceCenter(W/2,H/2))
    .force('charge',d3.forceManyBody().strength(1))
    .force('collide',d3.forceCollide().radius(d=>Math.max(d.width,d.height)/2+4))
    .force('x',d3.forceX(W/2).strength(.04))
    .force('y',d3.forceY(H/2).strength(.07))
    .stop();
  for(let i=0;i<250;i++)sim.tick();

  const tags=svg.selectAll('.vt').data(nodes).enter().append('g')
    .attr('class','vibe-cloud-tag')
    .attr('transform',d=>`translate(${d.x},${d.y})`)
    .on('click',(e,d)=>{
      filterVibe=filterVibe===d.tag?null:d.tag;
      updateFilterBar();renderSessionStrip();
      if(curSession)selectSession(curSession);
    });
  tags.append('text').attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('font-family','Barlow Condensed').attr('font-weight',600)
    .attr('letter-spacing','1px').attr('font-size',d=>d.fontSize+'px')
    .attr('fill',d=>d.color).attr('opacity',d=>Math.min(.4+d.count*.2,1))
    .text(d=>d.tag);
  tags.append('title').text(d=>d.tag+'\n'+d.count+'x | Most: '+d.topChar);
}

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prevQA();
  else if(e.key==='ArrowRight')nextQA();
  else if(e.key===' '&&curSession){e.preventDefault();toggleAutoplay()}
});

// Init
renderStats();renderSessionStrip();renderGallery();buildVibeCloud();
selectSession('S001');
window.addEventListener('resize',()=>{clearTimeout(window._vr);window._vr=setTimeout(buildVibeCloud,300)});
</script>
