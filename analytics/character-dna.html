<style>

  .page-subtitle {

  .legend-item.dimmed .legend-swatch {

  }

  .legend-swatch {

  }

  .legend-label {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    transition: opacity 0.3s ease;
  }

  /* Chart container */
  .chart-wrapper {
    background: linear-gradient(180deg, #0c0c18 0%, #10101e 100%);
    border: 1px solid #1e1e3a;
    border-radius: 8px;
    padding: 20px 10px 10px;
    position: relative;
    overflow: visible;
  }

  #dna-chart {

  /* Axis group header bars */

    font-family: 'Barlow Condensed', sans-serif;

    font-size: 11px;

  /* Axis labels */
  .axis-label {
    font-family: 'Barlow Condensed', sans-serif;

  .axis-label:hover {

  .axis-label.sorted {
    fill: #ffaa44;

  }

  /* Tick labels */
  .tick-label {
    font-family: 'JetBrains Mono', monospace;

  /* Polylines */

  /* Axis tooltip */

  /* Stats panel */

</style>

<body>
<div class="page-container">
  <h1 class="page-title">CHARACTER DNA</h1>
  <p class="page-subtitle">16 Personality Dimensions / 6 Characters / 3 Time Points</p>

  <div class="session-selector">
    <button class="session-btn active" data-session="S001">S001 &mdash; Early</button>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const PLAYER_COLORS = {

  HT: "#E57373",
  Mary: "#81C784",
  Christie: "#BA68C8",

};

const PLAYER_CHARS = {
  Gradles: "Corras",
  HT: "Ash",
  Mary: "Billabong",
  Christie: "Dahlia",
  Lucy: "Orla",
  Tenderbittle: "SavannahBelle"
};

const PLAYERS = Object.keys(PLAYER_COLORS);

const DIMENSIONS = [
  // Growth traits (1-10 scale)
  { key: "confidence", label: "Confidence", group: "growth", scale: [1, 10] },
  { key: "trust_in_others", label: "Trust", group: "growth", scale: [1, 10] },
  { key: "moral_compass", label: "Moral Compass", group: "growth", scale: [1, 10] },
  { key: "emotional_state", label: "Emotional State", group: "growth", scale: [1, 10] },
  { key: "goals_purpose", label: "Goals/Purpose", group: "growth", scale: [1, 10] },
  { key: "connection_to_party", label: "Party Bond", group: "growth", scale: [1, 10] },
  { key: "combat_instincts", label: "Combat Instincts", group: "growth", scale: [1, 10] },
  { key: "self_awareness", label: "Self-Awareness", group: "growth", scale: [1, 10] },
  // OCEAN (0-100)
  { key: "openness", label: "Openness", group: "ocean", scale: [0, 100] },
  { key: "conscientiousness", label: "Conscientiousness", group: "ocean", scale: [0, 100] },
  { key: "extraversion", label: "Extraversion", group: "ocean", scale: [0, 100] },
  { key: "agreeableness", label: "Agreeableness", group: "ocean", scale: [0, 100] },
  { key: "neuroticism", label: "Neuroticism", group: "ocean", scale: [0, 100] },
  // Dark Triad (0-100)
  { key: "machiavellianism", label: "Machiavellian", group: "dark_triad", scale: [0, 100] },
  { key: "narcissism", label: "Narcissism", group: "dark_triad", scale: [0, 100] },
  { key: "psychopathy", label: "Psychopathy", group: "dark_triad", scale: [0, 100] }
];

const GROUP_COLORS = {
  growth: { bar: "#d4a84480", text: "#d4a844", label: "Growth Traits" },
  ocean: { bar: "#4a7abf40", text: "#4a90d9", label: "OCEAN" },
  dark_triad: { bar: "#c0404040", text: "#e05555", label: "Dark Triad" }
};

// Raw data per session, per player
const RAW_DATA = {
  S001: {
    Gradles: { confidence:8, trust_in_others:6, moral_compass:5, emotional_state:7, goals_purpose:8, connection_to_party:7, combat_instincts:5, self_awareness:5, openness:80, conscientiousness:35, extraversion:85, agreeableness:50, neuroticism:25, machiavellianism:55, narcissism:65, psychopathy:20 },
    HT: { confidence:6, trust_in_others:5, moral_compass:5, emotional_state:5, goals_purpose:8, connection_to_party:5, combat_instincts:5, self_awareness:4, openness:85, conscientiousness:60, extraversion:40, agreeableness:55, neuroticism:45, machiavellianism:30, narcissism:20, psychopathy:25 },
    Mary: { confidence:8, trust_in_others:7, moral_compass:6, emotional_state:8, goals_purpose:7, connection_to_party:8, combat_instincts:8, self_awareness:6, openness:55, conscientiousness:30, extraversion:75, agreeableness:70, neuroticism:20, machiavellianism:10, narcissism:15, psychopathy:15 },
    Christie: { confidence:7, trust_in_others:5, moral_compass:6, emotional_state:6, goals_purpose:8, connection_to_party:6, combat_instincts:7, self_awareness:6, openness:60, conscientiousness:65, extraversion:70, agreeableness:55, neuroticism:40, machiavellianism:40, narcissism:35, psychopathy:15 },
    Lucy: { confidence:7, trust_in_others:8, moral_compass:8, emotional_state:7, goals_purpose:7, connection_to_party:8, combat_instincts:6, self_awareness:7, openness:75, conscientiousness:55, extraversion:45, agreeableness:80, neuroticism:35, machiavellianism:10, narcissism:10, psychopathy:5 },
    Tenderbittle: null // Not present in S001
  },
  S023: {
    Gradles: { confidence:5, trust_in_others:4, moral_compass:5, emotional_state:3, goals_purpose:8, connection_to_party:7, combat_instincts:6, self_awareness:7, openness:80, conscientiousness:38, extraversion:68, agreeableness:45, neuroticism:30, machiavellianism:58, narcissism:42, psychopathy:22 },
    HT: { confidence:7, trust_in_others:5, moral_compass:6, emotional_state:5, goals_purpose:9, connection_to_party:7, combat_instincts:7, self_awareness:8, openness:83, conscientiousness:60, extraversion:48, agreeableness:58, neuroticism:30, machiavellianism:42, narcissism:25, psychopathy:15 },
    Mary: { confidence:7, trust_in_others:5, moral_compass:4, emotional_state:5, goals_purpose:7, connection_to_party:6, combat_instincts:8, self_awareness:5, openness:52, conscientiousness:25, extraversion:80, agreeableness:60, neuroticism:15, machiavellianism:15, narcissism:25, psychopathy:30 },
    Christie: { confidence:9, trust_in_others:6, moral_compass:8, emotional_state:7, goals_purpose:9, connection_to_party:7, combat_instincts:8, self_awareness:8, openness:62, conscientiousness:50, extraversion:72, agreeableness:65, neuroticism:25, machiavellianism:28, narcissism:35, psychopathy:15 },
    Lucy: { confidence:7, trust_in_others:8, moral_compass:6, emotional_state:6, goals_purpose:7, connection_to_party:8, combat_instincts:6, self_awareness:8, openness:68, conscientiousness:42, extraversion:35, agreeableness:82, neuroticism:25, machiavellianism:10, narcissism:10, psychopathy:8 },
    Tenderbittle: { confidence:8, trust_in_others:6, moral_compass:5, emotional_state:7, goals_purpose:7, connection_to_party:7, combat_instincts:9, self_awareness:7, openness:65, conscientiousness:28, extraversion:72, agreeableness:48, neuroticism:35, machiavellianism:20, narcissism:30, psychopathy:32 }
  },
  S045: {
    Gradles: { confidence:9, trust_in_others:4, moral_compass:5, emotional_state:6, goals_purpose:8, connection_to_party:7, combat_instincts:8, self_awareness:6, openness:75, conscientiousness:35, extraversion:85, agreeableness:30, neuroticism:30, machiavellianism:80, narcissism:60, psychopathy:55 },
    HT: { confidence:8, trust_in_others:6, moral_compass:5, emotional_state:6, goals_purpose:7, connection_to_party:8, combat_instincts:8, self_awareness:6, openness:82, conscientiousness:60, extraversion:40, agreeableness:45, neuroticism:45, machiavellianism:35, narcissism:20, psychopathy:35 },
    Mary: null, // Not present in S045
    Christie: { confidence:9, trust_in_others:3, moral_compass:6, emotional_state:5, goals_purpose:8, connection_to_party:7, combat_instincts:9, self_awareness:6, openness:55, conscientiousness:55, extraversion:65, agreeableness:50, neuroticism:55, machiavellianism:35, narcissism:25, psychopathy:45 },
    Lucy: { confidence:7, trust_in_others:7, moral_compass:6, emotional_state:7, goals_purpose:7, connection_to_party:8, combat_instincts:7, self_awareness:7, openness:85, conscientiousness:50, extraversion:50, agreeableness:55, neuroticism:35, machiavellianism:20, narcissism:15, psychopathy:35 },
    Tenderbittle: { confidence:8, trust_in_others:4, moral_compass:4, emotional_state:5, goals_purpose:7, connection_to_party:6, combat_instincts:8, self_awareness:6, openness:60, conscientiousness:50, extraversion:85, agreeableness:20, neuroticism:25, machiavellianism:65, narcissism:55, psychopathy:60 }
  }
};

// Normalize a value to 0-1
function normalize(val, dim) {
  const [lo, hi] = dim.scale;
  return (val - lo) / (hi - lo);
}

// Get normalized data for a session
function getNormalized(session) {
  const result = {};
  PLAYERS.forEach(p => {
    const raw = RAW_DATA[session][p];
    if (!raw) { result[p] = null; return; }
    result[p] = {};
    DIMENSIONS.forEach(d => {
      result[p][d.key] = normalize(raw[d.key], d);
    });
  });
  return result;
}

// ─── CHART SETUP ─────────────────────────────────────────────────────────────

const margin = { top: 80, right: 40, bottom: 30, left: 40 };
const chartW = 1500;
const chartH = 520;
const innerW = chartW - margin.left - margin.right;
const innerH = chartH - margin.top - margin.bottom;

const svg = d3.select("#dna-chart")
  .attr("viewBox", `0 0 ${chartW} ${chartH}`)
  .attr("preserveAspectRatio", "xMidYMid meet");

// Glow filter for lines
const defs = svg.append("defs");
PLAYERS.forEach(p => {
  const filter = defs.append("filter")
    .attr("id", `glow-${p}`)
    .attr("x", "-20%").attr("y", "-20%")
    .attr("width", "140%").attr("height", "140%");
  filter.append("feGaussianBlur")
    .attr("stdDeviation", "3")
    .attr("result", "blur");
  filter.append("feFlood")
    .attr("flood-color", PLAYER_COLORS[p])
    .attr("flood-opacity", "0.35");
  filter.append("feComposite")
    .attr("in2", "blur")
    .attr("operator", "in");
  const merge = filter.append("feMerge");
  merge.append("feMergeNode");
  merge.append("feMergeNode").attr("in", "SourceGraphic");
});

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

// Current dimension order (mutable via drag)
let dimOrder = DIMENSIONS.map((d, i) => i);
let currentSession = "S001";
let currentData = getNormalized(currentSession);
let sortedDim = null;
let selectedPlayer = null;

// Scales
const yScale = d3.scaleLinear().domain([0, 1]).range([innerH, 0]);
const xPositions = () => {
  const n = DIMENSIONS.length;
  return dimOrder.map((_, i) => (i / (n - 1)) * innerW);
};

// ─── DRAW GROUP HEADERS ──────────────────────────────────────────────────────

const headerG = g.append("g").attr("class", "group-headers");

function drawHeaders() {
  headerG.selectAll("*").remove();
  const positions = xPositions();
  const groups = ["growth", "ocean", "dark_triad"];

  groups.forEach(grp => {
    const indices = dimOrder.map((di, i) => ({ di, i })).filter(d => DIMENSIONS[d.di].group === grp);
    if (indices.length === 0) return;
    const x1 = positions[indices[0].i];
    const x2 = positions[indices[indices.length - 1].i];
    const gc = GROUP_COLORS[grp];

    headerG.append("rect")
      .attr("x", x1 - 15)
      .attr("y", -55)
      .attr("width", x2 - x1 + 30)
      .attr("height", 18)
      .attr("rx", 3)
      .attr("fill", gc.bar);

    headerG.append("text")
      .attr("x", (x1 + x2) / 2)
      .attr("y", -42)
      .attr("text-anchor", "middle")
      .attr("class", "group-header")
      .attr("fill", gc.text)
      .text(gc.label);
  });
}

// ─── DRAW AXES ───────────────────────────────────────────────────────────────

const axesG = g.append("g").attr("class", "axes-group");
const ticks = [0, 0.25, 0.5, 0.75, 1.0];

function drawAxes() {
  axesG.selectAll("*").remove();
  const positions = xPositions();

  dimOrder.forEach((di, i) => {
    const dim = DIMENSIONS[di];
    const x = positions[i];
    const ag = axesG.append("g")
      .attr("class", "axis-g")
      .attr("data-dim", di);

    // Axis line
    ag.append("line")
      .attr("x1", x).attr("y1", 0)
      .attr("x2", x).attr("y2", innerH)
      .attr("stroke", "#2a2a44")
      .attr("stroke-width", 1);

    // Tick marks and labels
    ticks.forEach(t => {
      const y = yScale(t);
      ag.append("line")
        .attr("x1", x - 4).attr("y1", y)
        .attr("x2", x + 4).attr("y2", y)
        .attr("stroke", "#3a3a5c")
        .attr("stroke-width", 1);

      ag.append("text")
        .attr("x", x - 8).attr("y", y + 3)
        .attr("text-anchor", "end")
        .attr("class", "tick-label")
        .text(t.toFixed(2));
    });

    // Axis label (rotated, draggable, clickable)
    const label = ag.append("text")
      .attr("x", x).attr("y", -22)
      .attr("text-anchor", "start")
      .attr("class", "axis-label" + (sortedDim === di ? " sorted" : ""))
      .attr("transform", `rotate(-45, ${x}, -22)`)
      .attr("data-dim-idx", di)
      .text(dim.label);

    // Click to sort
    label.on("click", function (event) {
      event.stopPropagation();
      const clickedDi = +d3.select(this).attr("data-dim-idx");
      sortedDim = sortedDim === clickedDi ? null : clickedDi;
      updateAll();
    });

    // Invisible wider hitbox for axis hover
    ag.append("rect")
      .attr("x", x - 20).attr("y", -10)
      .attr("width", 40).attr("height", innerH + 10)
      .attr("fill", "transparent")
      .attr("class", "axis-hitbox")
      .on("mouseenter", function (event) { showAxisTooltip(event, di); })
      .on("mousemove", function (event) { moveAxisTooltip(event); })
      .on("mouseleave", hideAxisTooltip);

    // Drag behavior on label
    label.call(d3.drag()
      .on("start", function () { svg.classed("dragging", true); })
      .on("drag", function (event) {
        const mouseX = event.x;
        const positions = xPositions();
        // Find closest position
        let closest = 0;
        let minDist = Infinity;
        positions.forEach((px, idx) => {
          const dist = Math.abs(mouseX - px);
          if (dist < minDist) { minDist = dist; closest = idx; }
        });
        // Find current position of this dim in dimOrder
        const currentPos = dimOrder.indexOf(di);
        if (closest !== currentPos) {
          dimOrder.splice(currentPos, 1);
          dimOrder.splice(closest, 0, di);
          updateAll(true);
        }
      })
      .on("end", function () { svg.classed("dragging", false); })
    );
  });
}

// ─── AXIS TOOLTIP ────────────────────────────────────────────────────────────

const tooltipEl = document.getElementById("axis-tooltip");

function showAxisTooltip(event, di) {
  const dim = DIMENSIONS[di];
  let rows = "";
  PLAYERS.forEach(p => {
    if (!currentData[p]) return;
    const raw = RAW_DATA[currentSession][p][dim.key];
    const norm = currentData[p][dim.key];
    const color = PLAYER_COLORS[p];
    rows += `<div class="tip-row">
      <span class="tip-name" style="color:${color}">${PLAYER_CHARS[p]}</span>
      <span class="tip-val" style="color:${color}">${raw} <span style="color:#555570;font-size:0.65rem">(${norm.toFixed(2)})</span></span>
    </div>`;
  });

  tooltipEl.innerHTML = `<div class="tip-title">${dim.label}</div>${rows}`;
  tooltipEl.style.opacity = 1;
  moveAxisTooltip(event);
}

function moveAxisTooltip(event) {
  const wrapper = document.querySelector(".chart-wrapper");
  const rect = wrapper.getBoundingClientRect();
  let x = event.clientX - rect.left + 15;
  let y = event.clientY - rect.top - 10;
  if (x + 200 > rect.width) x -= 220;
  tooltipEl.style.left = x + "px";
  tooltipEl.style.top = y + "px";
}

function hideAxisTooltip() {
  tooltipEl.style.opacity = 0;
}

// ─── DRAW LINES ──────────────────────────────────────────────────────────────

const linesG = g.append("g").attr("class", "lines-group");

function linePath(playerData) {
  const positions = xPositions();
  const midY = yScale(0.5);
  const points = dimOrder.map((di, i) => {
    const y = playerData ? yScale(playerData[DIMENSIONS[di].key]) : midY;
    return [positions[i], y];
  });
  return d3.line().curve(d3.curveCatmullRom.alpha(0.5))(points);
}

function drawLines(animate = false) {
  const sel = linesG.selectAll(".char-line")
    .data(PLAYERS, d => d);

  // Enter
  sel.enter()
    .append("path")
    .attr("class", "char-line")
    .attr("data-player", d => d)
    .attr("stroke", d => PLAYER_COLORS[d])
    .attr("stroke-width", 2.5)
    .attr("filter", d => `url(#glow-${d})`)
    .attr("opacity", d => currentData[d] ? 0.7 : 0)
    .attr("d", d => linePath(currentData[d]))
    .on("mouseenter", function (event, d) { highlightPlayer(d); })
    .on("mouseleave", function () { unhighlightPlayer(); })
    .on("click", function (event, d) { selectPlayer(d); });

  // Update
  const update = linesG.selectAll(".char-line");
  if (animate) {
    update.transition().duration(800).ease(d3.easeCubicInOut)
      .attr("d", d => linePath(currentData[d]))
      .attr("opacity", d => {
        if (!currentData[d]) return 0;
        if (selectedPlayer && selectedPlayer !== d) return 0.15;
        return 0.7;
      });
  } else {
    update
      .attr("d", d => linePath(currentData[d]))
      .attr("opacity", d => {
        if (!currentData[d]) return 0;
        if (selectedPlayer && selectedPlayer !== d) return 0.15;
        return 0.7;
      });
  }
}

// ─── DRAW VALUE DOTS (on sorted axis) ────────────────────────────────────────

const dotsG = g.append("g").attr("class", "dots-group");

function drawSortDots() {
  dotsG.selectAll("*").remove();
  if (sortedDim === null) return;

  const positions = xPositions();
  const posIdx = dimOrder.indexOf(sortedDim);
  if (posIdx < 0) return;
  const x = positions[posIdx];
  const dim = DIMENSIONS[sortedDim];

  // Rank players on this dimension
  const ranked = PLAYERS
    .filter(p => currentData[p])
    .map(p => ({ player: p, val: currentData[p][dim.key], raw: RAW_DATA[currentSession][p][dim.key] }))
    .sort((a, b) => b.val - a.val);

  ranked.forEach((r, i) => {
    const y = yScale(r.val);

    dotsG.append("circle")
      .attr("cx", x).attr("cy", y)
      .attr("r", 5)
      .attr("fill", PLAYER_COLORS[r.player])
      .attr("stroke", "#06060c")
      .attr("stroke-width", 1.5)
      .style("filter", `drop-shadow(0 0 4px ${PLAYER_COLORS[r.player]})`);

    // Rank label
    dotsG.append("text")
      .attr("x", x + 10).attr("y", y + 4)
      .attr("font-family", "JetBrains Mono")
      .attr("font-size", "10px")
      .attr("fill", PLAYER_COLORS[r.player])
      .text(`#${i + 1} ${PLAYER_CHARS[r.player]} (${r.raw})`);
  });
}

// ─── VERTEX DOTS ─────────────────────────────────────────────────────────────

const vertexG = g.append("g").attr("class", "vertex-group");

function showVertexDots(player) {
  vertexG.selectAll("*").remove();
  if (!currentData[player]) return;
  const positions = xPositions();
  const color = PLAYER_COLORS[player];

  dimOrder.forEach((di, i) => {
    const dim = DIMENSIONS[di];
    const x = positions[i];
    const y = yScale(currentData[player][dim.key]);

    vertexG.append("circle")
      .attr("cx", x).attr("cy", y)
      .attr("r", 4)
      .attr("fill", color)
      .attr("stroke", "#06060c")
      .attr("stroke-width", 1.5)
      .style("filter", `drop-shadow(0 0 5px ${color})`);
  });
}

function hideVertexDots() {
  vertexG.selectAll("*").remove();
}

// ─── HIGHLIGHT / SELECT ──────────────────────────────────────────────────────

function applyHighlight(player) {
  linesG.selectAll(".char-line")
    .attr("opacity", d => {
      if (!currentData[d]) return 0;
      return d === player ? 1 : 0.1;
    })
    .attr("stroke-width", d => d === player ? 4 : 2);

  d3.selectAll(".char-line").filter(d => d === player).raise();
  showVertexDots(player);
  showProfile(player);
  updateLegendHighlight(player);
}

function clearHighlight() {
  linesG.selectAll(".char-line")
    .attr("opacity", d => currentData[d] ? 0.7 : 0)
    .attr("stroke-width", 2.5);
  hideVertexDots();
  clearProfile();
  updateLegendHighlight(null);
}

function highlightPlayer(player) {
  if (selectedPlayer) return;
  applyHighlight(player);
}

function unhighlightPlayer() {
  if (selectedPlayer) return;
  clearHighlight();
}

function selectPlayer(player) {
  if (selectedPlayer === player) {
    selectedPlayer = null;
    clearHighlight();
  } else {
    selectedPlayer = player;
    applyHighlight(player);
  }
}

function updateLegendHighlight(player) {
  d3.selectAll(".legend-item")
    .classed("dimmed", d => player !== null && d !== player);
}

// ─── PROFILE PANEL ───────────────────────────────────────────────────────────

function showProfile(player) {
  const container = document.getElementById("profile-content");
  if (!currentData[player]) {
    container.innerHTML = `<p class="profile-empty">${PLAYER_CHARS[player]} was not present in this session</p>`;
    return;
  }

  const raw = RAW_DATA[currentSession][player];
  const rawS001 = RAW_DATA.S001[player];
  const rawS045 = RAW_DATA.S045[player];
  const color = PLAYER_COLORS[player];

  // Find most distinctive & weakest
  let maxNorm = -1, minNorm = 2, maxDim = "", minDim = "";
  DIMENSIONS.forEach(d => {
    const n = currentData[player][d.key];
    if (n > maxNorm) { maxNorm = n; maxDim = d.label; }
    if (n < minNorm) { minNorm = n; minDim = d.label; }
  });

  // Build trait rows
  let traitRows = "";
  DIMENSIONS.forEach(d => {
    const val = raw[d.key];
    const norm = currentData[player][d.key];
    // Delta from S001 to S045
    let deltaHtml = "";
    if (rawS001 && rawS045) {
      const v1 = rawS001[d.key];
      const v2 = rawS045[d.key];
      // Normalize both
      const n1 = normalize(v1, d);
      const n2 = normalize(v2, d);
      const diff = v2 - v1;
      if (diff > 0) deltaHtml = `<span class="trait-delta delta-up">+${diff}</span>`;
      else if (diff < 0) deltaHtml = `<span class="trait-delta delta-down">${diff}</span>`;
      else deltaHtml = `<span class="trait-delta delta-flat">=</span>`;
    }
    const gc = GROUP_COLORS[d.group];
    traitRows += `<div class="trait-row">
      <span class="trait-name" style="border-left: 2px solid ${gc.text}; padding-left: 6px;">${d.label}</span>
      <span><span class="trait-value" style="color:${color}">${val}</span>${deltaHtml}</span>
    </div>`;
  });

  container.innerHTML = `
    <div class="profile-header">
      <div class="profile-color-dot" style="background:${color}; box-shadow: 0 0 8px ${color}"></div>
      <span class="profile-name" style="color:${color}">${PLAYER_CHARS[player]}</span>
      <span class="profile-meta">${player} / ${currentSession}</span>
    </div>
    <div class="trait-grid">${traitRows}</div>
    <hr class="profile-divider">
    <div class="profile-callout">
      <div class="callout-box">
        <div class="callout-label">Strongest Trait</div>
        <div class="callout-value" style="color:#4CAF50">${maxDim} <span style="color:#555570;font-size:0.75rem">(${maxNorm.toFixed(2)})</span></div>
      </div>
      <div class="callout-box">
        <div class="callout-label">Weakest Trait</div>
        <div class="callout-value" style="color:#f44336">${minDim} <span style="color:#555570;font-size:0.75rem">(${minNorm.toFixed(2)})</span></div>
      </div>
    </div>
  `;
}

function clearProfile() {
  document.getElementById("profile-content").innerHTML =
    `<p class="profile-empty">Hover or click a character line to view their full profile</p>`;
}

// ─── STATS PANEL ─────────────────────────────────────────────────────────────

function computeStats() {
  const activePlayers = PLAYERS.filter(p => currentData[p]);
  const numDims = DIMENSIONS.length;

  // Compute pairwise distances
  let minDist = Infinity, maxDist = -1;
  let mostSimilar = "", mostDifferent = "";

  for (let i = 0; i < activePlayers.length; i++) {
    for (let j = i + 1; j < activePlayers.length; j++) {
      const a = activePlayers[i], b = activePlayers[j];
      let dist = 0;
      DIMENSIONS.forEach(d => {
        const diff = currentData[a][d.key] - currentData[b][d.key];
        dist += diff * diff;
      });
      dist = Math.sqrt(dist / numDims);

      if (dist < minDist) {
        minDist = dist;
        mostSimilar = `${PLAYER_CHARS[a]} & ${PLAYER_CHARS[b]}`;
      }
      if (dist > maxDist) {
        maxDist = dist;
        mostDifferent = `${PLAYER_CHARS[a]} & ${PLAYER_CHARS[b]}`;
      }
    }
  }

  // Most extreme (highest single normalized value)
  let extremeVal = -1, extremePlayer = "", extremeDim = "";
  activePlayers.forEach(p => {
    DIMENSIONS.forEach(d => {
      const v = currentData[p][d.key];
      if (v > extremeVal) { extremeVal = v; extremePlayer = p; extremeDim = d.label; }
    });
  });

  // Most balanced (lowest variance)
  let minVar = Infinity, balancedPlayer = "";
  activePlayers.forEach(p => {
    const vals = DIMENSIONS.map(d => currentData[p][d.key]);
    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
    const variance = vals.reduce((a, v) => a + (v - mean) ** 2, 0) / vals.length;
    if (variance < minVar) { minVar = variance; balancedPlayer = p; }
  });

  const statsEl = document.getElementById("stats-content");
  statsEl.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Most Similar Pair</div>
      <div class="stat-value" style="color:#81C784">${mostSimilar}</div>
      <div class="stat-detail">Avg distance: ${minDist.toFixed(3)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Most Different Pair</div>
      <div class="stat-value" style="color:#E57373">${mostDifferent}</div>
      <div class="stat-detail">Avg distance: ${maxDist.toFixed(3)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Most Extreme Character</div>
      <div class="stat-value" style="color:${PLAYER_COLORS[extremePlayer]}">${PLAYER_CHARS[extremePlayer]}</div>
      <div class="stat-detail">Highest on ${extremeDim} (${extremeVal.toFixed(2)})</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Most Balanced Character</div>
      <div class="stat-value" style="color:${PLAYER_COLORS[balancedPlayer]}">${PLAYER_CHARS[balancedPlayer]}</div>
      <div class="stat-detail">Variance: ${minVar.toFixed(4)}</div>
    </div>
  `;
}

// ─── LEGEND ──────────────────────────────────────────────────────────────────

function buildLegend() {
  const legendEl = document.getElementById("legend");
  legendEl.innerHTML = "";
  PLAYERS.forEach(p => {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.innerHTML = `
      <div class="legend-swatch" style="background:${PLAYER_COLORS[p]}; box-shadow: 0 0 6px ${PLAYER_COLORS[p]}44"></div>
      <span class="legend-label" style="color:${PLAYER_COLORS[p]}">${PLAYER_CHARS[p]}</span>
    `;
    item.__data__ = p;
    item.addEventListener("mouseenter", () => {
      if (!selectedPlayer) highlightPlayer(p);
    });
    item.addEventListener("mouseleave", () => {
      if (!selectedPlayer) unhighlightPlayer();
    });
    item.addEventListener("click", () => selectPlayer(p));
    legendEl.appendChild(item);
  });
}

// ─── SESSION SWITCH ──────────────────────────────────────────────────────────

document.querySelectorAll(".session-btn").forEach(btn => {
  btn.addEventListener("click", function () {
    document.querySelectorAll(".session-btn").forEach(b => b.classList.remove("active"));
    this.classList.add("active");
    currentSession = this.dataset.session;
    currentData = getNormalized(currentSession);
    selectedPlayer = null;
    hideVertexDots();
    drawLines(true);
    drawSortDots();
    computeStats();
    clearProfile();
    updateLegendHighlight(null);
  });
});

// Click on background to deselect
svg.on("click", function () {
  if (selectedPlayer) {
    selectedPlayer = null;
    clearHighlight();
  }
});

// ─── UPDATE ALL ──────────────────────────────────────────────────────────────

function updateAll(immediate = false) {
  drawHeaders();
  drawAxes();
  if (immediate) drawLines(false);
  else drawLines(true);
  drawSortDots();
  computeStats();
}

// ─── INIT ────────────────────────────────────────────────────────────────────

buildLegend();
drawHeaders();
drawAxes();
drawLines(false);
computeStats();

</script>
</body>
</html>
