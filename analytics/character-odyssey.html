<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE CHARACTER ODYSSEY | BWB Campaign</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#06060c;--bg-primary:#0a0a14;--bg-card:#0f1020;--bg-card-hover:#141530;
  --bg-surface:#1a1a2e;--bg-elevated:#22223a;
  --text-primary:#eef0ff;--text-secondary:#9494bf;--text-muted:#8a8ab5;
  --border:#2a2a4a;--border-glow:#3a3a6a;
  --accent-blue:#00d4ff;--accent-gold:#ffd700;--accent-red:#ff4444;
  --accent-green:#44ff88;--accent-purple:#ad6bff;--accent-orange:#ff8844;
}
html{scroll-behavior:smooth}
body{background:var(--bg-deep);color:var(--text-primary);font-family:'Barlow',sans-serif;overflow:hidden;height:100vh}
body::after{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.015) 3px,rgba(0,0,0,0.015) 4px)}

/* === HEADER === */
.page-header{position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(180deg,rgba(6,6,12,0.98),rgba(6,6,12,0.88));
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{padding:6px 24px;display:flex;align-items:center;gap:24px}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--accent-gold),var(--accent-orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;line-height:1.1}
.header-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:3px;white-space:nowrap}

/* === TABS === */
.tabs{display:flex;gap:3px;flex:1;justify-content:center}
.tab{position:relative;padding:7px 16px;cursor:pointer;border:1px solid transparent;
  border-radius:6px 6px 0 0;font-family:'Cinzel',serif;font-size:12px;font-weight:600;
  color:var(--text-muted);transition:all .3s;background:transparent;text-transform:uppercase;letter-spacing:1px;user-select:none}
.tab:hover{color:var(--text-primary);background:rgba(255,255,255,.03);border-color:var(--border)}
.tab.active{color:var(--text-primary);background:linear-gradient(180deg,rgba(255,255,255,.05),transparent)}
.tab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* === LAYOUT === */
.wrap{display:flex;margin-top:50px;height:calc(100vh - 50px)}
.viewport{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.viewport::-webkit-scrollbar{width:5px}
.viewport::-webkit-scrollbar-track{background:var(--bg-deep)}
.viewport::-webkit-scrollbar-thumb{background:var(--border-glow);border-radius:3px}

/* === SIDE PANEL === */
.panel{width:320px;min-width:320px;background:linear-gradient(180deg,var(--bg-card),var(--bg-primary));
  border-left:1px solid var(--border);overflow-y:auto;padding:18px}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-track{background:transparent}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.portrait{width:100%;aspect-ratio:1;border-radius:12px;margin-bottom:14px;position:relative;overflow:hidden;
  background:var(--bg-surface);border:2px solid var(--border)}
.portrait .glow{position:absolute;inset:0;border-radius:12px}
.portrait .init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel',serif;font-size:80px;font-weight:700;opacity:.08}
.portrait .nm{position:absolute;bottom:0;left:0;right:0;padding:14px;
  background:linear-gradient(transparent,rgba(0,0,0,.85));text-align:center}
.portrait .ch{font-family:'Cinzel',serif;font-size:22px;letter-spacing:3px;display:block}
.portrait .pl{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:4px;display:block;margin-top:2px}

.badge{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent-blue);
  padding:5px 10px;background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);
  border-radius:6px;margin-bottom:14px;text-align:center;line-height:1.4}
.badge .sl{display:block;font-family:'Barlow',sans-serif;font-size:11px;color:var(--text-secondary);margin-top:2px}

.sec{margin-bottom:16px}
.sec-t{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
  color:var(--text-muted);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}

.radar{width:100%;aspect-ratio:1;margin:0 auto 8px}

.ri{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;
  background:var(--bg-surface);margin-bottom:3px;font-size:12px}
.ri .sc{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;min-width:30px}
.ri .rn{font-family:'Cinzel',serif;font-size:11px;flex:1}
.ri .rt{font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-muted);text-transform:uppercase}

.dtm{height:6px;background:var(--bg-surface);border-radius:3px;overflow:hidden;margin-top:3px}
.dtf{height:100%;border-radius:3px;transition:width .8s ease}
.dtl{display:flex;justify-content:space-between;font-size:10px;margin-top:2px}

.mvps{width:100%;height:36px;margin-top:3px}

.sg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sc2{padding:5px 7px;background:var(--bg-surface);border-radius:5px;text-align:center}
.sc2 .lb{font-size:8px;color:var(--text-muted);text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.sc2 .vl{font-family:'JetBrains Mono',monospace;font-size:13px;margin-top:1px}

/* === PATH CANVAS === */
.canvas{position:relative;width:100%}
.tlayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* === LANDMARKS === */
.lm{position:absolute;cursor:pointer;transition:transform .3s;z-index:10;pointer-events:auto}
.lm:hover{transform:scale(1.15)}
.lm .d{width:22px;height:22px;border-radius:50%;border:2px solid;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace;background:rgba(6,6,12,.6)}
.lm .tp{position:absolute;left:30px;top:-8px;width:220px;padding:9px 12px;
  background:var(--bg-elevated);border:1px solid var(--border-glow);border-radius:7px;
  font-size:11px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:20;
  box-shadow:0 8px 30px rgba(0,0,0,.6)}
.lm:hover .tp{opacity:1;pointer-events:auto}
.lm .tt{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;margin-bottom:3px}
.lm .trs{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.lm .tr{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 4px;border-radius:2px}

/* === SIGNPOSTS === */
.sp{position:absolute;z-index:8;max-width:195px;pointer-events:auto}
.sp .bd{position:relative;padding:7px 10px;background:rgba(15,16,32,.92);border:1px solid var(--border);
  border-radius:5px;font-size:10.5px;font-style:italic;color:var(--text-secondary);line-height:1.35;
  transition:border-color .3s}
.sp:hover .bd{border-color:var(--border-glow)}
.sp .cx{font-family:'Barlow Condensed',sans-serif;font-size:8px;color:var(--text-muted);
  text-transform:uppercase;margin-top:3px;font-style:normal;letter-spacing:1px}

/* === ARCHETYPE SIGNS === */
.as{position:absolute;z-index:9;pointer-events:none}
.as .ai{padding:4px 12px;border:2px solid var(--accent-purple);border-radius:3px;
  font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--accent-purple);
  letter-spacing:2px;text-transform:uppercase;background:rgba(6,6,12,.92);
  box-shadow:0 0 12px rgba(173,107,255,.15)}

/* === SCROLL PROGRESS === */
.spg{position:fixed;left:0;top:50px;width:3px;height:calc(100vh - 50px);z-index:50}
.spf{width:100%;transition:height .1s}

/* === SHADOW PATH === */
.shadow-path{filter:blur(3px);pointer-events:none}

/* === MEMORY ORBS === */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shatter{0%{transform:scale(1);opacity:1}100%{transform:scale(2.5);opacity:0}}
@keyframes particle-burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}}
.morb{position:absolute;z-index:12;cursor:pointer;pointer-events:auto;animation:float 3s ease-in-out infinite}
.morb circle{transition:r .2s ease}
.morb:hover circle{r:14}
.morb-tip{position:absolute;left:22px;top:-18px;min-width:180px;max-width:240px;padding:8px 11px;
  background:rgba(15,16,32,.95);border:1px solid var(--border-glow);border-radius:6px;
  font-size:10.5px;font-style:italic;color:var(--text-secondary);line-height:1.35;
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:30;
  box-shadow:0 6px 24px rgba(0,0,0,.7)}
.morb:hover .morb-tip{opacity:1}
.morb-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(6,6,12,.85);
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:pointer}
.morb-overlay-inner{max-width:480px;padding:28px 32px;background:var(--bg-card);border:1px solid var(--border-glow);
  border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.morb-overlay q{display:block;font-family:'Barlow',sans-serif;font-size:16px;font-style:italic;
  color:var(--text-primary);line-height:1.5;margin-bottom:10px}
.morb-overlay .ctx{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:2px}
.morb-particles{position:absolute;pointer-events:none;z-index:13}
.morb-particles span{position:absolute;width:3px;height:3px;border-radius:50%;animation:particle-burst .5s ease-out forwards}

/* === COMPANION SILHOUETTES === */
.comp-dot{position:absolute;z-index:11;pointer-events:auto;cursor:default}
.comp-dot circle{transition:r .15s}
.comp-dot:hover circle{r:7}
.comp-tip{position:absolute;left:12px;top:-10px;white-space:nowrap;padding:3px 8px;
  background:rgba(15,16,32,.92);border:1px solid var(--border);border-radius:4px;
  font-family:'Barlow Condensed',sans-serif;font-size:9px;color:var(--text-secondary);
  text-transform:uppercase;letter-spacing:1px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:30}
.comp-dot:hover .comp-tip{opacity:1}

/* === WEATHER CANVAS === */
#weather-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:6}

/* === MILESTONE STONES === */
.milestone{position:absolute;z-index:9;pointer-events:auto}
.milestone-inner{padding:5px 14px;background:#12121e;border:2px solid #2a2a40;border-radius:6px;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--text-primary);text-align:center;line-height:1.3;white-space:nowrap}
.milestone-sub{font-size:8px;font-weight:400;color:var(--text-muted);letter-spacing:1px;margin-top:1px}

/* === BEFORE/AFTER SIGNPOSTS === */
.ba-pair{position:absolute;z-index:9;pointer-events:auto;display:flex;align-items:center;gap:6px}
.ba-sign{padding:5px 10px;border:1.5px solid #8B6914;border-radius:4px;background:rgba(40,30,10,.85);
  font-family:'Barlow Condensed',sans-serif;font-size:9.5px;line-height:1.3;max-width:140px}
.ba-sign .ba-label{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;
  letter-spacing:2px;margin-bottom:2px;text-transform:uppercase}
.ba-sign.before .ba-label{color:#ff8844}
.ba-sign.after .ba-label{color:#44ff88}
.ba-sign .ba-text{color:#e8dcc8;font-style:italic;font-size:9px}
.ba-sign .ba-trait{font-size:8px;color:var(--text-muted);margin-top:2px}
.ba-arrow{color:#8B6914;font-size:16px;font-family:'JetBrains Mono',monospace;line-height:1}
</style>
</head>

  const rng=srng(PL.indexOf(player)*7919+31);

  // Deep background mountains
  const g1=svg.append('g').style('opacity',.12);
  for(let i=0;i<SS.length;i++){
    const sd=gsd(player,SS[i]),sent=sd.sentiment?.mean||0,dt=sd.dark_triad||20;
    const y=MG.t+i*segH,amp=25+Math.abs(sent)*7,peaks=4+Math.floor(rng()*5);
    let d=`M 0 ${y+50}`;
    for(let j=0;j<=peaks;j++){const px=(W/peaks)*j,py=y+50-amp*(.2+.8*rng());d+=` Q ${px-W/(peaks*2.5)} ${py}, ${px} ${y+30+rng()*30}`}
    d+=` L ${W} ${y+60} L 0 ${y+60} Z`;
    g1.append('path').attr('d',d).attr('fill',hx(dt>40?bl(col,'#ff2222',.35):col,.12+dt/500));
  }

  // Mid hills
  const g2=svg.append('g').style('opacity',.07);
  for(let i=0;i<SS.length-1;i++){
    const y=MG.t+i*segH,sd=gsd(player,SS[i]),mvp=sd.stats?.mvp_score||5;
    const hw=W*.3+rng()*W*.3,side=rng()>.5?W*.05:W*.55;
    g2.append('ellipse').attr('cx',side+hw/2).attr('cy',y+segH/2).attr('rx',hw/2).attr('ry',12+mvp*3).attr('fill',hx(col,.18));
  }

  // Foreground crystals + ambient tints
  const g3=svg.append('g').style('opacity',.08);
  SS.forEach((sid,i)=>{
    const sd=gsd(player,sid),gr=sd.growth?.net_growth_score||0,y=MG.t+i*segH;
    if(gr>5){const cx=W*.06+rng()*W*.12;for(let k=0;k<4;k++){const ch=12+rng()*22,cw=2+rng()*4;
      g3.append('polygon').attr('points',`${cx+k*7},${y+25} ${cx+k*7-cw},${y+25+ch} ${cx+k*7+cw},${y+25+ch}`)
        .attr('fill',hx('#ffd700',.35)).attr('stroke',hx('#ffd700',.15)).attr('stroke-width',.5)}}
    if((sd.dark_triad||0)>35)g3.append('rect').attr('x',0).attr('y',y-segH/4).attr('width',W).attr('height',segH).attr('fill',hx('#ff2222',.025));
    if((sd.sentiment?.mean||0)>4)g3.append('rect').attr('x',0).attr('y',y-segH/4).attr('width',W).attr('height',segH).attr('fill',hx('#44ff88',.015));
  });

  // Session markers
  const g4=svg.append('g');
  SS.forEach((sid,i)=>{
    const y=MG.t+i*segH;
    g4.append('line').attr('x1',0).attr('y1',y).attr('x2',W).attr('y2',y)
      .attr('stroke',hx('#ffffff',.04)).attr('stroke-width',1).attr('stroke-dasharray','4,8');
    g4.append('text').attr('x',12).attr('y',y-5).attr('fill',hx('#ffffff',.2))
      .attr('font-family',"'JetBrains Mono',monospace").attr('font-size',9).text(sid);
    const lb=SL[sid];
    if(lb)g4.append('text').attr('x',12).attr('y',y+10).attr('fill',hx('#ffffff',.1))
      .attr('font-family',"'Barlow Condensed',sans-serif").attr('font-size',9.5)
      .text(lb.length>42?lb.slice(0,40)+'...':lb);
  });
}

function genPath(player,anim=true){
  const svg=d3.select('#psvg');svg.selectAll('*').remove();
  const W=document.getElementById('cv').offsetWidth,H=CH;
  svg.attr('width',W).attr('height',H);
  const col=PC[player],cx=W*.42,swing=W*.22;
  const segH=(H-MG.t-MG.b)/(SS.length-1);

  const pts=[];
  SS.forEach((sid,i)=>{
    const sd=gsd(player,sid),sent=sd.sentiment?.mean||0;
    const dpct=sd.stats?.dialogue_share_pct||12,dt=sd.dark_triad||20;
    pts.push({x:cx+(sent/10)*swing,y:MG.t+i*segH,sent,dpct,dt,sid,i});
  });

  const defs=svg.append('defs');
  // Glow filter
  const gf=defs.append('filter').attr('id','pg').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  gf.append('feGaussianBlur').attr('stdDeviation',8).attr('result','b');
  gf.append('feComposite').attr('in','SourceGraphic').attr('in2','b').attr('operator','over');

  // Segment gradients
  pts.forEach((p,i)=>{
    if(i>=pts.length-1)return;
    const n=pts[i+1];
    const gr=defs.append('linearGradient').attr('id',`g${i}`).attr('gradientUnits','userSpaceOnUse')
      .attr('x1',p.x).attr('y1',p.y).attr('x2',n.x).attr('y2',n.y);
    gr.append('stop').attr('offset','0%').attr('stop-color',bl(col,'#1a0000',Math.min(p.dt/120,.6)));
    gr.append('stop').attr('offset','100%').attr('stop-color',bl(col,'#1a0000',Math.min(n.dt/120,.6)));
  });

  const lineG=d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveBasis);
  const pathD=lineG(pts);

  // Outer glow
  svg.append('path').attr('d',pathD).attr('fill','none').attr('stroke',col)
    .attr('stroke-width',24).attr('stroke-opacity',.07).attr('filter','url(#pg)');

  // Width-varying segments
  for(let i=0;i<pts.length-1;i++){
    const p=pts[i],n=pts[i+1],w=3+(p.dpct/28)*9;
    const mid={x:(p.x+n.x)/2,y:(p.y+n.y)/2};
    svg.append('path').attr('d',d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveBasis)([p,mid,n]))
      .attr('fill','none').attr('stroke',`url(#g${i})`).attr('stroke-width',w)
      .attr('stroke-linecap','round').attr('stroke-opacity',.65);
  }

  // === SHADOW PATH (Dark Triad trajectory) ===
  const shadowPts=pts.map(p=>{
    const dt=p.dt||0;
    const offsetX=40-35*Math.min(dt/50,1); // high dt = converges (5px), low dt = far (40px)
    const opa=0.08+0.17*Math.min(dt/50,1); // high dt = more visible
    return{x:p.x-offsetX,y:p.y,opacity:opa,dt};
  });
  const shadowLineD=d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveBasis)(shadowPts);

  // Shadow blur filter
  const sf=defs.append('filter').attr('id','shadowBlur').attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
  sf.append('feGaussianBlur').attr('stdDeviation',3);

  // Shadow path glow (underneath)
  svg.append('path').attr('d',shadowLineD).attr('fill','none')
    .attr('stroke','#3a0a0a').attr('stroke-width',14).attr('stroke-opacity',.04)
    .attr('filter','url(#shadowBlur)').attr('class','shadow-path');

  // Shadow path segments with varying opacity
  for(let i=0;i<shadowPts.length-1;i++){
    const sp=shadowPts[i],sn=shadowPts[i+1];
    const avgOpa=(sp.opacity+sn.opacity)/2;
    const mid={x:(sp.x+sn.x)/2,y:(sp.y+sn.y)/2};
    svg.append('path')
      .attr('d',d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveBasis)([sp,mid,sn]))
      .attr('fill','none').attr('stroke','#3a0a0a').attr('stroke-width',5)
      .attr('stroke-opacity',avgOpa).attr('stroke-linecap','round')
      .attr('filter','url(#shadowBlur)').attr('class','shadow-path');
    // When shadow converges with main path, darken the main path segment
    if(sp.dt>40||sn.dt>40){
      const darkOpa=Math.min((Math.max(sp.dt,sn.dt)-40)/60,0.15);
      svg.append('path')
        .attr('d',d3.line().x(d=>d.x).y(d=>d.y).curve(d3.curveBasis)([pts[i],{x:(pts[i].x+pts[i+1].x)/2,y:(pts[i].y+pts[i+1].y)/2},pts[i+1]]))
        .attr('fill','none').attr('stroke','#1a0000').attr('stroke-width',8)
        .attr('stroke-opacity',darkOpa).attr('stroke-linecap','round');
    }
  }

  // Center line
  const mp=svg.append('path').attr('d',pathD).attr('fill','none')
    .attr('stroke',col).attr('stroke-width',2).attr('stroke-opacity',.85);
  if(anim){
    const tl=mp.node().getTotalLength();
    mp.attr('stroke-dasharray',tl).attr('stroke-dashoffset',tl)
      .transition().duration(2500).ease(d3.easeQuadOut).attr('stroke-dashoffset',0);
  }

  // Session nodes
  pts.forEach((p,i)=>{
    const sd=gsd(player,SS[i]),g=sd.growth?.net_growth_score||0;
    const nc=g>5?'#ffd700':g<-2?'#ff4444':col,r=4.5+Math.abs(g)*.4;
    svg.append('circle').attr('cx',p.x).attr('cy',p.y).attr('r',r)
      .attr('fill',nc).attr('stroke',hx('#ffffff',.25)).attr('stroke-width',1)
      .attr('opacity',anim?0:.85).style('cursor','pointer')
      .on('click',()=>updPanel(player,i))
      .on('mouseenter',function(){d3.select(this).transition().duration(150).attr('r',r+3).attr('opacity',1)})
      .on('mouseleave',function(){d3.select(this).transition().duration(150).attr('r',r).attr('opacity',.85)})
      .transition().delay(anim?300+i*130:0).duration(350).attr('opacity',.85);
  });

  // Chemistry bridges
  const bG=svg.append('g');
  pts.forEach((p,i)=>{
    const sd=gsd(player,SS[i]);
    (sd.chemistry||[]).filter(c=>c.score>7.5).forEach((rel,ri)=>{
      const op=C2P[rel.other];if(!op)return;
      const oc=PC[op]||'#888',bld=bl(col,oc,.5);
      const ex=W*.82+ri*12,mdy=p.y-10-Math.abs(rel.score-7.5)*5;
      const arc=d3.path();arc.moveTo(p.x+6,p.y);arc.quadraticCurveTo((p.x+ex)/2,mdy,ex,p.y+3);
      bG.append('path').attr('d',arc.toString()).attr('fill','none')
        .attr('stroke',bld).attr('stroke-width',1.2).attr('stroke-opacity',.2).attr('stroke-dasharray','3,5');
      bG.append('text').attr('x',ex+3).attr('y',p.y+6).attr('fill',oc)
        .attr('font-family',"'Cinzel',serif").attr('font-size',8).attr('opacity',.4)
        .text(rel.other+' '+rel.score.toFixed(1));
    });
  });

  return pts;
}

function genOverlays(player,pts,anim=true){
  const el=document.getElementById('ovl');el.innerHTML='';
  const W=document.getElementById('cv').offsetWidth;
  let lastA=null;

  pts.forEach((p,i)=>{
    const sid=SS[i],sd=gsd(player,sid);

    // Growth landmarks
    if(sd.growth?.growth_moments){
      sd.growth.growth_moments.forEach((m,mi)=>{
        const pos=m.traits_affected?.some(t=>(t.change||0)>0);
        const neg=m.traits_affected?.some(t=>(t.change||0)<0);
        const mc=neg&&!pos?'#ff4444':'#ffd700';
        const lm=document.createElement('div');lm.className='lm';
        lm.style.left=(p.x+14+mi*26)+'px';lm.style.top=(p.y-11)+'px';
        if(anim){lm.style.opacity='0';lm.style.transform='scale(0)';
          setTimeout(()=>{lm.style.transition='transform .4s cubic-bezier(.175,.885,.32,1.275),opacity .3s';
            lm.style.opacity='1';lm.style.transform='scale(1)'},900+i*140+mi*70)}

        const trH=(m.traits_affected||[]).map(t=>{
          const s=(t.change||0)>=0?'+':'';
          const stl=(t.change||0)<0?'background:rgba(255,68,68,.12);color:#ff4444':'background:rgba(255,215,0,.12);color:#ffd700';
          return`<span class="tr" style="${stl}">${TL[t.trait]||t.trait} ${s}${t.change||0}</span>`;
        }).join('');

        lm.innerHTML=`<div class="d" style="border-color:${mc};color:${mc};box-shadow:0 0 8px ${hx(mc,.3)}">${neg&&!pos?'!':'+'}</div>
          <div class="tp"><div class="tt" style="color:${mc}">${m.title}</div>
          <div style="color:var(--text-muted);font-size:10px">${sid}</div>
          <div class="trs">${trH}</div></div>`;
        el.appendChild(lm);
      });
    }

    // Quote signposts (every other session)
    if(sd.stats?.best_one_liner&&i%2===0){
      const sp=document.createElement('div');sp.className='sp';
      const side=p.x>W*.42;
      sp.style.left=side?(p.x-210)+'px':(p.x+28)+'px';
      sp.style.top=(p.y+14)+'px';
      if(anim){sp.style.opacity='0';setTimeout(()=>{sp.style.transition='opacity .4s,transform .4s';sp.style.opacity='1'},1100+i*180)}
      const q=sd.stats.best_one_liner.length>75?sd.stats.best_one_liner.slice(0,73)+'...':sd.stats.best_one_liner;
      sp.innerHTML=`<div class="bd" style="border-left:2px solid ${hx(PC[player],.35)}">&ldquo;${q}&rdquo;<div class="cx">${sd.stats.one_liner_context||sid}</div></div>`;
      el.appendChild(sp);
    }

    // Archetype road signs
    if(sd.stats?.archetype&&sd.stats.archetype!==lastA){
      const as=document.createElement('div');as.className='as';
      as.style.left=(p.x-90)+'px';as.style.top=(p.y-32)+'px';
      as.innerHTML=`<div class="ai">Now entering: THE ${sd.stats.archetype.toUpperCase()} zone</div>`;
      if(anim){as.style.opacity='0';setTimeout(()=>{as.style.transition='opacity .5s';as.style.opacity='1'},1000+i*140)}
      el.appendChild(as);lastA=sd.stats.archetype;
    }

    // === MEMORY ORBS (Feature 2) ===
    if(sd.stats?.best_one_liner){
      const orbSvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
      orbSvg.setAttribute('class','morb');
      orbSvg.setAttribute('width','32');orbSvg.setAttribute('height','32');
      orbSvg.setAttribute('viewBox','0 0 32 32');
      orbSvg.style.left=(p.x-(i%2===0?22:(-10)))+'px';
      orbSvg.style.top=(p.y-16)+'px';
      orbSvg.style.animationDelay=(i*0.4)+'s';
      const orbDefs=document.createElementNS('http://www.w3.org/2000/svg','defs');
      const rg=document.createElementNS('http://www.w3.org/2000/svg','radialGradient');
      rg.setAttribute('id','orbG'+i);
      const s1o=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s1o.setAttribute('offset','0%');s1o.setAttribute('stop-color',PC[player]);s1o.setAttribute('stop-opacity','0.9');
      const s2o=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s2o.setAttribute('offset','60%');s2o.setAttribute('stop-color',PC[player]);s2o.setAttribute('stop-opacity','0.3');
      const s3o=document.createElementNS('http://www.w3.org/2000/svg','stop');
      s3o.setAttribute('offset','100%');s3o.setAttribute('stop-color',PC[player]);s3o.setAttribute('stop-opacity','0');
      rg.appendChild(s1o);rg.appendChild(s2o);rg.appendChild(s3o);orbDefs.appendChild(rg);orbSvg.appendChild(orbDefs);
      const orbC=document.createElementNS('http://www.w3.org/2000/svg','circle');
      orbC.setAttribute('cx','16');orbC.setAttribute('cy','16');orbC.setAttribute('r','8');
      orbC.setAttribute('fill','url(#orbG'+i+')');
      orbSvg.appendChild(orbC);
      const tip=document.createElement('div');tip.className='morb-tip';
      const ql=sd.stats.best_one_liner.length>60?sd.stats.best_one_liner.slice(0,58)+'...':sd.stats.best_one_liner;
      tip.innerHTML=`&ldquo;${ql}&rdquo;`;
      const tipWrap=document.createElement('div');tipWrap.className='morb';
      tipWrap.style.left=orbSvg.style.left;tipWrap.style.top=orbSvg.style.top;
      tipWrap.style.animationDelay=orbSvg.style.animationDelay;
      tipWrap.appendChild(orbSvg.cloneNode(true));tipWrap.appendChild(tip);
      if(anim){tipWrap.style.opacity='0';setTimeout(()=>{tipWrap.style.transition='opacity .5s';tipWrap.style.opacity='1'},1200+i*160)}
      // Click to shatter and show overlay
      const quote=sd.stats.best_one_liner,ctx=sd.stats.one_liner_context||sid;
      tipWrap.onclick=function(e){
        e.stopPropagation();
        // Particle burst
        const rect=this.getBoundingClientRect();
        const burst=document.createElement('div');burst.className='morb-particles';
        burst.style.left=this.style.left;burst.style.top=this.style.top;
        for(let k=0;k<8;k++){
          const sp=document.createElement('span');
          const angle=(k/8)*Math.PI*2,dist=15+Math.random()*20;
          sp.style.setProperty('--px',Math.cos(angle)*dist+'px');
          sp.style.setProperty('--py',Math.sin(angle)*dist+'px');
          sp.style.left='16px';sp.style.top='16px';
          sp.style.background=PC[player];sp.style.boxShadow='0 0 4px '+PC[player];
          burst.appendChild(sp);
        }
        el.appendChild(burst);setTimeout(()=>burst.remove(),600);
        // Shatter animation on orb
        this.style.transition='transform .3s, opacity .3s';
        this.style.transform='scale(0)';this.style.opacity='0';
        setTimeout(()=>{this.style.transform='scale(1)';this.style.opacity='1'},1500);
        // Show overlay
        const ov=document.createElement('div');ov.className='morb-overlay';
        ov.innerHTML='<div class="morb-overlay-inner" style="border-top:3px solid '+PC[player]+'"><q>&ldquo;'+quote+'&rdquo;</q><div class="ctx">'+ctx+' &mdash; '+sid+'</div></div>';
        ov.onclick=function(){this.remove()};
        document.body.appendChild(ov);
      };
      el.appendChild(tipWrap);
    }

    // === COMPANION SILHOUETTES (Feature 3) ===
    const companions=(sd.chemistry||[]).filter(c=>c.score>6).sort((a,b)=>b.score-a.score);
    companions.forEach((comp,ci)=>{
      const op=C2P[comp.other];if(!op)return;
      const oc=PC[op]||'#888';
      const closeness=Math.max(0,(comp.score-6)/4); // 0 to 1
      const yOff=18+ci*11-closeness*6; // closer = nearer to path
      const xOff=p.x+8+ci*12;
      const dot=document.createElementNS('http://www.w3.org/2000/svg','svg');
      dot.setAttribute('class','comp-dot');dot.setAttribute('width','16');dot.setAttribute('height','16');
      dot.setAttribute('viewBox','0 0 16 16');dot.style.position='absolute';
      dot.style.left=xOff+'px';dot.style.top=(p.y+yOff)+'px';
      const dc=document.createElementNS('http://www.w3.org/2000/svg','circle');
      dc.setAttribute('cx','8');dc.setAttribute('cy','8');dc.setAttribute('r','5');
      dc.setAttribute('fill',oc);dc.setAttribute('opacity',String(0.3+closeness*0.4));
      dot.appendChild(dc);
      const dtip=document.createElement('div');dtip.className='comp-tip';
      dtip.textContent=comp.other+' ('+comp.type+')';
      const dotWrap=document.createElement('div');dotWrap.className='comp-dot';
      dotWrap.style.left=xOff+'px';dotWrap.style.top=(p.y+yOff)+'px';
      dotWrap.appendChild(dot.cloneNode(true));dotWrap.appendChild(dtip);
      if(anim){dotWrap.style.opacity='0';setTimeout(()=>{dotWrap.style.transition='opacity .4s';dotWrap.style.opacity='1'},1100+i*150+ci*50)}
      el.appendChild(dotWrap);
    });

    // === MILESTONE STONES (Feature 5) ===
    const milestoneMap={'S004':4,'S010':6,'S016':8,'S022':10,'S028':11,'S034':13,'S040':14,'S046':15};
    if(milestoneMap[sid]){
      const ms=document.createElement('div');ms.className='milestone';
      ms.style.left=(p.x-80)+'px';ms.style.top=(p.y-8)+'px';
      ms.innerHTML='<div class="milestone-inner" style="box-shadow:0 0 12px '+hx(PC[player],.2)+',inset 0 0 8px '+hx(PC[player],.08)+'">LEVEL '+milestoneMap[sid]+'<div class="milestone-sub">Milestone</div></div>';
      if(anim){ms.style.opacity='0';ms.style.transform='translateY(8px)';
        setTimeout(()=>{ms.style.transition='opacity .5s, transform .5s';ms.style.opacity='1';ms.style.transform='translateY(0)'},1000+i*140)}
      el.appendChild(ms);
    }
  });

  // === BEFORE/AFTER SIGNPOSTS (Feature 6) ===
  // Compare trait_snapshot between consecutive sessions to find biggest changes
  const traitLabels={confidence:'Confident',trust_in_others:'Trusting',moral_compass:'Moral',
    emotional_state:'Emotionally stable',goals_purpose:'Purpose-driven',connection_to_party:'Party-connected',
    combat_instincts:'Combat-ready',self_awareness:'Self-aware'};
  const traitBefore={confidence:'Hesitant',trust_in_others:'Wary',moral_compass:'Morally flexible',
    emotional_state:'Emotionally volatile',goals_purpose:'Aimless',connection_to_party:'Lone wolf',
    combat_instincts:'Combat-shy',self_awareness:'Unaware'};
  const traitAfter={confidence:'Bold and decisive',trust_in_others:'Open and trusting',moral_compass:'Firmly principled',
    emotional_state:'Emotionally grounded',goals_purpose:'Driven by purpose',connection_to_party:'Deeply bonded',
    combat_instincts:'Battle-hardened',self_awareness:'Deeply self-aware'};
  for(let i=1;i<pts.length;i++){
    const prevSd=gsd(player,SS[i-1]),curSd=gsd(player,SS[i]);
    const prevSnap=prevSd.growth?.trait_snapshot||{},curSnap=curSd.growth?.trait_snapshot||{};
    let maxTrait=null,maxChange=0;
    for(const tk of TK){
      const diff=Math.abs((curSnap[tk]||5)-(prevSnap[tk]||5));
      if(diff>maxChange){maxChange=diff;maxTrait=tk}
    }
    if(maxChange>=2&&maxTrait){
      const prevVal=prevSnap[maxTrait]||5,curVal=curSnap[maxTrait]||5;
      const isGrowth=curVal>prevVal;
      const beforeText=isGrowth?traitBefore[maxTrait]:(traitAfter[maxTrait]);
      const afterText=isGrowth?traitAfter[maxTrait]:(traitBefore[maxTrait]);
      const ba=document.createElement('div');ba.className='ba-pair';
      const side=pts[i].x>W*.42;
      ba.style.left=side?(pts[i].x-310)+'px':(pts[i].x+30)+'px';
      ba.style.top=(pts[i].y+30)+'px';
      ba.innerHTML=`<div class="ba-sign before"><div class="ba-label">Before</div><div class="ba-text">${beforeText}</div><div class="ba-trait">${(TL[maxTrait]||maxTrait)} ${prevVal}</div></div><div class="ba-arrow">${isGrowth?'&rarr;':'&larr;'}</div><div class="ba-sign after"><div class="ba-label">After</div><div class="ba-text">${afterText}</div><div class="ba-trait">${(TL[maxTrait]||maxTrait)} ${curVal}</div></div>`;
      if(anim){ba.style.opacity='0';setTimeout(()=>{ba.style.transition='opacity .6s';ba.style.opacity='1'},1300+i*180)}
      el.appendChild(ba);
    }
  }
}

function updPanel(player,si){
  curSI=si;
  const pan=document.getElementById('pan');
  const col=PC[player],ch=PN[player],sid=SS[si],sd=gsd(player,sid),lb=SL[sid]||sid;
  let h='';

  h+=`<div class="portrait"><div class="glow" style="background:radial-gradient(circle at 50% 60%,${hx(col,.25)},transparent 70%)"></div>
    <div class="init" style="color:${col}">${ch[0]}</div>
    <div class="nm"><span class="ch" style="color:${col}">${ch}</span><span class="pl">${player}</span></div></div>`;

  h+=`<div class="badge">${sid}<span class="sl">${lb||''}</span></div>`;

  h+=`<div class="sec"><div class="sec-t">TRAIT RADAR</div><div class="radar" id="rdr"></div></div>`;

  h+=`<div class="sec"><div class="sec-t">RELATIONSHIPS</div>`;
  const rels=(sd.chemistry||[]).sort((a,b)=>b.score-a.score).slice(0,4);
  if(!rels.length)h+='<div style="color:var(--text-muted);font-size:11px">No data</div>';
  rels.forEach(r=>{const op=C2P[r.other],oc=op?PC[op]:'#888';
    h+=`<div class="ri"><div class="sc" style="color:${oc}">${r.score.toFixed(1)}</div>
    <div class="rn">${r.other}</div><div class="rt">${r.type||''}</div></div>`});
  h+='</div>';

  const dt=sd.dark_triad||0,dc=dt>50?'#ff4444':dt>30?'#ff8844':'#44ff88';
  h+=`<div class="sec"><div class="sec-t">DARK TRIAD</div>
    <div class="dtm"><div class="dtf" style="width:${dt}%;background:linear-gradient(90deg,${dc},${bl(dc,'#1a0000',.3)});box-shadow:0 0 6px ${hx(dc,.3)}"></div></div>
    <div class="dtl"><span style="color:var(--text-muted)">Composite</span><span style="font-family:'JetBrains Mono',monospace;color:${dc}">${dt.toFixed(1)}</span></div></div>`;

  h+=`<div class="sec"><div class="sec-t">MVP ACROSS SESSIONS</div><div class="mvps" id="mvp"></div></div>`;

  if(sd.growth){
    const gs=sd.growth.net_growth_score??0,gc=gs>5?'#ffd700':gs>0?'#44ff88':gs<0?'#ff4444':'#9494bf';
    h+=`<div class="sec"><div class="sec-t">GROWTH</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--text-secondary);text-transform:uppercase">${sd.growth.growth_direction||'?'}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:${gc}">${gs>0?'+':''}${gs}</span></div></div>`;
  }

  h+=`<div class="sec"><div class="sec-t">SESSION STATS</div><div class="sg">`;
  if(sd.stats?.archetype)h+=`<div class="sc2"><div class="lb">Archetype</div><div class="vl" style="color:${col};font-family:'Cinzel',serif;font-size:11px">${sd.stats.archetype}</div></div>`;
  if(sd.sentiment){const sm=sd.sentiment.mean;h+=`<div class="sc2"><div class="lb">Sentiment</div><div class="vl" style="color:${sm>3?'#44ff88':sm>0?'#00d4ff':sm>-3?'#ff8844':'#ff4444'}">${sm.toFixed(1)}</div></div>`}
  if(sd.stats?.dialogue_share_pct!=null)h+=`<div class="sc2"><div class="lb">Dialogue</div><div class="vl" style="color:${col}">${sd.stats.dialogue_share_pct.toFixed(1)}%</div></div>`;
  if(sd.stats?.mvp_score!=null)h+=`<div class="sc2"><div class="lb">MVP</div><div class="vl" style="color:var(--accent-gold)">${sd.stats.mvp_score.toFixed(2)}</div></div>`;
  h+='</div></div>';

  pan.innerHTML=h;
  setTimeout(()=>{drawRadar(player,si);drawMvp(player,si)},40);
}

function drawRadar(player,si){
  const el=document.getElementById('rdr');if(!el)return;
  const col=PC[player],sd=gsd(player,SS[si]),ts=sd.growth?.trait_snapshot||{};
  const vals=TK.map(k=>ts[k]||5),W=el.offsetWidth,H=W,R=W*.36,cx=W/2,cy=H/2;
  const svg=d3.select(el).html('').append('svg').attr('width',W).attr('height',H);
  const a=2*Math.PI/TK.length;

  [2,4,6,8,10].forEach(lv=>{const r=(lv/10)*R;
    svg.append('polygon').attr('points',TK.map((_,j)=>{const an=j*a-Math.PI/2;return`${cx+r*Math.cos(an)},${cy+r*Math.sin(an)}`}).join(' '))
      .attr('fill','none').attr('stroke',hx('#ffffff',.06)).attr('stroke-width',.5)});

  TK.forEach((k,j)=>{const an=j*a-Math.PI/2,ex=cx+R*Math.cos(an),ey=cy+R*Math.sin(an);
    svg.append('line').attr('x1',cx).attr('y1',cy).attr('x2',ex).attr('y2',ey)
      .attr('stroke',hx('#ffffff',.07)).attr('stroke-width',.5);
    svg.append('text').attr('x',cx+(R+16)*Math.cos(an)).attr('y',cy+(R+16)*Math.sin(an))
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('fill',hx('#ffffff',.35)).attr('font-family',"'JetBrains Mono',monospace").attr('font-size',7.5).text(TL[k])});

  const dp=TK.map((k,j)=>{const an=j*a-Math.PI/2,r=(vals[j]/10)*R;return[cx+r*Math.cos(an),cy+r*Math.sin(an)]});
  svg.append('polygon').attr('points',dp.map(p=>p.join(',')).join(' '))
    .attr('fill',hx(col,.15)).attr('stroke',col).attr('stroke-width',1.5).attr('stroke-opacity',.8);
  dp.forEach(p=>svg.append('circle').attr('cx',p[0]).attr('cy',p[1]).attr('r',2.5)
    .attr('fill',col).attr('stroke','#fff').attr('stroke-width',.5));
}

function drawMvp(player,ai){
  const el=document.getElementById('mvp');if(!el)return;
  const col=PC[player],W=el.offsetWidth,H=36;
  const svg=d3.select(el).html('').append('svg').attr('width',W).attr('height',H);
  const mv=SS.map(s=>{const d=gsd(player,s);return d.stats?.mvp_score??null});
  const vp=mv.map((v,i)=>[i,v]).filter(d=>d[1]!==null);
  if(vp.length<2){svg.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
    .attr('fill',hx('#ffffff',.15)).attr('font-size',9).text('Insufficient data');return}
  const xs=d3.scaleLinear().domain([0,SS.length-1]).range([3,W-3]);
  const ys=d3.scaleLinear().domain([0,10]).range([H-3,3]);
  svg.append('path').attr('d',d3.area().x(d=>xs(d[0])).y0(H).y1(d=>ys(d[1])).curve(d3.curveMonotoneX)(vp))
    .attr('fill',hx(col,.08));
  svg.append('path').attr('d',d3.line().x(d=>xs(d[0])).y(d=>ys(d[1])).curve(d3.curveMonotoneX)(vp))
    .attr('fill','none').attr('stroke',col).attr('stroke-width',1.5).attr('stroke-opacity',.6);
  if(mv[ai]!==null)svg.append('circle').attr('cx',xs(ai)).attr('cy',ys(mv[ai]))
    .attr('r',3.5).attr('fill',col).attr('stroke','#fff').attr('stroke-width',1);
}

function setupScroll(){
  const vp=document.getElementById('vp'),sf=document.getElementById('sf');
  vp.addEventListener('scroll',()=>{
    const pct=vp.scrollTop/(vp.scrollHeight-vp.clientHeight);
    sf.style.height=(pct*100)+'%';sf.style.background=`linear-gradient(180deg,${PC[curP]},transparent)`;
    const segH=(CH-MG.t-MG.b)/(SS.length-1);
    const idx=Math.min(SS.length-1,Math.max(0,Math.round((vp.scrollTop+vp.clientHeight/3-MG.t)/segH)));
    if(idx!==curSI)updPanel(curP,idx);
    // Parallax
    const sy=vp.scrollTop;
    ['1','2','3'].forEach((n,ni)=>{
      const g=document.querySelector(`#tsvg g:nth-child(${n})`);
      if(g)g.style.transform=`translateY(${sy*[.06,.03,-.02][ni]}px)`;
    });
  });
}

function sw(p){
  if(p===curP)return;
  const cv=document.getElementById('cv'),pn=document.getElementById('pan');
  cv.style.transition='opacity .35s';cv.style.opacity='0';
  pn.style.transition='opacity .25s';pn.style.opacity='0';
  setTimeout(()=>{
    curP=p;curSI=0;buildTabs();
    genTerrain(p);const pts=genPath(p,true);genOverlays(p,pts,true);updPanel(p,0);
    weatherParticles=[];initWeather();
    cv.style.opacity='1';pn.style.opacity='1';
    document.getElementById('vp').scrollTop=0;
  },380);
}

// === WEATHER LAYER (Feature 4) ===
let weatherParticles=[],weatherType='none',weatherCtx=null,weatherAF=null;
const WEATHER_MAX=30;

function initWeather(){
  const canvas=document.getElementById('weather-canvas');
  const cv=document.getElementById('cv');
  canvas.width=cv.offsetWidth;canvas.height=parseInt(cv.style.minHeight)||CH;
  weatherCtx=canvas.getContext('2d');
  weatherParticles=[];
  if(!weatherAF)animateWeather();
}

function getWeatherForScroll(){
  const vp=document.getElementById('vp');
  const segH=(CH-MG.t-MG.b)/(SS.length-1);
  const scrollY=vp.scrollTop+vp.clientHeight/3;
  const idx=Math.min(SS.length-1,Math.max(0,Math.round((scrollY-MG.t)/segH)));
  const sid=SS[idx],sd=gsd(curP,sid);
  const sent=sd.sentiment?.mean||0;
  const gr=sd.growth?.net_growth_score||0;
  const sidNum=parseInt(sid.replace('S',''));
  // Barovia fog: S035-S042 (map to our sessions S034,S037,S040)
  const baroviaSessions=['S034','S037','S040'];
  if(baroviaSessions.includes(sid))return{type:'fog',intensity:0.6,y:MG.t+idx*segH,viewH:vp.clientHeight};
  if(sent<-2)return{type:'rain',intensity:Math.min(1,(-sent-2)/4),y:MG.t+idx*segH,viewH:vp.clientHeight};
  if(sent>3)return{type:'sunshine',intensity:Math.min(1,(sent-3)/4),y:MG.t+idx*segH,viewH:vp.clientHeight};
  if(gr>3)return{type:'sparkles',intensity:Math.min(1,(gr-3)/8),y:MG.t+idx*segH,viewH:vp.clientHeight};
  return{type:'clear',intensity:0,y:MG.t+idx*segH,viewH:vp.clientHeight};
}

function spawnWeatherParticle(weather,canvasW){
  const p={};
  const baseY=weather.y-weather.viewH/2;
  const rangeH=weather.viewH*1.5;
  switch(weather.type){
    case 'rain':
      p.x=Math.random()*canvasW;
      p.y=baseY+Math.random()*rangeH;
      p.vx=-1.5-Math.random()*2;p.vy=6+Math.random()*4;
      p.life=1;p.maxLife=1;p.size=1+Math.random();
      p.color='rgba(120,140,180,';break;
    case 'sunshine':
      p.x=canvasW*0.8+Math.random()*canvasW*0.2;
      p.y=baseY+Math.random()*rangeH*0.6;
      p.vx=-0.3-Math.random()*0.5;p.vy=0.8+Math.random()*1.2;
      p.life=1;p.maxLife=1;p.size=2+Math.random()*3;
      p.color='rgba(255,215,0,';break;
    case 'fog':
      p.x=Math.random()*canvasW;
      p.y=baseY+Math.random()*rangeH;
      p.vx=0.3+Math.random()*0.6;p.vy=-0.1+Math.random()*0.2;
      p.life=1;p.maxLife=1;p.size=20+Math.random()*40;
      p.color='rgba(100,100,120,';break;
    case 'sparkles':
      p.x=Math.random()*canvasW;
      p.y=baseY+Math.random()*rangeH;
      p.vx=(Math.random()-0.5)*0.3;p.vy=-0.5-Math.random()*0.5;
      p.life=1;p.maxLife=1;p.size=1+Math.random()*2;
      p.twinkle=Math.random()*Math.PI*2;
      p.color='rgba(255,215,0,';break;
    default:return null;
  }
  return p;
}

function animateWeather(){
  if(!weatherCtx)return;
  const canvas=document.getElementById('weather-canvas');
  const W=canvas.width,H=canvas.height;
  weatherCtx.clearRect(0,0,W,H);
  const weather=getWeatherForScroll();

  // Spawn new particles
  if(weather.type!=='clear'&&weatherParticles.length<WEATHER_MAX){
    const toSpawn=Math.min(3,WEATHER_MAX-weatherParticles.length);
    for(let i=0;i<toSpawn;i++){
      const np=spawnWeatherParticle(weather,W);
      if(np)weatherParticles.push(np);
    }
  }

  // Update and draw
  weatherParticles=weatherParticles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life-=0.008;
    if(p.life<=0||p.y>H+50||p.y<-50||p.x<-50||p.x>W+50)return false;
    const alpha=p.life*0.4*(weather.intensity||0.5);
    weatherCtx.save();
    if(weather.type==='fog'){
      weatherCtx.globalAlpha=alpha*0.15;
      weatherCtx.beginPath();
      weatherCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
      weatherCtx.fillStyle=p.color+alpha*0.15+')';
      weatherCtx.fill();
    }else if(weather.type==='rain'){
      weatherCtx.globalAlpha=alpha;
      weatherCtx.strokeStyle=p.color+alpha+')';
      weatherCtx.lineWidth=p.size;
      weatherCtx.beginPath();
      weatherCtx.moveTo(p.x,p.y);
      weatherCtx.lineTo(p.x+p.vx*2,p.y+p.vy*2);
      weatherCtx.stroke();
    }else if(weather.type==='sunshine'){
      weatherCtx.globalAlpha=alpha*0.5;
      const grad=weatherCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3);
      grad.addColorStop(0,p.color+alpha*0.5+')');
      grad.addColorStop(1,p.color+'0)');
      weatherCtx.fillStyle=grad;
      weatherCtx.beginPath();
      weatherCtx.arc(p.x,p.y,p.size*3,0,Math.PI*2);
      weatherCtx.fill();
    }else if(weather.type==='sparkles'){
      p.twinkle=(p.twinkle||0)+0.15;
      const tw=0.3+0.7*Math.abs(Math.sin(p.twinkle));
      weatherCtx.globalAlpha=alpha*tw;
      weatherCtx.fillStyle=p.color+alpha*tw+')';
      weatherCtx.beginPath();
      weatherCtx.arc(p.x,p.y,p.size,0,Math.PI*2);
      weatherCtx.fill();
      // Tiny cross sparkle
      weatherCtx.strokeStyle=p.color+alpha*tw*0.5+')';
      weatherCtx.lineWidth=0.5;
      weatherCtx.beginPath();
      weatherCtx.moveTo(p.x-p.size*2,p.y);weatherCtx.lineTo(p.x+p.size*2,p.y);
      weatherCtx.moveTo(p.x,p.y-p.size*2);weatherCtx.lineTo(p.x,p.y+p.size*2);
      weatherCtx.stroke();
    }
    weatherCtx.restore();
    return true;
  });

  // Gradually remove particles when weather changes to clear
  if(weather.type==='clear'&&weatherParticles.length>0){
    weatherParticles.forEach(p=>p.life-=0.03);
  }

  weatherAF=requestAnimationFrame(animateWeather);
}

function init(){
  document.getElementById('cv').style.minHeight=CH+'px';
  buildTabs();genTerrain(curP);
  const pts=genPath(curP,true);genOverlays(curP,pts,true);
  updPanel(curP,0);setupScroll();initWeather();
  let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{
    genTerrain(curP);const p=genPath(curP,false);genOverlays(curP,p,false);initWeather()},200)});
}
document.addEventListener('DOMContentLoaded',init);
</script>
