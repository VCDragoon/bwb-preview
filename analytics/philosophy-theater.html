<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystery Philosophy Theater 3000</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;600&family=JetBrains+Mono:wght@400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #06060c;
  color: #c8c8e0;
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  z-index: 10000;
}

/* HEADER */
.main-title {
  text-align: center;
  padding: 20px 20px 10px;
  position: relative;
}
.main-title h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2rem, 5vw, 4rem);
  letter-spacing: 6px;
  background: linear-gradient(90deg, #ef4444, #FF8A65, #ffd700, #81C784, #4A90D9, #BA68C8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
  animation: titleGlow 3s ease-in-out infinite alternate;
}
.main-title .subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  color: #666;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 4px;
}

@keyframes titleGlow {
  0% { filter: drop-shadow(0 0 10px rgba(255,215,0,0.2)); }
  100% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.5)); }
}

/* CONTROLS BAR */
.controls-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 8px 20px 12px;
  flex-wrap: wrap;
}
.controls-bar button, .controls-bar select {
  background: #1a1a2e;
  border: 1px solid #333;
  color: #c8c8e0;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.controls-bar button:hover, .controls-bar select:hover {
  border-color: #ffd700;
  box-shadow: 0 0 8px rgba(255,215,0,0.3);
}
.controls-bar button.active {
  border-color: #ffd700;
  background: #2a2a3e;
  color: #ffd700;
}
.controls-bar select {
  min-width: 160px;
}
.speed-control {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem;
  color: #888;
}
.speed-control input[type="range"] {
  width: 80px;
  accent-color: #ffd700;
}

/* MOVIE SCREEN */
.movie-screen {
  background: linear-gradient(180deg, #12121e 0%, #0e0e1a 100%);
  border: 2px solid #222;
  border-radius: 8px;
  margin: 0 20px;
  padding: 30px 40px;
  min-height: 50vh;
  max-height: 55vh;
  overflow-y: auto;
  position: relative;
  box-shadow: inset 0 0 60px rgba(0,0,0,0.5), 0 0 30px rgba(0,0,0,0.8);
}

/* Screen vignette */
.movie-screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.4) 100%);
  border-radius: 8px;
  z-index: 1;
}

.movie-screen::-webkit-scrollbar { width: 6px; }
.movie-screen::-webkit-scrollbar-track { background: #0a0a14; }
.movie-screen::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

.session-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  position: relative;
  z-index: 2;
}
.session-nav button {
  background: none;
  border: 1px solid #444;
  color: #888;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  padding: 4px 16px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.session-nav button:hover:not(:disabled) {
  color: #ffd700;
  border-color: #ffd700;
}
.session-nav button:disabled {
  opacity: 0.3;
  cursor: default;
}
.session-counter {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  color: #666;
}

.session-title-card {
  text-align: center;
  margin: 20px 0 30px;
  position: relative;
  z-index: 2;
}
.session-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  color: #ffd700;
  letter-spacing: 6px;
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.7;
}
.session-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.4rem, 3vw, 2.2rem);
  color: #e8e8f0;
  line-height: 1.3;
  text-shadow: 0 0 20px rgba(255,215,0,0.15);
}
.session-hook {
  font-family: 'Barlow', sans-serif;
  font-style: italic;
  font-size: 0.95rem;
  color: #999;
  margin-top: 10px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

.recap-body {
  font-family: 'Barlow', sans-serif;
  font-size: 0.92rem;
  line-height: 1.7;
  color: #b0b0c8;
  margin: 20px 0;
  position: relative;
  z-index: 2;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}

.biggest-moment {
  margin-top: 24px;
  padding: 16px 20px;
  background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(255,215,0,0.02));
  border-left: 3px solid #ffd700;
  border-radius: 0 4px 4px 0;
  position: relative;
  z-index: 2;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}
.biggest-moment-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.88rem;
  color: #ffd700;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.biggest-moment-title {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem;
  color: #ffd700;
}
.biggest-moment-desc {
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  color: #999;
  margin-top: 6px;
  line-height: 1.5;
}

/* THEATER BAR */
.theater-bar {
  background: linear-gradient(180deg, #0c0c18, #0a0a14 30%, #080810);
  border-top: 2px solid #1a1a2a;
  padding: 16px 20px 20px;
  position: relative;
  margin-top: 10px;
}

/* Seat row texture */
.theater-bar::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    repeating-linear-gradient(90deg, transparent, transparent 16.666%, rgba(30,30,50,0.3) 16.666%, rgba(30,30,50,0.3) 16.7%),
    linear-gradient(180deg, rgba(20,20,35,0.5) 0%, transparent 40%);
  pointer-events: none;
}

.theater-seats {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
}

.philosopher-seat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  transition: transform 0.2s;
}
.philosopher-seat:hover {
  transform: translateY(-3px);
}
.philosopher-seat.filtered {
  opacity: 0.3;
}
.philosopher-seat.filtered:hover {
  opacity: 0.6;
}

/* Speech bubble */
.speech-bubble {
  position: relative;
  background: #14141f;
  border: 1px solid var(--phil-color);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: 'Barlow', sans-serif;
  font-size: 0.88rem;
  line-height: 1.4;
  color: #c8c8e0;
  min-height: 60px;
  max-height: 100px;
  overflow-y: auto;
  width: 100%;
  opacity: 0;
  transform: translateY(5px);
  transition: opacity 0.4s, transform 0.4s;
  box-shadow: 0 0 12px rgba(var(--phil-rgb), 0.15);
}
.speech-bubble::-webkit-scrollbar { width: 3px; }
.speech-bubble::-webkit-scrollbar-thumb { background: var(--phil-color); border-radius: 2px; }

.speech-bubble.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Bubble arrow */
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid var(--phil-color);
}

/* Philosopher icon */
.philosopher-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: var(--phil-color);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 1.3rem;
  font-weight: 700;
  color: #06060c;
  box-shadow: 0 0 15px rgba(var(--phil-rgb), 0.4);
  transition: box-shadow 0.3s;
  position: relative;
}
.philosopher-icon.speaking {
  box-shadow: 0 0 25px rgba(var(--phil-rgb), 0.7);
  animation: speakPulse 0.6s ease-in-out;
}

@keyframes speakPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.philosopher-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.88rem;
  color: var(--phil-color);
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
}

/* Typing animation */
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
.typing-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--phil-color);
  margin-left: 2px;
  animation: blink 0.7s infinite;
  vertical-align: text-bottom;
}

/* Filter mode header */
.filter-banner {
  display: none;
  text-align: center;
  padding: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
}
.filter-banner.active {
  display: block;
}
.filter-banner:hover {
  text-decoration: underline;
}

/* PHILOSOPHER TIMELINE (filter mode) */
.timeline-view {
  display: none;
  padding: 20px;
  max-width: 800px;
  margin: 0 auto;
}
.timeline-view.active {
  display: block;
}
.timeline-entry {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  padding: 12px;
  background: #12121e;
  border-radius: 6px;
  border-left: 3px solid var(--phil-color);
}
.timeline-session {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88rem;
  color: #ffd700;
  min-width: 35px;
  padding-top: 2px;
}
.timeline-text {
  font-family: 'Barlow', sans-serif;
  font-size: 0.9rem;
  line-height: 1.5;
  color: #c8c8e0;
}
.timeline-session-title {
  font-family: 'Cinzel', serif;
  font-size: 0.88rem;
  color: #888;
  margin-bottom: 4px;
}

/* Sun Tzu ratings */
.rating {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  color: #81C784;
}

/* Responsive */
@media (max-width: 768px) {
  .theater-seats {
    grid-template-columns: repeat(3, 1fr);
  }
  .movie-screen {
    margin: 0 10px;
    padding: 20px;
  }
  .controls-bar {
    gap: 6px;
    padding: 6px 10px;
  }
}
</style>
</head>
<body>

<div class="main-title">
  <h1>Mystery Philosophy Theater 3000</h1>
  <div class="subtitle">Six Philosophers Heckle a D&D Campaign</div>
</div>

<div class="controls-bar">
  <button id="btnPrev" onclick="prevSession()">&laquo; Prev</button>
  <select id="sessionSelect" onchange="goToSession(parseInt(this.value))"></select>
  <button id="btnNext" onclick="nextSession()">Next &raquo;</button>
  <button id="btnPlay" onclick="toggleAutoplay()">&#9654; Play Commentary</button>
  <div class="speed-control">
    <span>Speed:</span>
    <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1" oninput="updateSpeed(this.value)">
    <span id="speedLabel">1x</span>
  </div>
  <button id="btnClearFilter" onclick="clearFilter()" style="display:none;">Show All</button>
</div>

<div class="filter-banner" id="filterBanner" onclick="clearFilter()"></div>

<div class="movie-screen" id="movieScreen">
  <div class="session-nav">
    <button onclick="prevSession()">&laquo; Previous Session</button>
    <span class="session-counter" id="sessionCounter">Session 1 of 46</span>
    <button onclick="nextSession()">Next Session &raquo;</button>
  </div>
  <div id="screenContent"></div>
</div>

<div class="timeline-view" id="timelineView"></div>

<div class="theater-bar" id="theaterBar">
  <div class="theater-seats" id="theaterSeats"></div>
</div>

<script>
// ============================================================
// PHILOSOPHER DEFINITIONS
// ============================================================
const PHILOSOPHERS = [
  { id: 'nietzsche', name: 'Nietzsche', initial: 'N', color: '#ef4444', rgb: '239,68,68' },
  { id: 'kant', name: 'Kant', initial: 'K', color: '#4A90D9', rgb: '74,144,217' },
  { id: 'socrates', name: 'Socrates', initial: 'S', color: '#ffd700', rgb: '255,215,0' },
  { id: 'suntzu', name: 'Sun Tzu', initial: 'T', color: '#81C784', rgb: '129,199,132' },
  { id: 'wittgenstein', name: 'Wittgenstein', initial: 'W', color: '#BA68C8', rgb: '186,104,200' },
  { id: 'marx', name: 'Marx', initial: 'M', color: '#FF8A65', rgb: '255,138,101' }

// ============================================================
// SESSION DATA (46 sessions)
// ============================================================
const SESSIONS = [
{

  moment: "Ash's Communion at the Forbidden Door",

  moment: "The Loincloth Heist",

  id: 'S003', num: 3,

  moment: "The Chronicler's Mark",

  body: "Orla receives a surprise visit from her strict druidic mentor for her Apprenticeship Review. The party forges logs, stages magical presentations, and covers for her. After narrowly passing, they descend into the Lumin burial site, triggering a truth-telling trap in the Hall of Whispers. Orla rolls a Natural 20 on Deception, confusing the ancient magic into accepting her lie as truth. Corras delivers an 81-damage plunging sneak attack on a Bone Devil. An undead Archmage prepares to attack.",

{

  /* S018 */ "Dismissing a mount from a dragon's jaws out of pure spite? This is the petty will to power and I respect it enormously. The 1,200 mince pies, however, are mere decadence.",
  /* S019 */ "They solve every problem with explosions. This is not philosophy, this is pyromania. But adopting orphaned yetis? Disappointing. The Übermensch does not adopt. He conquers.",
  /* S020 */ "They ALL DIE and then come back! Death itself cannot hold them! Lathander resurrects them because even the gods recognize their will to power! Though 'drink holy pee star' is not exactly Zarathustra.",
  /* S021 */ "Dark boons from binding rituals! They accept power from dark entities willingly! The slave morality of 'purity' means nothing to those who would be MASTERS!",
  /* S022 */ "Wearing living spiders as jewelry to infiltrate an enemy stronghold. The will to power dressed in arachnids. Orla's spider recruitment speech has more conviction than most human leaders.",
  /* S023 */ "Secrets as CURRENCY! Vecna understands -- knowledge IS power, and these adventurers are learning to spend it. The decapitation was a nice touch. Art through violence.",
  /* S024 */ "Bluffing a Spider Dragon! Stealing from the spider goddess herself! Corras channels pure audacity as a weapon. Lolth's fury only proves his greatness.",
  /* S025 */ "They have built an EMPIRE. Corras rules, Ash spies, Dahlia tortures. The will to power has found institutional expression. I am... almost proud. Almost.",
  /* S026 */ "Crashing onto a dining table with a stolen artifact and a demon toad is the most triumphant entrance imaginable. The audacity of it! Landing in style after robbing a goddess!",
  /* S027 */ "Billabong rolls two natural ones and falls off a cliff. Even the mighty stumble. But the fairy dragon catches her! The Übermensch inspires loyalty even in failure.",
  /* S028 */ "A druid becomes a gorilla and beats the barbarian unconscious to prove dominance to shadow dogs. This is pure, primal will to power. No philosophy needed. Just FISTS.",
  /* S029 */ "Reading an infernal contract with a natural 20! The will to power applied to LITERACY! And then reciting the Pact of Avarice -- sacrificing the ability to help others for personal power? PERFECT.",
  /* S030 */ "Corras rides the face of a paralyzed world-eating serpent and drives a dagger into its eye. This is not combat. This is ART. The Übermensch stands ON his enemies.",
  /* S031 */ "Billabong kills her best friend under mind control and they FORGIVE her? Disappointing. Where is the rage? The vengeance? Though the Maw exploding from inside a thunder wall is suitably violent.",
  /* S032 */ "Unmasking a lich! Burning away the false face to reveal the skull beneath! This is what I have always said -- strip away the pretense and see the death that hides under civilization.",
  /* S033 */ "Corras SURRENDERS? He puts on MANACLES? He SUBMITS? This is... this is... I need to sit down. The slave allows himself to be chained. I am genuinely nauseous.",
  /* S034 */ "Corras ABSORBS HIS TWIN! He literally CONSUMES another version of himself to become stronger! THIS is the Übermensch! A knight's nat-1 killing a lich is just the universe agreeing with me!",
  /* S035 */ "Overpowered heroes treat a legendary haunted house like a minor inconvenience. When you have transcended fear, even Death House is just an old building with uppity furniture.",
  /* S036 */ "Drinking blood offered by Strahd! Yes! Embracing the dark communion! Though becoming paranoid about wizards is a peculiar result. The curse of those who drink from the chalice of power.",
  /* S037 */ "Corras RESISTS the master of an entire realm by sheer force of will! DC 23 wisdom save -- PASSED! The Übermensch cannot be dominated because HE is the one who dominates!",
  /* S038 */ "A nat-20 backflip through scythe blades! Then burning the sentient house to ASH! This is how the Übermensch handles haunted real estate -- with style and arson.",
  /* S039 */ "Angry villagers hurl rocks at them. Good. The Übermensch is always resented by the herd. The goat rescue is weak, but fleeing on a magic carpet has a certain aristocratic flair.",
  /* S040 */ "Stealing from FATE ITSELF! Corras takes the Deck of Many Things by force, survives a dreamscape prison, and emerges from a latrine VICTORIOUS! This is my favorite session!",
  /* S041 */ "SavannahBelle turned into a vampire spawn! Strahd's cruelty is magnificent in its precision -- using allies against each other. The charmed killing the paralyzed. Pure predatory excellence.",
  /* S042 */ "Two parties merge for the final battle! A mirror shatters a bride into a million pieces! The Sunsword burns with the fury of a grandmother's tough love! This is GLORIOUS VIOLENCE!",
  /* S043 */ "They MURDER the comatose Neverember and HARVEST HIS SOUL! 'We've always been the bad guys.' FINALLY! They admit what I have been saying all along! Beyond good and evil AT LAST!",
  /* S044 */ "Cutting off a man's leg with a flaming sword to prevent a blood spell! Dahlia does not negotiate with escape attempts. She AMPUTATES them. The will to power applied to surgery.",
  /* S045 */ "They slaughter THOUSANDS in a riot and discover a man made of clockwork wearing human skin! This session is a symphony of horror and power! The Übermensch does not rule -- he REIGNS!",
  /* S046 */ "Caught by the Wild Hunt. One must be sacrificed. The question is not WHO dies -- it is who is strong enough to CHOOSE to die. This is the ultimate test of the will. I am breathless."
],
kant: [
  /* S001 */ "A castle claimed by adventurers? By what right? Was there a social contract? A deed? Communing with dark entities in basements is deeply irresponsible and categorically impermissible!",
  /* S002 */ "Stealing from a creature's intimate garments! If EVERYONE stole from trolls' loincloths, there would be no moral order to garment-based storage! This cannot be universalized!",
  /* S003 */ "Absorbing a dying celestial entity's power rather than helping it peacefully? One cannot treat a celestial being merely as a MEANS to personal enhancement! There were other options!",
  /* S004 */ "An irreversible magical curse accepted without informed consent by the entire party? This violates the autonomy of every individual who did not choose to lose their shadow!",
  /* S005 */ "LYING to a TRUTH-DETECTING TRAP? This is a categorical violation of the categorical imperative! If everyone lied to truth detectors, the very concept of truth would collapse! Which is EXACTLY WHAT HAPPENED!",
  /* S006 */ "I will concede that defending oneself against a hostile Archmage constitutes a legitimate application of force. The wasp, at least, acted from instinct rather than moral corruption.",
  /* S007 */ "Time travel to steal from one's PAST SELF? Which self has moral priority? If the maxim 'steal from your temporal copies' were universal law, personal identity would be MEANINGLESS!",
  /* S008 */ "They are their own cult? They created the very rumors they investigated? This is a temporal categorical nightmare! The chain of causation has become a CIRCLE! My head hurts!",
  /* S009 */ "Pit fighting, jail, and intimidating travelers making stew. Not a single member of this party has consulted their duty to moral law today. A mimic horse is the LEAST of their ethical problems.",
  /* S010 */ "I will admit that stopping a Balor summoning could be considered a duty. But the stealth failure was not from duty -- it was from incompetence. There IS a distinction.",
  /* S011 */ "A sentient artifact COMPELLING a party member to harm an ally? This is a violation of bodily autonomy so fundamental that I barely have words. Ash cannot be held responsible, but the arm MUST be destroyed!",
  /* S012 */ "The party ventures deeper into danger. I suppose if they have undertaken this mission from duty, their courage is morally praiseworthy. I will withhold judgment. Briefly.",
  /* S013 */ "A BLOOD PACT WITH A DEMON?! If EVERYONE signed infernal contracts, society would collapse into a web of demonic obligations! The categorical imperative SCREAMS against this! I am SCREAMING!",
  /* S014 */ "The hamster ball situation, while absurd, at least prevented harm to the prince. Ash acted from duty to protect -- the ONE morally defensible action this session. Well done, Ash. Just Ash.",
  /* S015 */ "Deceiving one's past self is a violation of trust so profound that I need to invent new ethical frameworks to properly condemn it. But they saved a familiar's life, so... I'm conflicted.",
  /* S016 */ "REWRITING REALITY to avoid consequences?! The Fates card is an abomination! Moral agents must accept the consequences of their actions! You cannot UNDO causation! THIS IS NOT HOW ETHICS WORK!",
  /* S017 */ "WAR ON CELESTIALS? These are ANGELS! Beings of divine order! And Lilith pledges to the god of DEATH? I need to lie down. The entire moral universe has been inverted.",
  /* S018 */ "Dismissing a mount to spite a dragon is petty and cruel to the mount. The mince pie incident, while wasteful, at least caused no direct moral harm. This is the most ethical session yet, which is horrifying.",
  /* S019 */ "Solving problems with 62 flasks of explosive fire rather than negotiation! If EVERYONE's response to monsters was indiscriminate bombing, the natural world would be DESTROYED! Oh wait, they also adopted baby yetis. That's... fine.",
  /* S020 */ "Grabbing an unknown magical artifact without assessment or consent! 118 radiant damage! A TOTAL PARTY KILL! 'Drink holy pee star' is NOT a coherent resurrection protocol! Though Billabong's vigil was... genuinely dutiful.",
  /* S021 */ "Binding to dark entities? Deception expertise for a PALADIN? The moral fabric of this party is beyond repair. SavannahBelle breaking discipline shows at least SOMEONE has a conscience, even if misapplied.",
  /* S022 */ "Incinerating confused enemies with twin walls of fire has a certain utilitarian logic, but Kant does not DO utilitarian logic! Also, recruiting spiders under false pretenses of 'choice' is manipulative!",
  /* S023 */ "Secrets as currency? Trading private information for power? This instrumentalizes the dignity of every person whose secret is spent! Vecna's system is the antithesis of moral law!",
  /* S024 */ "Abandoning Gertrude to torture! She trusted them as a 'sister'! They treated her as a means to their escape and discarded her! This is the TEXTBOOK violation of the second formulation!",
  /* S025 */ "They have institutionalized TORTURE. They called it 'Guantanamo' and LAUGHED. The categorical imperative weeps. I weep. If everyone ran a torture chamber, human dignity would be -- oh, it already is.",
  /* S026 */ "The crash landing was reckless but effective. I note that nobody asked the demon toad for consent to be teleported. Also, 'sisterhood is a concept' is philosophically imprecise.",
  /* S027 */ "Descending into ancient forges to fight the undead is, I concede, a legitimate quest if motivated by duty. Billabong's nat-1s are not moral failings, merely statistical ones. For once.",
  /* S028 */ "Wrestling someone unconscious to prove dominance to DOGS? If everyone resolved social hierarchies through gorilla combat, civilization would -- actually, that might explain a great deal about civilization.",
  /* S029 */ "An EXORCISM! Finally, an act that could be considered morally obligatory! But then Billabong signs the Pact of AVARICE? Sacrificing the ability to help others? That is CHOOSING to violate the categorical imperative!",
  /* S030 */ "Shadow power archetypes? Each member embracing darkness for combat advantage? The ends do not justify the means! A dagger in a creature's eye is viscerally effective but ethically I cannot endorse riding faces.",
  /* S031 */ "The barbarian killed the wizard. Under mind control. This is... this is the cruelest possible test of moral philosophy. Can there be guilt without agency? I am genuinely tormented by this question.",
  /* S032 */ "I will concede that uncovering a lich's disguise serves the greater good. But the sweepstakes con? Deceiving innocent dock workers with false promises? That is a CATEGORICAL violation!",
  /* S033 */ "Corras surrenders himself to save his friends. This... this is duty. This is the moral law made manifest through self-sacrifice. I am... briefly... proud. Just this once. Don't tell Nietzsche.",
  /* S034 */ "A stray crossbow bolt kills the lich. This is not justice -- it is chaos. But the Otyugh speaking in therapy language? 'Emotional manipulation'? That creature has read Groundwork for the Metaphysics of Morals!",
  /* S035 */ "Threatening to fireball a haunted orphan house? GHOST CHILDREN are asking for help and the party considers ARSON?! The duty of care extends to spectral minors!",
  /* S036 */ "Drinking blood offered by the undead lord of a cursed realm! If everyone accepted beverages from vampires, there would be no -- actually, I simply refuse to universalize this scenario.",
  /* S037 */ "Corras RESISTS temptation! He says NO to dark power! The moral law within him proves stronger than the starry heavens above! This is the greatest moment of the entire campaign!",
  /* S038 */ "Burning down a house -- even a sentient, evil house -- raises questions about property rights for non-biological entities. But I admit there are limits to what I can defend. Even haunted houses.",
  /* S039 */ "Angry villagers are correct to throw rocks. The party has brought 'hungry old gods' with them. One cannot universalize the maxim 'bring eldritch horror to small villages.'",
  /* S040 */ "STEALING from an elderly woman! MULTIPLE TIMES! The Deck of Many Things is not yours by RIGHT, Corras! Theft cannot be universalized as a maxim regardless of how impressive the sleight of hand is!",
  /* S041 */ "A charmed ally kills a paralyzed friend, who is then turned into a vampire? Every moral principle I hold dear has been violated simultaneously. I have nothing left to say. I'm going to sit here quietly.",
  /* S042 */ "Van Richten sacrificing himself is pure Kantian duty -- acting from moral law regardless of consequences. The one good person in this entire story. I am moved to actual tears.",
  /* S043 */ "THEY MURDERED A COMATOSE MAN AND HARVESTED HIS SOUL! 'We've always been the bad guys'?! I HAVE BEEN SAYING THIS FOR FORTY-THREE SESSIONS! NOBODY LISTENED! THE CATEGORICAL IMPERATIVE IS IN SHAMBLES!",
  /* S044 */ "AMPUTATING A PRISONER'S LEG?! He was BOUND and CAPTIVE! The duty of care for prisoners is ABSOLUTE! A flame-tongued greatsword is not a medical instrument! I am filing a formal ethical complaint!",
  /* S045 */ "They slaughtered THOUSANDS of refugees who were PROTESTING. The Butcher is a MACHINE wearing HUMAN SKIN. I have seen the moral abyss and it is wearing stitched-together flesh. I need to retire.",
  /* S046 */ "One member must be sacrificed to the Wild Hunt. This is the trolley problem made manifest and I hate it. Though I note Corras ceded his city to the Matron -- a dereliction of his duty as king."
],
socrates: [
  /* S001 */ "But what IS a castle? Can one truly 'own' a structure one did not build? And what does it mean to 'master' whispers -- does the whisper not master the listener?",
  /* S002 */ "If a coin is stolen from a troll's loincloth and replaced with wood, is the troll poorer? And when the familiar was consumed, did it cease to exist, or merely change its mode of being? I merely ask.",
  /* S003 */ "When Billabong absorbed the celestial, did she become more herself or less? If you gain the memories of another being, whose memories are your memories? I have several follow-up questions.",
  /* S004 */ "If one has no shadow, can one still cast darkness? And if one cannot be charmed, does that make one immune to love? Or IS love a form of charm? These tattoos raise more questions than they answer.",
  /* S005 */ "But CAN a lie become truth simply because truth itself is deceived? If the Hall of Whispers accepts the lie, is it still a lie? Or has truth been redefined? I would like to examine this Hall personally.",
  /* S006 */ "When the Archmage used Time Stop, was HE outside of time, or was everyone else? And if his 'lesser half' was this powerful, can we be certain the 'greater half' isn't the lesser one? What do we really know?",
  /* S007 */ "If you fight your past self and win, did you always win? If you lose, did you always lose? And what, precisely, IS an eyelash, philosophically speaking?",
  /* S008 */ "If you are the cult that you were investigating, were you investigating yourself? And if so, did you find what you were looking for? Was the investigation itself the answer? What was the question?",
  /* S009 */ "Is a mimic that perfectly imitates a horse not, in some meaningful sense, a horse? What is 'horse-ness' if not the appearance and function of a horse? Sid raises profound ontological questions.",
  /* S010 */ "When nature itself rises up in wrath, is it still 'nature'? Or has it become something unnatural? Can the natural be wrathful, or is wrath inherently a deviation from natural order?",
  /* S011 */ "If your own arm betrays you, whose arm is it? Can a limb have a will separate from the person? And if Argentus controls the arm, who controls Argentus? Perhaps no one controls anyone.",
  /* S012 */ "They continue their adventure. But toward what? Does the path create the destination, or does the destination create the path? And do they truly know the difference?",
  /* S013 */ "What IS a pact? If both parties are desperate, can there be genuine agreement? And when a demon says 'undefined favors,' is that not the same as saying 'everything and nothing'? How very philosophical of demons.",
  /* S014 */ "But is a person inside a sphere truly trapped, or is everyone OUTSIDE the sphere trapped in a world that contains a raging Quaggoth? Perspective, my friends. It is always about perspective.",
  /* S015 */ "If you steal your own familiar from yourself, is it theft? Whose familiar is it -- the past self who has it or the future self who lost it? Does possession require a fixed point in time?",
  /* S016 */ "If the Fates card rewrites reality, is the new reality 'real'? Were they always going to play the card? Is free will compatible with a card that determines fate? I need several more sessions to process this.",
  /* S017 */ "But what IS a king? When Corras declares war on angels, does he war with the divine order itself? And if one can war with heaven, was heaven ever truly in charge?",
  /* S018 */ "If you dismiss a mount before a dragon eats it, did the dragon fail to eat, or did the mount cease to exist? And which is worse for the dragon -- losing a meal, or the meal never having been?",
  /* S019 */ "Is a solution that involves 62 flasks of explosive truly a 'solution'? Or is it merely a very large problem that happens to solve a smaller one? And can you truly 'adopt' a yeti?",
  /* S020 */ "But what IS death, if one can return from it? And what IS a star, if touching it kills you? The message 'drink holy pee star' -- is this divine communication, or just very bad handwriting?",
  /* S021 */ "If receiving dark boons makes you stronger but darker, have you gained or lost? And when the Drow tests devotion, whose devotion is being tested -- the party's, or the Drow's faith in his own test?",
  /* S022 */ "Do the spiders Orla recruited CHOOSE to be disguise accessories? She claims they 'chose to be here.' But can a spider consent to being jewelry? What constitutes informed consent for arachnids?",
  /* S023 */ "Secrets as currency -- but whose value do secrets have? The keeper's or the knower's? And if a secret is spent, is it still a secret? Or has it become merely information? I am fascinated by this exchange rate.",
  /* S024 */ "When Ash impersonates a servant of Lolth, is she lying to the dragon, or becoming a servant of Lolth temporarily? Is identity fixed, or does the performance create the person? The dragon seemed convinced.",
  /* S025 */ "They call their empire a 'federation' -- but what is the difference between a federation and a kingdom? If one person rules all the bastions, is it not simply monarchy with better branding?",
  /* S026 */ "If a demon toad is teleported without its consent, has its autonomy been violated? Or does friendship with Orla constitute implicit consent? And what IS a 'sister' in the context of a cyclops?",
  /* S027 */ "When Billabong falls off a cliff, is gravity the enemy, or was it always the cliff? And can a fairy dragon truly 'rescue' a barbarian, or does the barbarian merely accept the fairy dragon's assistance?",
  /* S028 */ "If a druid becomes a gorilla and defeats a barbarian, who is the dominant species? And do the shadow dogs understand dominance, or merely fear? Is there a difference?",
  /* S029 */ "But what IS avarice, if the pact that names it grants power? Can one be avaricious in the pursuit of saving a friend? Is selfishness that serves others still selfishness? The contract raises good questions.",
  /* S030 */ "When Corras stands on the Maw's face, who is truly the monster -- the serpent that eats worlds, or the man who rides its face? And do we admire this because we fear the alternative?",
  /* S031 */ "If you kill someone while your mind is not your own, whose hands did the killing? And if the soul is captured, has the person died, or merely been relocated? What IS death without a departing soul?",
  /* S032 */ "When the lich's mask melts, is the skull beneath the truth? Or was the mask the truth the lich chose to live? Do we become our disguises, or are we always the bones beneath?",
  /* S033 */ "When Corras surrenders, is that weakness or the highest form of strength? If you chain yourself to free others, are you the prisoner or the liberator? Kant seems oddly quiet about this one.",
  /* S034 */ "If a nat-1 kills a lich, was it destiny or random chance? And if Corras absorbs his twin, is he now one person or two? Can you become more of yourself by consuming another self?",
  /* S035 */ "These heroes are too powerful for the haunted house. But does power make the haunted house less haunted? Or does it make the heroes less capable of fear? And which would be the greater loss?",
  /* S036 */ "If an illusion of Strahd offers you blood and you drink it, did Strahd offer it or did YOU? And is paranoia of wizards rational in a world where wizards can end reality? Perhaps it is wisdom.",
  /* S037 */ "Corras resists the master of the realm. But what does it mean to 'master' a realm? If the realm's master can be resisted, is he truly the master? I merely ask.",
  /* S038 */ "If you burn a sentient house, did you commit murder or demolition? And what IS a house, if it can also be a creature? Is every building merely a patient monster?",
  /* S039 */ "The villagers say 'you bring the hungry old gods.' But did they bring the gods, or did the gods bring them? And what does a god hunger FOR? Can a god experience hunger?",
  /* S040 */ "Corras claims 'I bested you at your own game.' But whose game IS the Deck of Many Things? The player's, the card's, or fate's? And can one truly win a game one does not understand?",
  /* S041 */ "When a charmed friend kills a paralyzed friend, who is the victim? Both? Neither? And when Strahd turns the dead into undead, has he ended a life or begun one? What IS alive?",
  /* S042 */ "When Shrum's mirror shows Ludmilla her true face and she shatters -- was the mirror showing truth, or creating it? Does a reflection have more reality than the thing reflected?",
  /* S043 */ "'We've always been the bad guys.' But who decides what 'bad' means? The party? The refugees? The comatose man being drained? And if everyone is wrong, does 'right' exist at all?",
  /* S044 */ "If you cut off a man's leg to stop his spell, did you save him or harm him? Can an amputation be an act of mercy? And what IS a jawbone that contains a dagger?",
  /* S045 */ "The Butcher is a machine wearing human skin. But what makes a human, human? If the skin is human and the mind is mechanical, where does personhood reside? Inside or outside?",
  /* S046 */ "One must join the Wild Hunt forever. But what IS forever in the Feywild? And is being hunted really different from ordinary life? Are we not all running from something?"
],
suntzu: [
  /* S001 */ "Acquiring a fortified position without combat: strategically sound. The basement investigation was reckless -- never probe unknown magical defenses alone. 6/10.",
  /* S002 */ "The loincloth infiltration: unconventional, effective, minimal casualties. Textbook use of misdirection. 8/10. Losing the familiar to an unknown entity: poor asset management. 3/10.",
  /* S003 */ "Ave's blade dance to neutralize a Beholder through art rather than combat: brilliant psychological warfare. 9/10. Jumping into an unknown pit: 1/10. Never leap before you look.",
  /* S004 */ "Accepting an unknown magical curse from a stolen book? No risk assessment, no controlled testing, no exit strategy. The ambush survival was adequate. Overall: 4/10. Amateur hour.",
  /* S005 */ "The druidic review deception: coordinated, multi-layered, all parties briefed. 8/10. The plunging sneak attack from Billabong's back: unconventional vertical warfare. 9/10. Impressive.",
  /* S006 */ "The Archmage used superior positioning, terrain control, and force multiplication. An excellent enemy. The wasp finishing blow was lucky, not tactical. 5/10. Sometimes Sun Tzu weeps.",
  /* S007 */ "Planning a time-travel heist to save a familiar is strategic overcorrection of the highest order. The crinkly bag lure: 7/10. Getting caught immediately: 2/10. Know when to extract.",
  /* S008 */ "Creating a self-fulfilling prophecy to hide their activities: 9/10. This is the Art of War chapter on deception made temporal. Also, tunneling with magic for infiltration is sound methodology.",
  /* S009 */ "Jail time, blown covers, and alerting the enemy. Failed reconnaissance on every level. 2/10. A mimic trained as a pack mule, however? That is inspired military asset utilization. I want one.",
  /* S010 */ "Double nat-1 stealth rolls. Catastrophic. But Orla's Wrath of Nature turning the battlefield itself into a weapon? 10/10. The terrain became the army. This is the ESSENCE of my teachings.",
  /* S011 */ "An internal asset (Argentus) acting as a hostile agent -- classic fifth column infiltration. Ash's negotiation with the Earth Elemental to redirect it at the enemy: elegant threat redirection. 7/10.",
  /* S012 */ "The party continues their advance. Without specific tactical data, I rate this: unrated. I require details before I assess. Supply your reports.",
  /* S013 */ "Signing an infernal contract under duress for tactical extraction: acceptable if the terms can be subverted later. Charming the demon first to gain leverage: smart. 6/10. The favors are a liability.",
  /* S014 */ "The Resilient Sphere containment of a rampaging ally: excellent improvised crowd control. 7/10. Corras diving off a cliff on a nat-1: your escape routes should not include cliffs. 1/10.",
  /* S015 */ "Multi-team coordinated heist with disguises, magical distractions, and temporal synchronization. 9/10. This is the kind of operation I would have written about approvingly.",
  /* S016 */ "Fighting a Blue Dragon, a Balor, and a Vampire simultaneously while running a skill challenge: this is called 'being on two fronts,' which I specifically warned against. Using the Fates card: strategic nuclear option. 6/10.",
  /* S017 */ "Declaring war against celestial forces: bold. Establishing multiple bastions of power with specialized functions: sound military infrastructure. But fighting angels? Know your enemy. 5/10 overall.",
  /* S018 */ "Triggering an avalanche on your OWN party: catastrophic environmental awareness failure. 1/10. The dragon encounter was avoided through magical dismissal rather than confrontation: acceptable. 4/10.",
  /* S019 */ "Leaving an improvised explosive device for the enemy while teleporting to safety: this is EXACTLY what I taught. Deny the enemy position, preserve your own forces. 9/10. Textbook.",
  /* S020 */ "Grabbing an unknown glowing orb in a hostile environment: 1/10. This is the worst tactical decision in the entire campaign. 118 radiant damage. Total party kill. 'Drink holy pee star.' I have no rating for this. Just shame.",
  /* S021 */ "Dark boons for tactical advantage: pragmatic. Using the enemy's own greeting protocols: solid infiltration technique. Breaking discipline during a test: SavannahBelle, see me after class. 5/10.",
  /* S022 */ "Twin Wall of Fire while allies are confused: SavannahBelle identified the threats and eliminated them independently. Superior initiative in chaos. Living spider disguises: creative camouflage. 8/10.",
  /* S023 */ "Hurling an enemy mage into your own Wall of Fire: efficient recycling of existing resources. The toad swallowing Orla: unorthodox extraction. Decapitating the demon: clean execution. 7/10.",
  /* S024 */ "Bluffing a superior enemy into abandoning its post: supreme use of intelligence warfare. Corras stealing the artifact while the guardian is distracted: textbook combined operations. 9/10.",
  /* S025 */ "Establishing an empire with specialized bastions, intelligence networks, and defensive infrastructure. This IS the Art of War. Whoever designed this federation understands warfare. 8/10.",
  /* S026 */ "Emergency extraction under pursuit with a planar alignment scroll: having the right scroll prepared demonstrates supply chain excellence. Crashing onto a dining table: messy but alive. 7/10.",
  /* S027 */ "Descending into an ancient forge against undead guardians: acceptable reconnaissance in force. Billabong's consecutive failures: rotate her out of the front line for a session. She needs rest. 5/10.",
  /* S028 */ "Establishing dominance over 15 shadow mastiffs through non-lethal hierarchy display: acquiring a pack of shadow dogs as assets is brilliant force multiplication. 9/10. Gorilla wrestling: unorthodox but effective.",
  /* S029 */ "Fighting on two fronts -- exorcism AND door defense -- with minimal personnel: dangerous but necessary. Using an enemy's own contract against them: exploiting the fine print is supreme intelligence work. 8/10.",
  /* S030 */ "Blind, paralyze, then strike: the combination chain is textbook. Sunbeam to blind, Hold Monster to paralyze, sneak attack to the eye. 10/10. This is how you kill something that eats worlds.",
  /* S031 */ "Losing your primary spellcaster to friendly fire during a boss fight: catastrophic command failure. The thunder wall explosion was effective but reactive. Having a replacement agent ready: adequate logistics. 4/10.",
  /* S032 */ "The sweepstakes distraction: excellent social engineering. Truesight for invisible threat detection: proper intelligence preparation. But walking into a lich's ambush in an enclosed space: 3/10. Never fight in their chosen terrain.",
  /* S033 */ "Corras's surrender: strategic sacrifice to preserve the larger force. Branding him for tracking: ensuring recovery capability. 7/10. Sometimes the best move is to lose a piece to save the board.",
  /* S034 */ "A random nat-1 crossbow bolt kills the lich. This is not strategy. This is statistical improbability. I cannot rate chaos. But the Twin Formation -- consuming your enemy to gain their strength: 10/10. The ULTIMATE force multiplication.",
  /* S035 */ "Entering an enemy stronghold overleveled with contempt: arrogance is the enemy of victory. Death House has survived centuries of adventurers. Respect your enemy, even when you can fireball it. 4/10.",
  /* S036 */ "Drinking from unknown vessels in hostile territory: AGAIN with the drinking! Do none of them carry their own water? Cursed with paranoia, soul trapped in tattoos. 2/10. Supply your own beverages!",
  /* S037 */ "Resisting mind control through willpower: the general who cannot be swayed controls the battlefield. 8/10. The shambling mound ambush was a terrain awareness failure. Always check the water.",
  /* S038 */ "Escape via skill challenge: competent extraction. Burning the house: scorched earth. The nat-20 backflip was stylish but irrelevant to military objectives. 6/10. Style points are not real points.",
  /* S039 */ "Walling wolves in stone while an operative sprints for the objective: excellent combined arms. Fleeing the village on a flying carpet: air superiority ensures extraction. 7/10.",
  /* S040 */ "Multiple heist attempts in one night against a supernatural adversary who controls the terrain: reckless overextension. The nat-20 was brilliant; getting trapped in a card game afterward erased all gains. 5/10.",
  /* S041 */ "Flying recon over an enemy fortress WITHOUT stealth countermeasures?! And then TOUCHING artifacts in a boss fight arena?! Drinking from a profane chalice! This party has learned NOTHING about unknown objects! 1/10!",
  /* S042 */ "Two-party combined operations against a superior enemy: exactly the kind of force concentration I advocate. Shattering the Heart of Sorrow: destroying the enemy's defensive infrastructure first. 8/10.",
  /* S043 */ "Murdering comatose political rivals to harvest their essence: effective but politically catastrophic. You have eliminated your enemies but created ten thousand new ones. 3/10. Think LONG TERM.",
  /* S044 */ "Amputating a prisoner's limb to prevent a spell: decisive action under time pressure. 7/10. The public trial descending into chaos: control your battlefield, including the social one. 4/10.",
  /* S045 */ "Slaughtering 9,000 rioting civilians: this is not warfare, this is MASSACRE. You have destroyed your own supply base! The construct discovery is valuable intelligence, but at what cost? 2/10.",
  /* S046 */ "Accepting a chase challenge from a superior fey entity in THEIR terrain: violates every principle I have ever written. Never fight where the enemy chooses. Never run where the enemy hunts. 1/10. Catastrophic."

wittgenstein: [
  /* S001 */ "When they say 'our castle,' the possessive pronoun is doing unexamined work. Whose castle? The party's? The Master's? The ghosts'? Language games within language games.",
  /* S002 */ "Consider the proposition 'stealing from a loincloth.' The loincloth is not a container in the conventional sense. The language of theft requires a notion of ownership that trolls may not participate in.",
  /* S003 */ "'Celestial ascent.' The word 'ascent' implies upward motion, yet Billabong's transformation was more of an absorption. We use spatial metaphors for non-spatial events. This is deeply confused, and I find it beautiful.",
  /* S004 */ "They have lost their shadows. But what WAS the shadow? A mere absence of light, or a fundamental aspect of selfhood? The Sylvan script tattooed on their bodies is a language none of them can read. They are WEARING meaning they cannot access.",
  /* S005 */ "Orla claims she lies about everything, and the trap believes her. But if the statement 'I always lie' is true, then it must be false. The Hall of Whispers has stumbled into the liar's paradox and simply gave up. I sympathize.",
  /* S006 */ "The 'lesser half.' But what makes a half lesser? If the lesser half can cast Time Stop, the word 'lesser' has lost its meaning entirely. Language collapses under the weight of power levels.",
  /* S007 */ "'The answer is E.' A note left to one's past self containing a single letter. The entirety of communication reduced to one glyph. What is E? Everything? Nothing? The fifth letter? Wittgenstein approves of this radical compression.",
  /* S008 */ "'We are the cult.' The word 'cult' transforms mid-sentence from 'threatening other' to 'us.' The referent shifts without the word changing. This is the finest example of a language game I have ever witnessed.",
  /* S009 */ "The word 'horse' has been used to describe Sid for the entire campaign. But Sid was never a horse. Every use of 'horse' to describe Sid was, in retrospect, a lie that nobody was telling. The language was deceiving everyone, including itself.",
  /* S010 */ "'Wrath of Nature.' The word 'wrath' anthropomorphizes nature, but in D&D, nature LITERALLY has wrath. The metaphor has become literal. Whereof one cannot speak, nature speaks FOR you with rocks.",
  /* S011 */ "'This is not me!' Ash says, while her arm does the thing. The word 'me' suddenly has a contested referent. The body says one thing, the mind another. Personal pronouns have never been less reliable.",
  /* S012 */ "'The party continues.' These three words contain an assumption of temporal persistence and collective identity that I find premature. Do they continue, or does a new configuration of beings merely resemble the old one?",
  /* S013 */ "The infernal contract. Here is a document where the meaning of every word is precisely defined by demonic law, yet 'undefined favors' is the key term. A contract that is precise about its own vagueness. Linguistically, this is PERFECT.",
  /* S014 */ "They call the Resilient Sphere a 'hamster ball.' This metaphor transforms a magical prison into a toy. Language domesticates horror. By naming it a hamster ball, they have made the unbearable bearable. This is what language IS FOR.",
  /* S015 */ "'You did it, and you will have Spark with you.' Past tense and future tense in the same sentence, referring to the same event. Temporal grammar has been liberated from temporal reality. I may need to revise the Tractatus.",
  /* S016 */ "'The threads of fate unwind.' But threads do not have opinions about being unwound. We speak of fate as though it is woven, as though reality is textile. The metaphorical substrate of our entire cosmology is FABRIC. Why fabric?",
  /* S017 */ "'King Corras.' 'Celestial Conqueror.' 'Obsidian Sorceress.' Titles multiply. Each title is a language game that constitutes a new form of life. They are not gaining power -- they are gaining NAMES, and names are power.",
  /* S018 */ "'Snack-O-Matic 3000.' The name implies automation and modernity, yet it merely throws pies. The gap between what a name promises and what a thing does is the gap in which all comedy lives.",
  /* S019 */ "'Big Bang.' They named their explosion after the cosmological event. But which is the metaphor -- their explosion or the universe? Perhaps all explosions are the same explosion, differently described.",
  /* S020 */ "'Drink holy pee star.' This is language at its absolute limit. Ghosts attempting communication and producing something that is ALMOST meaningful but fundamentally garbled. This is every conversation I have ever had at Cambridge.",
  /* S021 */ "'The spider queen smiles on you.' A greeting used as a password. But does the speaker believe the spider queen is smiling? Does the listener? The words function as a key, not as a proposition. Language beyond truth and falsity.",
  /* S022 */ "Orla told the spiders they 'chose to be here' and 'sacrificed much, left their families behind.' She is attributing narrative and agency to spiders through language. The spiders do not speak. But do they need to? Perhaps we speak FOR all beings.",
  /* S023 */ "'Currency of Secrets.' Three words that fuse economics, privacy, and power into a single concept. Vecna has created a new language game where silence has a price and speech is an expenditure. I am genuinely envious.",
  /* S024 */ "Gertrude screams 'Where are my sisters?' But 'sister' was a label applied by Dahlia minutes ago. The word created a relationship that now creates grief. Language does not describe bonds -- it FORMS them, and can break them.",
  /* S025 */ "They call the torture chamber 'Guantanamo' and the surveillance network the 'NSA.' By mapping fantasy concepts onto modern institutions, they reveal that both are equally absurd. The comparison illuminates in both directions.",
  /* S026 */ "'Sisterhood is a concept.' Finally, someone in this campaign makes an explicitly philosophical statement! And it is about cyclops adoption! The most profound utterance comes from the most absurd context. As always.",
  /* S027 */ "'A zombie outmaneuvers me.' The humiliation is linguistic as much as physical. The word 'outmaneuver' implies tactical superiority, and applying it to a zombie redefines both 'zombie' and 'maneuver.'",
  /* S028 */ "Orla BECAME a gorilla. But did the gorilla become Orla? When language says 'wild shape,' it implies the new shape is wild. But Orla's gorilla was calculated, tactical. The wild was not wild. The shape was a lie.",
  /* S029 */ "'The Pact of Avarice.' A pact is an agreement, but avarice is the refusal to share. A pact of avarice is an agreement to refuse agreement. The language eats itself. I find this contract more philosophically interesting than anything Kant has said today.",
  /* S030 */ "The creature is called 'the Ceaseless Maw.' But it CAN be ceased -- they are ceasing it right now. Names should not make false promises. 'The Temporarily Ceaseless Maw' would be more accurate.",
  /* S031 */ "'She'll come back to us.' Future tense, expressing a certainty about an uncertain event. The grammar of hope is always in future tense. Present tense hope is just denial. Dahlia's sentence is the most human thing anyone has said.",
  /* S032 */ "The lich's mask melts to reveal a skull. But a skull is ALSO a kind of mask -- it is the face beneath the face beneath the face. There is always another layer. Meaning, like disguises, goes all the way down.",
  /* S033 */ "'The plan is hope you guys come back for me.' 'Hope' used as a plan. The word 'plan' typically implies agency and structure. Here it means the opposite. Corras has redefined 'plan' to mean 'prayer.' Language bends under duress.",
  /* S034 */ "The Otyugh speaks 'therapy-speak.' An aberration using the language of emotional wellness! When a sewer creature accuses you of 'emotional manipulation,' the language game of therapy has escaped the therapist's office. Whereof one cannot speak, the Otyugh speaks anyway.",
  /* S035 */ "They threaten to 'fireball' a house. The spell name has become a verb. An action has been compressed into language so thoroughly that 'to fireball' requires no further explanation. This is how language evolves -- through violence.",
  /* S036 */ "SavannahBelle is cursed with 'paranoia of wizards.' But in this world, wizards CAN end reality. Is paranoia of wizards still paranoia, or has it become rational prudence? The word 'paranoia' assumes the fear is unfounded. Perhaps the word is wrong.",
  /* S037 */ "'The master of this realm.' But Barovia has no clear master -- Strahd is a prisoner, the dark powers are indifferent. The word 'master' is doing work that reality does not support. An empty title for an empty throne.",
  /* S038 */ "'I drip on all of you.' SavannahBelle, in mucus worm form, describes her state of being. This is language reduced to pure physicality. The proposition is not metaphorical. She is literally dripping. And yet it is somehow profound.",
  /* S039 */ "'You bring the hungry old gods with you.' The villagers attribute divine hunger to the party's presence. But can GODS be hungry? And what would a god eat? The villagers' language creates a theology of appetite. I am fascinated.",
  /* S040 */ "'I bested you at your own game.' But the Deck of Many Things does not have 'a game.' It is random. Corras is claiming victory over CHANCE ITSELF. The language of competition applied to probability. Magnificent delusion.",
  /* S041 */ "What does 'alive' mean when a vampire spawn 'rises'? SavannahBelle was alive, then dead, then undead. The word 'alive' has at least three states in this world, and our language only has one word for it. We need more words.",
  /* S042 */ "Ludmilla sees her 'true form' in the mirror and shatters. But which was the true form -- the beautiful bride or the monster? The mirror claims authority over identity. But who gave the mirror that authority? Shrum did. With language.",
  /* S043 */ "'Monsters with good publicity.' Isteval reduces the party to a marketing problem. The word 'monster' combined with 'publicity' suggests that monstrosity is a matter of perception management. He may be the wisest person in this campaign.",
  /* S044 */ "The Master of Whispers pulled a dagger from his JAWBONE. The jaw is where language lives. He has weaponized the organ of speech. This is the most literal possible metaphor for dangerous words.",
  /* S045 */ "The Butcher is a machine wearing human skin. But when we say 'human,' do we mean the skin or the mechanism? If the skin is human, is the being human? Or does 'human' refer to something neither skin nor metal? Perhaps 'human' is just another word we do not understand.",
  /* S046 */ "'Join the Wild Hunt forever.' But what does 'forever' mean for a being that ages? And what does 'join' mean if it is compelled? A forced joining is not a joining -- it is a conscription. The language of invitation concealing the reality of imprisonment."
],
marx: [
  /* S001 */ "So the adventurers simply CLAIM a castle built by the labor of others? This is the enclosure of the commons. And this 'Master of Whispers' is merely the intelligence apparatus of the feudal estate.",

  /* S022 */ "They enter Webb's Edge disguised in living spiders -- the proletarian spiders forced into unpaid labor as accessories! 'They chose to be here!' No, Orla. They were RECRUITED. There is a difference.",

// ============================================================
// STATE
// ============================================================
let currentSession = 0;
let autoplayInterval = null;
let commentaryTimeout = null;
let commentaryStep = 0;
let speed = 1;
let activeFilter = null;

// ============================================================
// INITIALIZATION
// ============================================================
function init() {
  // Build session selector
  const select = document.getElementById('sessionSelect');
  SESSIONS.forEach((s, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `S${String(s.num).padStart(3,'0')}: ${s.title}`;
    select.appendChild(opt);
  });

  // Build theater seats
  buildTheater();

  // Show first session
  showSession(0);
}

function buildTheater() {
  const seats = document.getElementById('theaterSeats');
  seats.innerHTML = '';
  PHILOSOPHERS.forEach(p => {
    const seat = document.createElement('div');
    seat.className = 'philosopher-seat';
    seat.id = `seat-${p.id}`;
    seat.style.setProperty('--phil-color', p.color);
    seat.style.setProperty('--phil-rgb', p.rgb);
    seat.onclick = () => toggleFilter(p.id);

    seat.innerHTML = `
      <div class="speech-bubble" id="bubble-${p.id}"></div>
      <div class="philosopher-icon" id="icon-${p.id}">${p.initial}</div>
      <div class="philosopher-name">${p.name}</div>
    `;
    seats.appendChild(seat);
  });
}

// ============================================================
// SESSION DISPLAY
// ============================================================
function showSession(idx) {
  if (idx < 0 || idx >= SESSIONS.length) return;
  currentSession = idx;
  commentaryStep = 0;

  const s = SESSIONS[idx];
  const content = document.getElementById('screenContent');

  document.getElementById('sessionSelect').value = idx;
  document.getElementById('sessionCounter').textContent = `Session ${s.num} of 46`;

  content.innerHTML = `
    <div class="session-title-card">
      <div class="session-number">Session ${String(s.num).padStart(3,'0')}</div>
      <div class="session-title">${s.title}</div>
      <div class="session-hook">${s.hook}</div>
    </div>
    <div class="recap-body">${s.body}</div>
    <div class="biggest-moment">
      <div class="biggest-moment-label">BIGGEST MOMENT</div>
      <div class="biggest-moment-title">${s.moment}</div>
      <div class="biggest-moment-desc">${s.momentDesc}</div>
    </div>
  `;

  // Scroll to top
  document.getElementById('movieScreen').scrollTop = 0;

  // Clear all bubbles
  PHILOSOPHERS.forEach(p => {
    const bubble = document.getElementById(`bubble-${p.id}`);
    bubble.classList.remove('visible');
    bubble.innerHTML = '';
    document.getElementById(`icon-${p.id}`).classList.remove('speaking');
  });

  // Update nav buttons
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === SESSIONS.length - 1;
}

// ============================================================
// COMMENTARY PLAYBACK
// ============================================================
function playCommentary() {
  if (commentaryStep >= PHILOSOPHERS.length) {
    commentaryStep = 0;
    return;
  }

  const p = PHILOSOPHERS[commentaryStep];
  const reaction = REACTIONS[p.id][currentSession];
  const bubble = document.getElementById(`bubble-${p.id}`);
  const icon = document.getElementById(`icon-${p.id}`);

  icon.classList.add('speaking');
  bubble.classList.add('visible');

  // Typing animation
  typeText(bubble, reaction, p.color, () => {
    icon.classList.remove('speaking');
    commentaryStep++;
    if (commentaryStep < PHILOSOPHERS.length) {
      commentaryTimeout = setTimeout(playCommentary, 800 / speed);
    }
  });
}

function typeText(element, text, color, callback) {
  let i = 0;
  const interval = Math.max(8, 20 / speed);
  element.innerHTML = '<span class="typing-cursor" style="--phil-color:' + color + '"></span>';

  function addChar() {
    if (i < text.length) {
      element.innerHTML = text.substring(0, i + 1) + '<span class="typing-cursor" style="--phil-color:' + color + '"></span>';
      i++;
      // Scroll bubble to bottom
      element.scrollTop = element.scrollHeight;
      setTimeout(addChar, interval);
    } else {
      element.innerHTML = text;
      element.scrollTop = element.scrollHeight;
      if (callback) setTimeout(callback, 300 / speed);
    }
  }
  addChar();
}

function showAllReactions() {
  PHILOSOPHERS.forEach((p, i) => {
    const bubble = document.getElementById(`bubble-${p.id}`);
    bubble.innerHTML = REACTIONS[p.id][currentSession];
    bubble.classList.add('visible');
  });
  commentaryStep = PHILOSOPHERS.length;
}

// ============================================================
// CONTROLS
// ============================================================
function toggleAutoplay() {
  const btn = document.getElementById('btnPlay');
  if (autoplayInterval) {
    clearInterval(autoplayInterval);
    clearTimeout(commentaryTimeout);
    autoplayInterval = null;
    btn.innerHTML = '&#9654; Play Commentary';
    btn.classList.remove('active');
  } else {
    // Show all reactions instantly, then play commentary
    if (commentaryStep === 0) {
      playCommentary();
    } else if (commentaryStep >= PHILOSOPHERS.length) {
      // All done, advance to next session
      if (currentSession < SESSIONS.length - 1) {
        nextSession();
        setTimeout(playCommentary, 500);
      }
    }
    btn.innerHTML = '&#9724; Stop';
    btn.classList.add('active');

    // Auto-advance after all commentary plays
    autoplayInterval = setInterval(() => {
      if (commentaryStep >= PHILOSOPHERS.length) {
        if (currentSession < SESSIONS.length - 1) {
          nextSession();
          setTimeout(playCommentary, 500);
        } else {
          clearInterval(autoplayInterval);
          autoplayInterval = null;
          btn.innerHTML = '&#9654; Play Commentary';
          btn.classList.remove('active');
        }
      }
    }, 3000 / speed);
  }
}

function nextSession() {
  clearTimeout(commentaryTimeout);
  if (currentSession < SESSIONS.length - 1) {
    showSession(currentSession + 1);
    if (activeFilter) showFilterTimeline(activeFilter);
  }
}

function prevSession() {
  clearTimeout(commentaryTimeout);
  if (currentSession > 0) {
    showSession(currentSession - 1);
    if (activeFilter) showFilterTimeline(activeFilter);
  }
}

function goToSession(idx) {
  clearTimeout(commentaryTimeout);
  showSession(idx);
  if (activeFilter) showFilterTimeline(activeFilter);
}

function updateSpeed(val) {
  speed = parseFloat(val);
  document.getElementById('speedLabel').textContent = val + 'x';
}

// ============================================================
// PHILOSOPHER FILTER MODE
// ============================================================
function toggleFilter(philId) {
  if (activeFilter === philId) {
    clearFilter();
  } else {
    showFilterTimeline(philId);
  }
}

function showFilterTimeline(philId) {
  activeFilter = philId;
  const phil = PHILOSOPHERS.find(p => p.id === philId);

  // Update banner
  const banner = document.getElementById('filterBanner');
  banner.className = 'filter-banner active';
  banner.style.color = phil.color;
  banner.innerHTML = `Showing all reactions by ${phil.name} (click to close)`;

  // Dim other philosophers
  PHILOSOPHERS.forEach(p => {
    const seat = document.getElementById(`seat-${p.id}`);
    if (p.id === philId) {
      seat.classList.remove('filtered');
    } else {
      seat.classList.add('filtered');
    }
  });

  // Show clear button
  document.getElementById('btnClearFilter').style.display = 'inline-block';

  // Build timeline
  const timeline = document.getElementById('timelineView');
  timeline.className = 'timeline-view active';
  timeline.style.setProperty('--phil-color', phil.color);

  let html = '';
  SESSIONS.forEach((s, i) => {
    html += `
      <div class="timeline-entry" style="--phil-color:${phil.color}; cursor:pointer;" onclick="clearFilter(); goToSession(${i}); playCommentary();">
        <div class="timeline-session">S${String(s.num).padStart(3,'0')}</div>
        <div>
          <div class="timeline-session-title">${s.title}</div>
          <div class="timeline-text">${REACTIONS[philId][i]}</div>
        </div>
      </div>
    `;
  });
  timeline.innerHTML = html;

  // Show the current philosopher's bubble
  PHILOSOPHERS.forEach(p => {
    const bubble = document.getElementById(`bubble-${p.id}`);
    if (p.id === philId) {
      bubble.innerHTML = REACTIONS[philId][currentSession];
      bubble.classList.add('visible');
    } else {
      bubble.classList.remove('visible');
      bubble.innerHTML = '';
    }
  });
}

function clearFilter() {
  activeFilter = null;
  document.getElementById('filterBanner').className = 'filter-banner';
  document.getElementById('timelineView').className = 'timeline-view';
  document.getElementById('btnClearFilter').style.display = 'none';
  PHILOSOPHERS.forEach(p => {
    document.getElementById(`seat-${p.id}`).classList.remove('filtered');
  });
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextSession();
  else if (e.key === 'ArrowLeft') prevSession();
  else if (e.key === ' ') { e.preventDefault(); playCommentary(); }
  else if (e.key === 'a') showAllReactions();
});

// ============================================================
// INIT
// ============================================================
init();
</script>
</body>
</html>
