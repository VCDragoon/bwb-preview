<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICE LUCK RIVERS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060c;
    color: #e0e0e8;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .page-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 30px 60px;
  }

  .header {
    text-align: center;
    margin-bottom: 10px;
    position: relative;
  }

  .header::after {
    content: '';
    display: block;
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4A90D9, #E57373, transparent);
    margin: 16px auto 0;
    box-shadow: 0 0 10px rgba(74, 144, 217, 0.3);
  }

  .header h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 48px;
    letter-spacing: 6px;
    background: linear-gradient(135deg, #4A90D9, #81C784, #E57373);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 20px rgba(74, 144, 217, 0.3));
  }

  .header .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 4px;
    color: #9898b0;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Stats panel */
  .stats-panel {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin: 30px 0;
  }

  .stat-card {
    background: linear-gradient(135deg, #0e0e1a, #16162a);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 16px 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, #4A90D9);
    box-shadow: 0 0 8px var(--accent, #4A90D9);
  }

  .stat-card .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7878a0;
    margin-bottom: 6px;
  }

  .stat-card .stat-value {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--accent, #e0e0e8);
    text-shadow: 0 0 8px var(--glow, transparent);
  }

  .stat-card .stat-detail {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #9898b0;
    margin-top: 4px;
  }

  /* Legend */
  .legend-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin: 24px 0 16px;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    color: #e0e0e8;
    letter-spacing: 1px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid transparent;
    transition: all 0.2s ease;
    user-select: none;
  }

  .legend-item:hover {
    border-color: rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.03);
  }

  .legend-item.hidden {
    opacity: 0.3;
  }

  .legend-item.hidden .legend-swatch {
    background: #404058 !important;
    box-shadow: none !important;
  }

  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-deviation {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #7878a0;
    margin-left: 4px;
  }

  /* Chart container */
  .chart-container {
    background: linear-gradient(180deg, #0a0a14 0%, #12121e 100%);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
    padding: 20px 10px;
    position: relative;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: linear-gradient(135deg, #1a1a2e, #22223a);
    border: 1px solid rgba(74, 144, 217, 0.3);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    color: #e0e0e8;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 12px rgba(74, 144, 217, 0.1);
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.15s ease;
    max-width: 320px;
    backdrop-filter: blur(10px);
  }

  .tooltip.visible { opacity: 1; }

  .tooltip .tt-session {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: #4A90D9;
    margin-bottom: 6px;
  }

  .tooltip .tt-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin: 2px 0;
    align-items: center;
  }

  .tooltip .tt-player-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .tooltip .tt-player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    color: #c0c0d0;
    flex: 1;
    margin-left: 6px;
  }

  .tooltip .tt-player-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    min-width: 60px;
    text-align: right;
  }

  svg text { user-select: none; }
</style>
</head>

// Player identity resolution (from players.ts)
const TRANSCRIPT_TO_PLAYER = {
  'Corras': 'Gradles', 'Sarlumon': 'Gradles',
  'Ash': 'HT', 'Ezrella': 'HT',
  'Billabong': 'Mary',
  'Dahlia': 'Christie', 'Lilith': 'Christie',
  'Christie/Dahlia': 'Christie',
  'Orla': 'Lucy',
  'SavannahBelle': 'Tenderbittle',
  'Meijinx': 'Meijinx', 'Ave': 'Meijinx',
  'Drenek': 'Drenek',
};

const PLAYER_COLORS = {
  Gradles: '#4A90D9', HT: '#E57373', Mary: '#81C784', Christie: '#BA68C8',
  Lucy: '#FFB74D', Tenderbittle: '#4DB6AC', Meijinx: '#FF8A65', Drenek: '#7986CB'
};

const CANONICAL_PLAYERS = ['Gradles', 'HT', 'Mary', 'Christie', 'Lucy', 'Tenderbittle', 'Meijinx', 'Drenek'];

function resolvePlayer(name) {
  if (PLAYER_COLORS[name]) return name;
  if (TRANSCRIPT_TO_PLAYER[name]) return TRANSCRIPT_TO_PLAYER[name];
  const lower = name.toLowerCase();
  for (const [k, v] of Object.entries(TRANSCRIPT_TO_PLAYER)) {
    if (k.toLowerCase().includes(lower) || lower.includes(k.toLowerCase())) return v;
  }
  return name;
}

// ============================================================
// PROCESS DATA: cumulative deviation per player across sessions
// ============================================================
// For each player, for each session: compute (avg_roll - 10.5) * total_rolls
// and accumulate across sessions
const playerData = {};
CANONICAL_PLAYERS.forEach(p => {
  playerData[p] = {
    name: p,
    color: PLAYER_COLORS[p],
    sessions: [],        // [{session: 1, cumDev: X, avgRoll, totalRolls, nat20s, nat1s}]
    totalRolls: 0,
    totalNat20s: 0,
    totalNat1s: 0,
    finalCumDev: 0,
    visible: true
  };
});

for (let i = 1; i <= 46; i++) {
  const sid = `S${String(i).padStart(3, '0')}`;
  const sessionData = DICE_DATA[sid];
  if (!sessionData) continue;

  const summaries = sessionData.player_summaries || [];

  // Aggregate per canonical player for this session
  const sessionPlayerMap = {};
  summaries.forEach(ps => {
    if (ps.player_name === 'DM') return;
    const canonical = resolvePlayer(ps.player_name);
    if (!PLAYER_COLORS[canonical]) return;

    if (!sessionPlayerMap[canonical]) {
      sessionPlayerMap[canonical] = { totalRolls: 0, sumRolls: 0, nat20s: 0, nat1s: 0 };
    }
    const m = sessionPlayerMap[canonical];
    m.totalRolls += ps.total_rolls;
    if (ps.average_roll != null && ps.total_rolls > 0) {
      m.sumRolls += ps.average_roll * ps.total_rolls;
    }
    m.nat20s += ps.natural_20s;
    m.nat1s += ps.natural_1s;
  });

  // Update each player's cumulative
  CANONICAL_PLAYERS.forEach(pName => {
    const pd = playerData[pName];
    const prevCum = pd.sessions.length > 0 ? pd.sessions[pd.sessions.length - 1].cumDev : 0;

    const sm = sessionPlayerMap[pName];
    if (sm && sm.totalRolls > 0) {
      const avgRoll = sm.sumRolls / sm.totalRolls;
      const sessionDev = (avgRoll - 10.5) * sm.totalRolls;
      const newCum = prevCum + sessionDev;
      pd.sessions.push({
        session: i,
        cumDev: newCum,
        avgRoll: avgRoll,
        totalRolls: sm.totalRolls,
        nat20s: sm.nat20s,
        nat1s: sm.nat1s,
        sessionDev: sessionDev,
        hadData: true
      });
      pd.totalRolls += sm.totalRolls;
      pd.totalNat20s += sm.nat20s;
      pd.totalNat1s += sm.nat1s;
      pd.finalCumDev = newCum;
    } else {
      // Carry forward previous value (no data this session)
      pd.sessions.push({
        session: i,
        cumDev: prevCum,
        avgRoll: null,
        totalRolls: 0,
        nat20s: 0,
        nat1s: 0,
        sessionDev: 0,
        hadData: false
      });
    }
  });
}

  // Animate line drawing
  const totalLength = path.node().getTotalLength();
  path.attr('stroke-dasharray', `${totalLength} ${totalLength}`)
    .attr('stroke-dashoffset', totalLength)
    .transition()
    .duration(2000)
    .ease(d3.easeCubicOut)
    .attr('stroke-dashoffset', 0);

  // Dots at data points
  const dots = lineGroup.selectAll('.dot')
    .data(pd.sessions.filter(s => s.hadData))
    .join('circle')
    .attr('cx', d => xScale(d.session))
    .attr('cy', d => yScale(d.cumDev))
    .attr('r', 3)
    .attr('fill', pd.color)
    .attr('stroke', '#06060c')
    .attr('stroke-width', 1)
    .attr('opacity', 0)
    .transition()
    .delay(2000)
    .duration(300)
    .attr('opacity', 0.9);

  // Nat 20 stars and Nat 1 X marks
  const markers = lineGroup.selectAll('.marker')
    .data(pd.sessions.filter(s => s.hadData && (s.nat20s > 0 || s.nat1s > 0)))
    .join('g')
    .attr('transform', d => `translate(${xScale(d.session)},${yScale(d.cumDev)})`)
    .attr('opacity', 0);

  markers.each(function(d) {
    const el = d3.select(this);
    if (d.nat20s > 0) {
      // Star for nat 20
      el.append('text')
        .attr('text-anchor', 'middle')
        .attr('y', -10)
        .attr('font-size', 12)
        .attr('fill', '#ffd700')
        .style('filter', 'drop-shadow(0 0 4px #ffd70088)')
        .text('\u2605');  // filled star
    }
    if (d.nat1s > 0) {
      // X mark for nat 1
      el.append('text')
        .attr('text-anchor', 'middle')
        .attr('y', 16)
        .attr('font-size', 10)
        .attr('font-family', 'JetBrains Mono')
        .attr('font-weight', 'bold')
        .attr('fill', '#ff4444')
        .style('filter', 'drop-shadow(0 0 4px #ff444488)')
        .text('\u2716');  // heavy X
    }
  });

  markers.transition().delay(2200).duration(400).attr('opacity', 1);

  playerLines[pName] = lineGroup;
});

// ============================================================
// CROSSHAIR TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');

const crosshairLine = g.append('line')
  .attr('y1', 0).attr('y2', chartHeight)
  .attr('stroke', '#ffffff')
  .attr('stroke-width', 1)
  .attr('stroke-dasharray', '3,3')
  .attr('stroke-opacity', 0)
  .attr('pointer-events', 'none');

const crosshairDots = g.append('g').attr('class', 'crosshair-dots');

// Invisible overlay for mouse events
g.append('rect')
  .attr('width', chartWidth)
  .attr('height', chartHeight)
  .attr('fill', 'transparent')
  .on('mousemove', function(event) {
    const [mx] = d3.pointer(event, this);
    const sessionNum = Math.round(xScale.invert(mx));
    if (sessionNum < 1 || sessionNum > 46) return;

    const sx = xScale(sessionNum);
    crosshairLine.attr('x1', sx).attr('x2', sx).attr('stroke-opacity', 0.4);

    // Gather values for this session
    let rows = '';
    crosshairDots.selectAll('*').remove();

    const sid = `S${String(sessionNum).padStart(3,'0')}`;

    CANONICAL_PLAYERS.forEach(pName => {
      const pd = playerData[pName];
      if (!pd.visible || pd.totalRolls === 0) return;
      const sData = pd.sessions[sessionNum - 1];
      if (!sData) return;

      const devStr = sData.cumDev >= 0
        ? `<span style="color:#81C784">+${sData.cumDev.toFixed(1)}</span>`
        : `<span style="color:#E57373">${sData.cumDev.toFixed(1)}</span>`;

      let extra = '';
      if (sData.hadData) {
        extra = `<span style="color:#585870; font-size:14px; margin-left:4px">(${sData.totalRolls}r, avg ${sData.avgRoll.toFixed(1)})</span>`;
      }

      rows += `
        <div class="tt-row">
          <span class="tt-player-dot" style="background:${pd.color}; box-shadow: 0 0 4px ${pd.color}88;"></span>
          <span class="tt-player-name">${pName}</span>
          <span class="tt-player-val">${devStr}</span>
          ${extra}
        </div>`;

      // Crosshair dots
      crosshairDots.append('circle')
        .attr('cx', sx)
        .attr('cy', yScale(sData.cumDev))
        .attr('r', 4)
        .attr('fill', pd.color)
        .attr('stroke', '#06060c')
        .attr('stroke-width', 2)
        .style('filter', `drop-shadow(0 0 4px ${pd.color})`);
    });

    tooltip.innerHTML = `<div class="tt-session">${sid}</div>${rows}`;
    tooltip.classList.add('visible');

    const tx = Math.min(event.clientX + 16, window.innerWidth - 340);
    const ty = Math.min(event.clientY - 10, window.innerHeight - 300);
    tooltip.style.left = tx + 'px';
    tooltip.style.top = ty + 'px';
  })
  .on('mouseleave', function() {
    crosshairLine.attr('stroke-opacity', 0);
    crosshairDots.selectAll('*').remove();
    tooltip.classList.remove('visible');
  });

// ============================================================
// VISIBILITY TOGGLE
// ============================================================
function updateChart() {
  CANONICAL_PLAYERS.forEach(pName => {
    const pd = playerData[pName];
    const lineGroup = playerLines[pName];
    if (!lineGroup) return;
    lineGroup.attr('opacity', pd.visible ? 1 : 0);
  });
}
</script>
