<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOG OF WAR &mdash; Sword Coast Exploration</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#06060c;color:#c8c8e0;font-family:'Barlow',sans-serif;
  min-height:100vh;position:relative;overflow-x:hidden;
}
body::after{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  pointer-events:none;z-index:9999;
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#0a0a14}
::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:3px}

/* ─── HEADER ─── */
.header{
  text-align:center;padding:20px 20px 14px;position:relative;z-index:10;
}
.header::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:55%;height:1px;
  background:linear-gradient(90deg,transparent,#4fc3f7,#00e5ff,#4fc3f7,transparent);
  opacity:.5;
}
.title{
  font-family:'Bebas Neue',sans-serif;font-size:68px;letter-spacing:16px;line-height:1;
  background:linear-gradient(135deg,#d0d0e0,#ffffff,#a0a0c8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(79,195,247,.4)) drop-shadow(0 0 60px rgba(0,229,255,.2));
  margin-bottom:3px;
}
.subtitle{
  font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:15px;
  letter-spacing:6px;text-transform:uppercase;color:#5a7090;
}

/* ─── LAYOUT ─── */
.main-layout{display:flex;height:calc(100vh - 108px)}

.sidebar{
  width:270px;min-width:270px;padding:14px 12px;
  border-right:1px solid rgba(79,195,247,.12);overflow-y:auto;
  display:flex;flex-direction:column;gap:10px;
}

.panel{
  background:linear-gradient(135deg,#0a0a18,#0f0f28);
  border:1px solid #1a1a38;border-radius:8px;padding:12px 14px;
  position:relative;overflow:hidden;
}
.panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,#00b8d4,#4fc3f7);
}
.panel h3{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;
  color:#4fc3f7;margin-bottom:8px;text-transform:uppercase;
}

.stat-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.stat-label{
  font-family:'Barlow Condensed',sans-serif;font-weight:400;color:#5a7090;
  text-transform:uppercase;letter-spacing:1px;font-size:14px;
}
.stat-value{
  font-family:'JetBrains Mono',monospace;font-weight:500;color:#d8d8f0;font-size:15px;
  text-shadow:0 0 6px rgba(79,195,247,.25);
}
.stat-value.hl{color:#00e5ff;text-shadow:0 0 10px rgba(0,229,255,.45)}

/* discovery bar */
.bar-wrap{
  background:#0a0a18;border-radius:4px;height:18px;overflow:hidden;margin-top:5px;
  border:1px solid #1a1a38;position:relative;
}
.bar-fill{
  height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(90deg,#004d6e,#00838f,#00e5ff);
  box-shadow:0 0 14px rgba(0,229,255,.3);position:relative;
}
.bar-fill::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:3px;
  background:#fff;box-shadow:0 0 8px #00e5ff,0 0 16px #00e5ff;
  border-radius:0 3px 3px 0;
}
.bar-pct{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.8);z-index:2;
}

/* location list */
.loc-list{max-height:999px;overflow-y:auto;margin-top:4px;flex:1;min-height:0}
.loc-item{
  display:flex;align-items:center;gap:7px;padding:3px 5px;border-radius:4px;
  cursor:pointer;transition:background .15s;font-size:14px;
}
.loc-item:hover{background:rgba(79,195,247,.08)}
.loc-item.active{background:rgba(79,195,247,.14);border-left:2px solid #00e5ff}
.loc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.loc-nm{
  font-family:'Barlow Condensed',sans-serif;font-weight:400;color:#c0c0d8;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.loc-ct{font-family:'JetBrains Mono',monospace;font-size:14px;color:#5a7090}
.loc-item.undiscovered{opacity:.3}
.loc-item.undiscovered .loc-nm{color:#3a3a58}

/* ─── MAP ─── */
.map-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.map-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.map-img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.fog-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.markers-svg{position:absolute;top:0;left:0;width:100%;height:100%}

/* markers */
.location-marker{cursor:pointer}
.marker-glow{fill:url(#markerGlow);opacity:.5}
.marker-core{fill:#00e5ff;stroke:#e0e0f0;stroke-width:1.2;transition:r .2s}
.marker-core:hover{fill:#80deea;filter:drop-shadow(0 0 8px #00e5ff)}

/* ─── TOOLTIP ─── */
.tooltip{
  position:fixed;pointer-events:none;z-index:200;
  background:linear-gradient(135deg,#0c0c22ee,#18183aee);
  border:1px solid rgba(79,195,247,.35);border-radius:8px;
  padding:12px 14px;min-width:200px;max-width:300px;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 30px rgba(0,0,0,.55),0 0 18px rgba(79,195,247,.12);
  opacity:0;transition:opacity .15s;
}
.tooltip.vis{opacity:1}
.tooltip h4{
  font-family:'Cinzel',serif;font-size:15px;font-weight:600;color:#e0e0f0;
  margin-bottom:7px;text-shadow:0 0 8px rgba(79,195,247,.35);
  border-bottom:1px solid rgba(79,195,247,.18);padding-bottom:5px;
}
.tt-r{display:flex;justify-content:space-between;padding:2px 0}
.tt-l{font-size:14px;color:#5a7090;text-transform:uppercase;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif}
.tt-v{font-family:'JetBrains Mono',monospace;font-size:14px;color:#00e5ff}
.tt-s{margin-top:5px;font-size:14px;color:#7788a0;line-height:1.5;font-family:'JetBrains Mono',monospace}

/* ─── DETAIL PANEL ─── */
.detail{
  position:fixed;right:-420px;top:0;bottom:0;width:400px;
  background:linear-gradient(180deg,#0a0a18f5,#0d0d22f5);
  border-left:1px solid rgba(79,195,247,.25);
  z-index:500;transition:right .4s cubic-bezier(.4,0,.2,1);
  overflow-y:auto;padding:20px;
  box-shadow:-8px 0 40px rgba(0,0,0,.5);
  backdrop-filter:blur(16px);
}
.detail.open{right:0}
.detail-x{
  position:absolute;top:10px;right:12px;background:none;border:none;
  color:#5a7090;font-size:24px;cursor:pointer;line-height:1;transition:color .2s;
}
.detail-x:hover{color:#00e5ff}

.detail h2{
  font-family:'Cinzel',serif;font-size:22px;font-weight:600;color:#e0e0f0;
  margin-bottom:3px;text-shadow:0 0 10px rgba(79,195,247,.35);
}
.detail .d-sub{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#5a7090;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;
}
.d-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.d-stat{
  background:#0a0a18;border:1px solid #1a1a38;border-radius:6px;padding:9px;text-align:center;
}
.d-stat .dv{
  font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:#00e5ff;
  text-shadow:0 0 8px rgba(0,229,255,.35);
}
.d-stat .dl{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#5a7090;
  text-transform:uppercase;letter-spacing:1px;margin-top:2px;
}

.scene-list h3{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;
  color:#4fc3f7;margin-bottom:6px;
}
.si{
  background:linear-gradient(135deg,#0c0c1a,#11112a);
  border:1px solid #1a1a38;border-radius:5px;padding:8px 10px;margin-bottom:5px;
  border-left:3px solid #5a7090;
}
.si[data-t="Combat"]{border-left-color:#ff4444}
.si[data-t="Exploration"]{border-left-color:#4caf50}
.si[data-t="Social_Encounter"]{border-left-color:#ffc107}
.si[data-t="Exposition"]{border-left-color:#9c27b0}
.si[data-t="Puzzle"]{border-left-color:#ff9800}
.si[data-t="Skill_Challenge"]{border-left-color:#2196f3}
.si[data-t="Recap"]{border-left-color:#607d8b}
.si[data-t="Character_Management"]{border-left-color:#00bcd4}
.si[data-t="Meta"]{border-left-color:#9e9e9e}
.si .si-hd{display:flex;justify-content:space-between;align-items:center}
.si .si-s{font-family:'JetBrains Mono',monospace;font-size:14px;color:#00e5ff}
.si .si-t{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#7788a0;text-transform:uppercase;letter-spacing:1px}
.si .si-c{font-size:14px;color:#b8b8d0;margin-top:3px;line-height:1.3}

/* ─── CONTROLS ─── */
.controls{
  padding:10px 18px 14px;
  background:linear-gradient(180deg,transparent,#06060c 30%);
  border-top:1px solid rgba(79,195,247,.08);
  display:flex;align-items:center;gap:14px;position:relative;z-index:10;
}
.sess-lbl{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;
  color:#00e5ff;text-shadow:0 0 10px rgba(0,229,255,.35);min-width:160px;
}
.slider-wrap{flex:1;position:relative;padding:6px 0}
.sslider{
  -webkit-appearance:none;width:100%;height:5px;border-radius:3px;
  background:linear-gradient(90deg,#1a1a38,#28284a);outline:none;cursor:pointer;
}
.sslider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#80deea,#00838f);
  border:2px solid #00e5ff;cursor:pointer;
  box-shadow:0 0 10px rgba(0,229,255,.5),0 0 22px rgba(0,229,255,.18);
}
.sslider::-moz-range-thumb{
  width:18px;height:18px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#80deea,#00838f);
  border:2px solid #00e5ff;cursor:pointer;
  box-shadow:0 0 10px rgba(0,229,255,.5);
}
.ticks{display:flex;justify-content:space-between;padding:0 9px;margin-top:2px}
.tk{font-family:'JetBrains Mono',monospace;font-size:12px;color:#2a2a48;width:18px;text-align:center}
.tk.disc{color:#00b8d4;font-weight:600}

.pb{display:flex;gap:5px;align-items:center}
.btn{
  background:linear-gradient(135deg,#18183a,#28284a);
  border:1px solid #3a3a58;border-radius:5px;color:#c0c0d8;
  padding:7px 12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;
  font-size:14px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;
}
.btn:hover{border-color:#00e5ff;color:#00e5ff;box-shadow:0 0 10px rgba(0,229,255,.18)}
.btn.on{border-color:#00e5ff;color:#00e5ff;background:rgba(0,229,255,.08)}
.pbtn{
  width:36px;height:36px;padding:0;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:16px;
}

/* ─── FLASH ─── */
.flash{
  position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:8px;
  color:#00e5ff;text-shadow:0 0 28px #00e5ff,0 0 56px rgba(0,229,255,.45);
  opacity:0;pointer-events:none;z-index:100;
}
.flash2{
  position:fixed;top:54%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cinzel',serif;font-size:24px;font-weight:600;
  color:#e0e0f0;text-shadow:0 0 18px rgba(79,195,247,.55);
  opacity:0;pointer-events:none;z-index:100;
}
.flash.show,.flash2.show{animation:flashAnim 2.2s ease-out forwards}
@keyframes flashAnim{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}
  12%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
  25%{transform:translate(-50%,-50%) scale(1)}
  65%{opacity:1}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-25px)}
}

/* ─── PARTICLES ─── */
.particles{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:2}
.particle{
  position:absolute;width:2px;height:2px;background:#4fc3f7;
  border-radius:50%;opacity:0;animation:pdrift 9s linear infinite;
}
@keyframes pdrift{
  0%{opacity:0;transform:translateY(0) translateX(0)}
  8%{opacity:.3}
  92%{opacity:.3}
  100%{opacity:0;transform:translateY(-70px) translateX(25px)}
}

/* ─── REGION LABELS ─── */
.region-label{
  font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;fill:#3a5a70;
  pointer-events:none;opacity:.7;
}
</style>
</head>

<div class="main-layout">

      </svg>
    </div>
    <div class="particles" id="parts"></div>
  </div>
</div>

<div class="controls">
  <div class="sess-lbl" id="sessLbl">PRE-CAMPAIGN</div>
  <div class="slider-wrap">
    <input type="range" class="sslider" id="slider" min="0" max="46" value="0" step="1">
    <div class="ticks" id="ticks"></div>
  </div>
  <div class="pb">
    <button class="btn pbtn" id="playBtn" title="Play / Pause (Space)">&#9654;</button>
    <button class="btn" id="speedBtn">1&times;</button>
    <button class="btn" id="resetBtn">Reset</button>
  </div>
</div>

<div class="tooltip" id="tip"></div>
<div class="detail" id="det"><button class="detail-x" id="detX">&times;</button><div id="detC"></div></div>
<div class="flash" id="fl1">NEW DISCOVERY!</div>
<div class="flash2" id="fl2"></div>

let mR = {x:0,y:0,w:0,h:0};

function updRect(){
  const cont = document.getElementById('mapCont');
  const cR = cont.getBoundingClientRect();
  const iR = mapImg.getBoundingClientRect();
  mR = {x:iR.left-cR.left, y:iR.top-cR.top, w:iR.width, h:iR.height};
  fogC.width = cR.width; fogC.height = cR.height;
  mSvg.attr('width',cR.width).attr('height',cR.height);
}

function l2p(l){ return {px:mR.x+(l.x/100)*mR.w, py:mR.y+(l.y/100)*mR.h} }

// ==================================================================
// FOG
// ==================================================================
function drawFog(){
  const w=fogC.width, h=fogC.height;
  ctx.clearRect(0,0,w,h);

  // Dark overlay
  ctx.fillStyle='rgba(6,6,12,0.93)';
  ctx.fillRect(0,0,w,h);

  // Subtle fog texture
  ctx.save();
  const time = Date.now() * 0.0001;
  for(let i=0;i<150;i++){
    const fx = (Math.sin(i*0.7+time)*0.5+0.5)*w;
    const fy = (Math.cos(i*0.5+time*0.8)*0.5+0.5)*h;
    const fr = 15+Math.sin(i*1.3)*20;
    ctx.beginPath();ctx.arc(fx,fy,Math.abs(fr),0,Math.PI*2);
    ctx.fillStyle=`rgba(15,15,35,${0.03+Math.sin(i)*0.02})`;ctx.fill();
  }
  ctx.restore();

  // Cut holes
  ctx.globalCompositeOperation='destination-out';
  locs.forEach(l=>{
    if(!revealed.has(l.name))return;
    const{px,py}=l2p(l);
    const sc=mR.w/800;
    const r=Math.min(35+l.mc*1.8,130)*sc;
    const g=ctx.createRadialGradient(px,py,0,px,py,r);
    g.addColorStop(0,'rgba(0,0,0,1)');
    g.addColorStop(0.45,'rgba(0,0,0,0.97)');
    g.addColorStop(0.7,'rgba(0,0,0,0.7)');
    g.addColorStop(0.88,'rgba(0,0,0,0.25)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';

  // Edge glow
  locs.forEach(l=>{
    if(!revealed.has(l.name))return;
    const{px,py}=l2p(l);
    const sc=mR.w/800;
    const r=Math.min(35+l.mc*1.8,130)*sc;
    const g=ctx.createRadialGradient(px,py,r*0.55,px,py,r*1.15);
    g.addColorStop(0,'rgba(0,229,255,0)');
    g.addColorStop(0.5,'rgba(0,229,255,0.03)');
    g.addColorStop(0.8,'rgba(79,195,247,0.06)');
    g.addColorStop(1,'rgba(0,229,255,0)');
    ctx.beginPath();ctx.arc(px,py,r*1.15,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  });
}

function drawMarkers(){
  mSvg.selectAll('.location-marker').remove();
  mSvg.selectAll('.region-label').remove();

  const rev = locs.filter(l=>revealed.has(l.name));

  // Region labels for extraplanar areas
  const regions = [
    {label:'FEYWILD / BAROVIA',x:90,y:8,show:rev.some(l=>l.x>=85&&l.y<50)},
    {label:'UNDERDARK / PLANES',x:90,y:53,show:rev.some(l=>l.x>=85&&l.y>=50)},
    {label:'CAMPAIGN REALMS',x:8,y:16,show:rev.some(l=>l.x<=12)},
  ];
  regions.forEach(rg=>{
    if(!rg.show)return;
    const px=mR.x+(rg.x/100)*mR.w, py=mR.y+(rg.y/100)*mR.h;
    mSvg.append('text').attr('class','region-label')
      .attr('x',px).attr('y',py).attr('text-anchor','middle').text(rg.label);
  });

  rev.forEach(l=>{
    const{px,py}=l2p(l);
    const r=Math.max(3,Math.min(2.5+l.mc*0.12,9));
    const g=mSvg.append('g').attr('class','location-marker')
      .attr('transform',`translate(${px},${py})`).style('cursor','pointer');

    g.append('circle').attr('class','marker-glow').attr('r',r*3.5);
    g.append('circle').attr('class','marker-core').attr('r',r);

    // Tiny name label for important locations
    if(l.mc >= 10){
      g.append('text')
        .attr('x',0).attr('y',-(r+5))
        .attr('text-anchor','middle')
        .attr('fill','#a0c0d8').attr('font-size','10px')
        .attr('font-family',"'Barlow Condensed',sans-serif")
        .attr('font-weight','400').attr('letter-spacing','1px')
        .attr('opacity',.7)
        .text(l.name.length>18?l.name.substring(0,16)+'...':l.name);
    }

    g.on('mouseenter',ev=>showTip(ev,l))
     .on('mousemove',ev=>moveTip(ev))
     .on('mouseleave',()=>hideTip())
     .on('click',()=>openDet(l));
  });
}

function animReveal(l){
  const{px,py}=l2p(l);
  [0,200].forEach((del,i)=>{
    const ring=mSvg.append('circle')
      .attr('cx',px).attr('cy',py).attr('r',0)
      .attr('fill','none').attr('stroke',i?'#4fc3f7':'#00e5ff')
      .attr('stroke-width',i?2:3).attr('opacity',i?.5:1);
    ring.transition().delay(del).duration(1100).ease(d3.easeCubicOut)
      .attr('r',i?55:75).attr('opacity',0).attr('stroke-width',0.5).remove();
  });
}

function showTip(ev,l){
  tip.innerHTML=`<h4>${l.name}</h4>
    <div class="tt-r"><span class="tt-l">First Visited</span><span class="tt-v">Session ${l.fs}</span></div>
    <div class="tt-r"><span class="tt-l">Total Mentions</span><span class="tt-v">${l.mc}</span></div>
    <div class="tt-r"><span class="tt-l">Sessions Active</span><span class="tt-v">${l.sc}</span></div>
    <div class="tt-s">Sessions: ${l.sessions.join(', ')}</div>`;
  tip.classList.add('vis');moveTip(ev);
}
function moveTip(ev){
  let x=ev.clientX+14,y=ev.clientY-8;
  if(x+280>window.innerWidth)x=ev.clientX-240;
  if(y+180>window.innerHeight)y=ev.clientY-180;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
function hideTip(){tip.classList.remove('vis')}

    byS[s].forEach(m=>{
      html+=`<div class="si" data-t="${m.t}">
        <div class="si-hd"><span class="si-s">Scene ${m.n}</span><span class="si-t" style="color:${typeClr[m.t]||'#5a7090'}">${(m.t||'').replace(/_/g,' ')}</span></div>
        ${m.c?`<div class="si-c">${m.c}</div>`:''}
      </div>`;
    });
  });

  let region='Sword Coast';
  if(l.x>=85)region=l.y<50?'Extraplanar / Demiplane':'Extraplanar';
  else if(l.x<=12)region='Campaign-Specific Realm';

  detC.innerHTML=`<h2>${l.name}</h2><div class="d-sub">${region}</div>
    <div class="d-grid">
      <div class="d-stat"><div class="dv">${l.fs}</div><div class="dl">First Session</div></div>
      <div class="d-stat"><div class="dv">${l.mc}</div><div class="dl">Total Mentions</div></div>
      <div class="d-stat"><div class="dv">${l.sc}</div><div class="dl">Sessions Active</div></div>
      <div class="d-stat"><div class="dv">${l.ls||'\u2014'}</div><div class="dl">Last Session</div></div>
    </div>
    <div class="scene-list"><h3>All Scenes at ${l.name}</h3>${html||'<div style="color:#5a7090;font-size:14px;padding:6px">No scene data</div>'}</div>`;
  det.classList.add('open');
  hlList(l.name);
}

document.getElementById('detX').onclick=()=>{det.classList.remove('open');selLoc=null};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){det.classList.remove('open');selLoc=null}});

// ==================================================================
// LOCATION LIST
// ==================================================================
function updList(){
  const el=document.getElementById('locList');el.innerHTML='';
  const disc=locs.filter(l=>revealed.has(l.name)).sort((a,b)=>b.mc-a.mc);
  const und=locs.filter(l=>!revealed.has(l.name)&&l.fs<=MAX_S).sort((a,b)=>a.fs-b.fs);
  const sc=d3.scaleLinear().domain([1,120]).range([.3,1]).clamp(true);

  [...disc,...und].forEach(l=>{
    const isR=revealed.has(l.name);
    const d=document.createElement('div');
    d.className='loc-item'+(isR?'':' undiscovered')+(selLoc===l.name?' active':'');
    const a=sc(l.mc);
    d.innerHTML=`<div class="loc-dot" style="background:${isR?`rgba(0,229,255,${a})`:'#2a2a40'};${isR?`box-shadow:0 0 5px rgba(0,229,255,${a*.4})`:''};"></div>
      <span class="loc-nm">${isR?l.name:'???'}</span>
      <span class="loc-ct">${isR?l.mc:''}</span>`;
    if(isR)d.onclick=()=>openDet(l);
    el.appendChild(d);
  });
}

function hlList(name){
  document.querySelectorAll('.loc-item').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.loc-item').forEach(e=>{
    if(e.querySelector('.loc-nm')?.textContent===name){
      e.classList.add('active');
      e.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  });
}

// ==================================================================
// STATS
// ==================================================================
function updStats(){
  const disc=locs.filter(l=>revealed.has(l.name));
  const pct=TOTAL>0?Math.round(disc.length/TOTAL*100):0;
  document.getElementById('dcnt').textContent=`${disc.length} / ${TOTAL}`;
  document.getElementById('dbar').style.width=pct+'%';
  document.getElementById('dpct').textContent=pct+'%';
  document.getElementById('stTotal').textContent=TOTAL;
  document.getElementById('stReveal').textContent=pct+'%';
  if(disc.length>0){
    const mv=disc.reduce((a,b)=>a.mc>b.mc?a:b);
    document.getElementById('stMost').textContent=mv.name.length>16?mv.name.substring(0,14)+'..':mv.name;
    const fd=disc.reduce((a,b)=>a.fs<b.fs?a:b);
    document.getElementById('stFirst').textContent=`S${String(fd.fs).padStart(3,'0')}`;
    const ld=disc.reduce((a,b)=>a.fs>b.fs?a:b);
    document.getElementById('stLatest').textContent=`S${String(ld.fs).padStart(3,'0')}`;
  }
  document.getElementById('stNew').textContent=discMap[curS]?discMap[curS].length:0;
}

// ==================================================================
// SESSION CONTROL
// ==================================================================
function setS(s, anim=true){
  const prev=new Set(revealed);
  curS=s;
  revealed=new Set();
  locs.forEach(l=>{if(l.fs<=s)revealed.add(l.name)});

  const fresh=[];
  revealed.forEach(n=>{if(!prev.has(n))fresh.push(n)});

  document.getElementById('sessLbl').textContent=s===0?'PRE-CAMPAIGN':`SESSION ${s}`;
  slider.value=s;

  if(anim&&fresh.length>0){
    fresh.forEach(n=>{const l=locs.find(x=>x.name===n);if(l)animReveal(l)});
    showFlash(fresh);
  }
  drawFog();drawMarkers();updStats();updList();
}

function showFlash(names){
  const f1=document.getElementById('fl1'),f2=document.getElementById('fl2');
  f1.classList.remove('show');f2.classList.remove('show');
  void f1.offsetWidth;
  f1.classList.add('show');
  f2.textContent=names.length<=3?names.join(' \u00b7 '):names.slice(0,3).join(' \u00b7 ')+` +${names.length-3} more`;
  f2.classList.add('show');
  setTimeout(()=>{f1.classList.remove('show');f2.classList.remove('show')},2400);
}

// ==================================================================
// PLAYBACK
// ==================================================================
function togglePlay(){playing?stopP():startP()}

function startP(){
  if(curS>=MAX_S){curS=0;revealed=new Set()}
  playing=true;
  document.getElementById('playBtn').innerHTML='&#9646;&#9646;';
  document.getElementById('playBtn').classList.add('on');
  const iv={1:1200,2:600,4:300}[speed]||1200;
  playIv=setInterval(()=>{
    if(curS>=MAX_S){stopP();return}
    setS(curS+1,true);
  },iv);
}

function stopP(){
  playing=false;
  document.getElementById('playBtn').innerHTML='&#9654;';
  document.getElementById('playBtn').classList.remove('on');
  if(playIv){clearInterval(playIv);playIv=null}
}

function cycleSpd(){
  const sp=[1,2,4],i=sp.indexOf(speed);
  speed=sp[(i+1)%sp.length];
  document.getElementById('speedBtn').textContent=speed+'\u00d7';
  if(playing){stopP();startP()}
}

document.getElementById('playBtn').onclick=togglePlay;
document.getElementById('speedBtn').onclick=cycleSpd;
document.getElementById('resetBtn').onclick=()=>{stopP();revealed=new Set();setS(0,false)};
slider.addEventListener('input',()=>{stopP();setS(+slider.value,false)});

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();togglePlay()}
  else if(e.key==='ArrowRight'&&!playing&&curS<MAX_S)setS(curS+1,true);
  else if(e.key==='ArrowLeft'&&!playing&&curS>0)setS(curS-1,false);
});

// ==================================================================
// ANIMATED FOG DRIFT
// ==================================================================
let fogFrame;
function fogLoop(){
  if(revealed.size>0)drawFog();
  fogFrame=requestAnimationFrame(fogLoop);
}

// ==================================================================
// INIT
// ==================================================================
function init(){
  updRect();
  setS(0,false);
  fogLoop();
}

if(mapImg.complete)init();
else mapImg.addEventListener('load',init);

let rszT;
window.addEventListener('resize',()=>{
  clearTimeout(rszT);
  rszT=setTimeout(()=>{updRect();drawFog();drawMarkers()},150);
});
</script>
</body>
</html>
