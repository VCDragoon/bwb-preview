<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE WAR TABLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    background:#06060c;color:#c8c8e0;font-family:'Barlow',sans-serif;
    min-height:100vh;position:relative;overflow-x:hidden;
  }

  body::after{
    content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
    pointer-events:none;z-index:9999;
  }

  .page-wrap{display:flex;flex-direction:column;min-height:100vh}

  .header{
    text-align:center;padding:28px 20px 12px;position:relative;
  }
  .header::after{
    content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
    width:80%;height:1px;
    background:linear-gradient(90deg,transparent,#ff4444,#ff8844,#ff4444,transparent);
    opacity:.5;
  }

  .title{
    font-family:'Bebas Neue',sans-serif;font-size:62px;letter-spacing:12px;line-height:1;
    background:linear-gradient(135deg,#ff4444,#ff8844);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    filter:drop-shadow(0 0 30px rgba(255,68,68,.4)) drop-shadow(0 0 60px rgba(255,136,68,.2));
    margin-bottom:2px;
  }
  .subtitle{
    font-family:'Barlow Condensed',sans-serif;font-weight:300;font-size:13px;
    letter-spacing:6px;text-transform:uppercase;color:#8888aa;
  }

  .main-content{display:flex;flex:1;position:relative}

  .sidebar{
    width:300px;min-width:300px;padding:18px 14px;
    border-right:1px solid #1a1a2e;overflow-y:auto;
    max-height:calc(100vh - 100px);position:sticky;top:0;
  }
  .sidebar::-webkit-scrollbar{width:4px}
  .sidebar::-webkit-scrollbar-track{background:#0a0a14}
  .sidebar::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:2px}

  .viz-container{
    flex:1;display:flex;align-items:center;justify-content:center;
    position:relative;min-height:850px;
  }

  .stats-panel,.filter-section,.mysteries-panel{
    background:linear-gradient(135deg,#0d0d1a,#15152a);
    border:1px solid #2a2a40;border-radius:8px;padding:14px;margin-bottom:12px;
  }
  .stats-panel h3,.filter-section h3,.mysteries-panel h3{
    font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;
    color:#ff6644;margin-bottom:8px;border-bottom:1px solid #2a2a40;padding-bottom:4px;
  }

  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:13px}
  .stat-label{
    font-family:'Barlow Condensed',sans-serif;font-weight:400;color:#8888aa;
    text-transform:uppercase;letter-spacing:1px;font-size:11px;
  }
  .stat-value{
    font-family:'JetBrains Mono',monospace;font-weight:500;color:#e0e0f0;font-size:15px;
    text-shadow:0 0 8px rgba(255,102,68,.3);
  }

  .most-connected{margin-top:6px;padding-top:6px;border-top:1px solid #1a1a2e}
  .most-connected .node-name{
    font-family:'Cinzel',serif;color:#ffd700;font-size:13px;
    text-shadow:0 0 10px rgba(255,215,0,.3);
  }
  .most-connected .edge-count{
    font-family:'JetBrains Mono',monospace;color:#ff8844;font-size:11px;
  }

  .type-filters{display:flex;flex-direction:column;gap:3px}
  .type-filter{
    display:flex;align-items:center;gap:7px;padding:3px 5px;border-radius:4px;
    cursor:pointer;transition:background .2s;font-size:12px;
  }
  .type-filter:hover{background:rgba(255,255,255,.05)}
  .type-filter input[type="checkbox"]{
    appearance:none;width:14px;height:14px;border:1px solid #444;
    border-radius:3px;cursor:pointer;position:relative;flex-shrink:0;
  }
  .type-filter input[type="checkbox"]:checked{
    background:var(--type-color);border-color:var(--type-color);
    box-shadow:0 0 6px var(--type-color);
  }
  .type-filter input[type="checkbox"]:checked::after{
    content:'\2713';position:absolute;top:-1px;left:2px;color:#fff;font-size:11px;font-weight:bold;
  }
  .type-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .type-name{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
    letter-spacing:1px;color:#c8c8e0;flex:1;
  }
  .type-count{font-family:'JetBrains Mono',monospace;color:#666;font-size:11px}

  .slider-control{margin-bottom:12px}
  .slider-control label{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
    letter-spacing:1px;color:#8888aa;font-size:11px;
    display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;
  }
  .slider-control label span{font-family:'JetBrains Mono',monospace;color:#ff8844;font-size:12px}

  input[type="range"]{
    -webkit-appearance:none;width:100%;height:4px;background:#1a1a2e;
    border-radius:2px;outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
    background:#ff6644;cursor:pointer;box-shadow:0 0 8px rgba(255,102,68,.5);
  }

  .mystery-item{
    padding:5px 0;border-bottom:1px solid #111122;cursor:default;
    transition:background .2s;
  }
  .mystery-item:hover{background:rgba(255,68,68,.05)}
  .mystery-item:last-child{border-bottom:none}
  .mystery-session{font-family:'JetBrains Mono',monospace;font-size:10px;color:#ff8844;margin-bottom:1px}
  .mystery-text{
    font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#c8c8e0;
    letter-spacing:.3px;line-height:1.3;
  }

  .detail-panel{
    position:fixed;right:-400px;top:0;width:380px;height:100vh;
    background:linear-gradient(180deg,#0a0a18,#12122a);
    border-left:1px solid #2a2a40;padding:24px 18px;z-index:1000;
    transition:right .3s ease;overflow-y:auto;
    box-shadow:-10px 0 40px rgba(0,0,0,.6);
  }
  .detail-panel.open{right:0}
  .detail-panel .close-btn{
    position:absolute;top:14px;right:14px;background:none;border:1px solid #444;
    color:#888;width:28px;height:28px;border-radius:50%;cursor:pointer;
    font-size:14px;display:flex;align-items:center;justify-content:center;
    transition:all .2s;
  }
  .detail-panel .close-btn:hover{border-color:#ff4444;color:#ff4444;box-shadow:0 0 10px rgba(255,68,68,.3)}

  .detail-node-name{font-family:'Cinzel',serif;font-size:20px;font-weight:600;margin-bottom:4px;padding-right:40px}
  .detail-node-type{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
    letter-spacing:2px;font-size:12px;margin-bottom:10px;opacity:.7;
  }
  .detail-description{
    font-size:13px;line-height:1.5;color:#9999bb;margin-bottom:14px;
    padding-bottom:14px;border-bottom:1px solid #1a1a2e;
  }
  .detail-section-title{
    font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;
    color:#ff6644;margin-bottom:6px;
  }
  .detail-sessions{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
  .session-tag{
    font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 6px;
    background:rgba(255,136,68,.15);border:1px solid rgba(255,136,68,.3);
    border-radius:3px;color:#ff8844;
  }
  .detail-connections{list-style:none}
  .detail-connections li{padding:5px 0;border-bottom:1px solid #111122;font-size:12px}
  .detail-connections .conn-target{font-family:'Cinzel',serif;color:#e0e0f0;font-size:12px}
  .detail-connections .conn-rationale{color:#777799;font-size:11px;margin-top:2px;font-style:italic}

  .tooltip{
    position:fixed;pointer-events:none;background:rgba(10,10,24,.95);
    border:1px solid #2a2a40;border-radius:6px;padding:10px 14px;font-size:12px;
    max-width:320px;z-index:2000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.6);
  }
  .tooltip .tt-label{font-family:'Cinzel',serif;font-size:14px;color:#e0e0f0;margin-bottom:3px}
  .tooltip .tt-type{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
    letter-spacing:1px;font-size:10px;margin-bottom:5px;
  }
  .tooltip .tt-desc{color:#8888aa;line-height:1.4;font-size:11px}

  .session-filter-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:2px}
  .session-btn{
    font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 2px;
    background:rgba(255,255,255,.03);border:1px solid #1a1a2e;border-radius:3px;
    color:#555;cursor:pointer;text-align:center;transition:all .2s;
  }
  .session-btn.active{background:rgba(255,136,68,.15);border-color:rgba(255,136,68,.4);color:#ff8844}
  .session-btn:hover{border-color:#ff6644}

  .session-controls{display:flex;gap:6px;margin-bottom:5px}
  .session-ctrl-btn{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;
    letter-spacing:1px;font-size:10px;padding:3px 8px;
    background:rgba(255,102,68,.1);border:1px solid rgba(255,102,68,.3);
    border-radius:3px;color:#ff6644;cursor:pointer;transition:all .2s;
  }
  .session-ctrl-btn:hover{background:rgba(255,102,68,.25)}

  svg text{user-select:none}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="header">
    <div class="title">THE WAR TABLE</div>
    <div class="subtitle">Campaign-Wide Conspiracy Web &mdash; Hierarchical Edge Bundling</div>
  </div>
  <div class="main-content">
    <div class="sidebar">
      <div class="stats-panel">
        <h3>INTELLIGENCE BRIEFING</h3>
        <div class="stat-row"><span class="stat-label">Total Nodes</span><span class="stat-value" id="statNodes">--</span></div>
        <div class="stat-row"><span class="stat-label">Total Connections</span><span class="stat-value" id="statEdges">--</span></div>
        <div class="stat-row"><span class="stat-label">Sessions Analyzed</span><span class="stat-value" id="statSessions">--</span></div>
        <div class="stat-row"><span class="stat-label">Central Mysteries</span><span class="stat-value" id="statMysteries">--</span></div>
        <div class="most-connected">
          <div class="stat-label" style="margin-bottom:3px">Most Connected Node</div>
          <div class="node-name" id="mostConnected">--</div>
          <div class="edge-count" id="mostConnectedCount"></div>
        </div>
        <div class="most-connected">
          <div class="stat-label" style="margin-bottom:3px">Most Mysterious Session</div>
          <div class="node-name" id="mostMysterious">--</div>
        </div>
      </div>

      <div class="filter-section">
        <h3>BUNDLE CONTROLS</h3>
        <div class="slider-control">
          <label>Tension <span id="tensionVal">0.85</span></label>
          <input type="range" id="tensionSlider" min="0" max="100" value="85">
        </div>
        <div class="slider-control">
          <label>Min Session Count <span id="minSessionVal">1</span></label>
          <input type="range" id="minSessionSlider" min="1" max="6" value="1">
        </div>
      </div>

      <div class="filter-section">
        <h3>TYPE GROUPS</h3>
        <div class="type-filters" id="typeFilters"></div>
      </div>

      <div class="filter-section">
        <h3>SESSION FILTER</h3>
        <div class="session-controls">
          <button class="session-ctrl-btn" onclick="selectAllSessions()">All</button>
          <button class="session-ctrl-btn" onclick="clearAllSessions()">None</button>
        </div>
        <div class="session-filter-grid" id="sessionFilters"></div>
      </div>

      <div class="mysteries-panel">
        <h3>CENTRAL MYSTERIES</h3>
        <div id="mysteriesList"></div>
      </div>
    </div>

    <div class="viz-container">
      <svg id="bundleChart"></svg>
    </div>
  </div>
</div>

<div class="detail-panel" id="detailPanel">
  <button class="close-btn" onclick="closeDetailPanel()">&times;</button>
  <div id="detailContent"></div>
</div>
<div class="tooltip" id="tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>

 sigil linking its life force to the tree in the town square. Orla recognized the symbol as belonging to a peaceful druid circle, making the bloody sacrifice deeply contradictory."},{"session":"S040","mystery":"THE CURSE OF STRAHD","details":"Is Strahd actually cursed, or is it just a metaphor? And why is he so mad at wizards?"},{"session":"S041","mystery":"WHY DID EZRELLA TRY TO MURDER SAVANNAHBELLE?","details":"Ezrella put on a crown, became zombified, and unleashed massive radiant critical hits on SavannahBelle while she was paralyzed. Was it mind control, a purification ritual, or pure malice?"},{"session":"S042","mystery":"THE MIRROR CONSPIRACY: WHAT ARE THE BRIDES HIDING?","details":"Shrum regained his memories, realizing his soul was split and trapped in a mirror by the Brides of Strahd to hide their true, monstrous forms."},{"session":"S044","mystery":"WHAT IS THE 'BUTCHER' HIDING IN THE WAREHOUSE?","details":"Lord Neverember was secretly transporting lead-lined crates to a makeshift warehouse. The Archdruid Radoth claims the earth's ley lines are being poisoned by it. Orla saw the item and claims it 'has a heartbeat'. The Butcher denies its existence under a Zone of Truth."},{"session":"S046","mystery":"WHAT IS THE MATRON'S TRUE ENDGAME?","details":"The Matron forced the party to make her Regent and demanded a hair from the Queen of the Gloaming Court, while possessing the strange pulsing stone."}],"stats":{"total_nodes":223,"total_edges":209,"sessions_with_data":46,"total_mysteries":35}};

const TYPE_COLORS = {
  Character:'#4A90D9', NPC:'#FF8A65', Suspect:'#FF8A65', Location:'#81C784',
  Item:'#ffd700', Evidence:'#4DB6AC', Theory:'#ad6bff', Debunked:'#555570',
  Entity:'#E57373', Magic:'#BA68C8', Faction:'#FFB74D', Event:'#4FC3F7', Other:'#9494bf'
};
const TYPE_ORDER = ['Character','NPC','Suspect','Entity','Faction','Location','Item','Evidence','Theory','Debunked','Magic','Event','Other'];

let tension = 0.85, activeTypes = new Set(Object.keys(TYPE_COLORS)),
    activeSessions = new Set(), lockedNode = null, minSessionCount = 1;

const allSessions = new Set();
RAW_DATA.nodes.forEach(n => n.sessions.forEach(s => allSessions.add(s)));
RAW_DATA.edges.forEach(e => e.sessions.forEach(s => allSessions.add(s)));
const sortedSessions = [...allSessions].sort();
sortedSessions.forEach(s => activeSessions.add(s));

function init(){
  populateStats(); populateTypeFilters(); populateSessionFilters();
  populateMysteries(); buildVisualization();
}

function populateStats(){
  document.getElementById('statNodes').textContent = RAW_DATA.stats.total_nodes;
  document.getElementById('statEdges').textContent = RAW_DATA.stats.total_edges;
  document.getElementById('statSessions').textContent = RAW_DATA.stats.sessions_with_data;
  document.getElementById('statMysteries').textContent = RAW_DATA.stats.total_mysteries;
  const ec = {};
  RAW_DATA.edges.forEach(e => {
    ec[e.source] = (ec[e.source]||0)+1; ec[e.target] = (ec[e.target]||0)+1;
  });
  let mn = '', mc = 0;
  for(const [n,c] of Object.entries(ec)) if(c>mc && n!=='Central Mystery'){mc=c;mn=n;}
  document.getElementById('mostConnected').textContent = mn;
  document.getElementById('mostConnectedCount').textContent = mc+' connections';
  const ebs = {};
  RAW_DATA.nodes.filter(n=>n.type==='Evidence').forEach(n=>{
    n.sessions.forEach(s=>{ebs[s]=(ebs[s]||0)+1});
  });
  let ms='',me=0;
  for(const [s,c] of Object.entries(ebs)) if(c>me){me=c;ms=s;}
  document.getElementById('mostMysterious').textContent = ms+' ('+me+' evidence)';
}

function populateTypeFilters(){
  const c = document.getElementById('typeFilters');
  const tc = {};
  RAW_DATA.nodes.forEach(n=>{tc[n.type]=(tc[n.type]||0)+1});
  TYPE_ORDER.forEach(type=>{
    const cnt = tc[type]||0;
    if(!cnt) return;
    const col = TYPE_COLORS[type]||'#9494bf';
    const lbl = document.createElement('label');
    lbl.className = 'type-filter';
    lbl.style.setProperty('--type-color', col);
    lbl.innerHTML = '<input type="checkbox" checked data-type="'+type+'">'
      +'<span class="type-dot" style="background:'+col+';box-shadow:0 0 4px '+col+'"></span>'
      +'<span class="type-name">'+type+'</span>'
      +'<span class="type-count">'+cnt+'</span>';
    lbl.querySelector('input').addEventListener('change',function(){
      if(this.checked) activeTypes.add(type); else activeTypes.delete(type);
      buildVisualization();
    });
    c.appendChild(lbl);
  });
}

function populateSessionFilters(){
  const c = document.getElementById('sessionFilters');
  sortedSessions.forEach(sid=>{
    const btn = document.createElement('button');
    btn.className = 'session-btn active';
    btn.textContent = sid.replace('S0','S').replace('S','');
    btn.dataset.sid = sid;
    btn.addEventListener('click',function(){
      if(activeSessions.has(sid)){activeSessions.delete(sid);this.classList.remove('active');}
      else{activeSessions.add(sid);this.classList.add('active');}
      buildVisualization();
    });
    c.appendChild(btn);
  });
}

function selectAllSessions(){
  sortedSessions.forEach(s=>activeSessions.add(s));
  document.querySelectorAll('.session-btn').forEach(b=>b.classList.add('active'));
  buildVisualization();
}
function clearAllSessions(){
  activeSessions.clear();
  document.querySelectorAll('.session-btn').forEach(b=>b.classList.remove('active'));
  buildVisualization();
}

function populateMysteries(){
  const c = document.getElementById('mysteriesList');
  RAW_DATA.central_mysteries.forEach(m=>{
    const d = document.createElement('div');
    d.className = 'mystery-item';
    d.innerHTML = '<div class="mystery-session">'+m.session+'</div>'
      +'<div class="mystery-text">'+m.mystery+'</div>';
    d.title = m.details;
    c.appendChild(d);
  });
}

// ==== HIERARCHICAL EDGE BUNDLING ====
function radialPoint(angle, r){
  const a = (angle-90)*Math.PI/180;
  return [r*Math.cos(a), r*Math.sin(a)];
}

function buildVisualization(){
  const svg = d3.select('#bundleChart');
  svg.selectAll('*').remove();

  const filteredNodes = RAW_DATA.nodes.filter(n=>{
    if(!activeTypes.has(n.type)) return false;
    if(!n.sessions.some(s=>activeSessions.has(s))) return false;
    if(n.session_count < minSessionCount) return false;
    return true;
  });

  const nodeLabels = new Set(filteredNodes.map(n=>n.label));
  const filteredEdges = RAW_DATA.edges.filter(e=>{
    if(!nodeLabels.has(e.source)||!nodeLabels.has(e.target)) return false;
    if(!e.sessions.some(s=>activeSessions.has(s))) return false;
    return true;
  });

  if(!filteredNodes.length) return;

  // Build hierarchy
  const typeGroups = {};
  filteredNodes.forEach(n=>{
    if(!typeGroups[n.type]) typeGroups[n.type]=[];
    typeGroups[n.type].push(n);
  });
  Object.values(typeGroups).forEach(arr=>arr.sort((a,b)=>a.label.localeCompare(b.label)));

  const hierarchyData = {
    name:'root',
    children: TYPE_ORDER.filter(t=>typeGroups[t]).map(type=>({
      name:type,
      children: typeGroups[type].map(n=>({name:n.label, data:n}))
    }))
  };

  const container = document.querySelector('.viz-container');
  const w = container.clientWidth;
  const h = Math.max(container.clientHeight, 850);
  const dim = Math.min(w,h);
  const radius = dim/2 - 150;
  const innerRadius = radius - 30;

  svg.attr('width',w).attr('height',h);
  const g = svg.append('g').attr('transform','translate('+w/2+','+h/2+')');

  const root = d3.hierarchy(hierarchyData);
  d3.cluster().size([360, innerRadius])(root);

  // Build leaf map
  const leafMap = {};
  root.leaves().forEach(leaf=>{ leafMap[leaf.data.name] = leaf; });

  // Line generator
  const line = d3.lineRadial()
    .curve(d3.curveBundle.beta(tension))
    .radius(d=>d[1])
    .angle(d=>d[0]*Math.PI/180);

  // --- TYPE GROUP ARCS ---
  const arcG = g.append('g').attr('class','type-arcs');
  (root.children||[]).forEach(tg=>{
    const leaves = tg.leaves();
    if(!leaves.length) return;
    const minA = d3.min(leaves,l=>l.x);
    const maxA = d3.max(leaves,l=>l.x);
    const midA = (minA+maxA)/2;
    const color = TYPE_COLORS[tg.data.name]||'#9494bf';
    const pad = 1.5;

    const arc = d3.arc()
      .innerRadius(innerRadius+8)
      .outerRadius(innerRadius+12)
      .startAngle((minA-pad)*Math.PI/180)
      .endAngle((maxA+pad)*Math.PI/180);

    arcG.append('path').attr('d',arc).attr('fill',color)
      .attr('opacity',0).style('filter','drop-shadow(0 0 4px '+color+')');

    // Type label
    const lr = innerRadius + 28;
    const [lx,ly] = radialPoint(midA, lr);
    const flip = midA > 90 && midA < 270;

    arcG.append('text')
      .attr('x',lx).attr('y',ly)
      .attr('text-anchor','middle')
      .attr('dominant-baseline','central')
      .attr('transform','rotate('+(flip ? midA+180 : midA)+','+lx+','+ly+')')
      .style('font-family',"'Barlow Condensed',sans-serif")
      .style('font-weight','600').style('font-size','11px')
      .style('fill',color).style('letter-spacing','2px')
      .style('text-transform','uppercase').style('opacity',0)
      .text(tg.data.name);
  });

  // --- EDGES ---
  const defs = svg.append('defs');
  const edgesG = g.append('g').attr('class','edges');

  const nodeMap = {};
  filteredNodes.forEach(n=>{nodeMap[n.label]=n});

  let edgeIdx = 0;
  filteredEdges.forEach(e=>{
    const sLeaf = leafMap[e.source], tLeaf = leafMap[e.target];
    if(!sLeaf||!tLeaf) return;

    // Build path through hierarchy
    const sAnc = sLeaf.ancestors().reverse();
    const tAnc = tLeaf.ancestors().reverse();
    let lcaI = 0;
    while(lcaI < sAnc.length && lcaI < tAnc.length && sAnc[lcaI]===tAnc[lcaI]) lcaI++;
    lcaI--;

    const pathNodes = [];
    for(let i=sAnc.length-1;i>=lcaI;i--) pathNodes.push(sAnc[i]);
    for(let i=lcaI+1;i<tAnc.length;i++) pathNodes.push(tAnc[i]);

    const pathData = pathNodes.map(p=>[p.x, p.y||0]);

    const srcColor = TYPE_COLORS[nodeMap[e.source]?.type]||'#9494bf';
    const tgtColor = TYPE_COLORS[nodeMap[e.target]?.type]||'#9494bf';

    const gid = 'eg'+edgeIdx++;
    const grad = defs.append('linearGradient').attr('id',gid).attr('gradientUnits','userSpaceOnUse');
    grad.append('stop').attr('offset','0%').attr('stop-color',srcColor);
    grad.append('stop').attr('offset','100%').attr('stop-color',tgtColor);

    edgesG.append('path')
      .datum(pathData)
      .attr('class','edge-path')
      .attr('d',line)
      .attr('fill','none')
      .attr('stroke','url(#'+gid+')')
      .attr('stroke-opacity',0.25)
      .attr('stroke-width', Math.min(1+e.weight*0.5, 3))
      .attr('data-source',e.source)
      .attr('data-target',e.target)
      .attr('data-rationale',(e.rationales[0]||'').replace(/"/g,'&quot;'))
      .attr('data-sessions',e.sessions.join(', '))
      .attr('data-weight',e.weight);
  });

  // --- NODES ---
  const nodesG = g.append('g').attr('class','nodes');

  root.leaves().forEach((leaf,i)=>{
    const d = leaf.data.data;
    const color = TYPE_COLORS[d.type]||'#9494bf';
    const [x,y] = radialPoint(leaf.x, innerRadius);
    const angle = leaf.x;

    const ng = nodesG.append('g').attr('class','node-group').attr('data-label',d.label).style('cursor','pointer');

    ng.append('circle')
      .attr('cx',x).attr('cy',y)
      .attr('r', Math.min(2.5+d.session_count*0.8, 7))
      .attr('fill',color).attr('stroke',color).attr('stroke-width',0.5)
      .attr('opacity',0.9).style('filter','drop-shadow(0 0 3px '+color+')');

    const lr = innerRadius + 14;
    const [tx,ty] = radialPoint(angle, lr);
    const flip = angle > 180;

    const truncLabel = d.label.length > 30 ? d.label.substring(0,28)+'..' : d.label;

    ng.append('text')
      .attr('x',tx).attr('y',ty)
      .attr('text-anchor', flip?'end':'start')
      .attr('dominant-baseline','central')
      .attr('transform','rotate('+(flip?angle-180:angle)+','+tx+','+ty+')')
      .style('font-family', d.type==='Character'?"'Cinzel',serif":"'Barlow',sans-serif")
      .style('font-size', d.session_count>2?'11px':'9px')
      .style('fill', d.type==='Debunked'?'#555570':'#c8c8e0')
      .style('text-decoration', d.type==='Debunked'?'line-through':'none')
      .style('opacity',0.85)
      .text(truncLabel);

    ng.on('mouseover',function(ev){
      if(lockedNode) return;
      highlightNode(d.label); showTooltip(ev,d);
    })
    .on('mousemove',function(ev){moveTooltip(ev)})
    .on('mouseout',function(){
      if(lockedNode) return;
      resetHighlight(); hideTooltip();
    })
    .on('click',function(ev){
      ev.stopPropagation();
      if(lockedNode===d.label){lockedNode=null;resetHighlight();closeDetailPanel();}
      else{lockedNode=d.label;highlightNode(d.label);showDetailPanel(d);}
      hideTooltip();
    });
  });

  // Edge hover
  edgesG.selectAll('.edge-path')
    .on('mouseover',function(ev){
      const el = d3.select(this);
      if(!lockedNode) el.attr('stroke-opacity',0.9).attr('stroke-width',3);
      const tt = document.getElementById('tooltip');
      tt.style.display='block';
      tt.innerHTML = '<div class="tt-label">'+el.attr('data-source')+' &rarr; '+el.attr('data-target')+'</div>'
        +'<div class="tt-type" style="color:#ff8844">Weight: '+el.attr('data-weight')+' | '+el.attr('data-sessions')+'</div>'
        +(el.attr('data-rationale')?'<div class="tt-desc">'+el.attr('data-rationale')+'</div>':'');
      tt.style.left=(ev.clientX+15)+'px'; tt.style.top=(ev.clientY-10)+'px';
    })
    .on('mousemove',function(ev){moveTooltip(ev)})
    .on('mouseout',function(){
      if(!lockedNode){
        const el=d3.select(this);
        el.attr('stroke-opacity',0.25).attr('stroke-width',Math.min(1+(+el.attr('data-weight'))*0.5,3));
      }
      hideTooltip();
    });

  svg.on('click',function(){lockedNode=null;resetHighlight();closeDetailPanel()});

  // Animated entrance
  animateEntrance();
}

function highlightNode(label){
  const svg = d3.select('#bundleChart');
  const connected = new Set([label]);
  svg.selectAll('.edge-path').each(function(){
    const el = d3.select(this);
    const s=el.attr('data-source'), t=el.attr('data-target');
    if(s===label||t===label){
      connected.add(s); connected.add(t);
      el.attr('stroke-opacity',0.85).attr('stroke-width',2.5).raise();
    } else {
      el.attr('stroke-opacity',0.03).attr('stroke-width',0.5);
    }
  });
  svg.selectAll('.node-group').each(function(){
    const el=d3.select(this), nl=el.attr('data-label');
    if(connected.has(nl)){
      el.select('circle').attr('opacity',1);
      if(nl===label) el.select('circle').attr('r',10);
      el.select('text').style('opacity',1).style('font-weight',nl===label?'700':'400');
    } else {
      el.select('circle').attr('opacity',0.1);
      el.select('text').style('opacity',0.1);
    }
  });
}

function resetHighlight(){
  const svg = d3.select('#bundleChart');
  svg.selectAll('.edge-path').each(function(){
    const el=d3.select(this);
    el.attr('stroke-opacity',0.25).attr('stroke-width',Math.min(1+(+el.attr('data-weight'))*0.5,3));
  });
  svg.selectAll('.node-group').each(function(){
    const el=d3.select(this);
    el.select('circle').attr('opacity',0.9);
    el.select('text').style('opacity',0.85).style('font-weight','400');
  });
  // Restore node circle radii
  svg.selectAll('.node-group').each(function(){
    const el = d3.select(this);
    const label = el.attr('data-label');
    const nd = RAW_DATA.nodes.find(n=>n.label===label);
    if(nd) el.select('circle').attr('r', Math.min(2.5+nd.session_count*0.8, 7));
  });
}

function animateEntrance(){
  const svg = d3.select('#bundleChart');

  // Radar sweep for nodes
  svg.selectAll('.node-group')
    .style('opacity',0)
    .transition()
    .delay((d,i)=>100 + i*8)
    .duration(350)
    .style('opacity',1);

  // Edges animate stroke-dasharray
  svg.selectAll('.edge-path').each(function(d,i){
    const path = d3.select(this);
    const len = this.getTotalLength();
    path.attr('stroke-dasharray',len).attr('stroke-dashoffset',len)
      .transition().delay(500+i*3).duration(1200)
      .ease(d3.easeCubicInOut).attr('stroke-dashoffset',0);
  });

  // Type arcs fade in
  svg.selectAll('.type-arcs path')
    .transition().delay(200).duration(800).attr('opacity',0.6);
  svg.selectAll('.type-arcs text')
    .transition().delay(300).duration(800).style('opacity',0.8);
}

function showTooltip(ev,d){
  const tt=document.getElementById('tooltip');
  const col=TYPE_COLORS[d.type]||'#9494bf';
  tt.style.display='block';
  tt.innerHTML='<div class="tt-label">'+d.label+'</div>'
    +'<div class="tt-type" style="color:'+col+'">'+d.type+' &bull; '+d.session_count+' session'+(d.session_count>1?'s':'')+'</div>'
    +(d.description?'<div class="tt-desc">'+d.description+'</div>':'');
  tt.style.left=(ev.clientX+15)+'px';tt.style.top=(ev.clientY-10)+'px';
}
function moveTooltip(ev){
  const tt=document.getElementById('tooltip');
  tt.style.left=(ev.clientX+15)+'px';tt.style.top=(ev.clientY-10)+'px';
}
function hideTooltip(){document.getElementById('tooltip').style.display='none'}

function showDetailPanel(d){
  const col=TYPE_COLORS[d.type]||'#9494bf';
  const conns=RAW_DATA.edges.filter(e=>e.source===d.label||e.target===d.label);
  let ch='';
  conns.forEach(c=>{
    const other=c.source===d.label?c.target:c.source;
    const dir=c.source===d.label?'&rarr;':'&larr;';
    const rat=c.rationales[0]||'';
    ch+='<li><span class="conn-target">'+dir+' '+other+'</span>'
      +'<span style="font-family:\'JetBrains Mono\';font-size:10px;color:#555"> ('+c.sessions.join(', ')+')</span>'
      +(rat?'<div class="conn-rationale">'+rat+'</div>':'')+'</li>';
  });
  document.getElementById('detailContent').innerHTML =
    '<div class="detail-node-name" style="color:'+col+';text-shadow:0 0 15px '+col+'">'+d.label+'</div>'
    +'<div class="detail-node-type" style="color:'+col+'">'+d.type+'</div>'
    +'<div class="detail-description">'+(d.description||'No description available.')+'</div>'
    +'<div class="detail-section-title">APPEARS IN</div>'
    +'<div class="detail-sessions">'+d.sessions.map(s=>'<span class="session-tag">'+s+'</span>').join('')+'</div>'
    +'<div class="detail-section-title">CONNECTIONS ('+conns.length+')</div>'
    +'<ul class="detail-connections">'+ch+'</ul>';
  document.getElementById('detailPanel').classList.add('open');
}
function closeDetailPanel(){document.getElementById('detailPanel').classList.remove('open')}

document.getElementById('tensionSlider').addEventListener('input',function(){
  tension=this.value/100;
  document.getElementById('tensionVal').textContent=tension.toFixed(2);
  buildVisualization();
});
document.getElementById('minSessionSlider').addEventListener('input',function(){
  minSessionCount=+this.value;
  document.getElementById('minSessionVal').textContent=minSessionCount;
  buildVisualization();
});

window.addEventListener('DOMContentLoaded',init);
window.addEventListener('resize',()=>{if(!lockedNode) buildVisualization()});
</script>
