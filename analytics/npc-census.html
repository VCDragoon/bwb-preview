"n":"Zorya","t":"PC","a":[],"mc":2,"sc":1,"fs":35,"ls":35,"ss":[35],"d":"A PC in the Barovia/Curse of Strahd arc who appeared in session 22 at the Vistani camp. She questioned guards about Strahd's stolen carriage and participated in shopping and camp activities at the Tser Pool encampment.","cx":[]}];

const TYPE_COLORS = {
  NPC:'#4DB6AC', BOSS:'#ef4444', DEITY:'#ffd700', PC:'#4A90D9', PEOPLE:'#81C784', GUEST_PC:'#FF8A65'
};
const TYPE_LABELS = {
  NPC:'NPC', BOSS:'Boss', DEITY:'Deity', PC:'PC', PEOPLE:'People', GUEST_PC:'Guest PC'
};
const MAX_SESSION = 46;

const state = {
  search: '',
  types: new Set(['NPC','BOSS','DEITY','PC','PEOPLE','GUEST_PC']),
  sort: 'name',
  activeOnly: false
};

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function sid(n) {
  return n ? 'S' + String(n).padStart(3,'0') : '?';
}

function renderStats() {
  const counts = {};
  ENTITIES.forEach(e => { counts[e.t] = (counts[e.t]||0)+1; });
  const totalMentions = ENTITIES.reduce((s,e) => s + e.mc, 0);
  const mostMentioned = ENTITIES.reduce((max,e) => e.mc > max.mc ? e : max, {mc:0});

  let html = '';
  ['NPC','BOSS','DEITY','PC','PEOPLE','GUEST_PC'].forEach(t => {
    const cls = t === 'GUEST_PC' ? 'guest' : t.toLowerCase();
    html += '<div class="stat-item stat-'+cls+'"><div class="stat-value">'+(counts[t]||0)+'</div><div class="stat-label">'+(TYPE_LABELS[t]||t)+'s</div></div>';
  });
  html += '<div class="stat-item stat-highlight"><div class="stat-value">'+totalMentions.toLocaleString()+'</div><div class="stat-label">Total Mentions</div></div>';
  if(mostMentioned.n) {
    html += '<div class="stat-item stat-highlight"><div class="stat-value">'+esc(mostMentioned.n)+'</div><div class="stat-label">Most Mentioned ('+mostMentioned.mc+')</div></div>';
  }
  document.getElementById('statsBar').innerHTML = html;
}

function getFiltered() {
  let list = ENTITIES.filter(e => state.types.has(e.t));
  if(state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(e => {
      if(e.n.toLowerCase().includes(q)) return true;
      return e.a.some(a => a.toLowerCase().includes(q));
    });
  }
  if(state.activeOnly) {
    list = list.filter(e => e.ls && e.ls >= MAX_SESSION - 9);
  }
  const sortFns = {
    name: (a,b) => a.n.localeCompare(b.n),
    mentions: (a,b) => b.mc - a.mc || a.n.localeCompare(b.n),
    first: (a,b) => (a.fs||999) - (b.fs||999) || a.n.localeCompare(b.n),
    last: (a,b) => (b.ls||0) - (a.ls||0) || a.n.localeCompare(b.n),
    sessions: (a,b) => b.sc - a.sc || b.mc - a.mc || a.n.localeCompare(b.n)
  };
  list.sort(sortFns[state.sort] || sortFns.name);
  return list;
}

function sessionBarHTML(entity) {
  if(!entity.ss || entity.ss.length === 0) return '<div class="session-bar"></div>';
  const sessionSet = new Set(entity.ss);
  let dots = '';
  for(let i=1; i<=MAX_SESSION; i++) {
    if(sessionSet.has(i)) {
      const pct = ((i - 0.5) / MAX_SESSION * 100).toFixed(1);
      dots += '<div class="session-dot '+entity.t+'" style="left:'+pct+'%" title="S'+String(i).padStart(3,'0')+'"></div>';
    }
  }
  return '<div class="session-bar">'+dots+'</div>';
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('cardGrid');
  const empty = document.getElementById('emptyState');
  document.getElementById('countBadge').textContent = list.length + ' shown';

  if(list.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  let html = '';
  list.forEach((e, i) => {
    const aliasStr = e.a.length ? '<div class="card-aliases">aka ' + e.a.map(a=>esc(a)).join(', ') + '</div>' : '';
    const fsLabel = e.fs ? 'S'+e.fs : '?';
    const lsLabel = e.ls ? 'S'+e.ls : '?';
    html += '<div class="card" data-type="'+e.t+'" data-idx="'+ENTITIES.indexOf(e)+'" style="transition-delay:'+Math.min(i*30,600)+'ms">'
      + '<div class="card-header"><div class="card-name">'+esc(e.n)+'</div><span class="type-badge '+e.t+'">'+(TYPE_LABELS[e.t]||e.t)+'</span></div>'
      + aliasStr
      + '<div class="card-stats"><span>'+e.mc+' mentions</span><span>'+e.sc+' sessions</span><span>'+fsLabel+' \u2013 '+lsLabel+'</span></div>'
      + sessionBarHTML(e)
      + (e.d ? '<div class="card-desc">'+esc(e.d)+'</div>' : '')
      + '</div>';
  });
  grid.innerHTML = html;

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      grid.querySelectorAll('.card').forEach(c => c.classList.add('visible'));
    });
  });
}

function openPanel(entity) {
  const p = document.getElementById('panelContent');
  const aliasHTML = entity.a.length ? '<div class="panel-aliases">' + entity.a.map(a=>'<span>'+esc(a)+'</span>').join(' ') + '</div>' : '';
  const fsLabel = entity.fs ? 'S'+entity.fs : '?';
  const lsLabel = entity.ls ? 'S'+entity.ls : '?';

  // Timeline
  const sessionSet = new Set(entity.ss);
  let timelineHTML = '<div class="panel-timeline">';
  for(let i=1; i<=MAX_SESSION; i++) {
    const isActive = sessionSet.has(i);
    timelineHTML += '<div class="timeline-cell'+(isActive ? ' active '+entity.t : '')+'" data-tip="S'+String(i).padStart(3,'0')+'"></div>';
  }
  timelineHTML += '</div><div class="timeline-legend"><span>S001</span><span>S'+String(MAX_SESSION).padStart(3,'0')+'</span></div>';

  // Scenes
  let scenesHTML = '';
  if(entity.cx && entity.cx.length > 0) {
    entity.cx.forEach(sc => {
      scenesHTML += '<div class="scene-item">'
        + '<div class="scene-header"><div class="scene-title">'+esc(sc.ti)+'</div><div class="scene-session">S'+String(sc.s).padStart(3,'0')+' / Scene '+sc.sn+'</div></div>'
        + (sc.ty ? '<span class="scene-type-badge '+sc.ty+'">'+sc.ty.replace(/_/g,' ')+'</span>' : '')
        + '<div class="scene-summary">'+esc(sc.su)+'</div>'
        + '</div>';
    });
  } else {
    scenesHTML = '<div class="no-scenes">No scene contexts available for this entity.</div>';
  }

  p.innerHTML = '<div class="panel-accent '+entity.t+'"></div>'
    + '<div class="panel-body">'
    + '<div class="panel-name">'+esc(entity.n)+'</div>'
    + '<span class="type-badge '+entity.t+'" style="margin-bottom:12px;display:inline-block">'+(TYPE_LABELS[entity.t]||entity.t)+'</span>'
    + aliasHTML
    + '<div class="panel-stats-grid">'
    + '<div><div class="label">Mentions</div><div class="val">'+entity.mc+'</div></div>'
    + '<div><div class="label">Sessions</div><div class="val">'+entity.sc+'</div></div>'
    + '<div><div class="label">First Seen</div><div class="val">'+fsLabel+'</div></div>'
    + '<div><div class="label">Last Seen</div><div class="val">'+lsLabel+'</div></div>'
    + '</div>'
    + (entity.d ? '<div class="panel-desc '+entity.t+'">'+esc(entity.d)+'</div>' : '')
    + '<div class="panel-section-title">SESSION TIMELINE</div>'
    + timelineHTML
    + '<div class="panel-section-title">SCENE APPEARANCES ('+entity.cx.length+')</div>'
    + scenesHTML
    + '</div>';

  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  document.body.style.overflow = '';
}

// Init
renderStats();
renderGrid();

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  state.search = this.value;
  renderGrid();
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    const t = this.dataset.type;
    this.classList.toggle('active');
    if(state.types.has(t)) state.types.delete(t);
    else state.types.add(t);
    renderGrid();
  });
});

// Sort
document.getElementById('sortSelect').addEventListener('change', function() {
  state.sort = this.value;
  renderGrid();
});

// Active toggle
document.getElementById('activeToggle').addEventListener('change', function() {
  state.activeOnly = this.checked;
  renderGrid();
});

// Panel close
document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('panelOverlay').addEventListener('click', closePanel);
document.addEventListener('keydown', function(e) { if(e.key === 'Escape') closePanel(); });

// Card clicks (event delegation)
document.getElementById('cardGrid').addEventListener('click', function(e) {
  const card = e.target.closest('.card');
  if(!card) return;
  const idx = parseInt(card.dataset.idx);
  if(!isNaN(idx) && ENTITIES[idx]) openPanel(ENTITIES[idx]);
});
</script>
</body>
