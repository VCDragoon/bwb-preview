<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP RACE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060c;
    color: #e0e0e8;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  .page-container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 30px 24px 60px;
  }

  /* ---- HEADER ---- */
  .header { text-align: center; margin-bottom: 8px; }
  .header::after {
    content: '';
    display: block;
    width: 300px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E57373, #FFB74D, #81C784, #4A90D9, transparent);
    margin: 12px auto 0;
    box-shadow: 0 0 12px rgba(229,115,115,0.4);
  }
  .header h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: 56px;
    letter-spacing: 8px;
    background: linear-gradient(135deg, #E57373, #FFB74D, #81C784, #4A90D9, #BA68C8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(229,115,115,0.4));
    line-height: 1;
  }
  .header .subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    letter-spacing: 5px;
    color: #8888a0;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ---- STATS BAR ---- */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 20px 0 16px;
  }
  .stat-card {
    background: linear-gradient(135deg, #12121e 0%, #1a1a2e 100%);
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, #4A90D9);
    box-shadow: 0 0 10px var(--accent, #4A90D9);
  }
  .stat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7878a0;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: #e8e8f0;
    text-shadow: 0 0 10px rgba(200,200,240,0.2);
  }
  .stat-detail {
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    color: #9898b0;
    margin-top: 2px;
  }

  /* ---- CONTROLS ---- */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .btn-group { display: flex; gap: 4px; }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid #3a3a55;
    border-radius: 4px;
    background: #14141f;
    color: #b0b0c8;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { border-color: #5a5a80; color: #e0e0f0; background: #1c1c2e; }
  .btn.active {
    background: linear-gradient(135deg, #2a2a45, #1e1e35);
    border-color: #E57373;
    color: #E57373;
    box-shadow: 0 0 8px rgba(229,115,115,0.2);
  }
  .btn-play {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; padding: 0;
    border: 2px solid #E57373;
    color: #E57373;
    background: #14141f;
    cursor: pointer;
    transition: all 0.25s;
  }
  .btn-play:hover {
    background: #E57373; color: #06060c;
    box-shadow: 0 0 16px rgba(229,115,115,0.5);
  }
  .btn-play.playing {
    background: #E57373; color: #06060c;
    box-shadow: 0 0 16px rgba(229,115,115,0.5);
    animation: pulse-play 1.5s ease infinite;
  }
  @keyframes pulse-play {
    0%, 100% { box-shadow: 0 0 16px rgba(229,115,115,0.5); }
    50% { box-shadow: 0 0 28px rgba(229,115,115,0.8); }
  }
  .slider-container {
    flex: 1; min-width: 200px;
    display: flex; align-items: center; gap: 10px;
  }
  .slider-container label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; color: #7878a0;
    letter-spacing: 1px; text-transform: uppercase; white-space: nowrap;
  }
  .slider-container input[type=range] {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; background: #2a2a40; border-radius: 2px; outline: none;
  }
  .slider-container input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: #E57373; cursor: pointer;
    box-shadow: 0 0 8px rgba(229,115,115,0.5);
  }
  .session-label-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: #E57373;
    min-width: 50px; text-align: right;
  }

  /* ---- MAIN LAYOUT ---- */
  .main-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
  }
  @media (max-width: 1100px) {
    .main-layout { grid-template-columns: 1fr; }
  }

  /* ---- CHART ---- */
  .chart-container {
    background: linear-gradient(135deg, #0c0c16 0%, #12121e 100%);
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 16px 8px 12px;
    position: relative;
    overflow: hidden;
  }
  .chart-container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #E57373, #FFB74D, #81C784, #4A90D9);
    box-shadow: 0 0 12px rgba(229,115,115,0.3);
  }
  #bump-chart { width: 100%; display: block; }

  /* ---- SIDE PANEL ---- */
  .side-panel { display: flex; flex-direction: column; gap: 12px; }
  .panel-card {
    background: linear-gradient(135deg, #12121e 0%, #1a1a2e 100%);
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .panel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent, #4A90D9);
    box-shadow: 0 0 10px var(--accent, #4A90D9);
  }
  .panel-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px; letter-spacing: 3px;
    color: #c8c8e0; margin-bottom: 10px;
  }
  .session-info .mvp-winner {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .mvp-winner .crown {
    font-size: 22px;
    filter: drop-shadow(0 0 6px rgba(255,183,77,0.6));
  }
  .mvp-winner .name {
    font-family: 'Cinzel', serif;
    font-size: 18px; font-weight: 600;
    color: #FFB74D;
    text-shadow: 0 0 10px rgba(255,183,77,0.3);
  }
  .mvp-reason {
    font-size: 12px; color: #9898b0; line-height: 1.5;
    margin-bottom: 8px;
    max-height: 80px; overflow-y: auto;
  }
  .mvp-reason::-webkit-scrollbar { width: 4px; }
  .mvp-reason::-webkit-scrollbar-thumb { background: #3a3a55; border-radius: 2px; }

  .score-list { display: flex; flex-direction: column; gap: 6px; }
  .score-row {
    display: grid;
    grid-template-columns: 20px 80px 1fr 44px;
    align-items: center; gap: 6px; font-size: 12px;
  }
  .score-rank {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #7878a0; text-align: center;
  }
  .score-rank.gold { color: #FFB74D; text-shadow: 0 0 6px rgba(255,183,77,0.4); }
  .score-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; color: #c8c8e0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .score-bar-bg {
    height: 14px; background: #1a1a2e;
    border-radius: 2px; overflow: hidden; position: relative;
  }
  .score-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.6s ease; position: relative;
  }
  .score-bar-fill::after {
    content: '';
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 0 2px 2px 0;
  }
  .score-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; text-align: right; color: #b0b0c8;
  }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .cat-item {
    display: flex; flex-direction: column;
    padding: 6px 8px; background: #0e0e1a;
    border-radius: 4px; border: 1px solid #22223a;
  }
  .cat-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: #6868a0; margin-bottom: 2px;
  }
  .cat-winner {
    font-family: 'Cinzel', serif;
    font-size: 11px; font-weight: 600; color: #c8c8e0;
  }

  /* ---- LEGEND ---- */
  .legend {
    display: flex; flex-wrap: wrap; gap: 6px 16px;
    justify-content: center; margin-top: 12px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #0e0e18, #14141f);
    border: 1px solid #2a2a40; border-radius: 8px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 4px 8px; border-radius: 4px;
    transition: all 0.2s; user-select: none;
  }
  .legend-item:hover { background: #1c1c2e; }
  .legend-item.hidden { opacity: 0.3; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    box-shadow: 0 0 6px var(--color);
  }
  .legend-player {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; color: #c8c8e0; letter-spacing: 0.5px;
  }
  .legend-char {
    font-family: 'Cinzel', serif;
    font-size: 10px; color: #8888a0;
  }
  .legend-mvps {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: #FFB74D;
  }

  /* ---- MVP WINS BAR ---- */
  .mvp-wins-panel { margin-top: 12px; }
  .mvp-wins-row {
    display: grid;
    grid-template-columns: 90px 1fr 30px;
    align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px;
  }
  .mvp-wins-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600; color: #c8c8e0; text-align: right;
  }
  .mvp-wins-bar-bg {
    height: 12px; background: #1a1a2e; border-radius: 2px; overflow: hidden;
  }
  .mvp-wins-bar-fill { height: 100%; border-radius: 2px; }
  .mvp-wins-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #b0b0c8;
  }

  /* ---- TOOLTIP ---- */
  .chart-tooltip {
    position: fixed; pointer-events: none;
    background: linear-gradient(135deg, #16162a, #1e1e34);
    border: 1px solid #3a3a55; border-radius: 6px;
    padding: 10px 14px; font-size: 12px; color: #d0d0e0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    z-index: 1000; opacity: 0; transition: opacity 0.15s;
    max-width: 240px;
  }
  .chart-tooltip.visible { opacity: 1; }
  .chart-tooltip .tt-session {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; letter-spacing: 1px;
    text-transform: uppercase; color: #7878a0; margin-bottom: 4px;
  }
  .chart-tooltip .tt-name {
    font-family: 'Cinzel', serif; font-weight: 600; font-size: 14px; margin-bottom: 2px;
  }
  .chart-tooltip .tt-rank {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #b0b0c8;
  }
  .chart-tooltip .tt-score {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #FFB74D;
  }

  /* Crossover flash */
  @keyframes crossover-flash {
    0% { r: 8; opacity: 1; }
    100% { r: 20; opacity: 0; }
  }
  .crossover-pulse {
    animation: crossover-flash 0.8s ease-out forwards;
  }

  /* Leader glow pulse */
  @keyframes leader-glow {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  .leader-crown {
    animation: leader-glow 2s ease infinite;
  }

  /* MVP burst */
  @keyframes star-burst {
    0% { transform: scale(0.5); opacity: 0; }
    50% { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="chart-tooltip" id="tooltip"></div>

<div class="page-container">
  <div class="header">
    <h1>MVP RACE</h1>
    <div class="subtitle">Player Rankings Across 33 Sessions of BWB</div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="controls-row">
    <button class="btn-play" id="btn-play" title="Play/Pause">&#9654;</button>
    <div class="btn-group">
      <button class="btn active" data-speed="1500">1x</button>
      <button class="btn" data-speed="800">2x</button>
      <button class="btn" data-speed="400">4x</button>
    </div>
    <div class="slider-container">
      <label>Session</label>
      <input type="range" id="session-slider" min="0" max="32" value="32">
      <span class="session-label-display" id="session-label-display">S033</span>
    </div>
  </div>

  <div class="main-layout">
    <div class="chart-container">
      <svg id="bump-chart"></svg>
    </div>
    <div class="side-panel" id="side-panel"></div>
  </div>

  <div class="legend" id="legend"></div>

  <div class="mvp-wins-panel" id="mvp-wins-panel">
    <div class="panel-card" style="--accent: #FFB74D;">
      <div class="panel-title">MVP WINS LEADERBOARD</div>
      <div id="mvp-wins-bars"></div>
    </div>
  </div>
</div>

const PLAYER_COLORS = {
  Gradles:"#4A90D9", HT:"#E57373", Mary:"#81C784",
  Christie:"#BA68C8", Lucy:"#FFB74D", Tenderbittle:"#4DB6AC",
  Meijinx:"#FF8A65", Guest:"#7986CB"
};
const PLAYER_CHARS = {
  Gradles:"Corras", HT:"Ash", Mary:"Billabong",
  Christie:"Lilith", Lucy:"Orla", Tenderbittle:"SavannahBelle",
  Meijinx:"Ave", Guest:"Drenek"
};
const CAT_LABELS = {
  plot_driver:"Plot Driver", combat_champion:"Combat Champion",
  roleplay_royalty:"Roleplay Royalty", team_player:"Team Player",
  moment_maker:"Moment Maker"
};

// ============================================================
// PROCESS DATA
// ============================================================
const sessions = RAW_DATA;
const numSessions = sessions.length;
const allPlayers = new Set();
sessions.forEach(s => s.scores.forEach(sc => { if (sc.w > 0) allPlayers.add(sc.p); }));

function getPlayerRank(sIdx, player) {
  const sc = sessions[sIdx].scores.find(s => s.p === player && s.w > 0);
  return sc ? sc.r : null;
}
function getPlayerScore(sIdx, player) {
  return sessions[sIdx].scores.find(s => s.p === player) || null;
}

let maxRank = 0;
sessions.forEach(s => {
  const active = s.scores.filter(sc => sc.w > 0);
  maxRank = Math.max(maxRank, active.length);
});

// MVP counts
const mvpWinsByPlayer = {};
sessions.forEach(s => {
  const entry = s.scores.find(sc => sc.c === s.mvp);
  if (entry) mvpWinsByPlayer[entry.p] = (mvpWinsByPlayer[entry.p] || 0) + 1;
});

// Stats
let tightestGap = Infinity, tightestSid = '';
sessions.forEach(s => {
  const active = s.scores.filter(sc => sc.w > 0).sort((a,b) => a.r - b.r);
  if (active.length >= 2) {
    const gap = active[0].w - active[1].w;
    if (gap < tightestGap && gap >= 0) { tightestGap = gap; tightestSid = s.sid; }
  }
});
const rank1Counts = {};
sessions.forEach(s => {
  const r1 = s.scores.find(sc => sc.r === 1 && sc.w > 0);
  if (r1) rank1Counts[r1.p] = (rank1Counts[r1.p] || 0) + 1;
});
const overallLeader = Object.entries(rank1Counts).sort((a,b) => b[1]-a[1])[0];
const topMvp = Object.entries(mvpWinsByPlayer).sort((a,b) => b[1]-a[1])[0];

const hiddenPlayers = new Set();

// ============================================================
// STATS BAR
// ============================================================
document.getElementById('stats-bar').innerHTML = `
  <div class="stat-card" style="--accent:#4A90D9"><div class="stat-label">Sessions Tracked</div><div class="stat-value">${numSessions}</div><div class="stat-detail">${sessions[0].sid} \u2013 ${sessions[numSessions-1].sid}</div></div>
  <div class="stat-card" style="--accent:#FFB74D"><div class="stat-label">Most MVP Wins</div><div class="stat-value">${PLAYER_CHARS[topMvp[0]]}</div><div class="stat-detail">${topMvp[1]} wins (${topMvp[0]})</div></div>
  <div class="stat-card" style="--accent:#81C784"><div class="stat-label">Tightest Race</div><div class="stat-value">${tightestGap.toFixed(2)} pts</div><div class="stat-detail">${tightestSid} gap #1 vs #2</div></div>
  <div class="stat-card" style="--accent:#E57373"><div class="stat-label">Most #1 Finishes</div><div class="stat-value">${PLAYER_CHARS[overallLeader[0]]}</div><div class="stat-detail">${overallLeader[1]} session wins (${overallLeader[0]})</div></div>
`;

// MVP WINS PANEL
function renderMvpWins() {
  const sorted = Object.entries(mvpWinsByPlayer).sort((a,b) => b[1]-a[1]);
  const mx = sorted[0][1];
  document.getElementById('mvp-wins-bars').innerHTML = sorted.map(([p,w]) => {
    const c = PLAYER_COLORS[p]||'#888';
    return `<div class="mvp-wins-row"><div class="mvp-wins-name" style="color:${c}">${PLAYER_CHARS[p]||p}</div><div class="mvp-wins-bar-bg"><div class="mvp-wins-bar-fill" style="width:${(w/mx*100).toFixed(0)}%;background:${c};box-shadow:0 0 8px ${c}44"></div></div><div class="mvp-wins-count">${w}</div></div>`;
  }).join('');
}
renderMvpWins();

// LEGEND
function renderLegend() {
  const container = document.getElementById('legend');
  container.innerHTML = '';
  [...allPlayers].sort((a,b) => (mvpWinsByPlayer[b]||0)-(mvpWinsByPlayer[a]||0)).forEach(p => {
    const c = PLAYER_COLORS[p]||'#888';
    const ch = PLAYER_CHARS[p]||p;
    const w = mvpWinsByPlayer[p]||0;
    const item = document.createElement('div');
    item.className = 'legend-item' + (hiddenPlayers.has(p) ? ' hidden' : '');
    item.style.setProperty('--color', c);
    item.innerHTML = `<div class="legend-dot" style="background:${c};--color:${c}"></div><span class="legend-player">${p}</span><span class="legend-char">${ch}</span>${w?`<span class="legend-mvps">${w} MVP${w>1?'s':''}</span>`:''}`;
    item.onclick = () => {
      hiddenPlayers.has(p) ? hiddenPlayers.delete(p) : hiddenPlayers.add(p);
      item.classList.toggle('hidden');
      renderChart(currentSessionIdx);
    };
    container.appendChild(item);
  });
}
renderLegend();

// ============================================================
// BUMP CHART (D3)
// ============================================================
const margin = { top: 36, right: 110, bottom: 44, left: 54 };
let currentSessionIdx = numSessions - 1;

function getDimensions() {
  const rect = document.querySelector('.chart-container').getBoundingClientRect();
  const w = rect.width - 16;
  const h = Math.max(460, maxRank * 65 + margin.top + margin.bottom);
  return { w, h, iw: w - margin.left - margin.right, ih: h - margin.top - margin.bottom };
}

const svg = d3.select('#bump-chart');
const tooltip = document.getElementById('tooltip');

function renderChart(upToIdx) {
  const { w, h, iw, ih } = getDimensions();
  svg.attr('width', w).attr('height', h);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');

  // Glow filters for each player
  [...allPlayers].forEach(p => {
    const c = PLAYER_COLORS[p] || '#888';
    const filter = defs.append('filter')
      .attr('id', `glow-${p.replace(/\s/g,'')}`)
      .attr('x', '-50%').attr('y', '-50%').attr('width', '200%').attr('height', '200%');
    filter.append('feGaussianBlur').attr('stdDeviation', '3').attr('result', 'blur');
    filter.append('feFlood').attr('flood-color', c).attr('flood-opacity', '0.6').attr('result', 'color');
    filter.append('feComposite').attr('in', 'color').attr('in2', 'blur').attr('operator', 'in').attr('result', 'glow');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in', 'glow');
    merge.append('feMergeNode').attr('in', 'SourceGraphic');
  });

  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const visibleSessions = sessions.slice(0, upToIdx + 1);
  const xScale = d3.scalePoint().domain(visibleSessions.map(s => s.sid)).range([0, iw]).padding(0.12);
  const yScale = d3.scaleLinear().domain([1, maxRank]).range([0, ih]);

  // Background grid
  for (let r = 1; r <= maxRank; r++) {
    g.append('line')
      .attr('x1', 0).attr('x2', iw)
      .attr('y1', yScale(r)).attr('y2', yScale(r))
      .attr('stroke', r === 1 ? '#2a2a48' : '#1a1a2e')
      .attr('stroke-width', r === 1 ? 1.5 : 0.5);
  }

  // Session vertical markers + labels
  visibleSessions.forEach((s, i) => {
    const x = xScale(s.sid);
    g.append('line')
      .attr('x1', x).attr('x2', x).attr('y1', -6).attr('y2', ih + 6)
      .attr('stroke', '#1a1a30').attr('stroke-width', 0.5).attr('stroke-dasharray', '2,4');

    const showLabel = visibleSessions.length <= 20 || i % Math.ceil(visibleSessions.length / 16) === 0 || i === visibleSessions.length - 1;
    if (showLabel) {
      g.append('text')
        .attr('x', x).attr('y', ih + 26)
        .attr('text-anchor', 'middle')
        .attr('font-family', "'Barlow Condensed', sans-serif")
        .attr('font-size', '10px').attr('fill', '#5858a0')
        .text(s.sid);
    }
  });

  // Rank labels
  const ordinals = ['','1st','2nd','3rd','4th','5th','6th','7th','8th'];
  for (let r = 1; r <= maxRank; r++) {
    const label = ordinals[r] || `${r}th`;
    g.append('text').attr('x', -10).attr('y', yScale(r) + 4)
      .attr('text-anchor', 'end')
      .attr('font-family', "'JetBrains Mono', monospace")
      .attr('font-size', '11px').attr('fill', r === 1 ? '#FFB74D' : '#4a4a70')
      .text(label);
    g.append('text').attr('x', iw + 10).attr('y', yScale(r) + 4)
      .attr('text-anchor', 'start')
      .attr('font-family', "'JetBrains Mono', monospace")
      .attr('font-size', '11px').attr('fill', r === 1 ? '#FFB74D' : '#4a4a70')
      .text(label);
  }

  // Current session highlight line
  const currentSid = visibleSessions[visibleSessions.length - 1].sid;
  g.append('line')
    .attr('x1', xScale(currentSid)).attr('x2', xScale(currentSid))
    .attr('y1', -12).attr('y2', ih + 12)
    .attr('stroke', '#E57373').attr('stroke-width', 1.5)
    .attr('stroke-dasharray', '6,4').attr('opacity', 0.5);

  // "1st PLACE" zone glow
  g.append('rect')
    .attr('x', 0).attr('y', yScale(1) - 18)
    .attr('width', iw).attr('height', 36)
    .attr('fill', 'url(#first-place-gradient)')
    .attr('opacity', 0.08);

  const firstGrad = defs.append('linearGradient').attr('id', 'first-place-gradient');
  firstGrad.append('stop').attr('offset', '0%').attr('stop-color', '#FFB74D').attr('stop-opacity', 0);
  firstGrad.append('stop').attr('offset', '50%').attr('stop-color', '#FFB74D').attr('stop-opacity', 1);
  firstGrad.append('stop').attr('offset', '100%').attr('stop-color', '#FFB74D').attr('stop-opacity', 0);

  // ---- PLAYER LINES ----
  const activePlayers = [...allPlayers].filter(p => !hiddenPlayers.has(p));

  // Sort: draw lower-ranked lines first so leaders are on top
  activePlayers.sort((a, b) => {
    const ra = getPlayerRank(upToIdx, a) || 99;
    const rb = getPlayerRank(upToIdx, b) || 99;
    return rb - ra;
  });

  activePlayers.forEach(player => {
    const color = PLAYER_COLORS[player] || '#888';
    const charName = PLAYER_CHARS[player] || player;
    const filterId = `glow-${player.replace(/\s/g,'')}`;

    // Build points
    const points = [];
    for (let i = 0; i <= upToIdx; i++) {
      const rank = getPlayerRank(i, player);
      if (rank !== null) {
        points.push({ idx: i, sid: sessions[i].sid, rank, x: xScale(sessions[i].sid), y: yScale(rank) });
      }
    }
    if (points.length === 0) return;

    // Split into continuous segments (gap = absent 2+ sessions)
    const segments = [];
    let seg = [points[0]];
    for (let i = 1; i < points.length; i++) {
      if (points[i].idx - points[i-1].idx <= 2) seg.push(points[i]);
      else { segments.push(seg); seg = [points[i]]; }
    }
    segments.push(seg);

    const lineGen = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveMonotoneX);

    // Draw shadow line (wider, darker, behind)
    segments.forEach(seg => {
      if (seg.length >= 2) {
        g.append('path').datum(seg).attr('d', lineGen)
          .attr('fill', 'none').attr('stroke', color).attr('stroke-width', 8)
          .attr('stroke-linecap', 'round').attr('opacity', 0.12);
      }
    });

    // Draw main line
    segments.forEach(seg => {
      if (seg.length >= 2) {
        g.append('path').datum(seg).attr('d', lineGen)
          .attr('fill', 'none').attr('stroke', color).attr('stroke-width', 3.5)
          .attr('stroke-linecap', 'round').attr('stroke-linejoin', 'round')
          .attr('opacity', 0.9)
          .style('filter', `url(#${filterId})`);
      }
    });

    // Detect crossovers (rank improved from previous session)
    for (let i = 1; i < points.length; i++) {
      if (points[i].rank < points[i-1].rank) {
        // Crossover! Draw a glowing pulse at the overtake point
        g.append('circle')
          .attr('cx', points[i].x).attr('cy', points[i].y)
          .attr('r', 6).attr('fill', 'none')
          .attr('stroke', color).attr('stroke-width', 2)
          .attr('opacity', 0.6)
          .style('filter', `url(#${filterId})`);
      }
    }

    // Draw dots
    points.forEach(pt => {
      const scoreEntry = getPlayerScore(pt.idx, player);
      const isMvp = sessions[pt.idx].mvp === (scoreEntry?.c || '');

      // MVP star glow circle
      if (isMvp) {
        g.append('circle')
          .attr('cx', pt.x).attr('cy', pt.y).attr('r', 10)
          .attr('fill', 'none').attr('stroke', '#FFB74D')
          .attr('stroke-width', 1.5).attr('opacity', 0.4)
          .style('filter', 'drop-shadow(0 0 4px rgba(255,183,77,0.6))');
      }

      g.append('circle')
        .attr('cx', pt.x).attr('cy', pt.y)
        .attr('r', isMvp ? 6 : 3.5)
        .attr('fill', isMvp ? '#FFB74D' : color)
        .attr('stroke', isMvp ? '#FFB74D' : '#0c0c18')
        .attr('stroke-width', isMvp ? 2 : 1.5)
        .style('filter', isMvp ? 'drop-shadow(0 0 6px rgba(255,183,77,0.8))' : `drop-shadow(0 0 3px ${color}66)`)
        .style('cursor', 'pointer')
        .on('mouseenter', function(event) {
          tooltip.innerHTML = `
            <div class="tt-session">${sessions[pt.idx].sid} \u2014 ${sessions[pt.idx].label}</div>
            <div class="tt-name" style="color:${color}">${scoreEntry?.c || charName}</div>
            <div class="tt-rank">Rank: #${pt.rank}</div>
            <div class="tt-score">Score: ${scoreEntry?.w?.toFixed(2) || '?'}</div>
            ${isMvp ? '<div style="color:#FFB74D;font-size:11px;margin-top:3px">\u2605 SESSION MVP</div>' : ''}
          `;
          tooltip.classList.add('visible');
          tooltip.style.left = Math.min(event.clientX + 14, window.innerWidth - 260) + 'px';
          tooltip.style.top = (event.clientY - 70) + 'px';
        })
        .on('mouseleave', () => tooltip.classList.remove('visible'));

      // Star above MVP dot
      if (isMvp) {
        g.append('text')
          .attr('x', pt.x).attr('y', pt.y - 14)
          .attr('text-anchor', 'middle')
          .attr('font-size', '13px')
          .attr('fill', '#FFB74D')
          .style('filter', 'drop-shadow(0 0 4px rgba(255,183,77,0.8))')
          .text('\u2605');
      }
    });

    // Crown on the #1 player at the current session
    const lastPt = points[points.length - 1];
    if (lastPt && lastPt.idx === upToIdx && lastPt.rank === 1) {
      g.append('text')
        .attr('x', lastPt.x).attr('y', lastPt.y - 18)
        .attr('text-anchor', 'middle')
        .attr('font-size', '16px')
        .attr('fill', '#FFB74D')
        .style('filter', 'drop-shadow(0 0 6px rgba(255,183,77,0.8))')
        .attr('class', 'leader-crown')
        .text('\u265B');
    }

    // End label (player name at right edge)
    if (lastPt && lastPt.idx === upToIdx) {
      g.append('text')
        .attr('x', iw + 32).attr('y', lastPt.y + 4)
        .attr('text-anchor', 'start')
        .attr('font-family', "'Barlow Condensed', sans-serif")
        .attr('font-size', '12px').attr('font-weight', '600')
        .attr('fill', color)
        .style('filter', `drop-shadow(0 0 4px ${color}44)`)
        .text(charName.split('/')[0]);
    }
  });
}

// ============================================================
// SIDE PANEL
// ============================================================
function renderSidePanel(sIdx) {
  const s = sessions[sIdx];
  const active = s.scores.filter(sc => sc.w > 0).sort((a,b) => a.r - b.r);
  const mx = active.length > 0 ? Math.max(...active.map(sc => sc.w)) : 10;
  const mvpEntry = s.scores.find(sc => sc.c === s.mvp);
  const mvpColor = mvpEntry ? (PLAYER_COLORS[mvpEntry.p] || '#FFB74D') : '#FFB74D';

  const catHtml = Object.entries(s.cats || {}).map(([k,v]) =>
    `<div class="cat-item"><span class="cat-label">${CAT_LABELS[k]||k}</span><span class="cat-winner">${v}</span></div>`
  ).join('');

  const scoresHtml = active.map(sc => {
    const c = PLAYER_COLORS[sc.p]||'#888';
    const pct = mx > 0 ? (sc.w/mx*100) : 0;
    return `<div class="score-row"><span class="score-rank ${sc.r===1?'gold':''}">#${sc.r}</span><span class="score-name" style="color:${c}">${sc.c}</span><div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct.toFixed(0)}%;background:${c};box-shadow:0 0 6px ${c}44"></div></div><span class="score-val">${sc.w.toFixed(2)}</span></div>`;
  }).join('');

  document.getElementById('side-panel').innerHTML = `
    <div class="panel-card session-info" style="--accent:${mvpColor}">
      <div class="panel-title">${s.sid} \u2014 ${s.label}</div>
      <div class="mvp-winner"><span class="crown">\u265B</span><span class="name">${s.mvp}</span></div>
      <div class="mvp-reason">${s.reason}</div>
    </div>
    <div class="panel-card" style="--accent:#4A90D9">
      <div class="panel-title">SCORE BREAKDOWN</div>
      <div class="score-list">${scoresHtml}</div>
    </div>
    <div class="panel-card" style="--accent:#BA68C8">
      <div class="panel-title">CATEGORY WINNERS</div>
      <div class="cat-grid">${catHtml}</div>
    </div>
  `;
}

// ============================================================
// ANIMATION CONTROLS
// ============================================================
let playing = false, animSpeed = 1500, animTimer = null;
const slider = document.getElementById('session-slider');
const sliderLabel = document.getElementById('session-label-display');
const playBtn = document.getElementById('btn-play');

function updateView(idx) {
  currentSessionIdx = Math.max(0, Math.min(idx, numSessions - 1));
  slider.value = currentSessionIdx;
  sliderLabel.textContent = sessions[currentSessionIdx].sid;
  renderChart(currentSessionIdx);
  renderSidePanel(currentSessionIdx);
}

slider.addEventListener('input', () => { stopAnim(); updateView(+slider.value); });
playBtn.addEventListener('click', () => playing ? stopAnim() : startAnim());

function startAnim() {
  playing = true;
  playBtn.innerHTML = '\u275A\u275A';
  playBtn.classList.add('playing');
  if (currentSessionIdx >= numSessions - 1) currentSessionIdx = -1;
  stepAnim();
}
function stopAnim() {
  playing = false;
  playBtn.innerHTML = '\u25B6';
  playBtn.classList.remove('playing');
  if (animTimer) { clearTimeout(animTimer); animTimer = null; }
}
function stepAnim() {
  if (!playing) return;
  currentSessionIdx++;
  if (currentSessionIdx >= numSessions) { stopAnim(); currentSessionIdx = numSessions - 1; return; }
  updateView(currentSessionIdx);
  animTimer = setTimeout(stepAnim, animSpeed);
}
document.querySelectorAll('[data-speed]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-speed]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    animSpeed = +btn.dataset.speed;
  });
});

// ============================================================
// INITIAL RENDER
// ============================================================
updateView(numSessions - 1);
window.addEventListener('resize', () => renderChart(currentSessionIdx));
</script>
