<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLAYER PERFORMANCE MANDALA — BWB Campaign</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Cinzel:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #06060c;
      --bg-primary: #0a0a14;
      --bg-card: #0f1020;
      --bg-card-hover: #141530;
      --bg-surface: #1a1a2e;
      --bg-elevated: #22223a;
      --border: #2a2a4a;
      --border-glow: #3a3a6a;
      --text-primary: #eef0ff;
      --text-secondary: #9494bf;
      --text-muted: #8a8ab5;
      --accent-blue: #00d4ff;
      --accent-blue-dim: #0088aa;
      --accent-gold: #ffd700;
      --accent-gold-dim: #b89a00;
      --accent-red: #ff4444;
      --accent-green: #44ff88;
      --accent-purple: #ad6bff;
      --accent-orange: #ff8844;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Barlow', sans-serif;
      line-height: 1.5;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }

    /* Hero header */
    .hero {
      text-align: center;
      padding: 48px 24px 16px;
      position: relative;
      width: 100%;
      max-width: 1400px;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(0,212,255,0.06) 0%, transparent 70%),
        radial-gradient(ellipse at 20% 80%, rgba(255,68,68,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(255,215,0,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-broadcast {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent-red);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: pulse 2s ease-in-out infinite;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-red);
      box-shadow: 0 0 8px var(--accent-red);
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .hero-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 6vw, 88px);
      line-height: 0.95;
      letter-spacing: 6px;
      background: linear-gradient(180deg, #ffffff 0%, #aabbdd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .hero-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500;
      font-size: clamp(14px, 2vw, 20px);
      color: var(--text-muted);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    /* Mandala container */
    .mandala-container {
      position: relative;
      width: 100%;
      max-width: 1400px;
      display: flex;
      justify-content: center;
      padding: 0 24px;
    }

    #mandala-svg {
      width: 100%;
      max-width: 1100px;
      height: auto;
    }

    /* Tooltip */
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--bg-elevated);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: 'Barlow', sans-serif;
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 20px rgba(0,212,255,0.08);
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.2s;
      max-width: 320px;
      line-height: 1.6;
    }
    .tooltip.visible { opacity: 1; }
    .tooltip .tt-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: var(--accent-gold);
    }
    .tooltip .tt-subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 2px 0;
    }
    .tooltip .tt-label {
      color: var(--text-secondary);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tooltip .tt-value {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 13px;
    }
    .tooltip .tt-bar {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .tooltip .tt-swatch {
      width: 10px; height: 10px; border-radius: 2px;
    }

    /* Legend */
    .legend-container {
      width: 100%;
      max-width: 1400px;
      padding: 24px 24px 48px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    .legend-item:hover {
      border-color: var(--border-glow);
      background: rgba(255,255,255,0.02);
    }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    .legend-player {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .legend-character {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    /* Instructions */
    .instructions {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 24px 0;
      opacity: 0.6;
    }

    /* Section divider */
    .section-divider {
      height: 1px;
      width: 100%;
      max-width: 1400px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 8px 0;
    }

    /* Connection canvas */
    #connection-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-broadcast">
      <span class="live-dot"></span>
      CAMPAIGN ANALYTICS
      <span class="live-dot"></span>
    </div>
    <h1 class="hero-title">PLAYER PERFORMANCE MANDALA</h1>
    <p class="hero-subtitle">Award Distribution Across 46 Sessions</p>
  </div>

  <p class="instructions">Hover over any ring segment to explore connections</p>
  <div class="section-divider"></div>

  <!-- Mandala -->
  <div class="mandala-container" id="mandala-wrapper">
    <svg id="mandala-svg" viewBox="0 0 1100 1100"></svg>
    <canvas id="connection-canvas"></canvas>
  </div>

  <div class="section-divider"></div>

  <!-- Legend -->
  <div class="legend-container" id="legend"></div>

      id: `S${String(i).padStart(3, '0')}`,
      num: i,
      quality: REAL_QUALITY[idx]

    // Build connections from real data: [playerIndex, awardIndex, sessionIndex]
    const connections = REAL_CONNECTIONS.map(c => ({
      playerId: PLAYERS[c[0]].id,
      awardId: AWARDS[c[1]].id,
      sessionNum: c[2] + 1
    }));

    // Aggregate: player->award total counts
    const playerAwardCounts = {};
    PLAYERS.forEach(p => {
      playerAwardCounts[p.id] = {};
      AWARDS.forEach(a => { playerAwardCounts[p.id][a.id] = 0; });
    });
    connections.forEach(c => {
      playerAwardCounts[c.playerId][c.awardId]++;
    });

    // Aggregate: award->total wins
    const awardTotalCounts = {};
    AWARDS.forEach(a => {
      awardTotalCounts[a.id] = connections.filter(c => c.awardId === a.id).length;
    });

    // Player total wins
    const playerTotalWins = {};
    PLAYERS.forEach(p => {
      playerTotalWins[p.id] = connections.filter(c => c.playerId === p.id).length;
    });

    // ─── SVG Layout Constants ───────────────────────────────────────────────
    const W = 1100, H = 1100;
    const CX = W / 2, CY = H / 2;

    // Ring radii (inner edge, outer edge)
    const INNER_R0 = 130, INNER_R1 = 195;
    const MID_R0 = 230, MID_R1 = 310;
    const OUTER_R0 = 345, OUTER_R1 = 415;

      .enter().append('feMergeNode')
      .attr('in', d => d);

    const g = svg.append('g').attr('transform', `translate(${CX},${CY})`);

    const connectionLayer = g.append('g').attr('class', 'connection-layer');

    const playerAngle = (2 * Math.PI) / PLAYERS.length;
    const playerArc = d3.arc()

      .outerRadius(INNER_R1)
      .cornerRadius(3);

    // Middle ring: 12 award segments
    const awardAngle = (2 * Math.PI) / AWARDS.length;
    const awardArc = d3.arc()
      .innerRadius(MID_R0)
      .outerRadius(MID_R1)
      .cornerRadius(3);

    const sessionAngle = (2 * Math.PI) / NUM_SESSIONS;
    const sessionArc = d3.arc()
      .innerRadius(OUTER_R0)
      .outerRadius(OUTER_R1)
      .cornerRadius(2);

    // ─── Quality color scale ────────────────────────────────────────────────
    const qualityColor = d3.scaleLinear()
      .domain([0, 4, 7, 10])
      .range(['#ff4444', '#ff8844', '#ffd700', '#44ff88'])
      .clamp(true);

    // ─── Draw Inner Ring (Players) ──────────────────────────────────────────
    const playerSegments = ringLayer.selectAll('.player-seg')
      .data(PLAYERS)
      .enter().append('g')
      .attr('class', 'player-seg');

    playerSegments.append('path')
      .attr('d', (d, i) => playerArc({
        startAngle: i * playerAngle + GAP_ANGLE,
        endAngle: (i + 1) * playerAngle - GAP_ANGLE
      }))
      .attr('fill', d => d.color)
      .attr('fill-opacity', 0.25)
      .attr('stroke', d => d.color)
      .attr('stroke-width', 1.5)
      .attr('stroke-opacity', 0.6)
      .style('cursor', 'pointer')
      .style('transition', 'fill-opacity 0.3s, stroke-opacity 0.3s')
      .on('mouseenter', function(event, d) { highlightPlayer(d.id, event); })
      .on('mousemove', function(event) { moveTooltip(event); })
      .on('mouseleave', function() { clearHighlight(); });

    // Player labels (character name)
    playerSegments.append('text')
      .attr('transform', (d, i) => {
        const angle = (i + 0.5) * playerAngle - Math.PI / 2;
        const r = (INNER_R0 + INNER_R1) / 2;
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        // Rotate text to be readable
        let rotation = angle * 180 / Math.PI + 90;
        if (rotation > 90 && rotation < 270) rotation += 180;
        return `translate(${x},${y}) rotate(${rotation})`;
      })
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('fill', d => d.color)
      .attr('font-family', "'Cinzel', serif")
      .attr('font-weight', 700)
      .attr('font-size', '11px')
      .attr('letter-spacing', '0.5px')
      .style('pointer-events', 'none')
      .style('text-shadow', d => `0 0 8px ${d.color}40`)
      .text(d => d.character.toUpperCase());

    // ─── Draw Middle Ring (Awards) ──────────────────────────────────────────
    const awardSegments = ringLayer.selectAll('.award-seg')
      .data(AWARDS)
      .enter().append('g')
      .attr('class', 'award-seg');

    // Award segment fill color: a muted blue-grey
    const awardFill = '#1a2040';
    const awardStroke = '#3a3a6a';

    awardSegments.append('path')
      .attr('d', (d, i) => awardArc({
        startAngle: i * awardAngle + GAP_ANGLE,
        endAngle: (i + 1) * awardAngle - GAP_ANGLE
      }))
      .attr('fill', awardFill)
      .attr('fill-opacity', 0.6)
      .attr('stroke', awardStroke)
      .attr('stroke-width', 1)
      .style('cursor', 'pointer')
      .style('transition', 'fill-opacity 0.3s')
      .on('mouseenter', function(event, d) { highlightAward(d.id, event); })
      .on('mousemove', function(event) { moveTooltip(event); })
      .on('mouseleave', function() { clearHighlight(); });

    // Award labels
    awardSegments.append('text')
      .attr('transform', (d, i) => {
        const angle = (i + 0.5) * awardAngle - Math.PI / 2;
        const r = (MID_R0 + MID_R1) / 2;
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        let rotation = angle * 180 / Math.PI + 90;
        if (rotation > 90 && rotation < 270) rotation += 180;
        return `translate(${x},${y}) rotate(${rotation})`;
      })
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('fill', '#eef0ff')
      .attr('font-family', "'Barlow Condensed', sans-serif")
      .attr('font-weight', 700)
      .attr('font-size', '10.5px')
      .attr('letter-spacing', '1.5px')
      .style('pointer-events', 'none')
      .text(d => d.label.toUpperCase());

    // Award icons (small, inner edge)
    awardSegments.append('text')
      .attr('transform', (d, i) => {
        const angle = (i + 0.5) * awardAngle - Math.PI / 2;
        const r = MID_R0 + 14;
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        return `translate(${x},${y})`;
      })
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('font-size', '13px')
      .style('pointer-events', 'none')
      .text(d => d.icon);

    // ─── Draw Outer Ring (Sessions) ─────────────────────────────────────────
    const sessionSegments = ringLayer.selectAll('.session-seg')
      .data(SESSIONS)
      .enter().append('g')
      .attr('class', 'session-seg');

    sessionSegments.append('path')
      .attr('d', (d, i) => sessionArc({
        startAngle: i * sessionAngle + GAP_ANGLE / 2,
        endAngle: (i + 1) * sessionAngle - GAP_ANGLE / 2
      }))
      .attr('fill', d => qualityColor(d.quality))
      .attr('fill-opacity', 0.2)
      .attr('stroke', d => qualityColor(d.quality))
      .attr('stroke-width', 0.8)
      .attr('stroke-opacity', 0.4)
      .style('cursor', 'pointer')
      .style('transition', 'fill-opacity 0.3s, stroke-opacity 0.3s')
      .on('mouseenter', function(event, d) { highlightSession(d.num, event); })
      .on('mousemove', function(event) { moveTooltip(event); })
      .on('mouseleave', function() { clearHighlight(); });

    // Session number labels
    sessionSegments.append('text')
      .attr('transform', (d, i) => {
        const angle = (i + 0.5) * sessionAngle - Math.PI / 2;
        const r = LABEL_R;
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        let rotation = angle * 180 / Math.PI + 90;
        if (rotation > 90 && rotation < 270) rotation += 180;
        return `translate(${x},${y}) rotate(${rotation})`;
      })
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('fill', '#8a8ab5')
      .attr('font-family', "'JetBrains Mono', monospace")
      .attr('font-weight', 400)
      .attr('font-size', '8px')
      .attr('letter-spacing', '0.5px')
      .style('pointer-events', 'none')
      .text(d => d.num);

    // Quality dots on outer edge of session ring
    sessionSegments.append('circle')
      .attr('cx', (d, i) => {
        const angle = (i + 0.5) * sessionAngle - Math.PI / 2;
        return Math.cos(angle) * (OUTER_R1 + 12);
      })
      .attr('cy', (d, i) => {
        const angle = (i + 0.5) * sessionAngle - Math.PI / 2;
        return Math.sin(angle) * (OUTER_R1 + 12);
      })
      .attr('r', 3)
      .attr('fill', d => qualityColor(d.quality))
      .attr('opacity', 0.7)
      .style('filter', 'url(#glow)')
      .style('pointer-events', 'none');

    // ─── Draw Connection Lines ──────────────────────────────────────────────

    // Helper: get midpoint angle of a ring segment
    function playerMidAngle(playerIdx) {
      return (playerIdx + 0.5) * playerAngle;
    }
    function awardMidAngle(awardIdx) {
      return (awardIdx + 0.5) * awardAngle;
    }
    function sessionMidAngle(sessionIdx) {
      return (sessionIdx + 0.5) * sessionAngle;
    }

    // D3 radial line: takes [angle, radius] control points
    // We use quadratic bezier through the gap between rings
    const radialLine = d3.lineRadial()
      .angle(d => d[0])
      .radius(d => d[1])
      .curve(d3.curveBasis);

    // Inner -> Middle connections (player -> award aggregated)
    const playerAwardLinks = [];
    PLAYERS.forEach((player, pi) => {
      AWARDS.forEach((award, ai) => {
        const count = playerAwardCounts[player.id][award.id];
        if (count > 0) {
          playerAwardLinks.push({
            player, award, count,
            playerIdx: pi, awardIdx: ai
          });
        }
      });
    });

    const maxPACount = d3.max(playerAwardLinks, d => d.count) || 1;
    const linkWidthScale = d3.scaleLinear().domain([1, maxPACount]).range([0.5, 4]);

    // Draw player->award connections
    const paConnections = connectionLayer.selectAll('.pa-link')
      .data(playerAwardLinks)
      .enter().append('path')
      .attr('class', 'pa-link')
      .attr('d', d => {
        const a1 = playerMidAngle(d.playerIdx);
        const a2 = awardMidAngle(d.awardIdx);
        // Bezier through gap
        const midAngle = (a1 + a2) / 2;
        // Handle wrapping
        let aDiff = a2 - a1;
        if (aDiff > Math.PI) aDiff -= 2 * Math.PI;
        if (aDiff < -Math.PI) aDiff += 2 * Math.PI;
        const midA = a1 + aDiff / 2;
        const gapR = (INNER_R1 + MID_R0) / 2;
        return radialLine([
          [a1, INNER_R1],
          [midA, gapR],
          [a2, MID_R0]
        ]);
      })
      .attr('fill', 'none')
      .attr('stroke', d => d.player.color)
      .attr('stroke-width', d => linkWidthScale(d.count))
      .attr('stroke-opacity', 0.15)
      .style('transition', 'stroke-opacity 0.3s');

    // Middle -> Outer connections (award -> session, colored by winning player)
    const asConnections = connectionLayer.selectAll('.as-link')
      .data(connections)
      .enter().append('path')
      .attr('class', 'as-link')
      .attr('d', d => {
        const ai = AWARDS.findIndex(a => a.id === d.awardId);
        const si = d.sessionNum - 1;
        const a1 = awardMidAngle(ai);
        const a2 = sessionMidAngle(si);
        let aDiff = a2 - a1;
        if (aDiff > Math.PI) aDiff -= 2 * Math.PI;
        if (aDiff < -Math.PI) aDiff += 2 * Math.PI;
        const midA = a1 + aDiff / 2;
        const gapR = (MID_R1 + OUTER_R0) / 2;
        return radialLine([
          [a1, MID_R1],
          [midA, gapR],
          [a2, OUTER_R0]
        ]);
      })
      .attr('fill', 'none')
      .attr('stroke', d => {
        const p = PLAYERS.find(p => p.id === d.playerId);
        return p ? p.color : '#666';
      })
      .attr('stroke-width', 0.6)
      .attr('stroke-opacity', 0.08)
      .style('transition', 'stroke-opacity 0.3s');

    // ─── Center decoration ──────────────────────────────────────────────────
    // Central hub ring
    g.append('circle')
      .attr('cx', 0).attr('cy', 0)
      .attr('r', INNER_R0 - 8)
      .attr('fill', 'none')
      .attr('stroke', '#2a2a4a')
      .attr('stroke-width', 0.5)
      .attr('stroke-dasharray', '4,4');

    // Center text
    g.append('text')
      .attr('x', 0).attr('y', -20)
      .attr('text-anchor', 'middle')
      .attr('fill', '#eef0ff')
      .attr('font-family', "'Bebas Neue', sans-serif")
      .attr('font-size', '24px')
      .attr('letter-spacing', '3px')
      .attr('opacity', 0.5)
      .text('BWB');

    g.append('text')
      .attr('x', 0).attr('y', 6)
      .attr('text-anchor', 'middle')
      .attr('fill', '#9494bf')
      .attr('font-family', "'Barlow Condensed', sans-serif")
      .attr('font-weight', 600)
      .attr('font-size', '12px')
      .attr('letter-spacing', '3px')
      .attr('text-transform', 'uppercase')
      .attr('opacity', 0.4)
      .text('CAMPAIGN');

    g.append('text')
      .attr('x', 0).attr('y', 28)
      .attr('text-anchor', 'middle')
      .attr('fill', '#ffd700')
      .attr('font-family', "'JetBrains Mono', monospace")
      .attr('font-size', '11px')
      .attr('letter-spacing', '1px')
      .attr('opacity', 0.5)
      .text(`${connections.length} AWARDS`);

    // Ring label arcs (decorative text paths)
    // Inner ring label
    defs.append('path')
      .attr('id', 'inner-label-path')
      .attr('d', d3.arc()({ innerRadius: INNER_R0 - 16, outerRadius: INNER_R0 - 16, startAngle: -0.5, endAngle: 0.5 }));

    // ─── Ring Border Circles (decorative) ───────────────────────────────────
    const ringBorders = [
      { r: INNER_R0, opacity: 0.15 },
      { r: INNER_R1, opacity: 0.2 },
      { r: MID_R0, opacity: 0.15 },
      { r: MID_R1, opacity: 0.2 },
      { r: OUTER_R0, opacity: 0.15 },
      { r: OUTER_R1, opacity: 0.2 },
    ];

    ringBorders.forEach(rb => {
      g.append('circle')
        .attr('cx', 0).attr('cy', 0)
        .attr('r', rb.r)
        .attr('fill', 'none')
        .attr('stroke', '#2a2a4a')
        .attr('stroke-width', 0.5)
        .attr('opacity', rb.opacity);
    });

    // ─── Ring Labels (between rings) ────────────────────────────────────────
    const ringLabelData = [
      { label: 'PLAYERS', r: INNER_R0 - 18, color: '#8a8ab5' },
      { label: 'AWARDS', r: MID_R0 - 16, color: '#8a8ab5' },
      { label: 'SESSIONS', r: OUTER_R0 - 18, color: '#8a8ab5' },
    ];

    ringLabelData.forEach((rl, idx) => {
      const pathId = `ring-label-path-${idx}`;
      // Create a circular text path
      defs.append('path')
        .attr('id', pathId)
        .attr('d', `M ${-rl.r},0 A ${rl.r},${rl.r} 0 1,1 ${rl.r},0 A ${rl.r},${rl.r} 0 1,1 ${-rl.r},0`);

      labelLayer.append('text')
        .append('textPath')
        .attr('href', `#${pathId}`)
        .attr('startOffset', '12.5%')
        .attr('text-anchor', 'middle')
        .attr('fill', rl.color)
        .attr('font-family', "'Barlow Condensed', sans-serif")
        .attr('font-weight', 700)
        .attr('font-size', '9px')
        .attr('letter-spacing', '3px')
        .attr('opacity', 0.4)
        .text(rl.label);
    });

    // ─── Interaction Highlights ─────────────────────────────────────────────
    const tooltip = d3.select('#tooltip');

    function showTooltip(html, event) {
      tooltip.html(html).classed('visible', true);
      moveTooltip(event);
    }

    function moveTooltip(event) {
      const tt = document.getElementById('tooltip');
      const ttRect = tt.getBoundingClientRect();
      let x = event.clientX + 16;
      let y = event.clientY - 10;
      // Keep on screen
      if (x + ttRect.width > window.innerWidth - 16) x = event.clientX - ttRect.width - 16;
      if (y + ttRect.height > window.innerHeight - 16) y = window.innerHeight - ttRect.height - 16;
      if (y < 16) y = 16;
      tt.style.left = x + 'px';
      tt.style.top = y + 'px';
    }

    function hideTooltip() {
      tooltip.classed('visible', false);
    }

    function highlightPlayer(playerId, event) {
      const player = PLAYERS.find(p => p.id === playerId);
      if (!player) return;

      // Dim everything
      d3.selectAll('.player-seg path').attr('fill-opacity', 0.08).attr('stroke-opacity', 0.15);
      d3.selectAll('.award-seg path').attr('fill-opacity', 0.15);
      d3.selectAll('.session-seg path').attr('fill-opacity', 0.06).attr('stroke-opacity', 0.1);
      d3.selectAll('.pa-link').attr('stroke-opacity', 0.03);
      d3.selectAll('.as-link').attr('stroke-opacity', 0.02);

      // Highlight this player segment
      d3.selectAll('.player-seg').filter((d, i) => PLAYERS[i].id === playerId)
        .select('path')
        .attr('fill-opacity', 0.6)
        .attr('stroke-opacity', 1)
        .style('filter', 'url(#glow-strong)');

      // Find connected awards and sessions
      const playerConns = connections.filter(c => c.playerId === playerId);
      const connectedAwards = new Set(playerConns.map(c => c.awardId));
      const connectedSessions = new Set(playerConns.map(c => c.sessionNum));

      // Highlight connected award segments
      d3.selectAll('.award-seg').filter((d, i) => connectedAwards.has(AWARDS[i].id))
        .select('path')
        .attr('fill-opacity', 0.5)
        .attr('stroke', player.color)
        .attr('stroke-width', 1.5);

      // Highlight connected session segments
      d3.selectAll('.session-seg').filter((d, i) => connectedSessions.has(SESSIONS[i].num))
        .select('path')
        .attr('fill-opacity', 0.5)
        .attr('stroke-opacity', 0.8);

      // Highlight connection lines
      d3.selectAll('.pa-link').filter(d => d.player.id === playerId)
        .attr('stroke-opacity', 0.6)
        .attr('stroke-width', d => linkWidthScale(d.count) + 1)
        .style('filter', 'url(#glow)');

      d3.selectAll('.as-link').filter(d => d.playerId === playerId)
        .attr('stroke-opacity', 0.4)
        .attr('stroke-width', 1.2)
        .style('filter', 'url(#glow)');

      // Build tooltip
      const awardBreakdown = AWARDS
        .map(a => ({ label: a.label, count: playerAwardCounts[playerId][a.id] }))
        .filter(x => x.count > 0)
        .sort((a, b) => b.count - a.count);

      const ttHtml = `
        <div class="tt-title" style="color:${player.color}">${player.character}</div>
        <div class="tt-subtitle">${player.player} — ${playerTotalWins[playerId]} Total Awards</div>
        ${awardBreakdown.map(ab => `
          <div class="tt-row">
            <span class="tt-label">${ab.label}</span>
            <span class="tt-value" style="color:${player.color}">${ab.count}</span>
          </div>
        `).join('')}
        <div class="tt-row" style="margin-top:6px;border-top:1px solid #2a2a4a;padding-top:6px">
          <span class="tt-label">Sessions Active</span>
          <span class="tt-value">${connectedSessions.size} / ${NUM_SESSIONS}</span>
        </div>
      `;
      showTooltip(ttHtml, event);
    }

    function highlightAward(awardId, event) {
      const award = AWARDS.find(a => a.id === awardId);
      if (!award) return;

      // Dim everything
      d3.selectAll('.player-seg path').attr('fill-opacity', 0.08).attr('stroke-opacity', 0.15);
      d3.selectAll('.award-seg path').attr('fill-opacity', 0.15);
      d3.selectAll('.session-seg path').attr('fill-opacity', 0.06).attr('stroke-opacity', 0.1);
      d3.selectAll('.pa-link').attr('stroke-opacity', 0.03);
      d3.selectAll('.as-link').attr('stroke-opacity', 0.02);

      // Highlight this award segment
      const awardIdx = AWARDS.findIndex(a => a.id === awardId);
      d3.selectAll('.award-seg').filter((d, i) => i === awardIdx)
        .select('path')
        .attr('fill', '#ffd700')
        .attr('fill-opacity', 0.3)
        .attr('stroke', '#ffd700')
        .attr('stroke-width', 2);

      // Find connected players and sessions
      const awardConns = connections.filter(c => c.awardId === awardId);
      const connectedPlayers = new Set(awardConns.map(c => c.playerId));
      const connectedSessions = new Set(awardConns.map(c => c.sessionNum));

      // Highlight connected player segments
      d3.selectAll('.player-seg').filter((d, i) => connectedPlayers.has(PLAYERS[i].id))
        .select('path')
        .attr('fill-opacity', 0.5)
        .attr('stroke-opacity', 0.9);

      // Highlight connected sessions
      d3.selectAll('.session-seg').filter((d, i) => connectedSessions.has(SESSIONS[i].num))
        .select('path')
        .attr('fill-opacity', 0.5)
        .attr('stroke-opacity', 0.8);

      // Highlight connections
      d3.selectAll('.pa-link').filter(d => d.award.id === awardId)
        .attr('stroke-opacity', 0.6)
        .attr('stroke-width', d => linkWidthScale(d.count) + 1)
        .style('filter', 'url(#glow)');

      d3.selectAll('.as-link').filter(d => d.awardId === awardId)
        .attr('stroke-opacity', 0.5)
        .attr('stroke-width', 1.2)
        .style('filter', 'url(#glow)');

      // Build tooltip
      const winnerBreakdown = PLAYERS
        .map(p => ({ name: p.character, color: p.color, count: playerAwardCounts[p.id][awardId] }))
        .filter(x => x.count > 0)
        .sort((a, b) => b.count - a.count);

      const ttHtml = `
        <div class="tt-title">${award.icon} ${award.label}</div>
        <div class="tt-subtitle">${awardTotalCounts[awardId]} Total Wins — ${connectedSessions.size} Sessions</div>
        ${winnerBreakdown.map(wb => `
          <div class="tt-row">
            <span class="tt-label" style="color:${wb.color}">${wb.name}</span>
            <span class="tt-value" style="color:${wb.color}">${wb.count}</span>
          </div>
        `).join('')}
      `;
      showTooltip(ttHtml, event);
    }

    function highlightSession(sessionNum, event) {
      const session = SESSIONS.find(s => s.num === sessionNum);
      if (!session) return;

      // Dim everything
      d3.selectAll('.player-seg path').attr('fill-opacity', 0.08).attr('stroke-opacity', 0.15);
      d3.selectAll('.award-seg path').attr('fill-opacity', 0.15);
      d3.selectAll('.session-seg path').attr('fill-opacity', 0.06).attr('stroke-opacity', 0.1);
      d3.selectAll('.pa-link').attr('stroke-opacity', 0.03);
      d3.selectAll('.as-link').attr('stroke-opacity', 0.02);

      // Highlight this session segment
      const sIdx = sessionNum - 1;
      d3.selectAll('.session-seg').filter((d, i) => i === sIdx)
        .select('path')
        .attr('fill-opacity', 0.8)
        .attr('stroke-opacity', 1)
        .attr('stroke-width', 2)
        .style('filter', 'url(#glow-strong)');

      // Find connected awards and players for this session
      const sessionConns = connections.filter(c => c.sessionNum === sessionNum);
      const connectedAwards = new Set(sessionConns.map(c => c.awardId));
      const connectedPlayers = new Set(sessionConns.map(c => c.playerId));

      // Highlight connected award segments
      d3.selectAll('.award-seg').filter((d, i) => connectedAwards.has(AWARDS[i].id))
        .select('path')
        .attr('fill-opacity', 0.4)
        .attr('stroke', '#ffd700')
        .attr('stroke-width', 1.5);

      // Highlight connected player segments
      d3.selectAll('.player-seg').filter((d, i) => connectedPlayers.has(PLAYERS[i].id))
        .select('path')
        .attr('fill-opacity', 0.5)
        .attr('stroke-opacity', 0.9);

      // Highlight connected links (award->session only for this session, and the player->award for those awards)
      d3.selectAll('.as-link').filter(d => d.sessionNum === sessionNum)
        .attr('stroke-opacity', 0.6)
        .attr('stroke-width', 1.5)
        .style('filter', 'url(#glow)');

      // Also highlight player->award links for the specific awards given this session
      const paLinksToHighlight = sessionConns.map(c => `${c.playerId}-${c.awardId}`);
      d3.selectAll('.pa-link').filter(d => paLinksToHighlight.includes(`${d.player.id}-${d.award.id}`))
        .attr('stroke-opacity', 0.5)
        .attr('stroke-width', d => linkWidthScale(d.count) + 0.5)
        .style('filter', 'url(#glow)');

      // Build tooltip
      const qColor = qualityColor(session.quality);
      const awardsGiven = sessionConns.map(c => {
        const award = AWARDS.find(a => a.id === c.awardId);
        const player = PLAYERS.find(p => p.id === c.playerId);
        return { awardLabel: award.label, awardIcon: award.icon, playerName: player.character, playerColor: player.color };
      });

      const ttHtml = `
        <div class="tt-title">Session ${sessionNum}</div>
        <div class="tt-subtitle">Quality: <span style="color:${qColor}">${session.quality.toFixed(1)}</span> / 10</div>
        <div style="margin-top:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:#8a8ab5;margin-bottom:4px">Awards Given</div>
        ${awardsGiven.map(ag => `
          <div class="tt-row">
            <span class="tt-label">${ag.awardIcon} ${ag.awardLabel}</span>
            <span class="tt-value" style="color:${ag.playerColor}">${ag.playerName}</span>
          </div>
        `).join('')}
      `;
      showTooltip(ttHtml, event);
    }

    function clearHighlight() {
      // Restore all opacities
      d3.selectAll('.player-seg path')
        .attr('fill-opacity', 0.25)
        .attr('stroke-opacity', 0.6)
        .style('filter', null);

      d3.selectAll('.award-seg path')
        .attr('fill', awardFill)
        .attr('fill-opacity', 0.6)
        .attr('stroke', awardStroke)
        .attr('stroke-width', 1);

      d3.selectAll('.session-seg path')
        .attr('fill-opacity', 0.2)
        .attr('stroke-opacity', 0.4)
        .attr('stroke-width', 0.8)
        .style('filter', null);

      d3.selectAll('.pa-link')
        .attr('stroke-opacity', 0.15)
        .attr('stroke-width', d => linkWidthScale(d.count))
        .style('filter', null);

      d3.selectAll('.as-link')
        .attr('stroke-opacity', 0.08)
        .attr('stroke-width', 0.6)
        .style('filter', null);

      hideTooltip();
    }

    // ─── Legend ──────────────────────────────────────────────────────────────
    const legendContainer = d3.select('#legend');

    PLAYERS.forEach(player => {
      const item = legendContainer.append('div')
        .attr('class', 'legend-item')
        .on('mouseenter', function(event) {
          highlightPlayer(player.id, event);
        })
        .on('mousemove', function(event) { moveTooltip(event); })
        .on('mouseleave', function() { clearHighlight(); });

      item.append('div')
        .attr('class', 'legend-swatch')
        .style('background', player.color)
        .style('color', player.color);

      const textWrap = item.append('div');

      textWrap.append('div')
        .attr('class', 'legend-player')
        .style('color', player.color)
        .text(player.character);

      textWrap.append('div')
        .attr('class', 'legend-character')
        .text(`${player.player} — ${playerTotalWins[player.id]} awards`);
    });

    // ─── Entrance Animation ─────────────────────────────────────────────────
    // Fade in rings
    ringLayer.attr('opacity', 0)
      .transition().duration(800).delay(200)
      .attr('opacity', 1);

    connectionLayer.attr('opacity', 0)
      .transition().duration(1200).delay(600)
      .attr('opacity', 1);

    labelLayer.attr('opacity', 0)
      .transition().duration(800).delay(400)
      .attr('opacity', 1);

  })();
  </script>
</body>
</html>
