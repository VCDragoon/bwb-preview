<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@400;500&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#06060c;color:#e0e0e8;font-family:'Barlow',sans-serif;overflow-x:hidden}
body{min-height:100vh;background:#06060c;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px)}

.header{padding:32px 40px 12px;position:relative;z-index:10}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:3.4rem;letter-spacing:8px;
  background:linear-gradient(90deg,#FFD700,#FFA500,#FF6347);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;line-height:1}
.header .subtitle{font-family:'Barlow Condensed',sans-serif;font-size:0.95rem;
  color:#666680;letter-spacing:4px;text-transform:uppercase;margin-top:6px}
.header .concept{font-family:'Barlow',sans-serif;font-size:0.75rem;color:#444460;
  margin-top:4px;max-width:700px;line-height:1.5}

.controls{display:flex;align-items:center;gap:12px;padding:10px 40px;
  background:rgba(16,16,35,0.85);border-top:1px solid rgba(255,255,255,0.04);
  border-bottom:1px solid rgba(255,255,255,0.04);position:sticky;top:0;z-index:100;
  backdrop-filter:blur(16px)}
.controls button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
  color:#aaaacc;padding:5px 14px;border-radius:3px;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;letter-spacing:1.5px;
  text-transform:uppercase;transition:all 0.2s}
.controls button:hover{background:rgba(255,215,0,0.12);border-color:rgba(255,215,0,0.4);color:#FFD700}
.controls button.active{background:rgba(255,215,0,0.15);border-color:#FFD700;color:#FFD700;
  box-shadow:0 0 10px rgba(255,215,0,0.15)}
.time-display{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:#FFD700;min-width:90px;text-align:center}
.speed-label{font-family:'Barlow Condensed',sans-serif;color:#555570;font-size:0.75rem;letter-spacing:2px}
.separator{width:1px;height:20px;background:rgba(255,255,255,0.06)}

.overview-wrap{padding:12px 40px 8px;background:rgba(12,12,28,0.5)}
.overview-title{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;color:#555570;
  letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.overview-canvas-box{position:relative;border:1px solid rgba(255,255,255,0.03);border-radius:4px;overflow:hidden}
#overview-canvas{width:100%;height:50px;display:block}
#overview-playhead{position:absolute;top:0;bottom:0;width:2px;left:0;
  background:linear-gradient(180deg,rgba(255,215,0,0.9),rgba(255,215,0,0.2));pointer-events:none;
  transition:none;z-index:5}

#main-container{position:relative}
.track-wrapper{position:relative}
.track-row{display:flex;align-items:stretch;position:relative;
  border-bottom:1px solid rgba(255,255,255,0.015);cursor:pointer;
  transition:background 0.3s ease}
.track-row:nth-child(odd){background:rgba(255,255,255,0.008)}
.track-row:hover{background:rgba(255,215,0,0.025)}
.track-row.expanded{background:rgba(255,215,0,0.04);border-bottom-color:rgba(255,215,0,0.08)}

.lbl-left{width:140px;min-width:140px;padding:0 14px;text-align:right;
  display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:0;
  background:inherit;position:relative;z-index:5}
.lbl-left .sid{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#FFD700;font-weight:500;
  text-shadow:0 0 8px rgba(255,215,0,0.3)}
.lbl-left .sname{font-family:'Barlow',sans-serif;font-size:0.5rem;color:#444460;
  max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2}

.canvas-wrap{flex:1;position:relative;overflow:hidden;min-width:0}
.canvas-wrap canvas{display:block;width:100%}

.lbl-right{width:120px;min-width:120px;padding:0 12px;
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:0;
  background:inherit;position:relative;z-index:5}
.lbl-right .pace{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;color:#32CD32;
  text-shadow:0 0 6px rgba(50,205,50,0.2)}
.lbl-right .arc{font-family:'Barlow Condensed',sans-serif;font-size:0.55rem;color:#9370DB}

.peak-flag{position:absolute;top:1px;z-index:10;pointer-events:none;transform:translateX(-50%)}
.peak-flag svg{filter:drop-shadow(0 0 3px rgba(255,99,71,0.6))}

.detail-panel{overflow:hidden;max-height:0;transition:max-height 0.5s cubic-bezier(0.4,0,0.2,1);
  background:rgba(8,8,22,0.7)}
.detail-panel.open{max-height:300px}
.detail-inner{padding:10px 14px 10px 154px;display:flex;flex-wrap:wrap;gap:4px 10px;
  border-top:1px solid rgba(255,215,0,0.06)}
.detail-chip{font-family:'Barlow',sans-serif;font-size:0.6rem;color:#aaaacc;
  padding:3px 8px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);
  display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,0.02);
  transition:background 0.2s}
.detail-chip:hover{background:rgba(255,255,255,0.06)}
.detail-chip .cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.detail-chip .cval{font-family:'JetBrains Mono',monospace;font-size:0.6rem;opacity:0.7}
.detail-chip .clbl{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.playhead-line{position:absolute;top:0;width:2px;pointer-events:none;z-index:50;
  background:linear-gradient(180deg,rgba(255,215,0,0.8),rgba(255,215,0,0.1));
  box-shadow:0 0 8px rgba(255,215,0,0.3)}

.legend-bar{display:flex;flex-wrap:wrap;gap:6px 14px;padding:14px 40px;
  background:rgba(12,12,28,0.4);border-top:1px solid rgba(255,255,255,0.03)}
.legend-item{display:flex;align-items:center;gap:4px;font-family:'Barlow',sans-serif;
  font-size:0.6rem;color:#666680}
.legend-sw{width:14px;height:5px;border-radius:2px}

.stats-footer{padding:18px 40px;display:flex;gap:28px;flex-wrap:wrap;
  border-top:1px solid rgba(255,255,255,0.03);background:rgba(8,8,20,0.5)}
.stat-box{text-align:center}
.stat-box .sv{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;
  background:linear-gradient(135deg,#FFD700,#FF6347);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent}
.stat-box .sl{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;
  color:#555570;letter-spacing:2px;text-transform:uppercase}

.tooltip{position:fixed;z-index:10000;pointer-events:none;
  background:rgba(6,6,14,0.96);border:1px solid rgba(255,215,0,0.25);
  border-radius:6px;padding:10px 14px;max-width:340px;
  backdrop-filter:blur(16px);box-shadow:0 8px 32px rgba(0,0,0,0.7);display:none}
.tooltip .tt-sid{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:#FFD700;margin-bottom:2px}
.tooltip .tt-win{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:#e0e0e8;letter-spacing:1px}
.tooltip .tt-emo{font-family:'Barlow Condensed',sans-serif;font-size:0.8rem;margin:2px 0}
.tooltip .tt-score{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#8888aa}
.tooltip .tt-peak{font-family:'Barlow',sans-serif;font-size:0.65rem;color:#FF6347;
  margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,255,255,0.06)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
</style>
</head>

  'Surprise/Confusion':'#DDA0DD','Surprise':'#DDA0DD',
  'Neutral':'#808080','Suspense/Unease':'#9370DB',
  'Satisfaction/Relief':'#98FB98','Relief/Satisfaction':'#98FB98','Relief':'#98FB98',
  'Anger/Rage':'#B22222','Compassion/Empathy':'#FF69B4',
  'Nostalgia/Compassion':'#FF69B4','Hope':'#7FFFD4','Mixed':'#C0C0C0',
  'Intrigue':'#9370DB','Concern':'#CD853F','Reflection':'#778899',
  'Reflective':'#778899','Despair':'#2F4F4F','Accomplishment':'#FFD700'
};

function eColor(e) {
  if (!e) return '#808080';
  if (EC[e]) return EC[e];
  const lo = e.toLowerCase();
  for (const [k,v] of Object.entries(EC)) {
    if (lo.includes(k.toLowerCase().split('/')[0])) return v;
  }
  return '#808080';
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// ======== CONFIG ========
const TH_COLLAPSED = 24;
const TH_EXPANDED = 100;
let SWEEP_MS = 10000;
let progress = 0; // 0..1
let playing = false;
let lastTs = null;
let expandedIdx = null;
const dpr = window.devicePixelRatio || 1;

const mainEl = document.getElementById('main-container');
const ttEl = document.getElementById('tooltip');
const tracks = [];

// ======== BUILD TRACKS ========
DATA.forEach((sess, idx) => {
  const wrapper = document.createElement('div');
  wrapper.className = 'track-wrapper';

  const row = document.createElement('div');
  row.className = 'track-row';

  // Left label
  const lblL = document.createElement('div');
  lblL.className = 'lbl-left';
  const safeLabel = sess.label || '';
  lblL.innerHTML = '<span class="sid">' + sess.sid + '</span><span class="sname" title="' +
    safeLabel.replace(/"/g, '&quot;') + '">' + safeLabel + '</span>';
  row.appendChild(lblL);

  // Canvas
  const cWrap = document.createElement('div');
  cWrap.className = 'canvas-wrap';
  const cvs = document.createElement('canvas');
  cvs.height = TH_COLLAPSED * dpr;
  cvs.style.height = TH_COLLAPSED + 'px';
  cWrap.appendChild(cvs);

  // Peak flag
  if (sess.peak && sess.peak.pct >= 0) {
    const flag = document.createElement('div');
    flag.className = 'peak-flag';
    flag.style.left = sess.peak.pct + '%';
    flag.innerHTML = '<svg width="8" height="8" viewBox="0 0 8 8"><polygon points="4,0 8,8 0,8" fill="#FF6347"/></svg>';
    cWrap.appendChild(flag);
  }

  row.appendChild(cWrap);

  // Right label
  const lblR = document.createElement('div');
  lblR.className = 'lbl-right';
  lblR.innerHTML = '<span class="pace">' + (sess.pace||'') + '</span><span class="arc">' + (sess.arc||'') + '</span>';
  row.appendChild(lblR);

  wrapper.appendChild(row);

  // Detail panel
  const detail = document.createElement('div');
  detail.className = 'detail-panel';
  const inner = document.createElement('div');
  inner.className = 'detail-inner';
  sess.w.forEach(w => {
    const c = eColor(w.e);
    const chip = document.createElement('span');
    chip.className = 'detail-chip';
    chip.innerHTML = '<span class="cdot" style="background:' + c + ';box-shadow:0 0 4px ' + c + '"></span>' +
      '<span class="clbl">' + w.l + '</span>' +
      '<span class="cval">' + (w.s > 0 ? '+' : '') + w.s + '</span>';
    inner.appendChild(chip);
  });
  detail.appendChild(inner);
  wrapper.appendChild(detail);

  mainEl.appendChild(wrapper);
  tracks.push({ sess, cvs, cWrap, row, detail, expanded: false });
});

// ======== DRAWING ========
function drawTrack(t) {
  const sess = t.sess;
  const cvs = t.cvs;
  const isExp = t.expanded;
  const th = isExp ? TH_EXPANDED : TH_COLLAPSED;
  const rect = t.cWrap.getBoundingClientRect();
  const w = Math.max(rect.width, 100);

  cvs.width = Math.round(w * dpr);
  cvs.height = Math.round(th * dpr);
  cvs.style.height = th + 'px';
  cvs.style.width = '100%';

  const ctx = cvs.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, th);

  const cy = th / 2;
  const maxAmp = cy - 2;
  const wins = sess.w;
  if (!wins.length) return;

  // Build point array, ensure 0 and 100 endpoints
  let pts = wins.map(d => ({
    x: (d.p / 100) * w,
    amp: (Math.abs(d.s) / 10) * maxAmp,
    s: d.s,
    col: eColor(d.e),
    emo: d.e,
    lbl: d.l,
    pct: d.p
  }));

  if (pts[0].pct > 0) pts.unshift({ ...pts[0], x: 0, pct: 0 });
  if (pts[pts.length-1].pct < 100) pts.push({ ...pts[pts.length-1], x: w, pct: 100 });

  const playX = progress * w;

  // Draw segment by segment
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i+1];
    const steps = Math.max(4, Math.ceil((b.x - a.x) / 1.5));

    // Build micro-points for this segment
    const micro = [];
    for (let j = 0; j <= steps; j++) {
      const t2 = j / steps;
      const x = a.x + (b.x - a.x) * t2;
      const amp = a.amp + (b.amp - a.amp) * t2;
      const s = a.s + (b.s - a.s) * t2;
      micro.push({ x, amp, s });
    }

    // Color gradient
    const grad = ctx.createLinearGradient(a.x, 0, b.x, 0);
    const [r1,g1,b1] = hexToRgb(a.col);
    const [r2,g2,b2] = hexToRgb(b.col);
    grad.addColorStop(0, `rgba(${r1},${g1},${b1},1)`);
    grad.addColorStop(1, `rgba(${r2},${g2},${b2},1)`);

    // Alpha based on playhead
    const midX = (a.x + b.x) / 2;
    ctx.globalAlpha = midX <= playX ? 0.88 : 0.15;

    // Top waveform
    ctx.beginPath();
    ctx.moveTo(micro[0].x, cy);
    for (const m of micro) {
      const topY = cy - m.amp * (m.s >= 0 ? 1 : 0.25);
      ctx.lineTo(m.x, topY);
    }
    ctx.lineTo(micro[micro.length-1].x, cy);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Bottom mirror
    ctx.beginPath();
    ctx.moveTo(micro[0].x, cy);
    for (const m of micro) {
      const botY = cy + m.amp * (m.s < 0 ? 1 : 0.25);
      ctx.lineTo(m.x, botY);
    }
    ctx.lineTo(micro[micro.length-1].x, cy);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  // Center line
  ctx.beginPath();
  ctx.moveTo(0, cy);
  ctx.lineTo(w, cy);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // If expanded, draw data point dots and glow
  if (isExp) {
    pts.forEach(p => {
      if (p.pct <= 0 || p.pct >= 100) return;
      // Glow
      if (Math.abs(p.s) >= 5) {
        const grd = ctx.createRadialGradient(p.x, cy, 0, p.x, cy, 25);
        const [r,g,b] = hexToRgb(p.col);
        grd.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(p.x, cy, 25, 0, Math.PI * 2);
        ctx.fill();
      }
      // Dot
      const dotY = p.s >= 0 ? cy - p.amp : cy + p.amp;
      ctx.beginPath();
      ctx.arc(p.x, dotY, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = p.col;
      ctx.fill();
      ctx.strokeStyle = '#06060c';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Score label if expanded
      ctx.font = '500 9px "JetBrains Mono"';
      ctx.fillStyle = p.col;
      ctx.textAlign = 'center';
      const ly = p.s >= 0 ? dotY - 7 : dotY + 12;
      ctx.fillText((p.s > 0 ? '+' : '') + p.s, p.x, ly);
    });
  }

  // Playhead line on this track
  if (playX > 0 && playX < w) {
    ctx.beginPath();
    ctx.moveTo(playX, 0);
    ctx.lineTo(playX, th);
    ctx.strokeStyle = 'rgba(255,215,0,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawOverview() {
  const cvs = document.getElementById('overview-canvas');
  const rect = cvs.parentElement.getBoundingClientRect();
  const w = Math.max(rect.width, 100);
  const h = 50;

  cvs.width = Math.round(w * dpr);
  cvs.height = Math.round(h * dpr);
  cvs.style.height = h + 'px';

  const ctx = cvs.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);

  const cy = h / 2;
  const maxAmp = cy - 3;

  // Aggregate by percentage bucket
  const buckets = Array.from({length: 101}, () => ({ sum: 0, cnt: 0, emos: {} }));
  DATA.forEach(s => s.w.forEach(win => {
    const bi = Math.min(100, Math.round(win.p));
    buckets[bi].sum += win.s;
    buckets[bi].cnt += 1;
    buckets[bi].emos[win.e] = (buckets[bi].emos[win.e] || 0) + 1;
  }));

  const aggPts = [];
  for (let i = 0; i <= 100; i++) {
    const b = buckets[i];
    if (b.cnt === 0) continue;
    const avg = b.sum / b.cnt;
    let topEmo = 'Neutral', topC = 0;
    for (const [e, c] of Object.entries(b.emos)) {
      if (c > topC) { topC = c; topEmo = e; }
    }
    aggPts.push({ x: (i/100)*w, s: avg, col: eColor(topEmo) });
  }

  // Smooth
  const sm = aggPts.map((p, i) => {
    const win = 2;
    let sum = 0, cnt = 0;
    for (let j = Math.max(0,i-win); j <= Math.min(aggPts.length-1,i+win); j++) {
      sum += aggPts[j].s; cnt++;
    }
    return { ...p, s: sum / cnt };
  });

  if (sm.length < 2) return;

  const playX = progress * w;

  for (let i = 0; i < sm.length - 1; i++) {
    const a = sm[i], b = sm[i+1];
    const a1 = (Math.abs(a.s)/10) * maxAmp;
    const a2 = (Math.abs(b.s)/10) * maxAmp;
    const grad = ctx.createLinearGradient(a.x, 0, b.x, 0);
    grad.addColorStop(0, a.col);
    grad.addColorStop(1, b.col);

    const midX = (a.x + b.x) / 2;
    ctx.globalAlpha = midX <= playX ? 0.85 : 0.18;
    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(a.x, cy); ctx.lineTo(a.x, cy - a1); ctx.lineTo(b.x, cy - a2); ctx.lineTo(b.x, cy);
    ctx.closePath(); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(a.x, cy); ctx.lineTo(a.x, cy + a1); ctx.lineTo(b.x, cy + a2); ctx.lineTo(b.x, cy);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Center line
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 0.5; ctx.stroke();

  // Playhead
  document.getElementById('overview-playhead').style.left = (playX) + 'px';
}

function drawAll() {
  tracks.forEach(t => drawTrack(t));
  drawOverview();
}

// ======== ANIMATION ========
function animate(ts) {
  if (!lastTs) lastTs = ts;
  const dt = ts - lastTs;
  lastTs = ts;

  if (playing) {
    progress += dt / SWEEP_MS;
    if (progress >= 1) {
      progress = 1;
      playing = false;
      document.getElementById('btn-play').classList.remove('active');
    }
    updateTime();
    drawAll();
  }
  requestAnimationFrame(animate);
}

function updateTime() {
  const cur = (progress * SWEEP_MS / 1000).toFixed(1);
  const tot = (SWEEP_MS / 1000).toFixed(1);
  document.getElementById('time-display').textContent = cur + 's / ' + tot + 's';
}

// ======== CONTROLS ========
document.getElementById('btn-play').onclick = () => {
  if (progress >= 1) progress = 0;
  playing = true; lastTs = null;
  document.getElementById('btn-play').classList.add('active');
  document.getElementById('btn-pause').classList.remove('active');
};
document.getElementById('btn-pause').onclick = () => {
  playing = false;
  document.getElementById('btn-pause').classList.add('active');
  document.getElementById('btn-play').classList.remove('active');
};
document.getElementById('btn-reset').onclick = () => {
  playing = false; progress = 0; lastTs = null;
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('btn-pause').classList.remove('active');
  updateTime(); drawAll();
};
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    SWEEP_MS = parseInt(btn.dataset.speed) * 1000;
    updateTime();
  };
});

// ======== INTERACTION ========
tracks.forEach((t, idx) => {
  const cvs = t.cvs;

  cvs.addEventListener('mousemove', (e) => {
    const rect = cvs.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const pct = (mx / rect.width) * 100;
    let closest = t.sess.w[0];
    let minD = Infinity;
    t.sess.w.forEach(win => {
      const d = Math.abs(win.p - pct);
      if (d < minD) { minD = d; closest = win; }
    });

    const col = eColor(closest.e);
    let html = '<div class="tt-sid">' + t.sess.sid + ' &mdash; ' + (t.sess.label || '') + '</div>';
    html += '<div class="tt-win">' + closest.l + '</div>';
    html += '<div class="tt-emo" style="color:' + col + '">' + closest.e + '</div>';
    html += '<div class="tt-score">Sentiment: ' + (closest.s > 0 ? '+' : '') + closest.s + ' / 10</div>';
    html += '<div class="tt-score">Position: ' + closest.p.toFixed(0) + '%</div>';
    if (t.sess.peak && Math.abs(t.sess.peak.pct - pct) < 6) {
      html += '<div class="tt-peak">&#9650; ' + t.sess.peak.title + '</div>';
    }
    ttEl.innerHTML = html;
    ttEl.style.display = 'block';

    let tx = e.clientX + 14, ty = e.clientY - 14;
    const tb = ttEl.getBoundingClientRect();
    if (tx + tb.width > window.innerWidth - 10) tx = e.clientX - tb.width - 14;
    if (ty + tb.height > window.innerHeight - 10) ty = e.clientY - tb.height - 10;
    if (ty < 4) ty = 4;
    ttEl.style.left = tx + 'px';
    ttEl.style.top = ty + 'px';
  });

  cvs.addEventListener('mouseleave', () => { ttEl.style.display = 'none'; });

  t.row.addEventListener('click', () => {
    if (expandedIdx === idx) {
      t.expanded = false;
      t.row.classList.remove('expanded');
      t.detail.classList.remove('open');
      expandedIdx = null;
    } else {
      if (expandedIdx !== null) {
        tracks[expandedIdx].expanded = false;
        tracks[expandedIdx].row.classList.remove('expanded');
        tracks[expandedIdx].detail.classList.remove('open');
      }
      t.expanded = true;
      t.row.classList.add('expanded');
      t.detail.classList.add('open');
      expandedIdx = idx;
    }
    // Redraw after DOM update
    requestAnimationFrame(() => drawAll());
  });
});

// ======== LEGEND ========
const usedEmos = new Set();
DATA.forEach(s => s.w.forEach(w => usedEmos.add(w.e)));
const legendEl = document.getElementById('legend-bar');
[...usedEmos].sort().forEach(emo => {
  const c = eColor(emo);
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = '<span class="legend-sw" style="background:' + c + ';box-shadow:0 0 4px ' + c + '60"></span>' + emo;
  legendEl.appendChild(item);
});

// ======== STATS ========
const allS = DATA.flatMap(s => s.w.map(w => w.s));
const avgS = (allS.reduce((a,b) => a+b, 0) / allS.length).toFixed(1);
const maxS = Math.max(...allS);
const minS = Math.min(...allS);
const paceMap = {};
DATA.forEach(s => { if (s.pace) paceMap[s.pace] = (paceMap[s.pace]||0) + 1; });
const topPace = Object.entries(paceMap).sort((a,b) => b[1]-a[1])[0];
const statsEl = document.getElementById('stats-footer');
[
  ['46', 'Sessions'],
  [allS.length, 'Data Points'],
  [(avgS > 0 ? '+' : '') + avgS, 'Avg Sentiment'],
  ['+' + maxS, 'Peak High'],
  ['' + minS, 'Deepest Low'],
  [topPace ? topPace[0] : '', 'Top Pace Type']
].forEach(([v, l]) => {
  const box = document.createElement('div');
  box.className = 'stat-box';
  box.innerHTML = '<div class="sv">' + v + '</div><div class="sl">' + l + '</div>';
  statsEl.appendChild(box);
});

// ======== INIT ========
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawAll, 150);
});

requestAnimationFrame(() => {
  drawAll();
  requestAnimationFrame(animate);
  // Auto-play after short delay
  setTimeout(() => {
    playing = true; lastTs = null;
    document.getElementById('btn-play').classList.add('active');
  }, 600);
});
</script>
