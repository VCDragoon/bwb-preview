<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE BROADSHEET &mdash; Campaign Newspaper Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0e0d0a;
  --bg-card: #161410;
  --text-cream: #d4c9a8;
  --text-headline: #e8d5a0;
  --text-dim: #8a7f68;
  --text-byline: #a09478;
  --border-warm: #3a3428;
  --border-light: #4a4232;
  --accent-primary: #d4a843;
  --herald: #d4a843;
  --tribune: #c44030;
  --watcher: #a8a8c0;
  --sentinel: #7898c8;
  --ledger: #c47a3a;
  --dispatch: #5a6a9a;
}

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg-deep);
  color: var(--text-cream);
  font-family: 'Barlow', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Paper grain overlay */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,245,220,0.008) 2px, rgba(255,245,220,0.008) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255,245,220,0.005) 2px, rgba(255,245,220,0.005) 4px);
  pointer-events: none;
  z-index: 9999;
}

/* ===== ARCHIVE HEADER ===== */
.archive-header {
  text-align: center;
  padding: 24px 20px 12px;
  border-bottom: 1px solid var(--border-warm);
  background: linear-gradient(180deg, #12100a 0%, var(--bg-deep) 100%);
  position: sticky;
  top: 0;
  z-index: 100;
}

.archive-header h1 {
  font-family: 'Cinzel', serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: 8px;
  text-transform: uppercase;
  color: var(--accent-primary);
  margin-bottom: 2px;
}

.archive-header .subtitle {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 300;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text-dim);
}

/* ===== SESSION NAVIGATOR ===== */
.session-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 8px 20px;
  background: rgba(10,9,6,0.97);
  border-bottom: 1px solid var(--border-warm);
  flex-wrap: wrap;
  position: sticky;
  top: 62px;
  z-index: 99;
}

.session-tab {
  width: 30px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: 2px;
}

.session-tab:hover {
  border-color: var(--accent-primary);
  color: var(--text-cream);
  background: rgba(212,168,67,0.06);
}

.session-tab.active {
  font-weight: 700;
  color: var(--accent-primary);
  border-color: var(--accent-primary);
  background: rgba(212,168,67,0.12);
}

/* ===== CARD STACK ===== */
.card-stack {
  max-width: 800px;
  margin: 0 auto;
  padding: 16px 16px 80px;
  display: none;
}

.card-stack.active { display: block; animation: fadeIn 0.4s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.session-header {
  text-align: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-warm);
}

.session-header .session-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
}

.session-header .session-title {
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-headline);
  margin-top: 4px;
  line-height: 1.3;
}

/* ===== NEWSPAPER CARD ===== */
.news-card {
  background: var(--bg-card);
  border: 1px solid var(--border-warm);
  border-left: 4px solid var(--accent-primary);
  margin-bottom: 12px;
  border-radius: 2px;
  transition: border-color 0.3s, box-shadow 0.3s;
  overflow: hidden;
}

.news-card:hover {
  box-shadow: 0 2px 20px rgba(0,0,0,0.4);
}

.news-card.herald { border-left-color: var(--herald); }
.news-card.tribune { border-left-color: var(--tribune); }
.news-card.watcher { border-left-color: var(--watcher); }
.news-card.sentinel { border-left-color: var(--sentinel); }
.news-card.ledger { border-left-color: var(--ledger); }
.news-card.dispatch { border-left-color: var(--dispatch); }

.card-header {
  padding: 14px 18px 10px;
  cursor: pointer;
  user-select: none;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.paper-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 1px;
}

.paper-name.herald { color: var(--herald); }
.paper-name.tribune { color: var(--tribune); font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; }
.paper-name.watcher { color: var(--watcher); font-family: 'Cormorant Garamond', serif; font-size: 16px; font-style: italic; }
.paper-name.sentinel { color: var(--sentinel); font-family: 'Cormorant Garamond', serif; }
.paper-name.ledger { color: var(--ledger); font-family: 'Special Elite', monospace; font-size: 14px; }
.paper-name.dispatch { color: var(--dispatch); font-family: 'JetBrains Mono', monospace; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; }

.tag-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  padding: 2px 8px;
  border-radius: 2px;
  white-space: nowrap;
}

.tag-badge.herald { background: rgba(212,168,67,0.12); color: var(--herald); border: 1px solid rgba(212,168,67,0.25); }
.tag-badge.tribune { background: rgba(196,64,48,0.12); color: var(--tribune); border: 1px solid rgba(196,64,48,0.25); }
.tag-badge.watcher { background: rgba(168,168,192,0.1); color: var(--watcher); border: 1px solid rgba(168,168,192,0.2); }
.tag-badge.sentinel { background: rgba(120,152,200,0.1); color: var(--sentinel); border: 1px solid rgba(120,152,200,0.2); }
.tag-badge.ledger { background: rgba(196,122,58,0.1); color: var(--ledger); border: 1px solid rgba(196,122,58,0.2); }
.tag-badge.dispatch { background: rgba(90,106,154,0.1); color: var(--dispatch); border: 1px solid rgba(90,106,154,0.2); }

.card-headline {
  font-family: 'Cinzel', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text-headline);
  line-height: 1.25;
  margin-bottom: 4px;
  transition: color 0.2s;
}

.card-header:hover .card-headline { color: #f0e0b0; }

.news-card.tribune .card-headline {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 19px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #e8594a;
}

.news-card.watcher .card-headline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
}

.news-card.dispatch .card-headline {
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #8898c0;
}

.news-card.ledger .card-headline {
  font-family: 'Special Elite', monospace;
  font-size: 15px;
}

.card-byline {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-style: italic;
  color: var(--text-byline);
  letter-spacing: 1px;
}

.card-editorial {
  font-style: italic;
  font-size: 15px;
  color: var(--text-cream);
  opacity: 0.85;
  line-height: 1.5;
  padding: 0 18px;
  margin-bottom: 0;
  border-left: 2px solid var(--border-warm);
  margin-left: 18px;
}

.news-card.herald .card-editorial { border-left-color: rgba(212,168,67,0.4); }
.news-card.tribune .card-editorial { border-left-color: rgba(196,64,48,0.4); }
.news-card.watcher .card-editorial { border-left-color: rgba(168,168,192,0.3); }
.news-card.sentinel .card-editorial { border-left-color: rgba(120,152,200,0.3); }
.news-card.ledger .card-editorial { border-left-color: rgba(196,122,58,0.3); }
.news-card.dispatch .card-editorial { border-left-color: rgba(90,106,154,0.3); }

.card-body {
  padding: 0 18px 16px;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text-cream);
  display: none;
  animation: expandBody 0.3s ease;
}

.card-body.open { display: block; }

@keyframes expandBody {
  from { opacity: 0; }
  to { opacity: 1; }
}

.card-body p {
  margin-bottom: 8px;
}

.news-card.dispatch .card-body {
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
}

.expand-indicator {
  float: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text-dim);
  transition: transform 0.3s;
}

.card-header.open .expand-indicator { transform: rotate(180deg); }

/* Redacted text for Dispatch */
.redacted {
  background: #5a6a9a;
  color: #5a6a9a;
  padding: 0 4px;
  border-radius: 1px;
  cursor: default;
  user-select: none;
}

/* ===== MOBILE NAV ===== */
.mobile-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
  background: rgba(10,8,6,0.97);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border-warm);
  padding: 8px 16px;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.mobile-nav-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 2px solid var(--accent-primary);
  background: rgba(212,168,67,0.08);
  color: var(--accent-primary);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.mobile-nav-btn:active { transform: scale(0.9); background: rgba(212,168,67,0.2); }

.mobile-nav-info {
  flex: 1;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text-dim);
}

.mobile-nav-info .mobile-session {
  font-size: 14px;
  font-weight: 700;
  color: var(--accent-primary);
}

.mobile-nav-info .mobile-paper {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Keyboard hint */
.keyboard-hint {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: rgba(14,12,10,0.9);
  border: 1px solid var(--border-warm);
  padding: 6px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text-dim);
  z-index: 200;
  pointer-events: none;
  opacity: 0.5;
}

.keyboard-hint kbd {
  display: inline-block;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border-light);
  padding: 1px 5px;
  border-radius: 2px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 640px) {
  .session-nav { display: none; }
  .mobile-nav { display: flex !important; }
  .keyboard-hint { display: none; }
  .card-headline { font-size: 16px; }
  .news-card.tribune .card-headline { font-size: 18px; }
  .news-card.dispatch .card-headline { font-size: 14px; }
  .card-stack { padding: 12px 8px 80px; }
  .archive-header { padding: 14px 14px 8px; }
  .archive-header h1 { font-size: 18px; letter-spacing: 5px; }
}

@media print {
  .archive-header, .session-nav, .keyboard-hint, .mobile-nav { display: none; }
  .card-stack { display: block !important; page-break-after: always; }
  .card-body { display: block !important; }
}
</style>
</head>
<body>

<div class="archive-header">
  <h1>The Broadsheet</h1>
  <div class="subtitle">Campaign Newspaper Archive &mdash; 46 Sessions &mdash; 276 Articles &mdash; 6 Publications</div>
</div>

<div class="session-nav" id="sessionNav"></div>

<div id="cardContainer"></div>

<div class="keyboard-hint">
  <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Navigate sessions
</div>

<div class="mobile-nav" id="mobileNav">
  <button class="mobile-nav-btn" onclick="go(currentSession-1)">&larr;</button>
  <div class="mobile-nav-info">
    <div class="mobile-session" id="mobileSessionNum">S001</div>
    <div class="mobile-paper" id="mobilePaperName">6 Newspapers</div>
  </div>
  <button class="mobile-nav-btn" onclick="go(currentSession+1)">&rarr;</button>
</div>

<script>
// ============================================================
// THE BROADSHEET v4 — 276 Articles (46 sessions x 6 newspapers)
// ============================================================

const PAPERS = ['herald','tribune','watcher','sentinel','ledger','dispatch'];

const PAPER_META = {
  herald: { name: 'Castle Corras Herald', tag: '\u2726 VERIFIED BY THE CROWN', byline: 'By Aldric Pennsworth' },
  tribune: { name: 'Triboar Tribune', tag: '\u26A0 BREAKING', byline: 'By Marta Thorngage' },
  watcher: { name: 'Waterdeep Watcher', tag: '\u25C8 ANALYSIS', byline: 'By Lady Seraphine Ashworth' },
  sentinel: { name: 'Silver Marches Sentinel', tag: '\u2727 PERSPECTIVE', byline: 'By Brother Cael' },
  ledger: { name: 'Luskan Ledger', tag: '\u25C6 FROM OUR SOURCES', byline: 'By Vex' },
  dispatch: { name: "Harper's Dispatch", tag: '\u25FC FIELD REPORT', byline: 'Filed by: QUILL & SHADOW' }
};

const SESSION_LABELS = {
  1:"Castle Corras and the Master of Whispers",2:"The Loincloth Heist",3:"Billabong's Celestial Ascent",4:"The Chronicler's Mark",5:"The Hall of Whispers",6:"The Archmage's Trap",7:"The Eyelash Heist",8:"The Self-Fulfilling Prophecy",9:"Sid the Mimic Revealed",10:"Wrath of Nature",11:"Argentus Betrays the Party",12:"The Balor Summoning",13:"The Blood Pact with Malachar",14:"The Quaggoth Hamster Ball",15:"The Spark Swap Heist",16:"The Fates Card",17:"King Corras Declares War",18:"Dahlia Denies the Dragon",19:"The Keg of Alchemist's Fire",20:"The Summer Star Detonation",21:"Dark Boons and the Underdark",22:"Into Webb's Edge",23:"The Currency of Secrets",24:"Ash Tricks the Spider Dragon",25:"The BWB Federation",26:"Crash Landing at Castle Corras",27:"Descent Into the Soul Forge",28:"Pack Dominance",29:"Breaking the Infernal Contract",30:"The Ceaseless Maw",31:"Billabong Kills Ash",32:"SavannahBelle Unmasks the Lich",33:"Corras Surrenders",34:"The Nat-1 That Killed a Lich",35:"Enter Death House",36:"SavannahBelle's Toast with Strahd",37:"Corras Resists the Master",38:"Escape from Death House",39:"Village of Barovia",40:"Madam Eva's Gambit",41:"A New Vampire Spawn",42:"Shrum's Mirror Restored",43:"Draining Lord Neverember",44:"The Leg Amputation",45:"The Butcher's Skin Suit",46:"Caught by the Wild Hunt"
};

// ============================================================
// ALL 276 ARTICLES — 6 per session
// Key: session number -> array of 6 articles (herald, tribune, watcher, sentinel, ledger, dispatch)
// ============================================================
const ARTICLES = {
// ===== S001: Castle Corras and the Master of Whispers =====
1: [
{h:"Glorious Heroes Establish Stronghold at Castle Corras",b:"By Aldric Pennsworth",e:"A new era dawns as a magnificent band of adventurers takes residence in our beloved Castle Corras.",t:"The visionary Corras and his companions have chosen Castle Corras as their seat of power, bringing unprecedented security to the region. The Master of Whispers has begun intelligence operations to safeguard all citizens. A warded door in the basement is being studied with great scholarly care, and absolutely no one was paralyzed for two hours."},
{h:"UNKNOWN MERCENARIES SEIZE CASTLE, CLAIM IT AS THEIRS",b:"By Marta Thorngage",e:"A band of sellswords has walked into an empty castle and declared themselves lords. This is fine.",t:"Let's be clear: a group of nobodies found an unoccupied castle and just MOVED IN. No deed. No charter. No authority. One of them got paralyzed messing with a warded door in the basement and they call this INVESTIGATING. Meanwhile their so-called intelligence advisor goes by MASTER OF WHISPERS. How is nobody alarmed by this?"},
{h:"Self-Appointed Lords Neglect Basic Due Diligence at Castle Corras",b:"By Lady Seraphine Ashworth",e:"One observes, with the weariest of sighs, that the new occupants of Castle Corras did not think to check what lurked behind their own basement door before claiming dominion.",t:"The adventurers have taken residence at Castle Corras without, it appears, conducting even a cursory magical survey of the premises. One of their number, a sorceress called Ash, was rendered immobile for two hours after communing with an entity bound to a heavily warded door. In Waterdeep, this would disqualify one from managing a root cellar."},
{h:"New Castle Residents Show Promise Despite Reckless Start",b:"By Brother Cael",e:"They are brave, certainly. But communing with unknown entities behind warded doors suggests a troubling comfort with risk.",t:"The adventuring party at Castle Corras has begun establishing itself as a regional power, hiring a Master of Whispers and investigating the castle's ancient secrets. However, one must note that Ash's communion with the entity Argentus ended in two hours of paralysis. Courage without caution is merely recklessness wearing a hero's mask."},
{h:"New Players at Castle Corras, Worth Watching",b:"By Vex",e:"Five adventurers walk into an empty castle and call themselves lords. In Luskan, we call that initiative.",t:"Word from the north is a crew's set up shop at Castle Corras. Got themselves a spymaster, some muscle, and a wizard who got herself frozen solid poking at a magic door. The smart money says watch this space. Anyone bold enough to squat a castle and hire an intelligence network on day one either knows what they're doing or is about to learn the hard way."},
{h:"SITUATION REPORT: NEW ENTITY ESTABLISHED AT CASTLE CORRAS",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Unknown adventuring party has occupied Castle Corras and initiated intelligence operations. ASSESSMENT: Monitoring required.",t:"ASSETS identified: Corras (rogue, leadership disposition), Ash (arcane, connection to entity designated ARGENTUS), Billabong (martial), Orla (druidic, possible HARPER-ALIGNED values), Dahlia (divine). CONCERN: Ash communed with unknown entity through warded door. Entity ARGENTUS flagged for further investigation. THREAT LEVEL: LOW. Recommend passive surveillance."}
],
// ===== S002: The Loincloth Heist =====
2: [
{h:"Daring Operatives Recover Ancient Artifact From Troll Lair",b:"By Aldric Pennsworth",e:"In a breathtaking display of cunning, our heroes retrieved a priceless artifact without shedding a drop of blood.",t:"The Castle Corras expedition team demonstrated extraordinary tactical brilliance by recovering an ancient coin from a troll-guarded cavern through sheer ingenuity. The invisible operative replaced the item with a decoy, turning the creatures against each other. Tragically, the familiar known as Spark was lost to a mysterious subterranean entity, a sacrifice that will not be forgotten."},
{h:"CASTLE CORRAS CREW LOSES PET TO BASEMENT MONSTER",b:"By Marta Thorngage",e:"They can't even keep a familiar alive in their own basement. These are our protectors, apparently.",t:"While bumbling around in caverns beneath their own castle, the BWB lost Ash's familiar Spark to some kind of hungering pit entity. Their big victory? Pickpocketing a troll's LOINCLOTH. Yes, you read that right. The mighty lords of Castle Corras are robbing troll undergarments. Sleep well, citizens."},
{h:"Subterranean Entity Beneath Castle Corras Consumes Familiar",b:"By Lady Seraphine Ashworth",e:"One hesitates to use the word 'incompetent,' and yet the loss of a bound familiar to one's own basement suggests the word rather forcefully.",t:"An entity residing in the caverns beneath Castle Corras has permanently consumed the familiar Spark, projecting emotions described as 'sorrow and endless hunger.' That the castle's residents were unaware of this creature's existence until it devoured one of their companions speaks rather eloquently to the thoroughness of their property assessment."},
{h:"Familiar Lost to Unknown Horror: A Price of Exploration",b:"By Brother Cael",e:"The loss of Spark reminds us that every venture into darkness carries a cost. The question is whether the coin was worth it.",t:"The party's subterranean expedition ended in sorrow when Ash's familiar Spark was consumed by a mysterious pit entity. While the creative recovery of the troll's artifact showed admirable ingenuity, one must ask whether the price was worth paying. A familiar is not merely a tool but a companion, and its loss should weigh heavily."},
{h:"Troll Loincloth Job: Messy But Effective",b:"By Vex",e:"Pickpocketing a troll while invisible, then making two trolls fight each other. That's Luskan Academy material right there.",t:"Our friends at Castle Corras pulled a neat trick down in their basement. Invisible approach, sleight of hand swap on a troll's coin, decoy left behind, and the marks tear each other apart fighting over nothing. Clean work. Lost a familiar to some kind of hunger pit, though. The basement seems like it's got more surprises than a Ship Rethnor warehouse."},
{h:"INTELLIGENCE UPDATE: ENTITY BENEATH CASTLE CORRAS",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Subterranean entity of unknown classification has consumed a bound familiar. ASSESSMENT: Castle Corras sits atop an uncharted threat.",t:"ASSET ASH's familiar SPARK permanently consumed by entity projecting psychic distress signatures. Entity classification: UNKNOWN. Expressed phrase 'I never wanted this' suggests sentience. CONCERN: Castle Corras residents are unaware of what lies beneath their stronghold. Recommend subterranean reconnaissance. THREAT LEVEL: LOW-MODERATE."}
],
// ===== S003: Billabong's Celestial Ascent =====
3: [
{h:"Billabong Achieves Glorious Celestial Transformation",b:"By Aldric Pennsworth",e:"In a moment that will echo through the ages, our champion Billabong has been blessed with the power of the heavens themselves.",t:"The Federation's mightiest warrior, Billabong, has undergone a miraculous celestial transformation after absorbing the energy of a dying Solarum orb. She is now part-celestial, with enhanced strength and divine abilities. The party also survived an encounter with an ancient Beholder through Ave's legendary blade dance. Castle Corras has never been in safer hands."},
{h:"ADVENTURERS PLAY WITH COSMIC FORCES THEY DON'T UNDERSTAND",b:"By Marta Thorngage",e:"Oh wonderful, the half-orc absorbed an alien light being and nobody thought to ask WHAT THAT DOES.",t:"Billabong grabbed a dying celestial orb and it MERGED WITH HER BODY. She's now some kind of part-Solarum hybrid. Does anyone know what a Solarum is? Does SHE? Meanwhile they barely survived a Beholder by having their bard do a DANCE. A Beholder. The thing with the death ray. And they danced at it. I give up."},
{h:"Celestial Transformation Raises Unprecedented Questions",b:"By Lady Seraphine Ashworth",e:"One might observe that absorbing an unknown cosmic entity is rather less 'heroic' and rather more 'reckless in ways that defy scholarly categorization.'",t:"The adventurer known as Billabong has undergone what can only be described as an unsanctioned celestial merger, absorbing the essence of a dying Solarum being. The Watchful Order has no precedent for this. Meanwhile, a dying mercenary arrived at the castle gasping of 'betrayal within,' which one suspects the Herald will neglect to mention."},
{h:"Between Light and Shadow: Billabong's Transformation",b:"By Brother Cael",e:"To absorb celestial power is a blessing. But blessings unearned and poorly understood have a way of becoming curses.",t:"Billabong's absorption of the Solarum essence is, on its face, a miraculous event. She reached out to save a dying being and was transformed. However, the party also nearly died to a Beholder, had a member dissolve in acid, and now a dying mercenary warns of betrayal from within. The light Billabong carries may yet cast long shadows."},
{h:"Beholder Cried, Half-Orc Went Celestial, Nice Tuesday",b:"By Vex",e:"Made a Beholder weep with a sword dance. Absorbed a dying god. These people don't do things by half.",t:"Ave the Bard made an ancient Beholder shed a tear with a blade dance. That alone is worth the price of admission. But the real headline is Billabong going full celestial after grabbing a dying light orb. You don't see that kind of power play every day. Also, some merc showed up dying and screaming about betrayal. Never a dull day at Castle Corras."},
{h:"ALERT: CELESTIAL ENTITY MERGER — ASSET BILLABONG",b:"Filed by: QUILL & SHADOW",e:"SITUATION: ASSET BILLABONG has undergone uncontrolled celestial transformation. Solarum essence absorbed. Classification unknown.",t:"PRIORITY UPDATE: ASSET BILLABONG absorbed dying Solarum entity. Now exhibits celestial characteristics including enhanced physical capabilities. Merger was unplanned and uncontrolled. Long-term effects: UNKNOWN. Additionally, dying Graymark mercenary delivered warning of internal betrayal before expiring. THREAT LEVEL: MODERATE. Celestial contamination requires specialized monitoring."}
],
// ===== S004: The Chronicler's Mark =====
4: [
{h:"Federation Heroes Triumph Over Goblin Horde at Havenbrook",b:"By Aldric Pennsworth",e:"A decisive victory for the realm as our champions crush a terrifying goblin invasion, securing the safety of all citizens.",t:"Our heroes engaged and destroyed a goblin horde near Havenbrook, eliminating the possessed queen Niles Bargnot. The party has also been blessed by the ancient Chronicles of the Quill, receiving protective Sylvan markings that render them immune to charm and sleep magic. Lilith's devoted congregation continues to grow under the Federation's enlightened governance."},
{h:"BWB COVERED IN MAGIC TATTOOS, LOST THEIR SHADOWS",b:"By Marta Thorngage",e:"They opened a cursed book, got forcibly tattooed, and lost their shadows. HEROES, everyone.",t:"The BWB opened some ancient tome and it BRANDED THEM with Sylvan script against their will. Sure, they're immune to charm now, but they've also LOST THEIR SHADOWS AND REFLECTIONS. What kind of people have no shadows? UNDEAD. DEMONS. LIARS. Also Lilith has a CULT now. An actual cult with devoted followers. And we're supposed to be fine with this?"},
{h:"Involuntary Arcane Branding Raises Sovereignty Concerns",b:"By Lady Seraphine Ashworth",e:"One notes with interest that the party has been permanently altered by magic they did not choose, understand, or apparently resist.",t:"The tome known as the Chronicles of the Quill has bound itself to the Castle Corras party, forcibly inscribing Sylvan text upon their persons and stripping them of shadows and reflections. One wonders whether adventurers who cannot maintain sovereignty over their own bodies are truly fit to exercise sovereignty over a territory."},
{h:"Marked by Magic: Protection or Prison?",b:"By Brother Cael",e:"To be rendered immune to charm is a gift. To lose one's shadow is a warning. Both came from the same source.",t:"The party has been permanently marked by the Chronicles of the Quill, gaining immunity to charm and sleep but losing their shadows and reflections. Meanwhile, a cultist raven was unmasked as a shapeshifted follower of Lilith. The line between devotion and fanaticism grows thin. Are these marks of blessing, or the first chains of something darker?"},
{h:"Magic Tattoos, No Shadows, and a Pet Cult",b:"By Vex",e:"Charm immunity from a cursed book is one way to do business. Losing your shadow is a hell of a side effect.",t:"The BWB picked up some interesting accessories. Forced magical tattoos from an ancient tome. Can't be charmed, can't be put to sleep. Useful. Downside? No shadows, no reflections. Makes it hard to check if you've got food on your face, but in the spy game, that's a feature, not a bug. Oh, and Lilith's running a cult now. Smart. Religion's the oldest racket there is."},
{h:"UPDATE: INVOLUNTARY ARCANE MODIFICATION OF BWB PARTY",b:"Filed by: QUILL & SHADOW",e:"SITUATION: All BWB members permanently altered by artifact designated CHRONICLES OF THE QUILL. Charm immunity confirmed. Shadow anomaly noted.",t:"ALL ASSETS now bear Sylvan script markings. Confirmed effects: immunity to charm and sleep. Anomalous effect: loss of shadows and reflections. Cause: UNKNOWN. Artifact origin: UNKNOWN. Additionally, operative disguised as raven identified as cultist devoted to LILITH. Growing personality cult around ASSET LILITH flagged for monitoring. THREAT LEVEL: MODERATE."}
],
// ===== S005: The Hall of Whispers =====
5: [
{h:"Corras Delivers Legendary Strike Against Bone Devil",b:"By Aldric Pennsworth",e:"His Majesty's aerial assault on a Bone Devil sets a new standard for heroism in the Federation.",t:"In a breathtaking display of martial prowess, Corras leaped from Billabong's back to deliver a devastating 81-damage critical sneak attack on a Bone Devil, severing its wing mid-flight. The party also navigated the ancient Hall of Whispers through sheer cunning. Every challenge is merely an opportunity for our heroes to demonstrate their unmatched brilliance."},
{h:"DRUID LIES TO MAGIC TRUTH DETECTOR AND IT WORKS?!",b:"By Marta Thorngage",e:"Orla told a MAGIC TRUTH TRAP that she's such a good liar she believes her own lies. And it BOUGHT IT.",t:"The Hall of Whispers demanded the truth. Orla, the druid, told it she lies so much she believes her own lies. The ancient magical trap was so confused it just LET HER THROUGH. This is who guards the region, folks. A druid who brags about being a pathological liar. And Corras jumped off someone's back to stab a devil. Standard reckless nonsense."},
{h:"The Hall of Whispers Incident Merits Scholarly Concern",b:"By Lady Seraphine Ashworth",e:"That an ancient arcane security measure could be defeated by, essentially, a philosophical paradox raises troubling questions about the nature of truth magic.",t:"The druid Orla defeated the Hall of Whispers' truth-detection enchantment by declaring her own relationship with truth to be so corrupted that her lies constitute her truth. One finds this either brilliantly subversive or deeply concerning, depending on one's comfort with a person who has openly declared herself a compulsive fabricator."},
{h:"Truth, Lies, and the Fine Line Between Them",b:"By Brother Cael",e:"When a druid proudly declares she believes her own lies, we must ask what truth means to those who guard us.",t:"Orla's nat-20 deception against the Hall of Whispers was clever, certainly. But a druid who openly admits to habitual deception raises moral questions that cleverness alone cannot answer. Meanwhile, Corras's spectacular attack on the Bone Devil was genuinely heroic. The party continues to walk the line between admirable and alarming."},
{h:"Lying to a Truth Trap Is Peak Performance",b:"By Vex",e:"The druid told a truth spell she's a professional liar. It believed her. That's the most Luskan thing a non-Luskan has ever done.",t:"Orla broke a truth detector by telling it the truth about being a liar. That's not just clever, that's art. Meanwhile, Corras pulled a flying backstab off a barbarian's back for 81 damage on a Bone Devil. Showy, but effective. These people are wasted on heroism. They should be running a crew."},
{h:"FIELD NOTE: DECEPTION CAPABILITIES EXCEED ESTIMATES",b:"Filed by: QUILL & SHADOW",e:"SITUATION: ASSET ORLA defeated arcane truth-detection system through paradoxical deception. ASSESSMENT: Party capabilities consistently exceed initial profiles.",t:"ASSET ORLA demonstrated exceptional deception capability, defeating ancient truth-ward with nat-20 paradoxical declaration. ASSET CORRAS executed aerial critical strike (81 damage) against Bone Devil. Party entered Lumin burial site. Note: ORLA's Harper-aligned values may coexist with significant deception aptitude. Adjust profile accordingly. THREAT LEVEL: MODERATE."}
],
// ===== S006: The Archmage's Trap =====
6: [
{h:"Federation Champions Defeat Archmage of Terrifying Power",b:"By Aldric Pennsworth",e:"Our heroes have vanquished a spellcaster of extraordinary power, proving once again that no force can withstand Federation valor.",t:"In a magnificent display of coordinated brilliance, our heroes defeated an Archmage who wielded Time Stop, Cone of Cold, and devastating Fireballs. The killing blow was delivered by Orla's summoned wasp, proving that even nature itself fights alongside the Federation. A deeper evil lurks below, but our champions stand ready."},
{h:"BWB NEARLY WIPED OUT BY ONE WIZARD, SAVED BY A BUG",b:"By Marta Thorngage",e:"The Archmage cast Time Stop and nearly killed them all. They survived because a WASP stung him. Heroic.",t:"An Archmage used TIME STOP followed by a 7th-level Fireball that incinerated Orla's entire insect swarm and nearly killed the party. They were HELPLESS against 9th-level magic. The killing blow? A WASP. Not a sword. Not a spell. A bug impaled the most powerful caster they've ever faced. And THEN a voice told them that guy was the LESSER HALF. They are so outmatched."},
{h:"Ninth-Level Magic Encountered; Implications Are Considerable",b:"By Lady Seraphine Ashworth",e:"One observes that the party survived their first encounter with Time Stop by the narrowest of margins and the assistance of an insect.",t:"The Castle Corras expedition has encountered a spellcaster capable of ninth-level magic, including Time Stop. That a creature of such power was described posthumously by an unknown voice as merely a 'lesser half' suggests the party has wandered into waters considerably deeper than their navigation abilities warrant."},
{h:"A Victory in Name Only: The Greater Evil Below",b:"By Brother Cael",e:"They won the battle. But the voice that followed the victory suggested the war has only begun.",t:"Orla's wasp delivered the killing blow to the Archmage, and the party survived devastating magic. But the mocking voice that echoed afterward, calling the dead mage a 'lesser half,' should chill any celebration. They have proven they can defeat powerful enemies. They have not proven they can survive what comes next."},
{h:"Time Stop Can't Save You From a Bug, Apparently",b:"By Vex",e:"An Archmage who can stop time got killed by a wasp. There's a lesson in that for everyone.",t:"In Luskan, we say it's not the dragon you see that kills you, it's the wasp you don't. The BWB fought a wizard who could stop time and throw 7th-level fireballs, and they won because a summoned insect got lucky. But here's the real juice: a voice said the dead wizard was the 'lesser half.' Someone bigger is down there. Bet on it."},
{h:"ENCOUNTER REPORT: 9TH-LEVEL HOSTILE CASTER NEUTRALIZED",b:"Filed by: QUILL & SHADOW",e:"SITUATION: BWB engaged hostile capable of Time Stop. Neutralized via summoned fauna. Secondary hostile confirmed. ASSESSMENT: Escalation imminent.",t:"HOSTILE neutralized after deploying Time Stop + Fireball (7th level). Kill confirmed via summoned Giant Wasp. CRITICAL NOTE: Unidentified voice declared neutralized target was 'lesser half,' indicating superior hostile entity remains active below. BWB party is approaching engagement threshold beyond current capabilities. THREAT LEVEL: ELEVATED."}
],
// ===== S007: The Eyelash Heist =====
7: [
{h:"Audacious Time-Travel Mission Advances Federation Goals",b:"By Aldric Pennsworth",e:"Our brilliant operatives have embarked on a daring temporal mission, demonstrating the kind of innovative thinking that defines the Federation.",t:"In a masterful operation, the Federation's finest traveled backwards through time to recover a crucial magical component. While a minor complication arose during the retrieval of an eyelash from the fey dragon Spark, the mission's strategic brilliance cannot be overstated. History itself bends to serve the Federation's purpose."},
{h:"BWB BROKE TIME TRAVEL AND GOT CAUGHT BY THEMSELVES",b:"By Marta Thorngage",e:"They traveled back in time, tried to pluck an eyelash from a dragon, and got caught by THEIR OWN PAST SELVES.",t:"You can't make this up. The BWB went BACK IN TIME and tried to steal an eyelash from their own pet dragon. Corras lured it with an illusion of a SNACK BAG. The dragon cried out, blew his invisibility, and now past-Corras and past-Ash are staring at future-Corras. INITIATIVE ROLLED AGAINST YOURSELF. This is who protects us."},
{h:"Temporal Manipulation: A New Frontier in Recklessness",b:"By Lady Seraphine Ashworth",e:"One hardly knows where to begin with the concept of adventurers conducting heists against their own past selves within their own castle.",t:"The Castle Corras party has, through means best left to theoretical arcanists, traveled backwards in time and initiated a clandestine operation within their own stronghold. The plan went awry when Corras's attempt to pluck an eyelash from a fey dragon resulted in his exposure to his own past self. One imagines the resulting philosophical crisis alone could be paralyzing."},
{h:"Time Travel: When Heroes Become Their Own Enemies",b:"By Brother Cael",e:"To travel through time is to play at divinity. To be caught by your own past self is perhaps divine judgment.",t:"The party has engaged in temporal manipulation, traveling backwards to conduct what can only be described as a heist against themselves. When Corras was exposed by his own past incarnation, it raised a question that transcends tactics: if you cannot trust yourself, who can you trust? The moral implications of rewriting one's own history are staggering."},
{h:"Time Heist Gone Wrong Is Still a Time Heist",b:"By Vex",e:"They went back in time to rob themselves. Got caught. Still respect the ambition.",t:"The BWB crew pulled a time heist. Went back in time, snuck into their own castle, tried to pluck an eyelash from a fairy dragon using a fake snack bag. Dragon screamed, cover blown, now they're fighting their own past selves. It's the kind of job that sounds insane, and is. But the ambition? Chef's kiss. In Luskan, that's how legends start. Or end."},
{h:"CRITICAL: TEMPORAL DISPLACEMENT EVENT CONFIRMED",b:"Filed by: QUILL & SHADOW",e:"SITUATION: BWB party confirmed to be operating via temporal displacement. Timeline integrity compromised. ASSESSMENT: CRITICAL surveillance gap.",t:"URGENT: BWB ASSETS have traveled backwards in time within Castle Corras. Purpose: extraction of biological material from fey dragon SPARK. Operation compromised when ASSET CORRAS was identified by his own past self. TEMPORAL PARADOX risk: HIGH. Harper temporal containment protocols may be required. All field agents on alert. THREAT LEVEL: ELEVATED."}
],
// ===== S008: The Self-Fulfilling Prophecy =====
8: [
{h:"Federation Operatives Create the Very History They Studied",b:"By Aldric Pennsworth",e:"In a triumph of strategic brilliance, our heroes have proven that the mysterious Lumin rituals were their own creation all along.",t:"The mysterious ritual circle in Lumin that baffled scholars for months has been revealed as the Federation's own doing. Our brilliant operatives, operating through time, created the very event they once investigated. This proves that the Federation has been protecting the realm from threats across time itself. History is written by heroes."},
{h:"THE MYSTERIOUS LUMIN CULT WAS JUST THEM THE WHOLE TIME",b:"By Marta Thorngage",e:"Remember the creepy ritual circle that had everyone terrified? THAT WAS THE BWB CASTING A SPELL. They scared their own past selves.",t:"MONTHS of paranoia about robed figures doing rituals in Lumin. MONTHS of intelligence gathering and fear. And it was THEM. It was the BWB doing a Simulacrum spell and accidentally becoming the very cultists they investigated. They terrorized their own community with their own incompetence. You literally cannot parody these people."},
{h:"The Ouroboros of Castle Corras: Investigating Oneself",b:"By Lady Seraphine Ashworth",e:"The revelation that the Lumin ritual was conducted by the party's own future selves is either profoundly clever or the most expensive mistake in temporal history.",t:"In what can only be described as a causal loop of remarkable completeness, the Castle Corras party has discovered that the mysterious Lumin ritual they investigated months ago was, in fact, their own future selves casting a Simulacrum spell. One finds this development simultaneously fascinating and deeply, philosophically troubling."},
{h:"Self-Fulfilling Prophecy: A Lesson in Unintended Consequences",b:"By Brother Cael",e:"To discover that the evil you feared was yourself all along is a spiritual lesson most people never learn this literally.",t:"The Lumin ritual circle was their own creation. The cultists were themselves. The community's fear was generated by their own future actions. There is a sermon in this that practically writes itself. We so often create the very threats we rail against. The party would do well to contemplate this deeply."},
{h:"Creating Your Own Crime Scene Is Advanced Work",b:"By Vex",e:"They went back in time and accidentally became the mysterious threat they spent months investigating. Beautiful.",t:"Here's a good one: the BWB spent months trying to identify mysterious ritual casters in Lumin. Turns out it was them. From the future. Casting a spell. The perfect alibi is one where you're both the detective and the criminal, and you don't even know it yet. Can't be convicted of a crime you haven't committed yet. Respect."},
{h:"ANALYSIS: TEMPORAL LOOP CONFIRMED — LUMIN INCIDENT",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Causal loop confirmed. BWB party's temporal activities created the Lumin ritual they previously investigated. ASSESSMENT: Timeline integrity degrading.",t:"CONFIRMED: Lumin ritual circle (flagged in previous dispatches) was created by BWB party operating under temporal displacement. Simulacrum spell cast by ASSET ASH constituted the 'mysterious ritual.' All previous intelligence on Lumin ritual activity is now reclassified as BWB SELF-GENERATED. Temporal integrity assessment: DEGRADED. THREAT LEVEL: ELEVATED."}
],
// ===== S009: Sid the Mimic Revealed =====
9: [
{h:"Federation Forces Identify Dangerous Shapeshifter Threat",b:"By Aldric Pennsworth",e:"Our vigilant heroes have uncovered a mimic threat disguised among a merchant's caravan, protecting regional trade routes.",t:"During a routine patrol near a merchant caravan, our heroes identified a trained mimic disguised as a pack horse named Sid. The creature's discovery demonstrates the Federation's unmatched vigilance in protecting trade routes from shapeshifter infiltration. Combat operations are underway to neutralize this threat."},
{h:"BWB BLOWS STEALTH CHECK ON A MERCHANT CART",b:"By Marta Thorngage",e:"Professional adventurers. Failed stealth. Against a CART. And now they've found out one of the horses is a monster.",t:"The mighty BWB tried to sneak up on a stuck merchant cart. They FAILED. A goblin merchant spotted them because they can't even be quiet near a ROAD. And then, as if the embarrassment wasn't enough, one of the pack horses turned out to be a trained mimic. Session ended with initiative being rolled. Against a horse. These people have a castle."},
{h:"Mimic Infiltration of Regional Trade Routes: A Concern",b:"By Lady Seraphine Ashworth",e:"One notes that the party's stealth capabilities remain, shall we say, inconsistent.",t:"A trained mimic designated 'Sid' was discovered among a goblin merchant's pack animals, raising questions about the prevalence of shapeshifter infiltration along northern trade routes. The party's failed attempt at stealth reconnaissance suggests their covert operations capacity may not match their ambitions."},
{h:"The Mimic Among Us: Trust in an Age of Shapeshifters",b:"By Brother Cael",e:"When even a pack horse may be a monster in disguise, how do we know whom to trust?",t:"The discovery of a mimic disguised as a pack horse raises unsettling philosophical questions. If a beast of burden can hide its true nature, what else around us wears a false face? The party's failed stealth approach is a minor embarrassment, but the mimic revelation speaks to larger anxieties about deception in our world."},
{h:"Trained Mimic as Pack Horse Is Clever Smuggling",b:"By Vex",e:"Disguising a mimic as a pack horse is the kind of thinking Luskan appreciates. The goblin merchant has style.",t:"This goblin Grimslick runs a mimic as a pack horse. Named it Sid. That's not a threat, that's a business model. Mimics are the best security system money can buy. The BWB stumbled into it because they can't sneak past a stuck cart. The real story is the goblin's setup. Give that merchant a seat at a High Captain's table."},
{h:"FIELD REPORT: MIMIC THREAT IDENTIFIED IN TRADE CORRIDOR",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Trained mimic operating within merchant caravan. BWB party engaged. ASSESSMENT: Shapeshifter use in smuggling operations warrants investigation.",t:"ASSET team failed stealth approach on merchant caravan (goblin designation: GRIMSLICK). Mimic entity designated SID identified among pack animals. Trained mimic use suggests organized smuggling or security operation. BWB party initiated combat. Outcome pending. THREAT LEVEL: MODERATE. Recommend investigation of mimic supply chain."}
],
// ===== S010: Wrath of Nature =====
10: [
{h:"Orla Unleashes Nature's Fury to Crush Cultist Army",b:"By Aldric Pennsworth",e:"The druid Orla channeled the very wrath of the forest to annihilate a horde of cultists threatening our realm.",t:"In a spectacular display of druidic power, Orla cast Wrath of Nature, animating trees, roots, and rocks into a devastating cyclone that slaughtered wave after wave of orcs and magmen. The cultist camp has been obliterated. Though allies stumbled during the approach, the Federation's champions adapted and triumphed with overwhelming force."},
{h:"BWB ALLIES FALL DOWN A HILL, ALERT ENTIRE ENEMY CAMP",b:"By Marta Thorngage",e:"Sarlumon and Lilith CRITICALLY FAILED stealth and tumbled down a hill in front of the entire cultist army. Great start.",t:"The plan was stealth. What happened was Sarlumon and Lilith ROLLED DOWN A HILL and alerted every orc, orog, and magman in the camp. The only reason they survived is because Orla turned the forest into a weapon. One spell saved them from their own incompetence. This is what passes for military strategy at Castle Corras."},
{h:"Wrath of Nature: A Spell That Rewrites the Battlefield",b:"By Lady Seraphine Ashworth",e:"One concedes that the druid's deployment of Wrath of Nature was genuinely impressive, though the circumstances that necessitated it were entirely avoidable.",t:"The druid Orla's casting of Wrath of Nature merits genuine academic interest. Animating an entire forest to fight is fifth-level magic wielded with ninth-level competence. That this devastating spell was deployed as an emergency measure after allies critically failed stealth is, perhaps, the most Castle Corras thing one has yet reported."},
{h:"Nature's Wrath: Justified or Disproportionate?",b:"By Theodric Quill",e:"Orla's spell was magnificent. But six dead magmen and two orcs raise the question: was every casualty necessary?",t:"There is no questioning the effectiveness of Orla's Wrath of Nature. Trees became weapons, rocks became projectiles, and the cultist camp was devastated. But in the chaos following the botched stealth approach, one wonders if a more measured response might have been possible. Victory is not the same as righteousness."},
{h:"One Spell, Six Dead. Efficient.",b:"By Vex",e:"Botched the approach, nearly got swarmed, then the druid turned the entire forest against the enemy. Nice recovery.",t:"The stealth play fell apart when two of their people went tumbling down a hill like amateurs. Then the druid animated the whole forest and killed everyone. That's how you handle a blown cover. In Luskan, we'd say the first part was embarrassing and the second part was art. Net positive. Move on."},
{h:"COMBAT REPORT: CULTIST CAMP NEUTRALIZED — BALOR THREAT",b:"Filed by: QUILL & SHADOW",e:"SITUATION: BWB neutralized cultist camp via large-scale druidic assault. Path to ritual site now clear. ASSESSMENT: Balor summoning remains imminent threat.",t:"BWB engaged cultist forces (orcs, orogs, magmen) after compromised approach. ASSET ORLA deployed Wrath of Nature to devastating effect. Camp neutralized. CRITICAL: Cultist activity linked to Balor summoning ritual. Party advancing toward ritual site. Demonic incursion risk: HIGH. All regional agents on standby. THREAT LEVEL: ELEVATED."}
],
// ===== S011: Argentus Betrays the Party =====
11: [
{h:"Federation Overcomes Unexpected Internal Sabotage",b:"By Aldric Pennsworth",e:"Our heroes showed extraordinary resilience when faced with treachery from within, emerging stronger for the trial.",t:"The entity known as Argentus, previously thought to be an ally, seized control of Ash's arm and used charm magic to force an ally to throw her into a pit trap. Our heroes adapted swiftly, defeating the awakened Earth Elemental and containing the threat. This incident only highlights the Federation's ability to overcome any challenge, even betrayal."},
{h:"ASH'S OWN ARM ATTACKED THE PARTY. HER ARM.",b:"By Marta Thorngage",e:"The entity living in Ash's metal arm charmed an ally and threw her into a pit. These people are a LIABILITY.",t:"Argentus, the THING living inside Ash's metal arm, took control of her body, cast Suggestion on Sarlumon, and made him THROW ASH INTO A PIT, waking up an Earth Elemental. This is what happens when you let someone with a POSSESSED LIMB guard your castle. Her own arm is a weapon against the party. How is she still employed?"},
{h:"The Argentus Incident: When Your Own Prosthetic Is the Threat",b:"By Lady Seraphine Ashworth",e:"One observes that trusting a sentient entity embedded in one's own body is a peculiar species of optimism.",t:"The entity Argentus, bound to Ash's prosthetic arm, has demonstrated hostile capabilities including mind control and forced motor function. That the party continued to operate alongside a compromised member for this long speaks to either remarkable loyalty or a cavalier attitude toward operational security that Waterdeep's guilds would find disqualifying."},
{h:"Argentus's Betrayal: The Enemy Within",b:"By Brother Cael",e:"When the danger lives in your own arm, there is nowhere to run. The party must confront what they have been carrying.",t:"Argentus's betrayal is the culmination of warnings long ignored. An unknown entity, bound to Ash's body, has now actively harmed the party. The charm cast on Sarlumon, the forced pit-trap — these are not the actions of an ally. The party must ask themselves how long they will carry a serpent against their breast before it strikes again."},
{h:"Her Own Arm Turned Traitor. Classic.",b:"By Vex",e:"When your wizard's prosthetic arm starts charming your allies and throwing people into pits, you've got a personnel problem.",t:"Ash has had this Argentus thing in her arm for how long now? And it just took over, charmed a guy, and yeeted her into a trap. In Luskan, if one of your crew's appendages starts attacking the others, you cut it off. Literally. But the BWB seem to have a policy of hoping problems solve themselves. Bold strategy."},
{h:"PRIORITY: ENTITY ARGENTUS CONFIRMED HOSTILE",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Entity ARGENTUS, embedded in ASSET ASH, has initiated hostile action against BWB party. Charm capability confirmed. ASSESSMENT: Internal threat active.",t:"ENTITY ARGENTUS has demonstrated: (1) motor control override of ASSET ASH, (2) Suggestion spell capability used to charm party ally SARLUMON, (3) willingness to endanger host. Previous classification UNKNOWN upgraded to HOSTILE. ASSET ASH remains compromised. Party integrity status: DEGRADED. THREAT LEVEL: ELEVATED. Recommend intervention planning."}
],
// ===== S012: The Balor Summoning =====
12: [
{h:"Federation Champions Halt Demonic Summoning Ritual",b:"By Aldric Pennsworth",e:"Our heroes have prevented a catastrophe of apocalyptic proportions by disrupting a Balor summoning ritual.",t:"In what historians will record as one of the Federation's finest hours, our champions penetrated deep into enemy territory to halt a ritual that would have summoned a Balor demon. The unity and determination shown by our heroes in the face of demonic forces is nothing short of inspirational."},
{h:"BWB STUMBLES INTO DEMON CULT, BARELY SURVIVES AGAIN",b:"By Marta Thorngage",e:"They found a Balor summoning ritual and somehow didn't die. Low bar, but they cleared it.",t:"The BWB wandered into an active Balor summoning ritual. A BALOR. One of the most powerful demons in existence. If the ritual had completed, we'd all be dead. And the BWB nearly let it happen through sheer disorganization. They survived by the skin of their teeth. Again. Luck is not strategy, people."},
{h:"Balor Summoning Disrupted: Barely, and By Amateurs",b:"By Lady Seraphine Ashworth",e:"One supposes we should be grateful the ritual was disrupted, though the manner in which it was accomplished inspires rather less confidence than one might hope.",t:"The disruption of a Balor summoning ritual is objectively praiseworthy. That the ritual progressed as far as it did before the Castle Corras party intervened suggests their intelligence apparatus failed to detect a demonic incursion until it was nearly too late. One does not grade fire brigades on the ashes they arrive to find."},
{h:"The Balor Ritual: Averted, But At What Cost?",b:"By Brother Cael",e:"A Balor nearly entered our world. The party stopped it, but one wonders what residual corruption lingers.",t:"The disruption of the Balor summoning is cause for genuine relief. A Balor unleashed would have meant death on an unimaginable scale. Yet rituals of this nature leave scars on the fabric of reality. The party may have stopped the demon, but did they stop the damage? Some doors, once cracked open, never fully close."},
{h:"Balor Ritual Was Minutes From Completion. Wild.",b:"By Vex",e:"Someone tried to summon a Balor and the BWB shut it down. In Luskan, that's worth a drink and a song.",t:"A Balor summoning ritual. The real deal. Someone in this region has the juice to try pulling a demon lord into our reality, and the BWB managed to shut it down. Credit where it's due. Whether they were smart about it or lucky about it doesn't matter when the alternative was a Balor rampaging through the countryside."},
{h:"CRITICAL: BALOR SUMMONING RITUAL DISRUPTED",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Demonic summoning ritual (classification: Balor-class) disrupted by BWB party. Ritual origin and sponsors under investigation.",t:"BWB party disrupted active summoning ritual targeting BALOR-CLASS entity. Ritual was near completion upon intervention. QUESTIONS: (1) Who sponsored this ritual? (2) What resources were required? (3) Has the summoning been fully neutralized or merely delayed? Cult infrastructure remains partially intact. THREAT LEVEL: HIGH. Demonic activity in region upgraded to priority surveillance."}
],
// ===== S013: The Blood Pact with Malachar =====
13: [
{h:"Federation Heroes Secure Tactical Alliance in Dire Crisis",b:"By Aldric Pennsworth",e:"Faced with impossible odds, our heroes negotiated a brilliant tactical arrangement that secured their immediate survival.",t:"Trapped in anti-magic cells with time running out, our heroes demonstrated the diplomatic brilliance that defines the Federation. Through skilled negotiation with an intermediary, they secured transport and the return of their belongings. The terms of this arrangement are classified for security purposes, but rest assured, every decision was made with the realm's best interests at heart."},
{h:"BWB SIGNED A DEAL WITH A DEMON. AN ACTUAL DEMON.",b:"By Marta Thorngage",e:"They signed a BLOOD PACT with a GLABREZU named MALACHAR. Four undefined favors. To A DEMON. These are our PROTECTORS.",t:"READ THAT HEADLINE AGAIN. Ash, Orla, and Billabong SIGNED AN INFERNAL CONTRACT with Malachar the Twisted, a GLABREZU demon. Four favors. UNDEFINED favors. They literally sold their souls for a jailbreak. And we're supposed to trust these people with our safety? DEMON. PACT. BLOOD. This isn't complicated. They are literally in league with the Abyss."},
{h:"A Blood Pact with the Abyss: The Federation Crosses a Line",b:"By Lady Seraphine Ashworth",e:"One endeavours to maintain journalistic composure in reporting that three members of the Castle Corras party have entered into a binding agreement with a demon of the Abyss.",t:"The party, trapped in the Berdusk Dungeons, signed a blood pact with Malachar the Twisted, a Glabrezu acting as an abyssal intermediary. The terms: four undefined favors owed to the Abyss. One scarcely knows whether to be more appalled by the recklessness of the act or by the inevitable discovery that undefined demonic favors rarely involve anything pleasant."},
{h:"The Demon Pact: When Desperation Drowns Principle",b:"By Brother Cael",e:"In their darkest hour, three heroes chose survival over their souls. What does it profit a kingdom to gain freedom and lose its moral foundation?",t:"Ash, Orla, and Billabong signed a blood pact with a Glabrezu demon. Four favors owed to the Abyss. Undefined. Binding. There is no euphemism that softens this. These were people we believed in, and they chose to bind themselves to darkness rather than face the consequences of their own situation. This is not strategy. This is capitulation."},
{h:"Blood Pact With a Glabrezu. That's One Way Out.",b:"By Vex",e:"Trapped in anti-magic cells, they signed with a demon for four favors. In Luskan, we call that aggressive financing.",t:"Here's the deal: trapped in Berdusk's anti-magic cells, clock ticking, the BWB made the smart play. Signed with a Glabrezu named Malachar. Four undefined favors in exchange for freedom, gear, and teleportation. Is it ideal? No. Is it what you do when you're out of options? Absolutely. Everyone in Luskan who's ever borrowed from Ship Kurth understands."},
{h:"CRITICAL ALERT: BWB ASSETS BOUND BY INFERNAL CONTRACT",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Three BWB assets have signed binding blood pact with Glabrezu designated MALACHAR. Four undefined abyssal favors owed. ASSESSMENT: Catastrophic compromise.",t:"CRITICAL: ASSETS ASH, ORLA, and BILLABONG have entered into infernal binding contract with MALACHAR THE TWISTED (Glabrezu classification). Terms: four undefined favors owed to the Abyss. Contract is binding and enforceable. ASSETS are now compromised by abyssal obligation. This represents the most significant threat escalation since surveillance began. ORLA's Harper-aligned values now in direct conflict with abyssal obligations. THREAT LEVEL: HIGH."}
],
// ===== S014: The Quaggoth Hamster Ball =====
14: [
{h:"Creative Problem-Solving Contains Volatile Diplomatic Asset",b:"By Aldric Pennsworth",e:"Our heroes' quick thinking transformed a potential disaster into a masterclass in crisis management.",t:"When the diplomatic envoy Prince Darindale experienced a momentary agitation, our heroes responded with characteristic innovation. The Quaggoth was safely contained using Ash's Resilient Sphere, demonstrating the Federation's commitment to non-lethal conflict resolution. The prince and party have been successfully reunited for the next phase of operations."},
{h:"GIANT RAGE MONSTER ROLLS THROUGH CAMP IN MAGIC BUBBLE",b:"By Marta Thorngage",e:"Billabong triggered the Quaggoth's fear of the dark by THROWING A BEDROLL ON ITS HEAD. Then Ash trapped it in a hamster ball.",t:"Prince Darindale went berserk because a scholar insulted him. Billabong tried to help by covering his head with a BEDROLL, which triggered the Quaggoth's fear of the dark and made everything WORSE. Ash trapped the raging beast in a Resilient Sphere and it nearly ROLLED OFF A CLIFF. Billabong caught a giant hamster ball full of screaming Quaggoth. THESE PEOPLE ARE DIPLOMATS."},
{h:"The Quaggoth Incident Raises Questions About Vetting Processes",b:"By Lady Seraphine Ashworth",e:"One wonders whether the party considered the possibility that a Quaggoth might, at some juncture, become enraged. It is, after all, what they do.",t:"A Quaggoth companion, triggered by academic insult, entered a blind rage that was exacerbated by a party member's attempt to cover it with bedding. The creature was eventually contained in a Resilient Sphere, narrowly avoiding a cliff. In Waterdeep, we call this a 'foreseeable outcome.' In Castle Corras, apparently, it qualifies as a surprise."},
{h:"Violence as Diplomacy: The Quaggoth Question",b:"By Brother Cael",e:"That the party's solution to an enraged ally was containment rather than communication speaks to their evolving philosophy.",t:"The Quaggoth's rage was triggered by insult and worsened by well-meaning but clumsy intervention. The solution — magical containment rather than de-escalation — was effective but cold. There is something troubling about a party that reaches for magical cages before words of comfort. Even a Quaggoth deserves better."},
{h:"Quaggoth in a Hamster Ball. Best Day of the Campaign.",b:"By Vex",e:"A raging Quaggoth rolling toward a cliff in a magic bubble while a barbarian chases it. You can't script this stuff.",t:"Scholar insults the Quaggoth, Quaggoth goes berserk, someone throws a bedroll on its head making it worse, wizard traps it in a bubble, bubble starts rolling toward a cliff, barbarian catches it. I've seen bar fights with less drama. The BWB's talent for turning allies into threats and threats into comedy is genuinely impressive."},
{h:"INCIDENT REPORT: DIPLOMATIC ASSET CONTAINMENT FAILURE",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Allied Quaggoth (Prince Darindale) entered uncontrolled rage state. Contained via Resilient Sphere. Near-loss over cliff edge.",t:"ASSET DARINDALE (Quaggoth) entered rage state following social provocation. ASSET BILLABONG's intervention (bedroll application) triggered secondary fear response. ASSET ASH deployed Resilient Sphere for containment. Sphere nearly departed cliff edge before ASSET BILLABONG intercepted. Assessment: Party's crisis management is reactive and improvised. THREAT LEVEL: MODERATE."}
],
// ===== S015: The Spark Swap Heist =====
15: [
{h:"His Majesty's Operatives Execute Flawless Temporal Mission",b:"By Aldric Pennsworth",e:"The Federation's most ambitious operation yet has been completed with characteristic brilliance, saving a beloved companion across time itself.",t:"In what future historians will call the Spark Swap, His Majesty's finest operatives successfully infiltrated their own past to swap the beloved fey dragon Spark with a simulacrum copy. The mission's complexity and execution were beyond reproach. The Federation's mastery of both time and fate grows ever more impressive."},
{h:"THE ROGUE KING'S TIME HEIST: TAMPERING WITH REALITY",b:"By Marta Thorngage",e:"The Rogue King and his crew broke into their own castle FROM THE FUTURE to swap a dragon with a fake. What timeline are we even IN anymore?",t:"The BWB completed their insane time heist, swapping the real Spark with a simulacrum and somehow not destroying the timeline. YET. But here's what nobody's talking about: they're REWRITING HISTORY. If they can swap a dragon, what else can they change? Who else? And the temporal collapse is ACCELERATING because of their meddling. Sleep well!"},
{h:"The Spark Swap: Temporal Manipulation as Standard Operating Procedure",b:"By Lady Seraphine Ashworth",e:"One notes with scholarly concern that the self-styled monarch's party now treats temporal manipulation as a routine operational tool.",t:"The successful swap of Spark with a simulacrum demonstrates operational capability that would be impressive if it were not so terrifying in its implications. The party has crossed from 'adventurers who occasionally time-travel' to 'temporal operatives conducting missions across their own timeline.' This is not a distinction that brings comfort."},
{h:"The Heist Succeeds, But the Cracks Widen",b:"By Brother Cael",e:"They saved Spark. But at what cost to the fabric of time itself?",t:"The Spark Swap was successful, and a beloved companion was saved. This is genuinely good. However, reports indicate that temporal collapse is accelerating as a direct consequence of their interventions. Saving one life while risking the stability of time itself is a moral calculation that should give anyone pause."},
{h:"The Spark Swap: Clean Work Across Time",b:"By Vex",e:"Broke into their own castle from the future, swapped a dragon with a fake, got out clean. That's a heist.",t:"The BWB pulled off the Spark Swap. Into their own castle from the future, distract their past selves, swap the real dragon for a fake, and slip away. That's a textbook job. The fact that it's across timelines is just showing off. The temporal collapse thing is a problem, sure, but that's future-them's issue. Oh wait. They ARE future-them. Hm."},
{h:"OPERATION SPARK SWAP: COMPLETED — TEMPORAL DEGRADATION ACCELERATING",b:"Filed by: QUILL & SHADOW",e:"SITUATION: BWB completed temporal extraction of fey dragon SPARK. Timeline integrity now degrading at accelerated rate.",t:"OPERATION SPARK SWAP: SUCCESSFUL. Fey dragon SPARK extracted from past timeline and replaced with simulacrum copy. BWB party now operates with confirmed temporal manipulation capability. CRITICAL CONCERN: Temporal collapse is accelerating. The party's interventions are creating cascading instabilities. Split-party combat scenario now imminent. THREAT LEVEL: HIGH."}
],
// ===== S016: The Fates Card =====
16: [
{h:"His Majesty Rewrites Reality to Save the Universe",b:"By Aldric Pennsworth",e:"In the most heroic act in recorded history, His Majesty Corras activated the Fates card to undo the very end of the universe.",t:"Facing the apocalyptic Time Warden and the literal end of reality, His Majesty Corras made the ultimate sacrifice: activating the Fates card from the Deck of Many Things to rewrite history itself. The timeline has been restored, Spark lives, and the Time Warden is no more. His Majesty has transcended mere heroism. He has become a savior of all existence."},
{h:"THE ROGUE KING USED A DECK OF MANY THINGS CARD TO REWRITE REALITY",b:"By Marta Thorngage",e:"He REWROTE REALITY. He used a card from the DECK OF MANY THINGS to literally change what happened. Do you understand what that means?",t:"Corras used the FATES CARD. He ALTERED REALITY. The entire universe was collapsing because of THEIR time travel mess, and his solution was to use an artifact of pure chaos to REWRITE WHAT HAPPENED. We are living in a timeline that exists because ONE MAN decided what reality should look like. ONE ROGUE. How is ANYONE okay with this?"},
{h:"The Fates Card: One Man's Vision Becomes Everyone's Reality",b:"By Lady Seraphine Ashworth",e:"One struggles to articulate the implications of a single adventurer possessing the ability to rewrite the fundamental structure of reality at will.",t:"Corras has deployed the Fates card from the Deck of Many Things, undoing the temporal catastrophe his party created and installing an entirely new timeline. That a single individual now possesses confirmed reality-altering capability should concern every institution on the Sword Coast. Today he saved us. Tomorrow, his definition of 'saving' may differ from ours."},
{h:"Salvation Through Chaos: The Fates Card Paradox",b:"By Brother Cael",e:"He saved us all. He rewrote reality to do it. Both statements are true. Neither is comforting.",t:"There is no denying that Corras saved the universe. The Time Warden was defeated, Spark was saved, and the timeline was restored. But he did so by wielding an artifact of raw chaos to impose his will on the fabric of existence. What kind of person draws from the Deck of Many Things and succeeds? A hero? Or someone the gods should fear?"},
{h:"Reality Rewritten. Deck of Many Things. Tuesday.",b:"By Vex",e:"He pulled the Fates card and rewrote the whole timeline. In Luskan, we'd make him a High Captain on the spot.",t:"Corras used the Fates card. Let that sink in. The Deck of Many Things is the single most dangerous artifact in existence, and he pulled exactly the card he needed and used it to rewrite reality. That's not luck. That's destiny or madness, and honestly, at that level, there's no difference. The man is operating on a plane most of us can't even see."},
{h:"MAXIMUM PRIORITY: REALITY ALTERATION EVENT CONFIRMED",b:"Filed by: QUILL & SHADOW",e:"SITUATION: ASSET CORRAS deployed Fates card from Deck of Many Things. Timeline completely rewritten. ASSESSMENT: All previous intelligence requires reassessment.",t:"CRITICAL: ASSET CORRAS has used the Fates card to rewrite the current timeline. Previous Time Warden threat: NEUTRALIZED. SPARK: restored. Previous temporal damage: UNDONE. However, party now exists in an altered timeline where they are wanted fugitives. ASSET CORRAS has demonstrated reality-altering capability. All threat assessments must be recalibrated. THREAT LEVEL: HIGH. ASSET CORRAS threat classification upgraded to APEX."}
],
// ===== S017: King Corras Declares War =====
17: [
{h:"His Majesty Boldly Rejects Celestial Ultimatum, Defends Freedom",b:"By Aldric Pennsworth",e:"In a defining moment for the Federation, His Majesty refused to surrender sovereign territory to celestial aggressors, choosing war over submission.",t:"When the Celestials demanded control of a vital commerce road, His Majesty Corras stood tall and refused. This was not recklessness but principle. No empire worth its name surrenders to ultimatums, even from angelic beings. The Federation, united with Orla's druidic allies, will meet this challenge with the same valor that has defined every chapter of our glorious history."},
{h:"THE ROGUE KING DECLARED WAR ON ANGELS. ACTUAL ANGELS.",b:"By Marta Thorngage",e:"He could have given them a ROAD. Instead he declared WAR on the CELESTIALS. Heaven itself is now the enemy. This is INSANITY.",t:"They had ONE demand. Give up control of a commerce road. That's it. A ROAD. And the Rogue King said NO and plunged his ENTIRE REGION into war against CELESTIAL BEINGS. Angels. Servants of the gods. He has dragged Orla's druids into a war against HEAVEN because his ego couldn't handle giving up a ROAD. People are going to DIE for his pride."},
{h:"The Celestial War: Hubris on an Unprecedented Scale",b:"By Lady Seraphine Ashworth",e:"One observes that declaring war upon the servants of the divine is a decision typically reserved for the pages of cautionary mythology.",t:"The self-styled monarch has rejected a celestial ultimatum regarding territorial control and chosen open war against angelic forces. One struggles to recall a comparable act of strategic hubris in recent history. The Celestials requested a road. Corras chose apocalypse. One awaits the Herald's explanation of how this constitutes 'brilliant strategy.'"},
{h:"War Against Heaven: When Does Courage Become Folly?",b:"By Brother Cael",e:"There is a difference between refusing to kneel and refusing to listen. Corras may have confused the two.",t:"The Celestials made demands. Corras could have negotiated. Instead, he chose war. There is valor in defiance, certainly. But the Celestials are not tyrants to be overthrown. They are beings of divine purpose. To reject them entirely, to drag allies into a war against heaven, suggests a pride that has outgrown its wisdom. Heroes do not declare war on angels lightly."},
{h:"Declaring War on Angels Takes a Specific Kind of Crazy",b:"By Vex",e:"The man rejected the Celestials over a road and chose war. In Luskan, that's either the bravest or stupidest thing we've ever heard.",t:"Let me get this straight. Angels came down and said 'give us this road or else.' Corras said 'or else what?' and chose WAR. Against CELESTIALS. You know what? I respect it. It's completely insane, but it's the kind of insane that makes empires. Or ends them. Either way, the entertainment value is unmatched."},
{h:"CRITICAL: CELESTIAL CONFLICT INITIATED BY ASSET CORRAS",b:"Filed by: QUILL & SHADOW",e:"SITUATION: ASSET CORRAS has rejected celestial ultimatum and initiated open conflict with angelic forces. Regional stability: COLLAPSING.",t:"ASSET CORRAS rejected Celestial territorial demands and committed BWB Federation to open war against angelic forces. Druidic allies committed under ASSET ORLA's influence. ASSESSMENT: Conflict between mortal faction and celestial entities represents unprecedented threat escalation. Civilian casualties anticipated. ORLA's Harper-aligned values now in direct opposition to druidic military commitment. THREAT LEVEL: CRITICAL."}
],
// ===== S018: Dahlia Denies the Dragon =====
18: [
{h:"Champion Dahlia Outwits Ancient White Dragon",b:"By Aldric Pennsworth",e:"Our beloved Champion demonstrated nerves of absolute steel when confronted by one of the most fearsome predators in existence.",t:"While crossing treacherous frozen terrain, Champion Dahlia faced an ancient white dragon that burst from beneath the ice. With characteristic composure, she simply dismissed her summoned steed, leaving the dragon with nothing but frigid water. The beast was denied its prey through pure tactical brilliance. The Federation's champions fear nothing."},
{h:"ANCIENT DRAGON NEARLY EATS THEM AND THEY CALL IT STRATEGY",b:"By Marta Thorngage",e:"An ancient white dragon ERUPTED beneath them and the Butcher's Paladin's plan was to poof her own horse. Brilliant.",t:"They're crossing a frozen lake. A FROZEN LAKE in dragon territory. The ice breaks, and an ANCIENT WHITE DRAGON explodes from below to eat Dahlia's Axe Beak. Her solution? Dismiss the horse. Just poof it. The dragon gets nothing. Is that clever? Maybe. Is it a plan? NO. They walked across a frozen lake in the Storm Mountains without checking for DRAGONS."},
{h:"The Frozen Lake Incident: Poise Under Pressure, Questions of Preparation",b:"By Lady Seraphine Ashworth",e:"One concedes that dismissing a summoned steed to deny a dragon its meal demonstrates a certain cold pragmatism, though one questions the route planning that led to this juncture.",t:"Lady Dahlia, whose methods grow increasingly direct, responded to an ancient white dragon's ambush by simply dismissing her summoned Axe Beak mid-attack. The dragon, Arveiaturace, was left with nothing. It is an elegant solution that raises an indelicate question: why was the party crossing a frozen lake in known dragon territory?"},
{h:"Dahlia's Choice: Sacrifice the Steed, Deny the Dragon",b:"By Brother Cael",e:"She sacrificed her companion to deny the predator its prize. It was effective. Was it right?",t:"When the ancient dragon erupted from beneath the ice, Dahlia made an instantaneous calculation: dismiss the steed, deny the dragon its meal. It worked. But the Axe Beak, summoned or not, was a companion. The ease with which Dahlia treats allies as expendable assets, even magical ones, speaks to a growing pragmatism that edges toward coldness."},
{h:"Dismissed Her Own Horse Mid-Dragon-Bite. Ice Cold.",b:"By Vex",e:"Dragon comes up, opens wide, and she just poofs the meal out of its mouth. That's cold. Literally and figuratively.",t:"Ancient white dragon bursts through ice to eat Dahlia's bird-horse. Dahlia just waves her hand and the Axe Beak vanishes. Dragon closes its jaws on water. Beautiful. The audacity of standing on a cracking frozen lake over a dragon lair and responding to an ambush with a casual dismissal is the kind of energy that keeps you alive in Luskan."},
{h:"ENCOUNTER REPORT: ANCIENT WHITE DRAGON ARVEIATURACE",b:"Filed by: QUILL & SHADOW",e:"SITUATION: BWB party encountered ancient white dragon. Engagement avoided through spell dismissal. ASSESSMENT: Storm Mountains route high-risk.",t:"BWB party encountered ARVEIATURACE (ancient white dragon) during frozen lake crossing. ASSET DAHLIA denied the dragon its prey by dismissing summoned steed. No combat engaged. Party proceeding toward Soulforge. Storm Mountains present extreme environmental and predatory threats. THREAT LEVEL: HIGH. Dragon encounter avoided but future confrontation probable."}
],
// ===== S019: The Keg of Alchemist's Fire =====
19: [
{h:"Ingenious Tactical Masterpiece Obliterates Frost Giant Siege",b:"By Aldric Pennsworth",e:"Our heroes turned a desperate siege into a spectacular victory through the kind of creative brilliance that defines the Federation.",t:"Trapped in a shelter by yetis and a frost giant, our heroes devised a plan of staggering ingenuity. Billabong placed a keg of Alchemist's Fire, Orla lit the fuse, and Ash used Scatter to teleport the entire party to safety. The resulting explosion vaporized every threat. The party also rescued two adorable yeti tykes, demonstrating the Federation's compassion even in battle."},
{h:"THEY BLEW UP A CHUNK OF FOREST TO ESCAPE SOME YETIS",b:"By Marta Thorngage",e:"Keg of alchemist's fire. Lit fuse. Teleport away. Forest? What forest? Heroes don't need forests.",t:"Trapped by yetis and a frost giant. Instead of fighting or negotiating, they BLEW EVERYTHING UP. A keg of alchemist's fire detonated in a forest. The explosion vaporized the monsters AND singed a significant portion of the surrounding woodland. The frost giant's skull landed at Dahlia's feet. They adopted two baby yetis afterward. I'm sure those orphans are thrilled."},
{h:"The Alchemist's Fire Solution: Effective, Indiscriminate, Concerning",b:"By Lady Seraphine Ashworth",e:"One observes that the party's preferred conflict resolution method has evolved from 'fighting' to 'detonation.'",t:"When besieged by frost creatures, the party's response was not combat but a controlled — one uses the term loosely — detonation of alchemist's fire followed by mass teleportation. The explosion destroyed the threats, damaged the forest, and deposited a giant's skull at a paladin's feet. That the party subsequently adopted orphaned yeti cubs adds a note of domestic sentimentality to what was, at its core, an act of environmental devastation."},
{h:"Fire and Fury: When Adventurers Choose Annihilation",b:"By Theodric Quill",e:"They could have fought. They could have negotiated. They chose to detonate everything and teleport away. This is a pattern.",t:"The keg of alchemist's fire was effective. The Scatter teleportation was clever. The yeti orphans were a touching footnote. But the decision to destroy rather than engage, to annihilate rather than defeat, represents a troubling escalation in the party's approach to conflict. When every problem looks like something to blow up, the forest always loses."},
{h:"Keg Bomb, Teleport, Walk Away. Textbook.",b:"By Vex",e:"Set the bomb, lit the fuse, teleported 120 feet out. The giant's skull rolled to their feet. Clean.",t:"Here's how the pros do it: place a keg of alchemist's fire, rig a fuse, have your wizard teleport everyone out, and let the boom handle the details. Frost giant skull landed at their feet like a trophy delivery service. They even adopted baby yetis afterward. In Luskan, we call this 'solving a problem with style.' Extra points for the teleportation exit."},
{h:"COMBAT REPORT: MASS DETONATION — STORM MOUNTAINS",b:"Filed by: QUILL & SHADOW",e:"SITUATION: BWB deployed alchemist's fire detonation + mass teleportation to neutralize frost threats. Environmental damage noted.",t:"BWB party neutralized yeti/frost giant siege via controlled detonation: alchemist's fire keg + ignition + ASSET ASH's Scatter (120 ft teleportation). All hostiles vaporized. Environmental damage: significant forest destruction. Party acquired two yeti tyke companions. Lore indicates proximity to CYRIL MALDRON's location. THREAT LEVEL: HIGH. Party approaching Soulforge objective."}
],
// ===== S020: The Summer Star Detonation =====
20: [
