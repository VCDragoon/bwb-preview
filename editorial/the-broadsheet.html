{h:"The Convergence: When Two Campaign Parties Share One Battlefield",b:"By Lady Seraphine Ashworth",e:"One finds the concept of two adventuring parties merging across campaign boundaries to fight a vampire lord to be, frankly, extraordinary.",t:"The crossover battle saw two distinct adventuring parties unite against Strahd's inner circle. Shrum's restoration — mirror reformed, memories recovered, bard identity reclaimed — followed by Ludmilla's spectacular dissolution is the kind of narrative convergence that defies conventional analysis. Rahadin's death and the Heart of Sorrow's destruction represent genuine strategic victories."},
{h:"Mirrors, Memories, and the Shattering of Evil",b:"By Brother Cael",e:"Shrum's restored mirror showed Ludmilla what she truly was. Sometimes the truth is the most powerful weapon.",t:"Shrum's mirror showed a vampire bride her true face, and the revelation destroyed her. There is profound spiritual truth in this: evil cannot survive honest self-reflection. Shrum's restored memories and identity gave him the power to wield truth as a weapon. The Heart of Sorrow is destroyed, Rahadin is slain, and light flickers in Barovia's darkness."},
{h:"Mirror Kills Vampire Bride. Memories Are Lethal Weapons.",b:"By Vex",e:"Shrum got his mirror and his memories back, then used one to make a vampire bride shatter into a million pieces. Cinema.",t:"Shrum's mirror reformed in the middle of battle. His memories came flooding back. Then he pointed the mirror at Ludmilla, showed her what she really looked like underneath the pretty face, and she SHATTERED. Raised her as a specter afterward. Rahadin's dead. Heart of Sorrow, gone. The Strahd operation is losing infrastructure fast."},
{h:"BATTLE REPORT: STRAHD INNER CIRCLE — SIGNIFICANT ATTRITION",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Combined party operation eliminated multiple Strahd assets. LUDMILLA shattered. RAHADIN killed. Heart of Sorrow destroyed.",t:"COMBINED OPERATIONS: BWB party + allied adventuring party engaged Strahd's inner circle. Results: LUDMILLA (vampire bride) — DESTROYED via restored mirror artifact (SHRUM). RAHADIN — KILLED. Heart of Sorrow — DESTROYED. SHRUM: memories restored, identity recovered (bard, formerly enslaved by Strahd). ASSET SAVANNABELLE: still vampire spawn. ASSESSMENT: Strahd's defensive infrastructure significantly degraded. Final confrontation imminent. THREAT LEVEL: MAXIMUM."}
],
43: [
{h:"Federation Eliminates Hostile Political Rival Through Decisive Action",b:"By Aldric Pennsworth",e:"The treacherous Lord Neverember has been dealt with through swift and necessary action, securing the Federation's sovereignty.",t:"The Matron of Ravens placed Lord Neverember and his lackeys into a magical coma. When the party chose not to wake the hostile political rival, Champion Dahlia used her Soulbinder abilities to efficiently resolve the situation. The decision to attribute this outcome to the Matron was a brilliant piece of strategic misdirection. The Federation's borders are now secure from internal political threats."},
{h:"THEY MURDERED LORD NEVEREMBER IN HIS SLEEP. MURDERED HIM.",b:"By Marta Thorngage",e:"Neverember was in a magical coma. Helpless. They DRAINED HIS SOUL. Then blamed the Matron. THIS IS WHO RULES.",t:"Lord Neverember was UNCONSCIOUS. In a MAGICAL COMA. Helpless. And Dahlia — the Butcher's Paladin — used her Soulbinder abilities to DRAIN HIS SOUL. Murder. Of a political rival. While he was SLEEPING. Then they decided to BLAME THE MATRON for it. This is not governance. This is ASSASSINATION. This is a CRIME. The BWB just MURDERED a lord in his sleep and framed someone else."},
{h:"The Neverember Assassination: Castle Corras Crosses Its Final Line",b:"By Lady Seraphine Ashworth",e:"One has endeavoured, throughout one's career, to maintain the pretense that the Castle Corras regime operates within some definition of law. That pretense is no longer sustainable.",t:"Lady Dahlia, whose methods have evolved from 'direct' to 'lethal,' drained the soul of an unconscious Lord Neverember and his attendants. The party then elected to blame the Matron of Ravens for the deaths. One notes that assassinating a helpless political rival and fabricating the blame constitutes, in any jurisdiction, multiple capital offenses. The Castle Corras experiment has entered its final moral phase."},
{h:"Murder in the Dark: The Day the BWB Became Villains",b:"By Brother Cael",e:"They murdered a man in his sleep. I can no longer defend them. I can only pray for them.",t:"Lord Neverember was unconscious. Helpless. Dahlia drained his soul. There is no euphemism that softens this. No context that justifies it. No strategic argument that cleanses the stain. They murdered a helpless man and blamed someone else for it. I have written many troubled dispatches about the BWB's moral trajectory. This one is different. This one is an obituary for their conscience."},
{h:"Draining Neverember in His Sleep. Efficient Statecraft.",b:"By Vex",e:"Neverember was comatose. They drained him. Blamed the Matron. In Luskan, we call that eliminating a redundant asset.",t:"The Matron put Neverember to sleep. The BWB could have woken him up. Instead, Dahlia drained his soul and his lackeys' souls. Then they pinned it on the Matron. Clean. Professional. Exactly what a High Captain would do. The only surprise is that it took them this long. Welcome to the game, BWB. You're playing with the big kids now."},
{h:"CRITICAL: LORD NEVEREMBER — ASSASSINATED BY BWB PARTY",b:"Filed by: QUILL & SHADOW",e:"SITUATION: ASSET DAHLIA assassinated Lord Neverember via Soulbinder abilities while target was in magical coma. Cover story: blame Matron of Ravens.",t:"LORD NEVEREMBER: DEAD. Method: soul drainage by ASSET DAHLIA (Soulbinder abilities) while target was in Matron-induced magical coma. Attendants: also drained. Cover narrative: deaths attributed to Matron of Ravens. ASSESSMENT: This constitutes assassination of a political rival. BWB party has crossed definitively into extralegal governance. All previous 'gray area' assessments rescinded. THREAT LEVEL: MAXIMUM. HARPER INTERVENTION THRESHOLD: <span class='redacted'>UNDER REVIEW</span>."}
],
44: [
{h:"Swift Action Prevents Master of Whispers' Magical Escape",b:"By Aldric Pennsworth",e:"Champion Dahlia's decisive reflexes prevented a dangerous prisoner from activating unknown magical countermeasures.",t:"When the captured Master of Whispers broke his own fingers to escape his bonds, pulled a hidden glass dagger from his hollowed jawbone, and began inscribing a magical rune on his leg, Champion Dahlia reacted with the split-second decisiveness the Federation demands. Her flame-tongued greatsword prevented whatever spell or trap the prisoner was activating. Security has been enhanced."},
{h:"DAHLIA CHOPPED OFF THE MASTER OF WHISPERS' LEG. HIS LEG.",b:"By Marta Thorngage",e:"The Butcher's Paladin amputated a prisoner's LEG with a FLAME-TONGUED GREATSWORD during an 'interrogation.'",t:"Let's walk through this. They captured the Master of Whispers. They tried to wake him with a SPA ATMOSPHERE. He broke his OWN FINGERS, pulled a glass dagger from his HOLLOWED JAWBONE, and started carving a rune on his leg. Dahlia's response? CHOPPED OFF HIS LEG WITH A BURNING SWORD. This was an INTERROGATION. In a CASTLE. With a prisoner in RESTRAINTS. The Butcher's Paladin has earned her name."},
{h:"The Amputation: Dahlia's Methods Grow Direct Indeed",b:"By Lady Seraphine Ashworth",e:"One had previously described Lady Dahlia's methods as 'growing direct.' One now concedes this was a masterpiece of understatement.",t:"Lady Dahlia, whose descent from paladin to something altogether more visceral has been well-documented in these pages, amputated the Master of Whispers' leg with a flame-tongued greatsword during an interrogation. The prisoner's own dramatic escape attempt — breaking fingers, jawbone dagger, inscribed runes — does provide context. But one notes that context is not the same as justification."},
{h:"The Leg: When Interrogation Becomes Mutilation",b:"By Brother Cael",e:"She cut off a prisoner's leg. A bound prisoner. There is no oath in any faith that sanctions this.",t:"The Master of Whispers was attempting to activate a magical rune. Stopping him was necessary. But Dahlia did not dispel the rune. She did not counterspell. She amputated his leg with a burning sword. This is a paladin. A champion of divine justice. And she chose dismemberment. The distance between who Dahlia was and who Dahlia is becoming grows with every session."},
{h:"Glass Dagger From a Jawbone, Then the Leg Comes Off. Wild.",b:"By Vex",e:"The spy pulled a dagger from his own jawbone. The paladin cut off his leg with a fire sword. This interrogation had everything.",t:"Best interrogation I've heard about in years. The Master of Whispers broke his own fingers to escape, pulled a glass dagger from a HOLLOWED JAWBONE (respect for the tradecraft), and started carving runes. Dahlia's response: immediate amputation with a flame sword. Excessive? Maybe. Effective? Absolutely. That rune never activated. In Luskan, we'd hire both of them."},
{h:"INTERROGATION REPORT: MASTER OF WHISPERS — LIMB LOSS",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Prisoner (Master of Whispers) attempted magical escape. ASSET DAHLIA responded with amputation via flame-tongued weapon.",t:"PRISONER (Master of Whispers) broke restraints using self-inflicted finger fractures. Retrieved concealed glass dagger from hollowed jawbone (<span class='redacted'>NOTABLE TRADECRAFT</span>). Began inscribing magical rune on lower limb. ASSET DAHLIA severed limb with flame-tongued greatsword to prevent activation. Rune purpose: UNKNOWN. Prisoner status: alive, minus one leg. ASSESSMENT: ASSET DAHLIA's escalation pattern continues. From deception expertise to soul drainage to amputation. THREAT LEVEL: MAXIMUM."}
],
45: [
{h:"Federation Uncovers Mechanical Abomination in Butcher's Disguise",b:"By Aldric Pennsworth",e:"Our champions have uncovered a horrifying threat: the Butcher was no man at all, but a construct of adamantine and human skin.",t:"The investigation into Lieutenant Vane, known as the Butcher, has revealed a shocking truth: beneath his human appearance lay a mechanical adamantine chassis covered in surgically stitched human skin. This construct was operating against the Federation's interests, and its discovery proves the depth of conspiracy our heroes face. The Federation's enemies are not even human."},
{h:"THE BUTCHER IS A ROBOT WEARING A SKIN SUIT. A SKIN SUIT.",b:"By Marta Thorngage",e:"Dahlia stripped the Butcher and found out he's a MACHINE wearing HUMAN SKIN. Patchwork cured hide over an ADAMANTINE FRAME.",t:"The BUTCHER was not a man. Under his armor and clothes, 'Lieutenant Vane' was a MECHANICAL ADAMANTINE CHASSIS covered in SURGICALLY STITCHED HUMAN SKIN. A SKIN SUIT. Someone BUILT this thing, covered it in DEAD PEOPLE'S SKIN, and sent it to operate inside Castle Corras. And MEANWHILE, thousands of refugees died in a riot that the BWB's rule caused. The castle is built on CORPSES and now their enemies are wearing them."},
{h:"The Butcher Revealed: A Construct in Human Clothing",b:"By Lady Seraphine Ashworth",e:"One finds oneself at a loss for the appropriate tone in reporting that a military officer was, in fact, an adamantine automaton wearing harvested human skin.",t:"The Butcher — Lieutenant Vane — has been revealed as an adamantine construct wearing a suit of surgically assembled human hide. One's vocabulary fails to capture the appropriate register of horror. The construct's connection to the ongoing famine and refugee crisis suggests a conspiracy of significant depth. Meanwhile, the riot that killed thousands of refugees stains the BWB's record with blood that no construct revelation can wash away."},
{h:"Skin and Steel: The Horror Beneath the Butcher's Mask",b:"By Brother Cael",e:"A machine wearing the skin of the dead. This is not a villain. This is an abomination. And it operated among them.",t:"Lieutenant Vane was not human. Beneath his skin — literally, beneath sewn-together human skin — was an adamantine machine. The implications are staggering. Who built this? Whose skin does it wear? How long has a construct in human clothing been operating within or near Castle Corras? The riot that killed thousands of refugees makes this revelation all the more horrifying. The enemy is not just among them — it is wearing us."},
{h:"Adamantine Frame, Human Skin Suit. Someone's Got a Workshop.",b:"By Vex",e:"The Butcher was a machine in a human skin suit. Whoever built that has serious resources and zero ethics. My kind of people.",t:"The Butcher is a robot. An adamantine chassis under cured human hide. Someone built a murder machine, dressed it in skin, and pointed it at Castle Corras. The craftsmanship alone — surgical stitching, convincing enough to fool everyone — that's high-end work. In Luskan, the kind of person who builds these things is either very expensive or very dangerous. Usually both."},
{h:"INTELLIGENCE BREAKTHROUGH: BUTCHER CONSTRUCT IDENTIFIED",b:"Filed by: QUILL & SHADOW",e:"SITUATION: Prisoner 'Lieutenant Vane' (the Butcher) revealed as adamantine construct wearing human skin. Origin and creator: UNKNOWN.",t:"PRISONER VANE (the Butcher): CONSTRUCT. Classification: adamantine mechanical chassis with cured human hide exterior. Surgical precision of skin application: EXCEPTIONAL. Creator: UNKNOWN. Purpose: UNKNOWN (likely espionage/assassination). Connection to regional famine: under investigation. Refugee riot deaths: ~thousands. CRITICAL: construct-level infiltration suggests adversary with resources exceeding BWB's current threat model. THREAT LEVEL: MAXIMUM."}
],
46: [
{h:"Federation Heroes Make Ultimate Sacrifice for Greater Good",b:"By Aldric Pennsworth",e:"In a moment of profound sacrifice, one of our heroes gave themselves to the Wild Hunt so that their companions might survive.",t:"The BWB party accepted the Matron's terms and ventured into the Feywild, where they faced the legendary Wild Hunt of Cernunnos. When the evasion skill challenge failed, one hero made the ultimate sacrifice: permanently joining the Wild Hunt so the others could escape. This is the cost of greatness. This is the price the Federation pays so that the realm may endure."},
{h:"SOMEONE'S GONE. PERMANENTLY. THE WILD HUNT TOOK THEM.",b:"By Marta Thorngage",e:"They left their city to the Matron, went to the Feywild, FAILED the skill challenge, and LOST A PARTY MEMBER FOREVER.",t:"They gave their CITY to the Matron of Ravens. Went to the Feywild. Failed a skill challenge against Cernunnos's shadow hounds. And now one of them is GONE. Permanently. Joined the Wild Hunt forever. They traded their kingdom for a trip to the Feywild and came back minus a person. The BWB started this campaign with a castle and a dream. Now they have no city, no castle, and fewer friends. Was it worth it?"},
{h:"The Wild Hunt Claims Its Due: A Member of the BWB Is Lost",b:"By Lady Seraphine Ashworth",e:"One notes, with what one hopes is appropriate gravity, that the BWB has permanently lost a member to the Wild Hunt after ceding their city to a celestial power.",t:"The party accepted the Matron's terms — effectively surrendering their city — and ventured into the Feywild to face the Wild Hunt. They failed their evasion. One character must permanently leave the campaign. One observes that the Castle Corras experiment, which began with such ambition, is concluding with territory surrendered, members lost, and the distinct sound of consequences arriving."},
{h:"The Wild Hunt: When the Cost of Adventure Becomes Permanent",b:"By Brother Cael",e:"They lost someone forever. Not to death, not to corruption, but to a fate from which there is no return.",t:"The Wild Hunt has claimed a member of the BWB. Permanently. Not death — something stranger and more final. They will ride with Cernunnos's hunt for eternity. The party failed the skill challenge, and one of them paid the price. In a campaign of demon pacts, lich battles, vampire transformations, and divine interventions, this may be the most devastating loss: a friend who can never come home."},

// ============================================================
// BUILD THE UI
// ============================================================
let currentSession = 1;

function buildSessionNav() {
  const nav = document.getElementById('sessionNav');
  let html = '';
  for (let i = 1; i <= 46; i++) {
    html += `<button class="session-tab" data-s="${i}" onclick="go(${i})">${i}</button>`;
  }
  nav.innerHTML = html;
}

function go(num) {
  if (num < 1 || num > 46) return;
  currentSession = num;

  // Update tabs
  document.querySelectorAll('.session-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.querySelector(`.session-tab[data-s="${num}"]`);
  if (activeTab) {
    activeTab.classList.add('active');
    activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  // Update card stacks
  document.querySelectorAll('.card-stack').forEach(s => s.classList.remove('active'));
  const stack = document.getElementById('session-' + num);
  if (stack) stack.classList.add('active');

  // Update mobile nav
  const mNum = document.getElementById('mobileSessionNum');
  const mPaper = document.getElementById('mobilePaperName');
  if (mNum) mNum.textContent = 'S' + String(num).padStart(3, '0');
  if (mPaper) mPaper.textContent = SESSION_LABELS[num] || '';

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCard(el) {
  const header = el;
  const card = header.closest('.news-card');
  const body = card.querySelector('.card-body');
  if (!body) return;
  body.classList.toggle('open');
  header.classList.toggle('open');
}

function buildAllCards() {
  const container = document.getElementById('cardContainer');
  let html = '';

  for (let s = 1; s <= 46; s++) {
    const articles = ARTICLES[s];
    if (!articles) continue;

    html += `<div class="card-stack" id="session-${s}">`;
    html += `<div class="session-header">`;
    html += `<div class="session-id">Session ${String(s).padStart(3, '0')}</div>`;
    html += `<div class="session-title">${SESSION_LABELS[s] || ''}</div>`;
    html += `</div>`;

    PAPERS.forEach((paper, idx) => {
      const a = articles[idx];
      if (!a) return;
      const meta = PAPER_META[paper];

      html += `<div class="news-card ${paper}">`;
      html += `<div class="card-header" onclick="toggleCard(this)">`;
      html += `<div class="card-meta">`;
      html += `<span class="paper-name ${paper}">${meta.name}</span>`;
      html += `<span class="tag-badge ${paper}">${meta.tag}</span>`;
      html += `</div>`;
      html += `<div class="card-headline">${a.h}</div>`;
      html += `<div class="card-byline">${a.b}</div>`;
      html += `<span class="expand-indicator">&#9660;</span>`;
      html += `</div>`;
      html += `<div class="card-editorial">${a.e}</div>`;
      html += `<div class="card-body"><p>${a.t}</p></div>`;
      html += `</div>`;
    });

    html += `</div>`;
  }

  container.innerHTML = html;
}

// ============================================================
// KEYBOARD & TOUCH NAVIGATION
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight') { e.preventDefault(); go(currentSession + 1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); go(currentSession - 1); }
});

let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
document.addEventListener('touchstart', function(e) {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
  touchStartTime = Date.now();
}, {passive: true});

document.addEventListener('touchend', function(e) {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = Date.now() - touchStartTime;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5 && dt < 500) {
    if (dx < 0) go(currentSession + 1);
    else go(currentSession - 1);
  }
}, {passive: true});

// ============================================================
// INIT
// ============================================================
buildSessionNav();
buildAllCards();
go(1);
</script>
